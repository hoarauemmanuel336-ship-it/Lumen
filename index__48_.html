      <p>La confession est l'un des sept sacrements de l'Église, ces signes institués par le Christ pour donner la grâce. Par elle, le baptisé reçoit de Dieu, par le ministère du prêtre, le pardon des péchés commis depuis son baptême. On l'appelle aussi pénitence, du nom du regret qui l'anime, et réconciliation, parce qu'elle rétablit l'amitié avec Dieu que le péché avait rompue.</p>
      <h2>Un pouvoir donné par le Christ</h2>
      <p>Le soir de Pâques, le Ressuscité confie à ses apôtres le pouvoir de remettre les péchés en son nom. <em>« Recevez l'Esprit Saint. Ceux à qui vous remettrez les péchés, ils leur seront remis ; ceux à qui vous les retiendrez, ils leur seront retenus. »</em> <span class="ref">Jean 20:22-23</span> Ce pouvoir, il l'avait d'abord promis à Pierre. <em>« Je te donnerai les clés du royaume des cieux. »</em> <span class="ref">Matthieu 16:19</span> Le pardon vient de Dieu seul, mais Dieu a voulu le donner par des hommes. Le prêtre ne pardonne pas en son propre nom : il agit au nom du Christ, instrument par lequel passe la miséricorde. C'est ce que l'Écriture appelle le ministère de la réconciliation. <em>« Dieu nous a confié le ministère de la réconciliation. »</em> <span class="ref">2 Corinthiens 5:18</span> Se confesser à un prêtre, c'est recevoir le pardon là où le Christ a voulu le déposer.</p>
      <h2>Pourquoi un sacrement après le baptême</h2>
      <p>Le sacrifice de la Croix a racheté une fois pour toutes les péchés de tous les hommes ; il est la source unique de tout pardon, et rien ne s'y ajoute. <em>« Par une seule offrande, il a rendu parfaits pour toujours ceux qu'il sanctifie. »</em> <span class="ref">Hébreux 10:14</span> Ce pardon doit pourtant atteindre chacun et être accueilli. Le baptême l'applique une première fois et fait renaître à la vie de Dieu. Mais le baptisé peut retomber, et par un péché grave il se coupe lui-même de la grâce reçue : il ressort de l'eau où le Christ l'avait lavé. Le Seigneur a voulu que ce même pardon de la Croix lui soit redonné par la confession. Elle n'ajoute rien au sacrifice du Christ : elle en fait passer la grâce jusqu'au pécheur qui s'en était écarté. La tradition l'appelle la seconde planche après le naufrage : à qui a fait naufrage, elle offre de regagner le rivage.</p>
      <h2>Le péché mortel et le péché véniel</h2>
      <p>Tous les péchés ne blessent pas l'âme de la même manière, et la confession ne les atteint pas tous au même titre. Le péché mortel prive l'âme de la grâce sanctifiante, la vie de Dieu reçue au baptême, et éteint en elle la charité : il rompt l'amitié avec Dieu. Il porte sur une matière grave, commise en pleine conscience et de plein consentement. Le péché véniel, lui, ne prive pas de cette grâce ; il refroidit la charité sans l'éteindre, et blesse l'amitié sans la rompre. L'Écriture distingue déjà ces deux poids. <em>« Il est un péché qui mène à la mort... et il est un péché qui ne mène pas à la mort. »</em> <span class="ref">1 Jean 5:16-17</span> Le péché mortel doit être confessé pour être remis, et le pénitent en dit l'espèce et le nombre autant qu'il s'en souvient ; c'est la voie ordinaire par laquelle la grâce perdue est rendue. Le péché véniel n'oblige pas à la confession, puisqu'il laisse l'âme dans la grâce ; il se remet aussi par le regret, la prière, l'aumône et l'eucharistie. <em>« La charité couvre une multitude de péchés. »</em> <span class="ref">1 Pierre 4:8</span> Le confesser demeure pourtant fécond : la grâce du sacrement y ranime la charité que ces fautes avaient refroidie et affermit l'âme dans le bien.</p>
      <p>Celui qui, après un examen attentif, oublie pourtant un péché mortel le voit pardonné avec les autres par l'absolution : son repentir et sa volonté de tout avouer l'enveloppent. Si ce péché lui revient en mémoire, il est tenu de le confesser à la prochaine occasion. Quant aux fautes qu'on ne perçoit même pas, ce fond de désordre que nul ne discerne entièrement en lui, elles sont remises au pécheur dont le cœur se repent de tout, le connu comme l'inconnu. David priait déjà ainsi. <em>« Qui discerne ses égarements ? Purifie-moi de ceux qui me sont cachés. »</em> <span class="ref">Psaume 19:13</span></p>
      <h2>Les actes du pénitent</h2>
      <p>Le pénitent s'y prépare par l'examen de conscience : se tenir devant Dieu et passer sa vie en revue à la lumière de sa Parole, pour reconnaître ses fautes. Trois actes forment ensuite la matière du sacrement : la contrition, l'aveu et la satisfaction.</p>
      <p>La contrition d'abord, l'acte le plus important, car sans regret il n'y a pas de pardon : la douleur d'avoir péché, jointe à la ferme résolution de ne plus le faire. Ce regret prend deux formes. Il est contrition parfaite quand il naît de l'amour de Dieu : le pécheur souffre d'avoir offensé celui qu'il aime par-dessus tout. Il est contrition imparfaite, qu'on nomme aussi attrition, quand il naît de la crainte du châtiment ou du dégoût du péché. Les deux disposent au pardon, mais ne touchent pas le sacrement de la même façon. L'attrition suffit pour recevoir le pardon dans la confession. La contrition parfaite obtient le pardon dès qu'elle s'élève dans le cœur, avant même le sacrement, pourvu qu'elle s'accompagne de la volonté de se confesser ; elle ne dispense donc pas de la confession, dont elle porte déjà le désir. C'est par elle qu'est sauvé celui qui, repenti par amour, meurt sans avoir pu rejoindre un prêtre. Le Christ le dit de la pécheresse à ses pieds. <em>« Ses péchés, qui sont nombreux, lui sont pardonnés, car elle a beaucoup aimé. »</em> <span class="ref">Luc 7:47</span> L'Église l'a affirmé au concile de Trente, en 1551.</p>
      <p>L'aveu ensuite : dire ses péchés au prêtre, exposer la blessure à la lumière pour qu'elle soit guérie. <em>« Si nous confessons nos péchés, il est fidèle et juste pour nous les pardonner. »</em> <span class="ref">1 Jean 1:9</span> Cet aveu doit être entier et sincère : taire sciemment un péché mortel par honte rend la confession vaine et ajoute une faute à celle qu'on cache, car on ne trompe pas Dieu, devant qui rien n'est caché.</p>
      <p>La satisfaction enfin : accomplir la pénitence que le prêtre indique, une prière, un jeûne ou une bonne œuvre.</p>
      <h2>L'absolution</h2>
      <p>À ces trois actes répond l'absolution, la forme du sacrement : les paroles par lesquelles le prêtre remet les péchés au nom du Christ. Le mot vient du latin <em>absolvere</em>, délier : l'absolution délie le pécheur du lien que le péché avait noué en lui. Ce que le prêtre délie sur la terre, Dieu le tient pour délié dans le ciel. <em>« Tout ce que vous délierez sur la terre sera délié dans le ciel. »</em> <span class="ref">Matthieu 18:18</span> Le prêtre pardonne à la place du Christ, comme son ambassadeur, par une puissance qu'il tient du Seigneur. <em>« C'est au nom du Christ que nous faisons fonction d'ambassadeurs. »</em> <span class="ref">2 Corinthiens 5:20</span> Prêtant sa voix au Seigneur, il déclare : « Je t'absous de tes péchés, au nom du Père, et du Fils, et du Saint-Esprit. » Celui qui pardonne, par cette bouche, c'est le Christ lui-même. Le regret de l'homme dispose le cœur à recevoir ce don : l'acte du prêtre porte la puissance du Christ, l'ouverture du cœur la laisse entrer.</p>
      <h2>Ce que la confession opère</h2>
      <p>L'absolution remet la faute et, avec elle, la peine éternelle : l'âme qui avait perdu la grâce par un péché mortel la retrouve et redevient amie de Dieu. La charité éteinte renaît, les mérites que le péché avait éteints reviennent, et la conscience réconciliée goûte la paix. Le pénitent est aussi réconcilié avec l'Église, qu'il avait blessée, car nul ne pèche seul : le mal d'un membre atteint tout le corps, et son retour réjouit toute la maison. <em>« Il y aura plus de joie dans le ciel pour un seul pécheur qui se convertit que pour quatre-vingt-dix-neuf justes qui n'ont pas besoin de conversion. »</em> <span class="ref">Luc 15:7</span></p>
      <p>Au-delà de la faute et de la peine éternelle demeure souvent une peine temporelle : le péché pardonné laisse en l'homme un attachement désordonné et un tort à redresser. La satisfaction commence à le redresser ici-bas. L'Écriture le montre chez David. <em>« Le Seigneur a pardonné ton péché ; tu ne mourras pas. »</em> <span class="ref">2 Samuel 12:13</span> L'enfant né de la faute mourra cependant : le pardon de la faute n'efface pas toute conséquence. Cette réparation ne cherche pas à fléchir un Dieu exigeant, car le pardon est donné gratuitement ; elle guérit le pécheur de l'attachement laissé en lui et redresse le tort commis. Quand Zachée se convertit, il ne s'en tient pas au regret, il répare. <em>« Si j'ai fait tort à quelqu'un, je lui rends le quadruple. »</em> <span class="ref">Luc 19:8</span> Nos satisfactions n'ont de valeur que reçue de l'unique satisfaction du Christ, qui a réparé sur la Croix ce qu'aucun homme ne pouvait réparer. Ce qui demeure à purifier avant la mort s'achève au purgatoire ; et l'Église, puisant au trésor des mérites du Christ, peut en remettre une part par les indulgences.</p>
      <h2>La nécessité et la fréquence</h2>
      <p>Qui a conscience d'un péché mortel est tenu de le confesser, et de le faire avant de communier : on ne reçoit pas le corps du Christ avec une âme coupée de lui. <em>« Que chacun s'éprouve soi-même, et qu'ainsi il mange de ce pain et boive de cette coupe. »</em> <span class="ref">1 Corinthiens 11:28</span> L'Église en a fait un précepte : confesser ses péchés graves au moins une fois l'an. La confession régulière, même pour les seules fautes vénielles, n'est pas obligatoire ; elle purifie pourtant le regard, affermit contre la rechute et fait grandir dans l'amitié de Dieu.</p>
      <h2>Le secret de la confession</h2>
      <p>Ce secret porte un nom : le sceau sacramentel. Il couvre tout ce que le pénitent confie pour recevoir le pardon, ses péchés, leurs circonstances, tout ce qui pourrait le faire reconnaître. Le confesseur ne peut ni le redire, ni l'utiliser, ni même le laisser deviner par un mot ou une attitude. Aucune raison, si grave soit-elle, ne lève cette obligation : ni l'ordre d'un juge, ni le danger d'autrui, ni le besoin de se disculper lui-même.</p>
      <p>Cette inviolabilité tient à ce qui se passe dans la confession : le pénitent ne parle pas à un homme, il parle à Dieu, dont le prêtre n'est que l'instrument. Ce qui est avoué est confié à la miséricorde divine, qui efface et oublie. <em>« C'est moi qui efface tes transgressions, et je ne me souviendrai plus de tes péchés. »</em> <span class="ref">Isaïe 43:25</span> Le prêtre, simple ministre de ce pardon, est lié au même oubli : il a entendu comme l'oreille de Dieu, et ce qu'il a reçu appartient à Dieu seul. Trahir ce secret est l'une des fautes les plus graves qu'un prêtre puisse commettre ; des confesseurs ont préféré la prison ou la mort plutôt que de livrer ce qui leur avait été confié. <em>« Le médisant révèle les secrets, mais l'homme au cœur fidèle tient la chose cachée. »</em> <span class="ref">Proverbes 11:13</span> Le pénitent peut donc tout dire sans crainte : ce qu'il dépose au confessionnal n'en sortira jamais.</p>

      <p>Le pape est le successeur de l'apôtre Pierre, évêque de Rome et chef visible de toute l'Église. Il tient sa charge de celle que le Christ a confiée à Pierre : la primauté sur les apôtres et sur l'Église entière, pour la gouverner et la tenir unie. Cette charge passe de Pierre à ses successeurs, et c'est elle que le pape exerce aujourd'hui.</p>
      <h2>Tu es Pierre (Kêphas, en araméen)</h2>
      <p>À Césarée, Simon confesse que Jésus est le Christ, le Fils du Dieu vivant. Cette confession venait du Père : <em>« Ce ne sont pas la chair et le sang qui t'ont révélé cela, mais mon Père qui est dans les cieux. »</em> <span class="ref">Matthieu 16:17</span> Et c'est à celui qui vient de la recevoir que Jésus donne un nom nouveau et une mission : <em>« Tu es Pierre, et sur cette pierre je bâtirai mon Église, et les portes de l'enfer ne prévaudront pas contre elle. »</em> <span class="ref">Matthieu 16:18</span></p>
      <h2>Les clés du Royaume</h2>
      <p>Jésus remet alors à Pierre les clés. <em>« Je te donnerai les clés du royaume des cieux ; tout ce que tu lieras sur la terre sera lié dans les cieux, et tout ce que tu délieras sur la terre sera délié dans les cieux. »</em> <span class="ref">Matthieu 16:19</span> L'image vient de l'Ancien Testament. Dans la maison royale de Juda, le roi confiait à un intendant la clé du palais, charge de gouverner en son nom. <em>« Je mettrai sur son épaule la clé de la maison de David ; il ouvrira, et nul ne fermera ; il fermera, et nul n'ouvrira. »</em> <span class="ref">Isaïe 22:22</span> Pierre reçoit cette charge pour le Royaume du Christ : l'autorité d'ouvrir et de fermer, de lier et de délier, au nom de son Seigneur.</p>
      <h2>Pais mes brebis</h2>
      <p>La promesse devient charge après la Résurrection. Par trois fois, le Ressuscité demande à Pierre s'il l'aime, et par trois fois lui confie son troupeau. <em>« Pais mes brebis. »</em> <span class="ref">Jean 21:17</span> Pierre reçoit ainsi la garde de toutes les brebis du Christ, les autres pasteurs compris.</p>
      <h2>Le premier des apôtres</h2>
      <p>La place de Pierre paraît tout au long de l'Évangile. Les listes des apôtres le nomment toujours en tête. <em>« Voici les noms des douze apôtres : le premier, Simon, appelé Pierre. »</em> <span class="ref">Matthieu 10:2</span> Quand le Seigneur interroge les Douze, c'est Pierre qui répond pour tous ; il est le premier à entrer dans le tombeau vide, le premier à annoncer l'Évangile au matin de la Pentecôte. Cette préséance constante manifeste la charge que le Seigneur lui a remise.</p>
      <h2>Le Rocher et le roc</h2>
      <p>Le seul fondement de l'Église est le Christ. <em>« Nul ne peut poser d'autre fondement que celui qui est déjà posé, Jésus-Christ. »</em> <span class="ref">1 Corinthiens 3:11</span> Pierre tient son rôle de ce fondement unique : il est le roc visible par lequel le Christ, Rocher invisible, maintient son Église dans le temps. En donnant à Simon son propre nom de Roc, le Seigneur le fait participer à ce qu'il est lui-même, demeurant l'unique source d'où Pierre reçoit tout.</p>
      <h2>Une charge qui demeure</h2>
      <p>L'Église est bâtie pour durer jusqu'à la fin des temps, et son fondement visible dure avec elle, transmis de Pierre à ses successeurs. Dès les origines, l'office laissé vacant par la défaillance d'un apôtre est confié à un autre : pour remplacer Judas, Pierre cite le psaume. <em>« Qu'un autre prenne sa charge. »</em> <span class="ref">Actes 1:20</span> Pierre achève sa course à Rome, où il verse son sang ; l'évêque de Rome est son héritier, et tient la même primauté sur l'Église entière. Sur cette charge repose le charisme par lequel il confirme ses frères dans la foi, que Jésus lui avait promis au soir de la Cène. <em>« J'ai prié pour toi, afin que ta foi ne défaille pas ; et toi, affermis tes frères. »</em> <span class="ref">Luc 22:32</span> Ce charisme tient de la promesse du Christ et non des mérites de celui qui l'exerce : Pierre, qui avait renié son Maître, fut relevé puis chargé d'affermir ses frères. C'est le fondement de l'infaillibilité pontificale.</p>
      <h2>L'infaillibilité pontificale</h2>
      <p>L'infaillibilité est le don par lequel le pape, lorsqu'il définit solennellement une doctrine de foi ou de morale à tenir par toute l'Église, est préservé de l'erreur par l'assistance de l'Esprit Saint. Elle prolonge la prière du Christ pour que la foi de Pierre ne défaille pas. Le pape n'engage ce don qu'en réunissant quatre conditions : il parle comme pasteur et docteur suprême de tous les chrétiens ; il use de son autorité apostolique suprême ; il définit une doctrine de foi ou de mœurs ; il la déclare à tenir par toute l'Église. On nomme un tel acte une définition <em>ex cathedra</em>, « du haut de la chaire » de Pierre. En dehors de ces conditions, dans ses homélies, ses décisions de gouvernement ou ses opinions personnelles, le pape enseigne et mérite le respect, sans être couvert par ce don. Le don préserve de l'erreur en gardant le dépôt reçu : le pape garde la foi transmise depuis les Apôtres et l'énonce fidèlement, sans y ajouter de parole nouvelle, car la révélation s'est achevée avec les Apôtres.</p>
      <h2>L'infaillibilité de l'Église</h2>
      <p>Ce don du pape découle d'une promesse faite à l'Église entière. Le Christ l'a assurée contre l'erreur et lui a donné son Esprit. <em>« L'Esprit de vérité vous conduira dans toute la vérité. »</em> <span class="ref">Jean 16:13</span> L'Église ne peut donc défaillir dans la foi. Cette infaillibilité, qui appartient au corps tout entier, s'exerce de deux manières : par le pape seul, dans une définition solennelle, ou par l'ensemble des évêques réunis en concile autour de lui ; dans les deux cas, c'est la même foi de l'Église qui se dit, pour trancher quand son unité est en jeu. Ce don laisse intacte la condition humaine du pape : il peut pécher, se tromper dans ses jugements, faillir dans sa conduite, et l'histoire en a connu de saints et d'indignes ; il ne rend ni saint ni omniscient, et garde seulement sa parole solennelle de l'erreur. L'Église a vécu cette assurance dès les origines et l'a définie en propres termes au concile Vatican I, en 1870. Son exercice solennel reste rare : en plus de vingt siècles, le pape n'a parlé ainsi que pour fixer ce qui touche au cœur de la foi, comme lorsqu'il a proclamé l'Immaculée Conception, en 1854, et l'Assomption, en 1950.</p>
      <h2>Les premiers successeurs</h2>
      <p>Le Nouveau Testament nomme déjà les premiers maillons de la chaîne romaine. Après Pierre vient Lin, que salue la seconde lettre à Timothée : <em>« Eubule, Pudens, Lin et Claudia te saluent. »</em> <span class="ref">2 Timothée 4:21</span> Plus loin paraît Clément, ce compagnon de Paul que la tradition reconnaît pour le quatrième pape : <em>« ... avec Clément et mes autres compagnons d'œuvre, dont les noms sont au livre de vie. »</em> <span class="ref">Philippiens 4:3</span> Les premiers de ceux qui tinrent la place de Pierre sont ainsi inscrits dans l'Écriture même.</p>
      <h2>Vicaire du Christ</h2>
      <p>Le pape tient la place du Christ comme pasteur visible du troupeau que le Seigneur conduit invisiblement : c'est ce que dit son titre de vicaire du Christ, celui qui agit au nom d'un autre et à sa place. Les évêques, successeurs des apôtres, forment un seul collège dont il est la tête, comme Pierre l'était parmi les Douze ; et l'on n'est dans l'Église du Christ qu'en demeurant en communion avec lui.</p>
      <h2>Serviteur des serviteurs de Dieu</h2>
      <p>Cette primauté est donnée pour servir, non pour dominer. Le plus grand dans l'Église se fait le serviteur de tous, à la suite du Christ qui lava les pieds de ses disciples ; et Pierre lui-même l'enseigne aux pasteurs. <em>« Paissez le troupeau de Dieu qui vous est confié, non en dominateurs, mais en vous faisant les modèles du troupeau. »</em> <span class="ref">1 Pierre 5:2-3</span> De là vient le plus ancien des titres du pape, serviteur des serviteurs de Dieu.</p>

      <h2>De quel esclavage parle la Bible</h2>
      <p>On entrait dans la servitude biblique par la dette, par la pauvreté qui forçait à se vendre, ou par la guerre, et l'on pouvait en sortir. Le mot hébreu que la Bible rend par « serviteur » ou « esclave », <em>'ebed</em> (עֶבֶד), et son équivalent grec <em>doulos</em> (δοῦλος), y couvrent tout un éventail, du domestique au captif de guerre. Rien là de la traite moderne, qui a fait de la race un titre de propriété et transmettait l'esclavage aux enfants sans qu'on puisse jamais en sortir : la Loi de Moïse, au contraire, traite la servitude comme un état provisoire qu'il faut sans cesse desserrer.</p>
      <h2>La Loi adoucit et limite</h2>
      <p>La Loi de Moïse encadre la servitude et la borne de toutes parts. Elle la limite d'abord par le temps : le serviteur hébreu sert six ans et recouvre la liberté la septième. <em>« Si tu achètes un serviteur hébreu, il servira six ans ; la septième année, il sortira libre, sans rien payer. »</em> <span class="ref">Exode 21:2</span> On ne le renvoie pas les mains vides, mais pourvu de quoi repartir debout. <em>« Quand tu le renverras libre, tu ne le renverras pas les mains vides : tu lui donneras des présents de ton troupeau, de ton aire et de ton pressoir. »</em> <span class="ref">Deutéronome 15:13-14</span> Tous les cinquante ans, l'année du jubilé rend chacun à sa famille et à sa terre. <em>« Vous proclamerez la liberté dans le pays pour tous ses habitants ; chacun rentrera dans son bien, chacun regagnera sa famille. »</em> <span class="ref">Lévitique 25:10</span> Nul Israélite, de même, ne peut être tenu comme un bien qu'on achète et qu'on revend. <em>« Car ils sont mes serviteurs, que j'ai fait sortir du pays d'Égypte ; ils ne seront pas vendus comme on vend les esclaves. »</em> <span class="ref">Lévitique 25:42</span> Le repos du sabbat lui-même s'étend au serviteur, à égalité avec le maître. <em>« afin que ton serviteur et ta servante se reposent comme toi. »</em> <span class="ref">Deutéronome 5:14</span> Et la violence se retourne contre celui qui l'exerce : le maître qui mutile son serviteur doit l'affranchir. <em>« Si un homme frappe l'œil de son serviteur et le lui fait perdre, il le laissera aller libre, pour prix de son œil. »</em> <span class="ref">Exode 21:26</span></p>
      <h2>Le refuge du fugitif</h2>
      <p>Un commandement va plus loin que tous, et le monde d'alors n'en connaissait pas de semblable : l'esclave qui fuit un maître dur ne doit pas être rendu. <em>« Tu ne livreras pas à son maître un esclave qui se sera réfugié chez toi. Il demeurera avec toi, au milieu de toi, et tu ne l'opprimeras pas. »</em> <span class="ref">Deutéronome 23:16-17</span> Ailleurs, recueillir un fugitif était un crime puni de mort ; en Israël, c'est le rendre qui est défendu. Le droit prend le parti du faible contre celui qui le possède, ce qui ruine d'avance l'idée d'une propriété absolue sur la personne.</p>
      <h2>Le vol d'homme, crime capital</h2>
      <p>À la racine de toute traite se trouve le rapt : capturer un homme pour le vendre. La Loi le frappe de mort. <em>« Celui qui dérobe un homme, et qui l'a vendu ou qui l'a gardé entre ses mains, sera mis à mort. »</em> <span class="ref">Exode 21:16</span> Le Nouveau Testament reprend cette condamnation et range le marchand d'esclaves parmi les pires criminels : il figure dans la liste des actes que la saine doctrine réprouve. <em>« pour les impudiques, les marchands d'esclaves, les menteurs, les parjures, et tout ce qui est contraire à la saine doctrine. »</em> <span class="ref">1 Timothée 1:10</span> La traite qui a déporté des peuples entiers reposait tout entière sur ce vol d'homme que l'Écriture punissait déjà de mort.</p>
      <h2>Israël, peuple d'esclaves rachetés</h2>
      <p>Israël se sait né de l'esclavage. Toute son histoire commence par une délivrance : Dieu voit la misère d'un peuple asservi et descend l'arracher à ses maîtres. <em>« J'ai vu la misère de mon peuple qui est en Égypte, et j'ai entendu le cri que lui arrachent ses oppresseurs. Je suis descendu pour le délivrer. »</em> <span class="ref">Exode 3:7-8</span> Dieu se révèle ainsi comme celui qui libère, et ce souvenir devient la mesure de toute la Loi. Chaque fois qu'elle ordonne la douceur envers le serviteur, elle en donne la même raison : <em>« Tu te souviendras que tu as été esclave au pays d'Égypte, et que le Seigneur ton Dieu t'a racheté. »</em> <span class="ref">Deutéronome 15:15</span> Un peuple qui se définit par sa sortie de la servitude porte en lui de quoi la condamner.</p>
      <h2>Le Christ fait du maître et de l'esclave deux frères</h2>
      <p>L'Évangile porte le coup décisif, non en changeant les lois de l'Empire, mais en changeant ce qui fonde toute loi : le regard sur l'homme. Devant le Christ, la condition sociale s'efface, car tous reçoivent la même dignité de fils de Dieu. <em>« Il n'y a plus ni Juif ni Grec, il n'y a plus ni esclave ni homme libre, car vous êtes tous un en Jésus-Christ. »</em> <span class="ref">Galates 3:28</span> Une courte lettre de Paul en montre l'effet concret. Onésime, esclave en fuite devenu chrétien, est renvoyé à son maître Philémon, chrétien lui aussi. Paul lui demande de le recevoir comme un frère. <em>« afin que tu le retrouves pour toujours, non plus comme un esclave, mais bien mieux qu'un esclave, comme un frère bien-aimé. »</em> <span class="ref">Philémon 15-16</span> Le maître reste maître selon le droit, et il a désormais pour frère celui qu'il possède : cette fraternité rend la possession intenable. À ce maître, l'Apôtre rappelle qu'il en a un au-dessus de lui : <em>« Maîtres, accordez à vos serviteurs ce qui est juste et équitable, sachant que vous avez, vous aussi, un Maître dans le ciel. »</em> <span class="ref">Colossiens 4:1</span> Et à l'esclave, il conseille de saisir la liberté dès qu'il le peut : <em>« si tu peux devenir libre, profites-en plutôt. »</em> <span class="ref">1 Corinthiens 7:21</span></p>
      <h2>La semence et son fruit</h2>
      <p>Reste la question qui revient toujours : pourquoi le Christ, ni les apôtres, n'ont-ils pas aboli l'esclavage d'un mot ? Dieu conduit les hommes par degrés et tolère un temps des états imparfaits qu'il redressera ensuite, à mesure que les cœurs peuvent le porter. Le Christ le dit lui-même de la répudiation que Moïse avait permise : <em>« C'est à cause de la dureté de votre cœur que Moïse vous a permis de répudier vos femmes ; mais au commencement il n'en était pas ainsi. »</em> <span class="ref">Matthieu 19:8</span> Il en va de l'esclavage comme du divorce : l'Écriture part de l'homme tel qu'elle le trouve et le mène où il doit aller. Décréter l'abolition dans un monde où l'esclave se comptait par millions eût été un mot sans prise ; semer la fraternité, c'était atteindre la racine. Avec le temps, la semence a porté son fruit : l'Église a tenu l'affranchissement pour une œuvre de charité, racheté les captifs, condamné le rapt et le commerce des hommes, jusqu'à reconnaître que nul ne peut être la propriété d'un autre, parce que tout homme est l'image de Dieu et le frère du Christ. Ce que l'Évangile avait posé en principe, l'histoire l'a déplié jusqu'au bout.</p>

      <p>La Bible rapporte qu'en entrant dans la Terre promise, Israël reçut l'ordre de détruire entièrement certains peuples : les nations de Canaan, puis Amalec. Le terme propre est celui de la Bible elle-même, l'anathème. Ces textes disent un jugement de Dieu sur un mal précis, à un moment unique de l'histoire du salut, que le Christ achève en désarmant la main de l'homme.</p>
      <h2>L'anathème</h2>
      <p>Le mot hébreu rendu par « interdit » ou « anathème », <em>ḥerem</em> (חֵרֶם), désigne le fait de vouer une chose à Dieu en la retranchant absolument de l'usage des hommes ; appliqué à une ville ennemie, il signifie qu'elle lui est livrée tout entière, sans butin gardé ni alliance conclue. La version grecque le traduit par <em>anathema</em> (ἀνάθεμα), ce qui est mis à part. L'anathème porte sur le culte d'un peuple.</p>
      <h2>Ce que commandent les textes</h2>
      <p>La Loi ordonne de vouer à l'anathème les nations de Canaan. <em>« Tu les voueras à l'anathème ; tu ne concluras pas d'alliance avec elles et tu ne leur feras pas grâce. »</em> <span class="ref">Deutéronome 7:2</span> Pour leurs villes, l'ordre ne laisse rien en vie. <em>« Tu ne laisseras la vie à rien de ce qui respire. »</em> <span class="ref">Deutéronome 20:16</span> Josué l'exécute à Jéricho. <em>« Ils vouèrent à l'anathème tout ce qui était dans la ville. »</em> <span class="ref">Josué 6:21</span> Plus tard, le même ordre frappe Amalec. <em>« Va, frappe Amalec, voue à l'anathème tout ce qui est à lui. »</em> <span class="ref">1 Samuel 15:3</span></p>
      <h2>La cible : le culte</h2>
      <p>Le texte donne lui-même la raison de l'ordre : le culte. <em>« afin qu'ils ne vous apprennent pas à imiter les abominations qu'ils font pour leurs dieux. »</em> <span class="ref">Deutéronome 20:18</span> Ces abominations allaient jusqu'au sacrifice des enfants. <em>« Ils brûlent même au feu leurs fils et leurs filles pour leurs dieux. »</em> <span class="ref">Deutéronome 12:31</span> Ces cultes sont si graves que leurs auteurs perdent le droit de demeurer dans le pays : Dieu les en dépossède, et la conquête accomplit cette expulsion. <em>« Le pays est devenu impur, et il a vomi ses habitants. »</em> <span class="ref">Lévitique 18:25</span> Tout Cananéen qui se détournait des idoles avait d'ailleurs la vie sauve et entrait dans Israël : Rahab fut sauvée avec sa famille. <em>« Josué laissa la vie à Rahab, et elle a habité au milieu d'Israël jusqu'à ce jour. »</em> <span class="ref">Josué 6:25</span> Ruth la Moabite devient l'aïeule de David, et les Gabaonites, peuple de Canaan, sont épargnés pour avoir cherché refuge auprès du Dieu d'Israël. Le sort dépendait du culte, et la porte restait ouverte à qui s'en détournait.</p>
      <h2>La part de la rhétorique</h2>
      <p>Le langage de ces récits est celui des guerres de l'Orient ancien, où l'on disait la victoire totale en termes d'extermination totale. La Bible parle cette langue, et le montre par ses propres suites : aussitôt après l'ordre de tout détruire, la Loi interdit d'épouser ces peuples, ce qui suppose qu'il en demeure. <em>« Tu ne contracteras pas de mariage avec elles. »</em> <span class="ref">Deutéronome 7:3</span> Le livre des Juges s'ouvre d'ailleurs sur les Cananéens toujours présents dans le pays. « Ne laisser rien de ce qui respire » relève ainsi en partie de la formule d'une victoire complète. Des vies furent ôtées, à Jéricho et ailleurs ; le texte proclame pourtant une victoire plus qu'il ne dresse un compte de morts.</p>
      <h2>Le jugement d'un mal mûri</h2>
      <p>Là où la vie est ôtée, l'Écriture y voit un jugement de Dieu sur un mal longuement mûri. Dès Abraham, Dieu annonce que ses descendants ne prendront possession de cette terre qu'après quatre générations : il diffère le jugement et laisse passer les siècles. <em>« À la quatrième génération, ils reviendront ici, car l'iniquité de l'Amorite n'est pas encore à son comble. »</em> <span class="ref">Genèse 15:16</span> Ce long délai ménage un temps pour le repentir, et c'est ainsi que Dieu juge. <em>« Mais, jugeant peu à peu, tu laissais place au repentir. »</em> <span class="ref">Sagesse 12:10</span> Maître de la vie qu'il donne, il peut la reprendre, et il exécute ici sa sentence par la main d'Israël. La même mesure retombe sur Israël lui-même : lorsqu'il imite ces cultes et brûle ses fils dans le feu, <em>« Ils firent passer leurs fils et leurs filles par le feu »</em> <span class="ref">2 Rois 17:17</span>, il est à son tour arraché de sa terre et déporté. <em>« Le Seigneur déporta Israël loin de son pays, en Assyrie. »</em> <span class="ref">2 Rois 17:23</span> Le jugement suit le péché, et il atteint le peuple élu comme les nations de Canaan.</p>
      <h2>Un commandement unique</h2>
      <p>L'anathème ne fut pas une règle générale de la guerre. La Loi distingue les villes lointaines des villes de Canaan : aux premières, Israël doit d'abord offrir la paix. <em>« Quand tu approcheras d'une ville pour la combattre, tu lui proposeras la paix. »</em> <span class="ref">Deutéronome 20:10</span> Seules les villes de Canaan sont vouées à l'interdit. Il était lié au don de la terre et à la garde d'Israël contre l'idolâtrie, commandé une fois, par Dieu seul, à un moment précis, et jamais remis à l'homme comme un droit. Nul ne pouvait le décréter de lui-même, et nul ne peut l'invoquer pour justifier une violence : c'est un acte du juge de toute la terre.</p>
      <h2>La pédagogie divine, et son terme dans le Christ</h2>
      <p>Comme pour le divorce et l'esclavage, Dieu prend les hommes là où ils sont, dans un monde dur, et les conduit par degrés vers la pleine lumière. Son cœur, déjà sous l'ancienne Alliance, ne se réjouit pas de la mort. <em>« Je ne prends pas plaisir à la mort du méchant, mais à ce qu'il se convertisse et qu'il vive. »</em> <span class="ref">Ézéchiel 33:11</span> Ce mouvement s'achève dans le Christ, qui ôte l'épée de la main des siens. <em>« Remets ton épée à sa place, car tous ceux qui prennent l'épée périront par l'épée. »</em> <span class="ref">Matthieu 26:52</span> Il commande désormais d'aimer jusqu'à l'ennemi. <em>« Aimez vos ennemis, priez pour ceux qui vous persécutent. »</em> <span class="ref">Matthieu 5:44</span> L'anathème trouve son terme dans le Christ. Là où un peuple coupable était livré à la destruction, l'Innocent se livre lui-même : pendu au bois, il prend sur lui la malédiction pour racheter tous les peuples. <em>« Le Christ nous a rachetés de la malédiction en devenant lui-même malédiction pour nous, car il est écrit : Maudit soit quiconque est pendu au bois. »</em> <span class="ref">Galates 3:13</span></p>

      <p>Une même figure traverse l'Ancien Testament, appelée « l'ange du Seigneur ». Le mot dit un envoyé, distinct du Dieu qui l'envoie ; et pourtant le texte lui donne le Nom de Dieu, ses paroles, ses actes et l'adoration qui ne reviennent qu'à Dieu seul. Dans le Dieu unique, cette figure laisse déjà voir une distinction, et la tradition la plus ancienne a reconnu dans cet Ange le Fils lui-même, le Verbe, avant qu'il prenne chair.</p>
      <h2>Un envoyé qui porte le Nom</h2>
      <p>Le mot rendu par « ange », hébreu <em>malak</em> (מַלְאָךְ) et grec <em>angelos</em> (ἄγγελος), désigne le messager : il nomme une fonction, l'envoi, non une nature, et l'Écriture l'applique même à un homme, en <span class="ref">Marc 1:2</span> et <span class="ref">Malachie 3:1</span>, Jean le Baptiste est appelé « ange » en grec et en hébreu. Ainsi « l'ange du Seigneur » est envoyé par le Seigneur, distinct de lui ; et pourtant cet envoyé agit comme Dieu en personne, en parlant à la première personne : il pardonne ou retient le pardon, il sauve, et il reçoit l'adoration due à Dieu seul. Surtout, il porte en lui le Nom même de Dieu, ces quatre lettres, YHWH (יהוה), qu'Israël n'osait prononcer : en lisant, il disait à leur place le mot hébreu rendu par « Seigneur », <em>Adonaï</em> (אֲדֹנָי). Annonçant cet Ange qui doit conduire son peuple à travers le désert, le Seigneur l'envoie comme un autre et avoue en même temps qu'il est plus qu'un autre. <em>« Écoute sa voix et ne lui résiste pas, car il ne pardonnera pas vos transgressions, car mon nom est en lui. »</em> <span class="ref">Exode 23:20-23</span> Porter le Nom de Dieu, c'est porter ce que Dieu est. Distinct du Seigneur qui l'envoie, il porte pourtant le Nom du Seigneur.</p>
      <h2>Agar au désert</h2>
      <p>La première fois, c'est « l'ange du Seigneur » qui trouve Agar en fuite au désert. Il lui annonce, en son propre nom, un fils et une descendance si nombreuse qu'on ne pourra la compter, ce que Dieu seul peut promettre et accomplir <span class="ref">Genèse 16:7-12</span>. Et elle nomme celui qu'elle a rencontré : <em>« Agar invoqua le nom du Seigneur qui lui avait parlé : “Tu es Dieu qui me voit.” »</em> <span class="ref">Genèse 16:13-14</span> Le récit donne à la même personne deux noms : « l'ange du Seigneur » et « Dieu ».</p>
      <h2>L'échelle de Jacob</h2>
      <p>En fuite vers Laban, Jacob s'endort à Louz et voit en songe une échelle dressée de la terre au ciel, où les anges de Dieu montent et descendent. Une voix lui renouvelle alors la promesse des pères. <em>« Le Seigneur se tenait au-dessus d'elle et dit : Je suis le Seigneur, le Dieu d'Abraham ton père, le Dieu d'Isaac. »</em> <span class="ref">Genèse 28:12-15</span> À son réveil, Jacob nomme le lieu Béthel, « maison de Dieu », porte du ciel, et dresse en stèle la pierre qu'il avait sous la tête, qu'il oint d'huile. Des années plus tard, au pays de Laban, c'est « l'ange de Dieu » qui lui parle en songe, et il se nomme du nom même du Dieu de cette vision. <em>« Je suis le Dieu de Béthel, où tu as oint une stèle et où tu m'as fait un vœu. »</em> <span class="ref">Genèse 31:11-13</span> L'envoyé qui parle à Jacob et le Seigneur qu'il avait vu au sommet de l'échelle sont un seul.</p>
      <h2>Jacob à Penuel</h2>
      <p>La nuit qui précède ses retrouvailles avec son frère, Jacob lutte jusqu'à l'aube avec un inconnu d'apparence humaine. Au matin, il nomme le lieu Penuel, « face de Dieu », pour avoir tenu Dieu devant lui. <em>« J'ai vu Dieu face à face, et j'ai eu la vie sauve. »</em> <span class="ref">Genèse 32:25-31</span> Bien plus tard, Osée relit ce combat : <em>« Il lutta avec l'ange et l'emporta… Le Seigneur est le Dieu des armées, le Seigneur est son nom. »</em> <span class="ref">Osée 12:4-6</span> Le prophète nomme l'adversaire de Jacob l'ange, et le Seigneur : un seul.</p>
      <h2>Le sacrifice d'Isaac</h2>
      <p>Quand Abraham lève le couteau sur son fils, c'est « l'ange du Seigneur » qui l'appelle du ciel et arrête sa main : un envoyé, distinct de celui au nom de qui il parle. Mais ses paroles sont celles de Dieu en personne : c'est à lui-même qu'Abraham n'a pas refusé son fils. <em>« Tu ne m'as pas refusé ton fils, ton unique. »</em> <span class="ref">Genèse 22:11-12</span> Puis il jure par lui-même de bénir Abraham : or jurer par soi-même n'appartient qu'à Dieu <span class="ref">Genèse 22:15-18</span>. <em>« Lorsque Dieu fit la promesse à Abraham, ne pouvant jurer par un plus grand, il jura par lui-même : Certainement je te bénirai et je multiplierai ta descendance. »</em> <span class="ref">Hébreux 6:13-14</span> L'envoyé parle, et c'est Dieu qui s'engage.</p>
      <h2>Le buisson ardent</h2>
      <p>À l'Horeb, le récit est précis : c'est « l'ange du Seigneur » qui se montre à Moïse dans le buisson qui brûle sans se consumer, et aussitôt c'est Dieu qui l'appelle du milieu du feu, lui ordonne d'ôter ses sandales car la terre est sainte, et se nomme le Dieu d'Abraham, d'Isaac et de Jacob <span class="ref">Exode 3:1-6</span>. Moïse se voile la face, n'osant regarder Dieu. Et quand il demande son Nom, la réponse dévoile l'être même de Dieu. <em>« Je suis celui qui suis. »</em> <span class="ref">Exode 3:13-15</span> Celui que le texte a d'abord appelé l'ange est celui-là même qui se nomme « Je suis » : l'envoyé et Dieu ne font qu'un, et pourtant le texte les distingue. Devant le Sanhédrin, Étienne reprend la scène du buisson : un ange paraît à Moïse, et c'est la voix du Seigneur qui se fait entendre, celle du Dieu d'Abraham, d'Isaac et de Jacob <span class="ref">Actes 7:30-32</span>.</p>
      <h2>Le chef de l'armée du Seigneur</h2>
      <p>Aux portes de Jéricho, un homme paraît, l'épée nue à la main. À Josué qui demande de quel côté il se range, il répond qu'il est le chef de l'armée du Seigneur : il appartient au Seigneur, il est à son service, distinct de lui. Et pourtant il exige aussitôt de Josué le geste que Dieu avait demandé à Moïse devant le buisson, et Josué tombe la face contre terre et se prosterne. <em>« Ôte tes sandales de tes pieds, car le lieu sur lequel tu te tiens est saint. »</em> <span class="ref">Josué 5:13-15</span> Cette épée nue à la main est sa marque : c'est lui qui barre la route à Balaam <span class="ref">Nombres 22:22-35</span> et qui se dresse au-dessus de Jérusalem au temps de David <span class="ref">1 Chroniques 21:15-17</span>. Chef des armées du Seigneur, il reçoit la prosternation due au Seigneur.</p>
      <h2>Gédéon et les parents de Samson</h2>
      <p>Gédéon reçoit la visite de « l'ange du Seigneur », que le récit, au fil de la conversation, nomme « le Seigneur » ; quand il comprend qui il a vu, il croit mourir d'avoir vu Dieu face à face, et il bâtit un autel au Seigneur <span class="ref">Juges 6:11-24</span>. Les parents de Samson, eux, demandent son nom à « l'ange du Seigneur », qui répond que son nom est mystérieux, trop haut pour être dit <span class="ref">Juges 13:15-18</span> ; puis ils le voient monter au ciel dans la flamme de leur offrande, et Manoah comprend qui ils ont vu. <em>« Nous allons mourir, car nous avons vu Dieu. »</em> <span class="ref">Juges 13:20-23</span> Ils ont rencontré celui que le texte nomme l'envoyé du Seigneur, et ils sont certains d'avoir vu Dieu.</p>
      <h2>Une adoration que nul ange ne reçoit</h2>
      <p>Un ange refuse qu'on l'adore. Dans l'Apocalypse, quand Jean se prosterne devant l'ange qui lui parle, l'ange l'arrête net et lui renvoie l'adoration vers Dieu. <em>« Garde-toi de le faire ! Adore Dieu. »</em> <span class="ref">Apocalypse 22:8-9</span> L'Ange du Seigneur, lui, l'accepte. Josué se prosterne devant lui, Gédéon et Manoah lui présentent un sacrifice qu'il reçoit en le consumant par le feu. Il fait plus encore : il remet les péchés. Devant le prophète Zacharie, le grand prêtre Josué se tient en habits souillés qui figurent sa faute, et c'est l'Ange lui-même qui la lui ôte. <em>« Je t'enlève ton iniquité, et je te revêts d'habits de fête. »</em> <span class="ref">Zacharie 3:1-5</span> Or pardonner les péchés n'appartient qu'à Dieu, et le Christ le rappellera. <em>« Qui peut pardonner les péchés, sinon Dieu seul ? »</em> <span class="ref">Marc 2:5-7</span></p>
      <h2>L'ange de l'alliance</h2>
      <p>Le prophète Malachie annonce l'une après l'autre deux venues. D'abord celle d'un messager qui prépare le chemin, que le Nouveau Testament reconnaîtra en Jean-Baptiste ; puis celle d'un autre, à la fois envoyé et Seigneur. <em>« Voici, j'envoie mon messager, et il préparera le chemin devant moi ; et soudain entrera dans son temple le Seigneur que vous cherchez ; et l'ange de l'alliance que vous désirez, le voici qui vient, dit le Seigneur des armées. »</em> <span class="ref">Malachie 3:1</span> Le dernier des prophètes nomme le Messie « l'ange de l'alliance » et « le Seigneur ».</p>
      <h2>À la fois Dieu et distinct de Dieu</h2>
      <p>« l'ange du Seigneur » est envoyé par le Seigneur, et porte le Nom de Dieu, parle comme Dieu, reçoit l'adoration de Dieu, pardonne comme Dieu, et il est annoncé comme le Messie qui doit venir. Il n'est donc pas une créature, car aucune créature ne porte le Nom de Dieu ni ne reçoit l'adoration. Et il n'est pas non plus, purement et simplement, celui qui l'envoie, puisque le texte le distingue de lui. Il est Dieu, et il est distinct de Dieu. Isaïe le dira d'un mot, en l'appelant <em>« l'ange de sa face »</em> <span class="ref">Isaïe 63:8-9</span> : le visage même de Dieu tourné vers les hommes, et pourtant nommé son ange. Cette double vérité ne se résout que d'une seule façon : en Dieu, qui est un, il y a une distinction. L'Ancien Testament montre déjà cette distinction avant d'en dire le nom : celui qui envoie et celui qui est envoyé. Le Père et le Fils sont là, en germe.</p>
      <h2>Le visage du Fils avant l'Incarnation</h2>
      <p>La tradition la plus ancienne a donné un nom à cet envoyé qui est Dieu : le Fils, le Verbe, avant qu'il prenne chair. Le Nouveau Testament le confirme. C'est l'Ange du Seigneur qui, dans l'Ancien Testament, dit avoir fait monter Israël hors d'Égypte <span class="ref">Juges 2:1-5</span> ; et le Nouveau Testament dit que celui qui a sauvé ce peuple hors d'Égypte, c'est Jésus <span class="ref">Jude 5</span>. Celui que l'Ancien Testament appelait l'Ange, le Nouveau l'appelle le Fils.</p>

      <h2>Un dessein formé avant le monde</h2>
      <p>Paul a résumé tout le dessein de Dieu en deux versets, au cœur d'une page écrite pour soutenir des croyants dans l'épreuve. <em>« Ceux qu'il a connus d'avance, il les a aussi prédestinés à être conformes à l'image de son Fils, afin qu'il soit le premier-né d'une multitude de frères ; ceux qu'il a prédestinés, il les a aussi appelés ; ceux qu'il a appelés, il les a aussi justifiés ; et ceux qu'il a justifiés, il les a aussi glorifiés. »</em> <span class="ref">Romains 8:29-30</span></p>
      <p>Le premier mot porte le reste. Dans la Bible, connaître quelqu'un, c'est s'attacher à lui : le mot hébreu rendu par « connaître », <em>yada</em> (יָדַע), unit le savoir, le choix et l'amour. « Connaître d'avance » les siens veut donc dire les élire de toute éternité.</p>
      <p>Dieu prédestine les siens à la ressemblance de son Fils : devenir fils dans le Fils, une fratrie dont le Christ est l'aîné. Ceux qui répondent à son appel, il les justifie par la croix ; et ces justes, il les glorifie en leur donnant part à la gloire du Christ ressuscité : un corps glorieux à l'image du sien, car <em>« nous le verrons tel qu'il est »</em> <span class="ref">1 Jean 3:2</span>. Le verbe grec rendu par « glorifier », <em>edoxasen</em> (ἐδόξασεν), est au passé comme les autres, alors que cette gloire reste à venir : Paul parle de l'avenir comme d'une chose déjà faite, tant le dessein de Dieu est assuré.</p>
      <h2>Une élection gratuite</h2>
      <p>Cette élection est gratuite. Dieu aime et appelle le premier, et tout le reste, l'appel, la justification, la persévérance, découle de cette libéralité. <em>« Il nous a sauvés et appelés par un saint appel, non à cause de nos œuvres, mais en vertu de son propre dessein et de sa grâce. »</em> <span class="ref">2 Timothée 1:9</span> Paul l'éclaire par l'image du potier : le salut ne se réclame pas comme un dû, il se reçoit comme un don. <em>« Le potier n'est-il pas maître de son argile ? »</em> <span class="ref">Romains 9:21</span></p>
      <h2>Dieu veut le salut de tous</h2>
      <p>L'élection des uns ne fait pas de Dieu l'auteur de la perte des autres : il offre à chacun la grâce du salut. <em>« Dieu veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. »</em> <span class="ref">1 Timothée 2:4</span> Sa volonté va jusqu'au pécheur lui-même. <em>« Je ne prends pas plaisir à la mort du méchant, mais à ce qu'il se détourne de sa voie et qu'il vive. »</em> <span class="ref">Ézéchiel 33:11</span></p>
      <h2>La liberté que la grâce éveille</h2>
      <p>La prédestination s'accomplit à travers la liberté de l'homme. La grâce meut le cœur sans le forcer, et l'homme y répond par un acte vraiment sien. C'est l'homme qui veut et qui agit ; et c'est Dieu qui fait qu'il le veuille et l'accomplisse. Le même acte est tout entier de l'homme, qui en est l'auteur, et tout entier de Dieu, qui en est la source. <em>« Travaillez à votre salut avec crainte et tremblement, car c'est Dieu qui produit en vous le vouloir et le faire, selon son dessein bienveillant. »</em> <span class="ref">Philippiens 2:12-13</span></p>
      <h2>Nul n'est destiné à se perdre</h2>
      <p>Personne n'est prédestiné au mal ni voué d'avance à la damnation. Dieu ne pousse personne à pécher : celui qui se perd se perd par son propre refus, en se détournant de Dieu et en s'y obstinant jusqu'au bout. La damnation est l'œuvre de l'homme qui rejette l'amour offert, non un décret porté contre lui. <em>« Que nul, dans l'épreuve, ne dise : C'est Dieu qui me tente ; car Dieu ne tente personne. »</em> <span class="ref">Jacques 1:13</span></p>
      <h2>L'espérance du salut</h2>
      <p>Nul ne sait avec certitude, en cette vie, s'il compte parmi les élus ; cette assurance ne nous est pas donnée, et s'en croire sûr serait présomption. Ce que Dieu donne, c'est une ferme espérance, appuyée sur sa fidélité. À l'homme d'y répondre par sa vie. <em>« Efforcez-vous d'affermir votre vocation et votre élection. »</em> <span class="ref">2 Pierre 1:10</span> Et la persévérance finale est elle-même une grâce. <em>« Il vous affermira jusqu'à la fin, pour que vous soyez irréprochables au jour de notre Seigneur Jésus-Christ. »</em> <span class="ref">1 Corinthiens 1:8</span></p>
      <h2>Choisis dans le Christ</h2>
      <p>Toute la prédestination tient dans le Christ. C'est en lui que Dieu nous choisit, en lui que nous sommes appelés, justifiés et conduits à la gloire ; il est le premier des prédestinés, et nul n'est élu qu'uni à lui. Se savoir aimé de Dieu de toute éternité appelle à la confiance et à l'action de grâce : l'initiative vient de lui. <em>« Ce n'est pas vous qui m'avez choisi, mais moi qui vous ai choisis. »</em> <span class="ref">Jean 15:16</span></p>

    id: "le-canon-et-les-deuterocanoniques",
    titre: "Le canon et les deutérocanoniques",
    theme: "ecriture",
    resume: "Le canon est la liste des livres inspirés. La Bible catholique en compte sept de plus que la protestante, les deutérocanoniques, gardés depuis la Septante et retranchés par la Réforme ; les canons orthodoxes vont plus loin encore. Cette liste, que l'Écriture seule ne peut donner, l'Église l'a reçue dès les apôtres et scellée : c'est elle qui fonde le canon catholique.",
    date: "2026",
    contenu: `
      <p>Le canon est la liste des livres que l'Église reconnaît comme Écriture inspirée de Dieu. L'Ancien Testament catholique compte quarante-six livres : sept de plus que la Bible protestante, qui en retient trente-neuf, et quelques-uns de moins que les Bibles des Églises d'Orient, plus larges encore. Ces sept livres propres au canon catholique sont les deutérocanoniques. Savoir qui les a reconnus, et quand, touche la racine de la foi en l'Écriture elle-même.</p>
      <h2>Le canon et les deutérocanoniques</h2>
      <p>Le mot « canon » vient du grec <em>kanōn</em> (κανών), la règle, le roseau qui sert à mesurer ; il désigne la liste réglée des livres tenus pour inspirés. Les sept livres propres à la Bible catholique sont Tobie, Judith, la Sagesse, le Siracide (ou Ecclésiastique), Baruch, et les deux livres des Maccabées. S'y ajoutent des passages deutérocanoniques au livre de Daniel et au livre d'Esther. On les dit deutérocanoniques, du grec <em>deuteros</em> (δεύτερος), « second » : non qu'ils soient de second rang, mais parce que leur entrée au canon fut discutée à certaines époques, là où les autres, dits protocanoniques, ne le furent jamais. Ils sont pleinement inspirés. Un piège de vocabulaire se glisse ici : ce que les catholiques appellent deutérocanonique, les protestants l'appellent « apocryphe » ; et ce que les catholiques appellent apocryphe, du grec <em>apokryphos</em> (ἀπόκρυφος), « caché », les écrits non inspirés tels les faux évangiles, les protestants le nomment « pseudépigraphe ».</p>
      <h2>La Septante, Bible de l'Église</h2>
      <p>Au temps du Christ, les Écritures juives circulaient sous deux formes : les textes hébreux, et leur traduction grecque, la Septante, commencée à Alexandrie trois siècles avant lui. La Septante portait les livres deutérocanoniques. L'Église des apôtres, qui parlait grec, reçut la Septante comme son Ancien Testament, et le Nouveau Testament la cite à chaque page. Les livres deutérocanoniques eux-mêmes y laissent leur empreinte : l'épître aux Hébreux salue des martyrs qui sont ceux du second livre des Maccabées, <em>« D'autres furent torturés, refusant la délivrance, afin d'obtenir une meilleure résurrection. »</em> <span class="ref">Hébreux 11:35</span> et la fête de la Dédicace, que le Christ célèbre à Jérusalem, vient de l'histoire que ces mêmes livres racontent, <em>« On célébrait alors à Jérusalem la fête de la Dédicace. »</em> <span class="ref">Jean 10:22</span> Les Pères s'en servirent, et les conciles des premiers siècles dressèrent la liste complète, les sept compris. Pendant plus de mille ans, la Bible de l'Église porta ces livres ; elle les lit encore, le Siracide jusque dans les fêtes de la Vierge.</p>
      <p>On objecte encore que le Nouveau Testament ne cite jamais ces livres comme Écriture, par la formule « il est écrit ». Le critère prouve trop : plusieurs livres que les protestants reçoivent ne sont eux non plus jamais cités de la sorte, ni même mentionnés, ainsi Esther, l'Ecclésiaste, le Cantique des cantiques, Esdras et Néhémie. L'absence de citation ne décide donc pas du canon.</p>
      <h2>Qui a retranché, et quand</h2>
      <p>Vers la fin du premier siècle, le judaïsme arrêta sa propre liste sur les seuls livres conservés en hébreu, laissant de côté les sept. Au quatrième siècle, traduisant la Bible sur l'hébreu, Jérôme nota cette différence et marqua une réserve ; mais l'Église garda les livres, suivant Augustin et les conciles, et Jérôme les traduisit lui-même. Ils demeurèrent dans la Bible chrétienne jusqu'à la Réforme. Au seizième siècle, les réformateurs retranchèrent les sept de l'Ancien Testament et les rangèrent à part, sous le nom d'« apocryphes » : Luther les jugea utiles à lire, non égaux à l'Écriture. Les enjeux de doctrine n'y étaient pas étrangers, car certains de ces livres soutiennent des vérités qu'ils rejetaient, comme la prière pour les défunts : <em>« Il fit offrir ce sacrifice pour les morts, afin qu'ils fussent délivrés de leur péché. »</em> <span class="ref">2 Maccabées 12:46</span> En réponse, le concile de Trente, en 1546, définit solennellement le canon des quarante-six livres de l'Ancien Testament et des vingt-sept du Nouveau. Plus tard, jugeant ces livres non inspirés et leur impression coûteuse, les sociétés bibliques protestantes du dix-neuvième siècle cessèrent de les imprimer, pour ne diffuser que les écrits tenus pour Écriture ; il n'en resta que trente-neuf livres.</p>
      <h2>Le ou les canons orthodoxes</h2>
      <p>Le mot « orthodoxe » ne recouvre pas une seule Église, mais plusieurs familles séparées de Rome à des dates différentes, et leurs canons ne se recouvrent pas. Les plus nombreuses sont les Églises orthodoxes de tradition byzantine, grecque et slave, en communion entre elles : l'Église grecque, l'Église russe, et les autres. Toutes ont gardé la Septante, et leur canon est plus large que le canon catholique. Outre les sept livres, elles reçoivent le premier livre d'Esdras (une forme grecque d'Esdras, distincte du livre que reçoit Rome), la Prière de Manassé, le Psaume 151 et le troisième livre des Maccabées ; le quatrième livre des Maccabées figure souvent en appendice. Elles nomment ces livres lus les <em>anagignoskomena</em> (ἀναγινωσκόμενα), « ceux que l'on lit ». La tradition grecque et la tradition slave varient un peu, cette dernière portant en outre un Esdras de plus, de caractère apocalyptique. Cet Orient-là n'a jamais fixé sa liste avec la rigueur close du concile de Trente : ses synodes ont reçu ces livres sans en arrêter le compte de façon aussi tranchée.</p>
      <p>À côté d'elles, d'autres Églises, dites orthodoxes orientales, s'étaient séparées plus tôt encore et forment une communion à part : les coptes d'Égypte, les Arméniens, les Syriaques, et l'Église éthiopienne. Cette dernière possède le plus vaste canon de toute la chrétienté, jusqu'à recevoir le livre d'Hénoch et le livre des Jubilés, que ni Rome ni les orthodoxes byzantins ne tiennent pour inspirés. L'Église catholique ne reçoit aucun de ces livres surnuméraires : dans la Bible latine, le troisième et le quatrième livre d'Esdras et la Prière de Manassé furent relégués en appendice, conservés sans être tenus pour Écriture. Les listes s'emboîtent ainsi : les trente-neuf livres protestants tiennent dans les quarante-six catholiques, qui tiennent dans le canon des orthodoxes byzantins, lui-même contenu dans le canon éthiopien.</p>
      <h2>Pourquoi le canon catholique</h2>
      <p>Reste à comprendre pourquoi ce canon, et non un autre, ni plus court ni plus long. Aucune page de la Bible ne donne la liste des livres de la Bible : cette liste, l'Église l'a discernée et reçue sous la conduite de l'Esprit. Un livre est Écriture parce qu'elle l'a tenu pour inspiré et lu comme tel, sans interruption, depuis les apôtres. Les sept livres répondent à cette mesure : lus dès l'âge apostolique dans la Septante que parlait l'Église naissante, ils furent inscrits par les conciles de Rome, d'Hippone et de Carthage dans une liste déjà identique, trait pour trait, à celle de la Bible catholique.</p>
      <p>Ce principe éclaire les deux autres comptes. La liste plus courte vient d'un retrait : la Réforme protestante a mis à part ce que l'Église avait toujours lu, pour suivre le canon plus bref que le judaïsme rabbinique avait gardé pour lui-même. Les canons plus larges de l'Orient viennent du mouvement contraire : l'Orient a tout gardé sans jamais arrêter sa liste, ses traditions grecque et slave ne comptant pas les mêmes livres, faute d'une autorité capable de clore le canon pour toute l'Église. Car un canon ne se ferme que là où une telle autorité existe. L'Église catholique la tient de Pierre, et au concile de Trente elle a fixé la liste une fois pour toutes : la liste que la Tradition avait constamment reçue, scellée par celui qui en avait le pouvoir.</p>

      <p>On ne traquait pas, d'ordinaire, les chrétiens ; mais une dénonciation suffisait à les faire arrêter. Devant le magistrat, l'épreuve était simple : offrir quelques grains d'encens devant l'image de l'empereur et maudire le Christ. Qui acceptait était relâché ; qui refusait était torturé, puis livré aux bêtes, au feu ou au glaive. L'empereur Trajan avait fixé la règle un siècle après le Christ : ne pas rechercher les chrétiens, mais punir ceux qui, dénoncés, persistaient, et ne tenir aucun compte des accusations anonymes. Plus tard, sous les grandes persécutions, on exigea de chacun un certificat prouvant qu'il avait sacrifié. Tout se jouait en un instant, dans le choix de confesser ou de renier.</p>

      <p>Puis vinrent les persécutions générales, ordonnées pour tout l'Empire. En 250, l'empereur Dèce voulut le premier contraindre tous ses sujets à sacrifier aux dieux pour le salut de Rome. Chacun devait offrir l'encens devant une commission, puis recevoir un certificat attestant qu'il l'avait fait ; qui ne pouvait le produire était tenu pour chrétien, passible de la prison, de la torture et de la mort. On ne se contentait plus d'attendre les dénonciations : la foi était traquée dans tout l'Empire, par une procédure réglée. Après des décennies de paix, beaucoup de chrétiens fléchirent, sacrifièrent ou achetèrent un faux certificat. La persécution fut brève, car Dèce mourut au combat dès 251, mais elle laissa l'Église couverte de martyrs et divisée sur le sort de ceux qui avaient cédé.</p>

      <h2>Le sens du martyre</h2>
      <p>Le mot « martyr » vient du grec <em>martys</em> (μάρτυς), le témoin. Le martyr rend au Christ le témoignage le plus entier : il aime mieux perdre la vie que le renier, et donne ainsi de l'amour de Dieu une preuve que rien ne surpasse. Sa mort le configure à celle du Christ, dont il partage la croix pour partager la victoire. L'Église l'a toujours tenue pour un baptême dans le sang : celui qui meurt pour le Christ sans avoir reçu le baptême d'eau est lavé de tout péché et entre aussitôt au ciel. Les actes des martyrs, ces récits de leur procès et de leur mort, les montrent souvent paisibles, parfois joyeux devant le supplice, car cette force ne vient pas d'eux, mais de la grâce. <em>« Sois fidèle jusqu'à la mort, et je te donnerai la couronne de vie. »</em> <span class="ref">Apocalypse 2:10</span></p>
      <h2>Le culte des martyrs</h2>
      <p>Dès les origines, l'Église entoura ses martyrs d'un honneur particulier. On recueillait leurs restes comme un trésor, on notait le jour de leur mort, qu'on appelait leur naissance au ciel, et l'on se rassemblait chaque année sur leur tombe pour y célébrer l'eucharistie. De là viennent les catacombes, ces galeries souterraines où reposaient les défunts, et l'usage, demeuré jusqu'à nous, de sceller des reliques de saints dans la pierre de l'autel. Le martyr étant uni au sacrifice du Christ, on offrait le sacrifice sur son corps. <em>« Je vis sous l'autel les âmes de ceux qui avaient été immolés à cause de la parole de Dieu et du témoignage qu'ils avaient rendu. »</em> <span class="ref">Apocalypse 6:9</span></p>
      <h2>La question des lapsi</h2>
      <p>Toutes les persécutions n'ont pas fait que des martyrs. Beaucoup, par peur, sacrifièrent aux dieux ou achetèrent un faux certificat : on les appela les <em>lapsi</em>, les tombés. La paix revenue, beaucoup demandaient à rentrer dans l'Église, et l'on se divisa sur leur sort. Des rigoristes voulaient les exclure pour toujours. L'Église choisit la miséricorde : après un temps de pénitence, le pécheur repenti était réconcilié, car aucune faute ne dépasse le pardon de Dieu pour qui se convertit. Cette crise affermit la pratique de la pénitence et l'idée que l'Église, sainte, porte pourtant en son sein des pécheurs appelés à se relever.</p>
      <h2>La paix de l'Église</h2>
      <p>Au début du quatrième siècle, l'Empire renonça au combat. En 311, l'empereur Galère, mourant, accorda aux chrétiens la liberté de leur culte ; en 313, après sa victoire, Constantin la confirma et l'étendit par l'édit de Milan, qui rendit au christianisme une pleine liberté. L'âge des martyrs prenait fin. Mais le sang versé n'avait pas éteint la foi : il l'avait répandue. La foule venue voir mourir des condamnés attendait des cris et des reniements ; elle voyait des hommes et des femmes affronter le supplice avec paix, parfois en pardonnant à leurs bourreaux, et tenir jusqu'au bout pour un crucifié. Une telle constance passait les forces de l'homme. Beaucoup repartaient ébranlés par ce qu'ils avaient vu ; ils s'interrogeaient, cherchaient à connaître cette foi, s'approchaient des chrétiens pour s'en instruire, et nombre d'entre eux finissaient par demander le baptême. Selon le mot de Tertullien, le sang des martyrs est une semence de chrétiens. <em>« Si le grain de blé tombé en terre ne meurt, il reste seul ; mais s'il meurt, il porte beaucoup de fruit. »</em> <span class="ref">Jean 12:24</span> L'Église sortit de ces trois siècles affermie, et elle n'oublia jamais ceux qui l'avaient scellée de leur sang.</p>

      <p>La matière de la confirmation est le saint chrême, une huile parfumée consacrée par l'évêque, dont on trace l'onction sur le front du confirmé ; la forme est la parole dite en même temps : « Sois marqué de l'Esprit Saint, le don de Dieu. » Le chrême, le Christ et le chrétien dérivent tous du verbe grec <em>chriō</em> (χρίω), « oindre » : marqué de cette huile, le confirmé est configuré au Christ, l'Oint par excellence, et porte plus pleinement le nom de chrétien. L'évêque, successeur des apôtres, en est le ministre ordinaire, signe du lien qui unit le confirmé à toute l'Église ; un prêtre peut aussi le conférer, lorsqu'il baptise un adulte, ou auprès d'un fidèle en danger de mort, pour que nul ne quitte ce monde privé du sacrement. Comme le baptême, ce sacrement imprime dans l'âme un sceau spirituel et définitif : il se reçoit une seule fois. <em>« Dieu nous a marqués de son sceau. »</em> <span class="ref">2 Corinthiens 1:22</span></p>
      <h2>Les effets du sacrement</h2>
      <p>La confirmation produit dans l'âme des effets durables. Elle enracine plus avant dans la filiation divine reçue au baptême : par l'Esprit qu'elle donne en plénitude, le confirmé crie vers Dieu comme vers son Père. <em>« Vous avez reçu un Esprit d'adoption filiale, par lequel nous crions : Abba, Père ! »</em> <span class="ref">Romains 8:15</span> Par son sceau, elle le configure au Christ et l'unit plus fermement à l'Église. Tous ces effets convergent vers le plus propre à la confirmation, la force de témoigner.</p>
      <h2>La force de témoigner</h2>
      <p>La confirmation produit dans le baptisé ce que la Pentecôte produisit dans les apôtres. Déjà disciples du Christ, ils reçurent ce jour-là la force de sortir et de proclamer l'Évangile devant tous, sans crainte. De même, le confirmé est revêtu de la force de l'Esprit pour confesser sa foi, l'annoncer et la défendre, et devenir un témoin du Christ devant le monde. Le Christ l'avait promis à ses apôtres avant de monter au ciel. <em>« Vous recevrez une force, celle de l'Esprit Saint qui descendra sur vous, et vous serez mes témoins. »</em> <span class="ref">Actes 1:8</span></p>

      <h2>La mission des apôtres continuée</h2>
      <p>Le Christ a choisi les apôtres et leur a donné part à sa propre mission. <em>« Comme le Père m'a envoyé, moi aussi je vous envoie. »</em> <span class="ref">Jean 20:21</span> Cette mission ne devait pas mourir avec eux. Avant de quitter ce monde, les apôtres établirent d'autres hommes pour la continuer, leur transmettant la charge reçue du Christ : enseigner la foi, sanctifier par les sacrements, conduire le peuple de Dieu. Le sacrement de l'ordre est le moyen par lequel cette mission passe, d'âge en âge, jusqu'à la fin des temps.</p>
      <h2>La succession apostolique</h2>
      <p>Les apôtres ont transmis leur charge par l'imposition des mains, et ceux qui la reçurent la transmirent à leur tour, en une chaîne ininterrompue qui rejoint les évêques d'aujourd'hui. Paul le rappelle à Timothée. <em>« Ranime le don de Dieu que tu as reçu par l'imposition de mes mains. »</em> <span class="ref">2 Timothée 1:6</span> Cette continuité porte aussi sur la foi elle-même. <em>« Ce que tu as entendu de moi, confie-le à des hommes fidèles, capables à leur tour d'en instruire d'autres. »</em> <span class="ref">2 Timothée 2:2</span> La succession apostolique garantit ainsi deux choses : que l'ordre reçu aujourd'hui est bien celui que le Christ donna aux apôtres, et que la foi enseignée est bien la leur.</p>
      <h2>Un seul sacrement, trois degrés</h2>
      <p>Le mot « ordre » vient du latin <em>ordo</em>, qui désignait un corps établi dans la société ; être ordonné, c'est être agrégé à l'un des degrés du ministère. Le sacrement est un, et se reçoit en trois degrés. L'évêque possède le sacerdoce dans sa plénitude ; le prêtre y participe comme son collaborateur ; tous deux reçoivent le sacerdoce ministériel, pour rendre le Christ présent à son peuple. Le diacre, lui, est ordonné pour le service et non pour le sacerdoce. Les trois reçoivent le sacrement par l'imposition des mains de l'évêque, seul à pouvoir le conférer.</p>
      <h2>L'évêque</h2>
      <p>L'évêque est un successeur des apôtres, qui a reçu la plénitude du sacrement de l'ordre. Le mot grec rendu par « évêque », <em>episkopos</em> (ἐπίσκοπος), désigne celui qui veille, le gardien ; et c'est l'Esprit Saint qui l'établit pour garder le troupeau. <em>« Prenez garde à tout le troupeau sur lequel le Saint-Esprit vous a établis évêques, pour paître l'Église de Dieu. »</em> <span class="ref">Actes 20:28</span> De la plénitude qu'il détient viennent deux pouvoirs qui lui sont propres : lui seul ordonne, faisant d'autres hommes diacres, prêtres et évêques, il est le ministre par excellence de la confirmation. Ainsi Paul laissait à Tite le soin d'établir les ministres en chaque lieu. <em>« Établis des anciens dans chaque ville, comme je te l'ai prescrit. »</em> <span class="ref">Tite 1:5</span> Placé à la tête d'une Église locale, le diocèse, l'évêque y exerce la triple charge reçue des apôtres : il enseigne la foi en gardien du dépôt confié, il sanctifie son peuple par les sacrements et préside l'eucharistie d'où vit son Église, il la gouverne en pasteur. Pris tous ensemble, les évêques forment un seul corps, le collège épiscopal, dont la tête est le pape, comme Pierre l'était parmi les Douze ; chacun l'est en communion avec le pape et avec ses frères dans l'épiscopat, et cette union garde l'Église une. Réunis autour de Pierre, les apôtres tinrent à Jérusalem le premier concile de l'Église, et y tranchèrent ensemble les premières questions de la foi. <em>« Il a paru bon à l'Esprit Saint et à nous. »</em> <span class="ref">Actes 15:28</span></p>
      <h2>Le prêtre</h2>
      <p>Le prêtre reçoit le sacrement de l'ordre à son second degré, part qui relève de la plénitude détenue par l'évêque. Le mot grec rendu par « prêtre », <em>presbyteros</em> (πρεσβύτερος), désigne l'ancien. C'est l'évêque qui l'ordonne, et le prêtre demeure son collaborateur : ne pouvant être partout, l'évêque prolonge son ministère par les prêtres répartis dans les paroisses, qui forment autour de lui un seul corps de pasteurs. Dès les origines, les apôtres établirent des anciens en chaque Église. <em>« Ils firent nommer des anciens dans chaque Église. »</em> <span class="ref">Actes 14:23</span> L'acte central du prêtre est l'eucharistie : sur l'autel, par ses mains, le Christ rend présent l'unique sacrifice de la croix et se donne en nourriture. Quand le prêtre dit « Ceci est mon corps », c'est le Christ qui agit par lui, selon ce qu'il confia aux siens à la Cène. <em>« Faites ceci en mémoire de moi. »</em> <span class="ref">Luc 22:19</span> Il remet aussi les péchés au nom du Christ, par le pouvoir donné aux apôtres au soir de Pâques. <em>« Ceux à qui vous remettrez les péchés, ils leur seront remis ; ceux à qui vous les retiendrez, ils leur seront retenus. »</em> <span class="ref">Jean 20:23</span> Au-delà de ces deux actes, il conduit en pasteur la portion du troupeau que l'évêque lui confie : il annonce l'Évangile, instruit les fidèles et veille sur eux, intendant des dons de Dieu remis à l'Église.</p>

      <p>Le diacre reçoit le sacrement de l'ordre à son troisième degré, sous l'évêque et le prêtre. Le mot grec rendu par « diacre », <em>diakonos</em> (διάκονος), désigne le serviteur. L'évêque lui impose les mains pour le service et non pour le sacerdoce : le diacre ne consacre pas l'eucharistie et ne pardonne pas les péchés, ces actes demeurant au prêtre et à l'évêque. Dès l'Église des apôtres, cet ordre se tient auprès de l'évêque. <em>« avec les évêques et les diacres. »</em> <span class="ref">Philippiens 1:1</span> Son origine se lit au livre des Actes : les premiers chrétiens pourvoyaient chaque jour aux besoins des veuves, mais certaines étaient négligées dans cette distribution ; pour rester libres pour la prière et l'annonce de la parole, les apôtres firent choisir sept hommes chargés de ce service. <em>« Choisissez parmi vous sept hommes de bonne réputation, remplis de l'Esprit Saint et de sagesse. »</em> <span class="ref">Actes 6:3</span> Parmi eux, Étienne, le premier à mourir pour le Christ. Le service du diacre s'étend à trois domaines : à l'autel, il assiste l'évêque et le prêtre, proclame l'Évangile et peut prêcher, distribue la communion ; dans la parole, il enseigne et porte l'Évangile au monde ; dans la charité, il prend soin des pauvres, ce pour quoi les sept furent d'abord choisis. Il peut aussi baptiser, bénir et présider les funérailles. Le diaconat se reçoit comme une étape vers le sacerdoce, ou se vit comme un état permanent, ouvert aussi à des hommes mariés. Tout ce ministère rend visible une chose : l'Église est servante, à l'image de son Seigneur, qui lava les pieds de ses disciples. <em>« Le Fils de l'homme n'est pas venu pour être servi, mais pour servir, et donner sa vie en rançon pour la multitude. »</em> <span class="ref">Matthieu 20:28</span></p>
      <h2>Le rite de l'ordination</h2>
      <p>Le ministre de l'ordination est l'évêque seul. La matière est l'imposition des mains : l'évêque pose les mains sur la tête de l'ordonné, en silence ; la forme est la prière consécratoire qui suit, demandant à Dieu de répandre sur lui l'Esprit Saint et la grâce du degré qu'il reçoit. Ce geste et cette prière forment ensemble le cœur du sacrement ; on les trouve déjà dans l'Église des apôtres, lorsque les sept furent établis. <em>« Ils les présentèrent aux apôtres, qui prièrent et leur imposèrent les mains. »</em> <span class="ref">Actes 6:6</span> Les autres rites, la présentation du candidat, l'onction des mains du prêtre, la remise des instruments de sa charge, entourent ce cœur et en expriment le sens.</p>
      <h2>Agir en la personne du Christ</h2>
      <p>L'ordre configure pour toujours celui qui le reçoit au sacerdoce du Christ ; c'est pourquoi il se reçoit une seule fois et imprime un sceau qui ne s'efface pas. <em>« Tu es prêtre pour l'éternité, selon l'ordre de Melchisédech. »</em> <span class="ref">Hébreux 7:17</span> Par ce sceau, l'ordonné agit en la personne du Christ, <em>in persona Christi</em> : sa parole et son geste deviennent ceux du Seigneur, qui s'identifie à ceux qu'il envoie. L'Écriture emploie l'expression même là où le pardon est donné au nom du Seigneur. <em>« Ce que j'ai pardonné, je l'ai fait à cause de vous, en la personne du Christ. »</em> <span class="ref">2 Corinthiens 2:10</span> Quand le prêtre célèbre l'eucharistie ou pardonne les péchés, c'est le Christ lui-même qui agit par ses mains ; le ministre prête sa voix et ses gestes au Seigneur, auteur de ce qui s'accomplit.</p>
      <h2>Le célibat sacerdotal</h2>
      <p>Dans l'Église latine, l'évêque et le prêtre s'engagent au célibat, librement embrassé pour le Royaume. Cet état relève de la discipline de l'Église, qui l'a reçu de l'exemple du Christ, prêtre et vierge, et de sa parole sur ceux qui renoncent au mariage pour le Royaume. <em>« Il y a des eunuques qui se sont rendus tels eux-mêmes à cause du royaume des cieux ; comprenne qui peut comprendre. »</em> <span class="ref">Matthieu 19:12</span> Le prêtre configuré au Christ se donne à lui d'un cœur sans partage et se rend tout entier disponible pour son peuple, signe vivant du monde à venir. <em>« Celui qui n'est pas marié a souci des choses du Seigneur, cherchant à plaire au Seigneur. »</em> <span class="ref">1 Corinthiens 7:32</span> Les Églises catholiques d'Orient, en communion avec le pape, connaissent une autre discipline, où des hommes mariés accèdent au sacerdoce, et le diaconat permanent demeure partout ouvert aux hommes mariés ; le célibat reste, pour l'Église latine, le chemin de ses prêtres.</p>
      <h2>Sacerdoce commun et sacerdoce ministériel</h2>
      <p>Par le baptême, tous les fidèles participent au sacerdoce du Christ : ils offrent leur vie à Dieu, prient et témoignent. C'est le sacerdoce commun. Par l'ordre, certains reçoivent le sacerdoce ministériel, pour servir ce sacerdoce commun en rendant le Christ présent à son peuple. Le ministre est ainsi tout entier au service des fidèles. <em>« Tout grand prêtre, pris parmi les hommes, est établi pour les hommes dans leurs relations avec Dieu, afin d'offrir des dons et des sacrifices pour les péchés. »</em> <span class="ref">Hébreux 5:1</span></p>
