<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumen · Théologie catholique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   LUMEN — feuille de style
   Palette « manuscrit nocturne » : encre profonde, parchemin, or ancien.
   ============================================================ */
:root{
  --encre:#000000;          /* fond global, noir total */
  --encre-2:#0b0b0b;        /* fond des surfaces légèrement levées */
  --parchemin:#ffffff;      /* texte principal, blanc franc */
  --parchemin-att:#ffffff;  /* texte secondaire, blanc lui aussi */
  --or:#efe6cf;             /* accent principal, crème clair */
  --or-pale:#f8f3e6;        /* crème éclairci, hover */
  --pourpre:#9a3b3b;        /* accent rare, rouge liturgique */
  --filet:rgba(231,224,207,.14); /* filets fins */
  --filet-fort:rgba(231,224,207,.28);
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--encre);
  color:var(--parchemin);
  font-family:'EB Garamond',Georgia,serif;
  font-size:20px;
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
::selection{background:rgba(198,164,92,.25)}

a{color:inherit;text-decoration:none}

/* ---------- bandeau d'en-tête ---------- */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--filet);
}
.barre{
  max-width:1080px;margin:0 auto;
  padding:20px 32px;
  display:grid;grid-template-columns:auto auto 1fr;align-items:center;
  gap:24px;
}
.logo{
  grid-column:1;grid-row:1;
  font-family:'Cormorant Garamond',serif;
  font-weight:500;font-size:26px;
  letter-spacing:.34em;
  text-transform:uppercase;
  color:var(--parchemin);
  padding-left:.34em;
}
.logo:hover{color:var(--or-pale)}
nav.menu{display:flex;gap:30px;grid-column:3;grid-row:1;justify-self:end}
nav.menu a{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--parchemin-att);
  padding-bottom:3px;
  border-bottom:1px solid transparent;
  transition:color .3s,border-color .3s;
}
nav.menu a:hover,nav.menu a.actif{color:var(--parchemin);border-color:var(--or)}

/* bouton menu mobile */
.burger{display:none;background:none;border:none;color:var(--parchemin);
  font-size:24px;cursor:pointer;line-height:1}

/* contexte d'article (thème · date) centré dans le bandeau */
.contexte-bar{
  grid-column:2;grid-row:1;text-align:left;min-width:0;
  overflow:hidden;text-overflow:ellipsis;
  font-family:'Cormorant Garamond',serif;
  font-size:13px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--parchemin-att);white-space:nowrap;pointer-events:auto;
}
.contexte-bar:empty{display:none}
.contexte-bar a{transition:color .3s}
.contexte-bar a:hover{color:var(--or)}

/* ---------- recherche ---------- */
.rech-loupe{display:inline-flex;align-items:center;cursor:pointer;color:var(--parchemin-att);transition:color .3s;background:none;border:none;padding:0;outline:none}
.rech-loupe:hover,.rech-loupe:focus{color:var(--or)}
.rech-loupe svg{display:block}
.rech-overlay{position:fixed;inset:0;z-index:200;background:rgba(8,8,8,.98);display:none}
.rech-overlay.ouvert{display:block}
.rech-boite{max-width:760px;margin:0 auto;padding:8vh 24px 40px;height:100%;display:flex;flex-direction:column;box-sizing:border-box}
.rech-haut{display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--filet-fort);padding-bottom:18px}
.rech-haut svg{color:var(--or);flex:none}
#rech-champ{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--parchemin);font-family:'Cormorant Garamond',serif;font-size:30px;letter-spacing:.01em}
#rech-champ::-webkit-search-cancel-button,#rech-champ::-webkit-search-decoration{-webkit-appearance:none;appearance:none;display:none}
#rech-champ::placeholder{color:var(--parchemin-att);opacity:.5}
.rech-fermer{cursor:pointer;color:var(--parchemin-att);font-size:24px;line-height:1;transition:color .3s;flex:none;outline:none}
.rech-fermer:hover,.rech-fermer:focus{color:var(--parchemin)}
.rech-res{margin-top:6px;overflow-y:auto;flex:1}
    .cloche{position:relative}
    .cloche .cloche-point{position:absolute;top:0;right:-1px;width:6px;height:6px;border-radius:50%;background:var(--or);pointer-events:none;display:none}
    .nouv-titre-panneau{flex:1;color:var(--parchemin);font-family:'Cormorant Garamond',serif;font-size:30px;letter-spacing:.01em}
    .nouv-liste{margin-top:6px;overflow-y:auto;flex:1}
    .nouv-groupe{padding:20px 0;border-bottom:1px solid var(--filet)}
    .nouv-groupe:last-child{border-bottom:none}
    .nouv-date{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-bottom:16px}
    .nouv-ligne{position:relative;padding-left:22px;color:var(--parchemin-att);font-size:18px;line-height:1.55}
    .nouv-ligne::before{content:"";position:absolute;left:2px;top:.62em;width:5px;height:5px;border-radius:50%;background:var(--or)}
    .nouv-ligne + .nouv-ligne{margin-top:16px}
    @media(max-width:720px){.nouv-titre-panneau{font-size:24px}}
.rech-msg{padding:38px 4px;color:var(--parchemin-att);font-style:italic;font-size:18px}
.rech-item{display:block;padding:22px 4px;border-bottom:1px solid var(--filet);cursor:pointer;transition:padding-left .3s}
.rech-item:hover{padding-left:14px}
.rech-meta{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--or);margin-bottom:6px}
.rech-titre{font-family:'Cormorant Garamond',serif;font-size:24px;line-height:1.15;transition:color .3s}
.rech-item:hover .rech-titre{color:var(--or-pale)}
.rech-extrait{margin-top:7px;font-size:16px;color:var(--parchemin-att);line-height:1.55}
.rech-extrait mark{background:none;color:var(--or);font-weight:600}
@media(max-width:720px){#rech-champ{font-size:24px}.rech-boite{padding-top:6vh}}

/* ---------- conteneur de page ---------- */
main{max-width:1080px;margin:0 auto;padding:0 32px;min-height:70vh}
.vue{animation:apparait .6s ease both}
@keyframes apparait{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ---------- accueil ---------- */
.hero{
  padding:112px 0 100px;
  text-align:center;
  border-bottom:1px solid var(--filet);
}
.croix{
  position:relative;
  width:72px;height:132px;
  margin:0 auto;
}
.croix::before{
  content:"";position:absolute;
  left:50%;top:0;transform:translateX(-50%);
  width:2px;height:100%;
  background:#ffffff;
}
.croix::after{
  content:"";position:absolute;
  top:40px;left:0;
  width:100%;height:2px;
  background:#ffffff;
}

.intro{
  max-width:680px;margin:64px auto;
  text-align:center;
  font-size:20px;color:var(--parchemin-att);
}
.intro p+p{margin-top:18px}

/* titres de section internes */
.titre-section{
  display:flex;align-items:baseline;gap:18px;
  margin:72px 0 36px;
}
.titre-section .num{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;letter-spacing:.2em;color:var(--or);
  white-space:nowrap;
}
.titre-section h2{
  font-family:'Cormorant Garamond',serif;
  font-weight:400;font-size:34px;letter-spacing:.02em;
  white-space:nowrap;
}
.titre-section .trait{flex:1;height:1px;background:var(--filet)}

/* grille des domaines */
.domaines{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:0;background:transparent;
  border-top:1px solid var(--filet);border-left:1px solid var(--filet);
}
.domaine{
  background:var(--encre);
  border-right:1px solid var(--filet);border-bottom:1px solid var(--filet);
  padding:34px 30px;
  cursor:pointer;
  transition:background .35s;
  display:flex;flex-direction:column;gap:12px;
}
.domaine:hover{background:var(--encre-2)}
.domaine:last-child:nth-child(3n+1){grid-column:1 / -1}
.domaine:last-child:nth-child(3n+2){grid-column:2 / -1}
@media(max-width:900px){
  .domaines{grid-template-columns:repeat(2,1fr)}
  .domaine:last-child:nth-child(3n+1),.domaine:last-child:nth-child(3n+2){grid-column:auto}
  .domaine:last-child:nth-child(2n+1){grid-column:1 / -1}
}
@media(max-width:560px){
  .domaines{grid-template-columns:1fr}
  .domaine:last-child:nth-child(2n+1){grid-column:auto}
}
.domaine .d-num{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.18em;color:var(--or);
}
.domaine h3{
  font-family:'Cormorant Garamond',serif;
  font-weight:500;font-size:25px;letter-spacing:.01em;
  transition:color .3s;
}
.domaine:hover h3{color:var(--or-pale)}
.domaine p{font-size:17px;color:var(--parchemin-att);line-height:1.65}
.domaine .compte{
  margin-top:auto;font-size:13px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--parchemin-att);
  font-family:'Cormorant Garamond',serif;
}

/* ---------- bibliothèque : liste d'articles ---------- */
.bandeau-page{
  padding:80px 0 40px;border-bottom:1px solid var(--filet);margin-bottom:8px;
}
.bandeau-page .sur-titre{
  font-family:'Cormorant Garamond',serif;
  text-transform:uppercase;letter-spacing:.36em;
  font-size:12px;color:var(--or);margin-bottom:22px;
}
.bandeau-page h1{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(40px,6vw,68px);letter-spacing:.02em;line-height:1.05;
}
.bandeau-page .desc{
  margin-top:20px;max-width:620px;font-size:19px;color:var(--parchemin-att);
}

/* filtres de thèmes */
.filtres{display:flex;flex-wrap:wrap;gap:10px;margin:72px 0 16px}
.filtre{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--parchemin-att);
  padding:7px 16px;border:1px solid var(--filet);
  cursor:pointer;transition:all .3s;
  background:none;
}
.filtre:hover{color:var(--parchemin);border-color:var(--filet-fort)}
.filtre.actif{color:var(--encre);background:var(--or);border-color:var(--or)}

/* liste */
.liste{margin-top:24px}
.article-lien{
  display:block;padding:30px 4px;
  border-bottom:1px solid var(--filet);
  transition:padding-left .35s;
  cursor:pointer;
}
.article-lien:hover{padding-left:18px}
.article-lien .meta{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--or);margin-bottom:8px;
}
.article-lien h3{
  font-family:'Cormorant Garamond',serif;
  font-weight:400;font-size:30px;letter-spacing:.01em;
  transition:color .3s;line-height:1.15;
}
.article-lien:hover h3{color:var(--or-pale)}
.article-lien p{margin-top:8px;font-size:18px;color:var(--parchemin-att)}
.vide{padding:60px 0;text-align:center;color:var(--parchemin-att);font-style:italic;font-size:19px}
.cat-titre{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--or);
  margin:46px 0 2px;padding-bottom:14px;
  border-bottom:1px solid var(--filet-fort);
}
.liste > .cat-titre:first-child{margin-top:8px}

/* ---------- bibliothèque : domaines repliables ---------- */
.biblio-barre{display:flex;justify-content:flex-end;margin:30px 0 6px}
.bt{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--parchemin-att);cursor:pointer;
  display:inline-flex;align-items:center;gap:11px;
  padding:6px 2px;transition:color .3s;
  user-select:none;-webkit-tap-highlight-color:transparent;
}
.bt:hover{color:var(--or-pale)}
.bt .bt-fleche{display:inline-block;color:var(--or);transition:transform .35s ease;transform:rotate(90deg)}
.bt.actif-tout .bt-fleche{transform:rotate(-90deg)}
.domaines-liste{margin-top:30px}
.dom{border-bottom:1px solid var(--filet)}
.dom-tete{
  display:flex;align-items:baseline;gap:20px;
  padding:26px 6px;cursor:pointer;transition:background .3s;
  user-select:none;
}
.dom-tete:hover{background:var(--encre-2)}
.dom-num{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;letter-spacing:.2em;color:var(--or);
  font-variant-numeric:tabular-nums;flex:none;
}
.dom-nom{
  font-family:'Cormorant Garamond',serif;
  font-weight:400;font-size:29px;letter-spacing:.02em;line-height:1.1;
  flex:1;transition:color .3s;
}
.dom-tete:hover .dom-nom{color:var(--or-pale)}
.dom-compte{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--parchemin-att);white-space:nowrap;flex:none;
}
.dom-chevron{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;line-height:1;color:var(--parchemin-att);flex:none;
  transform:rotate(0);transition:transform .3s ease,color .25s;
}
.dom-tete:hover .dom-chevron{color:var(--or-pale)}
.dom.ouvert .dom-chevron{transform:rotate(90deg)}
.dom.ouvert .dom-tete{
  position:sticky;top:73px;z-index:40;
  background:rgba(0,0,0,.9);backdrop-filter:blur(8px);
}
.dom-sep{
  height:1px;opacity:0;
  background:linear-gradient(90deg,rgba(231,224,207,.5),rgba(231,224,207,.22),rgba(231,224,207,.06),transparent);
}
.dom-corps{display:none;padding:6px 0 22px}
.dom.ouvert .dom-corps{display:block}
.dom-corps > .article-lien:last-child{border-bottom:none}
/* sous-sections (catégories) repliables */
.sous{margin-top:6px}
.sous:first-child{margin-top:0}
.sous-tete{
  display:flex;align-items:center;gap:14px;
  cursor:pointer;user-select:none;padding:16px 6px;
  transition:background .3s;
}
.sous-tete:hover{background:var(--encre-2)}
.sous-puce{width:6px;height:6px;border-radius:50%;background:var(--or);flex:none;opacity:.85}
.sous-nom{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.26em;text-transform:uppercase;color:var(--or);
  flex:1;transition:color .3s;
}
.sous-tete:hover .sous-nom{color:var(--or-pale)}
.sous-chevron{
  font-family:'Cormorant Garamond',serif;font-size:20px;line-height:1;
  color:var(--parchemin-att);flex:none;transform:rotate(0);
  transition:transform .3s ease,color .25s;
}
.sous-tete:hover .sous-chevron{color:var(--or-pale)}
.sous.ouvert .sous-chevron{transform:rotate(90deg)}
.sous-corps{display:none;margin-left:9px;padding-left:24px;border-left:1px solid var(--filet)}
.sous.ouvert .sous-corps{display:block}
.sous-corps .article-lien:last-child{border-bottom:none}
@keyframes apparaitDom{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes apparaitDomFerme{from{opacity:1;transform:none}to{opacity:0;transform:translateY(-6px)}}

/* ---------- article ---------- */
article.lecture{max-width:720px;margin:0 auto;padding:64px 0 80px}
article.lecture h1{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(38px,6vw,60px);line-height:1.08;letter-spacing:.01em;
  margin:0 0 56px;text-align:center;
}
article.lecture h1+p::first-letter{
  font-family:'Cormorant Garamond',serif;
  float:left;font-size:78px;line-height:.78;
  font-weight:500;color:var(--or);
  margin:8px 14px 0 0;
}
article.lecture p{margin-bottom:22px}
article.lecture h2{
  font-family:'Cormorant Garamond',serif;font-weight:500;
  font-size:30px;letter-spacing:.01em;
  margin:48px 0 18px;
}
article.lecture h3{
  font-family:'Cormorant Garamond',serif;font-weight:500;
  font-size:23px;margin:34px 0 14px;color:var(--parchemin)
}
/* référence biblique en ligne */
.ref{font-weight:600;font-family:'Cormorant Garamond',serif;
  letter-spacing:.04em;color:var(--or);white-space:nowrap}
/* renvois internes entre articles */
article.lecture a,.prose a{
  color:var(--or);
  border-bottom:1px solid rgba(239,230,207,.35);
  transition:color .3s,border-color .3s;
}
article.lecture a:hover,.prose a:hover{color:var(--or-pale);border-color:var(--or-pale)}
article.lecture blockquote{
  margin:30px 0;padding-left:26px;border-left:2px solid var(--filet-fort);
  font-style:italic;color:var(--parchemin-att);
}
.fin-article{
  text-align:center;margin:60px 0 0;
  font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--or);letter-spacing:.4em;
}

/* ---------- à propos ---------- */
.prose{max-width:680px;margin:0 auto;padding:8px 0 80px;font-size:21px;text-align:center}
.prose p{margin-bottom:22px}
.apropos-vue{min-height:70vh;display:flex;flex-direction:column}
.apropos-corps{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 0}
.apropos-vue .prose{padding:0;text-align:left}

/* ---------- pied de page ---------- */
footer{
  border-top:1px solid var(--filet);
  margin-top:40px;
  padding:48px 32px 56px;
  text-align:center;
}
footer .marque{
  font-family:'Cormorant Garamond',serif;
  letter-spacing:.34em;text-transform:uppercase;font-size:18px;
  padding-left:.34em;color:var(--parchemin);
}
footer .verset-pied{
  margin-top:18px;font-style:italic;color:var(--parchemin-att);font-size:17px;
}
footer .copy{margin-top:22px;font-size:13px;letter-spacing:.08em;color:var(--parchemin-att);
  font-family:'Cormorant Garamond',serif}

/* ---------- responsive ---------- */
@media(max-width:720px){
  body{font-size:17px}
  .barre{padding:16px 20px;display:flex;justify-content:space-between}
  main{padding:0 20px}
  nav.menu{
    position:fixed;inset:62px 0 auto 0;
    flex-direction:column;gap:0;
    background:var(--encre-2);
    border-bottom:1px solid var(--filet);
    transform:translateY(-130%);transition:transform .35s;
  }
  nav.menu.ouvert{transform:none}
  nav.menu a{padding:18px 20px;border-bottom:1px solid var(--filet)}
  .burger{display:block}
  .contexte-bar{display:none}
  .titre-section h2{font-size:26px;white-space:normal}
  .titre-section{flex-wrap:wrap}
  .dom-tete{gap:13px;padding:22px 2px}
  .dom-nom{font-size:23px}
  .dom-chevron{font-size:22px}
  .dom.ouvert .dom-tete{top:61px}
  .sous-tete{padding:14px 2px;gap:11px}
  .sous-corps{padding-left:18px}
}
.vue:has(.apologie) .lecture{padding-bottom:56px}
.apologie{max-width:720px;margin:0 auto;padding:40px 0 96px;border-top:1px solid rgba(255,255,255,.12)}
.apologie-label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-bottom:14px}
.apologie-lien{display:inline-block;font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--parchemin);text-decoration:none;transition:color .2s}
.apologie-lien:hover{color:var(--or)}
.vue:has(.domaines-liste) .bandeau-page{border-bottom:none}
.ll-mob{display:none}
@media(max-width:720px){
nav.menu .rech-loupe{width:auto;justify-content:flex-start;gap:14px;padding:18px 20px;border-bottom:1px solid var(--filet);font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.12em;text-transform:uppercase;color:var(--parchemin-att)}
nav.menu .rech-loupe .ll-mob{display:inline}
nav.menu .cloche .cloche-point{top:22px;left:34px;right:auto}
}
</style>
</head>
<body>

<header>
  <div class="barre">
    <a href="#/" class="logo">Lumen</a>
    <button class="burger" id="burger" aria-label="Menu">☰</button>
    <nav class="menu" id="menu">
      <a href="#/" data-route="/">Accueil</a>

  {
    id: "jesus-et-nicodeme",
    titre: "Jésus et Nicodème",
    theme: "ecriture",
    resume: "Un docteur de la Loi vient de nuit interroger le Christ, qui lui révèle qu'il faut naître de nouveau, d'eau et d'Esprit, pour voir le royaume de Dieu, et que le Fils élevé sur la croix donne la vie éternelle à qui croit.",
    date: "2026",
    contenu: `
      <p>Une nuit, un notable juif vient trouver le Christ en secret. Nicodème est pharisien et membre du conseil, un maître respecté de la Loi. De cet entretien sort l'un des sommets de l'Évangile : il faut naître de nouveau, d'eau et d'Esprit, pour entrer dans le royaume de Dieu ; et le Fils, élevé sur la croix, donne la vie éternelle à qui croit en lui.</p>
      <h2>Venu de nuit</h2>
      <p>Nicodème s'approche de nuit, à l'écart des regards. Sa prudence trahit l'embarras d'un homme en vue qui ne veut pas se compromettre, mais aussi un cœur déjà touché. Il ouvre avec respect : <em>« Rabbi, nous savons que tu es un docteur venu de Dieu, car personne ne peut faire les miracles que tu fais, si Dieu n'est avec lui. »</em> <span class="ref">Jean 3:2</span> La nuit qu'il choisit n'est pas qu'une discrétion : elle figure l'obscurité où il se tient encore, croyant à demi, sans avoir reçu la pleine lumière. C'est de cette ombre que tout l'entretien va le tirer.</p>
      <h2>Naître de nouveau</h2>
      <p>Le Christ va droit à l'essentiel : <em>« En vérité, je te le dis, si un homme ne naît de nouveau, il ne peut voir le royaume de Dieu. »</em> <span class="ref">Jean 3:3</span> Le mot grec rendu ici par « de nouveau », <em>anōthen</em> (ἄνωθεν), signifie à la fois « de nouveau » et « d'en haut » : la naissance qu'il annonce vient de Dieu. Nicodème l'entend au ras de la chair et s'étonne : <em>« Comment un homme peut-il naître quand il est vieux ? Peut-il rentrer dans le sein de sa mère ? »</em> <span class="ref">Jean 3:4</span> Le docteur de la Loi ne conçoit qu'une seconde naissance charnelle, et c'est là qu'il bute.</p>
      <h2>D'eau et d'Esprit</h2>
      <p>Le Christ précise alors ce qu'est cette naissance : <em>« Si un homme ne naît d'eau et d'Esprit, il ne peut entrer dans le royaume de Dieu. »</em> <span class="ref">Jean 3:5</span> L'eau et l'Esprit nomment le baptême, où l'homme reçoit une vie nouvelle, celle des enfants de Dieu. Il y a ainsi deux naissances, et deux vies : <em>« Ce qui est né de la chair est chair, et ce qui est né de l'Esprit est esprit. »</em> <span class="ref">Jean 3:6</span> La première donne d'exister ; la seconde, de vivre de la vie de Dieu et d'entrer dans son Royaume.</p>
      <h2>Le vent souffle où il veut</h2>
      <p>Cette naissance est l'œuvre de Dieu, libre et insaisissable : <em>« Le vent souffle où il veut, et tu en entends le bruit ; mais tu ne sais ni d'où il vient ni où il va. Il en est ainsi de quiconque est né de l'Esprit. »</em> <span class="ref">Jean 3:8</span> En grec, un seul mot, <em>pneuma</em> (πνεῦμα), dit le vent et l'Esprit : c'est lui qui revient dans « le vent souffle » et dans « né de l'Esprit ». On en perçoit les effets sans en maîtriser la source : nul ne se donne cette vie à soi-même, il la reçoit.</p>
      <p>Là se révèle le paradoxe de Nicodème. Maître de la Loi, versé dans les Écritures, il devrait reconnaître ce dont parle le Christ, car les prophètes avaient annoncé ce don de Dieu : <em>« Je vous donnerai un cœur nouveau, et je mettrai en vous un esprit nouveau. »</em> <span class="ref">Ézéchiel 36:26</span> Pourtant il ne comprend pas, et le Christ le lui montre : <em>« Tu es le docteur d'Israël, et tu ne sais pas ces choses ! »</em> <span class="ref">Jean 3:10</span> Nicodème veut comprendre comment cela se fait avant d'y croire ; or l'ordre est inverse. On n'attend pas d'avoir saisi cette naissance pour la recevoir : on l'accueille par la foi, et la lumière vient ensuite. Ce qui lui manque n'est pas le savoir, mais de croire celui qui parle : <em>« Si vous ne croyez pas quand je vous parle des choses terrestres, comment croirez-vous si je vous parle des choses célestes ? »</em> <span class="ref">Jean 3:12</span></p>
      <h2>Élevé comme le serpent</h2>
      <p>Pour dire comment cette vie sera donnée, le Christ rappelle un épisode du désert. Mordu par des serpents, le peuple fut sauvé en regardant un serpent de bronze que Moïse avait dressé sur une perche : <em>« Quiconque aura été mordu et le regardera, vivra. »</em> <span class="ref">Nombres 21:8</span> Ce signe annonçait le sien : <em>« Comme Moïse éleva le serpent dans le désert, il faut de même que le Fils de l'homme soit élevé, afin que quiconque croit en lui ait la vie éternelle. »</em> <span class="ref">Jean 3:14-15</span> Élevé sur la croix, le Christ guérit du venin de la mort tous ceux qui lèvent les yeux vers lui dans la foi.</p>
      <h2>Dieu a tant aimé le monde</h2>
      <p>De là vient le verset où tient tout l'Évangile : <em>« Dieu a tant aimé le monde qu'il a donné son Fils unique, afin que quiconque croit en lui ne périsse pas, mais ait la vie éternelle. »</em> <span class="ref">Jean 3:16</span> Le don du Fils ne vise pas à condamner, mais à sauver : <em>« Dieu n'a pas envoyé son Fils dans le monde pour juger le monde, mais pour que le monde soit sauvé par lui. »</em> <span class="ref">Jean 3:17</span> La croix, où le Fils est élevé, est le sommet de cet amour.</p>
      <p>L'entretien s'achève sur la lumière et l'ombre, là où il avait commencé. Le jugement n'est pas une sentence imposée du dehors : <em>« La lumière est venue dans le monde, et les hommes ont préféré les ténèbres à la lumière, parce que leurs œuvres étaient mauvaises. »</em> <span class="ref">Jean 3:19</span> Chacun se juge en venant à la lumière ou en la fuyant. Nicodème, lui, était venu de nuit ; il reparaîtra au grand jour, lorsqu'il viendra ensevelir le Christ en portant la myrrhe et l'aloès, <em>« lui qui d'abord était venu de nuit »</em> <span class="ref">Jean 19:39</span>. L'homme des ténèbres a marché vers la lumière.</p>
      <div class="fin-article">✦</div>
    `
  },
  {
    id: "jesus-devant-pilate",
    titre: "Jésus devant Pilate",
    theme: "ecriture",
    resume: "Devant le gouverneur romain qui peut le condamner à mort, le Christ se révèle roi d'un royaume qui n'est pas de ce monde et témoin de la vérité, tandis que Pilate, troublé et averti jusque par sa femme, le livre par peur de César.",
    date: "2026",
    contenu: `
      <p>Au matin de sa Passion, le Christ est conduit devant Pilate, le gouverneur romain qui seul peut prononcer une condamnation à mort. L'échange qui suit est le drame d'un juge troublé : l'accusé s'y révèle roi, Pilate s'y trouve peu à peu jugé, et, averti jusque par sa femme, il finit par condamner contre ce qu'il sait. Tout s'y joue autour d'un homme qui pressent la vérité sans oser la recevoir.</p>
      <h2>Es-tu le roi des Juifs ?</h2>
      <p>Pilate ouvre l'interrogatoire par la seule question qui l'intéresse, celle d'un pouvoir rival de Rome : <em>« Es-tu le roi des Juifs ? »</em> <span class="ref">Jean 18:33</span> Le Christ ne nie pas qu'il soit roi ; il en corrige aussitôt l'idée. Pilate cherche un agitateur prêt à soulever le peuple, et il a devant lui un roi d'une autre sorte, qu'aucune de ses catégories ne saisit.</p>
      <h2>Un royaume qui n'est pas d'ici</h2>
      <p><em>« Mon royaume n'est pas de ce monde. Si mon royaume était de ce monde, mes serviteurs auraient combattu pour que je ne sois pas livré ; mais maintenant, mon royaume n'est point d'ici. »</em> <span class="ref">Jean 18:36</span> La preuve qu'il en donne est simple : aucune armée ne s'est levée pour le défendre, aucune épée n'a empêché son arrestation. Pressé de dire s'il est roi, il confirme et révèle sur quoi repose son règne : <em>« Je suis venu dans le monde pour rendre témoignage à la vérité ; quiconque est de la vérité écoute ma voix. »</em> <span class="ref">Jean 18:37</span> Son règne ne s'exerce pas sur des terres, mais sur les cœurs qui se rangent du côté de la vérité. Pilate attendait un rival politique, et il entend parler d'un royaume et d'une vérité qui débordent tout ce qu'un gouverneur peut juger.</p>
      <h2>Qu'est-ce que la vérité ?</h2>
      <p>À ce mot, Pilate lâche une question restée célèbre : <em>« Qu'est-ce que la vérité ? »</em> <span class="ref">Jean 18:38</span> Puis il sort sans attendre la réponse. La Vérité se tenait devant lui, faite homme, et il s'en détourne pour aller traiter l'affaire. C'est le premier signe de son drame : il pose la bonne question et refuse d'en recevoir la réponse, parce qu'elle l'engagerait. Il a pourtant compris l'essentiel, et il le dit aux accusateurs : il ne trouve en cet homme aucun motif de condamnation.</p>
      <h2>Le songe et la peur</h2>
      <p>Le trouble de Pilate ne cesse de croître. Pendant qu'il siège, sa femme lui fait porter un avertissement : <em>« Ne te mêle pas de l'affaire de ce juste, car aujourd'hui j'ai beaucoup souffert en songe à cause de lui. »</em> <span class="ref">Matthieu 27:19</span> Une païenne appelle Jésus « ce juste », et un songe la trouble assez pour qu'elle interrompe un procès. Quand Pilate entend ensuite que l'accusé s'est fait Fils de Dieu, sa crainte redouble : <em>« Quand Pilate entendit cette parole, il eut encore plus de peur. »</em> <span class="ref">Jean 19:8</span> Il revient l'interroger sur son origine, <em>« D'où es-tu ? »</em> <span class="ref">Jean 19:9</span>, en homme qui se demande s'il a devant lui plus qu'un homme. Le Christ se tait, et ce silence l'étonne. Ces signes l'avertissent tous d'une même chose : qu'il ne devrait pas condamner ce juste.</p>
      <h2>Tu n'aurais aucun pouvoir</h2>
      <p>Devant ce silence, Pilate s'irrite et brandit son autorité : <em>« Ne sais-tu pas que j'ai le pouvoir de te crucifier, et le pouvoir de te relâcher ? »</em> <span class="ref">Jean 19:10</span> La réponse renverse les rangs : <em>« Tu n'aurais sur moi aucun pouvoir, s'il ne t'avait été donné d'en haut ; c'est pourquoi celui qui me livre à toi est coupable d'un plus grand péché. »</em> <span class="ref">Jean 19:11</span> Le juge ne tient son pouvoir que de Dieu, et il n'en dispose pas aussi librement qu'il le croit. L'accusé, lui, reste maître de l'heure : il se livre, nul ne le lui arrache. La faute, enfin, se mesure : celui qui l'a livré pèche davantage, sans que Pilate en soit lavé pour autant.</p>
      <h2>Contre sa conscience</h2>
      <p>Tout poussait Pilate à relâcher cet homme : son propre jugement, l'avertissement de sa femme, sa peur. Une menace suffit pourtant à le faire céder : <em>« Si tu relâches cet homme, tu n'es pas l'ami de César. »</em> <span class="ref">Jean 19:12</span> Entre la vérité qu'il a entrevue et sa place auprès de l'empereur, il choisit l'empereur. Il se fait apporter de l'eau et s'en lave les mains, <em>« Je suis innocent de ce sang »</em> <span class="ref">Matthieu 27:24</span>, comme si l'on pouvait se laver d'une sentence qu'on prononce soi-même. Son hésitation ne l'excuse pas, elle l'accuse : il ne condamne pas par ignorance, mais contre ce que sa conscience, son épouse et sa propre crainte lui disaient. Et la foule obtient ce qu'elle réclame : <em>« Nous n'avons d'autre roi que César. »</em> <span class="ref">Jean 19:15</span></p>
      <p>À la fin, Pilate tient bon sur un seul point, et c'est sur la vérité qu'il avait fuie. Il fait écrire sur la croix le motif de la condamnation : <em>« Jésus de Nazareth, roi des Juifs »</em>, en hébreu, en latin et en grec. Le titre humilie les chefs qui lui ont forcé la main : il leur jette leur « roi » cloué à un gibet. Ils réclament qu'on l'adoucisse, qu'on écrive seulement qu'il s'est prétendu roi ; Pilate s'y refuse : <em>« Ce que j'ai écrit, je l'ai écrit. »</em> <span class="ref">Jean 19:22</span> Or pour les humilier, il a dû le proclamer roi : dans les mêmes mots, son insulte énonce ce qu'il avait pressenti sans oser le recevoir. Et Dieu s'en sert : celui qui demandait ce qu'est la vérité proclame, aux trois langues du monde connu, que le condamné est roi.</p>
      <div class="fin-article">✦</div>
    `

  {
    id: "laisse-les-morts-enterrer-leurs-morts",
    titre: "Laisse les morts enterrer leurs morts",
    theme: "ecriture",
    resume: "Une parole du Christ qui semble interdire à un fils d'ensevelir son père. Ce qu'elle enseigne : l'appel de Dieu passe avant tout, et le devoir le plus sacré lui cède le pas.",
    date: "2026",
    contenu: `
      <p>« Laisse les morts enterrer leurs morts » compte parmi les paroles les plus rudes de l'Évangile. Le Christ semble y interdire à un fils d'ensevelir son père, contre le commandement même d'honorer ses parents. Lue de près, elle ne méprise pas le devoir filial : elle proclame que l'appel de Dieu passe avant tout, et que même l'obligation la plus sacrée lui cède le pas.</p>
      <h2>La demande</h2>
      <p>Un homme que le Christ vient d'appeler à le suivre lui demande un délai : <em>« Seigneur, permets-moi d'aller d'abord enterrer mon père. »</em> <span class="ref">Matthieu 8:21</span> La requête paraît juste, et même pieuse : ensevelir un mort, son père surtout, était en Israël l'un des devoirs les plus graves, lié au commandement reçu de Dieu, <em>« Honore ton père et ta mère. »</em> <span class="ref">Exode 20:12</span> La réponse tranche pourtant net : <em>« Suis-moi, et laisse les morts enterrer leurs morts. »</em> <span class="ref">Matthieu 8:22</span> Le Christ n'accorde pas même ce délai, et c'est ce refus qui déconcerte.</p>
      <h2>Les morts qui enterrent les morts</h2>
      <p>La clé est dans les deux morts, qui ne sont pas de même sorte. Les premiers sont morts à Dieu, privés de la vie de la grâce ; les seconds sont morts de corps. L'Écriture connaît cette mort de l'âme : <em>« Vous étiez morts par vos fautes et vos péchés. »</em> <span class="ref">Éphésiens 2:1</span> Le Christ dit donc : que ceux qui n'ont pas encore la vie s'occupent d'ensevelir les défunts ; toi, que j'appelle à la vie, suis-moi. La version de Luc le dit en clair : <em>« Laisse les morts enterrer leurs morts ; pour toi, va annoncer le royaume de Dieu. »</em> <span class="ref">Luc 9:60</span></p>
      <h2>Le mot « d'abord »</h2>
      <p>Le mot qui fait obstacle est « d'abord ». L'homme ne refuse pas de suivre, il veut suivre ensuite, une fois ce devoir rempli. Or l'appel de Dieu ne souffre aucun « d'abord » : rien ne peut être mis avant lui, pas même une obligation sainte. Le Royaume est le bien suprême, et qui le diffère pour autre chose le place déjà au second rang. À l'attente que l'homme réclame, le Christ substitue une mission : annoncer le Royaume.</p>
      <h2>Qui peut l'exiger</h2>
      <p>Demander d'être préféré à son propre père, nul homme ne le pourrait sans orgueil. Le Christ le demande parce qu'il est Dieu, et Dieu seul a droit à un amour qui passe avant tous les autres : <em>« Celui qui aime son père ou sa mère plus que moi n'est pas digne de moi. »</em> <span class="ref">Matthieu 10:37</span> La parole n'abaisse pas l'amour dû aux parents, elle le remet à sa place : Dieu d'abord, et tout le reste à partir de lui. Ce que le commandement défend de retirer au père, le Christ peut le revendiquer pour lui-même, car il est plus que le père.</p>
      <p>À un autre qui veut d'abord aller faire ses adieux aux siens, le Christ répond de même, et il en donne l'image : <em>« Quiconque met la main à la charrue et regarde en arrière n'est pas propre au royaume de Dieu. »</em> <span class="ref">Luc 9:62</span> Le laboureur qui se retourne dévie son sillon ; de même, celui que le Christ appelle avance sans revenir sur ce qu'il quitte.</p>

      <p>Le soir de la Cène, avant de sortir vers le mont des Oliviers, le Christ dit aux Apôtres d'acheter une épée. La parole étonne, et on s'en sert parfois pour faire de lui un maître qui arme les siens pour le combat. Lue jusqu'au bout, elle annonce le temps de l'épreuve qui s'ouvre avec sa Passion ; et la nuit même, le Christ défend qu'on s'en serve.</p>
      <h2>Vous n'avez manqué de rien</h2>
      <p>Le Christ part d'un rappel. Lorsqu'il avait envoyé les Apôtres annoncer le Royaume, il les avait fait partir démunis, sans argent ni provisions, et rien ne leur avait fait défaut : <em>« Quand je vous ai envoyés sans bourse, sans sac et sans sandales, avez-vous manqué de quelque chose ? De rien. »</em> <span class="ref">Luc 22:35</span> Tant qu'il était avec eux, ils vivaient sous sa garde, et le monde ne s'était pas encore dressé contre eux.</p>
      <h2>Prenez bourse, sac et épée</h2>
      <p>Le ton change aussitôt : <em>« Mais maintenant, que celui qui a une bourse la prenne, de même un sac ; et que celui qui n'a pas d'épée vende son manteau et en achète une. »</em> <span class="ref">Luc 22:36</span> Ce « maintenant » marque une rupture. Le Christ va être arrêté, jugé, mis à mort ; le temps de la protection visible s'achève, et celui de l'hostilité commence. Bourse, sac et épée disent ce renversement : les Apôtres entrent dans un monde qui les rejettera, et ils doivent s'y préparer. L'épée est le signe de cette opposition qui vient, non l'ordre d'armer une troupe.</p>

      <p>Le Christ donne lui-même la raison de ce changement, et elle tient dans une prophétie : <em>« Il faut que s'accomplisse en moi cette parole : Il a été compté parmi les malfaiteurs. »</em> <span class="ref">Luc 22:37</span> La parole vient du chant du Serviteur souffrant : <em>« Il a été compté parmi les criminels. »</em> <span class="ref">Isaïe 53:12</span> L'heure est venue où le Christ sera condamné et mis à mort comme un criminel, et jusqu'à la croix il sera mis au rang des malfaiteurs, crucifié entre deux d'entre eux. C'est cette heure qui change tout : le Maître va être traité en hors-la-loi, et les siens passent du temps de la garde au temps de l'épreuve. L'épée appartient à ce basculement des temps.</p>

    contenu: `
      <p>« Tendre l'autre joue » appartient au Sermon sur la montagne, où le Christ reprend la loi ancienne pour la porter à son accomplissement. Par cette parole, il appelle à renoncer à la vengeance personnelle et à vaincre le mal par le bien. Elle est parmi les plus citées de l'Évangile, et parmi les plus déformées : on y lit souvent l'ordre de tout subir sans réagir, quand elle vise le cœur qui refuse de rendre le mal pour le mal.</p>
      <h2>Œil pour œil</h2>
      <p>La parole part de la loi ancienne, que le Christ cite avant de la porter plus loin : <em>« Vous avez appris qu'il a été dit : Œil pour œil, dent pour dent. Et moi, je vous dis de ne pas résister au méchant ; si quelqu'un te frappe sur la joue droite, présente-lui aussi l'autre. »</em> <span class="ref">Matthieu 5:38-39</span> La règle d'origine venait de Moïse : <em>« Œil pour œil, dent pour dent. »</em> <span class="ref">Exode 21:24</span> On l'entend d'ordinaire comme une loi dure, assoiffée de représailles. Elle était une mesure de modération : dans un monde où l'on tuait pour une offense, elle interdisait que la peine dépasse le tort, un œil pour un œil et rien de plus. Le talion bridait la vengeance en la rendant proportionnée. Là où la loi limitait la riposte, le Christ demande d'y renoncer.</p>
      <h2>La joue droite</h2>
      <p>Le détail de la joue droite précise le sens. Quand deux hommes se font face, une gifle de la main droite, donnée à pleine paume, tombe sur la joue gauche de l'autre ; pour atteindre sa joue droite, il faut le frapper du revers de la main. Ce coup du revers était le geste du mépris, la main qu'un maître levait sur un serviteur : une insulte, plus qu'un coup pour blesser. La parole vise donc l'affront et l'humiliation, là où l'atteinte touche l'honneur plus que le corps.</p>
      <p>Tendre l'autre joue, c'est présenter la gauche : s'offrir à un second coup au lieu de rendre le premier. Le disciple se montre prêt à subir l'affront une fois de plus plutôt que de le retourner. Là est le but : ne pas entrer dans l'engrenage de l'offense. Celui qui rend l'insulte reçue relance la querelle et se laisse mener par celui qui l'a frappé ; celui qui tend l'autre joue interrompt cette chaîne et reste libre, maître de sa réponse au lieu d'obéir à son agresseur.</p>
      <h2>Le sens de la parole</h2>
      <p>Cette parole atteint d'abord le cœur. Elle demande au disciple de renoncer à se venger, d'accepter de souffrir un tort plutôt que de le rendre, de ne pas se faire justice à soi-même. Elle ne supprime pas pour autant la justice : l'autorité garde le devoir de punir le crime et de protéger l'innocent, et nul n'est tenu de livrer un faible aux coups d'un violent au nom de la douceur. Tendre l'autre joue engage la manière dont on répond à l'offense reçue en sa propre personne, non l'abandon de ceux qu'on a charge de défendre.</p>
      <h2>L'exemple du Christ</h2>
      <p>Le Christ lui-même montre comment l'entendre. À son procès, lorsqu'un garde le frappe au visage, il ne se tait pas et ne tend pas l'autre joue à la lettre, mais répond avec dignité : <em>« Si j'ai mal parlé, montre ce que j'ai dit de mal ; mais si j'ai bien parlé, pourquoi me frappes-tu ? »</em> <span class="ref">Jean 18:23</span> Il ne rend pas le coup, et il ne laisse pas non plus l'injustice sans réponse : il la nomme, sans la venger. L'Écriture dira de lui qu'insulté, il ne rendait pas l'insulte : <em>« Maltraité, il ne menaçait pas, mais s'en remettait à celui qui juge avec justice. »</em> <span class="ref">1 Pierre 2:23</span> Tendre l'autre joue se règle sur lui : porter l'offense sans la retourner, en restant debout dans la vérité.</p>
      <h2>Laisser à Dieu la vengeance</h2>
      <p>Renoncer à se venger ne livre pas le tort à l'oubli : le disciple le remet à Dieu, seul juge assez juste pour le redresser. <em>« Ne vous vengez pas vous-mêmes ; il est écrit : À moi la vengeance, c'est moi qui rétribuerai, dit le Seigneur. »</em> <span class="ref">Romains 12:19</span> Il ne se résigne pas au mal, il le combat par les armes opposées : <em>« Ne te laisse pas vaincre par le mal, mais sois vainqueur du mal par le bien. »</em> <span class="ref">Romains 12:21</span> Le bien opposé au mal brise la chaîne que la vengeance entretiendrait.</p>
      <h2>Pour être fils du Père</h2>
      <p>Le terme de cette parole est la ressemblance avec Dieu. Quelques lignes plus loin, le Christ élargit le commandement jusqu'à l'ennemi : <em>« Aimez vos ennemis, priez pour ceux qui vous persécutent. »</em> <span class="ref">Matthieu 5:44</span> Et il en donne la raison : agir ainsi rend semblable au Père, qui fait du bien sans séparer les bons des méchants. <em>« Afin que vous soyez les fils de votre Père qui est dans les cieux, car il fait lever son soleil sur les méchants et sur les bons. »</em> <span class="ref">Matthieu 5:45</span> Celui qui ne rend pas le mal imite la patience de Dieu envers les pécheurs, et s'approche de la mesure qu'il leur propose : <em>« Soyez parfaits comme votre Père céleste est parfait. »</em> <span class="ref">Matthieu 5:48</span></p>

      <p>Élie est le grand prophète du royaume du Nord, au temps où le roi Achab et la reine Jézabel ont entraîné Israël à servir Baal. Son nom même, en hébreu <em>Eliyahu</em> (<span dir="rtl">אֵלִיָּהוּ</span>), signifie « le Seigneur est mon Dieu », et dément à lui seul le faux dieu qu'on adore alors. Sur le mont Carmel, Élie vient de l'emporter avec éclat : il a défié seul les prophètes de Baal, et le feu du Seigneur est tombé du ciel sur son sacrifice, devant tout le peuple. Mais Jézabel jure sa mort. Le prophète qui avait tenu tête à tout un royaume prend peur et s'enfuit au désert. C'est là, puis sur la montagne de Dieu, que se joue la scène.</p>
      <h2>Sous le genêt</h2>
      <p>Au désert, Élie s'assied sous un genêt et demande à mourir : <em>« C'en est assez ! Maintenant, Seigneur, prends ma vie, car je ne suis pas meilleur que mes pères. »</em> <span class="ref">1 Rois 19:4</span> Le moment de cet effondrement étonne, car Élie fuit juste après la plus grande victoire de sa vie : il vient de voir le feu tomber du ciel, le peuple crier que le Seigneur est Dieu, les prophètes de Baal mis à mort. Un homme qui a obtenu cela ne devrait pas trembler devant la menace d'une femme. S'il s'effondre, c'est qu'une attente s'écroule : il avait cru le Carmel décisif, espéré que cette démonstration briserait la maison d'Achab et ramènerait Israël. La menace de Jézabel lui apprend que rien n'a changé, que la reine règne toujours et que la réforme est déjà morte ; en se disant pas meilleur que ses pères, il se range parmi les prophètes qui ont frappé avant lui sans rien obtenir de durable. Sa peur ne porte pas d'abord sur sa vie : c'est sa cause qu'il croit perdue. Dieu ne lui adresse pourtant aucun reproche. Il l'endort, puis envoie un ange qui le touche et lui donne à manger : <em>« Lève-toi, mange. »</em> <span class="ref">1 Rois 19:5</span> Avant de parler à son cœur, Dieu relève son corps.</p>
      <h2>Le pain du voyage</h2>
      <p>L'ange revient une seconde fois, le touche encore et lui découvre le sens de cette nourriture : <em>« Lève-toi, mange, car le chemin est trop long pour toi. »</em> <span class="ref">1 Rois 19:7</span> Soutenu par ce seul aliment, Élie marche quarante jours et quarante nuits jusqu'à l'Horeb, la montagne de Dieu. <em>« Il marcha, soutenu par cette nourriture, quarante jours et quarante nuits jusqu'à l'Horeb. »</em> <span class="ref">1 Rois 19:8</span> Un pain donné par le ciel porte un homme bien au-delà de ce qu'aucune nourriture ne peut faire, et le mène jusqu'à la montagne où Dieu se laisse trouver. L'Église y reconnaît la figure de l'Eucharistie, le pain qui nourrit l'âme et lui donne de tenir tout le long du chemin vers Dieu.</p>
      <h2>La montagne</h2>
      <p>L'Horeb est la montagne de l'Alliance, celle où Dieu avait donné sa loi à Moïse. En y montant après quarante jours de marche, comme Moïse y était demeuré quarante jours, Élie remonte à la source. Il entre dans une caverne, et la parole de Dieu lui est adressée : <em>« Que fais-tu ici, Élie ? »</em> <span class="ref">1 Rois 19:9</span> La question ne cherche pas un renseignement : elle invite le prophète à dire ce qui l'habite. Élie répond par sa plainte, son zèle pour le Seigneur, sa solitude, sa vie menacée : <em>« Je suis resté, moi seul, et ils cherchent à m'ôter la vie. »</em> <span class="ref">1 Rois 19:10</span></p>
      <h2>La voix de fin silence</h2>
      <p>Dieu fait sortir Élie et lui ordonne de se tenir sur la montagne, car il va passer. Trois forces se déchaînent alors, et dans aucune Dieu ne se trouve. Un vent violent déchire les montagnes et brise les rochers : <em>« Le Seigneur n'était pas dans le vent. »</em> Puis un tremblement de terre, puis un feu, et chaque fois la même parole : <em>« Le Seigneur n'était pas dans le tremblement de terre, ni dans le feu. »</em> <span class="ref">1 Rois 19:11-12</span> Vient enfin tout autre chose : <em>« Après le feu, le murmure d'une brise légère. »</em> <span class="ref">1 Rois 19:12</span> L'hébreu dit <em>qol demamah daqqah</em> (<span dir="rtl">קוֹל דְּמָמָה דַקָּה</span>), une voix de fin silence, le son ténu d'un calme presque sans bruit. C'est là que Dieu se tient.</p>
      <p>Le vent, le séisme et le feu sont les grandes forces par lesquelles on attend Dieu, celles qui dans l'Écriture escortent ses manifestations. En les laissant passer sans s'y trouver, il détrompe le prophète sur la manière dont il se donne. Sur le Carmel, Élie l'avait vu répondre par le feu, dans l'éclat et la puissance, et c'est encore un Dieu de feu qu'il attend ; lui-même est un prophète de feu, plein d'un zèle ardent. Or celui qui s'approche se tient dans la brise ténue, dans la douceur et le silence. Sa présence la plus intime ne se trouve pas dans le fracas qui terrifie, mais dans le souffle léger que l'on ne perçoit qu'en faisant taire tout bruit. Qui cherche Dieu dans le tumulte passe à côté de lui ; c'est au-dedans, dans le silence, qu'il se laisse rejoindre. Cette douceur où Dieu se révèle annonce de loin celle du Christ : <em>« Apprenez de moi que je suis doux et humble de cœur. »</em> <span class="ref">Matthieu 11:29</span></p>
      <p>À ce souffle, Élie se voile le visage : <em>« Élie s'enveloppa le visage de son manteau. »</em> <span class="ref">1 Rois 19:13</span> Le geste reconnaît la présence de Dieu, devant qui l'homme ne peut garder les yeux ouverts.</p>
      <h2>Sept mille</h2>
      <p>La même question revient, <em>« Que fais-tu ici, Élie ? »</em>, et le prophète redit sa plainte, mot pour mot. Toute cette plainte tenait dans un mot, répété deux fois : il est resté seul. C'est sur cette conviction que reposait son désir de mourir sous le genêt : s'il est le dernier fidèle et qu'on le traque, tout est perdu et lui avec. Dieu défait cette certitude d'une phrase : <em>« Je me réserverai en Israël sept mille hommes, tous ceux dont les genoux n'ont pas fléchi devant Baal. »</em> <span class="ref">1 Rois 19:18</span> Élie se croyait seul ; ils sont sept mille. Le prophète lisait sa situation à l'envers : là où il ne voyait que défaite et abandon, Dieu gardait en secret tout un peuple resté fidèle. La cause de Dieu ne tient jamais à un seul homme, et son œuvre ne s'éteint pas quand celui qui la porte se croit fini. Relevé de sa solitude, Élie est renvoyé vers les hommes : Dieu lui confie d'oindre des rois et de se donner un successeur, Élisée, qui prophétisera après lui.</p>
      <p>Plus tard, sur une autre montagne, Élie se tiendra de nouveau devant Dieu : auprès de Moïse, il apparaîtra dans la gloire et s'entretiendra avec le Christ transfiguré. <em>« Et voici que Moïse et Élie leur apparurent, s'entretenant avec lui. »</em> <span class="ref">Matthieu 17:3</span> Celui qui avait cherché Dieu dans le murmure de l'Horeb le contemple alors face à face dans le Fils.</p>

      <p>Jacob revient dans son pays après vingt ans passés loin de chez lui, chez son oncle Laban. Le retour l'angoisse, car il doit y retrouver Ésaü, le frère jumeau qu'il avait autrefois dépouillé : il lui avait pris son droit d'aînesse, puis, par une tromperie, la bénédiction que leur père Isaac lui réservait. La veille de leurs retrouvailles, Jacob fait passer un torrent, le Yabboq, à ses femmes, ses enfants et ses troupeaux, puis demeure seul sur l'autre rive. C'est là, dans la nuit, qu'un homme l'attaque et lutte avec lui jusqu'à l'aube.</p>
      <h2>Le combat</h2>
      <p>Le combat déroute d'abord par l'identité de celui qui l'engage. Le récit l'appelle un homme, et Jacob dira au matin avoir vu Dieu ; c'est qu'il s'agit d'un ange, l'Ange du Seigneur, en qui Dieu lui-même se rend présent et agit. L'Écriture le dira clairement : <em>« Il lutta avec l'ange et l'emporta. »</em> <span class="ref">Osée 12:5</span> Cet ange lutte avec Jacob toute la nuit : <em>« Jacob étant resté seul, un homme lutta avec lui jusqu'au lever de l'aurore. »</em> <span class="ref">Genèse 32:25</span> Or il ne parvient pas à le vaincre. Que Dieu ne puisse pas l'emporter sur un homme dit assez qu'il se retient : il agit comme un père qui lutte avec son enfant et fait exprès de le laisser gagner, retenant sa force pour que Jacob tienne bon et s'engage tout entier. Puis, d'un seul geste, il lui touche la hanche et la déboîte. L'unique coup qu'il porte atteint le point d'appui du corps, là où l'homme prend sa force pour marcher et pour lutter. Jacob continue pourtant de tenir, et lorsque le jour menace de paraître, il refuse de laisser partir celui qu'il a saisi : <em>« Je ne te laisserai point aller que tu ne m'aies béni. »</em> <span class="ref">Genèse 32:27</span> Cet homme qui avait pris la bénédiction de son père par la ruse ne la dérobe plus : il la réclame en face, et s'y agrippe.</p>
      <h2>Le nom</h2>
      <p>Au cœur du combat se joue une transformation, et elle passe par le nom. Avant de bénir Jacob, l'ange lui demande quel est son nom, et Jacob répond : <em>« Jacob. »</em> <span class="ref">Genèse 32:28</span> Dieu connaît ce nom ; s'il le lui fait dire, c'est pour que Jacob avoue qui il est. Car ce nom le résume : Jacob, en hébreu <em>Ya'aqob</em> (<span dir="rtl">יַעֲקֹב</span>), est bâti sur le mot <em>'aqeb</em> (<span dir="rtl">עָקֵב</span>), le talon, et désigne celui qui talonne, qui supplante, qui prend la place d'un autre. À sa naissance déjà, il tenait le talon de son frère jumeau ; toute sa vie ensuite, il a vécu de ruse. En prononçant son nom, il reconnaît ce qu'il a été. C'est alors seulement que Dieu lui en donne un autre : <em>« Tu ne seras plus appelé Jacob, mais Israël, car tu as lutté avec Dieu et avec les hommes, et tu as vaincu. »</em> <span class="ref">Genèse 32:29</span> Israël, en hébreu <em>Yisra'el</em> (<span dir="rtl">יִשְׂרָאֵל</span>), signifie celui qui lutte avec Dieu, ou celui que Dieu fortifie. L'homme qui se définissait par ses combats rusés contre les hommes se définit désormais par sa lutte avec Dieu. Et ce nom n'est pas seulement le sien : en renommant Jacob, Dieu fait plus que transformer un homme, il pose le commencement d'Israël, le peuple tout entier qui portera ce nom.</p>
      <h2>La blessure</h2>

      <h2>Le calme et l'instruction</h2>
      <p>Timothée veille sur l'Église d'Éphèse, troublée par de faux docteurs qui répandent des doctrines fausses et égarent des fidèles mal affermis. C'est dans ce désordre qu'est écrite la lettre. Sa première parole sur les femmes est une invitation à recevoir l'instruction : <em>« Que la femme reçoive l'instruction en silence, en toute soumission. »</em> <span class="ref">1 Timothée 2:11</span> Le mot grec rendu par « silence », <em>hésychia</em> (ἡσυχία), désigne le calme, la tranquillité. Le texte demande donc une attitude d'écoute et d'ordre, et non un mutisme. Avant d'enseigner, il faut d'abord être instruit ; à Éphèse, des femmes gagnées par l'erreur voulaient enseigner sans l'être encore.</p>

      <h2>Le voile et la tête rasée</h2>
      <p>À Corinthe, le voile était le signe de la femme honorable. Une femme respectée se couvrait la tête en public ; paraître dévoilée dans l'assemblée la rangeait, aux yeux de tous, du côté des femmes de mauvaise réputation. La tête rasée, elle, était une marque d'infamie : on rasait les esclaves, et la tonte signait le déshonneur de la femme adultère.</p>
      <p>C'est sur cet usage que repose le raisonnement de la lettre. Une femme qui prie dévoilée se met au rang de celle qu'on a tondue par honte ; et puisqu'une femme tondue est déshonorée, qu'elle se couvre plutôt la tête : <em>« Si une femme ne se voile pas, qu'elle se tonde ; mais s'il est honteux pour une femme d'être tondue ou rasée, qu'elle se voile. »</em> <span class="ref">1 Corinthiens 11:6</span> Le voile demandé est donc un signe de dignité, celui-là même qui distinguait la femme honorable.</p>
      <p>Le texte appuie enfin ce signe sur la nature elle-même, qui sépare déjà l'homme et la femme jusque dans la chevelure : <em>« La nature ne vous enseigne-t-elle pas que c'est une honte pour l'homme de porter les cheveux longs, mais que c'est une gloire pour la femme, parce que la chevelure lui a été donnée comme voile ? »</em> <span class="ref">1 Corinthiens 11:14-15</span> Les cheveux longs sont la parure de la femme et son voile naturel ; pour l'homme, ils passaient pour un déshonneur. Puisque la nature voile déjà la femme de sa chevelure, le voile qu'elle porte dans le culte prolonge ce signe.</p>

      <p>L'usage reçoit un fondement plus profond, pris dans la création : <em>« Le chef de tout homme, c'est le Christ ; le chef de la femme, c'est l'homme ; et le chef du Christ, c'est Dieu. »</em> <span class="ref">1 Corinthiens 11:3</span> Le mot grec rendu ici par « chef », <em>kephalē</em> (κεφαλή), désigne la tête, et par là la source : comme la source d'un fleuve, il dit l'origine. L'homme est l'origine de la femme, parce qu'au commencement Ève fut tirée d'Adam. Cet ordre laisse intacte l'égale dignité des deux, car le texte l'applique aussi à Dieu : le chef du Christ, c'est Dieu, le Fils recevant du Père son origine éternelle tout en lui étant égal.</p>
      <p>De là vient la parole sur la gloire : <em>« L'homme ne doit pas se couvrir la tête, parce qu'il est l'image et la gloire de Dieu ; la femme est la gloire de l'homme. »</em> <span class="ref">1 Corinthiens 11:7</span> « Gloire » désigne ici ce qui manifeste et fait rayonner : l'homme, créé à l'image de Dieu, manifeste Dieu ; la femme, tirée de l'homme, manifeste l'homme. Dans l'assemblée tournée vers Dieu, l'homme prie tête nue, parce qu'il porte directement l'image de Dieu ; la femme voile la gloire humaine dont elle est le rayonnement, afin que seule paraisse, dans la prière, la gloire de Dieu. Le voile dit cet effacement de tout éclat humain devant le Créateur.</p>
      <p>Le texte équilibre aussitôt par une parole de réciprocité : <em>« Dans le Seigneur, la femme n'est pas sans l'homme, ni l'homme sans la femme ; comme la femme a été tirée de l'homme, ainsi l'homme naît par la femme, et tout vient de Dieu. »</em> <span class="ref">1 Corinthiens 11:11-12</span> L'un est l'origine de l'autre tour à tour, et tous deux sont également faits à l'image de Dieu.</p>
      <h2>Un signe d'autorité, devant les anges</h2>
      <p>Le texte nomme enfin le voile d'un mot surprenant : <em>« La femme doit avoir sur la tête une marque d'autorité, à cause des anges. »</em> <span class="ref">1 Corinthiens 11:10</span> Le mot grec rendu ici par « marque d'autorité », <em>exousia</em> (ἐξουσία), dit le pouvoir : littéralement, la femme porte une autorité sur la tête. Cette autorité est la sienne : le voile est le signe du pouvoir qui lui est reconnu de prier et de prophétiser dans l'assemblée. Le texte l'a rappelé plus haut : la femme y prie et y prophétise ; le voile marque sa dignité de participante au culte, celle qui se tient et prend la parole devant Dieu au milieu de tous.</p>
      <p>Reste le motif le plus énigmatique : à cause des anges. Les anges assistent à la prière de l'Église, où la liturgie de la terre rejoint celle du ciel. Gardiens de l'ordre que Dieu a établi dans sa création, ils sont les témoins de l'assemblée en prière, et devant eux la tenue du culte honore cet ordre : ce que les hommes font dans la prière se déroule sous le regard du ciel.</p>
      <h2>Le principe et la coutume</h2>
      <p>Ces signes éclairés, on peut distinguer ce qui demeure de ce qui passe. La forme concrète, le voile, la tête couverte ou nue, la longueur des cheveux, tenait aux usages d'un temps et d'un lieu : elle disait alors la dignité, la pudeur et l'ordre reçu de Dieu. Ces usages ont changé, et l'Église n'impose plus le voile comme une loi. Le texte lui-même n'en faisait pas une règle absolue : <em>« Si quelqu'un se plaît à contester, nous n'avons pas cette habitude, ni les Églises de Dieu. »</em> <span class="ref">1 Corinthiens 11:16</span></p>
      <p>Ce que le passage demande de garder traverse les siècles : honorer Dieu jusque dans le corps et la tenue, recevoir la différence de l'homme et de la femme comme un don du Créateur, et les tenir ensemble tournés vers le Christ, en qui <em>« il n'y a plus ni homme ni femme, car vous êtes tous un. »</em> <span class="ref">Galates 3:28</span></p>

      <p>Le poème pose un regard sur le déroulement de la vie. Chaque chose y a son moment, et aucune saison ne dure toujours ; l'homme les traverse sans en fixer le cours, car ils lui sont donnés. Le sage observe ce qui se passe sous le soleil, la vie de l'homme dans les limites de ce monde, où les saisons tournent et reviennent. Il décrit ce qu'il voit. Quand il nomme un temps pour tuer, il constate ce que traverse l'histoire des hommes, sans ouvrir à personne le droit d'ôter la vie. La maîtrise de ces temps appartient à Dieu seul, qui les tient et les ordonne.</p>
      <h2>Le sens d'une parole difficile</h2>
      <p>Le commandement est souvent connu sous la forme « Tu ne tueras point ». En français, le mot « tuer » couvre tout fait d'ôter la vie. Le commandement, lui, vise une chose précise : le meurtre, ôter injustement la vie à un innocent. Le texte le dit exactement : <em>« Tu ne commettras pas de meurtre. »</em> <span class="ref">Exode 20:13</span> La gravité en est extrême, car la vie de l'homme porte en elle l'image de Dieu : <em>« Qui verse le sang de l'homme, par l'homme son sang sera versé ; car Dieu a fait l'homme à son image. »</em> <span class="ref">Genèse 9:6</span> Le sang de l'innocent crie vers Dieu, comme celui d'Abel monté de la terre : <em>« La voix du sang de ton frère crie de la terre jusqu'à moi. »</em> <span class="ref">Genèse 4:10</span></p>
      <p>Le poème, lui, emploie un mot plus large. Il embrasse les temps où la vie est ôtée sans qu'il y ait meurtre : dans la guerre qui défend un peuple, dans la protection de l'innocent menacé, dans l'exercice de la justice. Ces temps appartiennent à l'histoire d'un monde blessé par le péché, où la vie doit parfois être défendue au prix du sang. La parole du sage et le commandement s'accordent ainsi pleinement : l'un observe les saisons d'un monde déchu, l'autre garde inviolable la vie de l'innocent.</p>
      <h2>Toute chose belle en son temps</h2>
      <p>Une fois la parole comprise, elle prend sa place parmi les temps que Dieu ordonne. Au terme du poème, le sage en découvre la source : <em>« Il fait toute chose belle en son temps ; il a mis aussi dans leur cœur la pensée de l'éternité. »</em> <span class="ref">Ecclésiaste 3:11</span> Même les heures les plus rudes sont tenues par une main qui les rend belles à l'heure voulue, et dans le cœur de l'homme demeure le désir d'une chose qui ne passe pas.</p>
      <h2>La plénitude des temps</h2>
      <p>Ces temps trouvent leur centre dans le Christ : <em>« Lorsque vint la plénitude des temps, Dieu envoya son Fils. »</em> <span class="ref">Galates 4:4</span> En lui, le désir d'éternité reçoit sa réponse, et le temps le plus sombre du poème est traversé par Dieu lui-même. À l'heure où des hommes mettent à mort l'Innocent, sans qu'aucune parole ne l'excuse, Dieu tire de ce sang versé la guérison du monde, par la mort et la résurrection de son Fils.</p>
      <p>Le poème de l'Ecclésiaste conduit ainsi à une paix : aucune saison de la vie, même la plus rude, n'échappe à la main de Dieu. Tout a son temps, et tous les temps sont tenus par celui qui les a faits et qui, dans le Christ, les conduit vers l'éternité.</p>

      <h2>Un don gratuit</h2>
      <p>La grâce est donnée sans être due. Elle précède l'homme et le devance, sans répondre à aucun mérite : c'est Dieu qui aime et donne le premier. Là est sa nature même, que rien dans l'homme ne vient acquérir : <em>« Si c'est par grâce, ce n'est plus à cause des œuvres ; autrement la grâce ne serait plus la grâce. »</em> <span class="ref">Romains 11:6</span></p>

      <p>La grâce s'est manifestée pleinement dans le Christ, qui l'a méritée pour les hommes par sa mort et sa résurrection : <em>« La grâce de Dieu s'est manifestée, source de salut pour tous les hommes. »</em> <span class="ref">Tite 2:11</span> L'Esprit Saint la répand ensuite dans les cœurs : <em>« L'amour de Dieu a été répandu dans nos cœurs par l'Esprit Saint qui nous a été donné. »</em> <span class="ref">Romains 5:5</span> On distingue ainsi la grâce incréée, qui est Dieu lui-même se donnant en son Esprit, et la grâce créée, le don qu'il dépose dans l'âme et qui la transforme.</p>
      <h2>Les formes de la grâce</h2>
      <p>Cette grâce créée se présente sous deux modes principaux, la grâce sanctifiante et la grâce actuelle. À ces deux modes s'ajoutent les grâces propres à chaque sacrement, les charismes (dons accordés à l'un pour le bien de tous) et les grâces attachées à une vocation. Toutes sont la même libéralité de Dieu, reçue selon des manières diverses.</p>

      <p>La grâce sanctifiante est le don permanent que Dieu infuse dans l'âme et qui y demeure. Elle transforme l'homme en profondeur et l'établit dans une condition nouvelle, celle d'enfant de Dieu, né de lui par adoption, capable de vivre de la vie même de Dieu : <em>« Il nous a accordé de devenir participants de la nature divine. »</em> <span class="ref">2 Pierre 1:4</span> Elle le relève à un ordre qui dépasse sa nature : <em>« À tous ceux qui l'ont reçu, il a donné le pouvoir de devenir enfants de Dieu. »</em> <span class="ref">Jean 1:12</span></p>
      <p>Avec elle, Dieu vient lui-même habiter l'âme : la Trinité y fait sa demeure. <em>« Si quelqu'un m'aime, il gardera ma parole, et mon Père l'aimera ; nous viendrons à lui et nous ferons chez lui notre demeure. »</em> <span class="ref">Jean 14:23</span> Avec elle sont infusées les vertus théologales, la foi, l'espérance et la charité, ainsi que les dons de l'Esprit Saint : l'âme reçoit de quoi connaître, espérer et aimer Dieu au-delà de ses seules forces.</p>

      <h2>La grâce actuelle</h2>
      <p>La grâce actuelle est le secours passager que Dieu accorde pour accomplir un acte bon : elle éclaire l'intelligence et fortifie la volonté, le temps d'un choix ou d'un mouvement du cœur, puis se renouvelle selon les besoins. Dieu en est la source et agit le premier : <em>« C'est Dieu qui produit en vous le vouloir et le faire, selon son dessein bienveillant. »</em> <span class="ref">Philippiens 2:13</span> Le mouvement même par lequel l'homme se tourne vers le Christ ne vient pas de lui seul, mais de la grâce qui le devance : <em>« Nul ne peut dire : Jésus est Seigneur, si ce n'est par l'Esprit Saint. »</em> <span class="ref">1 Corinthiens 12:3</span></p>
      <p>Prévenante, elle va devant l'homme pour éveiller en lui le désir du bien ; coopérante, elle le soutient pendant qu'il agit, de sorte que son œuvre soit tout ensemble don de Dieu et acte de l'homme : <em>« Par la grâce de Dieu, je suis ce que je suis, et sa grâce envers moi n'a pas été vaine. »</em> <span class="ref">1 Corinthiens 15:10</span> Dieu ne la donne pas une fois pour toutes : il la renouvelle à chaque pas et mène lui-même à son terme l'œuvre commencée : <em>« Celui qui a commencé en vous une œuvre bonne en poursuivra l'achèvement jusqu'au jour du Christ Jésus. »</em> <span class="ref">Philippiens 1:6</span></p>
      <p>Ce secours respecte la liberté qu'il meut : Dieu touche l'âme sans la forcer, et l'homme peut y consentir ou s'y dérober : <em>« Aujourd'hui, si vous entendez sa voix, n'endurcissez pas vos cœurs. »</em> <span class="ref">Hébreux 3:15</span> Reçue et suivie, elle conduit le pécheur à la conversion et le dispose à recevoir ou à recouvrer la grâce sanctifiante.</p>

      <h2>Des vertus que Dieu infuse</h2>
      <p>Une vertu est une disposition stable à bien agir. Les vertus humaines s'acquièrent par l'exercice : à force d'actes justes ou courageux, l'homme prend en lui le pli du bien, et forme ainsi les vertus dites cardinales (de cardo, le gond), la prudence, la justice, la force et la tempérance, sur lesquelles tourne la vie morale. Les vertus théologales ne s'acquièrent pas de cette façon : elles atteignent Dieu lui-même, qui dépasse toute nature créée, et nul exercice ne saurait les produire. C'est Dieu qui les met dans l'âme, en même temps que la grâce sanctifiante : on les dit pour cela infuses. Elles relèvent d'un ordre surnaturel, c'est-à-dire de la vie propre de Dieu, à laquelle il fait participer l'homme : <em>« Il nous a accordé de devenir participants de la nature divine. »</em> <span class="ref">2 Pierre 1:4</span></p>
      <h2>Trois, pour les trois mouvements vers Dieu</h2>
      <p>Dieu est la fin que l'homme ne possède pas encore. Pour s'unir à un tel bien, il faut d'abord le connaître, puis tendre vers lui dans l'attente de l'atteindre, enfin s'y unir par amour. À ces trois mouvements répondent les trois vertus : la foi connaît Dieu, l'espérance le désire, la charité l'aime et s'unit à lui. La foi vient la première, car on n'espère ni n'aime un bien qu'on ignore ; l'espérance s'appuie sur elle ; la charité les couronne et leur donne leur achèvement, les ordonnant toutes à Dieu. Aussi est-elle la plus grande. Et tandis que la foi et l'espérance s'accompliront au ciel, l'une dans la vision, l'autre dans la possession, la charité, elle, ne passera jamais : elle demeure pour toujours.</p>
      <h2>La foi</h2>
      <p>Par la foi, l'homme croit en Dieu et tient pour vrai tout ce qu'il a révélé, parce que Dieu est la vérité même. Elle adhère à ce qu'elle ne voit pas, sur la parole de celui qui ne peut tromper : <em>« La foi est la garantie des biens que l'on espère, la preuve des réalités qu'on ne voit pas. »</em> <span class="ref">Hébreux 11:1</span></p>
      <h2>L'espérance</h2>
      <p>Par l'espérance, l'homme désire le Royaume des cieux et la vie éternelle comme son bonheur, en plaçant sa confiance dans les promesses du Christ et en s'appuyant sur le secours de l'Esprit Saint. Elle tient l'âme tournée vers le bien promis et la soutient jusqu'au bout : <em>« Car nous avons été sauvés, mais c'est en espérance. »</em> <span class="ref">Romains 8:24</span></p>
      <h2>La charité</h2>
      <p>Par la charité, l'homme aime Dieu par-dessus tout, parce qu'il est le souverain bien, et son prochain comme lui-même pour l'amour de Dieu. Le Christ en a fait le grand commandement : <em>« Tu aimeras le Seigneur ton Dieu de tout ton cœur, et ton prochain comme toi-même. »</em> <span class="ref">Matthieu 22:37-39</span> Elle donne aux autres vertus leur forme et les relie toutes dans une seule vie tournée vers Dieu : <em>« Par-dessus tout, ayez l'amour, qui est le lien de la perfection. »</em> <span class="ref">Colossiens 3:14</span></p>

      <p>La dimension visible de l'Église a une forme précise. Le Christ lui a donné une assise : il l'a bâtie sur les Apôtres, avec Pierre pour tête, et leur a donné d'enseigner, de sanctifier et de conduire le peuple en son nom. Les évêques leur succèdent, l'évêque de Rome succède à Pierre, et autour d'eux les prêtres et les diacres servent les fidèles : c'est la hiérarchie, par laquelle le Christ continue de conduire les siens. <em>« L'Esprit Saint vous a établis gardiens, pour paître l'Église de Dieu. »</em> <span class="ref">Actes 20:28</span> Trois liens visibles unissent ses membres en un seul corps : la profession d'une même foi, la célébration des mêmes sacrements, et la communion sous les pasteurs légitimes. <em>« Un seul Seigneur, une seule foi, un seul baptême. »</em> <span class="ref">Éphésiens 4:5</span> Par ces liens, l'Église se laisse reconnaître dans le monde comme une société une et visible.</p>

      <p>L'Église porte quatre traits qui la font reconnaître, professés dans le Credo. Elle est une : un seul corps, dans une même foi, les mêmes sacrements et la communion sous le successeur de Pierre, selon la prière du Christ : <em>« Que tous soient un, afin que le monde croie que tu m'as envoyé. »</em> <span class="ref">Jean 17:21</span> Elle est sainte parce que le Christ l'a aimée et s'est livré pour elle ; il la sanctifie et lui donne les moyens de conduire ses membres à la sainteté : <em>« Le Christ a aimé l'Église : il s'est livré lui-même pour elle, afin de la sanctifier. »</em> <span class="ref">Éphésiens 5:25-26</span></p>
      <p>Elle est catholique, c'est-à-dire universelle : envoyée à tous les peuples et à tous les temps, elle porte le salut au monde entier : <em>« Allez, de toutes les nations faites des disciples. »</em> <span class="ref">Matthieu 28:19</span> Elle est apostolique : elle garde la foi reçue des apôtres, et les évêques, unis au Pape, leur succèdent pour la transmettre fidèlement jusqu'à la fin des temps.</p>
      <h2>Sacrement du salut</h2>
      <p>L'Église est l'instrument par lequel le Christ donne aux hommes le salut qu'il a acquis. Elle est comme une mère qui engendre à la vie divine par le baptême et la nourrit par les sacrements et la parole de Dieu. En elle, les hommes reçoivent ce que le Christ a confié à son Église pour tous.</p>
      <p>Elle est nécessaire au salut, car le Christ a voulu qu'on vienne à lui par elle, et tout salut découle de lui par son corps. Tournée vers son achèvement, elle marche vers le jour où Dieu sera tout en tous, lorsqu'elle sera pleinement unie au Christ dans la gloire : <em>« Je vis la ville sainte, la Jérusalem nouvelle, prête comme une épouse parée pour son époux. »</em> <span class="ref">Apocalypse 21:2</span></p>
      <h2>Hors de l'Église, point de salut</h2>
      <p>Cette nécessité, la tradition l'a dite d'une formule : hors de l'Église, point de salut. Elle ne signifie pas que Dieu damne ceux qui n'ont pu la connaître, mais que tout salut vient du Christ et passe par son Corps : qui est sauvé l'est par l'Église, même sans le savoir. Ceux qui, sans faute de leur part, ignorent l'Évangile et cherchent Dieu d'un cœur droit en accomplissant sa volonté selon leur conscience peuvent obtenir la vie éternelle : ils sont ordonnés à l'Église sans lui appartenir visiblement, et le salut qui les atteint demeure celui du Christ, donné par des voies que Dieu connaît. La formule pèse donc surtout sur ceux qui savent : refuser sciemment l'Église que l'on a reconnue comme fondée par le Christ, c'est refuser le Christ lui-même. Pour tous, elle demeure la voie que le Seigneur a donnée, et nul ne peut la tenir pour facultative.</p>

      <p>La vie intime de Dieu est un échange d'amour entre les trois Personnes, donné et reçu sans fin. Cet amour est ce que Dieu est : <em>« Dieu est amour. »</em> <span class="ref">1 Jean 4:8</span></p>

      <p>L'âge de raison, aussi appelé âge de discrétion, est le moment où l'enfant acquiert l'usage de la raison : la capacité de discerner le bien du mal et d'agir en connaissance de cause. Tant qu'il ne l'a pas atteint, il ne mesure pas la portée de ses actes. L'Écriture connaît ce seuil : elle parle des tout-petits <em>« qui ne connaissent aujourd'hui ni le bien ni le mal »</em> <span class="ref">Deutéronome 1:39</span>, et décrit l'enfant grandissant <em>« jusqu'à ce qu'il sache rejeter le mal et choisir le bien »</em> <span class="ref">Isaïe 7:15</span>.</p>
      <h2>L'éveil de la raison</h2>
      <p>Avant ce seuil, l'enfant agit par impulsion, par imitation ou par habitude, sans saisir ce qu'il fait. L'usage de la raison désigne le moment où s'éveillent en lui trois capacités liées : reconnaître qu'un acte est bon ou mauvais, comprendre qu'il en est l'auteur, et délibérer avant d'agir. C'est l'éveil de la conscience, cette voix intérieure qui juge le bien et le mal. L'enfant cesse alors d'être seulement conduit : il commence à se conduire lui-même.</p>
      <h2>Le repère de sept ans</h2>
      <p>L'Église situe ce seuil vers sept ans. C'est une présomption souple : certains enfants parviennent à l'usage de la raison un peu plus tôt, d'autres un peu plus tard. Ce repère sert de règle commune, à partir de laquelle l'enfant est tenu pour responsable de ses actes. Il marque le commencement de la vie morale : le jugement continue de mûrir longtemps après, et la pleine maturité s'acquiert seulement avec les années.</p>
      <h2>La connaissance et la liberté font l'acte</h2>
      <p>Un acte n'engage son auteur que s'il est posé en connaissance et de plein gré : il faut savoir ce que l'on fait et le vouloir pour en répondre. C'est pourquoi l'enfant qui n'a pas encore l'usage de la raison ne commet pas de péché personnel, ne pouvant ni mesurer ni choisir ce qu'il fait. La responsabilité naît avec le discernement, et elle vaut dans les deux sens : devenu capable de reconnaître le bien, l'homme répond aussi du mal qu'il commet en le sachant. <em>« Celui qui sait faire le bien et ne le fait pas commet un péché. »</em> <span class="ref">Jacques 4:17</span> La gravité d'une faute dépend toujours de la connaissance et de la liberté engagées : le seuil ouvre la capacité de pécher, sans fixer d'avance le poids de chaque acte.</p>

      <p>On objecte parfois que le baptême suppose la foi, et qu'un enfant trop petit pour croire ne devrait pas le recevoir. L'Église baptise pourtant les petits enfants depuis les origines, parce que le baptême est d'abord un don de Dieu, reçu avant d'être compris.</p>
      <h2>L'enfant a besoin de la grâce</h2>
      <p>Tout homme vient au monde privé de la grâce sanctifiante, marqué par le péché originel hérité des origines. Le baptême efface ce péché et donne à l'âme la vie divine, qui fait de l'enfant un fils de Dieu. L'enfant est celui qui a le plus besoin de ce don, et l'Église le lui ouvre dès le seuil de sa vie, car la nouvelle naissance est nécessaire à tous pour entrer dans le Royaume. <em>« Nul, s'il ne naît d'eau et d'Esprit, ne peut entrer dans le royaume de Dieu. »</em> <span class="ref">Jean 3:5</span></p>

      <p>Le baptême donne gratuitement la grâce, la vie même de Dieu, avant tout mérite. Le nourrisson, qui ne peut encore rien offrir, manifeste mieux que tout autre cette gratuité : il reçoit tout par pure faveur. Attendre qu'il soit en âge de croire reviendrait à faire du salut une conquête de l'homme ; il est pur don. Le Christ lui-même ouvre son Royaume aux enfants. <em>« Laissez les enfants venir à moi, et ne les empêchez pas, car le Royaume des cieux est à ceux qui leur ressemblent. »</em> <span class="ref">Matthieu 19:14</span></p>
      <h2>La promesse est pour les enfants</h2>
      <p>Dès le premier jour de l'Église, l'annonce du salut englobe les enfants. À la Pentecôte, Pierre appelle au baptême et déclare : <em>« Car la promesse est pour vous et pour vos enfants. »</em> <span class="ref">Actes 2:39</span> Les Apôtres baptisaient d'ailleurs des maisons entières, où se trouvaient enfants et serviteurs. Ainsi le geôlier de Philippes <em>« fut baptisé, lui et tous les siens »</em> <span class="ref">Actes 16:33</span>, et de même la maison de Lydie et celle de Stéphanas.</p>
      <h2>Comme autrefois la circoncision</h2>
      <p>Dans l'Ancienne Alliance, l'enfant entrait dans le peuple de Dieu par la circoncision, reçue au huitième jour, bien avant tout acte de foi personnel. Le baptême accomplit ce signe : il unit au Christ comme la circoncision unissait à l'alliance. <em>« En lui vous avez été circoncis… ensevelis avec lui dans le baptême. »</em> <span class="ref">Colossiens 2:11-12</span> L'enfant chrétien reçoit ainsi ce que l'enfant d'Israël recevait déjà.</p>
      <h2>Baptisé dans la foi de l'Église</h2>
      <p>L'enfant ne peut pas encore croire par lui-même. Aussi est-il baptisé dans la foi de l'Église, celle de ses parents, de ses parrains et de la communauté qui l'accueille et s'engage à le faire grandir. La foi se reçoit et se transmet avant de devenir une réponse personnelle. Le baptême dépose d'ailleurs en l'enfant le germe même de la foi, vertu que Dieu infuse avec la grâce, et qui s'épanouira en acte personnel quand s'éveillera sa raison. Il est porté par elle jusqu'à ce jour, comme il est porté, dès sa naissance, par l'amour des siens. Ainsi le baptême des petits enfants ouvre la foi et l'appelle : le don de Dieu précède toujours la réponse de l'homme.</p>
