      <p>Les sacrements sont les sept signes institués par le Christ, par lesquels il communique sa grâce à ceux qui les reçoivent. Chacun emploie des éléments que l'on peut voir, toucher ou entendre : l'eau, l'huile, le pain, l'imposition des mains, les paroles prononcées. Par eux, le Christ touche la vie de l'homme à ses moments décisifs, de la naissance à la mort. L'Église en a discerné sept, tous reçus du Seigneur.</p>
      <h2>Qu'est-ce qu'un sacrement</h2>
      <p>Un sacrement est un signe efficace de la grâce : un geste visible qui produit invisiblement ce qu'il représente. L'eau du baptême lave l'âme du péché ; le pain de l'eucharistie devient le corps du Christ. Tous tirent leur force de la Passion : la grâce qu'ils communiquent a été acquise au Calvaire. L'Église y a toujours lu la figure des sacrements, dans le côté ouvert du Crucifié. <em>« Un des soldats lui transperça le côté, et aussitôt il en sortit du sang et de l'eau. »</em> <span class="ref">Jean 19:34</span></p>
      <h2>Institués par le Christ</h2>
      <p>Le Christ seul pouvait attacher la grâce à un signe, car elle vient de lui : l'Église ne crée pas les sacrements, elle administre ce qu'elle a reçu. Chacun des sept remonte à une parole ou à un geste du Seigneur. Il a baptisé par ses disciples et les a envoyés baptiser toutes les nations ; il a changé le pain en son corps à la Cène et commandé de le refaire ; il a donné aux Apôtres le pouvoir de remettre les péchés ; il a guéri les malades et confié ce geste aux siens ; il a élevé l'union de l'homme et de la femme au rang de signe de son alliance. Le commandement du baptême en donne le modèle. <em>« De toutes les nations faites des disciples, les baptisant au nom du Père et du Fils et du Saint-Esprit. »</em> <span class="ref">Matthieu 28:19</span> Et dans chaque sacrement, c'est encore lui qui agit : c'est le Christ qui baptise, qui pardonne, qui nourrit, par la main de ses ministres.</p>
      <h2>La matière, la forme et le ministre</h2>
      <p>Tout sacrement unit trois éléments. La matière est la chose sensible que l'on emploie : l'eau du baptême, l'huile de la confirmation et de l'onction, le pain et le vin de l'eucharistie, l'imposition des mains de l'ordre. La forme est faite des paroles qui fixent le sens du geste et disent ce qu'il opère ; la parole s'ajoute à l'élément, et le sacrement est là. Le ministre, enfin, accomplit le signe au nom du Christ, prêtant sa voix et ses mains à celui qui agit réellement. Réunis, ces trois font le sacrement.</p>
      <h2>Des signes qui agissent par la puissance du Christ</h2>
      <p>Le sacrement donne la grâce par le fait même qu'il est accompli, ce que la tradition appelle agir <em>ex opere operato</em>, « par le fait même de l'acte posé », parce que c'est le Christ qui agit en lui. C'est sa puissance qui le rend fécond : un ministre indigne baptise aussi validement qu'un saint, car le don vient du Christ, par la main de l'homme. <em>« Ni celui qui plante ni celui qui arrose n'est quelque chose, mais Dieu seul, qui fait croître. »</em> <span class="ref">1 Corinthiens 3:7</span></p>
      <h2>La disposition de celui qui reçoit</h2>
      <p>Le don est offert par l'acte même, et il rencontre une liberté. Du côté de celui qui reçoit, le fruit du sacrement demande un cœur ouvert, prêt à l'accueillir : la foi, le repentir, le désir de la grâce disposent à la recevoir pleinement. Un obstacle peut le retenir : qui s'approche sans foi, ou attaché au péché grave, reçoit le sacrement validement, sans en recueillir le fruit, et peut même le tourner contre lui. <em>« Celui qui mange et boit sans discerner le corps mange et boit sa propre condamnation. »</em> <span class="ref">1 Corinthiens 11:29</span> La grâce attend que l'homme lui fasse place.</p>
      <h2>La grâce et le caractère</h2>
      <p>Tout sacrement donne la grâce, à des titres divers. Chacun confère d'abord la grâce sanctifiante, cette participation à la vie de Dieu qui fait vivre l'âme, et avec elle une grâce propre, ajustée à ce qu'il accomplit : naître, être nourri, être pardonné, être envoyé. Trois sacrements impriment en outre dans l'âme un caractère, un sceau spirituel qui configure au Christ pour toujours : le baptême, la confirmation et l'ordre. <em>« Il nous a marqués de son sceau et a mis dans nos cœurs les arrhes de l'Esprit. »</em> <span class="ref">2 Corinthiens 1:22</span> Ce sceau ne s'efface jamais ; c'est pourquoi ces trois sacrements se reçoivent une seule fois.</p>
      <h2>Les sacrements de l'initiation chrétienne</h2>
      <p>Trois sacrements font naître et grandir à la vie chrétienne. Le baptême fait renaître comme enfant de Dieu et efface le péché. La confirmation donne l'Esprit Saint en plénitude, pour fortifier et envoyer témoigner. L'eucharistie nourrit de la chair et du sang du Christ et achève l'initiation. <em>« Nul, s'il ne naît d'eau et d'Esprit, ne peut entrer dans le royaume de Dieu. »</em> <span class="ref">Jean 3:5</span></p>
      <h2>Les sacrements de la guérison</h2>
      <p>Deux sacrements relèvent le chrétien blessé par le péché ou la maladie. La confession remet les péchés commis après le baptême et réconcilie avec Dieu. L'onction des malades soutient celui qu'éprouve la maladie grave, remet ses péchés et unit sa souffrance à celle du Christ. <em>« Afin que vous sachiez que le Fils de l'homme a sur la terre le pouvoir de remettre les péchés : Lève-toi, prends ton lit et va dans ta maison. »</em> <span class="ref">Matthieu 9:6</span></p>
      <h2>Les sacrements au service de la communion</h2>
      <p>Deux sacrements ordonnent au service des autres et à la mission. L'ordre établit évêques, prêtres et diacres pour conduire et sanctifier le peuple de Dieu. Le mariage unit un homme et une femme pour la vie, et fait de leur amour le signe vivant de l'union du Christ et de l'Église. <em>« Ce mystère est grand : je le dis par rapport au Christ et à l'Église. »</em> <span class="ref">Éphésiens 5:32</span> Reçus pour le bien de tous, ils bâtissent la communauté des croyants.</p>
      <h2>Les sacramentaux</h2>
      <p>À côté des sept, l'Église a institué d'autres signes sacrés, les sacramentaux : les bénédictions de personnes, de lieux et d'objets, les consécrations, l'eau bénite, les exorcismes. Ils ne confèrent pas la grâce par eux-mêmes, comme les sacrements, mais disposent à la recevoir et sanctifient les circonstances de la vie par la prière de l'Église. <em>« Tout est sanctifié par la parole de Dieu et la prière. »</em> <span class="ref">1 Timothée 4:5</span></p>
      <div class="fin-article">✦</div>
    `
  }

function articlesOrdonnes(){
  let out=[];
  for(const t of THEMES){
    const at=ARTICLES.filter(a=>a.theme===t.id);
    if(t.categories){
      const vus=new Set();
      for(const c of t.categories){ for(const id of c.arts){ const a=at.find(x=>x.id===id); if(a){out.push(a);vus.add(id);} } }
      for(const a of at) if(!vus.has(a.id)) out.push(a);
    } else out.push(...at);
  }
  return out;
}
function carteArticle(a){
  return `<a class="article-lien" href="#/article/${a.id}">
      <h3>${a.titre}</h3>
      <p>${a.resume}</p>
    </a>`;
}
function corpsDomaine(t){
  const at = ARTICLES.filter(a=>a.theme===t.id);
  const vide = `<div class="vide">Ce domaine n'a pas encore d'entrée. Les contenus s'ajoutent au fil du temps.</div>`;
  if(!t.categories){
    return at.map(carteArticle).join('') || vide;
  }
  let html='';const vus=new Set();
  for(const c of t.categories){
    const arts = c.arts.map(id=>at.find(a=>a.id===id)).filter(Boolean);
    arts.forEach(a=>vus.add(a.id));
    if(!arts.length) continue;
    if(c.nom){
      html += `<div class="sous" data-cat="${c.id}">
        <div class="sous-tete">
          <span class="sous-puce" aria-hidden="true"></span>
          <span class="sous-nom">${c.nom}</span>
          <span class="sous-chevron" aria-hidden="true">›</span>
        </div>
        <div class="sous-corps">${arts.map(carteArticle).join('')}</div>
      </div>`;
    } else {
      html += arts.map(carteArticle).join('');
    }
  }
  html += at.filter(a=>!vus.has(a.id)).map(carteArticle).join('');
  return html || vide;
}
function vueBibliotheque(params){

function router(){
  const hash = location.hash.replace(/^#/,'') || '/';
  const [chemin, query] = hash.split('?');
  const params = new URLSearchParams(query||'');
  let html, route='/', ctx='';
  if(chemin==='/'||chemin===''){ html=vueAccueil(); route='/'; }
  else if(chemin==='/bibliotheque'){ html=vueBibliotheque(params); route='/bibliotheque'; ctx='La bibliothèque'; }
  else if(chemin==='/a-propos'){ html=vueAPropos(); route='/a-propos'; }
  else if(chemin.startsWith('/article/')){
    const aid=chemin.split('/article/')[1];
    html=vueArticle(aid); route='/bibliotheque';
    const a=ARTICLES.find(x=>x.id===aid);
    if(a) ctx=`<a href="#/bibliotheque?theme=${a.theme}">${themeNom(a.theme)}</a>`;
  }
  else { html=vueIntrouvable(); }
  app.innerHTML = html;
  document.getElementById('contexte').innerHTML = ctx;
  window.scrollTo(0,0);
  document.querySelectorAll('nav.menu a').forEach(a=>{
    a.classList.toggle('actif', a.dataset.route===route);
  });
  document.getElementById('menu').classList.remove('ouvert');
  brancherDomaines(params);
}

function cascadeApparition(els){
  els.forEach((el,i)=>{
    if(!el) return;
    const d=Math.min(i*40,640);
    el.style.animation='none';
    void el.offsetHeight;
    el.style.animation='apparaitDom .45s cubic-bezier(.2,.7,.3,1) '+d+'ms both';
  });
}
function cascadeFermeture(els,fin){
  els.forEach(el=>{ if(el) el.style.animation='apparaitDomFerme .25s ease forwards'; });
  setTimeout(fin,240);
}
function ouvrirDomaine(sec){
  if(!sec||sec.classList.contains('ouvert')) return;
  sec.classList.add('ouvert');
  const sep=sec.querySelector('.dom-sep'), corps=sec.querySelector('.dom-corps');
  cascadeApparition([sep].concat([].slice.call(corps.children)));
}
function fermerDomaine(sec){
  if(!sec||!sec.classList.contains('ouvert')) return;
  const sep=sec.querySelector('.dom-sep'), corps=sec.querySelector('.dom-corps');

}
function basculerDomaine(sec){

}
function ouvrirSous(s){

function fermerSous(s){

function basculerSous(s){ s.classList.contains('ouvert') ? fermerSous(s) : ouvrirSous(s); }
function basculerTout(){
  const secs=[].slice.call(document.querySelectorAll('.dom'));
  const ouverts=secs.filter(s=>s.classList.contains('ouvert'));
  if(ouverts.length){ ouverts.forEach(fermerDomaine); }

  setTimeout(majToutLabel,10);
}
function majToutLabel(){
  const b=document.getElementById('basculerTout'); if(!b) return;
  const ouvert=[].slice.call(document.querySelectorAll('.dom')).some(s=>s.classList.contains('ouvert'));
  b.classList.toggle('actif-tout',ouvert);

}
function brancherDomaines(params){
  const b=document.getElementById('basculerTout');
  if(b){
    b.addEventListener('click',basculerTout);
    b.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); basculerTout(); }});
  }
  document.querySelectorAll('.dom-tete').forEach(t=>{
    t.addEventListener('click',()=>basculerDomaine(t.closest('.dom')));
  });
  document.querySelectorAll('.sous-tete').forEach(st=>{
    st.addEventListener('click',()=>basculerSous(st.closest('.sous')));
  });
  const theme=params&&params.get?params.get('theme'):null;
  if(theme){
    const sec=document.querySelector('.dom[data-theme="'+theme+'"]');
    if(sec){
      ouvrirDomaine(sec);
      majToutLabel();
      setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),120);

}

(function(){
  var ouvrir=document.getElementById('rech-ouvrir'),overlay=document.getElementById('rech-overlay'),
      champ=document.getElementById('rech-champ'),res=document.getElementById('rech-res'),fermer=document.getElementById('rech-fermer');
  if(!ouvrir||!overlay) return;
  function norm(s){return s.toLowerCase().replace(/[àâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[ïî]/g,'i').replace(/[ôö]/g,'o').replace(/[ùûü]/g,'u').replace(/ç/g,'c');}
  function depouiller(h){return h.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();}
  var index=ARTICLES.map(function(a){return {s:a.id,t:a.titre,th:themeNom(a.theme),r:a.resume,x:depouiller(a.contenu)};});
  index.forEach(function(a){a._n=norm(a.t+' '+a.r+' '+a.x);a._t=norm(a.t);a._r=norm(a.r);});
  function surligne(texte,termes){
    var nt=norm(texte),marks=[];
    termes.forEach(function(t){var i=0,p;while((p=nt.indexOf(t,i))>=0){marks.push([p,p+t.length]);i=p+t.length;}});
    if(!marks.length) return texte;
    marks.sort(function(a,b){return a[0]-b[0];});
    var out='',cur=0;
    marks.forEach(function(m){if(m[0]<cur)return;out+=texte.slice(cur,m[0])+'<mark>'+texte.slice(m[0],m[1])+'</mark>';cur=m[1];});
    return out+texte.slice(cur);
  }
  function extrait(a,termes){
    var src=a.r+' '+a.x,n=norm(src),pos=-1;
    termes.forEach(function(t){var p=n.indexOf(t);if(p>=0&&(pos<0||p<pos))pos=p;});
    if(pos<0)pos=0;
    var deb=Math.max(0,pos-60),fin=Math.min(src.length,pos+120);
    return (deb>0?'… ':'')+surligne(src.slice(deb,fin),termes)+(fin<src.length?' …':'');
  }
  function chercher(q){
    var termes=norm(q).split(/\s+/).filter(Boolean);
    if(!termes.length){res.innerHTML='<div class="rech-msg">Tapez un mot pour parcourir les articles.</div>';return;}
    var out=[];
    index.forEach(function(a){
      if(!termes.every(function(t){return a._n.indexOf(t)>=0;})) return;
      var sc=0;termes.forEach(function(t){if(a._t.indexOf(t)>=0)sc+=5;if(a._r.indexOf(t)>=0)sc+=2;sc+=1;});
      out.push({a:a,sc:sc});
    });
    out.sort(function(x,y){return y.sc-x.sc;});
    if(!out.length){res.innerHTML='<div class="rech-msg">Aucun résultat pour « '+q+' ».</div>';return;}
    res.innerHTML=out.slice(0,30).map(function(o){
      return '<a class="rech-item" href="#/article/'+o.a.s+'"><div class="rech-meta">'+o.a.th+'</div><div class="rech-titre">'+o.a.t+'</div><div class="rech-extrait">'+extrait(o.a,termes)+'</div></a>';
    }).join('');
  }
  function ouvre(){overlay.classList.add('ouvert');document.body.style.overflow='hidden';chercher(champ.value);setTimeout(function(){champ.focus();},40);}
  function ferme(){overlay.classList.remove('ouvert');document.body.style.overflow='';}
  ouvrir.addEventListener('click',ouvre);
  ouvrir.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();ouvre();}});
  fermer.addEventListener('click',ferme);
  fermer.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();ferme();}});
  overlay.addEventListener('click',function(e){if(e.target===overlay)ferme();});
  res.addEventListener('click',function(e){if(e.target.closest('.rech-item'))ferme();});
  champ.addEventListener('input',function(){chercher(champ.value);});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&overlay.classList.contains('ouvert'))ferme();});
})();

(function(){

  var pt=b.querySelector('.cloche-point');
  var sig=NOUVEAUTES[0].d+'|'+NOUVEAUTES.reduce(function(a,g){return a+g.items.length;},0);
  function vu(){try{return localStorage.getItem('lumen_nouv_vu');}catch(e){return null;}}
  function majPoint(){if(pt)pt.style.display=(vu()===sig?'none':'block');}
  majPoint();
  function ouvre(){ov.classList.add('ouvert');document.body.style.overflow='hidden';try{localStorage.setItem('lumen_nouv_vu',sig);}catch(e){}majPoint();}
  function ferme(){ov.classList.remove('ouvert');document.body.style.overflow='';}
  b.addEventListener('click',ouvre);
  b.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();ouvre();}});
  fe.addEventListener('click',ferme);
  ov.addEventListener('click',function(e){if(e.target===ov)ferme();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&ov.classList.contains('ouvert'))ferme();});
})();

window.addEventListener('hashchange', router);
router();
</script>
</body>
</html>
