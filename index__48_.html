      <h2>Le bon Samaritain</h2>
      <p>Un docteur de la Loi demande à Jésus qui est son prochain. Jésus raconte : un homme, tombé aux mains de brigands, gît à demi mort sur la route ; un prêtre passe et s'écarte, un lévite de même ; un Samaritain, que les Juifs méprisaient, s'arrête, panse ses plaies, le porte à l'auberge et paie pour lui. Puis Jésus retourne la question : lequel des trois s'est fait le prochain du blessé ? Le docteur répond : celui qui a exercé la miséricorde. La question n'est pas qui mérite mon amour, mais de qui je me fais proche. <em>« Va, et toi aussi fais de même. »</em> <span class="ref">Luc 10:37</span>.</p>

      <h2>La meilleure part</h2>
      <p>Reçu chez deux sœurs, Jésus voit Marthe s'affairer au service tandis que Marie se tient à ses pieds pour l'écouter. Marthe se plaint d'être seule à servir ; Jésus lui répond qu'une seule chose est nécessaire : <em>« Marie a choisi la bonne part, qui ne lui sera pas enlevée. »</em> <span class="ref">Luc 10:42</span>. Écouter le Seigneur passe avant l'agitation. Il enseigne aussi la prière persévérante : il faut prier sans se lasser et demander avec confiance, car le Père donne à ses enfants plus que tout père de la terre, jusqu'à l'Esprit Saint (Luc 11:13).</p>

      <h2>La femme courbée</h2>
      <p>Un jour de sabbat, Jésus enseigne dans une synagogue. Là se tient une femme qu'un esprit rend infirme depuis dix-huit ans : elle est toute courbée et ne peut se redresser. Jésus l'appelle et lui impose les mains : <em>« Femme, tu es délivrée de ton infirmité. »</em> <span class="ref">Luc 13:12</span>. À l'instant elle se redresse et rend gloire à Dieu. Le chef de la synagogue s'indigne qu'on guérisse le jour du sabbat et dit à la foule de venir se faire guérir l'un des six jours de travail. Jésus lui répond : <em>« Hypocrites ! Est-ce que chacun de vous, le jour du sabbat, ne détache pas de la crèche son bœuf ou son âne pour le mener boire ? Et cette fille d'Abraham, que Satan tenait liée depuis dix-huit ans, ne fallait-il pas la délivrer de ce lien le jour du sabbat ? »</em> <span class="ref">Luc 13:15-16</span>. Le chef met l'animal au-dessus d'une fille d'Abraham.</p>

      <h2>L'hydropique</h2>
      <p>Un autre sabbat, Jésus est reçu à la table d'un chef des pharisiens, et tous l'observent. Devant lui se trouve un homme atteint d'hydropisie, une accumulation d'eau qui enfle et alourdit le corps. Jésus interroge les docteurs de la Loi et les pharisiens : <em>« Est-il permis, ou non, de guérir le jour du sabbat ? »</em> <span class="ref">Luc 14:3</span>. Ils se taisent. Il prend l'homme, le guérit et le renvoie, puis revient à eux : <em>« Qui de vous, si son fils ou son bœuf tombe dans un puits, ne l'en retire aussitôt le jour du sabbat ? »</em> <span class="ref">Luc 14:5</span>. Personne ne laisserait son fils au fond d'un puits jusqu'au lendemain ; secourir un homme presse autant. <em>« Et ils ne purent rien répondre à cela. »</em> <span class="ref">Luc 14:6</span>.</p>

      <h2>Les paraboles de la miséricorde</h2>
      <p>Aux pharisiens qui lui reprochent d'accueillir les pécheurs, Jésus répond par trois récits qui disent tous le même cœur de Dieu. Un berger qui a cent brebis en perd une : il laisse les autres et court après l'égarée jusqu'à la retrouver, puis se réjouit. Une femme qui perd une pièce balaie toute la maison jusqu'à la retrouver et appelle ses voisines pour partager sa joie. Dieu agit ainsi : il cherche le pécheur perdu et se réjouit de le retrouver. Le troisième récit va plus loin. Un fils réclame sa part d'héritage, part au loin, dilapide tout et tombe dans une misère telle qu'il envie la nourriture des porcs. Réduit à rien, il reconnaît sa faute et revient vers son père, prêt à n'être qu'un serviteur. Mais le père l'aperçoit de loin, court à lui, le couvre de baisers, le revêt de la plus belle robe, lui met l'anneau au doigt et fait tuer le veau gras : il le rétablit non comme un domestique, mais comme son fils. <em>« Mon fils que voici était mort, et il est revenu à la vie ; il était perdu, et il est retrouvé. »</em> <span class="ref">Luc 15:24</span>. Le fils aîné, resté fidèle, s'indigne de cette fête : il figure ceux qui servent Dieu mais lui reprochent sa miséricorde envers les pécheurs. Le père l'appelle à se réjouir avec lui, car telle est la joie du ciel pour un seul pécheur qui revient.</p>

      <h2>Le riche et Lazare</h2>
      <p>Jésus raconte une parabole. Un homme riche festoie chaque jour, indifférent au pauvre Lazare couvert d'ulcères à sa porte. Tous deux meurent : Lazare est porté dans le sein d'Abraham, le riche se trouve dans les tourments. Un abîme infranchissable les sépare désormais. Le riche supplie qu'on prévienne ses frères ; Abraham répond qu'ils ont Moïse et les prophètes : <em>« S'ils n'écoutent pas Moïse et les prophètes, ils ne se laisseront pas convaincre même si quelqu'un ressuscite d'entre les morts. »</em> <span class="ref">Luc 16:31</span>. L'usage des biens décide du sort éternel, et le cœur fermé ne croira pas même devant un mort relevé.</p>

      <h2>L'indissolubilité du mariage</h2>
      <p>Interrogé sur le divorce, Jésus renvoie au commencement : Dieu fit l'homme et la femme et dit que les deux ne seraient qu'une seule chair (Genèse 2:24). <em>« Que l'homme ne sépare pas ce que Dieu a uni. »</em> <span class="ref">Marc 10:9</span>. Si Moïse a permis l'acte de divorce, c'est à cause de la dureté des cœurs, mais il n'en était pas ainsi à l'origine. Le Christ rend au mariage son unité première et indissoluble : l'union des époux tient de Dieu lui-même, et aucune volonté humaine ne peut la rompre.</p>

      <h2>Les dix lépreux</h2>
      <p>Sur la route de Jérusalem, dix lépreux se tiennent à distance, comme la Loi l'exigeait, et crient : <em>« Jésus, Maître, aie pitié de nous. »</em> <span class="ref">Luc 17:13</span>. Il les envoie se montrer aux prêtres, et c'est en chemin, dans l'acte d'obéir, qu'ils se trouvent purifiés. Un seul, voyant qu'il est guéri, revient sur ses pas en glorifiant Dieu et tombe aux pieds de Jésus pour le remercier ; et c'est un Samaritain, un étranger. Jésus relève l'absence des autres : <em>« Les dix n'ont-ils pas été purifiés ? Les neuf, où sont-ils ? »</em> <span class="ref">Luc 17:17</span>. Les neuf ont reçu le don sans revenir vers celui qui le donne. À celui qui revient, Jésus accorde plus que la guérison du corps : <em>« Relève-toi, ta foi t'a sauvé. »</em> <span class="ref">Luc 17:19</span>.</p>

      <h2>Le pharisien et le publicain</h2>
      <p>Jésus oppose, dans une parabole, deux hommes montés prier au Temple. Le pharisien se tient debout et prie sur lui-même : il remercie Dieu de n'être pas comme les autres, voleurs, injustes, adultères, ni comme ce publicain ; il jeûne deux fois la semaine et paie la dîme de tout. Le publicain, à distance, n'ose lever les yeux ; il se frappe la poitrine : <em>« Mon Dieu, prends pitié du pécheur que je suis. »</em> <span class="ref">Luc 18:13</span>. Le premier compte ses mérites devant Dieu, le second n'apporte que son péché et sa demande. C'est le publicain qui redescend justifié : <em>« Quiconque s'élève sera abaissé, et qui s'abaisse sera élevé. »</em> <span class="ref">Luc 18:14</span>.</p>

      <h2>La fête des Tentes</h2>
      <p>Jésus monte à Jérusalem pour la fête des Tentes, qui rappelait les quarante ans passés sous la tente au désert. Chaque jour de la fête, les prêtres puisaient de l'eau à la piscine de Siloé et la versaient sur l'autel, en mémoire de l'eau jaillie du rocher au désert, lorsque Moïse, sur l'ordre de Dieu, frappa le rocher et que l'eau en sortit pour le peuple assoiffé (Exode 17:6), et pour demander la pluie, car la fête tombait au seuil de la saison des pluies dont dépendaient les récoltes de l'année. Au dernier jour, le plus solennel, comme ce rite de l'eau atteint son sommet, Jésus se lève et s'écrie : <em>« Si quelqu'un a soif, qu'il vienne à moi et qu'il boive. »</em> <span class="ref">Jean 7:37</span>. De celui qui croit en lui, ajoute-t-il, couleront des fleuves d'eau vive, selon ce qu'avait annoncé Zacharie : <em>« En ce jour-là, des eaux vives sortiront de Jérusalem. »</em> <span class="ref">Zacharie 14:8</span>. Il se donne pour la source que le rocher et le rite annonçaient, et cette eau vive, l'évangéliste le précise, c'est l'Esprit que recevront les croyants : <em>« Cela, il le dit de l'Esprit que devaient recevoir ceux qui croient en lui. »</em> <span class="ref">Jean 7:39</span>. La foule se divise à son sujet. Les gardes envoyés pour l'arrêter reviennent sans lui, et s'en expliquent à ceux qui les avaient envoyés : <em>« Jamais homme n'a parlé comme cet homme. »</em> <span class="ref">Jean 7:46</span>.</p>

      <h2>La femme adultère</h2>
      <p>On lui amène une <a href="#/article/le-doigt-de-dieu">femme surprise en adultère</a>, pour le prendre au piège entre la Loi, qui réclame la lapidation, et la miséricorde, qui appelle au pardon. Jésus se baisse et écrit sur le sol, puis se relève : <em>« Que celui d'entre vous qui est sans péché lui jette le premier la pierre. »</em> <span class="ref">Jean 8:7</span>. Les accusateurs se retirent un à un. Resté seul avec elle, il ne la condamne pas, mais ne tait pas la faute : <em>« Va, et désormais ne pèche plus. »</em> <span class="ref">Jean 8:11</span>. La miséricorde relève sans abolir l'exigence : elle pardonne le péché et appelle à le quitter.</p>

      <h2>« Avant qu'Abraham fût, Je Suis »</h2>
      <p>Au Temple, Jésus déclare que celui qui garde sa parole ne verra jamais la mort, et qu'Abraham a tressailli de voir son jour. On s'étonne : il n'a pas cinquante ans, et il aurait vu Abraham ? Il répond : <em>« Avant qu'Abraham fût, Je Suis. »</em> <span class="ref">Jean 8:58</span>. Il reprend pour lui le nom que Dieu révéla à Moïse, <em>egō eimi</em> (ἐγώ εἰμι), « Je suis » (Exode 3:14) : il s'attribue l'existence éternelle de Dieu. On ramasse des pierres pour le lapider comme un blasphémateur, mais il se dérobe.</p>

      <h2>L'aveugle-né</h2>
      <p>Jésus rencontre un homme aveugle de naissance. Les disciples demandent qui a péché, lui ou ses parents ; Jésus écarte les deux : <em>« Ni lui ni ses parents n'ont péché, mais c'est afin que les œuvres de Dieu se manifestent en lui. »</em> <span class="ref">Jean 9:3</span>. Puis Jésus <em>« cracha à terre, fit de la boue avec sa salive, et oignit de cette boue les yeux de l'aveugle. »</em> <span class="ref">Jean 9:6</span>. La même terre servit au commencement : <em>« Dieu forma l'homme de la poussière du sol. »</em> <span class="ref">Genèse 2:7</span>. Cet homme était né privé de la vue, et le Créateur reprend la poussière pour achever en lui ce qui manquait depuis l'origine. Jésus l'envoie se laver à la piscine de Siloé, dont le nom, en hébreu <em>Shiloach</em> (שִׁלֹחַ), signifie « envoyé ». Ce nom désigne le Christ, l'Envoyé du Père : l'Envoyé envoie l'aveugle aux eaux qui portent son nom. L'homme s'y lave et revient voyant ; l'eau de Siloé figure le baptême, où l'eau unie au Christ ouvre les yeux à la lumière de la foi. Conduit devant les pharisiens, il est interrogé, car Jésus avait fait la boue un jour de sabbat. Les avis se partagent : pour les uns, un homme qui ne garde pas le sabbat ne vient pas de Dieu ; pour les autres, un pécheur ne saurait accomplir de tels signes. Ils demandent à l'aveugle guéri ce qu'il en pense : <em>« C'est un prophète. »</em> <span class="ref">Jean 9:17</span>. Doutant qu'il soit né aveugle, ils convoquent ses parents, qui, par peur d'être exclus de la synagogue, se bornent à confirmer qu'il est leur fils et qu'il est né aveugle. On rappelle alors l'homme pour qu'il reconnaisse en Jésus un pécheur ; il s'en tient à ce qu'il sait : <em>« Je ne sais s'il est un pécheur ; je sais une chose : j'étais aveugle, et maintenant je vois. »</em> <span class="ref">Jean 9:25</span>. Comme ils insistent, il raisonne : Dieu n'exauce pas les pécheurs, jamais on n'a ouvert les yeux d'un aveugle-né, et si cet homme ne venait pas de Dieu, il ne pourrait rien faire. Ils répliquent : <em>« Tu es né tout entier dans le péché, et tu nous fais la leçon ! »</em> <span class="ref">Jean 9:34</span>, et ils le chassent. L'aveugle, qui savait son besoin, a reçu la vue du corps et la lumière de la foi ; les pharisiens, sûrs de voir et de savoir, refusent celui que le miracle leur montre et demeurent aveugles : <em>« Je suis venu en ce monde pour un jugement : que ceux qui ne voient pas voient, et que ceux qui voient deviennent aveugles. »</em> <span class="ref">Jean 9:39</span>. Jésus retrouve l'homme chassé et se révèle à lui comme le Fils de l'homme, celui en qui il faut croire ; l'homme se prosterne : <em>« Je crois, Seigneur. »</em> <span class="ref">Jean 9:38</span>.</p>

      <h2>Le bon Pasteur</h2>
      <p>Jésus se donne lui-même pour la porte et le pasteur des brebis : <em>« Je suis le bon pasteur. Le bon pasteur donne sa vie pour ses brebis. »</em> <span class="ref">Jean 10:11</span>. Le mercenaire fuit devant le loup, mais lui connaît les siennes et les siennes le connaissent. Il a d'autres brebis qui ne sont pas de cet enclos, les nations, et il les conduira aussi : il y aura un seul troupeau et un seul pasteur. Sa mort est un don libre : <em>« Personne ne me prend ma vie, je la donne de moi-même. »</em> <span class="ref">Jean 10:18</span>. À la fête de la Dédicace, il affirme son unité avec le Père : <em>« Moi et le Père, nous sommes un. »</em> <span class="ref">Jean 10:30</span>. On reprend des pierres ; il se retire au-delà du Jourdain.</p>

      <h2>La résurrection de Lazare</h2>
      <p>Lazare, le frère de Marthe et Marie, tombe malade et meurt. Jésus arrive à Béthanie quand il est depuis quatre jours au tombeau. À Marthe il révèle ce qu'il est : <em>« Je suis la résurrection et la vie ; celui qui croit en moi, même s'il meurt, vivra. »</em> <span class="ref">Jean 11:25</span>. Il pleure devant le tombeau, puis ordonne d'ôter la pierre et crie : <em>« Lazare, sors ! »</em> <span class="ref">Jean 11:43</span>. Le mort sort, lié de bandelettes. Ce signe, le plus grand, décide les chefs à le faire mourir. Caïphe déclare qu'il vaut mieux qu'un seul homme meure pour le peuple, sans savoir qu'il prophétise : Jésus allait mourir pour la nation, et pour rassembler dans l'unité les enfants de Dieu dispersés (Jean 11:51-52). Dès ce jour, ils résolvent sa mort, et Jésus se retire à Éphraïm.</p>

      <h2>Les enfants et le jeune homme riche</h2>
      <p>On présente à Jésus des enfants, que les disciples écartent ; il s'en indigne : <em>« Laissez les enfants venir à moi, car le Royaume de Dieu est à ceux qui leur ressemblent. »</em> <span class="ref">Marc 10:14</span>. On reçoit le Royaume non comme un dû, mais comme un don, à la manière d'un petit enfant. Un homme riche, qui garde les commandements depuis sa jeunesse, demande ce qui lui manque ; Jésus le regarda et l'aima, puis lui répondit de vendre ses biens, de les donner aux pauvres et de le suivre. L'homme s'en va triste, car il avait de grands biens. Jésus mesure alors la difficulté pour le riche d'entrer dans le Royaume, plus malaisée que pour un chameau de passer par le chas d'une aiguille ; aux disciples effrayés il assure : <em>« Ce qui est impossible aux hommes est possible à Dieu. »</em> <span class="ref">Luc 18:27</span>.</p>

      <h2>Les fils de Zébédée</h2>
      <p>Jacques et Jean, les fils de Zébédée, s'approchent et demandent à siéger l'un à sa droite, l'autre à sa gauche, dans sa gloire. Jésus répond qu'ils ne savent pas ce qu'ils demandent : <em>« Pouvez-vous boire la coupe que je vais boire ? »</em> <span class="ref">Marc 10:38</span>. La coupe, c'est sa Passion. Il leur annonce qu'ils la boiront en effet : Jacques périra par l'épée (Actes 12:2), Jean connaîtra la persécution et l'exil (Apocalypse 1:9). Ils ont ainsi part à sa Passion : <em>« Si nous souffrons avec lui, c'est pour être aussi glorifiés avec lui. »</em> <span class="ref">Romains 8:17</span>. Quant à siéger à sa droite ou à sa gauche, ce n'est pas à lui de l'accorder, mais au Père, pour ceux qu'il y a préparés. Les dix autres s'indignent contre les deux frères. Jésus les appelle tous. Chez les nations, dit-il, les chefs dominent et font sentir leur pouvoir ; parmi eux, ce sera l'inverse : <em>« Quiconque veut être grand parmi vous, qu'il se fasse votre serviteur ; et quiconque veut être le premier, qu'il se fasse l'esclave de tous. »</em> <span class="ref">Marc 10:43-44</span>. Lui-même en donne la mesure : <em>« Le Fils de l'homme est venu non pour être servi, mais pour servir, et donner sa vie en rançon pour la multitude. »</em> <span class="ref">Marc 10:45</span>. La grandeur du Royaume se mesure au service, et Jésus l'a portée jusqu'à donner sa vie.</p>

      <h2>Bartimée et Zachée</h2>
      <p>À la sortie de Jéricho, l'aveugle Bartimée mendie au bord du chemin. Apprenant que Jésus passe, il crie : <em>« Fils de David, prends pitié de moi ! »</em> <span class="ref">Marc 10:47</span>. Jésus l'appelle et lui rend la vue : <em>« Va, ta foi t'a sauvé. »</em> <span class="ref">Marc 10:52</span>. L'homme le suit sur le chemin. Dans la ville vit Zachée, chef des collecteurs d'impôts et fort riche. Au service de Rome, il lève l'impôt sur les siens et s'enrichit de ce qu'il prélève : on le tient pour un traître. Cet homme cherche à voir qui est Jésus ; trop petit pour percer la foule, il court devant et monte sur un sycomore. Jésus s'arrête sous l'arbre, l'appelle par son nom et s'invite chez lui : <em>« Zachée, descends vite, car il me faut aujourd'hui demeurer dans ta maison. »</em> <span class="ref">Luc 19:5</span>. Zachée le reçoit avec joie, tandis que la foule murmure de le voir entrer chez un pécheur. Zachée se convertit et prend un engagement : <em>« Voici, Seigneur, je donne la moitié de mes biens aux pauvres, et si j'ai fait tort à quelqu'un, je lui rends le quadruple. »</em> <span class="ref">Luc 19:8</span>. Chez celui que tous tenaient pour perdu, Jésus accomplit sa mission : <em>« Aujourd'hui le salut est entré dans cette maison, parce que lui aussi est un fils d'Abraham. Car le Fils de l'homme est venu chercher et sauver ce qui était perdu. »</em> <span class="ref">Luc 19:9-10</span>.</p>

      <h2>L'onction de Béthanie</h2>
      <p>Six jours avant la Pâque, à Béthanie, Marie répand sur Jésus un parfum de grand prix et lui essuie les pieds de ses cheveux ; la maison s'emplit de l'odeur. Judas proteste qu'on aurait pu vendre ce parfum pour les pauvres ; mais il ne parlait pas par souci des pauvres : tenant la bourse commune, il était un voleur et y puisait pour lui (Jean 12:6). Jésus défend la femme : <em>« Laisse-la : elle a gardé ce parfum pour le jour de ma sépulture. »</em> <span class="ref">Jean 12:7</span>. L'onction qui honore le Roi prépare déjà l'ensevelissement du crucifié. La table de Béthanie ouvre sur la semaine où tout va s'accomplir.</p>

      <h2>Rejeté à Nazareth</h2>
      <p>Revenu en Galilée, Jésus vient à Nazareth, où il a grandi, et lit à la synagogue la prophétie d'Isaïe sur l'envoyé que l'Esprit consacre pour annoncer la bonne nouvelle aux pauvres (Isaïe 61:1-2). Il referme le livre et déclare : <em>« Aujourd'hui s'accomplit à vos oreilles cette parole de l'Écriture. »</em> <span class="ref">Luc 4:21</span>. Ses concitoyens, qui le connaissent comme le fils du charpentier, se scandalisent. Jésus constate que <em>« nul prophète n'est bien reçu dans sa patrie »</em> <span class="ref">Luc 4:24</span>. On le pousse hors de la ville pour le précipiter du haut de l'escarpement, mais il passe au milieu d'eux et s'en va. L'année s'ouvre sur le refus des siens.</p>

      <h2>La guérison du lépreux</h2>
      <p>Un lépreux s'approche de Jésus, tombe à genoux et le supplie : <em>« Si tu le veux, tu peux me purifier. »</em> <span class="ref">Marc 1:40</span>. La lèpre retranchait alors du peuple : déclaré impur, le malade vivait à l'écart, et quiconque le touchait contractait sa souillure (Lévitique 13:45-46). Pris de compassion, Jésus étend la main et touche le lépreux, ce que nul ne faisait : <em>« Je le veux, sois purifié. »</em> <span class="ref">Marc 1:41</span>. À l'instant la lèpre le quitte. Le contact qui aurait dû rendre Jésus impur rend le lépreux pur : la pureté passe de lui au malade. Il lui ordonne de n'en rien dire et d'aller se montrer au prêtre pour offrir ce que Moïse a prescrit (Lévitique 14:2-4), afin que sa guérison soit constatée selon la Loi. L'homme proclame partout ce qui lui est arrivé, si bien que Jésus ne peut plus entrer ouvertement dans les villes.</p>

      <h2>Le pardon des péchés</h2>
      <p>À Capharnaüm, la maison où il enseigne est si pleine qu'on n'en approche plus. Quatre hommes, portant un paralytique, montent sur le toit, l'ouvrent et descendent le malade devant Jésus. Voyant leur foi, il s'adresse d'abord à l'âme : <em>« Mon enfant, tes péchés te sont pardonnés. »</em> <span class="ref">Marc 2:5</span>. Les scribes s'indignent en eux-mêmes : Dieu seul peut pardonner les péchés, et cet homme blasphème. Leur raisonnement est juste sur un point, Dieu seul pardonne, et faux sur l'autre, car celui qui parle est Dieu. Jésus connaît leur pensée et leur pose la question : qu'est-il plus facile, de dire que les péchés sont remis, ou d'ordonner à un paralytique de marcher ? L'un et l'autre dépassent l'homme ; mais le second se vérifie aux yeux de tous. <em>« Or, afin que vous sachiez que le Fils de l'homme a sur la terre le pouvoir de pardonner les péchés »</em> <span class="ref">Marc 2:10</span>, il commande au malade de se lever, de prendre son brancard et de rentrer chez lui. L'homme se lève à l'instant, et la foule, saisie, rend gloire à Dieu : <em>« Jamais nous n'avons rien vu de pareil. »</em> <span class="ref">Marc 2:12</span>. La guérison visible atteste le pardon invisible : Jésus revendique, et exerce, ce qui revient à Dieu seul.</p>

      <h2>Le maître du sabbat</h2>
      <p>Les controverses se multiplient autour du sabbat. Comme ses disciples, un jour de sabbat, arrachent des épis pour les manger, les pharisiens y voient une transgression : ce jour-là, toute œuvre était interdite. Jésus rappelle que David, affamé, mangea les pains de l'offrande réservés aux prêtres, et que les prêtres eux-mêmes accomplissent au Temple leur service ce jour-là sans être en faute (1 Samuel 21:2-7). Le sabbat est donné pour le bien de l'homme : <em>« Le sabbat a été fait pour l'homme, et non l'homme pour le sabbat. »</em> <span class="ref">Marc 2:27</span>. Jésus s'attribue alors sur ce jour une autorité que Dieu seul possède : <em>« Le Fils de l'homme est maître du sabbat. »</em> <span class="ref">Marc 2:28</span>. Mémorial de la création et de l'alliance, le sabbat vient de Dieu lui-même ; s'en dire le maître, c'est se placer au rang de celui qui l'a établi.</p>

      <p>Un autre jour de sabbat, Jésus entre dans la synagogue, où se trouve un homme dont la main droite est desséchée. Les pharisiens l'observent pour voir s'il va le guérir ce jour-là, cherchant de quoi l'accuser. Jésus appelle l'homme au milieu de l'assemblée et leur dit : <em>« Quel est celui d'entre vous qui, n'ayant qu'une brebis, si elle tombe dans une fosse le jour du sabbat, ne la prend et ne l'en retire ? Or, combien un homme ne vaut-il pas plus qu'une brebis ! Il est donc permis de faire du bien le jour du sabbat. »</em> <span class="ref">Matthieu 12:11-12</span>. Puis il ordonne à l'homme : <em>« Étends ta main. »</em> <span class="ref">Matthieu 12:13</span>. L'homme l'étend, et elle redevient saine. Le jour du sabbat fait pour le bien de l'homme, Jésus rend à un homme l'usage de sa main : celui qui s'est dit maître du sabbat l'exerce en accomplissant ce pour quoi ce jour fut donné. Les gardiens de la Loi préfèrent la règle à l'homme ; ils sortent décider la mort de Jésus (Matthieu 12:14).</p>

      <h2>La piscine de Béthesda</h2>
      <p>À l'occasion d'une fête, Jésus monte à Jérusalem. Là se trouve une piscine, Béthesda, où gît une foule d'infirmes. On croyait qu'à certains moments l'eau s'agitait, et que le premier à y descendre alors était guéri ; aussi les malades guettaient-ils ce moment. Un homme est là, paralysé depuis trente-huit ans, sans personne pour le plonger dans l'eau à temps : un autre le devance toujours. Jésus lui demande s'il veut être guéri, puis lui dit : <em>« Lève-toi, prends ton grabat et marche. »</em> <span class="ref">Jean 5:8</span>. Aussitôt l'homme est guéri. Or c'était un jour de sabbat. Au lieu de s'émerveiller qu'un infirme de trente-huit ans soit debout, les autorités ne retiennent qu'une infraction : il porte son grabat un jour de sabbat. Leur incrédulité les aveugle à l'œuvre de Dieu accomplie sous leurs yeux ; ce refus de la grâce évidente est le ressort du péché contre l'Esprit, qui les conduira bientôt à attribuer au démon les œuvres mêmes de Dieu. Jésus leur répond : <em>« Mon Père est à l'œuvre jusqu'à présent, et moi aussi je suis à l'œuvre. »</em> <span class="ref">Jean 5:17</span>. Dès lors elles cherchent d'autant plus à le faire mourir, car non seulement il violait le sabbat, mais il appelait Dieu son propre Père, se faisant l'égal de Dieu. Jésus déploie alors le mystère de son union au Père : <em>« Le Fils ne peut rien faire de lui-même, sinon ce qu'il voit faire au Père. »</em> <span class="ref">Jean 5:19</span>. Cette parole exprime leur agir commun : engendré du Père de toute éternité, le Fils reçoit tout de lui et agit avec lui, d'une seule et même puissance ; et c'est par le Fils que le Père opère toute son œuvre. Le Père aime le Fils et lui montre tout ce qu'il fait : il lui communique sa vie tout entière. Comme le Père relève les morts et donne la vie, le Fils donne la vie à qui il veut ; et le Père a remis tout jugement au Fils, <em>« afin que tous honorent le Fils comme ils honorent le Père »</em> <span class="ref">Jean 5:23</span>. Il annonce l'heure où les morts entendront la voix du Fils de Dieu et vivront, car le Fils a la vie en lui-même comme le Père a la vie en lui-même. À l'appui, il convoque quatre témoins. Jean le Baptiste d'abord : Jésus le nomme <em>« la lampe qui brûle et qui brille »</em> <span class="ref">Jean 5:35</span>, flambeau allumé pour mener à la lumière et rendre témoignage à la vérité. Ses œuvres ensuite : les miracles que le Père lui donne d'accomplir attestent, plus encore que Jean, que le Père l'a envoyé. Le Père lui-même témoigne pour son Fils. Les Écritures enfin, que ces hommes scrutent pour y trouver la vie : <em>« Ce sont elles qui rendent témoignage de moi. »</em> <span class="ref">Jean 5:39</span>. Moïse, dont ils se réclament, a écrit à son sujet : il avait annoncé qu'un prophète semblable à lui serait suscité, et que le peuple devrait l'écouter (Deutéronome 18:15-19) ; en refusant le Fils, ils renient leurs propres Écritures.</p>

      <h2>Le Sermon sur la montagne</h2>
      <p>Voyant les foules, Jésus gravit la montagne et donne la grande charte du Royaume. Il s'ouvre par ce qu'on appelle les Béatitudes, qui renversent le jugement du monde sur le bonheur. Ceux que les hommes plaignent ou négligent, Jésus les déclare heureux à cause de ce que Dieu leur réserve : aux pauvres de cœur le Royaume des cieux, aux affligés la consolation, aux doux la terre en héritage, aux affamés de justice le rassasiement, aux miséricordieux la miséricorde, aux cœurs purs la vue de Dieu, aux artisans de paix le nom de fils de Dieu. Et à ceux qu'on persécute pour la justice, il promet une grande récompense dans les cieux.</p>
      <p>Il appelle ses disciples le sel de la terre et la lumière du monde, faits pour donner goût et clarté au reste. Puis il situe son enseignement par rapport à la Loi : <em>« Je ne suis pas venu abolir, mais accomplir. »</em> <span class="ref">Matthieu 5:17</span>. Il porte chaque commandement jusqu'à sa racine, dans le cœur, d'où sortent les actes : <em>« Garde ton cœur plus que toute chose, car de lui jaillissent les sources de la vie. »</em> <span class="ref">Proverbes 4:23</span>. Au-delà du « tu ne tueras pas », la colère contre son frère est déjà un meurtre ; au-delà du « tu ne commettras pas l'adultère », le regard de convoitise est déjà un adultère. Il interdit le serment et la vengeance, et commande d'aimer ses ennemis et de prier pour ses persécuteurs, pour être fils du Père qui fait lever son soleil sur les méchants et sur les bons.</p>
      <p>Il enseigne une piété qui se cache : l'aumône, la prière et le jeûne se font dans le secret, sous le regard du seul Père. Au cœur du Sermon, il donne le Notre Père, la prière des fils. Il met en garde contre l'argent, qu'on ne peut servir en même temps que Dieu, et contre l'inquiétude : le Père qui nourrit les oiseaux et revêt les lis sait ce dont ses enfants ont besoin ; qu'ils cherchent d'abord le Royaume, et le reste leur sera donné. Il achève sur deux images. Par la porte étroite, il enseigne que le chemin de la vie est resserré et que peu le trouvent, tandis que la voie large mène à la perdition. Par la maison bâtie sur le roc, il montre que seul tient, quand viennent les pluies, celui qui écoute ses paroles et les met en pratique, à la différence de celui qui les écoute sans agir, dont la maison, posée sur le sable, s'effondre.</p>

      <h2>Les Douze</h2>
      <p>Avant de choisir les siens, Jésus gravit la montagne et passe la nuit entière en prière (Luc 6:12). Au jour, il appelle ses disciples et en choisit douze, qu'il nomme apôtres, du grec <em>apostolos</em> (ἀπόστολος), « envoyé ». Le nombre reprend celui des douze tribus d'Israël : les Douze sont le fondement du peuple renouvelé, comme les patriarches le furent de l'ancien. Il les institue pour une double charge, <em>« afin qu'ils soient avec lui, et afin de les envoyer prêcher, avec le pouvoir de chasser les démons »</em> <span class="ref">Marc 3:14-15</span> : d'abord vivre auprès de lui, puis prolonger son œuvre en son nom. Il les nomme un à un : Simon, appelé Pierre, en tête ; puis André son frère, Jacques et Jean les fils de Zébédée, Philippe et Barthélemy, Matthieu et Thomas, Jacques fils d'Alphée et Simon le Zélote, Jude et Judas Iscariote, celui qui le livrera.</p>

      <h2>Le centurion de Capharnaüm</h2>
      <p>Un centurion, officier romain à la tête d'une centaine d'hommes, a un serviteur malade, près de mourir. Il fait dire à Jésus de ne pas se déranger jusque chez lui : il ne s'en juge pas digne. Habitué à commander, il dit à l'un « va » et il va, à l'autre « viens » et il vient ; il reconnaît à la parole de Jésus la même autorité sur le mal : <em>« Dis seulement une parole, et mon serviteur sera guéri. »</em> <span class="ref">Luc 7:7</span>. Jésus s'en étonne et, se tournant vers la foule qui le suit, le donne en exemple : <em>« Je n'ai pas trouvé une si grande foi en Israël. »</em> <span class="ref">Luc 7:9</span>. Le serviteur est guéri à l'heure même. Ce païen croit à la parole seule, sans prodige sous les yeux, et précède Israël dans la foi : déjà se montrent les nations qui entreront dans le Royaume.</p>

      <h2>Le fils de la veuve de Naïm</h2>
      <p>À l'entrée de la ville de Naïm, Jésus croise un convoi funèbre : on porte en terre le fils unique d'une veuve. En ce temps-là, une veuve dépendait de ses fils pour vivre ; en perdant son unique enfant, cette femme perdait son seul soutien et se trouvait sans ressource. Pris de compassion, il lui dit : <em>« Ne pleure pas. »</em> <span class="ref">Luc 7:13</span>. Il touche le brancard, les porteurs s'arrêtent, et il commande au mort : <em>« Jeune homme, je te le dis, lève-toi. »</em> <span class="ref">Luc 7:14</span>. Le mort se redresse, se met à parler, et Jésus le rend à sa mère. C'est le premier qu'il rappelle de la mort. Le contact d'un cadavre rendait impur, et la mort ne se commande pas ; ici la vie passe de lui au mort, comme la pureté passait au lépreux. La foule, saisie de crainte, reconnaît : <em>« Un grand prophète s'est levé parmi nous, et Dieu a visité son peuple. »</em> <span class="ref">Luc 7:16</span>.</p>

      <h2>La pécheresse pardonnée</h2>
      <p>Un pharisien, Simon, reçoit Jésus à sa table. Une femme de la ville, connue pour ses péchés, entre, se tient en pleurs derrière lui, baigne ses pieds de ses larmes, les essuie de ses cheveux et les couvre de parfum. Simon se dit en lui-même que, s'il était prophète, Jésus saurait quelle femme le touche. Jésus répond à sa pensée par une parabole : de deux débiteurs, à qui l'on remet l'un une grosse dette, l'autre une petite, celui qui aimera le plus est celui à qui l'on a le plus remis. Simon ne lui a offert ni eau pour ses pieds ni baiser ; cette femme n'a cessé de les baigner et de les oindre. <em>« Ses péchés, qui sont nombreux, lui sont pardonnés, parce qu'elle a beaucoup aimé. »</em> <span class="ref">Luc 7:47</span>. Les convives s'interrogent : quel est celui-ci qui pardonne même les péchés ? Et Jésus à la femme : <em>« Ta foi t'a sauvée ; va en paix. »</em> <span class="ref">Luc 7:50</span>.</p>

      <h2>La question de Jean</h2>
      <p>Jean, dans sa prison, entend parler des œuvres du Christ. Lui qui l'avait désigné envoie alors deux de ses disciples demander : <em>« Es-tu celui qui doit venir, ou devons-nous en attendre un autre ? »</em> <span class="ref">Matthieu 11:3</span>. Jésus guérit à cette heure-là un grand nombre de malades, puis renvoie les messagers avec une réponse qui reprend les paroles par lesquelles Isaïe annonçait que Dieu lui-même viendrait sauver son peuple (Isaïe 35:4-6) : les aveugles voient, les boiteux marchent, les lépreux sont purifiés, les sourds entendent, les morts ressuscitent, et la bonne nouvelle est annoncée aux pauvres.</p>
      <p>Aux foules, ensuite, il rend témoignage à Jean. Aucun homme né d'une femme n'est plus grand que lui ; et pourtant le plus petit dans le Royaume des cieux est plus grand encore. Jean est le plus grand des hommes parce qu'il est le dernier des prophètes et qu'il a désigné le Messie présent : les autres l'avaient annoncé de loin, lui l'a montré du doigt et baptisé. Sa grandeur reste celle de la terre, et celui qui n'aura au ciel que la moindre part de gloire le dépasse déjà. Cette gloire des bienheureux, qui est de voir Dieu face à face et de vivre de sa vie, se donne en degrés selon la mesure de la charité : tous sont comblés, mais chacun selon la capacité de son amour, comme des vases de tailles inégales tous remplis à ras bord, car une étoile diffère d'une autre en éclat (1 Corinthiens 15:41).</p>
      <p>Revenant à Jean, Jésus l'identifie à une figure annoncée : une ancienne prophétie promettait le retour d'Élie avant le grand jour du Seigneur, pour ramener les cœurs des pères vers leurs fils (Malachie 3:23-24), et cet Élie attendu, c'est lui.</p>

      <h2>Le reproche aux villes</h2>
      <p>Jésus adresse alors un reproche aux villes où il avait fait le plus de miracles, parce qu'elles ne s'étaient pas converties : <em>« Malheur à toi, Chorazin ! Malheur à toi, Bethsaïde ! »</em> <span class="ref">Matthieu 11:21</span>. Si les cités païennes de Tyr et de Sidon, réputées pour leur idolâtrie, avaient vu de tels signes, elles se seraient depuis longtemps repenties sous le sac et la cendre. Et Capharnaüm, élevée jusqu'au ciel par ses privilèges, sera abaissée jusqu'au séjour des morts ; Sodome elle-même, devant pareils prodiges, subsisterait encore. Ces villes avaient reçu plus de lumière que toute autre, le Christ même agissant au milieu d'elles ; plus grande est la lumière donnée, plus lourde la responsabilité de qui s'y dérobe.</p>

      <h2>Béelzéboul et le péché contre l'Esprit</h2>
      <p>On lui amène un possédé aveugle et muet ; Jésus le guérit, et la foule s'émerveille. Mais les pharisiens prétendent qu'il chasse les démons par Béelzéboul, le prince des démons. Jésus montre l'absurdité de l'accusation : un royaume divisé contre lui-même court à la ruine, et si Satan chassait Satan, son règne s'effondrerait. <em>« Si c'est par l'Esprit de Dieu que je chasse les démons, alors le Règne de Dieu est venu jusqu'à vous. »</em> <span class="ref">Matthieu 12:28</span>. Bien plus, nul ne peut piller la maison d'un homme fort sans l'avoir d'abord lié : en délivrant les possédés, Jésus enchaîne Satan et lui arrache ses captifs. Il avertit alors d'un péché qui ne sera pas pardonné : <em>« Le blasphème contre l'Esprit ne sera pas remis. »</em> <span class="ref">Matthieu 12:31</span>. Tout péché peut être pardonné, et même l'injure contre le Fils de l'homme ; mais attribuer au démon l'œuvre manifeste de l'Esprit, c'est rejeter sciemment la grâce même qui pardonne. Ce péché demeure sans rémission, non que la miséricorde de Dieu manque, mais parce que celui qui s'y obstine se ferme à la seule main qui pourrait le relever.</p>

      <h2>La vraie famille</h2>
      <p>Comme il parle aux foules, sa mère et ses proches se tiennent au-dehors et demandent à le voir. On l'en avertit ; Jésus étend la main vers ses disciples et déclare : <em>« Voici ma mère et mes frères ; quiconque fait la volonté de mon Père qui est aux cieux, celui-là est pour moi un frère, une sœur, une mère. »</em> <span class="ref">Matthieu 12:50</span>. Cette parole révèle une parenté qui passe celle du sang : appartiennent à sa famille ceux qui accomplissent la volonté de Dieu. Et nulle ne l'a accomplie plus parfaitement que Marie, qui s'était livrée tout entière au dessein de Dieu ; mère selon la chair, elle est la première aussi selon la foi.</p>

      <h2>Les paraboles du Royaume</h2>
      <p>Jésus se met à enseigner le Royaume en paraboles, des récits tirés de la vie ordinaire dont le sens se livre à qui cherche. Le semeur jette le grain : selon le terrain, il est dévoré, brûlé, étouffé ou porte du fruit, comme la parole de Dieu selon le cœur qui la reçoit. Le grain de moutarde, la plus petite des semences, devient un arbre où les oiseaux font leur nid : le Royaume commence imperceptible et grandit au-delà de toute attente. L'ivraie pousse mêlée au bon grain, et le maître laisse croître les deux jusqu'à la moisson : la séparation des bons et des méchants est remise au jugement final. Le trésor caché dans un champ et la perle de grand prix valent qu'on vende tout pour les acquérir : le Royaume passe avant le reste. À l'écart, Jésus explique le sens à ses disciples ; aux foules il parle en images. La parabole révèle à qui s'ouvre et demeure obscure à qui se ferme, accomplissant la parole d'Isaïe sur le peuple qui regarde sans voir et entend sans comprendre (Isaïe 6:9-10).</p>

      <h2>La tempête apaisée et le démoniaque</h2>
      <p>Un soir, Jésus dit à ses disciples de passer sur l'autre rive du lac, et ils l'emmènent dans la barque. Une violente tempête se lève, les vagues la remplissent, et lui dort à l'arrière, la tête sur un coussin. Réveillé par leur frayeur, il menace le vent et la mer : <em>« Silence, tais-toi. »</em> <span class="ref">Marc 4:39</span>, et le calme se fait. Saisis, les disciples se demandent : <em>« Qui est-il, pour que même le vent et la mer lui obéissent ? »</em> <span class="ref">Marc 4:41</span>.</p>
      <p>Sur l'autre rive, au pays des Géraséniens, un homme possédé d'une foule de démons vit parmi les tombeaux, que nulle chaîne ne retient. Les démons, qui se nomment Légion « car ils sont nombreux », supplient Jésus de ne pas les chasser dans l'abîme et demandent à entrer dans un troupeau de porcs ; il le permet, et le troupeau se précipite du haut de la pente dans le lac et s'y noie. Effrayés, les gens du pays supplient Jésus de quitter leur territoire. L'homme délivré veut le suivre, mais Jésus l'envoie annoncer aux siens ce que le Seigneur a fait pour lui.</p>

      <h2>Jaïre et la femme malade</h2>
      <p>De retour, Jésus est abordé par Jaïre, un chef de la synagogue, qui se jette à ses pieds : sa fille de douze ans se meurt. Jésus le suit, pressé par la foule. En chemin, une femme malade d'une perte de sang depuis douze ans, que personne n'avait pu guérir, touche par-derrière la frange de son manteau, sûre que cela suffira. À l'instant elle est guérie, et Jésus, sentant qu'une force est sortie de lui, se retourne et la cherche. Tremblante, elle se découvre ; il lui dit : <em>« Ma fille, ta foi t'a sauvée ; va en paix. »</em> <span class="ref">Marc 5:34</span>.</p>
      <p>Pendant ce temps, on vient dire à Jaïre que sa fille est morte, qu'il est trop tard. Jésus l'affermit : <em>« Ne crains pas, crois seulement. »</em> <span class="ref">Marc 5:36</span>. Il entre avec Pierre, Jacques et Jean, écarte ceux qui pleurent en disant que l'enfant dort, prend la petite par la main et lui dit en araméen : <em>« Talitha koum »</em>, c'est-à-dire « Jeune fille, lève-toi » <span class="ref">Marc 5:41</span>. Aussitôt elle se lève et marche.</p>

      <h2>L'envoi des Douze</h2>
      <p>Jésus envoie les Douze deux par deux à travers la Galilée, leur donnant pouvoir sur les esprits impurs. Ils partent sans rien, ni pain, ni argent, ni sac, pour ne compter que sur Dieu et sur l'accueil qu'on leur fera. Ils prêchent la conversion, chassent les démons et guérissent les malades : la mission du Maître se prolonge désormais par les siens, qui agissent en son nom.</p>

      <h2>La mort du Baptiste</h2>
      <p>C'est aussi le moment où parvient la fin de Jean. Hérode l'avait fait emprisonner parce que Jean lui reprochait d'avoir pris Hérodiade, la femme de son frère. Hérode pourtant le craignait, le tenait pour un homme juste et saint, et aimait l'écouter ; Hérodiade, elle, voulait le faire périr, mais ne le pouvait, car Hérode le protégeait <span class="ref">Marc 6:19-20</span>. Elle saisit l'occasion d'un banquet : sa fille ayant dansé devant le roi et ses convives, sa danse plut à Hérode, qui promet par serment de lui donner ce qu'elle voudra ; instruite par sa mère, elle réclame la tête de Jean sur un plat. Pris au piège de son serment devant ses convives, Hérode, à regret, fait décapiter le prophète dans sa prison.</p>

      <h2>La multiplication des pains</h2>
      <p>Les Douze reviennent de mission, et les foules ne cessent d'affluer. Jésus se retire avec eux dans un lieu désert, mais la foule l'y rejoint ; pris de pitié pour ces gens « comme des brebis sans berger », il les enseigne longuement. Le soir venu, les disciples veulent les renvoyer chercher à manger ; Jésus leur répond : <em>« Donnez-leur vous-mêmes à manger. »</em> <span class="ref">Marc 6:37</span>. On ne trouve que cinq pains et deux poissons. Il les prend, lève les yeux au ciel, prononce la bénédiction, rompt les pains et les donne aux disciples pour la foule. Cinq mille hommes mangent à satiété, et l'on ramasse douze paniers pleins des morceaux qui restaient. La foule, rassasiée, veut s'emparer de lui pour le faire roi ; Jésus se retire seul dans la montagne pour prier.</p>

      <h2>La marche sur les eaux</h2>

      <h2>Le discours du Pain de vie</h2>
      <p>Le lendemain, la foule rejoint Jésus à Capharnaüm, cherchant encore du pain. Il l'avertit de ne pas travailler pour la nourriture qui se perd, mais pour celle qui demeure en vie éternelle. Comme ils réclament un signe pour croire et rappellent que leurs pères ont mangé la manne au désert, Jésus corrige : ce n'est pas Moïse, mais son Père qui donne le vrai pain du ciel, celui qui descend du ciel et donne la vie au monde. Puis il révèle quel est ce pain : <em>« Je suis le pain de vie ; celui qui vient à moi n'aura plus jamais faim. »</em> <span class="ref">Jean 6:35</span>.</p>

      <p>Le terme grec rendu ici par « Verbe », <em>logos</em> (λόγος), désigne à la fois la parole et la raison qui l'ordonne : le Fils est la Parole par laquelle le Père dit tout ce qu'il est, et par laquelle tout a été fait. Cette Parole entre dans sa création.</p>
      <p><em>« Et le Verbe s'est fait chair, et il a habité parmi nous. »</em> <span class="ref">Jean 1:14</span></p>
      <p>Le verbe grec rendu par « il a habité », <em>eskēnōsen</em> (ἐσκήνωσεν), signifie dresser sa tente. La gloire qui reposait jadis sur la Tente du désert et sur le Temple habite désormais une chair d'homme.</p>

      <h2>Le livre des origines</h2>
      <p>Matthieu commence par une généalogie qui inscrit Jésus dans l'histoire d'Israël : <em>« Livre de la généalogie de Jésus Christ, fils de David, fils d'Abraham. »</em> <span class="ref">Matthieu 1:1</span>. Il organise les noms en trois séries de quatorze générations, d'Abraham à David, de David à l'exil, de l'exil au Christ. Le compte fait entendre que toute l'attente d'Israël aboutit ici. Au fil de cette lignée d'hommes paraissent quatre femmes, Tamar, Rahab, Ruth et la femme d'Urie, dont l'histoire est marquée par l'irrégularité ou l'étrangeté : Dieu fait passer sa promesse par des chemins que les hommes n'auraient pas choisis. La liste s'achève sur Joseph, <em>« l'époux de Marie, de laquelle est né Jésus, que l'on appelle Christ »</em> <span class="ref">Matthieu 1:16</span>.</p>

      <h2>Jusqu'à Adam, jusqu'à Dieu</h2>
      <p>Luc donne lui aussi une généalogie, mais il la place après le baptême et la fait remonter en sens inverse, de Jésus vers l'origine. Elle ne s'arrête pas à Abraham : elle traverse tout le genre humain jusqu'à <em>« fils d'Adam, fils de Dieu »</em> <span class="ref">Luc 3:38</span>. Là où Matthieu présente le Messie d'Israël, Luc présente le Sauveur lié à toute la descendance d'Adam, le nouveau chef d'une humanité entière.</p>

      <h2>Le commencement de l'Évangile</h2>
      <p>Marc renonce à tout récit d'enfance et nomme d'emblée ce qui s'ouvre : <em>« Commencement de l'Évangile de Jésus Christ, Fils de Dieu. »</em> <span class="ref">Marc 1:1</span>. Le mot grec rendu par « Évangile », <em>euangelion</em> (εὐαγγέλιον), veut dire bonne nouvelle. Le premier mot de Marc donne déjà le contenu de toute la suite : ce qui commence est l'annonce du Fils de Dieu.</p>

      <h2>L'annonce à Zacharie</h2>
      <p>Luc fait précéder la naissance du Christ par celle de son précurseur. Le prêtre Zacharie offre l'encens dans le sanctuaire lorsque l'ange Gabriel lui annonce qu'Élisabeth, sa femme stérile et âgée, enfantera un fils nommé Jean, qui marchera devant le Seigneur <em>« avec l'esprit et la puissance d'Élie »</em> <span class="ref">Luc 1:17</span>. Zacharie doute de cette parole et demande un signe ; il devient muet jusqu'à l'accomplissement. Le silence imposé au père est lui-même le signe.</p>

      <h2>L'annonciation à Marie</h2>
      <p>Six mois plus tard, Gabriel est envoyé à Nazareth, vers une vierge fiancée à Joseph. Sa salutation dit déjà qui elle est : <em>« Je vous salue, comblée de grâce, le Seigneur est avec vous. »</em> <span class="ref">Luc 1:28</span>. Le mot grec rendu par « comblée de grâce », <em>kecharitōmenē</em> (κεχαριτωμένη), est un participe qui marque un état déjà accompli : Marie est, au moment où l'ange lui parle, pleinement établie dans la grâce. L'ange annonce un fils qui sera appelé Fils du Très-Haut et régnera sans fin. À la question de Marie, il répond que l'Esprit Saint la couvrira de son ombre, car <em>« rien n'est impossible à Dieu »</em> <span class="ref">Luc 1:37</span>. Elle consent : <em>« Voici la servante du Seigneur ; qu'il me soit fait selon ta parole. »</em> <span class="ref">Luc 1:38</span>. Par ce consentement, le Verbe prend chair.</p>

      <h2>La Visitation et le Magnificat</h2>
      <p>Marie se rend en hâte chez Élisabeth. À son approche, l'enfant tressaille dans le sein de sa cousine, et Élisabeth, remplie de l'Esprit, la proclame <em>« bénie entre les femmes »</em> et bienheureuse d'avoir cru <span class="ref">Luc 1:42-45</span>. Marie répond par le cantique qui chante l'œuvre de Dieu : il abaisse les puissants, élève les humbles, comble les affamés, et tient la promesse faite à Abraham.</p>
      <p><em>« Mon âme exalte le Seigneur, et mon esprit tressaille de joie en Dieu mon Sauveur. »</em> <span class="ref">Luc 1:46-47</span></p>

      <h2>Le songe de Joseph</h2>
      <p>Matthieu raconte la même venue du côté de Joseph. Voyant Marie enceinte, cet homme juste résout de la renvoyer en secret, pour ne pas l'exposer. Un ange l'en empêche en songe : l'enfant vient de l'Esprit Saint.</p>
      <p><em>« Elle enfantera un fils, et tu lui donneras le nom de Jésus, car c'est lui qui sauvera son peuple de ses péchés. »</em> <span class="ref">Matthieu 1:21</span></p>
      <p>Le nom Jésus, en hébreu <em>Yeshua</em> (<span dir="rtl">ישוע</span>), signifie « le Seigneur sauve » : le nom dit la mission. Matthieu voit là s'accomplir ce qu'avait annoncé Isaïe, l'enfant nommé Emmanuel, en hébreu <em>Immanou El</em> (<span dir="rtl">עִמָּנוּ אֵל</span>), « Dieu avec nous » (Isaïe 7:14). Joseph prend Marie chez lui et donne son nom à l'enfant.</p>

      <h2>La naissance de Jean-Baptiste</h2>
      <p>Élisabeth enfante, et le huitième jour on veut nommer l'enfant du nom de son père. Élisabeth refuse : il s'appellera Jean. Zacharie, interrogé par signes, écrit le même nom, et aussitôt sa bouche s'ouvre. Le père muet retrouve la parole pour bénir Dieu dans le cantique qui annonce la visite du Sauveur et la mission de l'enfant : <em>« Et toi, petit enfant, tu seras appelé prophète du Très-Haut, car tu marcheras devant la face du Seigneur pour préparer ses voies. »</em> <span class="ref">Luc 1:76</span>.</p>

      <h2>La naissance à Bethléem</h2>
      <p>Un recensement ordonné par César oblige Joseph à monter de Nazareth à Bethléem, la ville de David, dont il est issu. C'est là que Marie met au monde son fils.</p>
      <p><em>« Elle enfanta son fils premier-né, l'enveloppa de langes et le coucha dans une mangeoire, parce qu'il n'y avait pas de place pour eux dans la salle. »</em> <span class="ref">Luc 2:7</span></p>
      <p>Le nom de Bethléem, en hébreu <em>Beth Lehem</em> (<span dir="rtl">בֵּית לֶחֶם</span>), veut dire « maison du pain ». Celui qui se dira le pain de vie est posé à sa naissance là où l'on nourrit les bêtes. Le Verbe par qui tout fut fait entre dans le monde sans rien réclamer de ce qui revient à un roi.</p>

      <h2>L'annonce aux bergers</h2>
      <p>La première annonce de cette naissance ne va pas aux puissants mais à des bergers qui veillent la nuit. L'ange leur dit la joie : <em>« Aujourd'hui vous est né un Sauveur, qui est le Christ Seigneur. »</em> <span class="ref">Luc 2:11</span>. Puis une multitude de l'armée céleste loue Dieu : <em>« Gloire à Dieu au plus haut des cieux, et paix sur la terre aux hommes qu'il aime. »</em> <span class="ref">Luc 2:14</span>. Dieu se révèle d'abord aux petits, et leur donne pour signe un enfant couché dans une mangeoire.</p>

      <h2>La présentation au Temple</h2>
      <p>Quarante jours après la naissance, Marie et Joseph montent au Temple pour offrir le sacrifice prescrit, deux tourterelles ou deux jeunes colombes, l'offrande des pauvres (Lévitique 12:8). Le vieillard Siméon, à qui il avait été promis de voir le Messie, prend l'enfant dans ses bras et bénit Dieu : <em>« Mes yeux ont vu ton salut, lumière pour éclairer les nations et gloire d'Israël ton peuple. »</em> <span class="ref">Luc 2:30-32</span>. Il annonce à Marie la contradiction qui entourera son fils, et la part qu'elle y prendra : <em>« Et toi-même, un glaive te transpercera l'âme. »</em> <span class="ref">Luc 2:35</span>. La prophétesse Anne, survenant, rend grâce et parle de l'enfant à tous ceux qui attendaient la délivrance.</p>

      <h2>L'adoration des mages</h2>
      <p>Matthieu rapporte la venue de mages d'Orient, conduits par un astre, qui cherchent à Jérusalem le roi des Juifs qui vient de naître. Hérode, troublé, apprend des prêtres que le Messie doit naître à Bethléem (Michée 5:1). Les mages trouvent l'enfant et se prosternent : <em>« Ils lui offrirent en présent de l'or, de l'encens et de la myrrhe. »</em> <span class="ref">Matthieu 2:11</span>. L'or revient au roi, l'encens à Dieu, la myrrhe annonce déjà sa sépulture. Les nations viennent adorer celui que son propre peuple cherchera bientôt à perdre. Avertis en songe, les mages repartent par un autre chemin.</p>

      <h2>La fuite en Égypte</h2>
      <p>Hérode, joué par les mages, fait massacrer les enfants de Bethléem. Mais un ange a déjà fait fuir Joseph en Égypte avec l'enfant et sa mère. Matthieu y lit l'accomplissement d'une parole d'Osée : <em>« D'Égypte j'ai appelé mon fils. »</em> <span class="ref">Osée 11:1</span>. Comme Israël jadis, le Christ descend en Égypte et en remonte ; il refait à lui seul l'histoire de son peuple. À la mort d'Hérode, la famille revient et s'établit à Nazareth.</p>

      <h2>Jésus au Temple à douze ans</h2>
      <p>Des années cachées de Nazareth, un seul épisode est rapporté. À douze ans, monté à Jérusalem pour la Pâque, Jésus reste au Temple à l'insu de ses parents, assis parmi les docteurs. Marie lui dit leur angoisse, et il répond par ses premières paroles rapportées : <em>« Ne saviez-vous pas qu'il me faut être aux affaires de mon Père ? »</em> <span class="ref">Luc 2:49</span>. Dès l'enfance, il nomme Dieu son Père. Puis il redescend avec eux et leur reste soumis, <em>« et Jésus croissait en sagesse, en taille et en grâce, devant Dieu et devant les hommes »</em> <span class="ref">Luc 2:52</span>. Trente ans de silence à Nazareth précèdent le jour où il paraîtra au Jourdain.</p>

      <p>Le troisième chant montre le Serviteur en disciple, attentif à Dieu jour après jour. <em>« Le Seigneur m'a donné une langue de disciple, pour que je sache soutenir par ma parole celui qui faiblit. Chaque matin il éveille mon oreille pour que j'écoute comme un disciple. »</em> <span class="ref">Isaïe 50:4</span> Cette écoute le conduit à l'épreuve, qu'il accepte sans fuir. <em>« J'ai présenté mon dos à ceux qui me frappaient, et mes joues à ceux qui m'arrachaient la barbe ; je n'ai pas dérobé mon visage aux outrages et aux crachats. »</em> <span class="ref">Isaïe 50:6</span> Il tient bon parce que Dieu lui vient en aide, et tourne vers l'épreuve un visage que rien ne fait fléchir. <em>« Le Seigneur Dieu vient à mon aide : aussi ai-je rendu mon visage dur comme pierre, sachant que je ne serai pas confondu. »</em> <span class="ref">Isaïe 50:7</span> Ce visage durci vers l'épreuve, l'évangile le retrouve en Jésus, qui prend résolument le chemin de Jérusalem où l'attendent les coups et la croix.</p>

      <p>Le quatrième chant porte la figure à son sommet et en dévoile le sens. Dieu annonce d'abord la réussite et l'élévation de son Serviteur. <em>« Voici que mon serviteur réussira ; il sera haut placé, élevé, exalté à l'extrême. »</em> <span class="ref">Isaïe 52:13</span> Cette gloire annoncée passe par le rejet le plus total. <em>« Méprisé, abandonné des hommes, homme de douleurs, familier de la souffrance, il était comme celui devant qui on se voile la face. »</em> <span class="ref">Isaïe 53:3</span> Sa souffrance est celle des autres : il porte leur faute. <em>« Ce sont nos souffrances qu'il portait. Il a été transpercé à cause de nos péchés ; le châtiment qui nous donne la paix est sur lui, et par ses meurtrissures nous sommes guéris. »</em> <span class="ref">Isaïe 53:4-5</span> Il subit tout en silence, livré sans résistance. <em>« Maltraité, il s'humilie, il n'ouvre pas la bouche, comme l'agneau qu'on mène à l'abattoir. »</em> <span class="ref">Isaïe 53:7</span> Sa mort devient une offrande qui rachète, et Dieu le relève au-delà de la mort. <em>« Après les épreuves de son âme, il verra la lumière. Mon serviteur justifiera les multitudes, lui qui se chargera de leurs fautes. »</em> <span class="ref">Isaïe 53:11</span> Le chant dit son dernier mot sur le Serviteur. <em>« Il s'est dépouillé lui-même jusqu'à la mort et fut compté parmi les criminels, alors qu'il portait le péché des multitudes et intercédait pour les coupables. »</em> <span class="ref">Isaïe 53:12</span> L'Église lit dans ces pages la Passion du Christ, l'Agneau livré pour les pécheurs, qui sauve en prenant sur lui ce qui les condamnait. C'est ce chant que lisait l'Éthiopien à qui Philippe annonça Jésus.</p>

      <p>L'envoyé prend la parole et dit sa mission, scellée par l'onction de l'Esprit. <em>« L'Esprit du Seigneur Dieu est sur moi, car le Seigneur m'a oint ; il m'a envoyé porter la bonne nouvelle aux pauvres, panser les cœurs brisés, annoncer aux captifs la délivrance, et proclamer une année de grâce du Seigneur. »</em> <span class="ref">Isaïe 61:1-2</span> Cette année de grâce reprend le jubilé. <em>« Vous sanctifierez la cinquantième année et vous proclamerez la liberté dans le pays pour tous ses habitants ; chacun rentrera dans sa propriété, chacun retournera dans sa famille. »</em> <span class="ref">Lévitique 25:10</span> Ce que le jubilé accordait par intervalles, l'envoyé l'annonce pour tous et sans retour. Dans la synagogue de Nazareth, Jésus lit ce passage d'Isaïe, le referme et déclare qu'il s'accomplit ce jour même en lui : il est l'oint dont parle le prophète, et l'année de grâce s'ouvre avec lui.</p>

      <p>Ce guerrier seul, puissant pour sauver, l'Église le reconnaît dans le Christ, et le pressoir de la colère devient le jugement dernier. L'Apocalypse reprend la vision d'Isaïe : un cavalier dont le manteau est teint de sang, et qui porte le nom de Verbe de Dieu. <em>« Il foule la cuve du vin de l'ardente colère du Dieu tout-puissant. »</em> <span class="ref">Apocalypse 19:15</span> Ce que la prophétie disait du jugement de Dieu sur les nations s'accomplit dans le jugement que le Christ portera sur le mal au dernier jour, lorsqu'il rendra à chacun selon ses œuvres.</p>
      <p>La tradition a contemplé dans la même image la Passion, et l'image alors se retourne. Le rouge n'est plus le sang des ennemis, mais celui du Christ ; le pressoir n'est plus la cuve où l'on broie l'oppresseur, mais la croix où le Sauveur est broyé ; et « j'ai foulé seul, nul n'était avec moi » dit la solitude de celui qui sauve seul, abandonné des siens à l'heure de souffrir. Le guerrier qui écrase devient la grappe écrasée, et le sang dont il est couvert est celui qu'il verse pour racheter. Les deux lectures tiennent ensemble : le même qui juge le mal est celui qui s'est livré pour sauver.</p>

      <p>Quand la Syrie et le royaume du Nord se liguèrent contre Jérusalem, le roi Achaz et son peuple tremblèrent. Isaïe vint lui dire de rester calme et de s'appuyer sur Dieu seul. Tout tenait dans une parole, que porte un seul verbe hébreu, rendu par « croire » et par « tenir », <em>aman</em> (<span dir="rtl">אָמַן</span>) : <em>« Si vous ne croyez pas, vous ne tiendrez pas. »</em> <span class="ref">Isaïe 7:9</span> Croire, ici, c'est s'appuyer fermement sur Dieu comme sur un roc ; qui s'appuie ailleurs s'écroule. Achaz préféra acheter le secours de l'Assyrie, et Isaïe ne cessa d'avertir contre cette politique de la peur, qui cherche le salut auprès des grandes puissances, l'Assyrie puis l'Égypte, au lieu de le chercher en Dieu. <em>« Malheur à ceux qui descendent en Égypte pour avoir du secours, qui s'appuient sur les chevaux et ne regardent pas vers le Saint d'Israël. »</em> <span class="ref">Isaïe 31:1</span></p>
      <h2>Le signe de l'Emmanuel</h2>
      <p>Au cœur de cette crise, Isaïe offrit à Achaz un signe de la part de Dieu. Le roi le refusa, et Dieu en donna un de lui-même : <em>« Voici que la jeune femme est enceinte, elle enfantera un fils, et elle l'appellera Emmanuel. »</em> <span class="ref">Isaïe 7:14</span> Le mot hébreu rendu par « jeune femme », <em>almah</em> (<span dir="rtl">עַלְמָה</span>), désigne une jeune fille en âge d'être mère ; la version grecque des Septante le traduisit par « vierge », <em>parthenos</em> (παρθένος). Le nom de l'enfant porte la promesse : « Emmanuel », <em>Immanou-El</em> (<span dir="rtl">עִמָּנוּ אֵל</span>), signifie « Dieu avec nous ». Dans le moment où il fut donné, ce signe assurait Achaz que Dieu ne lâchait pas la maison de David : avant que l'enfant sache rejeter le mal et choisir le bien, les deux rois qui l'effrayaient auraient disparu. La parole débordait pourtant ce moment. L'Église y lit l'annonce du Christ, conçu d'une vierge, Dieu fait homme demeurant au milieu des siens, selon la parole que reprend l'évangile : <em>« On l'appellera Emmanuel, ce qui se traduit : Dieu avec nous. »</em> <span class="ref">Matthieu 1:23</span></p>
      <h2>L'enfant et le rejeton de Jessé</h2>
      <p>Deux grands oracles annoncent un roi à venir. Le premier salue la naissance d'un enfant qui portera le gouvernement et des noms qui passent la mesure d'un homme. <em>« Un enfant nous est né, un fils nous est donné ; on l'appelle Conseiller merveilleux, Dieu fort, Père éternel, Prince de la paix. »</em> <span class="ref">Isaïe 9:5</span> Le second le montre sortant de la lignée déchue de David, comme un rejeton qui pousse d'une souche coupée. <em>« Un rameau sortira de la souche de Jessé. »</em> <span class="ref">Isaïe 11:1</span> Jessé est le père de David ; le roi promis renouera la royauté à sa racine. Sur lui repose l'Esprit du Seigneur, que la tradition a dénombré en sept dons. <em>« Sur lui reposera l'Esprit du Seigneur, esprit de sagesse et d'intelligence, esprit de conseil et de force, esprit de science et de crainte du Seigneur. »</em> <span class="ref">Isaïe 11:2</span> Son règne sera celui d'une paix retrouvée, où la création réconciliée ne connaît plus la violence. <em>« Le loup habitera avec l'agneau, et un petit enfant les conduira. »</em> <span class="ref">Isaïe 11:6</span> L'Église reconnaît dans ce roi le Christ, fils de David, sur qui repose l'Esprit aux sept dons, et dont le règne de paix n'aura pas de fin.</p>
      <h2>Le reste</h2>
      <p>À travers le jugement, Isaïe tient une espérance : le châtiment ne détruira pas tout, un reste survivra et reviendra vers Dieu. Cette promesse est inscrite jusque dans le nom du premier fils d'Isaïe, qu'il emmène au-devant d'Achaz, le nom hébreu rendu par « un reste reviendra », <em>Shear-Yashoub</em> (<span dir="rtl">שְׁאָר יָשׁוּב</span>). De la masse infidèle, Dieu garde toujours un petit nombre fidèle, par lequel il reprend son œuvre. <em>« Un reste reviendra, le reste de Jacob, vers le Dieu fort. »</em> <span class="ref">Isaïe 10:21</span> Ce reste, purifié par l'épreuve, est la semence du peuple renouvelé.</p>
      <h2>La montagne du Seigneur et les nations</h2>
      <p>Le regard d'Isaïe s'élargit au-delà d'Israël, jusqu'à toutes les nations. Il voit un jour où les peuples monteront vers Jérusalem pour y apprendre la voie de Dieu, et où les armes deviendront des outils. <em>« De leurs épées ils forgeront des socs, et de leurs lances des serpes ; une nation ne lèvera plus l'épée contre une autre. »</em> <span class="ref">Isaïe 2:4</span> Les nations elles-mêmes sont sous la main de Dieu : une longue suite d'oracles annonce le jugement de Babylone, de l'Assyrie, de l'Égypte et des royaumes voisins, car le Saint d'Israël est le maître de toute la terre. Au terme, une grande vision dépasse l'histoire : Dieu prépare pour tous les peuples un festin, essuie les larmes de tous les visages et abolit la mort elle-même. <em>« Il détruira la mort pour toujours ; le Seigneur Dieu essuiera les larmes de tous les visages. »</em> <span class="ref">Isaïe 25:8</span></p>
      <h2>La délivrance de Jérusalem</h2>
      <p>Les derniers chapitres racontent l'épreuve décisive du ministère d'Isaïe. Sennachérib, roi d'Assyrie, monte contre Juda, prend ses villes et assiège Jérusalem ; le grand échanson qu'il envoie raille devant les murs le Dieu d'Israël, niant qu'il puisse sauver la ville. Le roi Ézéchias porte la menace devant Dieu dans le Temple et s'en remet à lui par la bouche d'Isaïe, qui annonce que l'Assyrien n'entrera pas dans la ville. Cette nuit-là, le camp assyrien est frappé, et Sennachérib lève le siège et s'en retourne. <em>« L'ange du Seigneur sortit et frappa dans le camp des Assyriens cent quatre-vingt-cinq mille hommes. »</em> <span class="ref">Isaïe 37:36</span> La confiance qu'Achaz avait refusée, Ézéchias l'a donnée, et Jérusalem fut sauvée.</p>
      <p>Peu après, Ézéchias tombe malade jusqu'à la mort. Isaïe lui annonce sa fin ; le roi se tourne alors vers Dieu et le supplie en pleurant. Dieu entend sa prière, et Isaïe revient lui apporter la réponse : quinze années ajoutées à sa vie. Le roi demande un signe qui lui assure sa guérison, et Dieu le lui accorde : l'ombre recule de dix degrés sur le cadran. Ayant appris sa maladie et son rétablissement, le roi de Babylone lui envoie des messagers porteurs de lettres et d'un présent ; Ézéchias leur montre alors avec orgueil tous ses trésors. Isaïe lui en fait reproche et lui annonce le jugement : ces richesses seront un jour emportées à Babylone, et ses propres fils y seront déportés. Ainsi s'ouvre déjà, au seuil du proto-Isaïe, l'horizon de l'exil que chantera la suite du livre.</p>

      <p>Une nuit, un notable juif vient trouver le Christ en secret. Nicodème est pharisien et membre du conseil, un maître respecté de la Loi. De cet entretien sort l'un des sommets de l'Évangile : il faut naître de nouveau, d'eau et d'Esprit, pour entrer dans le royaume de Dieu ; et le Fils, élevé sur la croix, donne la vie éternelle à qui croit en lui.</p>
      <h2>Venu de nuit</h2>
      <p>Nicodème s'approche de nuit, à l'écart des regards. Sa prudence trahit l'embarras d'un homme en vue qui ne veut pas se compromettre, mais aussi un cœur déjà touché. Il ouvre avec respect : <em>« Rabbi, nous savons que tu es un docteur venu de Dieu, car personne ne peut faire les miracles que tu fais, si Dieu n'est avec lui. »</em> <span class="ref">Jean 3:2</span> La nuit qu'il choisit n'est pas qu'une discrétion : elle figure l'obscurité où il se tient encore, croyant à demi, sans avoir reçu la pleine lumière. C'est de cette ombre que tout l'entretien va le tirer.</p>

      <h2>D'eau et d'Esprit</h2>
      <p>Le Christ précise alors ce qu'est cette naissance : <em>« Si un homme ne naît d'eau et d'Esprit, il ne peut entrer dans le royaume de Dieu. »</em> <span class="ref">Jean 3:5</span> L'eau et l'Esprit nomment le baptême, où l'homme reçoit une vie nouvelle, celle des enfants de Dieu. Il y a ainsi deux naissances, et deux vies : <em>« Ce qui est né de la chair est chair, et ce qui est né de l'Esprit est esprit. »</em> <span class="ref">Jean 3:6</span> La première donne d'exister ; la seconde, de vivre de la vie de Dieu et d'entrer dans son Royaume.</p>
      <h2>Le vent souffle où il veut</h2>
      <p>Cette naissance est l'œuvre de Dieu, libre et insaisissable : <em>« Le vent souffle où il veut, et tu en entends le bruit ; mais tu ne sais ni d'où il vient ni où il va. Il en est ainsi de quiconque est né de l'Esprit. »</em> <span class="ref">Jean 3:8</span> En grec, un seul mot, <em>pneuma</em> (πνεῦμα), dit le vent et l'Esprit : c'est lui qui revient dans « le vent souffle » et dans « né de l'Esprit ». On en perçoit les effets sans en maîtriser la source : nul ne se donne cette vie à soi-même, il la reçoit.</p>
      <p>Là se révèle le paradoxe de Nicodème. Maître de la Loi, versé dans les Écritures, il devrait reconnaître ce dont parle le Christ, car les prophètes avaient annoncé ce don de Dieu : <em>« Je vous donnerai un cœur nouveau, et je mettrai en vous un esprit nouveau. »</em> <span class="ref">Ézéchiel 36:26</span> Pourtant il ne comprend pas, et le Christ le lui montre : <em>« Tu es le docteur d'Israël, et tu ne sais pas ces choses ! »</em> <span class="ref">Jean 3:10</span> Nicodème veut comprendre comment cela se fait avant d'y croire ; or l'ordre est inverse. On n'attend pas d'avoir saisi cette naissance pour la recevoir : on l'accueille par la foi, et la lumière vient ensuite. Ce qui lui manque n'est pas le savoir, mais de croire celui qui parle : <em>« Si vous ne croyez pas quand je vous parle des choses terrestres, comment croirez-vous si je vous parle des choses célestes ? »</em> <span class="ref">Jean 3:12</span></p>
      <h2>Élevé comme le serpent</h2>
      <p>Pour dire comment cette vie sera donnée, le Christ rappelle un épisode du désert. Mordu par des serpents, le peuple fut sauvé en regardant un serpent de bronze que Moïse avait dressé sur une perche : <em>« Quiconque aura été mordu et le regardera, vivra. »</em> <span class="ref">Nombres 21:8</span> Ce signe annonçait le sien : <em>« Comme Moïse éleva le serpent dans le désert, il faut de même que le Fils de l'homme soit élevé, afin que quiconque croit en lui ait la vie éternelle. »</em> <span class="ref">Jean 3:14-15</span> Élevé sur la croix, le Christ guérit du venin de la mort tous ceux qui lèvent les yeux vers lui dans la foi.</p>
      <h2>Dieu a tant aimé le monde</h2>
      <p>De là vient le verset où tient tout l'Évangile : <em>« Dieu a tant aimé le monde qu'il a donné son Fils unique, afin que quiconque croit en lui ne périsse pas, mais ait la vie éternelle. »</em> <span class="ref">Jean 3:16</span> Le don du Fils ne vise pas à condamner, mais à sauver : <em>« Dieu n'a pas envoyé son Fils dans le monde pour juger le monde, mais pour que le monde soit sauvé par lui. »</em> <span class="ref">Jean 3:17</span> La croix, où le Fils est élevé, est le sommet de cet amour.</p>
      <p>L'entretien s'achève sur la lumière et l'ombre, là où il avait commencé. Le jugement n'est pas une sentence imposée du dehors : <em>« La lumière est venue dans le monde, et les hommes ont préféré les ténèbres à la lumière, parce que leurs œuvres étaient mauvaises. »</em> <span class="ref">Jean 3:19</span> Chacun se juge en venant à la lumière ou en la fuyant. Nicodème, lui, était venu de nuit ; il reparaîtra au grand jour, lorsqu'il viendra ensevelir le Christ en portant la myrrhe et l'aloès, <em>« lui qui d'abord était venu de nuit »</em> <span class="ref">Jean 19:39</span>. L'homme des ténèbres a marché vers la lumière.</p>

      <p>Au matin de sa Passion, le Christ est conduit devant Pilate, le gouverneur romain qui seul peut prononcer une condamnation à mort. Au cours de l'échange, l'accusé se révèle roi, Pilate se trouve peu à peu jugé, et, averti jusque par sa femme, il condamne contre ce qu'il sait. Il pressent la vérité sans oser la recevoir.</p>
      <h2>Es-tu le roi des Juifs ?</h2>
      <p>Pilate ouvre l'interrogatoire par la seule question qui l'intéresse, celle d'un pouvoir rival de Rome : <em>« Es-tu le roi des Juifs ? »</em> <span class="ref">Jean 18:33</span> Le Christ ne nie pas qu'il soit roi ; il en corrige aussitôt l'idée. Pilate cherche un agitateur prêt à soulever le peuple, et il a devant lui un roi d'une autre sorte, qu'aucune de ses catégories ne saisit.</p>
      <h2>Un royaume qui n'est pas d'ici</h2>
      <p><em>« Mon royaume n'est pas de ce monde. Si mon royaume était de ce monde, mes serviteurs auraient combattu pour que je ne sois pas livré ; mais maintenant, mon royaume n'est point d'ici. »</em> <span class="ref">Jean 18:36</span> La preuve qu'il en donne est simple : aucune armée ne s'est levée pour le défendre, aucune épée n'a empêché son arrestation. Pressé de dire s'il est roi, il confirme et révèle sur quoi repose son règne : <em>« Je suis venu dans le monde pour rendre témoignage à la vérité ; quiconque est de la vérité écoute ma voix. »</em> <span class="ref">Jean 18:37</span> Son règne ne s'exerce pas sur des terres, mais sur les cœurs qui se rangent du côté de la vérité. Pilate attendait un rival politique, et il entend parler d'un royaume et d'une vérité qui débordent tout ce qu'un gouverneur peut juger.</p>

      <p>À ce mot, Pilate lâche une question restée célèbre : <em>« Qu'est-ce que la vérité ? »</em> <span class="ref">Jean 18:38</span> Puis il sort sans attendre la réponse. La Vérité se tenait devant lui, faite homme, et il s'en détourne pour aller traiter l'affaire. C'est le premier signe de son drame : il pose la bonne question et refuse d'en recevoir la réponse, parce qu'elle l'engagerait. Il a pourtant compris l'essentiel, et il le dit aux accusateurs : il ne trouve en cet homme aucun motif de condamnation.</p>

      <p>Le trouble de Pilate ne cesse de croître. Pendant qu'il siège, sa femme lui fait porter un avertissement : <em>« Ne te mêle pas de l'affaire de ce juste, car aujourd'hui j'ai beaucoup souffert en songe à cause de lui. »</em> <span class="ref">Matthieu 27:19</span> Une païenne appelle Jésus « ce juste », et un songe la trouble assez pour qu'elle interrompe un procès. Quand Pilate entend ensuite que l'accusé s'est fait Fils de Dieu, sa crainte redouble : <em>« Quand Pilate entendit cette parole, il eut encore plus de peur. »</em> <span class="ref">Jean 19:8</span> Il revient l'interroger sur son origine, <em>« D'où es-tu ? »</em> <span class="ref">Jean 19:9</span>, en homme qui se demande s'il a devant lui plus qu'un homme. Le Christ se tait, et ce silence l'étonne. Ces signes l'avertissent tous d'une même chose : qu'il ne devrait pas condamner ce juste.</p>
      <h2>Tu n'aurais aucun pouvoir</h2>
      <p>Devant ce silence, Pilate s'irrite et brandit son autorité : <em>« Ne sais-tu pas que j'ai le pouvoir de te crucifier, et le pouvoir de te relâcher ? »</em> <span class="ref">Jean 19:10</span> La réponse renverse les rangs : <em>« Tu n'aurais sur moi aucun pouvoir, s'il ne t'avait été donné d'en haut ; c'est pourquoi celui qui me livre à toi est coupable d'un plus grand péché. »</em> <span class="ref">Jean 19:11</span> Le juge ne tient son pouvoir que de Dieu, et il n'en dispose pas aussi librement qu'il le croit. L'accusé, lui, reste maître de l'heure : il se livre, nul ne le lui arrache. La faute, enfin, se mesure : celui qui l'a livré pèche davantage, sans que Pilate en soit lavé pour autant.</p>
      <h2>Contre sa conscience</h2>
      <p>Tout poussait Pilate à relâcher cet homme : son propre jugement, l'avertissement de sa femme, sa peur. Une menace suffit pourtant à le faire céder : <em>« Si tu relâches cet homme, tu n'es pas l'ami de César. »</em> <span class="ref">Jean 19:12</span> Entre la vérité qu'il a entrevue et sa place auprès de l'empereur, il choisit l'empereur. Il se fait apporter de l'eau et s'en lave les mains, <em>« Je suis innocent de ce sang »</em> <span class="ref">Matthieu 27:24</span>, comme si l'on pouvait se laver d'une sentence qu'on prononce soi-même. Son hésitation ne l'excuse pas, elle l'accuse : il ne condamne pas par ignorance, mais contre ce que sa conscience, son épouse et sa propre crainte lui disaient. Et la foule obtient ce qu'elle réclame : <em>« Nous n'avons d'autre roi que César. »</em> <span class="ref">Jean 19:15</span></p>
      <p>À la fin, Pilate tient bon sur un seul point, et c'est sur la vérité qu'il avait fuie. Il fait écrire sur la croix le motif de la condamnation, et le fait inscrire en trois langues. <em>« Pilate avait rédigé un écriteau qu'il fit placer sur la croix ; il était écrit : Jésus de Nazareth, roi des Juifs. Beaucoup de Juifs le lurent, car c'était écrit en hébreu, en latin et en grec. »</em> <span class="ref">Jean 19:19-20</span> Le titre humilie les chefs qui lui ont forcé la main : il leur jette leur « roi » cloué à un gibet. Ils réclament qu'on l'adoucisse, qu'on écrive seulement qu'il s'est prétendu roi ; Pilate s'y refuse : <em>« Ce que j'ai écrit, je l'ai écrit. »</em> <span class="ref">Jean 19:22</span> Son insulte dit pourtant vrai : pour blesser ces chefs, il a dû proclamer roi celui qu'ils crucifiaient, énonçant dans les mêmes mots ce qu'il avait pressenti sans oser le recevoir. Et Dieu s'en sert : celui qui demandait ce qu'est la vérité proclame, aux trois langues du monde connu, que le condamné est roi.</p>

      <p>« Laisse les morts enterrer leurs morts » : par cette parole, le Christ place l'appel de Dieu avant toute autre obligation, fût-elle aussi sacrée que le devoir d'ensevelir son père. Il subordonne le devoir filial à Dieu, à qui rien ne peut être préféré.</p>
      <h2>La demande</h2>
      <p>Un homme que le Christ vient d'appeler à le suivre lui demande un délai : <em>« Seigneur, permets-moi d'aller d'abord enterrer mon père. »</em> <span class="ref">Matthieu 8:21</span> La requête paraît juste, et même pieuse : ensevelir un mort, son père surtout, était en Israël l'un des devoirs les plus graves, lié au commandement reçu de Dieu, <em>« Honore ton père et ta mère. »</em> <span class="ref">Exode 20:12</span> La réponse tranche pourtant net : <em>« Suis-moi, et laisse les morts enterrer leurs morts. »</em> <span class="ref">Matthieu 8:22</span> Le Christ n'accorde pas même ce délai.</p>
      <h2>Les morts qui enterrent les morts</h2>
      <p>La clé est dans les deux morts, qui ne sont pas de même sorte. Les premiers sont morts à Dieu, privés de la vie de la grâce ; les seconds sont morts de corps. L'Écriture connaît cette mort de l'âme : <em>« Vous étiez morts par vos fautes et vos péchés. »</em> <span class="ref">Éphésiens 2:1</span> Le Christ dit donc : que ceux qui n'ont pas encore la vie s'occupent déjà d'ensevelir les défunts ; toi, que j'appelle à la vie, suis-moi. La version de Luc le dit en clair : <em>« Laisse les morts enterrer leurs morts ; pour toi, va annoncer le royaume de Dieu. »</em> <span class="ref">Luc 9:60</span></p>
      <h2>Le mot « d'abord »</h2>
      <p>Tout tient dans le mot « d'abord ». L'homme ne refuse pas de suivre, il veut suivre ensuite, une fois ce devoir rempli. Or l'appel de Dieu ne souffre aucun « d'abord » : rien ne peut être mis avant lui, pas même une obligation sainte. Le Royaume est le bien suprême, et qui le diffère pour autre chose le place déjà au second rang. À l'attente que l'homme réclame, le Christ substitue une mission : annoncer le Royaume.</p>
      <h2>Qui peut l'exiger</h2>
      <p>Demander d'être préféré à son propre père, nul homme ne le pourrait sans orgueil. Le Christ le demande parce qu'il est Dieu, et Dieu seul a droit à un amour qui passe avant tous les autres : <em>« Celui qui aime son père ou sa mère plus que moi n'est pas digne de moi. »</em> <span class="ref">Matthieu 10:37</span> La parole n'abaisse pas l'amour dû aux parents, elle le remet à sa place : Dieu d'abord, et tout le reste à partir de lui. Ce que le commandement défend de retirer au père, le Christ peut le revendiquer pour lui-même, car il est plus que le père.</p>
      <p>À un autre qui veut d'abord aller faire ses adieux aux siens, le Christ répond de même, et il en donne l'image : <em>« Quiconque met la main à la charrue et regarde en arrière n'est pas propre au royaume de Dieu. »</em> <span class="ref">Luc 9:62</span> Le laboureur qui se retourne dévie son sillon ; de même, celui que le Christ appelle doit avancer sans revenir sur ce qu'il quitte.</p>
