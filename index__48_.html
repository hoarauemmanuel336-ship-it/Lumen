    date: "2026",
    contenu: `
      <p>La confession est l'un des sept sacrements de l'Église, ces signes institués par le Christ pour donner la grâce. Par elle, le baptisé reçoit de Dieu, par le ministère du <a href="#/article/l-ordre">prêtre</a>, le pardon des péchés commis depuis son baptême. On l'appelle aussi pénitence, du nom du regret qui l'anime, et réconciliation, parce qu'elle rétablit l'amitié avec Dieu que le péché avait rompue.</p>
      <h2>Un pouvoir donné par le Christ</h2>
      <p>Le soir de Pâques, le Ressuscité confie à ses apôtres un pouvoir inouï : remettre les péchés en son nom. <em>« Recevez l'Esprit Saint. Ceux à qui vous remettrez les péchés, ils leur seront remis ; ceux à qui vous les retiendrez, ils leur seront retenus. »</em> <span class="ref">Jean 20:22-23</span> Le pardon vient de Dieu seul, mais Dieu a voulu le donner par des hommes. Le prêtre ne pardonne pas en son propre nom : il agit au nom du Christ, instrument par lequel passe la miséricorde. C'est ce que Paul nomme le ministère de la réconciliation : <em>« Dieu nous a confié le ministère de la réconciliation. »</em> <span class="ref">2 Corinthiens 5:18</span> Se confesser à un prêtre, c'est recevoir le pardon là où le Christ a voulu le déposer.</p>
      <h2>Les actes du pénitent et l'absolution</h2>
      <p>Le sacrement met en jeu trois actes du pénitent. La contrition d'abord : le regret sincère de ses péchés, avec la résolution de ne plus pécher ; c'est l'acte le plus important, car sans regret il n'y a pas de pardon. La confession ensuite : l'aveu des péchés au prêtre, qui expose la blessure à la lumière pour qu'elle soit guérie. <em>« Si nous confessons nos péchés, il est fidèle et juste pour nous les pardonner. »</em> <span class="ref">1 Jean 1:9</span> La satisfaction enfin : accomplir la réparation que le prêtre demande, une prière ou une bonne œuvre, qu'on appelle <a href="#/article/la-satisfaction">la pénitence</a> et qui redresse le désordre laissé par le péché. À ces trois actes répond <a href="#/article/l-absolution">l'absolution</a> : les paroles par lesquelles le prêtre, au nom du Christ, remet les péchés.</p>
      <h2>Ce que la confession opère</h2>
      <p>L'absolution remet la faute et, avec elle, la peine éternelle : l'âme qui avait perdu la <a href="#/article/la-grace-sanctifiante">grâce</a> par un <a href="#/article/le-peche">péché mortel</a> la retrouve et redevient amie de Dieu. Demeure parfois une peine temporelle à acquitter, que la satisfaction commence à réparer et que le <a href="#/article/le-purgatoire">purgatoire</a> achève s'il le faut. Le pénitent est aussi réconcilié avec l'<a href="#/article/l-eglise">Église</a>, qu'il avait blessée par son péché, car nul ne pèche seul.</p>
      <h2>La seconde planche</h2>
      <p>Le sacrifice de la Croix a racheté une fois pour toutes les péchés de tous les hommes ; il est la source unique de tout pardon, et rien ne s'y ajoute. <em>« Par une seule offrande, il a rendu parfaits pour toujours ceux qu'il sanctifie. »</em> <span class="ref">Hébreux 10:14</span> Mais ce pardon doit atteindre chacun et être accueilli. Le <a href="#/article/le-bapteme">baptême</a> l'applique une première fois et fait renaître à la vie de Dieu. Quand le baptisé retombe ensuite dans le péché, il se coupe lui-même de la grâce reçue ; le Christ a voulu que ce même pardon de la Croix lui soit redonné par la confession. Elle n'ajoute rien au sacrifice du Christ : elle en fait passer la grâce jusqu'au pécheur qui s'en était écarté. La tradition l'appelle la seconde planche après le naufrage : à qui a fait naufrage, elle offre de regagner le rivage. Et tout ce qu'on y confie demeure protégé par le <a href="#/article/le-secret-de-la-confession">secret absolu de la confession</a>, qu'aucune raison ne peut faire rompre.</p>

    date: "2026",
    contenu: `
      <p>La primauté de Pierre est la place de chef que le Christ a donnée à l'apôtre Pierre parmi les autres apôtres et sur toute l'Église. Pierre reçoit une autorité véritable pour la gouverner : il en est le chef visible, celui qui la tient unie et autour de qui tous demeurent rassemblés. Cette charge ne meurt pas avec lui ; elle se poursuit dans le pape, qui prend sa suite.</p>
      <h2>Tu es Pierre</h2>
      <p>À Césarée, Simon confesse que Jésus est le Christ, le <a href="#/article/le-fils">Fils du Dieu vivant</a>. En réponse, Jésus lui donne un nom nouveau et une mission : <em>« Tu es Pierre, et sur cette pierre je bâtirai mon Église, et les portes de l'enfer ne prévaudront pas contre elle. »</em> <span class="ref">Matthieu 16:18</span> Le nom de Pierre, en araméen Kêphas, signifie le roc : Simon devient la pierre sur laquelle l'édifice tiendra. Puis Jésus lui remet les clés : <em>« Je te donnerai les clés du royaume des cieux. »</em> <span class="ref">Matthieu 16:19</span> Dans la Bible, détenir les clés d'une maison, c'est en avoir le gouvernement ; les clés du Royaume confèrent à Pierre l'autorité d'ouvrir et de fermer, de lier et de délier au nom du Christ.</p>
      <h2>Pais mes brebis</h2>
      <p>La promesse devient charge après la <a href="#/article/la-croix-et-la-resurrection">Résurrection</a>. Par trois fois, le Ressuscité demande à Pierre s'il l'aime, et par trois fois lui confie son troupeau : <em>« Pais mes brebis. »</em> <span class="ref">Jean 21:17</span> Pierre reçoit ainsi la garde de toutes les brebis du Christ, les autres pasteurs compris. Au soir de la Cène, Jésus lui avait déjà confié une mission singulière : soutenir la foi de ses frères. <em>« J'ai prié pour toi, afin que ta foi ne défaille pas ; et toi, affermis tes frères. »</em> <span class="ref">Luc 22:32</span></p>
      <h2>Le Rocher et le roc</h2>
      <p>Une seule pierre fonde l'Église en dernier ressort : le Christ. <em>« Nul ne peut poser d'autre fondement que celui qui est déjà posé, Jésus-Christ. »</em> <span class="ref">1 Corinthiens 3:11</span> Pierre tient son rôle de ce fondement unique : il est le roc visible par lequel le Christ, Rocher invisible, maintient son Église dans le temps. En donnant à Simon son propre nom de Roc, le Seigneur le fait participer à ce qu'il est lui-même, demeurant l'unique source d'où Pierre reçoit tout.</p>
      <h2>Une charge qui demeure</h2>
      <p>L'<a href="#/article/l-eglise">Église</a> est bâtie pour durer jusqu'à la fin des temps ; son fondement visible devait donc durer autant qu'elle. La charge de Pierre ne s'est pas éteinte à sa mort : elle passe à ses successeurs. Pierre a achevé sa course à Rome, où il a versé son sang ; l'évêque de Rome est son héritier, et c'est pourquoi le pape exerce aujourd'hui la même primauté sur l'Église entière. C'est sur cette charge que repose le <a href="#/article/l-infaillibilite-pontificale">charisme par lequel il confirme ses frères</a> dans la foi sans les égarer.</p>

      <h2>Une peine qui demeure après le pardon</h2>
      <p>Quand le péché est pardonné, la faute est effacée et la peine éternelle remise. Demeure pourtant souvent une <a href="#/article/le-purgatoire">peine temporelle</a>, une dette à acquitter. L'Écriture le montre dans l'histoire de David : son péché confessé, le prophète Nathan lui annonce le pardon, puis une peine qui subsiste. <em>« Le Seigneur a pardonné ton péché ; tu ne mourras pas. »</em> <span class="ref">2 Samuel 12:13</span> Et pourtant l'enfant né de la faute mourra : le pardon de la faute n'a pas effacé toute conséquence.</p>
      <h2>Réparer, c'est guérir</h2>
      <p>Cette réparation ne cherche pas à fléchir un Dieu exigeant, car le pardon est donné gratuitement. Elle guérit le pécheur de l'attachement que le péché a laissé en lui, et redresse le tort commis. Quand Zachée se convertit, il ne s'en tient pas au regret : il répare. <em>« Si j'ai fait tort à quelqu'un, je lui rends le quadruple. »</em> <span class="ref">Luc 19:8</span> La prière, le jeûne et l'aumône sont les voies traditionnelles de cette réparation ; lorsqu'un tort précis a été fait au prochain, la satisfaction demande d'abord de le redresser.</p>
      <h2>Greffée sur la Croix</h2>
      <p>Nos satisfactions n'ont aucune valeur par elles seules : elles la reçoivent de l'unique satisfaction du Christ, qui a réparé sur la <a href="#/article/la-croix-et-la-resurrection">Croix</a> ce qu'aucun homme ne pouvait réparer. Unies à la sienne, nos peines acceptées deviennent fécondes. Ce qui n'a pas été réparé avant la mort le sera au purgatoire ; et l'Église, puisant au trésor des mérites du Christ, peut en remettre une part par les indulgences.</p>

    contenu: `
      <p>Le secret de la confession est l'obligation, pour le prêtre, de ne jamais révéler ce qu'un pénitent, celui qui vient confesser ses péchés, lui a confié. Cette règle porte un nom : le sceau sacramentel. De même qu'un sceau ferme un pli que personne n'ouvrira, le prêtre garde fermé à jamais ce qu'il a entendu.</p>
      <h2>Un secret sans aucune exception</h2>
      <p>Le sceau couvre tout ce que le pénitent confie pour recevoir le pardon : ses <a href="#/article/le-peche">péchés</a>, leurs circonstances, tout ce qui pourrait le faire reconnaître. Le confesseur ne peut ni le redire, ni l'utiliser, ni même le laisser deviner par un mot ou une attitude. Aucune raison, si grave soit-elle, ne lève cette obligation : ni l'ordre d'un juge, ni le danger d'autrui, ni le besoin de se disculper lui-même. Le secret est entier, sans la moindre brèche.</p>
      <h2>Reçu au nom de Dieu</h2>
      <p>D'où vient cette inviolabilité ? Dans <a href="#/article/la-confession">la confession</a>, le pénitent ne parle pas à un homme : il parle à Dieu, dont le prêtre n'est que l'instrument. Ce qui est avoué est confié à la miséricorde divine, qui efface et oublie. <em>« C'est moi qui efface tes transgressions, et je ne me souviendrai plus de tes péchés. »</em> <span class="ref">Isaïe 43:25</span> Le prêtre, simple ministre de ce pardon, est lié au même oubli : il a entendu comme l'oreille de Dieu ; ce qu'il a reçu ainsi appartient à Dieu seul. Ce silence garde aussi la confiance sans laquelle nul n'oserait ouvrir son âme.</p>
      <h2>Une fidélité gardée jusqu'au bout</h2>
      <p>Trahir ce secret est, pour un prêtre, l'une des fautes les plus graves qu'il puisse commettre. L'Église l'a toujours tenu pour inviolable, et des confesseurs ont préféré la prison ou la mort plutôt que de livrer ce qui leur avait été confié. <em>« Le médisant révèle les secrets, mais l'homme au cœur fidèle tient la chose cachée. »</em> <span class="ref">Proverbes 11:13</span> Le pénitent peut donc tout dire sans crainte : ce qu'il dépose au confessionnal n'en sortira jamais.</p>

      <p>Le temps de la vie est le temps du choix. Tant que l'homme vit, il peut se tourner vers Dieu ou s'en détourner, se perdre ou se reprendre. La mort scelle ce temps : l'âme se présente devant Dieu dans l'état où elle l'a quittée, et ce qu'elle a choisi devient définitif. <em>« Il est réservé aux hommes de mourir une seule fois, après quoi vient le jugement. »</em> <span class="ref">Hébreux 9:27</span></p>

      <p>La résurrection de la chair est la réunion, au dernier jour, de chaque âme à son propre corps, rendu désormais immortel. L'homme est corps et âme : la mort les sépare, la résurrection les réunit pour toujours.</p>
      <h2>L'homme tout entier</h2>
      <p>L'homme est un être de chair autant que d'esprit : son âme et son corps forment ensemble une seule personne. La mort sépare violemment ce qui était fait pour être uni, l'âme partant vers Dieu et le corps retournant à la terre. Le <a href="#/article/le-salut">salut</a> que Dieu donne atteint l'homme entier : il rendra aussi le corps à la vie.</p>
      <h2>Le Christ ressuscité, gage de notre résurrection</h2>
      <p>Le fondement de cette espérance est la <a href="#/article/la-croix-et-la-resurrection">résurrection du Christ</a>. En sortant vivant du tombeau, dans son propre corps, il a ouvert le chemin : sa victoire sur la mort est la source et le modèle de la nôtre. <em>« Le Christ est ressuscité des morts, prémices de ceux qui se sont endormis. »</em> <span class="ref">1 Corinthiens 15:20</span> Le mot « prémices » désigne les premiers fruits de la récolte, ceux qui annoncent et garantissent tout le reste : la résurrection du Christ assure la nôtre.</p>
      <h2>Le corps glorieux des sauvés</h2>
      <p>Le corps qui se relève est le même corps, rendu glorieux pour ceux que Dieu sauve. Soumis ici à la fatigue, à la maladie et à la mort, il ressuscitera doté de qualités nouvelles : il ne pourra plus souffrir ni mourir, il resplendira de lumière, il obéira pleinement à l'âme. <em>« On sème un corps corruptible, il ressuscite incorruptible. »</em> <span class="ref">1 Corinthiens 15:42</span> Ce corps sera rendu semblable à celui du Christ ressuscité. <em>« Il transformera notre corps de misère pour le rendre semblable à son corps de gloire. »</em> <span class="ref">Philippiens 3:21</span></p>
      <h2>La résurrection de tous, au dernier jour</h2>
      <p>Tous les morts ressuscitent, les justes comme les injustes ; la mort vaincue, aucun corps ne meurt plus ni ne se décompose. La gloire reste pourtant le partage des seuls sauvés : le corps des damnés se relève immortel et imputrescible, capable de souffrir, et c'est en lui qu'ils portent leur peine pour toujours. <em>« Tous ceux qui sont dans les tombeaux entendront sa voix et en sortiront : ceux qui auront fait le bien pour une résurrection de vie, ceux qui auront fait le mal pour une résurrection de jugement. »</em> <span class="ref">Jean 5:28-29</span> Cette résurrection aura lieu à la fin du monde, au retour du Christ. Le sort de chacun, déjà fixé à sa mort par le <a href="#/article/le-jugement-particulier">jugement particulier</a>, atteint alors l'homme entier, corps et âme, lors du <a href="#/article/le-jugement-dernier">jugement dernier</a>. L'espérance en traverse déjà tout l'Ancien Testament. <em>« Je sais que mon Rédempteur est vivant, et qu'au dernier jour je me lèverai de la terre ; et de ma chair je verrai Dieu. »</em> <span class="ref">Job 19:25-26</span></p>

    date: "2026",
    contenu: `
      <p>Le mariage est l'alliance par laquelle un homme et une femme se donnent l'un à l'autre pour toute la vie, formant une communauté ordonnée à leur amour mutuel et à l'accueil des enfants. Entre deux baptisés, le Christ l'a élevé à la dignité de sacrement, signe sacré qui donne réellement la grâce de Dieu.</p>
      <h2>Institué par Dieu dès l'origine</h2>
      <p>Dieu a inscrit le mariage dans la nature de l'homme et de la femme dès la création. En les créant l'un pour l'autre, il les unit dans une seule vie et les bénit pour la fécondité. <em>« L'homme quittera son père et sa mère, il s'attachera à sa femme, et ils deviendront une seule chair. »</em> <span class="ref">Genèse 2:24</span> Cette union d'un seul homme et d'une seule femme est ouverte à la vie. <em>« Soyez féconds et multipliez-vous. »</em> <span class="ref">Genèse 1:28</span></p>
      <h2>Élevé par le Christ au rang de sacrement</h2>
      <p>Le Christ a élevé le mariage à la dignité de sacrement en l'unissant à sa propre alliance avec l'<a href="#/article/l-eglise">Église</a>. L'amour des époux reproduit l'amour du Christ pour elle : comme le Christ se donne pour l'Église jusqu'à la <a href="#/article/la-croix-et-la-resurrection">Croix</a>, lui demeure uni sans jamais s'en séparer et la rend féconde, les époux se donnent l'un à l'autre tout entiers, demeurent unis pour la vie et ouvrent leur amour à la vie. L'union visible des deux époux donne ainsi à voir l'union invisible du Christ et de l'Église : c'est en cela qu'elle en est le signe. <em>« Ce mystère est grand : je le dis par rapport au Christ et à l'Église. »</em> <span class="ref">Éphésiens 5:32</span> Cette élévation suppose le <a href="#/article/le-bapteme">baptême</a> des deux époux, qui les fait membres du Christ : c'est parce qu'ils lui appartiennent que leur union peut porter le signe de son union avec l'Église. Le mariage de deux baptisés est donc toujours sacrement, qu'ils soient catholiques ou de confessions chrétiennes différentes ; et si l'un n'est pas baptisé, leur union, vrai mariage voulu par Dieu, est élevée au rang de sacrement le jour où il reçoit le baptême.</p>
      <h2>Unité et indissolubilité</h2>
      <p>Le mariage possède deux propriétés qui lui sont essentielles : l'unité et l'indissolubilité. L'unité : un seul homme et une seule femme. L'indissolubilité : le lien dure jusqu'à la mort, car ce que Dieu unit, nul ne peut le défaire. Le Christ l'affirme en revenant au dessein du commencement. <em>« Que l'homme ne sépare pas ce que Dieu a uni. »</em> <span class="ref">Matthieu 19:6</span></p>
      <h2>Le consentement et la grâce</h2>
      <p>Ce sont les époux eux-mêmes qui se donnent le sacrement, en échangeant leur consentement, le oui libre par lequel chacun se donne et reçoit l'autre. Le prêtre ou le diacre reçoit ce consentement au nom de l'Église et bénit l'alliance. Par ce sacrement, Dieu accorde aux époux une <a href="#/article/la-grace-sanctifiante">grâce</a> propre : elle fortifie leur amour, les aide à se sanctifier l'un l'autre et à accueillir et élever leurs enfants dans la foi.</p>

const app = document.getElementById('app');
const echappe = s => s; // contenu déjà sûr (écrit par toi)

function compteParTheme(id){ return ARTICLES.filter(a=>a.theme===id).length; }
function themeNom(id){ const t=THEMES.find(x=>x.id===id); return t?t.nom:''; }

/* ---- ACCUEIL ---- */
function vueAccueil(){
  const cartes = THEMES.map((t,i)=>`
    <a class="domaine" href="#/bibliotheque?theme=${t.id}">
      <span class="d-num">${String(i+1).padStart(2,'0')}</span>
      <h3>${t.nom}</h3>
      <p>${t.desc}</p>
      <span class="compte">${compteParTheme(t.id)} entrée${compteParTheme(t.id)>1?'s':''}</span>
    </a>`).join('');
  return `<div class="vue">
    <section class="hero">
      <div class="croix" aria-hidden="true"></div>
    </section>
    <section class="intro">
      <p>Un lieu pour entrer dans l'intelligence de la foi catholique, des premiers pas jusqu'aux questions les plus profondes.</p>
    </section>
    <div class="titre-section">
      <span class="num">Les domaines</span>
      <h2>Explorer par thème</h2>
      <span class="trait"></span>
    </div>
    <section class="domaines">${cartes}</section>
    <div style="height:60px"></div>
  </div>`;
}

/* ---- BIBLIOTHÈQUE ---- */
function articlesOrdonnes(){
  let out=[];
  for(const t of THEMES){
    const at=ARTICLES.filter(a=>a.theme===t.id);
    if(t.categories){
      const vus=new Set();
      for(const c of t.categories){ for(const id of c.arts){ const a=at.find(x=>x.id===id); if(a){out.push(a);vus.add(id);} } }
      for(const a of at) if(!vus.has(a.id)) out.push(a);
    } else out.push(...at);
  }
  return out;
}
function carteArticle(a){
  return `<a class="article-lien" href="#/article/${a.id}">
      <div class="meta">${themeNom(a.theme)}</div>
      <h3>${a.titre}</h3>
      <p>${a.resume}</p>
    </a>`;
}
function vueBibliotheque(params){
  const themeActif = params.get('theme') || 'tous';
  const filtres = `<button class="filtre ${themeActif==='tous'?'actif':''}" data-theme="tous">Tout</button>` +
    THEMES.map(t=>`<button class="filtre ${themeActif===t.id?'actif':''}" data-theme="${t.id}">${t.nom}</button>`).join('');
  const vide = `<div class="vide">Ce domaine n'a pas encore d'entrée. Les contenus s'ajoutent au fil du temps.</div>`;
  let corps;
  if(themeActif==='tous'){
    corps = articlesOrdonnes().map(carteArticle).join('');
  } else {
    const t = THEMES.find(x=>x.id===themeActif);
    const at = ARTICLES.filter(a=>a.theme===themeActif);
    if(t && t.categories){
      let html='';const vus=new Set();
      for(const c of t.categories){
        const arts = c.arts.map(id=>at.find(a=>a.id===id)).filter(Boolean);
        arts.forEach(a=>vus.add(a.id));
        if(!arts.length) continue;
        if(c.nom) html += `<div class="cat-titre">${c.nom}</div>`;
        html += arts.map(carteArticle).join('');
      }
      html += at.filter(a=>!vus.has(a.id)).map(carteArticle).join('');
      corps = html || vide;
    } else {
      corps = at.length ? at.map(carteArticle).join('') : vide;
    }
  }
  return `<div class="vue">
    <div class="filtres">${filtres}</div>
    <section class="liste">${corps}</section>
    <div style="height:60px"></div>
  </div>`;
}

/* ---- ARTICLE ---- */
function vueArticle(id){
  const a = ARTICLES.find(x=>x.id===id);
  if(!a) return vueIntrouvable();
  return `<div class="vue">
    <article class="lecture">
      <h1>${a.titre}</h1>
      ${echappe(a.contenu)}
    </article>
  </div>`;
}

/* ---- À PROPOS ---- */

function vueIntrouvable(){
  return `<div class="vue"><section class="bandeau-page"><h1>Page introuvable</h1>
    <p class="desc">Cette page n'existe pas. <a href="#/" style="color:var(--or)">Revenir à l'accueil</a>.</p></section></div>`;
}

/* ---- ROUTAGE ---- */
function router(){
  const hash = location.hash.replace(/^#/,'') || '/';
  const [chemin, query] = hash.split('?');
  const params = new URLSearchParams(query||'');
  let html, route='/', ctx='';
  if(chemin==='/'||chemin===''){ html=vueAccueil(); route='/'; }
  else if(chemin==='/bibliotheque'){ html=vueBibliotheque(params); route='/bibliotheque'; ctx='La bibliothèque'; }
  else if(chemin==='/a-propos'){ html=vueAPropos(); route='/a-propos'; }
  else if(chemin.startsWith('/article/')){
    const aid=chemin.split('/article/')[1];
    html=vueArticle(aid); route='/bibliotheque';
    const a=ARTICLES.find(x=>x.id===aid);
    if(a) ctx=`<a href="#/bibliotheque?theme=${a.theme}">${themeNom(a.theme)}</a>`;
  }
  else { html=vueIntrouvable(); }
  app.innerHTML = html;
  document.getElementById('contexte').innerHTML = ctx;
  window.scrollTo(0,0);
  document.querySelectorAll('nav.menu a').forEach(a=>{
    a.classList.toggle('actif', a.dataset.route===route);
  });
  document.getElementById('menu').classList.remove('ouvert');
  brancherFiltres();
}

function brancherFiltres(){
  document.querySelectorAll('.filtre').forEach(b=>{
    b.addEventListener('click',()=>{
      const t=b.dataset.theme;
      location.hash = t==='tous' ? '#/bibliotheque' : '#/bibliotheque?theme='+t;
    });
  });
}

document.getElementById('burger').addEventListener('click',()=>{
  document.getElementById('menu').classList.toggle('ouvert');
});
document.getElementById('annee').textContent = '© ' + new Date().getFullYear() + ' Lumen';

/* ---- recherche ---- */
(function(){
  var ouvrir=document.getElementById('rech-ouvrir'),overlay=document.getElementById('rech-overlay'),
      champ=document.getElementById('rech-champ'),res=document.getElementById('rech-res'),fermer=document.getElementById('rech-fermer');
  if(!ouvrir||!overlay) return;
  function norm(s){return s.toLowerCase().replace(/[àâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[ïî]/g,'i').replace(/[ôö]/g,'o').replace(/[ùûü]/g,'u').replace(/ç/g,'c');}
  function depouiller(h){return h.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();}
  var index=ARTICLES.map(function(a){return {s:a.id,t:a.titre,th:themeNom(a.theme),r:a.resume,x:depouiller(a.contenu)};});
  index.forEach(function(a){a._n=norm(a.t+' '+a.r+' '+a.x);a._t=norm(a.t);a._r=norm(a.r);});
  function surligne(texte,termes){
    var nt=norm(texte),marks=[];
    termes.forEach(function(t){var i=0,p;while((p=nt.indexOf(t,i))>=0){marks.push([p,p+t.length]);i=p+t.length;}});
    if(!marks.length) return texte;
    marks.sort(function(a,b){return a[0]-b[0];});
    var out='',cur=0;
    marks.forEach(function(m){if(m[0]<cur)return;out+=texte.slice(cur,m[0])+'<mark>'+texte.slice(m[0],m[1])+'</mark>';cur=m[1];});
    return out+texte.slice(cur);
  }
  function extrait(a,termes){
    var src=a.r+' '+a.x,n=norm(src),pos=-1;
    termes.forEach(function(t){var p=n.indexOf(t);if(p>=0&&(pos<0||p<pos))pos=p;});
    if(pos<0)pos=0;
    var deb=Math.max(0,pos-60),fin=Math.min(src.length,pos+120);
    return (deb>0?'… ':'')+surligne(src.slice(deb,fin),termes)+(fin<src.length?' …':'');
  }
  function chercher(q){
    var termes=norm(q).split(/\s+/).filter(Boolean);
    if(!termes.length){res.innerHTML='<div class="rech-msg">Tapez un mot pour parcourir les articles.</div>';return;}
    var out=[];
    index.forEach(function(a){
      if(!termes.every(function(t){return a._n.indexOf(t)>=0;})) return;
      var sc=0;termes.forEach(function(t){if(a._t.indexOf(t)>=0)sc+=5;if(a._r.indexOf(t)>=0)sc+=2;sc+=1;});
      out.push({a:a,sc:sc});
    });
    out.sort(function(x,y){return y.sc-x.sc;});
    if(!out.length){res.innerHTML='<div class="rech-msg">Aucun résultat pour « '+q+' ».</div>';return;}
    res.innerHTML=out.slice(0,30).map(function(o){
      return '<a class="rech-item" href="#/article/'+o.a.s+'"><div class="rech-meta">'+o.a.th+'</div><div class="rech-titre">'+o.a.t+'</div><div class="rech-extrait">'+extrait(o.a,termes)+'</div></a>';
    }).join('');
  }
  function ouvre(){overlay.classList.add('ouvert');document.body.style.overflow='hidden';chercher(champ.value);setTimeout(function(){champ.focus();},40);}
  function ferme(){overlay.classList.remove('ouvert');document.body.style.overflow='';}
  ouvrir.addEventListener('click',ouvre);
  ouvrir.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();ouvre();}});
  fermer.addEventListener('click',ferme);
  fermer.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();ferme();}});
  overlay.addEventListener('click',function(e){if(e.target===overlay)ferme();});
  res.addEventListener('click',function(e){if(e.target.closest('.rech-item'))ferme();});
  champ.addEventListener('input',function(){chercher(champ.value);});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&overlay.classList.contains('ouvert'))ferme();});
})();

window.addEventListener('hashchange', router);
router();
</script>
</body>
