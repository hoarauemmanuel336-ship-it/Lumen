      <h2>Les préfigurations</h2>
      <p>Avant d'être donnée à la Cène, l'Eucharistie a été préparée de loin, par des figures de l'Ancien Testament qui en portaient déjà le secret. Trois surtout l'annoncent.</p>
      <p>Melchisédech vient en premier. C'est un personnage mystérieux du livre de la Genèse : roi de Salem, l'ancienne Jérusalem, et prêtre du Dieu Très-Haut, il va à la rencontre d'Abraham qui revient de la bataille : <em>« Melchisédech, roi de Salem, fit apporter du pain et du vin ; il était prêtre du Dieu Très-Haut. »</em> <span class="ref">Genèse 14:18</span> Ce prêtre dont la Genèse ne dit ni l'origine ni la fin, qui offre le pain et le vin et bénit Abraham, annonce le Christ, prêtre pour toujours, qui offrira à son tour le pain et le vin devenus son Corps et son Sang : <em>« Tu es prêtre pour l'éternité à la manière de Melchisédech. »</em> <span class="ref">Psaume 110:4</span></p>

      <p>Ces trois figures attendaient leur accomplissement, et il vient à la Cène, quand le Christ prend le pain et le vin et les donne comme son Corps et son Sang.</p>
      <h2>L'institution à la Cène</h2>
      <p>La veille de sa Passion, au cours du repas pascal, Jésus prit du pain, le bénit, le rompit et le donna à ses disciples : <em>« Ceci est mon corps. »</em> Puis il leur donna la coupe : <em>« Ceci est mon sang, le sang de l'alliance, répandu pour la multitude en rémission des péchés. »</em> <span class="ref">Matthieu 26:26-28</span> Et il commanda de renouveler ce geste : <em>« Faites ceci en mémoire de moi. »</em> <span class="ref">Luc 22:19</span> Depuis, l'Église accomplit ce que le Seigneur a fait, et le pain et le vin deviennent son Corps et son Sang.</p>
      <h2>Le prêtre et la consécration</h2>
      <p>La matière de ce sacrement est le pain de blé et le vin de la vigne ; la forme est la parole de la consécration, redite après le Seigneur sur le pain et sur la coupe. Le ministre est le prêtre ou l'évêque, qui agit en la personne du Christ.</p>
      <h2>La présence réelle</h2>
      <p>Les paroles du Christ opèrent ce qu'elles disent : le pain devient son Corps, le vin devient son Sang. Lui-même l'avait annoncé : <em>« Ma chair est vraiment une nourriture, et mon sang est vraiment un breuvage. »</em> <span class="ref">Jean 6:55</span> Ce changement porte sur la substance même : ce qui était pain et vin est maintenant le Corps et le Sang du Christ, tandis que demeurent les apparences, le goût et l'aspect, que l'on nomme les espèces. L'Église appelle ce passage la transsubstantiation. Sous ces espèces, le Christ est tout entier présent, vivant et glorieux.</p>
      <h2>Le sacrifice</h2>
      <p>L'Eucharistie est un sacrifice, et le sacrifice même de la Croix. Israël connaissait déjà le sacrifice : on offrait à Dieu un animal, on l'immolait, on répandait son sang ; la vie est dans le sang, et le répandre, c'était remettre à Dieu la vie elle-même. <em>« La vie de la chair est dans le sang... c'est le sang qui expie pour une vie. »</em> <span class="ref">Lévitique 17:11</span> Au pied du Sinaï, Moïse scella ainsi par le sang des victimes l'alliance entre Dieu et le peuple. <em>« Voici le sang de l'alliance que le Seigneur a conclue avec vous. »</em> <span class="ref">Exode 24:8</span> Ce culte devait pourtant reprendre sans fin, le grand prêtre entrant chaque année dans le sanctuaire avec le sang d'un animal pour le péché du peuple, car le sang d'une bête ne pouvait offrir à Dieu une réparation à la mesure du péché. Ces sacrifices étaient la figure et l'attente du seul qui le pourrait. <em>« Il est impossible que le sang des taureaux et des boucs enlève les péchés. »</em> <span class="ref">Hébreux 10:4</span></p>
      <p>Ce que ces sacrifices annonçaient, le Christ l'a accompli une fois pour toutes. Sur la Croix, il s'offre lui-même au Père : à la fois le prêtre qui offre et la victime offerte, il scelle dans son sang l'alliance nouvelle que l'ancienne préparait. <em>« Le Christ est entré une fois pour toutes dans le sanctuaire, non avec le sang de boucs et de taureaux, mais avec son propre sang, nous ayant obtenu une délivrance éternelle. »</em> <span class="ref">Hébreux 9:11-12</span> Cette offrande unique suffit pour toujours ; les sacrifices anciens cessent, leur figure passée dans la réalité.</p>
      <p>Le soir de la Cène, le Christ a confié ce sacrifice unique à son Église ; la messe le rend présent. Le Christ qui s'est offert au Calvaire s'y offre encore, par les mains du prêtre ; l'offrande est la même, seule sa manière change : alors dans le sang et la mort, maintenant sous les espèces du pain et du vin, où le Ressuscité ne meurt plus. <em>« Ressuscité des morts, le Christ ne meurt plus ; la mort n'a plus de pouvoir sur lui. »</em> <span class="ref">Romains 6:9</span> Ainsi l'unique sacrifice du Calvaire rejoint tous les temps et tous les lieux, et l'Église l'offre pour les vivants comme pour les défunts que Dieu purifie encore. Le concile de Trente l'a affirmé en 1562.</p>
      <p>À la première Pâque, le sang de l'agneau écartait d'Israël le fléau de la mort, et l'on en mangeait la chair. Le Christ est l'Agneau véritable, et son sang sauve d'un mal plus grand. <em>« Voici l'Agneau de Dieu qui enlève le péché du monde. »</em> <span class="ref">Jean 1:29</span> Et comme on mangeait l'agneau, le Christ se donne lui-même en nourriture : recevoir l'Eucharistie, c'est manger la victime de notre délivrance et prendre part à son unique sacrifice.</p>
      <h2>L'adoration du Saint-Sacrement</h2>
      <p>Puisque le Christ est réellement présent sous les espèces, l'Eucharistie reçoit l'adoration due à Dieu seul. C'est le Christ lui-même que l'on adore, présent tout entier sous les apparences du pain. L'Église garde l'Eucharistie dans le tabernacle, le lieu où on la conserve au cœur de l'église, l'expose à l'adoration des fidèles, et s'agenouille devant le Saint-Sacrement comme devant le Seigneur. L'adoration eucharistique est l'hommage rendu à cette présence.</p>
      <h2>La communion</h2>
      <p>Recevoir l'Eucharistie, c'est communier au Corps du Christ. Le Seigneur l'a promis : <em>« Celui qui mange ma chair et boit mon sang demeure en moi, et moi en lui. »</em> <span class="ref">Jean 6:56</span> La communion unit intimement au Christ, et par lui unit les fidèles entre eux : <em>« Puisqu'il y a un seul pain, nous qui sommes plusieurs, nous formons un seul corps. »</em> <span class="ref">1 Corinthiens 10:17</span> L'Église se construit ainsi par l'Eucharistie, qui fait d'elle le Corps du Christ.</p>
      <h2>Recevoir dignement</h2>
      <p>L'Eucharistie demande d'être reçue dignement. Puisque c'est le Christ lui-même qu'on reçoit, communier en état de péché mortel, sans avoir d'abord reçu le pardon, profane le don au lieu de l'accueillir. L'Écriture en avertit gravement. <em>« Quiconque mange ce pain ou boit la coupe du Seigneur indignement sera coupable envers le corps et le sang du Seigneur. »</em> <span class="ref">1 Corinthiens 11:27</span> Elle demande à chacun de s'examiner. <em>« Que chacun s'éprouve soi-même, et qu'ainsi il mange de ce pain et boive de cette coupe. »</em> <span class="ref">1 Corinthiens 11:28</span> Celui qui a conscience d'un péché grave reçoit d'abord le pardon par la confession, puis s'approche de la communion ; et tous s'y préparent par le recueillement et par le jeûne qui la précède. Ainsi reçue, dans un cœur en état de grâce, l'Eucharistie produit tout son fruit.</p>
      <h2>Les fruits de la communion</h2>
      <p>Reçue dignement, l'Eucharistie porte des fruits dans l'âme. Elle nourrit la vie de la grâce et la fait grandir, comme un aliment soutient et augmente la vie du corps. Elle efface les péchés véniels et fortifie contre le péché mortel, en ranimant la charité que le péché refroidit. Elle est enfin le gage de la vie éternelle : celui qui reçoit le Christ porte en lui le germe de la résurrection. <em>« Celui qui mange ma chair et boit mon sang a la vie éternelle, et je le ressusciterai au dernier jour. »</em> <span class="ref">Jean 6:54</span> Ce pain donné sur la terre est déjà l'avant-goût du festin du ciel.</p>

      <p>Par elle, ce que la Croix a mérité devient vie donnée. Le Christ ressuscité est la cause de notre justification : <em>« Il a été livré pour nos fautes, et ressuscité pour notre justification. »</em> <span class="ref">Romains 4:25</span> Et sa victoire ne reste pas la sienne seule : il est le premier d'une multitude, et sa Résurrection est le principe de la nôtre. <em>« Christ est ressuscité des morts, prémices de ceux qui sont morts. »</em> <span class="ref">1 Corinthiens 15:20</span> En son humanité glorifiée, élevé à la droite du Père, il est établi Seigneur et communique aux siens la vie qu'il a reçue. En lui, la mort cesse d'être une fin : elle devient le passage vers la vie qui ne finit pas.</p>

      <h2>La mort</h2>
      <p>La mort est la séparation de l'âme et du corps, le terme de la vie terrestre. Relevant à Troas le jeune homme tombé de la fenêtre, Paul mesure la vie à la présence de l'âme dans le corps. <em>« Ne vous troublez pas, car son âme est en lui. »</em> <span class="ref">Actes 20:10</span> Avec elle s'achève le temps du mérite : durant cette vie, l'homme se tourne vers Dieu ou s'en détourne, et la mort scelle ce choix. <em>« Il est réservé aux hommes de mourir une seule fois, après quoi vient le jugement. »</em> <span class="ref">Hébreux 9:27</span> On ne meurt qu'une seule fois ; au-delà, on ne se convertit plus, et l'âme est recueillie telle qu'elle est devenue.</p>

      <p>Depuis cette descente et la Résurrection, le ciel est ouvert : les justes qui meurent dans l'amitié de Dieu entrent dans sa vue, aussitôt ou après la purification du purgatoire, et les limbes des Pères sont vides, leur attente accomplie. Demeurent l'enfer, pour qui se détourne de Dieu jusqu'au bout, et l'attente du dernier jour, où le corps ressuscité rejoindra l'âme. Alors la mort elle-même sera détruite. <em>« La mort et le séjour des morts furent jetés dans l'étang de feu. »</em> <span class="ref">Apocalypse 20:14</span></p>
      <h2>Le jugement particulier</h2>
      <p>Aussitôt après la mort, chaque âme paraît devant Dieu et reçoit son sort éternel : c'est le jugement particulier, ainsi nommé parce qu'il concerne chaque personne séparément. Celui qui juge est le Christ, à qui le Père a remis tout jugement. <em>« Le Père ne juge personne, mais il a remis tout jugement au Fils. »</em> <span class="ref">Jean 5:22</span> Devant lui, l'âme voit sa vie entière dans la pleine lumière de Dieu, sans rien qui demeure caché, et le verdict du Christ confirme ce qu'elle a fait d'elle-même. <em>« Il nous faut tous comparaître devant le tribunal du Christ, afin que chacun reçoive selon ce qu'il aura fait. »</em> <span class="ref">2 Corinthiens 5:10</span></p>
      <p>Ce qui est pesé en ce jugement est l'amour : Dieu regarde la foi rendue vivante par la charité. <em>« Ce qui compte, c'est la foi agissant par la charité. »</em> <span class="ref">Galates 5:6</span> Toute la vie est jugée à cette aune, l'amour de Dieu et du prochain attesté jusque dans les plus humbles services.</p>
      <p>Le jugement donne aussitôt à l'âme son sort, sans attendre la fin du monde, et trois états sont possibles. Celle qui meurt dans l'amitié de Dieu, pleinement purifiée, entre au paradis ; celle qui meurt dans cette amitié, imparfaitement purifiée, passe par le purgatoire ; celle qui meurt en refusant volontairement l'amour de Dieu va en enfer. Au bon larron crucifié près de lui, le Christ promet le ciel pour le jour même. <em>« Aujourd'hui, tu seras avec moi dans le paradis. »</em> <span class="ref">Luc 23:43</span> L'Église a confirmé cette rétribution immédiate au concile de Florence, en 1439.</p>
      <h2>Le paradis</h2>
      <p>Le paradis est le bonheur parfait et sans fin où les élus, pleinement unis à Dieu, partagent sa vie et sa joie. Son cœur est de voir Dieu tel qu'il est, ce que le Seigneur a promis aux cœurs purs. <em>« Heureux les cœurs purs, car ils verront Dieu. »</em> <span class="ref">Matthieu 5:8</span> Sur la terre nous connaissons Dieu dans la foi, à travers ses œuvres ; au ciel nous le verrons directement, face à face. L'Église nomme cette contemplation la vision béatifique, car elle rend bienheureux ceux qui la reçoivent. <em>« Maintenant nous voyons dans un miroir, de façon confuse ; mais alors, ce sera face à face. »</em> <span class="ref">1 Corinthiens 13:12</span></p>
      <p>Voir Dieu ainsi dépasse les forces de toute créature ; c'est Dieu lui-même qui élève l'âme par un don que la tradition appelle la lumière de gloire, et qui la rend capable de soutenir sa vue. Les bienheureux le voient tel qu'il est sans jamais l'épuiser : Dieu demeure infini, et sa contemplation reste à jamais nouvelle, sans lassitude et sans terme.</p>
      <p>L'homme est fait pour Dieu, et Dieu seul peut combler son cœur ; au paradis ce désir trouve enfin son plein rassasiement, sans mesure et sans fin. <em>« Ce que l'œil n'a pas vu, ce que l'oreille n'a pas entendu, voilà ce que Dieu a préparé pour ceux qui l'aiment. »</em> <span class="ref">1 Corinthiens 2:9</span> Ce bonheur, l'homme le reçoit avec le Christ et par lui. <em>« Père, je veux que là où je suis, ceux que tu m'as donnés soient aussi avec moi, pour qu'ils contemplent ma gloire. »</em> <span class="ref">Jean 17:24</span> C'est par son humanité, unie à Dieu, que les élus sont introduits dans la vie même de la Trinité.</p>
      <p>La mesure de la gloire diffère d'un bienheureux à l'autre : chacun voit Dieu selon la charité qu'il a portée en cette vie. <em>« Chacun recevra sa propre récompense selon son propre travail. »</em> <span class="ref">1 Corinthiens 3:8</span> L'amour offert ici-bas dilate la capacité d'accueillir Dieu : les uns sont des vases plus grands que les autres, et tous sont remplis jusqu'au bord, sans qu'aucun désir leur manque. <em>« Autre est l'éclat du soleil, autre l'éclat de la lune, et autre l'éclat des étoiles ; une étoile même diffère en éclat d'une autre étoile. »</em> <span class="ref">1 Corinthiens 15:41</span></p>
      <p>Le bonheur du paradis est une communion : les bienheureux vivent dans la joie de Dieu et les uns des autres, la communion des saints parvenue à son terme. <em>« Voici la demeure de Dieu avec les hommes ; il demeurera avec eux, et ils seront son peuple. »</em> <span class="ref">Apocalypse 21:3</span> Les âmes des justes goûtent ce bonheur aussitôt après le jugement particulier ; quand les corps ressusciteront, leur joie rejaillira sur la chair glorifiée, et l'homme tout entier vivra de Dieu.</p>
      <h2>Le purgatoire</h2>
      <p>Le purgatoire est l'état de purification que traversent, après la mort, ceux qui meurent dans l'amitié de Dieu sans être encore pleinement purifiés. Leur salut est acquis ; il leur reste à achever de se purifier de ce qui, en eux, tient encore à autre chose qu'à Dieu, car la pleine lumière du ciel n'accueille que des cœurs purs. <em>« Il n'entrera rien de souillé. »</em> <span class="ref">Apocalypse 21:27</span></p>
      <p>Deux choses peuvent retenir cette âme loin de la pleine lumière. D'abord les fautes légères, ces péchés véniels qui blessent l'amitié de Dieu sans la rompre, et que la mort a trouvés encore en elle. Ensuite la peine temporelle : tout péché, même pardonné, laisse un attachement désordonné aux choses créées ; l'offense est remise, et avec elle la peine éternelle ; ce désordre, lui, demeure souvent à guérir. Le pécheur y coopère ici-bas par la pénitence et les œuvres de charité ; ce qui reste à purifier au sortir de cette vie s'achève au purgatoire.</p>
      <p>L'Écriture montre qu'on peut prier pour les morts et que cette prière leur profite. Au temps des Maccabées, on fait offrir un sacrifice pour les soldats tombés. <em>« C'est une pensée sainte et salutaire de prier pour les morts, afin qu'ils soient délivrés de leurs péchés. »</em> <span class="ref">2 Maccabées 12:46</span> Une telle prière serait vaine pour les bienheureux, qui n'en ont pas besoin, et pour les damnés, que nul ne peut secourir : elle suppose un troisième état, où l'âme se purifie. L'Écriture l'évoque comme un passage par le feu. <em>« Il subira une perte, mais lui sera sauvé, comme à travers le feu. »</em> <span class="ref">1 Corinthiens 3:15</span> Le Christ laisse entendre qu'un pardon reste possible au-delà de la mort. <em>« Il ne lui sera pardonné ni dans ce siècle ni dans le siècle à venir. »</em> <span class="ref">Matthieu 12:32</span> Si une certaine faute ne se remet ni en ce monde ni dans l'autre, c'est que d'autres peuvent l'être dans le siècle à venir : non la faute grave, qui se décide avant la mort, mais ces fautes légères que le purgatoire achève d'effacer. L'Église l'a confessé dès le concile de Lyon, en 1274.</p>
      <p>La purification du purgatoire est profonde et douloureuse : l'âme y souffre d'être encore retenue loin du Dieu qu'elle aime et désire de toute sa force. Cette souffrance est tout entière habitée par l'espérance, car ces âmes savent qu'elles sont sauvées et que leur attente a un terme. Ce feu purifie comme l'or au creuset : il consume ce qui reste d'impur pour rendre l'âme digne de la pleine lumière.</p>
      <p>Les âmes du purgatoire ne peuvent plus mériter pour elles-mêmes ; les vivants le peuvent pour elles et peuvent hâter leur délivrance. On nomme suffrages les secours qu'on leur porte, du latin <em>suffragium</em>, le soutien apporté en faveur de quelqu'un : la prière, l'aumône, la pénitence offertes à leur intention, et par-dessus tout le sacrifice de la messe, où la Croix du Christ est rendue présente pour eux. En cela se vit la communion des saints : l'Église de la terre vient en aide à l'Église qui se purifie, dans l'unique charité qui relie tous les membres du Christ.</p>
      <h2>L'enfer</h2>
      <p>L'enfer est l'état de séparation définitive d'avec Dieu, le sort de celui qui meurt en refusant librement son amour. C'est le Christ lui-même qui l'a révélé, et il en a parlé souvent, toujours pour en détourner les hommes. Pour le nommer, il a employé le mot géhenne, du nom d'un ravin au sud de Jérusalem, la vallée de Hinnom, lieu d'ordures et de feux jadis liés à des cultes idolâtres, devenu l'image du lieu de la perdition. <em>« Craignez plutôt celui qui peut faire périr l'âme et le corps dans la géhenne. »</em> <span class="ref">Matthieu 10:28</span></p>
      <p>La peine de l'enfer est d'abord la perte de Dieu. L'âme a été créée pour le voir face à face et vivre de sa vie ; en être séparée pour toujours est la souffrance la plus profonde, celle d'un être privé de ce qui seul pouvait le combler. La tradition l'appelle la peine du dam. <em>« Ils subiront la peine d'une perdition éternelle, loin de la face du Seigneur. »</em> <span class="ref">2 Thessaloniciens 1:9</span> À cette privation s'ajoute une autre peine, que la tradition nomme la peine du sens et que l'Écriture figure par le feu. <em>« Allez loin de moi, maudits, dans le feu éternel. »</em> <span class="ref">Matthieu 25:41</span> Ce feu dit une souffrance dont la nature dépasse le feu que nous connaissons : l'âme souffre du désordre qu'elle a voulu et de la ruine où l'a conduite son refus.</p>
      <p>L'enfer est éternel. <em>« Ceux-ci iront au châtiment éternel, et les justes à la vie éternelle. »</em> <span class="ref">Matthieu 25:46</span> Son éternité tient à ce qui se fixe à la mort : tant que dure la vie, l'homme peut se reprendre ; la mort clôt ce temps, et l'âme demeure pour toujours dans l'orientation qu'elle a prise. Séparée du corps, elle adhère à son choix de façon définitive, comme les anges se sont fixés au leur dès l'origine.</p>
      <p>Ce qui conduit à l'enfer est le péché mortel, ainsi nommé parce qu'il fait perdre la vie de la grâce dans l'âme. Trois conditions le constituent : une matière grave, la pleine conscience de ce que l'on fait, et un consentement délibéré. Par un tel acte, l'homme se détourne de Dieu comme de sa fin dernière et lui préfère autre chose. Le péché véniel affaiblit cette amitié ; le péché mortel la rompt, et tant que la conversion et le pardon ne l'ont pas relevé, il fixe l'âme dans sa rupture.</p>
      <p>La cause de l'enfer est dans le refus libre de l'homme. Dieu veut le salut de tous et ne destine personne à l'enfer. <em>« Dieu veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. »</em> <span class="ref">1 Timothée 2:4</span> L'enfer est le terme d'un refus conscient et maintenu jusqu'au bout, que Dieu respecte, car aimer suppose de pouvoir refuser. C'est pourquoi le Christ en a averti avec gravité, pour appeler à la conversion ; et l'Église, qui n'a jamais déclaré aucun homme damné, confie tous les défunts à la miséricorde de Dieu, plus grande que tout péché.</p>
      <h2>La résurrection de la chair</h2>
      <p>La résurrection de la chair est la réunion, au dernier jour, de chaque âme à son propre corps, rendu désormais immortel. L'homme est corps et âme : la mort sépare violemment ce qui était fait pour être uni, et le salut que Dieu donne atteint l'homme entier, rendant aussi le corps à la vie.</p>
      <p>Le fondement de cette espérance est la résurrection du Christ : en sortant vivant du tombeau, dans son propre corps, il a ouvert le chemin. <em>« Le Christ est ressuscité des morts, prémices de ceux qui se sont endormis. »</em> <span class="ref">1 Corinthiens 15:20</span> Le mot « prémices » désigne les premiers fruits de la récolte, qui annoncent et garantissent tout le reste : sa résurrection assure la nôtre.</p>
      <p>Le corps qui se relève est le corps même qui fut enseveli, rendu par Dieu à la vie sous une condition nouvelle. L'Écriture l'éclaire par l'image de la semence, qui meurt en terre et reparaît tout autre sans cesser d'être elle-même. <em>« Ce que tu sèmes ne prend vie qu'en mourant ; et tu ne sèmes pas le corps à venir, mais un simple grain. Dieu lui donne un corps comme il l'a voulu. »</em> <span class="ref">1 Corinthiens 15:36-38</span></p>
      <p>Pour ceux que Dieu sauve, ce corps se relève glorieux, paré de quatre qualités que l'Écriture oppose à sa condition présente. <em>« On sème dans la corruption, on ressuscite dans l'incorruptibilité ; on sème dans le déshonneur, on ressuscite dans la gloire ; on sème dans la faiblesse, on ressuscite dans la puissance ; on sème un corps animal, on ressuscite un corps spirituel. »</em> <span class="ref">1 Corinthiens 15:42-44</span> L'impassibilité le rend incapable de souffrir et de mourir ; la clarté le fait resplendir de lumière ; l'agilité le rend prompt à suivre l'âme ; la subtilité le soumet entièrement à l'esprit. Ce corps sera rendu semblable à celui du Christ ressuscité. <em>« Il transformera notre corps de misère pour le rendre semblable à son corps de gloire. »</em> <span class="ref">Philippiens 3:21</span></p>
      <p>Tous les morts ressuscitent, les justes comme les injustes ; la mort vaincue, aucun corps ne se décompose plus. La gloire reste pourtant le partage des seuls sauvés : le corps des damnés se relève immortel et imputrescible, capable de souffrir, et c'est en lui qu'ils portent leur peine. <em>« Tous ceux qui sont dans les tombeaux entendront sa voix et en sortiront : ceux qui auront fait le bien pour une résurrection de vie, ceux qui auront fait le mal pour une résurrection de jugement. »</em> <span class="ref">Jean 5:28-29</span> Cette résurrection aura lieu à la fin du monde, au retour du Christ. L'espérance en traverse déjà tout l'Ancien Testament. <em>« Je sais que mon Rédempteur est vivant, et qu'au dernier jour je me lèverai de la terre ; et de ma chair je verrai Dieu. »</em> <span class="ref">Job 19:25-26</span></p>
      <h2>Le jugement dernier</h2>
      <p>Le jugement dernier est la comparution de tous les hommes devant le Christ, à la fin du monde, après la résurrection des morts. Monté au ciel après sa résurrection, le Christ reviendra une seconde fois, visible de tous, pour juger les vivants et les morts. Ce retour est appelé la Parousie, du grec <em>parousia</em> (παρουσία), « venue » ou « présence ». <em>« Ce Jésus qui a été enlevé au ciel reviendra de la même manière que vous l'avez vu s'en aller. »</em> <span class="ref">Actes 1:11</span></p>
      <p>Le jugement dernier est universel : tous les hommes de toute l'histoire, ressuscités en leur corps, paraissent ensemble devant le Christ juge, chacun jugé tout entier, corps et âme enfin réunis.</p>
      <p>Ce jour révèle ce qui était caché : les pensées, les paroles et les actes de chacun, le bien comme le mal, et leurs conséquences à travers toute l'histoire. <em>« Il mettra en lumière ce qui est caché dans les ténèbres et manifestera les desseins des cœurs. »</em> <span class="ref">1 Corinthiens 4:5</span> Alors le Christ sépare les justes des réprouvés. <em>« Quand le Fils de l'homme viendra dans sa gloire, il séparera les hommes les uns des autres, comme le berger sépare les brebis des boucs. »</em> <span class="ref">Matthieu 25:31-32</span> La mesure du partage est l'amour, jusque dans le plus petit des frères. À ceux qui les ont secourus, il dit : <em>« Ce que vous avez fait à l'un de ces plus petits de mes frères, c'est à moi que vous l'avez fait. »</em> <span class="ref">Matthieu 25:40</span> À ceux qui les ont délaissés : <em>« Ce que vous n'avez pas fait à l'un de ces plus petits, c'est à moi que vous ne l'avez pas fait. »</em> <span class="ref">Matthieu 25:45</span></p>
      <p>Le sort de chacun est déjà fixé à sa mort, et pourtant ce jugement universel accomplit ce que le particulier laissait inachevé. Ce qu'un homme a semé lui survit : le bien et le mal qu'il a répandus portent leurs fruits à travers les siècles, et la vérité entière d'une existence ne se voit qu'à la fin, quand toutes ses conséquences sont accomplies. La justice de Dieu, souvent obscurcie dans le cours de l'histoire où le juste a semblé vaincu et le méchant prospère, éclate enfin devant tous. <em>« Au jour de la révélation du juste jugement de Dieu, il rendra à chacun selon ses œuvres. »</em> <span class="ref">Romains 2:5-6</span></p>
      <p>Le jugement dernier achève l'histoire. La création tout entière, libérée du mal, est renouvelée et associée à la gloire des sauvés. <em>« Nous attendons des cieux nouveaux et une terre nouvelle où la justice habitera. »</em> <span class="ref">2 Pierre 3:13</span> Alors le dessein de Dieu atteint son terme, et il remplit tout de sa présence. <em>« Dieu sera tout en tous. »</em> <span class="ref">1 Corinthiens 15:28</span></p>

      <p>La confession est l'un des sept sacrements de l'Église, ces signes institués par le Christ pour donner la grâce. Par elle, le baptisé reçoit de Dieu, par le ministère du prêtre, le pardon des péchés commis depuis son baptême. On l'appelle aussi pénitence, du nom du regret qui l'anime, et réconciliation, parce qu'elle rétablit l'amitié avec Dieu que le péché avait rompue.</p>
      <h2>Un pouvoir donné par le Christ</h2>
      <p>Le soir de Pâques, le Ressuscité confie à ses apôtres le pouvoir de remettre les péchés en son nom. <em>« Recevez l'Esprit Saint. Ceux à qui vous remettrez les péchés, ils leur seront remis ; ceux à qui vous les retiendrez, ils leur seront retenus. »</em> <span class="ref">Jean 20:22-23</span> Ce pouvoir, il l'avait d'abord promis à Pierre. <em>« Je te donnerai les clés du royaume des cieux. »</em> <span class="ref">Matthieu 16:19</span> Le pardon vient de Dieu seul, mais Dieu a voulu le donner par des hommes. Le prêtre ne pardonne pas en son propre nom : il agit au nom du Christ, instrument par lequel passe la miséricorde. C'est ce que l'Écriture appelle le ministère de la réconciliation. <em>« Dieu nous a confié le ministère de la réconciliation. »</em> <span class="ref">2 Corinthiens 5:18</span> Se confesser à un prêtre, c'est recevoir le pardon là où le Christ a voulu le déposer.</p>
      <h2>Pourquoi un sacrement après le baptême</h2>
      <p>Le sacrifice de la Croix a racheté une fois pour toutes les péchés de tous les hommes ; il est la source unique de tout pardon, et rien ne s'y ajoute. <em>« Par une seule offrande, il a rendu parfaits pour toujours ceux qu'il sanctifie. »</em> <span class="ref">Hébreux 10:14</span> Ce pardon doit pourtant atteindre chacun et être accueilli. Le baptême l'applique une première fois et fait renaître à la vie de Dieu. Mais le baptisé peut retomber, et par un péché grave il se coupe lui-même de la grâce reçue : il ressort de l'eau où le Christ l'avait lavé. Le Seigneur a voulu que ce même pardon de la Croix lui soit redonné par la confession. Elle n'ajoute rien au sacrifice du Christ : elle en fait passer la grâce jusqu'au pécheur qui s'en était écarté. La tradition l'appelle la seconde planche après le naufrage : à qui a fait naufrage, elle offre de regagner le rivage.</p>
      <h2>Le péché mortel et le péché véniel</h2>
      <p>Tous les péchés ne blessent pas l'âme de la même manière, et la confession ne les atteint pas tous au même titre. Le péché mortel prive l'âme de la grâce sanctifiante, la vie de Dieu reçue au baptême, et éteint en elle la charité : il rompt l'amitié avec Dieu. Il porte sur une matière grave, commise en pleine conscience et de plein consentement. Le péché véniel, lui, ne prive pas de cette grâce ; il refroidit la charité sans l'éteindre, et blesse l'amitié sans la rompre. L'Écriture distingue déjà ces deux poids. <em>« Il est un péché qui mène à la mort... et il est un péché qui ne mène pas à la mort. »</em> <span class="ref">1 Jean 5:16-17</span> Le péché mortel doit être confessé pour être remis, et le pénitent en dit l'espèce et le nombre autant qu'il s'en souvient ; c'est la voie ordinaire par laquelle la grâce perdue est rendue. Le péché véniel n'oblige pas à la confession, puisqu'il laisse l'âme dans la grâce ; il se remet aussi par le regret, la prière, l'aumône et l'eucharistie. <em>« La charité couvre une multitude de péchés. »</em> <span class="ref">1 Pierre 4:8</span> Le confesser demeure pourtant fécond : la grâce du sacrement y ranime la charité que ces fautes avaient refroidie et affermit l'âme dans le bien.</p>
      <p>Celui qui, après un examen attentif, oublie pourtant un péché mortel le voit pardonné avec les autres par l'absolution : son repentir et sa volonté de tout avouer l'enveloppent. Si ce péché lui revient en mémoire, il est tenu de le confesser à la prochaine occasion. Quant aux fautes qu'on ne perçoit même pas, ce fond de désordre que nul ne discerne entièrement en lui, elles sont remises au pécheur dont le cœur se repent de tout, le connu comme l'inconnu. David priait déjà ainsi. <em>« Qui discerne ses égarements ? Purifie-moi de ceux qui me sont cachés. »</em> <span class="ref">Psaume 19:13</span></p>
      <h2>Les actes du pénitent</h2>
      <p>Le pénitent s'y prépare par l'examen de conscience : se tenir devant Dieu et passer sa vie en revue à la lumière de sa Parole, pour reconnaître ses fautes. Trois actes forment ensuite la matière du sacrement : la contrition, l'aveu et la satisfaction.</p>
      <p>La contrition d'abord, l'acte le plus important, car sans regret il n'y a pas de pardon : la douleur d'avoir péché, jointe à la ferme résolution de ne plus le faire. Ce regret prend deux formes. Il est contrition parfaite quand il naît de l'amour de Dieu : le pécheur souffre d'avoir offensé celui qu'il aime par-dessus tout. Il est contrition imparfaite, qu'on nomme aussi attrition, quand il naît de la crainte du châtiment ou du dégoût du péché. Les deux disposent au pardon, mais ne touchent pas le sacrement de la même façon. L'attrition suffit pour recevoir le pardon dans la confession. La contrition parfaite obtient le pardon dès qu'elle s'élève dans le cœur, avant même le sacrement, pourvu qu'elle s'accompagne de la volonté de se confesser ; elle ne dispense donc pas de la confession, dont elle porte déjà le désir. C'est par elle qu'est sauvé celui qui, repenti par amour, meurt sans avoir pu rejoindre un prêtre. Le Christ le dit de la pécheresse à ses pieds. <em>« Ses péchés, qui sont nombreux, lui sont pardonnés, car elle a beaucoup aimé. »</em> <span class="ref">Luc 7:47</span> L'Église l'a affirmé au concile de Trente, en 1551.</p>
      <p>L'aveu ensuite : dire ses péchés au prêtre, exposer la blessure à la lumière pour qu'elle soit guérie. <em>« Si nous confessons nos péchés, il est fidèle et juste pour nous les pardonner. »</em> <span class="ref">1 Jean 1:9</span> Cet aveu doit être entier et sincère : taire sciemment un péché mortel par honte rend la confession vaine et ajoute une faute à celle qu'on cache, car on ne trompe pas Dieu, devant qui rien n'est caché.</p>
      <p>La satisfaction enfin : accomplir la pénitence que le prêtre indique, une prière, un jeûne ou une bonne œuvre.</p>
      <h2>L'absolution</h2>
      <p>À ces trois actes répond l'absolution, la forme du sacrement : les paroles par lesquelles le prêtre remet les péchés au nom du Christ. Le mot vient du latin <em>absolvere</em>, délier : l'absolution délie le pécheur du lien que le péché avait noué en lui. Ce que le prêtre délie sur la terre, Dieu le tient pour délié dans le ciel. <em>« Tout ce que vous délierez sur la terre sera délié dans le ciel. »</em> <span class="ref">Matthieu 18:18</span> Le prêtre pardonne à la place du Christ, comme son ambassadeur, par une puissance qu'il tient du Seigneur. <em>« C'est au nom du Christ que nous faisons fonction d'ambassadeurs. »</em> <span class="ref">2 Corinthiens 5:20</span> Prêtant sa voix au Seigneur, il déclare : « Je t'absous de tes péchés, au nom du Père, et du Fils, et du Saint-Esprit. » Celui qui pardonne, par cette bouche, c'est le Christ lui-même. Le regret de l'homme dispose le cœur à recevoir ce don : l'acte du prêtre porte la puissance du Christ, l'ouverture du cœur la laisse entrer.</p>
      <h2>Ce que la confession opère</h2>
      <p>L'absolution remet la faute et, avec elle, la peine éternelle : l'âme qui avait perdu la grâce par un péché mortel la retrouve et redevient amie de Dieu. La charité éteinte renaît, les mérites que le péché avait éteints reviennent, et la conscience réconciliée goûte la paix. Le pénitent est aussi réconcilié avec l'Église, qu'il avait blessée, car nul ne pèche seul : le mal d'un membre atteint tout le corps, et son retour réjouit toute la maison. <em>« Il y aura plus de joie dans le ciel pour un seul pécheur qui se convertit que pour quatre-vingt-dix-neuf justes qui n'ont pas besoin de conversion. »</em> <span class="ref">Luc 15:7</span></p>
      <p>Au-delà de la faute et de la peine éternelle demeure souvent une peine temporelle : le péché pardonné laisse en l'homme un attachement désordonné et un tort à redresser. La satisfaction commence à le redresser ici-bas. L'Écriture le montre chez David. <em>« Le Seigneur a pardonné ton péché ; tu ne mourras pas. »</em> <span class="ref">2 Samuel 12:13</span> L'enfant né de la faute mourra cependant : le pardon de la faute n'efface pas toute conséquence. Cette réparation ne cherche pas à fléchir un Dieu exigeant, car le pardon est donné gratuitement ; elle guérit le pécheur de l'attachement laissé en lui et redresse le tort commis. Quand Zachée se convertit, il ne s'en tient pas au regret, il répare. <em>« Si j'ai fait tort à quelqu'un, je lui rends le quadruple. »</em> <span class="ref">Luc 19:8</span> Nos satisfactions n'ont de valeur que reçue de l'unique satisfaction du Christ, qui a réparé sur la Croix ce qu'aucun homme ne pouvait réparer. Ce qui demeure à purifier avant la mort s'achève au purgatoire ; et l'Église, puisant au trésor des mérites du Christ, peut en remettre une part par les indulgences.</p>
      <h2>La nécessité et la fréquence</h2>
      <p>Qui a conscience d'un péché mortel est tenu de le confesser, et de le faire avant de communier : on ne reçoit pas le corps du Christ avec une âme coupée de lui. <em>« Que chacun s'éprouve soi-même, et qu'ainsi il mange de ce pain et boive de cette coupe. »</em> <span class="ref">1 Corinthiens 11:28</span> L'Église en a fait un précepte : confesser ses péchés graves au moins une fois l'an. La confession régulière, même pour les seules fautes vénielles, n'est pas obligatoire ; elle purifie pourtant le regard, affermit contre la rechute et fait grandir dans l'amitié de Dieu.</p>
      <h2>Le secret de la confession</h2>
      <p>Ce secret porte un nom : le sceau sacramentel. Il couvre tout ce que le pénitent confie pour recevoir le pardon, ses péchés, leurs circonstances, tout ce qui pourrait le faire reconnaître. Le confesseur ne peut ni le redire, ni l'utiliser, ni même le laisser deviner par un mot ou une attitude. Aucune raison, si grave soit-elle, ne lève cette obligation : ni l'ordre d'un juge, ni le danger d'autrui, ni le besoin de se disculper lui-même.</p>
      <p>Cette inviolabilité tient à ce qui se passe dans la confession : le pénitent ne parle pas à un homme, il parle à Dieu, dont le prêtre n'est que l'instrument. Ce qui est avoué est confié à la miséricorde divine, qui efface et oublie. <em>« C'est moi qui efface tes transgressions, et je ne me souviendrai plus de tes péchés. »</em> <span class="ref">Isaïe 43:25</span> Le prêtre, simple ministre de ce pardon, est lié au même oubli : il a entendu comme l'oreille de Dieu, et ce qu'il a reçu appartient à Dieu seul. Trahir ce secret est l'une des fautes les plus graves qu'un prêtre puisse commettre ; des confesseurs ont préféré la prison ou la mort plutôt que de livrer ce qui leur avait été confié. <em>« Le médisant révèle les secrets, mais l'homme au cœur fidèle tient la chose cachée. »</em> <span class="ref">Proverbes 11:13</span> Le pénitent peut donc tout dire sans crainte : ce qu'il dépose au confessionnal n'en sortira jamais.</p>

      <h2>Tu es Pierre (Kêphas, en araméen)</h2>
      <p>À Césarée, Simon confesse que Jésus est le Christ, le Fils du Dieu vivant. Cette confession venait du Père : <em>« Ce ne sont pas la chair et le sang qui t'ont révélé cela, mais mon Père qui est dans les cieux. »</em> <span class="ref">Matthieu 16:17</span> Et c'est à celui qui vient de la recevoir que Jésus donne un nom nouveau et une mission : <em>« Tu es Pierre, et sur cette pierre je bâtirai mon Église, et les portes de l'enfer ne prévaudront pas contre elle. »</em> <span class="ref">Matthieu 16:18</span></p>

      <p>Jésus remet alors à Pierre les clés. <em>« Je te donnerai les clés du royaume des cieux ; tout ce que tu lieras sur la terre sera lié dans les cieux, et tout ce que tu délieras sur la terre sera délié dans les cieux. »</em> <span class="ref">Matthieu 16:19</span> L'image vient de l'Ancien Testament. Dans la maison royale de Juda, le roi confiait à un intendant la clé du palais, charge de gouverner en son nom. <em>« Je mettrai sur son épaule la clé de la maison de David ; il ouvrira, et nul ne fermera ; il fermera, et nul n'ouvrira. »</em> <span class="ref">Isaïe 22:22</span> Pierre reçoit cette charge pour le Royaume du Christ : l'autorité d'ouvrir et de fermer, de lier et de délier, au nom de son Seigneur.</p>

      <p>La promesse devient charge après la Résurrection. Par trois fois, le Ressuscité demande à Pierre s'il l'aime, et par trois fois lui confie son troupeau. <em>« Pais mes brebis. »</em> <span class="ref">Jean 21:17</span> Pierre reçoit ainsi la garde de toutes les brebis du Christ, les autres pasteurs compris.</p>

      <h2>Une charge qui demeure</h2>
      <p>L'Église est bâtie pour durer jusqu'à la fin des temps, et son fondement visible dure avec elle, transmis de Pierre à ses successeurs. Dès les origines, l'office laissé vacant par la défaillance d'un apôtre est confié à un autre : pour remplacer Judas, Pierre cite le psaume. <em>« Qu'un autre prenne sa charge. »</em> <span class="ref">Actes 1:20</span> Pierre achève sa course à Rome, où il verse son sang ; l'évêque de Rome est son héritier, et tient la même primauté sur l'Église entière. Sur cette charge repose le charisme par lequel il confirme ses frères dans la foi, que Jésus lui avait promis au soir de la Cène. <em>« J'ai prié pour toi, afin que ta foi ne défaille pas ; et toi, affermis tes frères. »</em> <span class="ref">Luc 22:32</span> Ce charisme tient de la promesse du Christ et non des mérites de celui qui l'exerce : Pierre, qui avait renié son Maître, fut relevé puis chargé d'affermir ses frères. C'est le fondement de l'infaillibilité pontificale.</p>
      <h2>L'infaillibilité pontificale</h2>
      <p>L'infaillibilité est le don par lequel le pape, lorsqu'il définit solennellement une doctrine de foi ou de morale à tenir par toute l'Église, est préservé de l'erreur par l'assistance de l'Esprit Saint. Elle prolonge la prière du Christ pour que la foi de Pierre ne défaille pas. Le pape n'engage ce don qu'en réunissant quatre conditions : il parle comme pasteur et docteur suprême de tous les chrétiens ; il use de son autorité apostolique suprême ; il définit une doctrine de foi ou de mœurs ; il la déclare à tenir par toute l'Église. On nomme un tel acte une définition <em>ex cathedra</em>, « du haut de la chaire » de Pierre. En dehors de ces conditions, dans ses homélies, ses décisions de gouvernement ou ses opinions personnelles, le pape enseigne et mérite le respect, sans être couvert par ce don. Le don préserve de l'erreur en gardant le dépôt reçu : le pape garde la foi transmise depuis les Apôtres et l'énonce fidèlement, sans y ajouter de parole nouvelle, car la révélation s'est achevée avec les Apôtres.</p>
      <h2>L'infaillibilité de l'Église</h2>
      <p>Ce don du pape découle d'une promesse faite à l'Église entière. Le Christ l'a assurée contre l'erreur et lui a donné son Esprit. <em>« L'Esprit de vérité vous conduira dans toute la vérité. »</em> <span class="ref">Jean 16:13</span> L'Église ne peut donc défaillir dans la foi. Cette infaillibilité, qui appartient au corps tout entier, s'exerce de deux manières : par le pape seul, dans une définition solennelle, ou par l'ensemble des évêques réunis en concile autour de lui ; dans les deux cas, c'est la même foi de l'Église qui se dit, pour trancher quand son unité est en jeu. Ce don laisse intacte la condition humaine du pape : il peut pécher, se tromper dans ses jugements, faillir dans sa conduite, et l'histoire en a connu de saints et d'indignes ; il ne rend ni saint ni omniscient, et garde seulement sa parole solennelle de l'erreur. L'Église a vécu cette assurance dès les origines et l'a définie en propres termes au concile Vatican I, en 1870. Son exercice solennel reste rare : en plus de vingt siècles, le pape n'a parlé ainsi que pour fixer ce qui touche au cœur de la foi, comme lorsqu'il a proclamé l'Immaculée Conception, en 1854, et l'Assomption, en 1950.</p>
      <h2>Les premiers successeurs</h2>
      <p>Le Nouveau Testament nomme déjà les premiers maillons de la chaîne romaine. Après Pierre vient Lin, que salue la seconde lettre à Timothée : <em>« Eubule, Pudens, Lin et Claudia te saluent. »</em> <span class="ref">2 Timothée 4:21</span> Plus loin paraît Clément, ce compagnon de Paul que la tradition reconnaît pour le quatrième pape : <em>« ... avec Clément et mes autres compagnons d'œuvre, dont les noms sont au livre de vie. »</em> <span class="ref">Philippiens 4:3</span> Les premiers de ceux qui tinrent la place de Pierre sont ainsi inscrits dans l'Écriture même.</p>
      <h2>Vicaire du Christ</h2>
      <p>Le pape tient la place du Christ comme pasteur visible du troupeau que le Seigneur conduit invisiblement : c'est ce que dit son titre de vicaire du Christ, celui qui agit au nom d'un autre et à sa place. Les évêques, successeurs des apôtres, forment un seul collège dont il est la tête, comme Pierre l'était parmi les Douze ; et l'on n'est dans l'Église du Christ qu'en demeurant en communion avec lui.</p>
      <h2>Serviteur des serviteurs de Dieu</h2>
      <p>Cette primauté est donnée pour servir, non pour dominer. Le plus grand dans l'Église se fait le serviteur de tous, à la suite du Christ qui lava les pieds de ses disciples ; et Pierre lui-même l'enseigne aux pasteurs. <em>« Paissez le troupeau de Dieu qui vous est confié, non en dominateurs, mais en vous faisant les modèles du troupeau. »</em> <span class="ref">1 Pierre 5:2-3</span> De là vient le plus ancien des titres du pape, serviteur des serviteurs de Dieu.</p>

      <h2>Le vol d'homme, crime capital</h2>

      <h2>Israël, peuple d'esclaves rachetés</h2>
      <p>Israël se sait né de l'esclavage. Toute son histoire commence par une délivrance : Dieu voit la misère d'un peuple asservi et descend l'arracher à ses maîtres. <em>« J'ai vu la misère de mon peuple qui est en Égypte, et j'ai entendu le cri que lui arrachent ses oppresseurs. Je suis descendu pour le délivrer. »</em> <span class="ref">Exode 3:7-8</span> Dieu se révèle ainsi comme celui qui libère, et ce souvenir devient la mesure de toute la Loi. Chaque fois qu'elle ordonne la douceur envers le serviteur, elle en donne la même raison : <em>« Tu te souviendras que tu as été esclave au pays d'Égypte, et que le Seigneur ton Dieu t'a racheté. »</em> <span class="ref">Deutéronome 15:15</span> Un peuple qui se définit par sa sortie de la servitude porte en lui de quoi la condamner.</p>

      <p>L'Évangile porte le coup décisif, non en changeant les lois de l'Empire, mais en changeant ce qui fonde toute loi : le regard sur l'homme. Devant le Christ, la condition sociale s'efface, car tous reçoivent la même dignité de fils de Dieu. <em>« Il n'y a plus ni Juif ni Grec, il n'y a plus ni esclave ni homme libre, car vous êtes tous un en Jésus-Christ. »</em> <span class="ref">Galates 3:28</span> Une courte lettre de Paul en montre l'effet concret. Onésime, esclave en fuite devenu chrétien, est renvoyé à son maître Philémon, chrétien lui aussi. Paul lui demande de le recevoir comme un frère. <em>« afin que tu le retrouves pour toujours, non plus comme un esclave, mais bien mieux qu'un esclave, comme un frère bien-aimé. »</em> <span class="ref">Philémon 15-16</span> Le maître reste maître selon le droit, et il a désormais pour frère celui qu'il possède : cette fraternité rend la possession intenable. À ce maître, l'Apôtre rappelle qu'il en a un au-dessus de lui : <em>« Maîtres, accordez à vos serviteurs ce qui est juste et équitable, sachant que vous avez, vous aussi, un Maître dans le ciel. »</em> <span class="ref">Colossiens 4:1</span> Et à l'esclave, il conseille de saisir la liberté dès qu'il le peut : <em>« si tu peux devenir libre, profites-en plutôt. »</em> <span class="ref">1 Corinthiens 7:21</span></p>
      <h2>La semence et son fruit</h2>
      <p>Reste la question qui revient toujours : pourquoi le Christ, ni les apôtres, n'ont-ils pas aboli l'esclavage d'un mot ? Dieu conduit les hommes par degrés et tolère un temps des états imparfaits qu'il redressera ensuite, à mesure que les cœurs peuvent le porter. Le Christ le dit lui-même de la répudiation que Moïse avait permise : <em>« C'est à cause de la dureté de votre cœur que Moïse vous a permis de répudier vos femmes ; mais au commencement il n'en était pas ainsi. »</em> <span class="ref">Matthieu 19:8</span> Il en va de l'esclavage comme du divorce : l'Écriture part de l'homme tel qu'elle le trouve et le mène où il doit aller. Décréter l'abolition dans un monde où l'esclave se comptait par millions eût été un mot sans prise ; semer la fraternité, c'était atteindre la racine. Avec le temps, la semence a porté son fruit : l'Église a tenu l'affranchissement pour une œuvre de charité, racheté les captifs, condamné le rapt et le commerce des hommes, jusqu'à reconnaître que nul ne peut être la propriété d'un autre, parce que tout homme est l'image de Dieu et le frère du Christ. Ce que l'Évangile avait posé en principe, l'histoire l'a déplié jusqu'au bout.</p>

      <h2>L'anathème</h2>
      <p>Le mot hébreu rendu par « interdit » ou « anathème », <em>ḥerem</em> (חֵרֶם), désigne le fait de vouer une chose à Dieu en la retranchant absolument de l'usage des hommes ; appliqué à une ville ennemie, il signifie qu'elle lui est livrée tout entière, sans butin gardé ni alliance conclue. La version grecque le traduit par <em>anathema</em> (ἀνάθεμα), ce qui est mis à part. L'anathème porte sur le culte d'un peuple.</p>

      <h2>La part de la rhétorique</h2>

      <h2>Un commandement unique</h2>

      <h2>Un envoyé qui porte le Nom</h2>
      <p>Le mot rendu par « ange », hébreu <em>malak</em> (מַלְאָךְ) et grec <em>angelos</em> (ἄγγελος), désigne le messager : il nomme une fonction, l'envoi, non une nature, et l'Écriture l'applique même à un homme, en <span class="ref">Marc 1:2</span> et <span class="ref">Malachie 3:1</span>, Jean le Baptiste est appelé « ange » en grec et en hébreu. Ainsi « l'ange du Seigneur » est envoyé par le Seigneur, distinct de lui ; et pourtant cet envoyé agit comme Dieu en personne, en parlant à la première personne : il pardonne ou retient le pardon, il sauve, et il reçoit l'adoration due à Dieu seul. Surtout, il porte en lui le Nom même de Dieu, ces quatre lettres, YHWH (יהוה), qu'Israël n'osait prononcer : en lisant, il disait à leur place le mot hébreu rendu par « Seigneur », <em>Adonaï</em> (אֲדֹנָי). Annonçant cet Ange qui doit conduire son peuple à travers le désert, le Seigneur l'envoie comme un autre et avoue en même temps qu'il est plus qu'un autre. <em>« Écoute sa voix et ne lui résiste pas, car il ne pardonnera pas vos transgressions, car mon nom est en lui. »</em> <span class="ref">Exode 23:20-23</span> Porter le Nom de Dieu, c'est porter ce que Dieu est. Distinct du Seigneur qui l'envoie, il porte pourtant le Nom du Seigneur.</p>

      <h2>L'échelle de Jacob</h2>

      <h2>Le buisson ardent</h2>

      <h2>Gédéon et les parents de Samson</h2>
      <p>Gédéon reçoit la visite de « l'ange du Seigneur », que le récit, au fil de la conversation, nomme « le Seigneur » ; quand il comprend qui il a vu, il croit mourir d'avoir vu Dieu face à face, et il bâtit un autel au Seigneur <span class="ref">Juges 6:11-24</span>. Les parents de Samson, eux, demandent son nom à « l'ange du Seigneur », qui répond que son nom est mystérieux, trop haut pour être dit <span class="ref">Juges 13:15-18</span> ; puis ils le voient monter au ciel dans la flamme de leur offrande, et Manoah comprend qui ils ont vu. <em>« Nous allons mourir, car nous avons vu Dieu. »</em> <span class="ref">Juges 13:20-23</span> Ils ont rencontré celui que le texte nomme l'envoyé du Seigneur, et ils sont certains d'avoir vu Dieu.</p>

      <h2>L'ange de l'alliance</h2>
      <p>Le prophète Malachie annonce l'une après l'autre deux venues. D'abord celle d'un messager qui prépare le chemin, que le Nouveau Testament reconnaîtra en Jean-Baptiste ; puis celle d'un autre, à la fois envoyé et Seigneur. <em>« Voici, j'envoie mon messager, et il préparera le chemin devant moi ; et soudain entrera dans son temple le Seigneur que vous cherchez ; et l'ange de l'alliance que vous désirez, le voici qui vient, dit le Seigneur des armées. »</em> <span class="ref">Malachie 3:1</span> Le dernier des prophètes nomme le Messie « l'ange de l'alliance » et « le Seigneur ».</p>

      <h2>Un dessein formé avant le monde</h2>
      <p>Paul a résumé tout le dessein de Dieu en deux versets, au cœur d'une page écrite pour soutenir des croyants dans l'épreuve. <em>« Ceux qu'il a connus d'avance, il les a aussi prédestinés à être conformes à l'image de son Fils, afin qu'il soit le premier-né d'une multitude de frères ; ceux qu'il a prédestinés, il les a aussi appelés ; ceux qu'il a appelés, il les a aussi justifiés ; et ceux qu'il a justifiés, il les a aussi glorifiés. »</em> <span class="ref">Romains 8:29-30</span></p>
      <p>Le premier mot porte le reste. Dans la Bible, connaître quelqu'un, c'est s'attacher à lui : le mot hébreu rendu par « connaître », <em>yada</em> (יָדַע), unit le savoir, le choix et l'amour. « Connaître d'avance » les siens veut donc dire les élire de toute éternité.</p>

      <p>Cette élection est gratuite. Dieu aime et appelle le premier, et tout le reste, l'appel, la justification, la persévérance, découle de cette libéralité. <em>« Il nous a sauvés et appelés par un saint appel, non à cause de nos œuvres, mais en vertu de son propre dessein et de sa grâce. »</em> <span class="ref">2 Timothée 1:9</span> Paul l'éclaire par l'image du potier : le salut ne se réclame pas comme un dû, il se reçoit comme un don. <em>« Le potier n'est-il pas maître de son argile ? »</em> <span class="ref">Romains 9:21</span></p>
      <h2>Dieu veut le salut de tous</h2>
      <p>L'élection des uns ne fait pas de Dieu l'auteur de la perte des autres : il offre à chacun la grâce du salut. <em>« Dieu veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. »</em> <span class="ref">1 Timothée 2:4</span> Sa volonté va jusqu'au pécheur lui-même. <em>« Je ne prends pas plaisir à la mort du méchant, mais à ce qu'il se détourne de sa voie et qu'il vive. »</em> <span class="ref">Ézéchiel 33:11</span></p>
      <h2>La liberté que la grâce éveille</h2>
      <p>La prédestination s'accomplit à travers la liberté de l'homme. La grâce meut le cœur sans le forcer, et l'homme y répond par un acte vraiment sien. C'est l'homme qui veut et qui agit ; et c'est Dieu qui fait qu'il le veuille et l'accomplisse. Le même acte est tout entier de l'homme, qui en est l'auteur, et tout entier de Dieu, qui en est la source. <em>« Travaillez à votre salut avec crainte et tremblement, car c'est Dieu qui produit en vous le vouloir et le faire, selon son dessein bienveillant. »</em> <span class="ref">Philippiens 2:12-13</span></p>
      <h2>Nul n'est destiné à se perdre</h2>
      <p>Personne n'est prédestiné au mal ni voué d'avance à la damnation. Dieu ne pousse personne à pécher : celui qui se perd se perd par son propre refus, en se détournant de Dieu et en s'y obstinant jusqu'au bout. La damnation est l'œuvre de l'homme qui rejette l'amour offert, non un décret porté contre lui. <em>« Que nul, dans l'épreuve, ne dise : C'est Dieu qui me tente ; car Dieu ne tente personne. »</em> <span class="ref">Jacques 1:13</span></p>
      <h2>L'espérance du salut</h2>
      <p>Nul ne sait avec certitude, en cette vie, s'il compte parmi les élus ; cette assurance ne nous est pas donnée, et s'en croire sûr serait présomption. Ce que Dieu donne, c'est une ferme espérance, appuyée sur sa fidélité. À l'homme d'y répondre par sa vie. <em>« Efforcez-vous d'affermir votre vocation et votre élection. »</em> <span class="ref">2 Pierre 1:10</span> Et la persévérance finale est elle-même une grâce. <em>« Il vous affermira jusqu'à la fin, pour que vous soyez irréprochables au jour de notre Seigneur Jésus-Christ. »</em> <span class="ref">1 Corinthiens 1:8</span></p>
      <h2>Choisis dans le Christ</h2>
      <p>Toute la prédestination tient dans le Christ. C'est en lui que Dieu nous choisit, en lui que nous sommes appelés, justifiés et conduits à la gloire ; il est le premier des prédestinés, et nul n'est élu qu'uni à lui. Se savoir aimé de Dieu de toute éternité appelle à la confiance et à l'action de grâce : l'initiative vient de lui. <em>« Ce n'est pas vous qui m'avez choisi, mais moi qui vous ai choisis. »</em> <span class="ref">Jean 15:16</span></p>

      <h2>Le sens du martyre</h2>
      <p>Le mot « martyr » vient du grec <em>martys</em> (μάρτυς), le témoin. Le martyr rend au Christ le témoignage le plus entier : il aime mieux perdre la vie que le renier, et donne ainsi de l'amour de Dieu une preuve que rien ne surpasse. Sa mort le configure à celle du Christ, dont il partage la croix pour partager la victoire. L'Église l'a toujours tenue pour un baptême dans le sang : celui qui meurt pour le Christ sans avoir reçu le baptême d'eau est lavé de tout péché et entre aussitôt au ciel. Les actes des martyrs, ces récits de leur procès et de leur mort, les montrent souvent paisibles, parfois joyeux devant le supplice, car cette force ne vient pas d'eux, mais de la grâce. <em>« Sois fidèle jusqu'à la mort, et je te donnerai la couronne de vie. »</em> <span class="ref">Apocalypse 2:10</span></p>

      <h2>La question des lapsi</h2>

      <h2>La paix de l'Église</h2>
      <p>Au début du quatrième siècle, l'Empire renonça au combat. En 311, l'empereur Galère, mourant, accorda aux chrétiens la liberté de leur culte ; en 313, après sa victoire, Constantin la confirma et l'étendit par l'édit de Milan, qui rendit au christianisme une pleine liberté. L'âge des martyrs prenait fin. Mais le sang versé n'avait pas éteint la foi : il l'avait répandue. La foule venue voir mourir des condamnés attendait des cris et des reniements ; elle voyait des hommes et des femmes affronter le supplice avec paix, parfois en pardonnant à leurs bourreaux, et tenir jusqu'au bout pour un crucifié. Une telle constance passait les forces de l'homme. Beaucoup repartaient ébranlés par ce qu'ils avaient vu ; ils s'interrogeaient, cherchaient à connaître cette foi, s'approchaient des chrétiens pour s'en instruire, et nombre d'entre eux finissaient par demander le baptême. Selon le mot de Tertullien, le sang des martyrs est une semence de chrétiens. <em>« Si le grain de blé tombé en terre ne meurt, il reste seul ; mais s'il meurt, il porte beaucoup de fruit. »</em> <span class="ref">Jean 12:24</span> L'Église sortit de ces trois siècles affermie, et elle n'oublia jamais ceux qui l'avaient scellée de leur sang.</p>

      <p>Dieu a inscrit le mariage dans la nature de l'homme et de la femme dès la création. En les créant l'un pour l'autre, il les unit dans une seule vie et les bénit pour la fécondité. <em>« L'homme quittera son père et sa mère, il s'attachera à sa femme, et ils deviendront une seule chair. »</em> <span class="ref">Genèse 2:24</span> Il ouvre cette union à la vie, faisant des époux les premiers transmetteurs de la sienne. <em>« Soyez féconds et multipliez-vous. »</em> <span class="ref">Genèse 1:28</span></p>
      <h2>Les fins du mariage</h2>
      <p>Le mariage sert deux fins que Dieu a jointes ensemble. La première est le bien des époux eux-mêmes : ils sont faits l'un pour l'autre, s'aident, se complètent et grandissent ensemble vers Dieu. <em>« Il n'est pas bon que l'homme soit seul ; je lui ferai une aide qui lui corresponde. »</em> <span class="ref">Genèse 2:18</span> La seconde est l'accueil et l'éducation des enfants : l'amour des époux, par sa nature même, se prolonge dans la vie qu'il transmet et qu'il élève. Ces deux fins se tiennent : l'union des époux s'ouvre à l'enfant, et l'enfant naît du don que les époux se font l'un à l'autre.</p>
      <h2>Élevé par le Christ au rang de sacrement</h2>
      <p>Le Christ a élevé le mariage à la dignité de sacrement en l'unissant à sa propre alliance avec l'Église. L'amour des époux reproduit l'amour du Christ pour elle : comme le Christ se donne pour l'Église jusqu'à la Croix, lui demeure uni sans jamais s'en séparer et la rend féconde, les époux se donnent l'un à l'autre tout entiers, demeurent unis pour la vie et ouvrent leur amour à la vie. L'union visible des deux époux donne ainsi à voir l'union invisible du Christ et de l'Église : c'est en cela qu'elle en est le signe. <em>« Ce mystère est grand : je le dis par rapport au Christ et à l'Église. »</em> <span class="ref">Éphésiens 5:32</span> Cette élévation suppose le baptême des deux époux, qui les fait membres du Christ : c'est parce qu'ils lui appartiennent que leur union peut porter le signe de son union avec l'Église. Le mariage de deux baptisés est donc toujours sacrement, qu'ils soient catholiques ou de confessions chrétiennes différentes ; et si l'un n'est pas baptisé, leur union, mariage voulu par Dieu, est élevée au rang de sacrement le jour où il reçoit le baptême.</p>
      <h2>Unité et indissolubilité</h2>
      <p>Le mariage possède deux propriétés qui lui sont essentielles : l'unité et l'indissolubilité. L'unité : un seul homme et une seule femme. L'indissolubilité : le lien dure jusqu'à la mort, car ce que Dieu unit, nul ne peut le défaire. Le Christ l'affirme en revenant au dessein du commencement. <em>« Que l'homme ne sépare pas ce que Dieu a uni. »</em> <span class="ref">Matthieu 19:6</span> À ceux qui invoquaient la permission de répudier accordée autrefois, il répond qu'elle fut une concession à la dureté des cœurs, et renvoie au plan premier de Dieu. <em>« C'est à cause de la dureté de votre cœur que Moïse vous a permis de répudier vos femmes ; mais au commencement il n'en était pas ainsi. »</em> <span class="ref">Matthieu 19:8</span></p>
      <h2>Le consentement et la grâce</h2>
      <p>Les ministres du sacrement sont les époux eux-mêmes, qui se le confèrent l'un à l'autre en échangeant leur consentement, le oui libre par lequel chacun se donne et reçoit l'autre ; cet échange des consentements en est à la fois la matière et la forme. Le prêtre ou le diacre y assiste comme témoin qualifié de l'Église, reçoit ce consentement en son nom et bénit l'alliance. Par ce sacrement, Dieu accorde aux époux une grâce propre : elle fortifie leur amour, les aide à se sanctifier l'un l'autre et à accueillir et élever leurs enfants dans la foi. Le foyer qu'ils forment devient ainsi une Église domestique, le premier lieu où la foi se vit et se transmet.</p>

      <p>Le diacre reçoit le sacrement de l'ordre à son troisième degré, sous l'évêque et le prêtre. Le mot grec rendu par « diacre », <em>diakonos</em> (διάκονος), désigne le serviteur. L'évêque lui impose les mains pour le service et non pour le sacerdoce : le diacre ne consacre pas l'eucharistie et ne pardonne pas les péchés, ces actes demeurant au prêtre et à l'évêque. Dès l'Église des apôtres, cet ordre se tient auprès de l'évêque. <em>« avec les évêques et les diacres. »</em> <span class="ref">Philippiens 1:1</span> Son origine se lit au livre des Actes : les premiers chrétiens pourvoyaient chaque jour aux besoins des veuves, mais certaines étaient négligées dans cette distribution ; pour rester libres pour la prière et l'annonce de la parole, les apôtres firent choisir sept hommes chargés de ce service. <em>« Choisissez parmi vous sept hommes de bonne réputation, remplis de l'Esprit Saint et de sagesse. »</em> <span class="ref">Actes 6:3</span> Parmi eux, Étienne, le premier à mourir pour le Christ. Le service du diacre s'étend à trois domaines : à l'autel, il assiste l'évêque et le prêtre, proclame l'Évangile et peut prêcher, distribue la communion ; dans la parole, il enseigne et porte l'Évangile au monde ; dans la charité, il prend soin des pauvres, ce pour quoi les sept furent d'abord choisis. Il peut aussi baptiser, bénir et présider les funérailles. Le diaconat se reçoit comme une étape vers le sacerdoce, ou se vit comme un état permanent, ouvert aussi à des hommes mariés. Tout ce ministère rend visible une chose : l'Église est servante, à l'image de son Seigneur, qui lava les pieds de ses disciples. <em>« Le Fils de l'homme n'est pas venu pour être servi, mais pour servir, et donner sa vie en rançon pour la multitude. »</em> <span class="ref">Matthieu 20:28</span></p>
      <h2>Le rite de l'ordination</h2>
      <p>Le ministre de l'ordination est l'évêque seul. La matière est l'imposition des mains : l'évêque pose les mains sur la tête de l'ordonné, en silence ; la forme est la prière consécratoire qui suit, demandant à Dieu de répandre sur lui l'Esprit Saint et la grâce du degré qu'il reçoit. Ce geste et cette prière forment ensemble le cœur du sacrement ; on les trouve déjà dans l'Église des apôtres, lorsque les sept furent établis. <em>« Ils les présentèrent aux apôtres, qui prièrent et leur imposèrent les mains. »</em> <span class="ref">Actes 6:6</span> Les autres rites, la présentation du candidat, l'onction des mains du prêtre, la remise des instruments de sa charge, entourent ce cœur et en expriment le sens.</p>

      <p>L'ordre configure pour toujours celui qui le reçoit au sacerdoce du Christ ; c'est pourquoi il se reçoit une seule fois et imprime un sceau qui ne s'efface pas. <em>« Tu es prêtre pour l'éternité, selon l'ordre de Melchisédech. »</em> <span class="ref">Hébreux 7:17</span> Par ce sceau, l'ordonné agit en la personne du Christ, <em>in persona Christi</em> : sa parole et son geste deviennent ceux du Seigneur, qui s'identifie à ceux qu'il envoie. L'Écriture emploie l'expression même là où le pardon est donné au nom du Seigneur. <em>« Ce que j'ai pardonné, je l'ai fait à cause de vous, en la personne du Christ. »</em> <span class="ref">2 Corinthiens 2:10</span> Quand le prêtre célèbre l'eucharistie ou pardonne les péchés, c'est le Christ lui-même qui agit par ses mains ; le ministre prête sa voix et ses gestes au Seigneur, auteur de ce qui s'accomplit.</p>
      <h2>Le célibat sacerdotal</h2>
      <p>Dans l'Église latine, l'évêque et le prêtre s'engagent au célibat, librement embrassé pour le Royaume. Cet état relève de la discipline de l'Église, qui l'a reçu de l'exemple du Christ, prêtre et vierge, et de sa parole sur ceux qui renoncent au mariage pour le Royaume. <em>« Il y a des eunuques qui se sont rendus tels eux-mêmes à cause du royaume des cieux ; comprenne qui peut comprendre. »</em> <span class="ref">Matthieu 19:12</span> Le prêtre configuré au Christ se donne à lui d'un cœur sans partage et se rend tout entier disponible pour son peuple, signe vivant du monde à venir. <em>« Celui qui n'est pas marié a souci des choses du Seigneur, cherchant à plaire au Seigneur. »</em> <span class="ref">1 Corinthiens 7:32</span> Les Églises catholiques d'Orient, en communion avec le pape, connaissent une autre discipline, où des hommes mariés accèdent au sacerdoce, et le diaconat permanent demeure partout ouvert aux hommes mariés ; le célibat reste, pour l'Église latine, le chemin de ses prêtres.</p>
      <h2>Sacerdoce commun et sacerdoce ministériel</h2>
      <p>Par le baptême, tous les fidèles participent au sacerdoce du Christ : ils offrent leur vie à Dieu, prient et témoignent. C'est le sacerdoce commun. Par l'ordre, certains reçoivent le sacerdoce ministériel, pour servir ce sacerdoce commun en rendant le Christ présent à son peuple. Le ministre est ainsi tout entier au service des fidèles. <em>« Tout grand prêtre, pris parmi les hommes, est établi pour les hommes dans leurs relations avec Dieu, afin d'offrir des dons et des sacrifices pour les péchés. »</em> <span class="ref">Hébreux 5:1</span></p>
      <div class="fin-article">✦</div>
    `
  },
  {
    id: "les-sacrements",
    titre: "Les sacrements",
    theme: "sacrements",
    resume: "Les sept signes institués par le Christ, par lesquels il communique sa grâce : signes efficaces qui produisent ce qu'ils représentent, ils tirent leur force de sa Passion. Trois servent l'initiation chrétienne (baptême, confirmation, eucharistie), deux la guérison (confession, onction des malades), deux le service de la communion (ordre, mariage).",
    date: "2026",
    contenu: `
      <p>Les sacrements sont les sept signes institués par le Christ, par lesquels il communique sa grâce à ceux qui les reçoivent. Chacun emploie des éléments que l'on peut voir, toucher ou entendre : l'eau, l'huile, le pain, l'imposition des mains, les paroles prononcées. Par eux, le Christ touche la vie de l'homme à ses moments décisifs, de la naissance à la mort. L'Église en a discerné sept, tous reçus du Seigneur.</p>
      <h2>Qu'est-ce qu'un sacrement</h2>
      <p>Un sacrement est un signe efficace de la grâce : un geste visible qui produit invisiblement ce qu'il représente. L'eau du baptême lave l'âme du péché ; le pain de l'eucharistie devient le corps du Christ. Tous tirent leur force de la Passion : la grâce qu'ils communiquent a été acquise au Calvaire. L'Église y a toujours lu la figure des sacrements, dans le côté ouvert du Crucifié. <em>« Un des soldats lui transperça le côté, et aussitôt il en sortit du sang et de l'eau. »</em> <span class="ref">Jean 19:34</span></p>
      <h2>Institués par le Christ</h2>
      <p>Le Christ seul pouvait attacher la grâce à un signe, car elle vient de lui : l'Église ne crée pas les sacrements, elle administre ce qu'elle a reçu. Chacun des sept remonte à une parole ou à un geste du Seigneur. Il a baptisé par ses disciples et les a envoyés baptiser toutes les nations ; il a changé le pain en son corps à la Cène et commandé de le refaire ; il a donné aux Apôtres le pouvoir de remettre les péchés ; il a guéri les malades et confié ce geste aux siens ; il a élevé l'union de l'homme et de la femme au rang de signe de son alliance. Le commandement du baptême en donne le modèle. <em>« De toutes les nations faites des disciples, les baptisant au nom du Père et du Fils et du Saint-Esprit. »</em> <span class="ref">Matthieu 28:19</span> Et dans chaque sacrement, c'est encore lui qui agit : c'est le Christ qui baptise, qui pardonne, qui nourrit, par la main de ses ministres.</p>
      <h2>La matière, la forme et le ministre</h2>
      <p>Tout sacrement unit trois éléments. La matière est la chose sensible que l'on emploie : l'eau du baptême, l'huile de la confirmation et de l'onction, le pain et le vin de l'eucharistie, l'imposition des mains de l'ordre. La forme est faite des paroles qui fixent le sens du geste et disent ce qu'il opère ; la parole s'ajoute à l'élément, et le sacrement est là. Le ministre, enfin, accomplit le signe au nom du Christ, prêtant sa voix et ses mains à celui qui agit réellement. Réunis, ces trois font le sacrement.</p>
      <h2>Des signes qui agissent par la puissance du Christ</h2>
      <p>Le sacrement donne la grâce par le fait même qu'il est accompli, ce que la tradition appelle agir <em>ex opere operato</em>, « par le fait même de l'acte posé », parce que c'est le Christ qui agit en lui. C'est sa puissance qui le rend fécond : un ministre indigne baptise aussi validement qu'un saint, car le don vient du Christ, par la main de l'homme. <em>« Ni celui qui plante ni celui qui arrose n'est quelque chose, mais Dieu seul, qui fait croître. »</em> <span class="ref">1 Corinthiens 3:7</span></p>
      <h2>La disposition de celui qui reçoit</h2>
      <p>Le don est offert par l'acte même, et il rencontre une liberté. Du côté de celui qui reçoit, le fruit du sacrement demande un cœur ouvert, prêt à l'accueillir : la foi, le repentir, le désir de la grâce disposent à la recevoir pleinement. Un obstacle peut le retenir : qui s'approche sans foi, ou attaché au péché grave, reçoit le sacrement validement, sans en recueillir le fruit, et peut même le tourner contre lui. <em>« Celui qui mange et boit sans discerner le corps mange et boit sa propre condamnation. »</em> <span class="ref">1 Corinthiens 11:29</span> La grâce attend que l'homme lui fasse place.</p>
      <h2>La grâce et le caractère</h2>
      <p>Tout sacrement donne la grâce, à des titres divers. Chacun confère d'abord la grâce sanctifiante, cette participation à la vie de Dieu qui fait vivre l'âme, et avec elle une grâce propre, ajustée à ce qu'il accomplit : naître, être nourri, être pardonné, être envoyé. Trois sacrements impriment en outre dans l'âme un caractère, un sceau spirituel qui configure au Christ pour toujours : le baptême, la confirmation et l'ordre. <em>« Il nous a marqués de son sceau et a mis dans nos cœurs les arrhes de l'Esprit. »</em> <span class="ref">2 Corinthiens 1:22</span> Ce sceau ne s'efface jamais ; c'est pourquoi ces trois sacrements se reçoivent une seule fois.</p>
      <h2>Les sacrements de l'initiation chrétienne</h2>
      <p>Trois sacrements font naître et grandir à la vie chrétienne. Le baptême fait renaître comme enfant de Dieu et efface le péché. La confirmation donne l'Esprit Saint en plénitude, pour fortifier et envoyer témoigner. L'eucharistie nourrit de la chair et du sang du Christ et achève l'initiation. <em>« Nul, s'il ne naît d'eau et d'Esprit, ne peut entrer dans le royaume de Dieu. »</em> <span class="ref">Jean 3:5</span></p>
      <h2>Les sacrements de la guérison</h2>
      <p>Deux sacrements relèvent le chrétien blessé par le péché ou la maladie. La confession remet les péchés commis après le baptême et réconcilie avec Dieu. L'onction des malades soutient celui qu'éprouve la maladie grave, remet ses péchés et unit sa souffrance à celle du Christ. <em>« Afin que vous sachiez que le Fils de l'homme a sur la terre le pouvoir de remettre les péchés : Lève-toi, prends ton lit et va dans ta maison. »</em> <span class="ref">Matthieu 9:6</span></p>
      <h2>Les sacrements au service de la communion</h2>
      <p>Deux sacrements ordonnent au service des autres et à la mission. L'ordre établit évêques, prêtres et diacres pour conduire et sanctifier le peuple de Dieu. Le mariage unit un homme et une femme pour la vie, et fait de leur amour le signe vivant de l'union du Christ et de l'Église. <em>« Ce mystère est grand : je le dis par rapport au Christ et à l'Église. »</em> <span class="ref">Éphésiens 5:32</span> Reçus pour le bien de tous, ils bâtissent la communauté des croyants.</p>
      <h2>Les sacramentaux</h2>
      <p>À côté des sept, l'Église a institué d'autres signes sacrés, les sacramentaux : les bénédictions de personnes, de lieux et d'objets, les consécrations, l'eau bénite, les exorcismes. Ils ne confèrent pas la grâce par eux-mêmes, comme les sacrements, mais disposent à la recevoir et sanctifient les circonstances de la vie par la prière de l'Église. <em>« Tout est sanctifié par la parole de Dieu et la prière. »</em> <span class="ref">1 Timothée 4:5</span></p>
      <div class="fin-article">✦</div>
    `
  }
];

function articlesOrdonnes(){
  let out=[];
  for(const t of THEMES){
    const at=ARTICLES.filter(a=>a.theme===t.id);
    if(t.categories){
      const vus=new Set();
      for(const c of t.categories){ for(const id of c.arts){ const a=at.find(x=>x.id===id); if(a){out.push(a);vus.add(id);} } }
      for(const a of at) if(!vus.has(a.id)) out.push(a);
    } else out.push(...at);
  }
  return out;
}
function resumeHtml(txt){
  if(txt.length<=195) return `<p>${txt}</p>`;
  var cut=txt.lastIndexOf(' ',150); if(cut<100)cut=150;
  var court=txt.slice(0,cut).replace(/[\s,;:–—-]+$/,'');
  return '<p class="resume r-trunc"><span class="r-court">'+court+'…</span><span class="r-full" hidden>'+txt+'</span> <span class="voir-plus" role="button" tabindex="0" data-more="voir plus" data-less="voir moins">voir plus</span></p>';
}
document.addEventListener('click',function(e){
  var vp=e.target.closest&&e.target.closest('.voir-plus'); if(!vp)return;
  e.preventDefault(); e.stopPropagation();
  var p=vp.closest('.r-trunc'); if(!p)return;
  var court=p.querySelector('.r-court'), full=p.querySelector('.r-full');
  if(full.hasAttribute('hidden')){court.setAttribute('hidden','');full.removeAttribute('hidden');vp.textContent=vp.dataset.less;}
  else{full.setAttribute('hidden','');court.removeAttribute('hidden');vp.textContent=vp.dataset.more;}
});
document.addEventListener('keydown',function(e){
  if((e.key==='Enter'||e.key===' ')&&e.target.classList&&e.target.classList.contains('voir-plus')){e.preventDefault();e.target.click();}
});
function carteArticle(a){
  return `<a class="article-lien" href="#/article/${a.id}">
      <h3>${a.titre}</h3>
      ${resumeHtml(a.resume)}
    </a>`;
}
function corpsDomaine(t){
  const at = ARTICLES.filter(a=>a.theme===t.id);
  const vide = `<div class="vide">Ce domaine n'a pas encore d'entrée. Les contenus s'ajoutent au fil du temps.</div>`;
  if(!t.categories){
    return at.map(carteArticle).join('') || vide;
  }
  let html='';const vus=new Set();
  for(const c of t.categories){
    const arts = c.arts.map(id=>at.find(a=>a.id===id)).filter(Boolean);
    arts.forEach(a=>vus.add(a.id));
    if(!arts.length) continue;
    if(c.nom){
      html += `<div class="sous" data-cat="${c.id}">
        <div class="sous-tete">
          <span class="sous-puce" aria-hidden="true"></span>
          <span class="sous-nom">${c.nom}</span>
          <span class="sous-chevron" aria-hidden="true">›</span>
        </div>
        <div class="sous-corps">${arts.map(carteArticle).join('')}</div>
      </div>`;
    } else {
      html += arts.map(carteArticle).join('');
    }
  }
  html += at.filter(a=>!vus.has(a.id)).map(carteArticle).join('');
  return html || vide;
}
