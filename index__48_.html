      <p>Sauver, dans l'Écriture, se dit d'abord racheter. Racheter, c'est payer le prix qui rend la liberté à un captif ; et l'homme était captif du péché, livré à un maître dont il ne pouvait se délier par ses seules forces. Le Christ paie ce prix en donnant sa vie. <em>« Le Fils de l'homme est venu donner sa vie en rançon pour la multitude. »</em> <span class="ref">Marc 10:45</span> Ce prix dit la valeur de ce qu'il a fallu donner pour nous arracher au mal : le sang même du Fils. <em>« Vous avez été rachetés non par des biens périssables, l'argent ou l'or, mais par le sang précieux du Christ. »</em> <span class="ref">1 Pierre 1:18-19</span> C'est ce que nomme le mot rédemption, du latin <em>redimere</em>, racheter.</p>
      <h2>Un don de la grâce</h2>
      <p>Le salut est offert gratuitement, avant tout mérite. L'initiative vient tout entière de Dieu : c'est lui qui sauve, par pure grâce, et l'homme reçoit de lui ce qu'aucune force humaine ne pouvait obtenir. <em>« C'est par la grâce que vous êtes sauvés, par le moyen de la foi ; cela ne vient pas de vous, c'est le don de Dieu. »</em> <span class="ref">Éphésiens 2:8</span></p>
      <h2>Devenir fils de Dieu</h2>
      <p>Le salut élève l'homme plus haut qu'il n'était avant la chute. Par la grâce, Dieu fait du sauvé son enfant, l'adoptant dans son Fils unique. <em>« Dieu a envoyé son Fils, afin que nous recevions l'adoption filiale. »</em> <span class="ref">Galates 4:4-5</span> Cette adoption donne part à la vie même de Dieu, à sa nature. <em>« Il vous a donné de devenir participants de la nature divine. »</em> <span class="ref">2 Pierre 1:4</span> La tradition résume ce mystère d'un mot : Dieu s'est fait homme pour que l'homme devienne dieu, non par nature, mais par grâce, élevé jusqu'à partager ce que Dieu est. C'est l'œuvre commencée au baptême et achevée dans la gloire, lorsque l'homme verra Dieu et vivra de sa vie.</p>
      <h2>Accueilli dans une foi vivante</h2>
      <p>Ce don attend pourtant d'être reçu. L'homme accueille le salut par la foi, qui s'ouvre dans la conversion et entre dans la vie nouvelle par le baptême. <em>« Si tu confesses de ta bouche que Jésus est Seigneur et si tu crois dans ton cœur que Dieu l'a ressuscité des morts, tu seras sauvé. »</em> <span class="ref">Romains 10:9</span> Cette foi est vivante : elle se montre dans la charité et dans les œuvres qu'elle inspire ; une foi qui n'agirait pas serait morte. <em>« Ce qui vaut, c'est la foi agissant par la charité. »</em> <span class="ref">Galates 5:6</span></p>
      <h2>La coopération de l'homme</h2>
      <p>Le salut est l'œuvre de Dieu, et l'homme y travaille librement. La grâce associe l'homme à son propre salut : elle le porte, l'éveille et le fortifie, et il y répond par toute sa vie, jusqu'au bout. <em>« Travaillez à votre salut avec crainte et tremblement, car c'est Dieu qui opère en vous le vouloir et le faire. »</em> <span class="ref">Philippiens 2:12-13</span> Les deux agissent ensemble, à deux niveaux différents : Dieu agit le premier et de l'intérieur, et c'est lui qui rend l'homme capable d'agir, en sorte que sa réponse libre est tout entière un don de Dieu et tout entière la sienne.</p>
      <h2>Offert à tous</h2>
      <p>Dieu n'exclut personne de cette offre. <em>« Dieu veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. »</em> <span class="ref">1 Timothée 2:4</span> Le Christ est mort pour tous, et sa grâce rejoint, par des voies que Dieu seul connaît, ceux mêmes qui n'ont pas connu l'Évangile, pourvu qu'ils cherchent Dieu d'un cœur droit.</p>
      <h2>Déjà donné, pas encore achevé</h2>
      <p>Le salut se reçoit en trois temps. Il est acquis une fois pour toutes à la Croix, où le Christ a tout accompli. Il se reçoit maintenant, dans la grâce et les sacrements, où le sauvé vit déjà de la vie nouvelle. Et il s'achèvera au dernier jour, lorsque l'homme verra Dieu face à face. Le chrétien est donc déjà sauvé, et l'attend encore. <em>« C'est en espérance que nous sommes sauvés. »</em> <span class="ref">Romains 8:24</span></p>

      <h2>Les « frères de Jésus »</h2>
      <p>Les Évangiles parlent à plusieurs reprises des « frères de Jésus ». On y a vu une objection à ce dogme : si Jésus avait des frères, sa mère aurait eu d'autres enfants. L'Écriture elle-même dissipe la difficulté.</p>
      <p>Dans la langue de la Bible, le mot « frère » déborde la seule fratrie. L'hébreu, comme l'araméen que parlait Jésus, n'a pas de terme distinct pour le cousin ou le neveu : un même mot couvre toute la parenté proche. Ainsi Abraham appelle Lot son frère, alors que Lot est son neveu : <em>« Car nous sommes frères. »</em> <span class="ref">Genèse 13:8</span> Les Évangiles, écrits en grec sur ce fond sémitique, gardent cet usage : ils désignent les « frères » de Jésus par le mot adelphos (ἀδελφός), qui s'étend aux cousins comme aux parents plus éloignés.</p>

      <h2>Une mère engendre une personne</h2>
      <p>Une mère met au monde quelqu'un, une personne, et non une nature. On ne dit jamais d'une femme qu'elle est mère d'une humanité ou d'une intelligence : elle est mère de tel être précis, de celui qu'elle a porté et enfanté. Ce qu'elle transmet, c'est la nature ; celui qu'elle enfante, c'est une personne.</p>
      <h2>Et cette personne est Dieu</h2>
      <p>Or la personne que Marie a conçue est le Fils éternel de Dieu, le Verbe qui a pris chair en elle : <em>« Le Verbe s'est fait chair. »</em> <span class="ref">Jean 1:14</span> Celui qu'elle a porté en son sein est pleinement Dieu et pleinement homme, une seule personne en deux natures. Élisabeth la salue déjà comme la mère de son Seigneur : <em>« Comment m'est-il donné que la mère de mon Seigneur vienne jusqu'à moi ? »</em> <span class="ref">Luc 1:43</span></p>
      <h2>Ce qui se dit de la personne</h2>
      <p>De cette unité découle une règle de langage que l'Église nomme la communication des idiomes. Les idiomes sont les propriétés de chaque nature ; et comme le Christ est une seule personne, ce qui revient à l'une ou l'autre de ses natures s'attribue à cette unique personne, sous quelque nom qu'on la désigne. On peut donc dire que le Fils de Dieu est né, a souffert et est mort, bien que naître et mourir appartiennent à sa seule nature humaine : c'est le même qui agit et pâtit dans les deux. La règle porte sur la personne, non sur la nature prise à part : on dit que Dieu est né, parce que celui qui est né est Dieu, sans dire pour autant que la divinité serait née, car elle est sans commencement. L'Écriture parle déjà ainsi, attribuant à Dieu ce qui s'est accompli dans la chair : elle dit que les hommes ont crucifié <em>« le Seigneur de gloire »</em> <span class="ref">1 Corinthiens 2:8</span>, et que Dieu s'est acquis l'Église <em>« par son propre sang »</em> <span class="ref">Actes 20:28</span>. Par cette même règle, Marie, qui a conçu et enfanté cette personne selon sa nature humaine, est Mère de Dieu, et non la mère du seul homme Jésus.</p>

      <p>Celui qui désire le baptême et meurt avant de le recevoir obtient la grâce par ce désir même. Le désir est explicite chez le catéchumène, qui demande le baptême et se prépare à le recevoir. Il est implicite chez celui qui cherche Dieu d'un cœur sincère et accomplit sa volonté selon ce qu'il en connaît : sans nommer le Christ, il le désire déjà en désirant le bien et la vérité. L'Écriture reconnaît cette loi inscrite au fond de l'homme. <em>« Quand des païens, qui n'ont pas la loi, font naturellement ce qu'elle ordonne, ils montrent que l'œuvre de la loi est écrite dans leur cœur. »</em> <span class="ref">Romains 2:14-15</span> Dans tous les cas, c'est la charité qui donne au désir sa valeur, car l'amour de Dieu contient en germe tout ce que le baptême confère.</p>

      <h2>Les conditions de l'acte infaillible</h2>
      <p>Le pape n'engage ce don qu'en réunissant quatre conditions. Il parle comme pasteur et docteur suprême de tous les chrétiens ; il use de son autorité apostolique suprême ; il définit une doctrine de foi ou de mœurs ; il la déclare à tenir par toute l'Église. On nomme un tel acte une définition <em>ex cathedra</em>, « du haut de la chaire » de Pierre. En dehors de ces conditions, dans ses homélies, ses entretiens, ses décisions de gouvernement ou ses opinions personnelles, le pape enseigne et mérite le respect, sans être couvert par ce don.</p>
      <h2>La garde du dépôt</h2>
      <p>Le don préserve de l'erreur en gardant le dépôt reçu. Le pape garde la foi transmise depuis les Apôtres et l'énonce fidèlement ; l'Esprit l'empêche d'égarer l'Église au moment où il fixe ce qu'elle doit croire. La révélation s'est achevée avec les Apôtres, et l'infaillibilité sert sa transmission fidèle, non l'ajout d'une parole nouvelle.</p>
      <h2>L'infaillibilité de l'Église</h2>
      <p>Ce don du pape découle d'une promesse faite à l'Église entière. Le Christ l'a assurée contre l'erreur, <em>« les portes de l'enfer ne prévaudront pas contre elle »</em> <span class="ref">Matthieu 16:18</span>, et il lui a donné son Esprit : <em>« l'Esprit de vérité vous conduira dans toute la vérité. »</em> <span class="ref">Jean 16:13</span> L'Église ne peut donc défaillir dans la foi. Cette infaillibilité, qui appartient au corps tout entier, s'exerce de deux manières : par le pape seul, dans une définition solennelle, ou par l'ensemble des évêques réunis en concile autour de lui. Dans les deux cas, c'est la même foi de l'Église qui se dit, pour trancher quand son unité est en jeu et garder tous les fidèles dans une même vérité.</p>
      <h2>Le pape demeure un homme</h2>
      <p>L'infaillibilité porte sur l'enseignement défini, et laisse intacte la condition humaine du pape. Il peut pécher, se tromper dans ses jugements, faillir dans sa conduite ; l'histoire en a connu de saints et d'indignes. Le don ne le rend ni saint ni omniscient. Il garde sa parole solennelle de l'erreur, afin que le troupeau confié à Pierre ne soit jamais enseigné dans le faux.</p>
      <h2>Sa définition au concile</h2>
      <p>L'Église a vécu cette assurance dès les origines ; elle l'a définie en propres termes au concile Vatican I, en 1870. Son exercice solennel reste rare. Deux proclamations mariales l'illustrent : l'Immaculée Conception, déclarée par Pie IX en 1854, et l'Assomption, déclarée par Pie XII en 1950. En plus de vingt siècles, le pape n'a parlé ainsi que pour fixer ce qui touche au cœur de la foi.</p>

      <h2>Une règle que l'Écriture n'enseigne pas</h2>
      <p>Le principe se réfute d'abord lui-même. S'il faut tenir pour règle ce que l'Écriture enseigne, et si l'Écriture n'enseigne nulle part qu'elle serait l'unique règle, alors le sola scriptura échoue à sa propre épreuve : il pose une norme que la Bible ne donne pas. Le verset qu'on invoque dit l'inspiration et l'utilité de l'Écriture, non qu'elle suffise à elle seule : <em>« Toute Écriture est inspirée de Dieu et utile pour enseigner, pour réfuter, pour corriger, pour former à la justice. »</em> <span class="ref">2 Timothée 3:16-17</span> « Utile pour » ne signifie pas « seule source » ; et lorsque ces mots sont écrits, l'Écriture en question est l'Ancien Testament, dont nul ne tirerait qu'il se passe du Nouveau.</p>

      <p>L'Église a précédé le Nouveau Testament. Née à la Pentecôte, elle a prêché, baptisé et célébré l'eucharistie pendant une vingtaine d'années avant qu'une seule ligne du Nouveau Testament ne fût écrite : les premières lettres datent des années cinquante, et le dernier livre n'est achevé qu'à la fin du premier siècle. Plus encore, la liste arrêtée des livres saints, le canon, n'est fixée qu'à la fin du quatrième siècle, aux conciles de Hippone en 393 et de Carthage en 397 : près de quatre siècles durant lesquels l'Église enseigne, baptise et remet les péchés sans posséder de Bible close. La foi naît d'abord de la prédication : <em>« La foi vient de ce qu'on entend. »</em> <span class="ref">Romains 10:17</span> Surtout, la Bible ne porte en elle aucune table de ses propres livres : rien dans l'Écriture ne dit quels écrits sont inspirés et lesquels ne le sont pas. C'est l'Église, conduite par l'Esprit, qui a discerné et reçu ce canon. Tenir tel livre pour Écriture, c'est donc déjà s'en remettre à l'autorité de l'Église et à sa Tradition. Le sola scriptura ne peut même pas dire quels livres composent l'Écriture seule dont il se réclame.</p>

      <h2>L'Écriture dans l'Église</h2>
      <p>L'Écriture demeure la Parole de Dieu, souverainement vénérée, l'âme de toute prédication et de toute théologie. Elle vit dans l'Église qui l'a reçue de Dieu, l'a discernée, la garde et l'interprète. Écriture, Tradition et autorité de l'Église forment une seule Parole, transmise par des voies que Dieu a unies. La retrancher de la Tradition et de l'Église qui la portent, c'est la couper de la vie où elle a été donnée et où elle se comprend.</p>

      <p>Avant d'être donnée à la Cène, l'Eucharistie a été préparée de loin, par des figures de l'Ancien Testament qui en portaient déjà le secret. Trois surtout l'annoncent.</p>
      <p>Melchisédech vient en premier. C'est un personnage mystérieux du livre de la Genèse : roi de Salem, l'ancienne Jérusalem, et prêtre du Dieu Très-Haut, il va à la rencontre d'Abraham qui revient de la bataille, et son offrande à Dieu est faite de pain et de vin : <em>« Melchisédech, roi de Salem, fit apporter du pain et du vin ; il était prêtre du Dieu Très-Haut. »</em> <span class="ref">Genèse 14:18</span> Ce prêtre sans généalogie connue, qui offre le pain et le vin et bénit Abraham, annonce le Christ, prêtre pour toujours, qui offrira à son tour le pain et le vin devenus son Corps et son Sang : <em>« Tu es prêtre pour l'éternité à la manière de Melchisédech. »</em> <span class="ref">Psaume 110:4</span></p>
      <p>La manne vient ensuite. Après leur sortie d'Égypte, les Hébreux marchent quarante ans dans le désert, sans rien pour se nourrir ; chaque matin, Dieu fait tomber du ciel un pain inconnu, la manne, qui les tient en vie tout au long du chemin : <em>« Je vais faire pleuvoir sur vous du pain venu du ciel. »</em> <span class="ref">Exode 16:4</span> Ce pain soutenait le corps le temps du désert, et ceux qui en mangeaient mouraient un jour ; il annonçait un pain plus grand, que le Christ donnerait, et qui donne la vie éternelle : <em>« Je suis le pain vivant descendu du ciel ; si quelqu'un mange de ce pain, il vivra éternellement. »</em> <span class="ref">Jean 6:51</span></p>
      <p>L'agneau pascal vient enfin. La nuit où Dieu délivra Israël de l'esclavage d'Égypte, chaque famille devait immoler un agneau, marquer sa porte de son sang pour être épargnée du fléau, puis en manger la chair : c'est la Pâque, que les Juifs célèbrent depuis lors en mémoire de leur libération. <em>« Le sang vous servira de signe : je verrai le sang, et je passerai par-dessus vous. »</em> <span class="ref">Exode 12:13</span> Cet agneau immolé, dont le sang sauve et dont on mange la chair, préfigure le Christ, l'Agneau livré pour notre salut : <em>« Christ, notre Pâque, a été immolé. »</em> <span class="ref">1 Corinthiens 5:7</span></p>
      <p>Ces trois figures attendaient leur accomplissement, et il vient à la Cène, quand le Christ prend le pain et le vin et les donne comme son Corps et son Sang.</p>
      <h2>L'institution à la Cène</h2>
      <p>La veille de sa Passion, au cours du repas pascal, Jésus prit du pain, le bénit, le rompit et le donna à ses disciples : <em>« Ceci est mon corps. »</em> Puis il leur donna la coupe : <em>« Ceci est mon sang, le sang de l'alliance, répandu pour la multitude en rémission des péchés. »</em> <span class="ref">Matthieu 26:26-28</span> Et il commanda de renouveler ce geste : <em>« Faites ceci en mémoire de moi. »</em> <span class="ref">Luc 22:19</span> Depuis, l'Église accomplit ce que le Seigneur a fait, et le pain et le vin deviennent son Corps et son Sang.</p>
      <h2>La présence réelle</h2>
      <p>Les paroles du Christ opèrent ce qu'elles disent : le pain devient son Corps, le vin devient son Sang. Lui-même l'avait annoncé : <em>« Ma chair est vraiment une nourriture, et mon sang est vraiment un breuvage. »</em> <span class="ref">Jean 6:55</span> Ce changement porte sur la substance même : ce qui était pain et vin est maintenant le Corps et le Sang du Christ, tandis que demeurent les apparences, le goût et l'aspect, que l'on nomme les espèces. L'Église appelle ce passage la transsubstantiation. Sous ces espèces, le Christ est tout entier présent, vivant et glorieux.</p>
      <h2>Le sacrifice</h2>
      <p>L'Eucharistie est un sacrifice. Elle rend présent l'unique sacrifice du Christ en croix. Il s'est offert une fois pour toutes, et la messe ne le répète pas : elle rend présent ce qu'il a accompli au Calvaire, son offrande au Père. La Croix et la messe sont un seul et même sacrifice, offert jadis dans le sang, offert maintenant sous les espèces du pain et du vin. C'est pourquoi l'Église l'appelle le saint sacrifice.</p>
      <h2>L'adoration du Saint-Sacrement</h2>
      <p>Puisque le Christ est réellement présent sous les espèces, l'Eucharistie reçoit l'adoration due à Dieu seul. C'est le Christ lui-même que l'on adore, présent tout entier sous les apparences du pain. L'Église garde l'Eucharistie dans le tabernacle, le lieu où on la conserve au cœur de l'église, l'expose à l'adoration des fidèles, et s'agenouille devant le Saint-Sacrement comme devant le Seigneur. L'adoration eucharistique est l'hommage rendu à cette présence.</p>
      <h2>La communion</h2>
      <p>Recevoir l'Eucharistie, c'est communier au Corps du Christ. Le Seigneur l'a promis : <em>« Celui qui mange ma chair et boit mon sang demeure en moi, et moi en lui. »</em> <span class="ref">Jean 6:56</span> La communion unit intimement au Christ, et par lui unit les fidèles entre eux : <em>« Puisqu'il y a un seul pain, nous qui sommes plusieurs, nous formons un seul corps. »</em> <span class="ref">1 Corinthiens 10:17</span> L'Église se construit ainsi par l'Eucharistie, qui fait d'elle le Corps du Christ.</p>
      <h2>Recevoir dignement</h2>
      <p>L'Eucharistie demande d'être reçue dignement. Puisque c'est le Christ lui-même qu'on reçoit, communier en état de péché mortel, sans avoir d'abord reçu le pardon, profane le don au lieu de l'accueillir. L'Écriture en avertit gravement. <em>« Quiconque mange ce pain ou boit la coupe du Seigneur indignement sera coupable envers le corps et le sang du Seigneur. »</em> <span class="ref">1 Corinthiens 11:27</span> Elle demande à chacun de s'examiner. <em>« Que chacun s'éprouve soi-même, et qu'ainsi il mange de ce pain et boive de cette coupe. »</em> <span class="ref">1 Corinthiens 11:28</span> Celui qui a conscience d'un péché grave reçoit d'abord le pardon par la confession, puis s'approche de la communion ; et tous s'y préparent par le recueillement et par le jeûne qui la précède. Ainsi reçue, dans un cœur en état de grâce, l'Eucharistie produit tout son fruit.</p>
      <h2>Les fruits de la communion</h2>
      <p>Reçue dignement, l'Eucharistie porte des fruits dans l'âme. Elle nourrit la vie de la grâce et la fait grandir, comme un aliment soutient et augmente la vie du corps. Elle efface les péchés véniels et fortifie contre le péché mortel, en ranimant la charité que le péché refroidit. Elle est enfin le gage de la vie éternelle : celui qui reçoit le Christ porte en lui le germe de la résurrection. <em>« Celui qui mange ma chair et boit mon sang a la vie éternelle, et je le ressusciterai au dernier jour. »</em> <span class="ref">Jean 6:54</span> Ce pain donné sur la terre est déjà l'avant-goût du festin du ciel.</p>

      <p>Par elle, ce que la Croix a mérité devient vie donnée. Le Christ ressuscité est la cause de notre justification : <em>« Il a été livré pour nos fautes, et ressuscité pour notre justification. »</em> <span class="ref">Romains 4:25</span> Et sa victoire ne reste pas la sienne seule : il est le premier d'une multitude, et sa Résurrection est le principe de la nôtre. <em>« Christ est ressuscité des morts, prémices de ceux qui sont morts. »</em> <span class="ref">1 Corinthiens 15:20</span> En son humanité glorifiée, élevé à la droite du Père, il est établi Seigneur et communique aux siens la vie qu'il a reçue. En lui, la mort cesse d'être une fin : elle devient le passage vers la vie qui ne finit pas.</p>
      <h2>Un seul mystère pascal</h2>
      <p>La Croix et la Résurrection ne font qu'un seul acte de salut, que l'Église appelle le mystère pascal. La mort y rachète, la Résurrection y donne la vie ; l'une appelle l'autre, et le Christ passe de l'une à l'autre pour nous entraîner avec lui.</p>

      <p>Tout péché blesse deux fois : il offense Dieu, et il laisse en l'homme une marque, un attachement désordonné aux choses créées. Quand le péché est pardonné, l'offense est remise, et avec elle la peine éternelle, la séparation d'avec Dieu. Demeure souvent une peine temporelle : une dette à acquitter, le temps que l'amour de Dieu achève de redresser en nous ce que le péché avait tordu. Cette purification relève tout entière de la grâce du Christ : elle applique à l'âme la victoire de la Croix, sans rien y ajouter. Cette dette se paie ici-bas, par la pénitence et les œuvres de charité ; ce qui n'a pas été acquitté avant la mort l'est au purgatoire. <em>« Tu ne sortiras pas de là que tu n'aies payé jusqu'au dernier sou. »</em> <span class="ref">Matthieu 5:26</span></p>
      <h2>Ce que l'Écriture atteste</h2>
      <p>L'Écriture montre qu'on peut prier pour les morts et que cette prière leur profite. Au temps des Maccabées, on fait offrir un sacrifice pour les soldats tombés : <em>« C'est une pensée sainte et salutaire de prier pour les morts, afin qu'ils soient délivrés de leurs péchés. »</em> <span class="ref">2 Maccabées 12:46</span> Une telle prière serait vaine pour les bienheureux, qui n'en ont pas besoin, et pour les damnés, que nul ne peut secourir : elle suppose un troisième état, où l'âme se purifie. L'Écriture l'évoque comme un passage par le feu : <em>« Il subira une perte, mais lui sera sauvé, comme à travers le feu. »</em> <span class="ref">1 Corinthiens 3:15</span> Le Christ laisse entendre, lui aussi, qu'un pardon reste possible au-delà de la mort : <em>« Il ne lui sera pardonné ni dans ce siècle ni dans le siècle à venir. »</em> <span class="ref">Matthieu 12:32</span> S'il déclare qu'une certaine faute ne sera remise ni en ce monde ni dans l'autre, c'est que d'autres peuvent l'être dans le siècle à venir, une fois la mort franchie.</p>
      <h2>Une souffrance dans l'espérance</h2>
      <p>La purification du purgatoire est profonde et douloureuse : l'âme y souffre d'être encore retenue loin du Dieu qu'elle aime et désire de toute sa force. Cette souffrance est tout entière habitée par l'espérance, car ces âmes savent qu'elles sont sauvées et que leur attente a un terme. Ce feu purifie comme l'or au creuset : il consume ce qui reste d'impur pour rendre l'âme digne de la pleine lumière. L'état est transitoire ; il prendra fin, et toutes ces âmes verront Dieu.</p>
      <h2>Nous pouvons les aider</h2>
      <p>Les âmes du purgatoire ne peuvent plus mériter pour elles-mêmes. Nous, les vivants, le pouvons pour elles : nous pouvons les soulager et hâter leur délivrance. On nomme suffrages les secours que nous leur portons, du latin suffragium, le soutien que l'on apporte en faveur de quelqu'un : la prière, l'aumône, la pénitence faites à leur intention, et par-dessus tout le sacrifice de la messe, où la Croix du Christ est rendue présente pour eux. L'Église pratique ces suffrages depuis les premiers siècles : dès les catacombes, les chrétiens priaient pour leurs morts et les recommandaient à Dieu dans l'Eucharistie. En cela nous vivons la communion des saints : l'Église de la terre vient en aide à l'Église qui se purifie, dans l'unique charité qui relie tous les membres du Christ.</p>

    contenu: `
      <p>La confession est l'un des sept sacrements de l'Église, ces signes institués par le Christ pour donner la grâce. Par elle, le baptisé reçoit de Dieu, par le ministère du prêtre, le pardon des péchés commis depuis son baptême. On l'appelle aussi pénitence, du nom du regret qui l'anime, et réconciliation, parce qu'elle rétablit l'amitié avec Dieu que le péché avait rompue.</p>
      <h2>Un pouvoir donné par le Christ</h2>
      <p>Le soir de Pâques, le Ressuscité confie à ses apôtres un pouvoir inouï : remettre les péchés en son nom. <em>« Recevez l'Esprit Saint. Ceux à qui vous remettrez les péchés, ils leur seront remis ; ceux à qui vous les retiendrez, ils leur seront retenus. »</em> <span class="ref">Jean 20:22-23</span> Le pardon vient de Dieu seul, mais Dieu a voulu le donner par des hommes. Le prêtre ne pardonne pas en son propre nom : il agit au nom du Christ, instrument par lequel passe la miséricorde. C'est ce que l'Écriture nomme le ministère de la réconciliation : <em>« Dieu nous a confié le ministère de la réconciliation. »</em> <span class="ref">2 Corinthiens 5:18</span> Se confesser à un prêtre, c'est recevoir le pardon là où le Christ a voulu le déposer.</p>
      <h2>Les actes du pénitent</h2>
      <p>Le sacrement met en jeu trois actes du pénitent. La contrition d'abord : le regret sincère de ses péchés, avec la résolution de ne plus pécher ; c'est l'acte le plus important, car sans regret il n'y a pas de pardon. La confession ensuite : l'aveu des péchés au prêtre, qui expose la blessure à la lumière pour qu'elle soit guérie. <em>« Si nous confessons nos péchés, il est fidèle et juste pour nous les pardonner. »</em> <span class="ref">1 Jean 1:9</span> La satisfaction enfin : accomplir la réparation que le prêtre demande, une prière ou une bonne œuvre, qu'on appelle la pénitence et qui redresse le désordre laissé par le péché. À ces trois actes répond l'absolution : les paroles par lesquelles le prêtre, au nom du Christ, remet les péchés.</p>
      <h2>L'absolution</h2>
      <p>Le mot vient du latin absolvere, délier : l'absolution délie le pécheur du lien que le péché avait noué en lui. Par elle, les péchés sont remis ; la parole du prêtre est l'acte même par lequel Dieu pardonne. Ce que le prêtre délie sur la terre, Dieu le tient pour délié dans le ciel : <em>« Tout ce que vous délierez sur la terre sera délié dans le ciel. »</em> <span class="ref">Matthieu 18:18</span></p>
      <p>Le prêtre pardonne à la place du Christ, comme son ambassadeur, par une puissance qu'il tient du Seigneur : <em>« C'est au nom du Christ que nous faisons fonction d'ambassadeurs. »</em> <span class="ref">2 Corinthiens 5:20</span> Prêtant sa voix au Seigneur, il déclare : « Je t'absous de tes péchés, au nom du Père, et du Fils, et du Saint-Esprit. » Celui qui pardonne, par cette bouche, c'est le Christ lui-même. Le regret de l'homme dispose le cœur à recevoir ce don : l'acte du prêtre porte la puissance du Christ, l'ouverture du cœur la laisse entrer.</p>
      <h2>Ce que la confession opère</h2>
      <p>L'absolution remet la faute et, avec elle, la peine éternelle : l'âme qui avait perdu la grâce par un péché mortel la retrouve et redevient amie de Dieu. Avec la grâce lui reviennent les mérites que le péché mortel avait éteints, et la paix d'une conscience réconciliée. Le pénitent est aussi réconcilié avec l'Église, qu'il avait blessée par son péché, car nul ne pèche seul : le mal d'un membre atteint tout le corps, et son retour réjouit toute la maison. <em>« Il y aura plus de joie dans le ciel pour un seul pécheur qui se convertit que pour quatre-vingt-dix-neuf justes qui n'ont pas besoin de conversion. »</em> <span class="ref">Luc 15:7</span></p>
      <h2>La satisfaction</h2>
      <p>Au-delà de la faute et de la peine éternelle qu'efface l'absolution, demeure souvent une peine temporelle, une dette à acquitter, et la satisfaction commence à le faire : réparer le désordre que le péché a causé, en accomplissant la peine que le prêtre indique, prière, jeûne ou bonne œuvre, qu'on appelle la pénitence donnée au confessionnal. L'Écriture le montre dans l'histoire de David : son péché confessé, le prophète Nathan lui annonce le pardon, puis une peine qui subsiste. <em>« Le Seigneur a pardonné ton péché ; tu ne mourras pas. »</em> <span class="ref">2 Samuel 12:13</span> Et pourtant l'enfant né de la faute mourra : le pardon de la faute n'a pas effacé toute conséquence.</p>
      <p>Cette réparation ne cherche pas à fléchir un Dieu exigeant, car le pardon est donné gratuitement. Elle guérit le pécheur de l'attachement que le péché a laissé en lui, et redresse le tort commis. Quand Zachée se convertit, il ne s'en tient pas au regret : il répare. <em>« Si j'ai fait tort à quelqu'un, je lui rends le quadruple. »</em> <span class="ref">Luc 19:8</span> Nos satisfactions n'ont aucune valeur par elles seules : elles la reçoivent de l'unique satisfaction du Christ, qui a réparé sur la Croix ce qu'aucun homme ne pouvait réparer. Ce qui n'a pas été réparé avant la mort le sera au purgatoire ; et l'Église, puisant au trésor des mérites du Christ, peut en remettre une part par les indulgences.</p>
      <h2>La seconde planche</h2>
      <p>Le sacrifice de la Croix a racheté une fois pour toutes les péchés de tous les hommes ; il est la source unique de tout pardon, et rien ne s'y ajoute. <em>« Par une seule offrande, il a rendu parfaits pour toujours ceux qu'il sanctifie. »</em> <span class="ref">Hébreux 10:14</span> Mais ce pardon doit atteindre chacun et être accueilli. Le baptême l'applique une première fois et fait renaître à la vie de Dieu. Quand le baptisé retombe ensuite dans le péché, il se coupe lui-même de la grâce reçue ; le Christ a voulu que ce même pardon de la Croix lui soit redonné par la confession. Elle n'ajoute rien au sacrifice du Christ : elle en fait passer la grâce jusqu'au pécheur qui s'en était écarté. La tradition l'appelle la seconde planche après le naufrage : à qui a fait naufrage, elle offre de regagner le rivage.</p>
      <h2>Le secret de la confession</h2>
      <p>Ce secret porte un nom : le sceau sacramentel. Il couvre tout ce que le pénitent confie pour recevoir le pardon, ses péchés, leurs circonstances, tout ce qui pourrait le faire reconnaître. Le confesseur ne peut ni le redire, ni l'utiliser, ni même le laisser deviner par un mot ou une attitude. Aucune raison, si grave soit-elle, ne lève cette obligation : ni l'ordre d'un juge, ni le danger d'autrui, ni le besoin de se disculper lui-même.</p>
      <p>Cette inviolabilité tient à ce qui se passe dans la confession : le pénitent ne parle pas à un homme, il parle à Dieu, dont le prêtre n'est que l'instrument. Ce qui est avoué est confié à la miséricorde divine, qui efface et oublie : <em>« C'est moi qui efface tes transgressions, et je ne me souviendrai plus de tes péchés. »</em> <span class="ref">Isaïe 43:25</span> Le prêtre, simple ministre de ce pardon, est lié au même oubli : il a entendu comme l'oreille de Dieu, et ce qu'il a reçu appartient à Dieu seul. Trahir ce secret est l'une des fautes les plus graves qu'un prêtre puisse commettre ; des confesseurs ont préféré la prison ou la mort plutôt que de livrer ce qui leur avait été confié. <em>« Le médisant révèle les secrets, mais l'homme au cœur fidèle tient la chose cachée. »</em> <span class="ref">Proverbes 11:13</span> Le pénitent peut donc tout dire sans crainte : ce qu'il dépose au confessionnal n'en sortira jamais.</p>

      <h2>Tu es Pierre (Kêphas, en araméen)</h2>
      <p>À Césarée, Simon confesse que Jésus est le Christ, le Fils du Dieu vivant. En réponse, Jésus lui donne un nom nouveau et une mission. <em>« Tu es Pierre, et sur cette pierre je bâtirai mon Église, et les portes de l'enfer ne prévaudront pas contre elle. »</em> <span class="ref">Matthieu 16:18</span></p>
      <h2>Les clés du Royaume</h2>
      <p>Jésus remet alors à Pierre les clés. <em>« Je te donnerai les clés du royaume des cieux ; tout ce que tu lieras sur la terre sera lié dans les cieux, et tout ce que tu délieras sur la terre sera délié dans les cieux. »</em> <span class="ref">Matthieu 16:19</span> L'image vient de l'Ancien Testament. Dans la maison royale de Juda, le roi confiait à un intendant la clé du palais, charge de gouverner en son nom, qu'il transmettait à un successeur. <em>« Je mettrai sur son épaule la clé de la maison de David ; il ouvrira, et nul ne fermera ; il fermera, et nul n'ouvrira. »</em> <span class="ref">Isaïe 22:22</span> Pierre reçoit cette charge pour le Royaume du Christ : l'autorité d'ouvrir et de fermer, de lier et de délier, au nom de son Seigneur. Et comme la charge de l'intendant passait à un autre, celle de Pierre est faite pour se transmettre.</p>

      <p>La promesse devient charge après la Résurrection. Par trois fois, le Ressuscité demande à Pierre s'il l'aime, et par trois fois lui confie son troupeau. <em>« Pais mes brebis. »</em> <span class="ref">Jean 21:17</span> Pierre reçoit ainsi la garde de toutes les brebis du Christ, les autres pasteurs compris. Au soir de la Cène, Jésus lui avait déjà confié une mission singulière : soutenir la foi de ses frères. <em>« J'ai prié pour toi, afin que ta foi ne défaille pas ; et toi, affermis tes frères. »</em> <span class="ref">Luc 22:32</span></p>
      <h2>Le premier des apôtres</h2>
      <p>La place de Pierre paraît tout au long de l'Évangile. Les listes des apôtres le nomment toujours en tête. <em>« Voici les noms des douze apôtres : le premier, Simon, appelé Pierre. »</em> <span class="ref">Matthieu 10:2</span> Il parle au nom des autres, il est le premier à confesser le Christ, le premier à entrer dans le tombeau vide, le premier à annoncer l'Évangile au matin de la Pentecôte. Cette préséance constante manifeste la charge que le Seigneur lui a remise.</p>
      <h2>Le Rocher et le roc</h2>
      <p>Une seule pierre fonde l'Église en dernier ressort : le Christ. <em>« Nul ne peut poser d'autre fondement que celui qui est déjà posé, Jésus-Christ. »</em> <span class="ref">1 Corinthiens 3:11</span> Pierre tient son rôle de ce fondement unique : il est le roc visible par lequel le Christ, Rocher invisible, maintient son Église dans le temps. En donnant à Simon son propre nom de Roc, le Seigneur le fait participer à ce qu'il est lui-même, demeurant l'unique source d'où Pierre reçoit tout.</p>
      <h2>Une charge qui demeure</h2>

      <h2>Voir Dieu face à face</h2>
      <p>Le cœur du bonheur céleste est de voir Dieu tel qu'il est. Le Seigneur l'a promis aux cœurs purs : <em>« Heureux les cœurs purs, car ils verront Dieu. »</em> <span class="ref">Matthieu 5:8</span> Sur la terre, nous connaissons Dieu à travers ses œuvres et dans la foi ; au paradis, nous le verrons directement, face à face. L'Église nomme cette contemplation la vision béatifique, car elle rend bienheureux ceux qui la reçoivent. <em>« Maintenant nous voyons dans un miroir, de façon confuse ; mais alors, ce sera face à face. »</em> <span class="ref">1 Corinthiens 13:12</span></p>
      <p>Voir Dieu ainsi dépasse les forces de toute créature ; c'est Dieu lui-même qui élève l'âme par un don que la tradition appelle la lumière de gloire, et qui la rend capable de soutenir sa vue. Les bienheureux le voient tel qu'il est, et pourtant ne l'épuisent jamais : Dieu demeure infini, et sa contemplation reste à jamais nouvelle, sans lassitude et sans terme.</p>

      <h2>Les degrés de la gloire</h2>
      <p>Tous les bienheureux sont pleinement heureux, sans qu'aucun désir leur manque ; et pourtant la mesure de leur gloire diffère de l'un à l'autre. Chacun voit Dieu selon la charité qu'il a portée en cette vie, et reçoit sa part selon ce qu'il a donné : <em>« Chacun recevra sa propre récompense selon son propre travail. »</em> <span class="ref">1 Corinthiens 3:8</span> L'amour offert ici-bas dilate la capacité d'accueillir Dieu là-haut : les uns sont des vases plus grands que les autres, et tous sont remplis jusqu'au bord. L'Écriture l'illustre par l'éclat des astres : <em>« Autre est l'éclat du soleil, autre l'éclat de la lune, et autre l'éclat des étoiles ; une étoile même diffère en éclat d'une autre étoile. »</em> <span class="ref">1 Corinthiens 15:41</span></p>

      <p>L'enfer est l'état de séparation définitive d'avec Dieu, le sort de celui qui meurt en refusant librement son amour. C'est la réalité la plus grave que la foi annonce, et le Christ en a parlé souvent, toujours pour en détourner les hommes.</p>
      <h2>Une réalité que le Christ révèle</h2>
      <p>C'est le Christ lui-même qui révèle l'enfer, et il en parle avec une gravité qui veut sauver. Pour le nommer, il emploie souvent le mot géhenne : du nom d'un ravin au sud de Jérusalem, la vallée de Hinnom, lieu d'ordures et de feux jadis liés à des cultes idolâtres, devenu l'image du lieu de la perdition. <em>« Craignez plutôt celui qui peut faire périr l'âme et le corps dans la géhenne. »</em> <span class="ref">Matthieu 10:28</span> Il décrit aussi le sort du riche qui avait ignoré le pauvre Lazare à sa porte : séparé pour toujours du lieu du repos, par un abîme que nul ne franchit. <em>« Entre vous et nous, un grand abîme a été établi, afin que nul ne passe. »</em> <span class="ref">Luc 16:26</span></p>
      <h2>Les peines de l'enfer</h2>
      <p>La peine de l'enfer est d'abord la perte de Dieu. L'âme a été créée pour lui, pour le voir face à face et vivre de sa vie ; en être séparée pour toujours est la souffrance la plus profonde, celle d'un être privé de ce qui seul pouvait le combler. La tradition l'appelle la peine du dam, la privation de Dieu. <em>« Ils subiront la peine d'une perdition éternelle, loin de la face du Seigneur. »</em> <span class="ref">2 Thessaloniciens 1:9</span></p>
      <p>À cette privation s'ajoute une autre peine, que la tradition nomme la peine du sens et que l'Écriture figure par le feu. <em>« Allez loin de moi, maudits, dans le feu éternel. »</em> <span class="ref">Matthieu 25:41</span> Ce feu dit une souffrance dont la nature dépasse le feu que nous connaissons : l'âme souffre du désordre qu'elle a voulu et de la ruine où l'a conduite son propre refus.</p>
      <h2>Pour toujours</h2>
      <p>L'enfer est éternel. <em>« Ceux-ci iront au châtiment éternel, et les justes à la vie éternelle. »</em> <span class="ref">Matthieu 25:46</span> Son éternité tient à ce qui se fixe à la mort. Tant que dure la vie, l'homme peut se reprendre et revenir ; la mort clôt ce temps, et l'âme demeure pour toujours dans l'orientation qu'elle a prise. Séparée du corps, elle adhère à son choix de façon définitive, comme les anges se sont fixés au leur dès l'origine. Celui qui s'est détourné de Dieu jusqu'au bout reste enfermé dans ce refus, désormais sans retour.</p>
      <h2>Le poids du péché mortel</h2>
      <p>Ce qui conduit à l'enfer est le péché mortel. On l'appelle mortel parce qu'il fait perdre la vie de la grâce, la vie même de Dieu dans l'âme. Trois conditions le constituent : une matière grave, la pleine conscience de ce que l'on fait, et un consentement délibéré. Par un tel acte, l'homme se détourne de Dieu comme de sa fin dernière et lui préfère autre chose. Le péché véniel affaiblit cette amitié et l'obscurcit ; le péché mortel la rompt, et tant que la conversion et le pardon ne l'ont pas relevé, il fixe l'âme dans sa rupture.</p>
      <h2>Un refus libre, que Dieu respecte</h2>
      <p>La cause de l'enfer est dans le refus libre de l'homme. Dieu veut le salut de tous, et il ne destine personne à l'enfer. <em>« Dieu veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. »</em> <span class="ref">1 Timothée 2:4</span> L'enfer est le terme d'un refus conscient et maintenu jusqu'au bout, que Dieu respecte et ratifie, car aimer suppose de pouvoir refuser : la possibilité de l'enfer est l'envers de la grandeur de notre liberté. C'est pourquoi le Christ en avertit avec gravité, pour appeler chacun à la conversion. Et l'Église, qui n'a jamais déclaré aucun homme damné, confie tous les défunts à la miséricorde de Dieu, plus grande que tout péché.</p>

      <h2>Institué par Dieu dès l'origine</h2>
      <p>Dieu a inscrit le mariage dans la nature de l'homme et de la femme dès la création. En les créant l'un pour l'autre, il les unit dans une seule vie et les bénit pour la fécondité. <em>« L'homme quittera son père et sa mère, il s'attachera à sa femme, et ils deviendront une seule chair. »</em> <span class="ref">Genèse 2:24</span> Il ouvre cette union à la vie, faisant des époux les premiers transmetteurs de la sienne. <em>« Soyez féconds et multipliez-vous. »</em> <span class="ref">Genèse 1:28</span></p>

      <p>La confirmation est le sacrement qui donne au baptisé la plénitude de l'Esprit Saint, comme les apôtres la reçurent à la Pentecôte. Au baptême, le chrétien renaît comme enfant de Dieu ; à la confirmation, il reçoit l'Esprit en plénitude, qui l'affermit dans cette vie nouvelle et le revêt de la force de témoigner de sa foi.</p>
      <h2>L'achèvement de l'initiation chrétienne</h2>
      <p>Trois sacrements font entrer dans la vie chrétienne et la portent à sa plénitude : le baptême, la confirmation et l'eucharistie. Le baptême fait renaître à la vie de Dieu ; la confirmation y affermit et donne l'Esprit en plénitude ; l'eucharistie nourrit de la chair du Christ. La confirmation parfait ainsi la grâce reçue au baptême.</p>
      <h2>Le don de l'Esprit en plénitude</h2>
      <p>Au baptême, l'Esprit Saint fait déjà du chrétien un enfant de Dieu et demeure en lui. La confirmation lui donne ce même Esprit en plénitude, à la manière de la Pentecôte, où des disciples craintifs furent transformés en témoins intrépides. Ce jour-là, l'Esprit descendit sur les apôtres et les remplit. <em>« Ils furent tous remplis de l'Esprit Saint. »</em> <span class="ref">Actes 2:4</span> Les apôtres communiquèrent ensuite ce don par l'imposition des mains. En Samarie, des hommes déjà baptisés n'avaient pas encore reçu l'Esprit de cette manière : Pierre et Jean vinrent leur imposer les mains, et ils le reçurent. <em>« Ils leur imposèrent les mains, et ils reçurent l'Esprit Saint. »</em> <span class="ref">Actes 8:17</span> Ce geste, distinct du baptême et accompli par les apôtres, est l'origine de la confirmation.</p>
      <h2>Les dons de l'Esprit</h2>
      <p>Les sept dons de l'Esprit, sagesse, intelligence, conseil, force, science, piété et crainte de Dieu, accompagnent la grâce et sont déjà reçus au baptême. En donnant l'Esprit en plénitude, la confirmation les accroît et les affermit, rendant le chrétien plus docile à son action. <em>« Sur lui reposera l'Esprit du Seigneur, esprit de sagesse et d'intelligence, esprit de conseil et de force, esprit de science et de crainte du Seigneur. »</em> <span class="ref">Isaïe 11:2</span></p>
      <h2>Le rite et le sceau</h2>
      <p>La confirmation se donne par l'onction du saint chrême, une huile parfumée consacrée par l'évêque, tracée sur le front du confirmé avec ces mots : « Sois marqué de l'Esprit Saint, le don de Dieu. » Le chrême, le Christ et le chrétien dérivent tous du verbe grec « chriô » (χρίω), « oindre » : marqué de cette huile, le confirmé est configuré au Christ, l'Oint par excellence, et porte plus pleinement le nom de chrétien. L'évêque, successeur des apôtres, en est le ministre ordinaire, signe du lien qui unit le confirmé à toute l'Église ; un prêtre peut aussi le conférer, lorsqu'il baptise un adulte, ou auprès d'un fidèle en danger de mort, pour que nul ne quitte ce monde privé du sacrement. Comme le baptême, ce sacrement imprime dans l'âme un sceau spirituel et définitif : il se reçoit une seule fois. <em>« Dieu nous a marqués de son sceau. »</em> <span class="ref">2 Corinthiens 1:22</span></p>
      <h2>Les effets du sacrement</h2>

function articlesOrdonnes(){
  let out=[];
  for(const t of THEMES){
    const at=ARTICLES.filter(a=>a.theme===t.id);
    if(t.categories){
      const vus=new Set();
      for(const c of t.categories){ for(const id of c.arts){ const a=at.find(x=>x.id===id); if(a){out.push(a);vus.add(id);} } }
      for(const a of at) if(!vus.has(a.id)) out.push(a);
    } else out.push(...at);
  }
  return out;
}
function carteArticle(a){
  return `<a class="article-lien" href="#/article/${a.id}">
      <h3>${a.titre}</h3>
      <p>${a.resume}</p>
    </a>`;
}
function corpsDomaine(t){
  const at = ARTICLES.filter(a=>a.theme===t.id);
  const vide = `<div class="vide">Ce domaine n'a pas encore d'entrée. Les contenus s'ajoutent au fil du temps.</div>`;
  if(!t.categories){
    return at.map(carteArticle).join('') || vide;
  }
  let html='';const vus=new Set();
  for(const c of t.categories){
    const arts = c.arts.map(id=>at.find(a=>a.id===id)).filter(Boolean);
    arts.forEach(a=>vus.add(a.id));
    if(!arts.length) continue;
    if(c.nom){
      html += `<div class="sous" data-cat="${c.id}">
        <div class="sous-tete">
          <span class="sous-puce" aria-hidden="true"></span>
          <span class="sous-nom">${c.nom}</span>
          <span class="sous-chevron" aria-hidden="true">›</span>
        </div>
        <div class="sous-corps">${arts.map(carteArticle).join('')}</div>
      </div>`;
    } else {
      html += arts.map(carteArticle).join('');
    }
  }
  html += at.filter(a=>!vus.has(a.id)).map(carteArticle).join('');
  return html || vide;
}
function vueBibliotheque(params){
  const sections = THEMES.map((t,i)=>{
    const n = ARTICLES.filter(a=>a.theme===t.id).length;

}

function router(){
  const hash = location.hash.replace(/^#/,'') || '/';
  const [chemin, query] = hash.split('?');
  const params = new URLSearchParams(query||'');
  let html, route='/', ctx='';
  if(chemin==='/'||chemin===''){ html=vueAccueil(); route='/'; }
  else if(chemin==='/bibliotheque'){ html=vueBibliotheque(params); route='/bibliotheque'; ctx='La bibliothèque'; }
  else if(chemin==='/a-propos'){ html=vueAPropos(); route='/a-propos'; }
  else if(chemin.startsWith('/article/')){
    const aid=chemin.split('/article/')[1];
    html=vueArticle(aid); route='/bibliotheque';
    const a=ARTICLES.find(x=>x.id===aid);
    if(a) ctx=`<a href="#/bibliotheque?theme=${a.theme}">${themeNom(a.theme)}</a>`;
  }
  else { html=vueIntrouvable(); }
  app.innerHTML = html;
  document.getElementById('contexte').innerHTML = ctx;
  window.scrollTo(0,0);
  document.querySelectorAll('nav.menu a').forEach(a=>{
    a.classList.toggle('actif', a.dataset.route===route);
  });
  document.getElementById('menu').classList.remove('ouvert');
  brancherDomaines(params);
}

function cascadeApparition(els){
  els.forEach((el,i)=>{
    if(!el) return;
    const d=Math.min(i*40,640);
    el.style.animation='none';
    void el.offsetHeight;
    el.style.animation='apparaitDom .45s cubic-bezier(.2,.7,.3,1) '+d+'ms both';
  });
}
function cascadeFermeture(els,fin){
  els.forEach(el=>{ if(el) el.style.animation='apparaitDomFerme .25s ease forwards'; });
  setTimeout(fin,240);
}
function ouvrirDomaine(sec){
  if(!sec||sec.classList.contains('ouvert')) return;
  sec.classList.add('ouvert');
  const sep=sec.querySelector('.dom-sep'), corps=sec.querySelector('.dom-corps');
  cascadeApparition([sep].concat([].slice.call(corps.children)));
}
function fermerDomaine(sec){
  if(!sec||!sec.classList.contains('ouvert')) return;
  const sep=sec.querySelector('.dom-sep'), corps=sec.querySelector('.dom-corps');
  cascadeFermeture([sep].concat([].slice.call(corps.children)), ()=>{ sec.classList.remove('ouvert'); majToutLabel(); });
}
function basculerDomaine(sec){
  sec.classList.contains('ouvert') ? fermerDomaine(sec) : ouvrirDomaine(sec);
  majToutLabel();
}

function fermerSous(s){

function basculerSous(s){ s.classList.contains('ouvert') ? fermerSous(s) : ouvrirSous(s); }
function basculerTout(){
  const secs=[].slice.call(document.querySelectorAll('.dom'));
  const ouverts=secs.filter(s=>s.classList.contains('ouvert'));
  if(ouverts.length){ ouverts.forEach(fermerDomaine); }
  else { secs.forEach((s,i)=> setTimeout(()=>ouvrirDomaine(s), i*110)); }
  setTimeout(majToutLabel,10);
}
function majToutLabel(){
  const b=document.getElementById('basculerTout'); if(!b) return;
  const ouvert=[].slice.call(document.querySelectorAll('.dom')).some(s=>s.classList.contains('ouvert'));
  b.classList.toggle('actif-tout',ouvert);
  const l=b.querySelector('.bt-label'); if(l) l.textContent = ouvert ? b.dataset.collapse : b.dataset.expand;
}
function brancherDomaines(params){
  const b=document.getElementById('basculerTout');
  if(b){
    b.addEventListener('click',basculerTout);
    b.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); basculerTout(); }});
  }
  document.querySelectorAll('.dom-tete').forEach(t=>{
    t.addEventListener('click',()=>basculerDomaine(t.closest('.dom')));
  });
  document.querySelectorAll('.sous-tete').forEach(st=>{
    st.addEventListener('click',()=>basculerSous(st.closest('.sous')));
  });
  const theme=params&&params.get?params.get('theme'):null;
  if(theme){
    const sec=document.querySelector('.dom[data-theme="'+theme+'"]');
    if(sec){
      ouvrirDomaine(sec);
      sec.querySelectorAll('.sous').forEach(ouvrirSous);
      majToutLabel();
      setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),120);
      return;
    }
  }
  majToutLabel();
}

/* ---- recherche ---- */
(function(){
  var ouvrir=document.getElementById('rech-ouvrir'),overlay=document.getElementById('rech-overlay'),
      champ=document.getElementById('rech-champ'),res=document.getElementById('rech-res'),fermer=document.getElementById('rech-fermer');
  if(!ouvrir||!overlay) return;
  function norm(s){return s.toLowerCase().replace(/[àâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[ïî]/g,'i').replace(/[ôö]/g,'o').replace(/[ùûü]/g,'u').replace(/ç/g,'c');}
  function depouiller(h){return h.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();}
  var index=ARTICLES.map(function(a){return {s:a.id,t:a.titre,th:themeNom(a.theme),r:a.resume,x:depouiller(a.contenu)};});
  index.forEach(function(a){a._n=norm(a.t+' '+a.r+' '+a.x);a._t=norm(a.t);a._r=norm(a.r);});
  function surligne(texte,termes){
    var nt=norm(texte),marks=[];
    termes.forEach(function(t){var i=0,p;while((p=nt.indexOf(t,i))>=0){marks.push([p,p+t.length]);i=p+t.length;}});
    if(!marks.length) return texte;
    marks.sort(function(a,b){return a[0]-b[0];});
    var out='',cur=0;
    marks.forEach(function(m){if(m[0]<cur)return;out+=texte.slice(cur,m[0])+'<mark>'+texte.slice(m[0],m[1])+'</mark>';cur=m[1];});
    return out+texte.slice(cur);
  }
  function extrait(a,termes){
    var src=a.r+' '+a.x,n=norm(src),pos=-1;
    termes.forEach(function(t){var p=n.indexOf(t);if(p>=0&&(pos<0||p<pos))pos=p;});
    if(pos<0)pos=0;
    var deb=Math.max(0,pos-60),fin=Math.min(src.length,pos+120);
    return (deb>0?'… ':'')+surligne(src.slice(deb,fin),termes)+(fin<src.length?' …':'');
  }
  function chercher(q){
    var termes=norm(q).split(/\s+/).filter(Boolean);
    if(!termes.length){res.innerHTML='<div class="rech-msg">Tapez un mot pour parcourir les articles.</div>';return;}
    var out=[];
    index.forEach(function(a){
      if(!termes.every(function(t){return a._n.indexOf(t)>=0;})) return;
      var sc=0;termes.forEach(function(t){if(a._t.indexOf(t)>=0)sc+=5;if(a._r.indexOf(t)>=0)sc+=2;sc+=1;});
      out.push({a:a,sc:sc});
    });
    out.sort(function(x,y){return y.sc-x.sc;});
    if(!out.length){res.innerHTML='<div class="rech-msg">Aucun résultat pour « '+q+' ».</div>';return;}
    res.innerHTML=out.slice(0,30).map(function(o){
      return '<a class="rech-item" href="#/article/'+o.a.s+'"><div class="rech-meta">'+o.a.th+'</div><div class="rech-titre">'+o.a.t+'</div><div class="rech-extrait">'+extrait(o.a,termes)+'</div></a>';
    }).join('');
  }
  function ouvre(){overlay.classList.add('ouvert');document.body.style.overflow='hidden';chercher(champ.value);setTimeout(function(){champ.focus();},40);}
  function ferme(){overlay.classList.remove('ouvert');document.body.style.overflow='';}
  ouvrir.addEventListener('click',ouvre);
  ouvrir.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();ouvre();}});
  fermer.addEventListener('click',ferme);
  fermer.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();ferme();}});
  overlay.addEventListener('click',function(e){if(e.target===overlay)ferme();});
  res.addEventListener('click',function(e){if(e.target.closest('.rech-item'))ferme();});
  champ.addEventListener('input',function(){chercher(champ.value);});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&overlay.classList.contains('ouvert'))ferme();});
})();

(function(){
  var b=document.getElementById('cloche-ouvrir'),ov=document.getElementById('nouv-overlay'),
      li=document.getElementById('nouv-liste'),fe=document.getElementById('nouv-fermer');
  if(!b||!ov) return;
  li.innerHTML=NOUVEAUTES.map(function(g){return '<div class="nouv-groupe"><div class="nouv-date">'+g.d+'</div>'+g.items.map(function(t){return '<div class="nouv-ligne">'+t+'</div>';}).join('')+'</div>';}).join('');
  var pt=b.querySelector('.cloche-point');
  var sig=NOUVEAUTES[0].d+'|'+NOUVEAUTES.reduce(function(a,g){return a+g.items.length;},0);
  function vu(){try{return localStorage.getItem('lumen_nouv_vu');}catch(e){return null;}}
  function majPoint(){if(pt)pt.style.display=(vu()===sig?'none':'block');}
  majPoint();
  function ouvre(){ov.classList.add('ouvert');document.body.style.overflow='hidden';try{localStorage.setItem('lumen_nouv_vu',sig);}catch(e){}majPoint();}
  function ferme(){ov.classList.remove('ouvert');document.body.style.overflow='';}
  b.addEventListener('click',ouvre);
  b.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();ouvre();}});
  fe.addEventListener('click',ferme);
  ov.addEventListener('click',function(e){if(e.target===ov)ferme();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&ov.classList.contains('ouvert'))ferme();});
})();
