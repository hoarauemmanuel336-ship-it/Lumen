<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumen · Théologie catholique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   LUMEN — feuille de style
   Palette « manuscrit nocturne » : encre profonde, parchemin, or ancien.
   ============================================================ */
:root{
  --encre:#000000;          /* fond global, noir total */
  --encre-2:#0b0b0b;        /* fond des surfaces légèrement levées */
  --parchemin:#ffffff;      /* texte principal, blanc franc */
  --parchemin-att:#ffffff;  /* texte secondaire, blanc lui aussi */
  --or:#efe6cf;             /* accent principal, crème clair */
  --or-pale:#f8f3e6;        /* crème éclairci, hover */
  --pourpre:#9a3b3b;        /* accent rare, rouge liturgique */
  --filet:rgba(231,224,207,.14); /* filets fins */
  --filet-fort:rgba(231,224,207,.28);
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--encre);
  color:var(--parchemin);
  font-family:'EB Garamond',Georgia,serif;
  font-size:20px;
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
::selection{background:rgba(198,164,92,.25)}

a{color:inherit;text-decoration:none}

/* ---------- bandeau d'en-tête ---------- */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--filet);
}
.barre{
  max-width:1080px;margin:0 auto;
  padding:20px 32px;
  display:grid;grid-template-columns:auto auto 1fr;align-items:center;
  gap:24px;
}
.logo{
  grid-column:1;grid-row:1;
  font-family:'Cormorant Garamond',serif;
  font-weight:500;font-size:26px;
  letter-spacing:.34em;
  text-transform:uppercase;
  color:var(--parchemin);
  padding-left:.34em;
}
.logo:hover{color:var(--or-pale)}
nav.menu{display:flex;gap:30px;grid-column:3;grid-row:1;justify-self:end}
nav.menu a{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--parchemin-att);
  padding-bottom:3px;
  border-bottom:1px solid transparent;
  transition:color .3s,border-color .3s;
}
nav.menu a:hover,nav.menu a.actif{color:var(--parchemin);border-color:var(--or)}

/* bouton menu mobile */
.burger{display:none;background:none;border:none;color:var(--parchemin);
  font-size:24px;cursor:pointer;line-height:1}

/* contexte d'article (thème · date) centré dans le bandeau */
.contexte-bar{
  grid-column:2;grid-row:1;text-align:left;min-width:0;
  overflow:hidden;text-overflow:ellipsis;
  font-family:'Cormorant Garamond',serif;
  font-size:13px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--parchemin-att);white-space:nowrap;pointer-events:auto;
}
.contexte-bar:empty{display:none}
.contexte-bar a{transition:color .3s}
.contexte-bar a:hover{color:var(--or)}

/* ---------- recherche ---------- */
.rech-loupe{display:inline-flex;align-items:center;cursor:pointer;color:var(--parchemin-att);transition:color .3s;background:none;border:none;padding:0;outline:none}
.rech-loupe:hover,.rech-loupe:focus{color:var(--or)}
.rech-loupe svg{display:block}
.rech-overlay{position:fixed;inset:0;z-index:200;background:rgba(8,8,8,.98);display:none}
.rech-overlay.ouvert{display:block}
.rech-boite{max-width:760px;margin:0 auto;padding:8vh 24px 40px;height:100%;display:flex;flex-direction:column;box-sizing:border-box}
.rech-haut{display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--filet-fort);padding-bottom:18px}
.rech-haut svg{color:var(--or);flex:none}
#rech-champ{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--parchemin);font-family:'Cormorant Garamond',serif;font-size:30px;letter-spacing:.01em}
#rech-champ::-webkit-search-cancel-button,#rech-champ::-webkit-search-decoration{-webkit-appearance:none;appearance:none;display:none}
#rech-champ::placeholder{color:var(--parchemin-att);opacity:.5}
.rech-fermer{cursor:pointer;color:var(--parchemin-att);font-size:24px;line-height:1;transition:color .3s;flex:none;outline:none}
.rech-fermer:hover,.rech-fermer:focus{color:var(--parchemin)}
.rech-res{margin-top:6px;overflow-y:auto;flex:1}
    .cloche{position:relative}
    .cloche .cloche-point{position:absolute;top:0;right:-1px;width:6px;height:6px;border-radius:50%;background:var(--or);pointer-events:none;display:none}
    .nouv-titre-panneau{flex:1;color:var(--parchemin);font-family:'Cormorant Garamond',serif;font-size:30px;letter-spacing:.01em}
    .nouv-liste{margin-top:6px;overflow-y:auto;flex:1}
    .nouv-groupe{padding:20px 0;border-bottom:1px solid var(--filet)}
    .nouv-groupe:last-child{border-bottom:none}
    .nouv-date{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-bottom:16px}
    .nouv-ligne{position:relative;padding-left:22px;color:var(--parchemin-att);font-size:18px;line-height:1.55}
    .nouv-ligne::before{content:"";position:absolute;left:2px;top:.62em;width:5px;height:5px;border-radius:50%;background:var(--or)}
    .nouv-ligne + .nouv-ligne{margin-top:16px}
    @media(max-width:720px){.nouv-titre-panneau{font-size:24px}}
.rech-msg{padding:38px 4px;color:var(--parchemin-att);font-style:italic;font-size:18px}
.rech-item{display:block;padding:22px 4px;border-bottom:1px solid var(--filet);cursor:pointer;transition:padding-left .3s}
.rech-item:hover{padding-left:14px}
.rech-meta{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--or);margin-bottom:6px}
.rech-titre{font-family:'Cormorant Garamond',serif;font-size:24px;line-height:1.15;transition:color .3s}
.rech-item:hover .rech-titre{color:var(--or-pale)}
.rech-extrait{margin-top:7px;font-size:16px;color:var(--parchemin-att);line-height:1.55}
.rech-extrait mark{background:none;color:var(--or);font-weight:600}
@media(max-width:720px){#rech-champ{font-size:24px}.rech-boite{padding-top:6vh}}

/* ---------- conteneur de page ---------- */
main{max-width:1080px;margin:0 auto;padding:0 32px;min-height:70vh}
.vue{animation:apparait .6s ease both}
@keyframes apparait{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ---------- accueil ---------- */
.hero{
  padding:112px 0 100px;
  text-align:center;
  border-bottom:1px solid var(--filet);
}
.croix{
  position:relative;
  width:72px;height:132px;
  margin:0 auto;
}
.croix::before{
  content:"";position:absolute;
  left:50%;top:0;transform:translateX(-50%);
  width:2px;height:100%;
  background:#ffffff;
}
.croix::after{
  content:"";position:absolute;
  top:40px;left:0;
  width:100%;height:2px;
  background:#ffffff;
}

.intro{
  max-width:680px;margin:64px auto;
  text-align:center;
  font-size:20px;color:var(--parchemin-att);
}
.intro p+p{margin-top:18px}

/* titres de section internes */
.titre-section{
  display:flex;align-items:baseline;gap:18px;
  margin:72px 0 36px;
}
.titre-section .num{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;letter-spacing:.2em;color:var(--or);
  white-space:nowrap;
}
.titre-section h2{
  font-family:'Cormorant Garamond',serif;
  font-weight:400;font-size:34px;letter-spacing:.02em;
  white-space:nowrap;
}
.titre-section .trait{flex:1;height:1px;background:var(--filet)}

/* grille des domaines */
.domaines{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:0;background:transparent;
  border-top:1px solid var(--filet);border-left:1px solid var(--filet);
}
.domaine{
  background:var(--encre);
  border-right:1px solid var(--filet);border-bottom:1px solid var(--filet);
  padding:34px 30px;
  cursor:pointer;
  transition:background .35s;
  display:flex;flex-direction:column;gap:12px;
}
.domaine:hover{background:var(--encre-2)}
.domaine:last-child:nth-child(3n+1){grid-column:1 / -1}
.domaine:last-child:nth-child(3n+2){grid-column:2 / -1}
@media(max-width:900px){
  .domaines{grid-template-columns:repeat(2,1fr)}
  .domaine:last-child:nth-child(3n+1),.domaine:last-child:nth-child(3n+2){grid-column:auto}
  .domaine:last-child:nth-child(2n+1){grid-column:1 / -1}
}
@media(max-width:560px){
  .domaines{grid-template-columns:1fr}
  .domaine:last-child:nth-child(2n+1){grid-column:auto}
}
.domaine .d-num{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.18em;color:var(--or);
}
.domaine h3{
  font-family:'Cormorant Garamond',serif;
  font-weight:500;font-size:25px;letter-spacing:.01em;
  transition:color .3s;
}
.domaine:hover h3{color:var(--or-pale)}
.domaine p{font-size:17px;color:var(--parchemin-att);line-height:1.65}
.domaine .compte{
  margin-top:auto;font-size:13px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--parchemin-att);
  font-family:'Cormorant Garamond',serif;
}

/* ---------- bibliothèque : liste d'articles ---------- */
.bandeau-page{
  padding:80px 0 40px;border-bottom:1px solid var(--filet);margin-bottom:8px;
}
.bandeau-page .sur-titre{
  font-family:'Cormorant Garamond',serif;
  text-transform:uppercase;letter-spacing:.36em;
  font-size:12px;color:var(--or);margin-bottom:22px;
}
.bandeau-page h1{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(40px,6vw,68px);letter-spacing:.02em;line-height:1.05;
}
.bandeau-page .desc{
  margin-top:20px;max-width:620px;font-size:19px;color:var(--parchemin-att);
}

/* filtres de thèmes */
.filtres{display:flex;flex-wrap:wrap;gap:10px;margin:72px 0 16px}
.filtre{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--parchemin-att);
  padding:7px 16px;border:1px solid var(--filet);
  cursor:pointer;transition:all .3s;
  background:none;
}
.filtre:hover{color:var(--parchemin);border-color:var(--filet-fort)}
.filtre.actif{color:var(--encre);background:var(--or);border-color:var(--or)}

/* liste */
.liste{margin-top:24px}
.article-lien{
  display:block;padding:30px 4px;
  border-bottom:1px solid var(--filet);
  transition:padding-left .35s;
  cursor:pointer;
}
.article-lien:hover{padding-left:18px}
.article-lien .meta{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--or);margin-bottom:8px;
}
.article-lien h3{
  font-family:'Cormorant Garamond',serif;
  font-weight:400;font-size:30px;letter-spacing:.01em;
  transition:color .3s;line-height:1.15;
}
.article-lien:hover h3{color:var(--or-pale)}
.article-lien p{margin-top:8px;font-size:18px;color:var(--parchemin-att)}
.vide{padding:60px 0;text-align:center;color:var(--parchemin-att);font-style:italic;font-size:19px}
.cat-titre{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--or);
  margin:46px 0 2px;padding-bottom:14px;
  border-bottom:1px solid var(--filet-fort);
}
.liste > .cat-titre:first-child{margin-top:8px}

/* ---------- bibliothèque : domaines repliables ---------- */
.biblio-barre{display:flex;justify-content:flex-end;margin:30px 0 6px}
.bt{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--parchemin-att);cursor:pointer;
  display:inline-flex;align-items:center;gap:11px;
  padding:6px 2px;transition:color .3s;
  user-select:none;-webkit-tap-highlight-color:transparent;
}
.bt:hover{color:var(--or-pale)}
.bt .bt-fleche{display:inline-block;color:var(--or);transition:transform .35s ease;transform:rotate(90deg)}
.bt.actif-tout .bt-fleche{transform:rotate(-90deg)}
.domaines-liste{margin-top:30px}
.dom{border-bottom:1px solid var(--filet)}
.dom-tete{
  display:flex;align-items:baseline;gap:20px;
  padding:26px 6px;cursor:pointer;transition:background .3s;
  user-select:none;
}
.dom-tete:hover{background:var(--encre-2)}
.dom-num{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;letter-spacing:.2em;color:var(--or);
  font-variant-numeric:tabular-nums;flex:none;
}
.dom-nom{
  font-family:'Cormorant Garamond',serif;
  font-weight:400;font-size:29px;letter-spacing:.02em;line-height:1.1;
  flex:1;transition:color .3s;
}
.dom-tete:hover .dom-nom{color:var(--or-pale)}
.dom-compte{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--parchemin-att);white-space:nowrap;flex:none;
}
.dom-chevron{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;line-height:1;color:var(--parchemin-att);flex:none;
  transform:rotate(0);transition:transform .3s ease,color .25s;
}
.dom-tete:hover .dom-chevron{color:var(--or-pale)}
.dom.ouvert .dom-chevron{transform:rotate(90deg)}
.dom.ouvert .dom-tete{
  position:sticky;top:73px;z-index:40;
  background:rgba(0,0,0,.9);backdrop-filter:blur(8px);
}
.dom-sep{
  height:1px;opacity:0;
  background:linear-gradient(90deg,rgba(231,224,207,.5),rgba(231,224,207,.22),rgba(231,224,207,.06),transparent);
}
.dom-corps{display:none;padding:6px 0 22px}
.dom.ouvert .dom-corps{display:block}
.dom-corps > .article-lien:last-child{border-bottom:none}
/* sous-sections (catégories) repliables */
.sous{margin-top:6px}
.sous:first-child{margin-top:0}
.sous-tete{
  display:flex;align-items:center;gap:14px;
  cursor:pointer;user-select:none;padding:16px 6px;
  transition:background .3s;
}
.sous-tete:hover{background:var(--encre-2)}
.sous-puce{width:6px;height:6px;border-radius:50%;background:var(--or);flex:none;opacity:.85}
.sous-nom{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.26em;text-transform:uppercase;color:var(--or);
  flex:1;transition:color .3s;
}
.sous-tete:hover .sous-nom{color:var(--or-pale)}
.sous-chevron{
  font-family:'Cormorant Garamond',serif;font-size:20px;line-height:1;
  color:var(--parchemin-att);flex:none;transform:rotate(0);
  transition:transform .3s ease,color .25s;
}
.sous-tete:hover .sous-chevron{color:var(--or-pale)}
.sous.ouvert .sous-chevron{transform:rotate(90deg)}
.sous-corps{display:none;margin-left:9px;padding-left:24px;border-left:1px solid var(--filet)}
.sous.ouvert .sous-corps{display:block}
.sous-corps .article-lien:last-child{border-bottom:none}
@keyframes apparaitDom{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes apparaitDomFerme{from{opacity:1;transform:none}to{opacity:0;transform:translateY(-6px)}}

/* ---------- article ---------- */
article.lecture{max-width:720px;margin:0 auto;padding:64px 0 80px}
article.lecture h1{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(38px,6vw,60px);line-height:1.08;letter-spacing:.01em;
  margin:0 0 56px;text-align:center;
}
article.lecture h1+p::first-letter{
  font-family:'Cormorant Garamond',serif;
  float:left;font-size:78px;line-height:.78;
  font-weight:500;color:var(--or);
  margin:8px 14px 0 0;
}
article.lecture p{margin-bottom:22px}
article.lecture h2{
  font-family:'Cormorant Garamond',serif;font-weight:500;
  font-size:30px;letter-spacing:.01em;
  margin:48px 0 18px;
}
article.lecture h3{
  font-family:'Cormorant Garamond',serif;font-weight:500;
  font-size:23px;margin:34px 0 14px;color:var(--parchemin)
}
/* référence biblique en ligne */
.ref{font-weight:600;font-family:'Cormorant Garamond',serif;
  letter-spacing:.04em;color:var(--or);white-space:nowrap}
/* renvois internes entre articles */
article.lecture a,.prose a{
  color:var(--or);
  border-bottom:1px solid rgba(239,230,207,.35);
  transition:color .3s,border-color .3s;
}
article.lecture a:hover,.prose a:hover{color:var(--or-pale);border-color:var(--or-pale)}
article.lecture blockquote{
  margin:30px 0;padding-left:26px;border-left:2px solid var(--filet-fort);
  font-style:italic;color:var(--parchemin-att);
}
.fin-article{
  text-align:center;margin:60px 0 0;
  font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--or);letter-spacing:.4em;
}

/* ---------- à propos ---------- */
.prose{max-width:680px;margin:0 auto;padding:8px 0 80px;font-size:21px;text-align:center}
.prose p{margin-bottom:22px}
.apropos-vue{min-height:70vh;display:flex;flex-direction:column}
.apropos-corps{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 0}
.apropos-vue .prose{padding:0;text-align:left}

/* ---------- pied de page ---------- */
footer{
  border-top:1px solid var(--filet);
  margin-top:40px;
  padding:48px 32px 56px;
  text-align:center;
}
footer .marque{
  font-family:'Cormorant Garamond',serif;
  letter-spacing:.34em;text-transform:uppercase;font-size:18px;
  padding-left:.34em;color:var(--parchemin);
}
footer .verset-pied{
  margin-top:18px;font-style:italic;color:var(--parchemin-att);font-size:17px;
}
footer .copy{margin-top:22px;font-size:13px;letter-spacing:.08em;color:var(--parchemin-att);
  font-family:'Cormorant Garamond',serif}

/* ---------- responsive ---------- */
@media(max-width:720px){
  body{font-size:17px}
  .barre{padding:16px 20px;display:flex;justify-content:space-between}
  main{padding:0 20px}
  nav.menu{
    position:fixed;inset:62px 0 auto 0;
    flex-direction:column;gap:0;
    background:var(--encre-2);
    border-bottom:1px solid var(--filet);
    transform:translateY(-130%);transition:transform .35s;
  }
  nav.menu.ouvert{transform:none}
  nav.menu a{padding:18px 20px;border-bottom:1px solid var(--filet)}
  .burger{display:block}
  .contexte-bar{display:none}
  .titre-section h2{font-size:26px;white-space:normal}
  .titre-section{flex-wrap:wrap}
  .dom-tete{gap:13px;padding:22px 2px}
  .dom-nom{font-size:23px}
  .dom-chevron{font-size:22px}
  .dom.ouvert .dom-tete{top:61px}
  .sous-tete{padding:14px 2px;gap:11px}
  .sous-corps{padding-left:18px}
}
.vue:has(.apologie) .lecture{padding-bottom:56px}
.apologie{max-width:720px;margin:0 auto;padding:40px 0 96px;border-top:1px solid rgba(255,255,255,.12)}
.apologie-label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-bottom:14px}
.apologie-lien{display:inline-block;font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--parchemin);text-decoration:none;transition:color .2s}
.apologie-lien:hover{color:var(--or)}
.vue:has(.domaines-liste) .bandeau-page{border-bottom:none}
.ll-mob{display:none}
@media(max-width:720px){
nav.menu .rech-loupe{width:auto;justify-content:flex-start;gap:14px;padding:18px 20px;border-bottom:1px solid var(--filet);font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.12em;text-transform:uppercase;color:var(--parchemin-att)}
nav.menu .rech-loupe .ll-mob{display:inline}
nav.menu .cloche .cloche-point{top:22px;left:34px;right:auto}
}
</style>
</head>
<body>

<header>
  <div class="barre">
    <a href="#/" class="logo">Lumen</a>
    <button class="burger" id="burger" aria-label="Menu">☰</button>
    <nav class="menu" id="menu">
      <a href="#/" data-route="/">Accueil</a>

    contenu: `
      <p>Jacob revient dans son pays après vingt ans passés loin de chez lui, chez son oncle Laban. Le retour l'angoisse, car il doit y retrouver Ésaü, le frère jumeau qu'il avait autrefois dépouillé : il lui avait pris son droit d'aînesse, puis, par une tromperie, la bénédiction que leur père Isaac lui réservait. La veille de leurs retrouvailles, Jacob fait passer un torrent, le Yabboq, à ses femmes, ses enfants et ses troupeaux, puis demeure seul sur l'autre rive. C'est là, dans la nuit, qu'un homme l'attaque et lutte avec lui jusqu'à l'aube.</p>
      <h2>Le combat</h2>
      <p>Le combat déroute d'abord par l'identité de celui qui l'engage. Le récit l'appelle un homme, et Jacob dira au matin avoir vu Dieu ; c'est qu'il s'agit d'un ange, l'Ange du Seigneur, en qui Dieu lui-même se rend présent et agit. L'Écriture le dira clairement : <em>« Il lutta avec l'ange et l'emporta. »</em> <span class="ref">Osée 12:5</span> Cet ange lutte avec Jacob toute la nuit : <em>« Jacob étant resté seul, un homme lutta avec lui jusqu'au lever de l'aurore. »</em> <span class="ref">Genèse 32:25</span> Or il ne parvient pas à le vaincre. Que Dieu ne puisse pas l'emporter sur un homme dit assez qu'il se retient : il agit comme un père qui lutte avec son enfant et fait exprès de le laisser gagner, retenant sa force pour que Jacob tienne bon et s'engage tout entier. Puis, d'un seul geste, il lui touche la hanche et la déboîte. L'unique coup qu'il porte atteint le point d'appui du corps, là où l'homme prend sa force pour marcher et pour lutter. Jacob continue pourtant de tenir, et lorsque le jour menace de paraître, il refuse de laisser partir celui qu'il a saisi : <em>« Je ne te laisserai point aller que tu ne m'aies béni. »</em> <span class="ref">Genèse 32:27</span> Cet homme qui avait pris la bénédiction de son père par la ruse ne la dérobe plus : il la réclame en face, et s'y agrippe.</p>

      <p>Au cœur du combat se joue une transformation, et elle passe par le nom. Avant de bénir Jacob, l'ange lui demande quel est son nom, et Jacob répond : <em>« Jacob. »</em> <span class="ref">Genèse 32:28</span> Dieu connaît ce nom ; s'il le lui fait dire, c'est pour que Jacob avoue qui il est. Car ce nom le résume : Jacob, en hébreu <em>Ya'aqob</em> (<span dir="rtl">יַעֲקֹב</span>), est bâti sur le mot <em>'aqeb</em> (<span dir="rtl">עָקֵב</span>), le talon, et désigne celui qui talonne, qui supplante, qui prend la place d'un autre. À sa naissance déjà, il tenait le talon de son frère jumeau ; toute sa vie ensuite, il a vécu de ruse. En prononçant son nom, il reconnaît ce qu'il a été. C'est alors seulement que Dieu lui en donne un autre : <em>« Tu ne seras plus appelé Jacob, mais Israël, car tu as lutté avec Dieu et avec les hommes, et tu as vaincu. »</em> <span class="ref">Genèse 32:29</span> Israël, en hébreu <em>Yisra'el</em> (<span dir="rtl">יִשְׂרָאֵל</span>), signifie celui qui lutte avec Dieu, ou celui que Dieu fortifie. L'homme qui se définissait par ses combats rusés contre les hommes se définit désormais par sa lutte avec Dieu. Et ce nom n'est pas seulement le sien : en renommant Jacob, Dieu fait plus que transformer un homme, il pose le commencement d'Israël, le peuple tout entier qui portera ce nom.</p>
      <h2>La blessure</h2>

      <p>Quand l'aube se lève, l'adversaire demande à partir. Jacob veut savoir son nom, mais l'ange le bénit sans le lui dire, et s'efface. Jacob comprend alors avec qui il a lutté toute la nuit, et il donne au lieu le nom de Penuel (<span dir="rtl">פְּנוּאֵל</span>), qui signifie Face de Dieu : <em>« J'ai vu Dieu face à face, et ma vie a été sauvée. »</em> <span class="ref">Genèse 32:31</span> Ce dernier mot révèle l'enjeu de la scène. Dans l'Écriture, voir Dieu en face passe pour mortel, car nul ne peut soutenir sa présence. Jacob, lui, en sort vivant : ce Dieu vient pour bénir, et sa face, qui devrait foudroyer, le laisse en vie.</p>
      <p>Le lendemain, pour aller au-devant d'Ésaü qu'il redoutait, Jacob passe en tête, le premier devant les siens, lui qui s'était tenu en arrière toute la veille (Genèse 33:3).</p>

      <p>Le sacerdoce est la fonction du prêtre. Le prêtre se tient entre Dieu et les hommes : il porte à Dieu, au nom des hommes, l'offrande et la prière, et il fait passer aux hommes ce que Dieu donne, son pardon et sa bénédiction. Le mot vient du latin <em>sacerdos</em>, lié au sacré : celui qui accomplit les choses saintes.</p>
      <h2>Le prêtre, un médiateur</h2>
      <p>L'Écriture définit le prêtre d'une phrase : <em>« Tout grand prêtre, pris parmi les hommes, est établi en faveur des hommes dans leurs rapports avec Dieu, afin d'offrir des dons et des sacrifices pour les péchés. »</em> <span class="ref">Hébreux 5:1</span> Chaque mot éclaire. Le prêtre est pris parmi les hommes : il est l'un d'eux. Il est établi en leur faveur : à leur service. Son domaine est leurs rapports avec Dieu, le culte. Et sa tâche propre est d'offrir le sacrifice, l'offrande présentée à Dieu, le don d'une chose précieuse, souvent une victime, pour l'adorer et obtenir le pardon. Le prêtre est ainsi un médiateur : celui qui relie deux bords, Dieu et son peuple.</p>
      <h2>Du temple à la Croix</h2>
      <p>Dans l'Ancienne Alliance, Dieu établit des prêtres, choisis dans le peuple d'Israël, pour offrir au temple, au nom de tous, des sacrifices d'animaux sans cesse répétés. Ces offrandes préparaient et annonçaient, sans pouvoir ôter le péché : <em>« Il est impossible que le sang des taureaux et des boucs ôte les péchés. »</em> <span class="ref">Hébreux 10:4</span> Le Christ est venu accomplir le sacerdoce. Il s'est fait à la fois prêtre et victime : sur la Croix, il offre à son Père, une fois pour toutes, le seul sacrifice qui sauve, le don de sa propre vie : <em>« Nous sommes sanctifiés par l'offrande du corps de Jésus-Christ, une fois pour toutes. »</em> <span class="ref">Hébreux 10:10</span></p>
      <h2>Selon l'ordre de Melchisédech</h2>
      <p>Ce sacerdoce du Christ ne finit pas, annoncé de loin par une figure de la Genèse. Melchisédech, roi de Salem et prêtre du Très-Haut, vint au-devant d'Abraham, lui offrit du pain et du vin, et le bénit : <em>« Melchisédech, roi de Salem, fit apporter du pain et du vin ; il était prêtre du Dieu très-haut, et il bénit Abram. »</em> <span class="ref">Genèse 14:18-19</span> Sans généalogie, sans commencement ni fin marqués dans le récit, il préfigure le Prêtre éternel, et le pain et le vin qu'il présente annoncent l'offrande de l'Eucharistie. C'est pourquoi l'Écriture salue le Christ de ce titre : <em>« Tu es prêtre pour toujours selon l'ordre de Melchisédech. »</em> <span class="ref">Hébreux 5:6</span></p>
      <h2>Le sacerdoce partagé</h2>
      <p>De cet unique sacerdoce du Christ découle tout sacerdoce chrétien. Par le baptême, tous les fidèles reçoivent un sacerdoce : ils peuvent offrir à Dieu leur vie entière, leur travail, leurs joies et leurs peines, comme une offrande spirituelle. C'est le sacerdoce commun de tous les baptisés : <em>« Vous êtes une race choisie, un sacerdoce royal. »</em> <span class="ref">1 Pierre 2:9</span> Au sein de ce peuple, le Christ en appelle certains à un sacerdoce particulier : par l'ordination, le prêtre reçoit d'agir au nom du Christ lui-même et de rendre présent, dans l'eucharistie, son unique sacrifice. C'est le sacerdoce ministériel, donné pour servir le sacerdoce commun.</p>
      <h2>Une seule réalité</h2>
      <p>Le mot « sacerdoce » recouvre ainsi une seule réalité, partagée à plusieurs degrés : le Christ, unique Prêtre qui s'est offert lui-même ; les baptisés, qui offrent leur vie ; les ordonnés, qui rendent présent son sacrifice. Tout remonte au Christ, l'unique médiateur : <em>« Il y a un seul médiateur entre Dieu et les hommes, le Christ Jésus. »</em> <span class="ref">1 Timothée 2:5</span></p>
      <div class="fin-article">✦</div>

    date: "2026",
    contenu: `
      <p>Dans l'Église catholique, seuls des hommes reçoivent le sacerdoce. Cette réserve s'éclaire quand on regarde ce qu'est le sacerdoce, qui l'a institué, et ce que le prêtre signifie devant l'assemblée.</p>
      <h2>Le sacerdoce, un appel</h2>
      <p>Le sacerdoce est un don, reçu d'en haut. Nul ne se fait prêtre lui-même : on y est appelé, et l'on reçoit par l'ordination ce qu'on ne saurait se donner : <em>« Nul ne s'attribue à soi-même cet honneur ; on y est appelé par Dieu, comme Aaron. »</em> <span class="ref">Hébreux 5:4</span> Un homme lui-même ne peut le revendiquer comme un droit ; il l'attend comme un appel. Dès lors, tout se décide dans l'appel du Christ : qui il appelle, et la forme qu'il a voulu donner à son sacerdoce.</p>
      <h2>Le choix des Douze</h2>
      <p>Le Christ a institué le sacerdoce en choisissant douze hommes pour être ses apôtres : <em>« Il appela ses disciples, et il en choisit douze, qu'il nomma apôtres. »</em> <span class="ref">Luc 6:13</span> Il les a établis pour annoncer l'Évangile, baptiser, pardonner les péchés et refaire le geste de la Cène ; d'eux vient, de proche en proche, le sacerdoce de l'Église.</p>
      <p>Ce choix fut libre. Le Christ accueillait les femmes d'une manière que son temps ignorait : des femmes l'ont suivi et servi, et ce sont elles qui, les premières, ont trouvé le tombeau vide et vu le Ressuscité, envoyées l'annoncer aux apôtres (Jean 20:11-18). Celui qui confiait à des femmes la première annonce de la résurrection a pourtant réservé aux Douze la charge apostolique. Son choix porte donc une intention, libre des usages du moment.</p>
      <h2>Le prêtre, signe du Christ-Époux</h2>
      <p>La raison profonde tient à ce que le prêtre représente. Dans l'eucharistie, le prêtre prête sa voix et ses mains au Christ : prononçant les paroles de la Cène, c'est au nom du Christ qu'il agit, et le Christ se rend présent par lui. Le prêtre est le signe visible du Christ au milieu de l'assemblée.</p>
      <p>Or le Christ s'est donné comme l'Époux de l'Église. Il l'aime, se livre pour elle, s'unit à elle : <em>« Maris, aimez vos femmes, comme le Christ a aimé l'Église et s'est livré pour elle. »</em> <span class="ref">Éphésiens 5:25</span> Ce lien nuptial dit le fond du salut, l'union de Dieu et de son peuple, que l'Écriture scelle comme un grand mystère : <em>« Ce mystère est grand ; je le dis par rapport au Christ et à l'Église. »</em> <span class="ref">Éphésiens 5:32</span></p>
      <p>Le prêtre porte donc le signe du Christ-Époux devant l'Église-Épouse. Un signe parle en ressemblant à ce qu'il figure : l'eau du baptême évoque ce qui lave, le pain ce qui nourrit. De même, figurer l'Époux demande un homme : une femme ne peut tenir, dans le signe, le rôle de l'Époux qu'est le Christ.</p>
      <h2>Ce que l'Église a reçu</h2>
      <p>Ce choix, l'Église l'a reçu du Christ et le garde. Elle se reconnaît sans pouvoir d'en changer, car il touche la forme que le Christ a donnée à son sacerdoce. En cela, cette réserve diffère d'une coutume comme le voile, qui a varié selon les temps : celle-ci tient à ce que le sacerdoce est. L'Église la tient donc pour stable.</p>
      <h2>Le service et la sainteté</h2>
      <p>Le sacerdoce est un service, ordonné au salut des autres. La grandeur, dans l'Évangile, se joue dans la sainteté, sans passer par l'ordination : la plus haute des créatures, celle qui porta Dieu et que toutes les générations disent bienheureuse, fut une femme, et nul ne la dépasse : <em>« Toutes les générations me diront bienheureuse. »</em> <span class="ref">Luc 1:48</span></p>
      <p>Le sacerdoce réservé aux hommes dit ainsi le Christ-Époux qui se donne pour son Église.</p>
      <div class="fin-article">✦</div>

    date: "2026",
    contenu: `
      <p>La première lettre à Timothée donne des consignes pour la conduite de l'assemblée d'Éphèse, dont celle-ci : la femme reçoit l'instruction dans le calme, elle n'enseigne pas ni n'exerce d'autorité sur l'homme, et la règle est fondée sur Adam et Ève. Le passage heurte. Il s'éclaire quand on entre dans la situation qu'il corrige et dans les raisons qu'il avance.</p>
      <h2>Le calme et l'instruction</h2>
      <p>Timothée veille sur l'Église d'Éphèse, troublée par de faux docteurs qui répandent des doctrines fausses et égarent des fidèles mal affermis. C'est dans ce désordre qu'est écrite la lettre. Sa première parole sur les femmes est une invitation à recevoir l'instruction : <em>« Que la femme reçoive l'instruction en silence, en toute soumission. »</em> <span class="ref">1 Timothée 2:11</span> Le mot grec rendu par « silence », <em>hésychia</em> (ἡσυχία), désigne le calme, la tranquillité. Le texte demande donc une attitude d'écoute et d'ordre, et non un mutisme. Avant d'enseigner, il faut d'abord être instruit ; à Éphèse, des femmes gagnées par l'erreur voulaient enseigner sans l'être encore.</p>
      <h2>Enseigner et prendre autorité</h2>
      <p>Vient alors la règle : <em>« Je ne permets pas à la femme d'enseigner, ni de prendre autorité sur l'homme ; qu'elle demeure dans le silence. »</em> <span class="ref">1 Timothée 2:12</span> Ce qui est réservé est précis : l'enseignement public qui fait autorité, et la présidence de l'assemblée, c'est-à-dire la charge de diriger la communauté réunie et de conduire sa prière. Cette charge revient aux hommes établis pour elle, et l'Église l'a maintenue en confiant aux hommes le ministère ordonné.</p>
      <p>Cette réserve laisse entière la part des femmes dans la transmission de la foi. L'Écriture suppose ailleurs que la femme prie et prophétise dans l'assemblée : <em>« Toute femme qui prie ou prophétise… »</em> <span class="ref">1 Corinthiens 11:5</span> Les Actes montrent une femme qui instruit dans la foi un prédicateur déjà éloquent (Actes 18:26). Ce qui est écarté est une fonction précise, l'enseignement qui fait autorité et la présidence de l'assemblée ; la parole des femmes garde ailleurs toute sa place.</p>
      <h2>Adam et Ève</h2>
      <p>La consigne est fondée sur deux faits de la Genèse. Le premier est l'ordre de la création : <em>« Car Adam fut formé le premier, Ève ensuite. »</em> <span class="ref">1 Timothée 2:13</span> L'antériorité d'Adam dit l'ordre voulu par Dieu entre l'homme et la femme.</p>
      <p>Le second est l'ordre de la chute : <em>« Ce n'est pas Adam qui fut séduit ; c'est la femme qui, séduite, tomba dans la transgression. »</em> <span class="ref">1 Timothée 2:14</span> Ève fut trompée la première par le serpent. Le texte n'enseigne pas pour autant qu'Ève soit plus coupable, ni que la femme soit plus faible par nature : la responsabilité du péché qui pèse sur toute l'humanité est rapportée à Adam, en qui tous ont péché : <em>« Par un seul homme le péché est entré dans le monde. »</em> <span class="ref">Romains 5:12</span> Si la séduction d'Ève est rappelée, c'est en avertissement : la même tromperie était à l'œuvre à Éphèse, où des fidèles mal affermis se laissaient égarer par les faux docteurs. Le rappel de la chute met en garde l'assemblée contre ce danger.</p>
      <h2>Sauvée par l'enfantement</h2>
      <p>Le passage s'achève sur une parole obscure : <em>« Elle sera sauvée par l'enfantement, si elle persévère dans la foi, la charité et la sainteté. »</em> <span class="ref">1 Timothée 2:15</span> L'enfantement dont il s'agit est d'abord celui par lequel le salut est venu au monde. Là où Ève, séduite, entraîna la chute, une femme, en mettant au monde le Sauveur, a porté le remède, accomplissant la promesse faite après la faute, celle d'une descendance née de la femme qui écraserait le serpent : <em>« Je mettrai une inimitié entre toi et la femme, entre ta descendance et la sienne : elle t'écrasera la tête. »</em> <span class="ref">Genèse 3:15</span> La femme est relevée par cet enfantement, reçu dans la foi.</p>
      <p>Le passage tient ainsi ensemble deux choses. Une discipline : l'enseignement qui fait autorité et la présidence de l'assemblée reviennent aux hommes établis, et l'Église l'a gardé ; la forme la plus stricte, le silence imposé, répondait au désordre précis d'Éphèse. Et une dignité : la femme, égale en valeur devant Dieu, a part comme l'homme au salut, et c'est par une femme que le Sauveur est entré dans le monde. L'ordre ainsi rappelé situe l'homme et la femme, ensemble, dans le dessein d'un Dieu qui a voulu les sauver par l'enfantement d'une femme.</p>

      <h2>Le voile et la tête rasée</h2>
      <p>À Corinthe, le voile était le signe de la femme honorable. Une femme respectée se couvrait la tête en public ; paraître dévoilée dans l'assemblée la rangeait, aux yeux de tous, du côté des femmes de mauvaise réputation. La tête rasée, elle, était une marque d'infamie : on rasait les esclaves, et la tonte signait le déshonneur de la femme adultère.</p>
      <p>C'est sur cet usage que repose le raisonnement de la lettre. Une femme qui prie dévoilée se met au rang de celle qu'on a tondue par honte ; et puisqu'une femme tondue est déshonorée, qu'elle se couvre plutôt la tête : <em>« Si une femme ne se voile pas, qu'elle se tonde ; mais s'il est honteux pour une femme d'être tondue ou rasée, qu'elle se voile. »</em> <span class="ref">1 Corinthiens 11:6</span> Le voile demandé est donc un signe de dignité, celui-là même qui distinguait la femme honorable.</p>
      <p>Le texte appuie enfin ce signe sur la nature elle-même, qui sépare déjà l'homme et la femme jusque dans la chevelure : <em>« La nature ne vous enseigne-t-elle pas que c'est une honte pour l'homme de porter les cheveux longs, mais que c'est une gloire pour la femme, parce que la chevelure lui a été donnée comme voile ? »</em> <span class="ref">1 Corinthiens 11:14-15</span> Les cheveux longs sont la parure de la femme et son voile naturel ; pour l'homme, ils passaient pour un déshonneur. Puisque la nature voile déjà la femme de sa chevelure, le voile qu'elle porte dans le culte prolonge ce signe.</p>
      <h2>L'image et la gloire</h2>
      <p>L'usage reçoit un fondement plus profond, pris dans la création : <em>« Le chef de tout homme, c'est le Christ ; le chef de la femme, c'est l'homme ; et le chef du Christ, c'est Dieu. »</em> <span class="ref">1 Corinthiens 11:3</span> Le mot traduit par « chef » désigne la tête, et par là la source : comme la source d'un fleuve, il dit l'origine. L'homme est l'origine de la femme, parce qu'au commencement Ève fut tirée d'Adam. Cet ordre laisse intacte l'égale dignité des deux, car le texte l'applique aussi à Dieu : le chef du Christ, c'est Dieu, le Fils recevant du Père son origine éternelle tout en lui étant égal.</p>
      <p>De là vient la parole sur la gloire : <em>« L'homme ne doit pas se couvrir la tête, parce qu'il est l'image et la gloire de Dieu ; la femme est la gloire de l'homme. »</em> <span class="ref">1 Corinthiens 11:7</span> « Gloire » désigne ici ce qui manifeste et fait rayonner : l'homme, créé à l'image de Dieu, manifeste Dieu ; la femme, tirée de l'homme, manifeste l'homme. Dans l'assemblée tournée vers Dieu, l'homme prie tête nue, parce qu'il porte directement l'image de Dieu ; la femme voile la gloire humaine dont elle est le rayonnement, afin que seule paraisse, dans la prière, la gloire de Dieu. Le voile dit cet effacement de tout éclat humain devant le Créateur.</p>
      <p>Le texte équilibre aussitôt par une parole de réciprocité : <em>« Dans le Seigneur, la femme n'est pas sans l'homme, ni l'homme sans la femme ; comme la femme a été tirée de l'homme, ainsi l'homme naît par la femme, et tout vient de Dieu. »</em> <span class="ref">1 Corinthiens 11:11-12</span> L'un est l'origine de l'autre tour à tour, et tous deux sont également faits à l'image de Dieu.</p>

      <p>Le texte nomme enfin le voile d'un mot surprenant : <em>« La femme doit avoir sur la tête une marque d'autorité, à cause des anges. »</em> <span class="ref">1 Corinthiens 11:10</span> Le grec dit littéralement qu'elle porte une « autorité » sur la tête. Cette autorité est la sienne : le voile est le signe du pouvoir qui lui est reconnu de prier et de prophétiser dans l'assemblée. Le texte l'a rappelé plus haut : la femme y prie et y prophétise ; le voile marque sa dignité de participante au culte, celle qui se tient et prend la parole devant Dieu au milieu de tous.</p>
      <p>Reste le motif le plus énigmatique : à cause des anges. Les anges assistent à la prière de l'Église, où la liturgie de la terre rejoint celle du ciel. Gardiens de l'ordre que Dieu a établi dans sa création, ils sont les témoins de l'assemblée en prière, et devant eux la tenue du culte honore cet ordre : ce que les hommes font dans la prière se déroule sous le regard du ciel.</p>
      <h2>Le principe et la coutume</h2>
      <p>Ces signes éclairés, on peut distinguer ce qui demeure de ce qui passe. La forme concrète, le voile, la tête couverte ou nue, la longueur des cheveux, tenait aux usages d'un temps et d'un lieu : elle disait alors la dignité, la pudeur et l'ordre reçu de Dieu. Ces usages ont changé, et l'Église n'impose plus le voile comme une loi. Le texte lui-même n'en faisait pas une règle absolue : <em>« Si quelqu'un se plaît à contester, nous n'avons pas cette habitude, ni les Églises de Dieu. »</em> <span class="ref">1 Corinthiens 11:16</span></p>
      <p>Ce que le passage demande de garder traverse les siècles : honorer Dieu jusque dans le corps et la tenue, recevoir la différence de l'homme et de la femme comme un don du Créateur, et les tenir ensemble tournés vers le Christ, en qui <em>« il n'y a plus ni homme ni femme, car vous êtes tous un. »</em> <span class="ref">Galates 3:28</span></p>

      <h2>Le regard du sage</h2>
      <p>Le poème pose un regard sur le déroulement de la vie. Chaque chose y a son moment, et aucune saison ne dure toujours ; l'homme les traverse sans en fixer le cours, car ils lui sont donnés. Le sage observe ce qui se passe sous le soleil, la vie de l'homme dans les limites de ce monde, où les saisons tournent et reviennent. Il décrit ce qu'il voit. Quand il nomme un temps pour tuer, il constate ce que traverse l'histoire des hommes, sans ouvrir à personne le droit d'ôter la vie. La maîtrise de ces temps appartient à Dieu seul, qui les tient et les ordonne.</p>
      <h2>Le sens d'une parole difficile</h2>
      <p>Le commandement est souvent connu sous la forme « Tu ne tueras point ». En français, le mot « tuer » couvre tout fait d'ôter la vie. Le commandement, lui, vise une chose précise : le meurtre, ôter injustement la vie à un innocent. Le texte le dit exactement : <em>« Tu ne commettras pas de meurtre. »</em> <span class="ref">Exode 20:13</span> La gravité en est extrême, car la vie de l'homme porte en elle l'image de Dieu : <em>« Qui verse le sang de l'homme, par l'homme son sang sera versé ; car Dieu a fait l'homme à son image. »</em> <span class="ref">Genèse 9:6</span> Le sang de l'innocent crie vers Dieu, comme celui d'Abel monté de la terre : <em>« La voix du sang de ton frère crie de la terre jusqu'à moi. »</em> <span class="ref">Genèse 4:10</span></p>
      <p>Le poème, lui, emploie un mot plus large. Il embrasse les temps où la vie est ôtée sans qu'il y ait meurtre : dans la guerre qui défend un peuple, dans la protection de l'innocent menacé, dans l'exercice de la justice. Ces temps appartiennent à l'histoire d'un monde blessé par le péché, où la vie doit parfois être défendue au prix du sang. La parole du sage et le commandement s'accordent ainsi pleinement : l'un observe les saisons d'un monde déchu, l'autre garde inviolable la vie de l'innocent.</p>
      <h2>Toute chose belle en son temps</h2>
      <p>Une fois la parole comprise, elle prend sa place parmi les temps que Dieu ordonne. Au terme du poème, le sage en découvre la source : <em>« Il fait toute chose belle en son temps ; il a mis aussi dans leur cœur la pensée de l'éternité. »</em> <span class="ref">Ecclésiaste 3:11</span> Même les heures les plus rudes sont tenues par une main qui les rend belles à l'heure voulue, et dans le cœur de l'homme demeure le désir d'une chose qui ne passe pas.</p>
      <h2>La plénitude des temps</h2>
      <p>Ces temps trouvent leur centre dans le Christ : <em>« Lorsque vint la plénitude des temps, Dieu envoya son Fils. »</em> <span class="ref">Galates 4:4</span> En lui, le désir d'éternité reçoit sa réponse, et le temps le plus sombre du poème est traversé par Dieu lui-même. À l'heure où des hommes mettent à mort l'Innocent, sans qu'aucune parole ne l'excuse, Dieu tire de ce sang versé la guérison du monde, par la mort et la résurrection de son Fils.</p>
      <p>Le poème de l'Ecclésiaste conduit ainsi à une paix : aucune saison de la vie, même la plus rude, n'échappe à la main de Dieu. Tout a son temps, et tous les temps sont tenus par celui qui les a faits et qui, dans le Christ, les conduit vers l'éternité.</p>

      <h2>La foi qui voit de loin</h2>
      <p>Abraham a reçu de Dieu une promesse : une descendance innombrable, et par elle une bénédiction pour toutes les nations : <em>« En ta postérité seront bénies toutes les nations de la terre. »</em> <span class="ref">Genèse 22:18</span> Cette postérité par laquelle vient la bénédiction est le Christ lui-même : <em>« Les promesses ont été faites à Abraham et à sa postérité, qui est le Christ. »</em> <span class="ref">Galates 3:16</span> En croyant à la promesse, Abraham croyait à celui qui devait l'accomplir. Sa foi portait déjà sur le Christ à venir.</p>

      <p>La grâce est donnée sans être due. Elle précède l'homme et le devance, sans répondre à aucun mérite : c'est Dieu qui aime et donne le premier. Là est sa nature même, que rien dans l'homme ne vient acquérir : <em>« Si c'est par grâce, ce n'est plus à cause des œuvres ; autrement la grâce ne serait plus la grâce. »</em> <span class="ref">Romains 11:6</span></p>
      <h2>Nécessaire, et offerte à tous</h2>
      <p>Sans la grâce, l'homme ne peut rien accomplir qui le conduise à Dieu : elle est le commencement de toute vie avec lui et le soutien de tout le chemin, car nul ne s'approche de Dieu par ses seules forces : <em>« Sans moi, vous ne pouvez rien faire. »</em> <span class="ref">Jean 15:5</span> Et cette grâce, Dieu l'offre à tout homme, car il veut le salut de tous : <em>« Dieu veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. »</em> <span class="ref">1 Timothée 2:4</span></p>
      <h2>Donnée par le Christ dans l'Esprit</h2>
      <p>La grâce s'est manifestée pleinement dans le Christ, qui l'a méritée pour les hommes par sa mort et sa résurrection : <em>« La grâce de Dieu s'est manifestée, source de salut pour tous les hommes. »</em> <span class="ref">Tite 2:11</span> L'Esprit Saint la répand ensuite dans les cœurs : <em>« L'amour de Dieu a été répandu dans nos cœurs par l'Esprit Saint qui nous a été donné. »</em> <span class="ref">Romains 5:5</span> On distingue ainsi la grâce incréée, qui est Dieu lui-même se donnant en son Esprit, et la grâce créée, le don qu'il dépose dans l'âme et qui la transforme.</p>
      <h2>Les formes de la grâce</h2>
      <p>Cette grâce créée se présente sous deux modes principaux, la grâce sanctifiante et la grâce actuelle. À ces deux modes s'ajoutent les grâces propres à chaque sacrement, les charismes (dons accordés à l'un pour le bien de tous) et les grâces attachées à une vocation. Toutes sont la même libéralité de Dieu, reçue selon des manières diverses.</p>
      <h2>La grâce sanctifiante</h2>
      <p>La grâce sanctifiante est le don permanent que Dieu infuse dans l'âme et qui y demeure. Elle transforme l'homme en profondeur et l'établit dans une condition nouvelle, celle d'enfant de Dieu, né de lui par adoption, capable de vivre de la vie même de Dieu : <em>« Il nous a accordé de devenir participants de la nature divine. »</em> <span class="ref">2 Pierre 1:4</span> Elle le relève à un ordre qui dépasse sa nature : <em>« À tous ceux qui l'ont reçu, il a donné le pouvoir de devenir enfants de Dieu. »</em> <span class="ref">Jean 1:12</span></p>
      <p>Avec elle, Dieu vient lui-même habiter l'âme : la Trinité y fait sa demeure. <em>« Si quelqu'un m'aime, il gardera ma parole, et mon Père l'aimera ; nous viendrons à lui et nous ferons chez lui notre demeure. »</em> <span class="ref">Jean 14:23</span> Avec elle sont infusées les vertus théologales, la foi, l'espérance et la charité, ainsi que les dons de l'Esprit Saint : l'âme reçoit de quoi connaître, espérer et aimer Dieu au-delà de ses seules forces.</p>
      <p>Elle est reçue pour la première fois au baptême, grandit par les sacrements, la prière et les œuvres de charité, se perd par le péché mortel, et se retrouve par le sacrement de pénitence, qui la rétablit pleinement.</p>
      <h2>La grâce actuelle</h2>
      <p>La grâce actuelle est le secours passager que Dieu accorde pour accomplir un acte bon : elle éclaire l'intelligence et fortifie la volonté, le temps d'un choix ou d'un mouvement du cœur, puis se renouvelle selon les besoins. Dieu en est la source et agit le premier : <em>« C'est Dieu qui produit en vous le vouloir et le faire, selon son dessein bienveillant. »</em> <span class="ref">Philippiens 2:13</span> Le mouvement même par lequel l'homme se tourne vers le Christ ne vient pas de lui seul, mais de la grâce qui le devance : <em>« Nul ne peut dire : Jésus est Seigneur, si ce n'est par l'Esprit Saint. »</em> <span class="ref">1 Corinthiens 12:3</span></p>
      <p>Prévenante, elle va devant l'homme pour éveiller en lui le désir du bien ; coopérante, elle le soutient pendant qu'il agit, de sorte que son œuvre soit tout ensemble don de Dieu et acte de l'homme : <em>« Par la grâce de Dieu, je suis ce que je suis, et sa grâce envers moi n'a pas été vaine. »</em> <span class="ref">1 Corinthiens 15:10</span> Dieu ne la donne pas une fois pour toutes : il la renouvelle à chaque pas et mène lui-même à son terme l'œuvre commencée : <em>« Celui qui a commencé en vous une œuvre bonne en poursuivra l'achèvement jusqu'au jour du Christ Jésus. »</em> <span class="ref">Philippiens 1:6</span></p>
      <p>Ce secours respecte la liberté qu'il meut : Dieu touche l'âme sans la forcer, et l'homme peut y consentir ou s'y dérober : <em>« Aujourd'hui, si vous entendez sa voix, n'endurcissez pas vos cœurs. »</em> <span class="ref">Hébreux 3:15</span> Reçue et suivie, elle conduit le pécheur à la conversion et le dispose à recevoir ou à recouvrer la grâce sanctifiante.</p>
      <h2>De la grâce à la gloire</h2>
      <p>La grâce reçue dans le temps est le commencement de la vie que Dieu donnera dans l'éternité. Ce qu'elle inaugure ici-bas s'achève dans la vision de Dieu, où le don atteint sa plénitude : <em>« Le Seigneur donne la grâce et la gloire. »</em> <span class="ref">Psaume 84:12</span></p>

      <p>La charité est un don que Dieu infuse dans l'âme avec la grâce sanctifiante. Elle vient de Dieu, qui aime le premier et met dans le cœur de l'homme le pouvoir de l'aimer en retour. <em>« L'amour de Dieu a été répandu dans nos cœurs par l'Esprit Saint qui nous a été donné. »</em> <span class="ref">Romains 5:5</span> L'homme aime alors d'un amour qui le dépasse, participant à l'amour même dont Dieu nous aime. <em>« Nous, aimons, puisque lui nous a aimés le premier. »</em> <span class="ref">1 Jean 4:19</span></p>
      <h2>Une amitié avec Dieu</h2>
      <p>Cet amour partagé fait de l'homme l'ami de Dieu. La charité est une amitié : un amour mutuel, où Dieu se donne et où l'homme répond, admis dans l'intimité de son Seigneur. Le Christ l'a dit aux siens au soir de sa vie. <em>« Je ne vous appelle plus serviteurs, je vous appelle amis, parce que je vous ai fait connaître tout ce que j'ai entendu de mon Père. »</em> <span class="ref">Jean 15:15</span></p>
      <h2>Aimer Dieu, aimer le prochain</h2>
      <p>L'amour de Dieu et l'amour du prochain forment une seule charité, car on aime le prochain pour Dieu et en Dieu. L'un est la mesure et la preuve de l'autre. <em>« Celui qui n'aime pas son frère, qu'il voit, ne peut aimer Dieu, qu'il ne voit pas. »</em> <span class="ref">1 Jean 4:20</span> Le Christ a donné la mesure de cet amour en se livrant lui-même, et il en a fait le signe auquel on reconnaît les siens. <em>« Aimez-vous les uns les autres comme je vous ai aimés. À ceci, tous reconnaîtront que vous êtes mes disciples. »</em> <span class="ref">Jean 13:34-35</span></p>
      <h2>Le visage de la charité</h2>
      <p>La charité prend un visage concret dans la vie de chaque jour. Elle se reconnaît à la patience, à la bonté, à l'oubli de soi. <em>« La charité est patiente, elle est pleine de bonté ; elle ne cherche pas son intérêt, elle excuse tout, espère tout, supporte tout. »</em> <span class="ref">1 Corinthiens 13:4-7</span> Ce sont là les gestes où l'amour de Dieu passe dans la vie de l'homme.</p>
      <h2>La forme de toutes les vertus</h2>
      <p>La charité donne aux autres vertus leur achèvement et les anime de l'intérieur, les ordonnant toutes à Dieu. Sans elle, les œuvres les plus grandes restent vides devant lui ; avec elle, le moindre acte devient précieux. Elle relie ensemble toute la vie chrétienne et la mène à sa perfection. <em>« Par-dessus tout, ayez l'amour, qui est le lien de la perfection. »</em> <span class="ref">Colossiens 3:14</span></p>
      <h2>La plus grande, et qui demeure</h2>
      <p>La charité surpasse la foi et l'espérance, parce qu'elle atteint Dieu lui-même et qu'elle demeure quand les deux autres s'achèvent. Au ciel, la foi laissera place à la vision et l'espérance à la possession ; la charité, elle, ne passera jamais. <em>« L'amour ne passe jamais. »</em> <span class="ref">1 Corinthiens 13:8</span> Elle est la plus grande des trois et le sommet de toute la vie avec Dieu. <em>« Maintenant donc demeurent la foi, l'espérance et la charité, ces trois ; mais la plus grande des trois, c'est la charité. »</em> <span class="ref">1 Corinthiens 13:13</span></p>

      <h2>Le Verbe, Parole et Sagesse du Père</h2>
      <p>« Verbe » signifie « Parole ». Comme une parole exprime tout entière la pensée de celui qui la dit, le Fils exprime tout entier ce que le Père est. Cette Parole est une Personne, et cette Personne est Dieu : le Père s'énonce en un seul Verbe, parfait et unique, en qui il dit tout ce qu'il est. C'est là que se découvre comment le Fils procède du Père, par mode de connaissance : comme l'intelligence qui se connaît conçoit au-dedans une parole intérieure, fruit de son acte de connaître, le Père, se connaissant parfaitement, engendre son Verbe. On nomme cette procession l'engendrement éternel : le Fils est engendré du Père, recevant de lui la vie divine tout entière.</p>
      <p>Le prologue de l'évangile de Jean fut écrit en grec, et le mot qu'il emploie est « Logos » (λόγος), qui dit à la fois la parole et la raison : le mot que l'on prononce, et l'intelligence et l'ordre qui s'y expriment. Nommer le Fils « Logos », c'est le confesser tout ensemble Parole que le Père énonce et Sagesse par laquelle il pense et ordonne le monde. La pensée grecque appelait déjà « logos » la raison qui traverse l'univers ; Jean reprend ce mot et révèle que ce Logos est une Personne, Dieu lui-même, qui s'est fait homme. Traduit en latin, « Logos » devint « Verbum », au commencement était le Verbe, d'où vient le français « Verbe » : le latin garde surtout le sens de parole, et la richesse du grec, qui unissait la parole et la raison, demeure dans la foi de l'Église.</p>
      <p>Le Verbe demeure en Dieu de toute éternité, vivant et personnel, image parfaite du Père, celui en qui le Père se connaît et se donne : <em>« Il est le rayonnement de sa gloire et l'empreinte de son être. »</em> <span class="ref">Hébreux 1:3</span></p>
      <h2>Le Verbe par qui tout a été fait</h2>
      <p>Le Père crée toutes choses par le Fils, son Verbe. Dieu crée en parlant : il dit, et cela est ; cette parole créatrice est le Verbe lui-même, par qui le Père appelle toutes choses à l'existence et les tient dans l'être : <em>« Tout a été fait par lui, et rien de ce qui existe n'a été fait sans lui. »</em> <span class="ref">Jean 1:3</span> Le Fils est l'image parfaite du Père et celui en qui le monde reçoit l'existence : <em>« Il est l'image du Dieu invisible, le premier-né de toute la création ; en lui tout a été créé. »</em> <span class="ref">Colossiens 1:15-16</span></p>
      <h2>Le Fils fait homme</h2>
      <p>Pour sauver les hommes, le Fils a pris notre nature : il est devenu homme tout en restant Dieu. Conçu de l'Esprit Saint et né de la Vierge Marie, il est un seul et même Fils, pleinement Dieu et pleinement homme : <em>« Et le Verbe s'est fait chair, et il a habité parmi nous, et nous avons vu sa gloire. »</em> <span class="ref">Jean 1:14</span></p>
      <p>En se faisant homme, le Fils s'est abaissé jusqu'à la condition de serviteur, par amour et pour notre salut : <em>« Lui, de condition divine, s'est dépouillé lui-même, prenant la condition de serviteur. »</em> <span class="ref">Philippiens 2:6-7</span></p>
      <h2>La Parole définitive de Dieu</h2>
      <p>Dieu a parlé peu à peu, par les patriarches et les prophètes, jusqu'à dire son dernier et plus grand mot dans le Fils. Le Verbe fait homme est la Parole définitive de Dieu : en lui, Dieu a tout dit, et tout donné : <em>« Dieu, qui avait parlé autrefois par les prophètes, nous a parlé en ces derniers jours par le Fils. »</em> <span class="ref">Hébreux 1:1-2</span></p>
      <h2>Mort et ressuscité pour nous</h2>
      <p>Le Fils fait homme a livré sa vie sur la Croix pour réconcilier les hommes avec Dieu, portant le poids du péché à leur place. Le troisième jour, il est ressuscité, vainqueur de la mort, et sa résurrection est le fondement de l'espérance chrétienne : <em>« Christ est mort pour nos péchés selon les Écritures, il a été enseveli, et il est ressuscité le troisième jour. »</em> <span class="ref">1 Corinthiens 15:3-4</span></p>
      <h2>Seigneur et juge</h2>
      <p>Ressuscité, le Fils est élevé dans la gloire et siège à la droite du Père, recevant le nom qui domine tout nom : <em>« Dieu l'a souverainement élevé et lui a donné le nom qui est au-dessus de tout nom. »</em> <span class="ref">Philippiens 2:9</span></p>
      <p>Il reviendra dans la gloire à la fin des temps pour juger les vivants et les morts, et son règne n'aura pas de fin. Toute la création est appelée à le reconnaître pour Seigneur : <em>« Au nom de Jésus, tout genou fléchisse au ciel, sur la terre et sous la terre. »</em> <span class="ref">Philippiens 2:10</span></p>

      <p>Marie est Reine du ciel et de la terre. Élevée dans la gloire auprès de son Fils, elle partage sa royauté et règne avec lui. Cette dignité découle de sa maternité : elle est la mère du Roi dont le règne ne finit pas, comme l'ange l'avait annoncé à l'Annonciation. <em>« Le Seigneur Dieu lui donnera le trône de David son père ; il régnera pour toujours, et son règne n'aura pas de fin. »</em> <span class="ref">Luc 1:32-33</span> Elle règne par participation au règne du Christ, dont elle est la Mère.</p>
      <h2>Reine parce que Mère du Roi</h2>
      <p>Dans la monarchie de David, c'est la mère du roi qui portait le titre de reine. On l'appelait la grande dame du royaume : elle recevait un titre officiel, siégeait à la droite du roi et intercédait auprès de lui pour le peuple. Lorsque Bethsabée vient trouver son fils Salomon, le roi se lève pour l'honorer. <em>« Le roi se leva à sa rencontre et se prosterna devant elle, puis on plaça un trône pour la mère du roi, et elle s'assit à sa droite. »</em> <span class="ref">1 Rois 2:19</span> Le Christ est le Roi promis, fils de David, dont le Royaume demeure à jamais. Mère de ce Roi, Marie est la reine de son Royaume, la reine mère du royaume messianique annoncé par les prophètes.</p>
      <h2>Couronnée dans la gloire</h2>
      <p>Au terme de sa vie terrestre, Marie a été élevée corps et âme dans le ciel : c'est ce qu'on appelle l'Assomption, que l'Église a proclamée dogme en 1950. Là, associée pleinement à la victoire de son Fils, elle est couronnée Reine. L'Écriture la contemple dans cette gloire. <em>« Un grand signe parut dans le ciel : une femme enveloppée de soleil, la lune sous ses pieds, et une couronne de douze étoiles sur la tête. »</em> <span class="ref">Apocalypse 12:1</span> Le psaume royal l'avait chantée par avance. <em>« À ta droite se tient la reine, parée de l'or d'Ophir. »</em> <span class="ref">Psaume 45:10</span> Élevée à la droite de son Fils, Marie partage la gloire de son règne.</p>
      <h2>Associée à la victoire du Roi</h2>
      <p>La royauté de Marie tient aussi à sa part dans l'œuvre du Roi. Unie à son Fils tout au long de sa vie, elle s'est tenue auprès de lui jusqu'à la Croix, traversée par la même douleur. <em>« Et toi-même, un glaive te transpercera l'âme. »</em> <span class="ref">Luc 2:35</span> Celle qui a partagé l'offrande partage le triomphe : associée à la passion qui sauve, elle l'est aussi à la gloire qui couronne.</p>
      <h2>Une royauté d'intercession</h2>
      <p>La royauté de Marie est tout entière tournée vers celle de son Fils, vers qui elle conduit. Comme la reine mère portait au roi les demandes du peuple, Marie présente au Christ les besoins des hommes et leur obtient sa grâce. Aux noces de Cana, elle remarque le manque et le porte simplement devant lui. <em>« La mère de Jésus lui dit : Ils n'ont pas de vin. »</em> <span class="ref">Jean 2:3</span> Puis elle écarte d'elle-même tout regard pour le diriger vers son Fils. <em>« Faites tout ce qu'il vous dira. »</em> <span class="ref">Jean 2:5</span> Telle est sa manière de régner : tout ramener au Christ. Reine dans le ciel, elle demeure mère du Christ et de l'Église, et son règne s'exerce dans cette intercession qui obtient aux hommes le salut de son Fils.</p>

      <p>L'âge de raison, aussi appelé âge de discrétion, est le moment où l'enfant acquiert l'usage de la raison : la capacité de discerner le bien du mal et d'agir en connaissance de cause. Tant qu'il ne l'a pas atteint, il ne mesure pas la portée de ses actes. L'Écriture connaît ce seuil : elle parle des tout-petits <em>« qui ne connaissent aujourd'hui ni le bien ni le mal »</em> <span class="ref">Deutéronome 1:39</span>, et décrit l'enfant grandissant <em>« jusqu'à ce qu'il sache rejeter le mal et choisir le bien »</em> <span class="ref">Isaïe 7:15</span>.</p>
      <h2>L'éveil de la raison</h2>
      <p>Avant ce seuil, l'enfant agit par impulsion, par imitation ou par habitude, sans saisir ce qu'il fait. L'usage de la raison désigne le moment où s'éveillent en lui trois capacités liées : reconnaître qu'un acte est bon ou mauvais, comprendre qu'il en est l'auteur, et délibérer avant d'agir. C'est l'éveil de la conscience, cette voix intérieure qui juge le bien et le mal. L'enfant cesse alors d'être seulement conduit : il commence à se conduire lui-même.</p>
      <h2>Le repère de sept ans</h2>
      <p>L'Église situe ce seuil vers sept ans. C'est une présomption souple : certains enfants parviennent à l'usage de la raison un peu plus tôt, d'autres un peu plus tard. Ce repère sert de règle commune, à partir de laquelle l'enfant est tenu pour responsable de ses actes. Il marque le commencement de la vie morale : le jugement continue de mûrir longtemps après, et la pleine maturité s'acquiert seulement avec les années.</p>
      <h2>La connaissance et la liberté font l'acte</h2>
      <p>Un acte n'engage son auteur que s'il est posé en connaissance et de plein gré : il faut savoir ce que l'on fait et le vouloir pour en répondre. C'est pourquoi l'enfant qui n'a pas encore l'usage de la raison ne commet pas de péché personnel, ne pouvant ni mesurer ni choisir ce qu'il fait. La responsabilité naît avec le discernement, et elle vaut dans les deux sens : devenu capable de reconnaître le bien, l'homme répond aussi du mal qu'il commet en le sachant. <em>« Celui qui sait faire le bien et ne le fait pas commet un péché. »</em> <span class="ref">Jacques 4:17</span> La gravité d'une faute dépend toujours de la connaissance et de la liberté engagées : le seuil ouvre la capacité de pécher, sans fixer d'avance le poids de chaque acte.</p>
      <h2>Un seuil dans la vie chrétienne</h2>
      <p>À partir de l'âge de raison, l'enfant entre dans une vie morale responsable devant Dieu : désormais capable de faute, mais aussi de mérite, d'actes librement bons qui le font grandir dans la grâce. Il devient capable de recevoir le pardon dans la confession, car il peut examiner sa conscience et reconnaître ses fautes, et d'être admis à la communion, car il peut discerner dans l'hostie le corps du Christ. Ce seuil distingue aussi les effets du baptême : reçu chez le tout-petit, il efface le seul péché originel ; reçu après l'âge de raison, il efface en outre tous les péchés personnels.</p>
      <h2>Ceux qui meurent avant ce seuil</h2>
      <p>L'enfant qui meurt avant d'avoir atteint l'usage de la raison n'a pu commettre aucun péché personnel. S'il a été baptisé, son âme, lavée du péché originel et parée de la grâce, entre aussitôt dans la gloire de Dieu. Le Christ a montré sa tendresse pour ces petits et les a donnés en modèle du Royaume. <em>« Laissez venir à moi les petits enfants et ne les en empêchez pas, car le royaume des cieux est à ceux qui leur ressemblent. »</em> <span class="ref">Matthieu 19:14</span> Pour ceux qui meurent sans baptême, l'Église, sans tenir de certitude, les confie avec espérance à la miséricorde de Dieu, qui veut que tous les hommes soient sauvés.</p>

      <p>Tout homme vient au monde privé de la grâce sanctifiante, marqué par le péché originel hérité des origines. Le baptême efface ce péché et donne à l'âme la vie divine, qui fait de l'enfant un fils de Dieu. L'enfant est celui qui a le plus besoin de ce don, et l'Église le lui ouvre dès le seuil de sa vie, car la nouvelle naissance est nécessaire à tous pour entrer dans le Royaume. <em>« Nul, s'il ne naît d'eau et d'Esprit, ne peut entrer dans le royaume de Dieu. »</em> <span class="ref">Jean 3:5</span></p>

      <p>Les anges sont des esprits créés par Dieu, sans corps, doués d'intelligence et de volonté. Ils se tiennent devant lui dans l'adoration et portent ses messages aux hommes. Le mot le dit : « ange » vient du grec <em>angelos</em>, le messager. L'Écriture les nomme de ses premières pages à ses dernières, témoins du monde invisible que Dieu a créé en même temps que le visible.</p>
      <h2>Des esprits créés</h2>
      <p>Les anges sont des créatures : ils ont commencé d'être, comme tout ce qui n'est pas Dieu. <em>« Par lui ont été créées toutes choses, dans les cieux et sur la terre, les visibles et les invisibles. »</em> <span class="ref">Colossiens 1:16</span> Ce sont de purs esprits, sans matière ni corps, et c'est pourquoi ils ne meurent pas. Chacun est une personne : il connaît et il aime, d'une intelligence plus vive et d'une volonté plus ferme que les nôtres. Quand l'Écriture leur prête des ailes ou un visage, elle parle par images, pour rendre sensible ce qui échappe aux sens.</p>
      <h2>Une multitude ordonnée</h2>
      <p>Les anges sont innombrables. Devant le trône de Dieu se presse une foule que nul ne compte : <em>« Des milliers de milliers le servaient, des myriades se tenaient devant lui. »</em> <span class="ref">Daniel 7:10</span> Cette multitude est disposée en degrés, que la tradition nomme les chœurs des anges, depuis les Séraphins et les Chérubins qui se tiennent au plus près de Dieu jusqu'aux anges envoyés vers les hommes. L'Écriture donne le nom de trois d'entre eux : Michel, qui combat pour Dieu, Gabriel, qui annonce, et Raphaël, qui accompagne et guérit.</p>
      <h2>Devant Dieu et auprès des hommes</h2>
      <p>La première œuvre des anges est l'adoration. Tournés vers Dieu, ils chantent sa sainteté sans fin : <em>« Saint, Saint, Saint est le Seigneur de l'univers ; toute la terre est remplie de sa gloire. »</em> <span class="ref">Isaïe 6:3</span> De cette louange ils passent au service : Dieu les envoie porter sa parole et accomplir son dessein. Gabriel est envoyé à Marie pour lui annoncer le Sauveur. Et ce service s'étend jusqu'à nous : <em>« Ne sont-ils pas tous des esprits au service de Dieu, envoyés pour ceux qui doivent hériter du salut ? »</em> <span class="ref">Hébreux 1:14</span></p>
      <h2>L'ange gardien</h2>
      <p>À chacun, Dieu donne un ange pour le garder. Le Christ le dit des plus petits : <em>« Leurs anges, dans les cieux, voient sans cesse la face de mon Père. »</em> <span class="ref">Matthieu 18:10</span> Cet ange veille, écarte le mal, éclaire et soutient, et porte nos prières devant Dieu : <em>« Il donnera pour toi ordre à ses anges de te garder dans toutes tes voies. »</em> <span class="ref">Psaume 91:11</span> Présence discrète et constante, il accompagne chaque vie, de la naissance à la rencontre avec Dieu.</p>
      <h2>L'épreuve et la chute</h2>
      <p>Comme l'homme, les anges ont été créés bons et libres, et appelés à choisir Dieu. Tous ne l'ont pas choisi. L'un des plus grands se dressa contre son Créateur, refusant de servir, voulant s'égaler à Dieu, et il entraîna derrière lui une part des anges. L'Écriture le montre par le dragon dont la queue balaie le ciel : <em>« Sa queue entraînait le tiers des étoiles du ciel, et les jeta sur la terre. »</em> <span class="ref">Apocalypse 12:4</span> Ces étoiles abattues sont les anges qui tombèrent avec lui. Vient alors le combat, et la défaite du rebelle : <em>« Il y eut un combat dans le ciel : Michel et ses anges combattirent le dragon… et le grand dragon fut précipité, l'antique serpent, appelé le diable et Satan, le séducteur du monde entier. »</em> <span class="ref">Apocalypse 12:7-9</span> Ces esprits déchus sont les démons ; leur chef est Satan, dont le nom signifie l'accusateur. <em>« Je voyais Satan tomber du ciel comme l'éclair. »</em> <span class="ref">Luc 10:18</span></p>
      <h2>Un choix sans retour</h2>
      <p>La faute des anges est sans retour, et c'est leur manière même de connaître et de choisir qui le veut. Nous, les hommes, nous connaissons peu à peu : par les sens, par le raisonnement, en découvrant une chose après l'autre ; c'est pourquoi nous changeons d'avis, quand le temps nous fait voir ce que nous n'avions pas encore vu. Un pur esprit ne connaît pas de cette manière : il n'apprend pas par fragments, il saisit d'un seul regard, tout entier et d'un coup, ce qu'il connaît. Sa volonté suit cette connaissance complète : il choisit en sachant déjà tout ce que son choix engage, sans rien qui lui reste caché et puisse plus tard le faire revenir en arrière. Or revenir sur un choix suppose l'un de ces deux ressorts : voir ce qu'on n'avait pas vu, ou changer avec le temps. L'ange n'a ni l'un ni l'autre. Son premier choix est donc son choix définitif, non parce que Dieu lui interdirait de se reprendre, mais parce que plus rien ne peut l'y porter. Les anges fidèles sont ainsi fixés pour toujours dans la lumière ; les déchus, dans leur refus, et ce sont les démons. Ils gardent une puissance, mais limitée et déjà vaincue : ils tentent et accusent sans pouvoir contraindre. La Croix du Christ a brisé leur empire, et leur fin est arrêtée : <em>« Allez loin de moi, maudits, dans le feu éternel préparé pour le diable et ses anges. »</em> <span class="ref">Matthieu 25:41</span></p>

      <p>Le péché est un refus libre de l'amour de Dieu. Il consiste à préférer sa propre volonté à la volonté divine et à transgresser la loi de Dieu, qui exprime cet amour : <em>« Le péché est la transgression de la loi. »</em> <span class="ref">1 Jean 3:4</span> Tout péché comporte ainsi un double mouvement : l'homme se tourne vers un bien moindre et s'éloigne de Dieu, qui est sa fin et son bien. Il se commet en pensée, en parole, par action, et par omission : <em>« Celui qui sait faire le bien et ne le fait pas commet un péché. »</em> <span class="ref">Jacques 4:17</span></p>
      <h2>Originel et personnel</h2>
      <p>Un même mot recouvre deux réalités. Le péché originel est l'état de privation dans lequel tout homme naît, hérité de la faute des origines. Le péché personnel est l'acte que chacun commet par sa propre volonté, une fois venu l'âge de raison. Tous y sont exposés : <em>« Tous ont péché et sont privés de la gloire de Dieu. »</em> <span class="ref">Romains 3:23</span></p>
      <h2>Le péché mortel</h2>
      <p>Les péchés personnels ne pèsent pas tous le même poids, et l'Écriture le marque elle-même : <em>« Il y a tel péché qui mène à la mort, et il y a tel péché qui ne mène pas à la mort. »</em> <span class="ref">1 Jean 5:16-17</span> Le plus grave, le péché mortel, rompt l'amitié avec Dieu et fait perdre la grâce sanctifiante, cette vie divine déposée dans l'âme. Trois conditions, réunies ensemble, le constituent. Il faut d'abord une matière grave, un acte qui contredit gravement la loi de Dieu, comme la transgression des grands commandements du Décalogue : le meurtre, l'adultère, le vol important, le faux témoignage, le mépris de Dieu. Il faut ensuite la pleine conscience de cette gravité, savoir que l'on fait un mal sérieux. Il faut enfin le plein consentement, le vouloir librement, sans y être contraint. Que l'une de ces conditions manque, et la faute n'atteint plus ce degré : une ignorance qu'on ne pouvait surmonter, une liberté entamée par la peur ou la passion en allègent le poids. Là où les trois se rejoignent, le péché donne la mort à l'âme, qui perd la charité et la vie de la grâce : <em>« Le salaire du péché, c'est la mort. »</em> <span class="ref">Romains 6:23</span> L'homme demeure vivant, coupé de sa fin ; et cette rupture, persévérée sans repentir, devient la séparation éternelle d'avec Dieu.</p>
      <h2>Le péché véniel</h2>
      <p>Le péché véniel blesse la charité sans la détruire : l'amitié avec Dieu demeure, affaiblie. Même le juste y tombe : <em>« Nous bronchons tous, et de bien des manières. »</em> <span class="ref">Jacques 3:2</span> Sa matière est légère, ou bien la conscience ou le consentement n'y sont que partiels. Répété et consenti, il refroidit l'amour et dispose peu à peu au péché grave ; il laisse aussi dans l'âme une dette à purifier, que le purgatoire achève d'acquitter.</p>
      <h2>Sa racine</h2>
      <p>Toute faute naît d'un même mouvement : se préférer à Dieu. C'est du cœur qu'elle monte : <em>« Du cœur viennent les mauvaises pensées, meurtres, adultères, débauches, vols, faux témoignages, blasphèmes. »</em> <span class="ref">Matthieu 15:19</span> Au plus profond se tient l'orgueil, qui place le moi au centre et d'où sortent les autres péchés. De lui naissent trois convoitises, où l'homme cherche hors de Dieu ce que Dieu seul donne : <em>« la convoitise de la chair, la convoitise des yeux et l'orgueil de la vie. »</em> <span class="ref">1 Jean 2:16</span> De ces convoitises montent les sept penchants qu'on nomme capitaux, parce qu'ils sont les têtes d'où jaillissent les autres fautes : l'orgueil, l'avarice, l'envie, la colère, la luxure, la gourmandise et la paresse, présentés un à un dans <a href="#/article/les-peches-capitaux">l'article qui leur est consacré</a>. Le péché appauvrit ainsi l'homme, en le coupant de la source même de sa vie.</p>
      <h2>Son pardon</h2>
      <p>Dieu ne cesse d'offrir son pardon à qui revient vers lui. Le Christ a porté le péché du monde pour en délivrer les hommes, et il a confié à son Église le pouvoir de remettre les péchés : <em>« Ceux à qui vous remettrez les péchés, ils leur seront remis. »</em> <span class="ref">Jean 20:23</span> Le péché mortel se relève dans le sacrement de pénitence, qui rend à l'âme la grâce perdue et la réconcilie avec Dieu. Le péché véniel s'efface par bien des chemins : la contrition du cœur, la prière, l'aumône, les sacramentaux, et surtout l'Eucharistie, qui fortifie la charité. À celui qui reconnaît sa faute, la miséricorde est toujours promise : <em>« Si nous confessons nos péchés, il est fidèle et juste pour nous les pardonner. »</em> <span class="ref">1 Jean 1:9</span></p>

      <p>On les appelle capitaux du mot latin <em>caput</em>, la tête : ils sont les sources d'où jaillissent les autres fautes. On les nomme ainsi pour leur fécondité, car chacun engendre une suite de péchés qui lui obéissent. L'Écriture en dresse le tableau sous le nom d'œuvres de la chair : <em>« Les œuvres de la chair sont manifestes : impudicité, idolâtrie, haines, querelles, jalousies, colères, envie, et choses semblables. »</em> <span class="ref">Galates 5:19-21</span> La tradition en a reconnu sept racines, à chacune desquelles répond la vertu qui la guérit.</p>
      <h2>L'orgueil</h2>
      <p>L'orgueil est le désir désordonné de sa propre grandeur, qui place le moi là où Dieu devrait être. Il est la tête de tous : <em>« Le commencement de l'orgueil, c'est de se détourner du Seigneur. »</em> <span class="ref">Siracide 10:12</span> De lui sortent la vaine gloire, le mépris d'autrui, la révolte contre Dieu. L'humilité le guérit, qui rend à Dieu la première place et reçoit tout de lui.</p>
      <h2>L'avarice</h2>
      <p>L'avarice est l'attachement désordonné aux richesses, où le cœur traite le bien comme une fin et s'y enchaîne. <em>« La racine de tous les maux, c'est l'amour de l'argent. »</em> <span class="ref">1 Timothée 6:10</span> Elle engendre la dureté, la fraude, l'oubli des pauvres. La générosité la guérit, qui tient les biens d'une main ouverte et les ordonne au bien.</p>
      <h2>L'envie</h2>
      <p>L'envie est la tristesse devant le bien d'autrui, ressenti comme un amoindrissement de soi. C'est elle qui a livré le Christ : <em>« il savait que c'était par envie qu'ils l'avaient livré. »</em> <span class="ref">Matthieu 27:18</span> Elle engendre la médisance, la joie du malheur d'autrui, la haine. La charité fraternelle la guérit, qui se réjouit du bien du prochain comme du sien.</p>
      <h2>La colère</h2>
      <p>La colère est le désir désordonné de la vengeance, quand le ressentiment l'emporte sur la justice. <em>« Quiconque se met en colère contre son frère en répondra au jugement. »</em> <span class="ref">Matthieu 5:22</span> Elle engendre les disputes, les injures, la violence. La douceur la guérit, qui garde la maîtrise de soi et laisse à Dieu la justice.</p>
      <h2>La luxure</h2>
      <p>La luxure est le désir désordonné des plaisirs charnels, recherchés pour eux-mêmes. <em>« Fuyez l'impudicité. Votre corps est le temple du Saint-Esprit. »</em> <span class="ref">1 Corinthiens 6:18-19</span> Elle aveugle le jugement et asservit la volonté. La chasteté la guérit, qui ordonne le désir au don de soi dans l'amour.</p>
      <h2>La gourmandise</h2>
      <p>La gourmandise est l'usage désordonné du manger et du boire, recherché sans mesure. <em>« Ne sois pas parmi les buveurs de vin, parmi ceux qui se gorgent de viande. »</em> <span class="ref">Proverbes 23:20</span> Elle alourdit l'esprit et l'enchaîne au corps. La tempérance la guérit, qui reçoit les biens du corps avec mesure et action de grâce.</p>
      <h2>La paresse</h2>
      <p>La paresse, ou acédie, est la tristesse devant le bien spirituel, le dégoût de l'effort qu'il demande. Elle refroidit la prière et fait négliger les devoirs envers Dieu. <em>« Parce que tu es tiède, je te vomirai de ma bouche. »</em> <span class="ref">Apocalypse 3:16</span> La ferveur la guérit, l'amour qui se remet à l'œuvre et persévère.</p>
      <h2>Le combat</h2>
      <p>Aucun de ces penchants n'est invincible. La grâce du Christ et la pratique des vertus contraires les désarment l'un après l'autre, car le bien chasse le mal qui s'y oppose : <em>« Ne te laisse pas vaincre par le mal, mais sois vainqueur du mal par le bien. »</em> <span class="ref">Romains 12:21</span> À mesure que grandit la charité, leurs racines se dessèchent, et l'homme retrouve la liberté des enfants de Dieu.</p>
