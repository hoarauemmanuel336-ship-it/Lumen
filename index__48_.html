    contenu: `
      <p>La Trinité est le mystère central de la foi chrétienne : il y a un seul Dieu en trois Personnes, le Père, le Fils et l'Esprit Saint. Les trois sont un seul et même Dieu, égaux et éternels, partageant une seule vie divine. Ce mystère dépasse les forces de la raison ; on le connaît parce que Dieu l'a révélé, en se faisant connaître tel qu'il est. L'Écriture les nomme ensemble dans une même bénédiction : <em>« Que la grâce du Seigneur Jésus-Christ, l'amour de Dieu et la communion du Saint-Esprit soient avec vous tous. »</em> <span class="ref">2 Corinthiens 13:13</span></p>
      <h2>Un seul Dieu</h2>
      <p>Il n'y a qu'un seul Dieu, une seule nature divine, ce que Dieu est. La foi reçue d'Israël tient cette unité pour le premier de tout, et la confesse comme le fondement de tout le reste : <em>« Écoute, Israël : le Seigneur notre Dieu est l'unique Seigneur. »</em> <span class="ref">Deutéronome 6:4</span></p>
      <p>Le Père, le Fils et l'Esprit Saint sont l'unique Dieu. Chacun est Dieu tout entier, possédant la même et unique nature divine, sans la diviser ni la multiplier.</p>
      <h2>Trois Personnes</h2>
      <p>En ce Dieu unique, il y a trois Personnes, c'est-à-dire trois « quelqu'un » distincts, dont chacun est pleinement Dieu. Le Père est la source sans origine ; le Fils est engendré de lui de toute éternité ; l'Esprit procède du Père et du Fils. Les trois Personnes sont égales en dignité et coéternelles. <em>« Le Père et moi, nous sommes un. »</em> <span class="ref">Jean 10:30</span></p>
      <h2>Connaître et aimer en Dieu</h2>
      <p>Notre esprit agit par deux puissances : l'intelligence, qui connaît, et la volonté, qui aime. C'est par elles que l'homme est dit fait à l'image de Dieu : il porte en lui le pouvoir de connaître et d'aimer, comme Dieu connaît et aime. <em>« Faisons l'homme à notre image, selon notre ressemblance. »</em> <span class="ref">Genèse 1:26</span></p>
      <p>Cette ressemblance a pourtant sa mesure, car Dieu est infiniment simple. En nous, l'intelligence et la volonté sont deux puissances distinctes de l'âme, et leurs actes, le concept que l'on forme, l'amour que l'on ressent, demeurent de simples états passagers. En Dieu, son acte de connaître et son acte d'aimer sont son essence même, le seul et même Dieu.</p>
      <p>En lui, ces deux actes portent un fruit éternel. En se connaissant parfaitement, le Père exprime tout ce qu'il est dans un Verbe, sa Parole vivante. <em>« Au commencement était le Verbe, et le Verbe était auprès de Dieu, et le Verbe était Dieu. »</em> <span class="ref">Jean 1:1</span> Ce Verbe reçoit l'essence divine tout entière et subsiste comme une Personne, le Fils. De même, l'amour dont le Père et le Fils s'aiment reçoit l'essence entière et subsiste comme une Personne, l'Esprit. Le Fils est ainsi engendré par mode de connaissance, et l'Esprit procède par mode d'amour.</p>
      <h2>Distinctes par leurs relations</h2>
      <p>Les trois Personnes se distinguent par leurs relations d'origine, et par elles seules. Le Père engendre, le Fils est engendré, l'Esprit procède : c'est tout ce qui les sépare, et cela suffit à les rendre réellement distinctes, tout en restant le seul Dieu. Tout ce qu'elles sont, elles le sont ensemble, hormis ce que la relation distingue. L'Esprit procède du Père, que le Fils envoie d'auprès de lui : <em>« Quand viendra le Défenseur, que je vous enverrai d'auprès du Père, l'Esprit de vérité qui procède du Père. »</em> <span class="ref">Jean 15:26</span> Cet Esprit est aussi l'Esprit du Fils, qui le donne comme étant sien : <em>« Dieu a envoyé dans nos cœurs l'Esprit de son Fils. »</em> <span class="ref">Galates 4:6</span> Le Fils a part à cette origine, car il reçoit du Père tout ce que le Père possède, jusqu'à faire procéder l'Esprit avec lui : <em>« Il prendra de ce qui est à moi ; tout ce que le Père possède est à moi. »</em> <span class="ref">Jean 16:14-15</span> L'Esprit procède donc du Père et du Fils comme d'un seul principe, le Père demeurant la source sans origine, qui donne au Fils de le faire procéder avec lui. C'est pourquoi l'Église confesse que l'Esprit procède du Père et du Fils.</p>
      <h2>Révélée par le Christ</h2>
      <p>Le Christ a révélé ce mystère caché en Dieu. En venant parmi les hommes, le Fils a fait connaître le Père et a promis l'Esprit. Au moment de son baptême dans le Jourdain, les trois se manifestent ensemble : le Fils dans l'eau, l'Esprit comme une colombe, le Père par sa voix : <em>« Il vit l'Esprit de Dieu descendre comme une colombe et venir sur lui, et des cieux une voix disait : Celui-ci est mon Fils bien-aimé. »</em> <span class="ref">Matthieu 3:16-17</span></p>
      <h2>Le Père</h2>
      <p>Première Personne, le Père est l'origine sans origine, d'où viennent le Fils et l'Esprit. La création est l'œuvre des trois Personnes ensemble ; le Credo l'attribue d'abord au Père parce qu'il en est la source. L'unique Dieu appelle le monde à l'existence par sa seule parole et le tient dans la vie à chaque instant, jusqu'au plus petit détail. <em>« Au commencement, Dieu créa le ciel et la terre. »</em> <span class="ref">Genèse 1:1</span></p>
      <p>Si Dieu se nomme Père, c'est d'abord parce qu'il engendre éternellement son Fils : la paternité est en lui avant d'être en aucune créature, et toute paternité humaine en descend comme un reflet. <em>« Je fléchis les genoux devant le Père, de qui toute paternité, au ciel et sur la terre, tire son nom. »</em> <span class="ref">Éphésiens 3:14-15</span> Ce nom dit l'origine et l'amour, par-delà la distinction des sexes : sa tendresse pour l'homme surpasse même celle d'une mère. <em>« Une femme oublie-t-elle son nourrisson ? Quand même elle l'oublierait, moi je ne t'oublierai pas. »</em> <span class="ref">Isaïe 49:15</span></p>
      <p>Père de son Fils unique de toute éternité, il devient le Père des hommes en les adoptant. Par la grâce du baptême, l'Esprit du Fils est donné au croyant, qui s'adresse alors à Dieu comme à son Père. <em>« Vous avez reçu un Esprit d'adoption filiale, par lequel nous crions : Abba, Père ! »</em> <span class="ref">Romains 8:15</span></p>
      <h2>Le Fils</h2>
      <p>Deuxième Personne, le Fils est le Verbe de Dieu, engendré du Père de toute éternité, de même nature que lui : Dieu né de Dieu. « Verbe » signifie « Parole ». Comme une parole exprime tout entière la pensée de celui qui la dit, le Fils exprime tout entier ce que le Père est : le Père s'énonce en un seul Verbe, parfait et unique, en qui il dit tout ce qu'il est. Image parfaite du Père, il est celui en qui le Père se connaît et se donne. <em>« Il est le rayonnement de sa gloire et l'empreinte de son être. »</em> <span class="ref">Hébreux 1:3</span></p>
      <p>Le prologue de l'évangile de Jean fut écrit en grec, et le mot qu'il emploie est <em>Logos</em> (λόγος), qui dit à la fois la parole et la raison : le mot que l'on prononce, et l'intelligence et l'ordre qui s'y expriment. Nommer le Fils « Logos », c'est le confesser tout ensemble Parole que le Père énonce et Sagesse par laquelle il pense et ordonne le monde. La pensée grecque appelait déjà « logos » la raison qui traverse l'univers ; Jean reprend ce mot et révèle que ce Logos est une Personne, Dieu lui-même. Traduit en latin, « Logos » devint « Verbum », d'où vient le français « Verbe ».</p>
      <p>Le Père crée toutes choses par le Fils, son Verbe : Dieu dit, et cela est ; cette parole créatrice est le Verbe lui-même, par qui le Père appelle toutes choses à l'existence et les tient dans l'être. <em>« Tout a été fait par lui, et rien de ce qui existe n'a été fait sans lui. »</em> <span class="ref">Jean 1:3</span></p>
      <p>Pour sauver les hommes, le Fils a pris notre nature : conçu de l'Esprit Saint et né de la Vierge Marie, il est devenu homme sans cesser d'être Dieu, par amour et pour notre salut. <em>« Et le Verbe s'est fait chair, et il a habité parmi nous, et nous avons vu sa gloire. »</em> <span class="ref">Jean 1:14</span></p>
      <h2>L'Esprit Saint</h2>
      <p>Troisième Personne, l'Esprit Saint procède du Père et du Fils par mode d'amour : il est l'Amour dont ils s'aiment et le Don où ils se donnent tout entiers, Seigneur agissant au cœur des hommes. <em>« Le Seigneur, c'est l'Esprit ; et là où est l'Esprit du Seigneur, là est la liberté. »</em> <span class="ref">2 Corinthiens 3:17</span></p>
      <p>L'Esprit échappe au regard, et l'Écriture le donne à connaître par des images. Le mot qui le nomme, <em>ruah</em> (<span dir="rtl">רוּחַ</span>) en hébreu, <em>pneuma</em> (πνεῦμα) en grec, signifie à la fois le souffle, le vent et l'esprit. Le vent en est l'image la plus parlante : <em>« Le vent souffle où il veut, et tu en entends le bruit ; mais tu ne sais ni d'où il vient ni où il va. Il en est ainsi de quiconque est né de l'Esprit. »</em> <span class="ref">Jean 3:8</span> La colombe, descendue sur le Christ à son baptême, le manifeste comme le Messie, celui sur qui repose l'Esprit. Déjà, après le déluge, une colombe était revenue vers Noé, signe que le jugement était passé et la terre rendue à la vie : <em>« Une feuille d'olivier arrachée était dans son bec ; Noé connut ainsi que les eaux avaient diminué sur la terre. »</em> <span class="ref">Genèse 8:11</span> Le même signe, sur le Jourdain, annonce la paix de la nouvelle création.</p>
      <p>Le feu dit la puissance transformante de l'Esprit : il purifie, comme la flamme épure le métal, et embrase le cœur de la charité de Dieu ; au matin de la Pentecôte, il se posa sur les disciples en langues de flamme. Jean-Baptiste l'avait annoncé : <em>« Lui vous baptisera dans l'Esprit Saint et le feu. »</em> <span class="ref">Matthieu 3:11</span> L'onction le montre consacrant et fortifiant celui qu'il saisit : l'huile pénètre ce qu'elle touche et l'imprègne en profondeur, et de même l'Esprit gagne l'âme tout entière. Il est l'onction même dont le Christ tire son nom, le mot grec rendu par « Oint », <em>Christos</em> (χριστός) : <em>« Dieu a oint de l'Esprit Saint et de force Jésus de Nazareth. »</em> <span class="ref">Actes 10:38</span> Le chrétien en reçoit le sceau au baptême et à la confirmation.</p>
      <p>Il est le Seigneur qui donne la vie : présent dès l'origine sur la création, il porte en l'homme la vie nouvelle de Dieu, et il a fait parler les prophètes et inspiré les Écritures. Avant sa Passion, le Christ l'a promis sous le nom de Paraclet, le mot grec <em>paraklētos</em> (παράκλητος) désignant celui qu'on appelle à ses côtés pour défendre et consoler ; le jour de la Pentecôte, il descend sur les disciples et fait naître l'Église. <em>« Ils furent tous remplis de l'Esprit Saint. »</em> <span class="ref">Actes 2:4</span> Depuis, il demeure dans l'Église et la conduit vers la vérité tout entière.</p>
      <p>L'Esprit habite l'âme du baptisé par la grâce sanctifiante : il y répand l'amour de Dieu et soutient la prière. <em>« L'amour de Dieu a été répandu dans nos cœurs par l'Esprit Saint qui nous a été donné. »</em> <span class="ref">Romains 5:5</span> Il comble le croyant de ses dons. La prophétie d'Isaïe les énumère : <em>« Sur lui reposera l'Esprit du Seigneur : esprit de sagesse et d'intelligence, esprit de conseil et de force, esprit de connaissance et de crainte du Seigneur. »</em> <span class="ref">Isaïe 11:2-3</span> La tradition en compte sept, ajoutant la piété. Là où il règne, ces dons mûrissent en fruits, marques visibles d'une vie qu'il conduit. <em>« Le fruit de l'Esprit, c'est charité, joie, paix, patience, bonté, bienveillance, fidélité, douceur, maîtrise de soi. »</em> <span class="ref">Galates 5:22-23</span></p>
      <h2>Une communion d'amour</h2>
      <p>La vie intime de Dieu est un échange d'amour entre les trois Personnes, donné et reçu sans fin. Cet amour est ce que Dieu est : <em>« Dieu est amour. »</em> <span class="ref">1 Jean 4:8</span></p>
      <p>Par la grâce sanctifiante, Dieu fait entrer l'homme dans cette vie : la Trinité vient habiter l'âme du baptisé et l'associe à sa propre communion. La fin de l'homme est de partager pour toujours cet amour : <em>« Si quelqu'un m'aime, il gardera ma parole, et mon Père l'aimera ; nous viendrons à lui et nous ferons chez lui notre demeure. »</em> <span class="ref">Jean 14:23</span></p>

      <h2>Mère de Dieu</h2>
      <p>Marie est Mère de Dieu, car celui qu'elle a conçu et enfanté est Dieu, le Fils éternel devenu homme. Une mère met au monde une personne, et la personne qu'elle a portée en son sein est Dieu lui-même. L'Église la confesse donc <em>Theotokos</em> (Θεοτόκος), « celle qui enfante Dieu », titre que le concile d'Éphèse a défini en 431 contre ceux qui ne voulaient voir en elle que la mère d'un homme. L'enfant qu'elle met au monde est Dieu présent parmi les hommes. <em>« On l'appellera Emmanuel, ce qui se traduit : Dieu avec nous. »</em> <span class="ref">Matthieu 1:23</span> De cette maternité divine viennent tous ses autres privilèges : ils conviennent à celle dont le sein a été le premier sanctuaire du Verbe.</p>
      <h2>La nouvelle Ève</h2>
      <p>Dès la chute, Dieu avait annoncé une femme dont la descendance briserait le pouvoir du mal. <em>« Je mettrai une inimitié entre toi et la femme, entre ta descendance et la sienne : elle t'écrasera la tête. »</em> <span class="ref">Genèse 3:15</span> Cette inimitié est entière : elle ne laisse aucun instant où la femme aurait appartenu au mal. Marie est cette femme, et l'Église la reconnaît comme la nouvelle Ève. La première Ève, vierge et sans péché, a écouté le serpent et entraîné la chute ; Marie, vierge et comblée de grâce, écoute la parole de Dieu et accueille en elle le Sauveur du monde. <em>« Je suis la servante du Seigneur ; qu'il m'advienne selon ta parole. »</em> <span class="ref">Luc 1:38</span> Ce que la désobéissance de l'une avait noué, l'obéissance de l'autre le dénoue : par son consentement, Marie coopère à l'œuvre du salut que son Fils accomplit.</p>
      <h2>L'Immaculée Conception</h2>
      <p>L'Immaculée Conception est le privilège par lequel Marie a été préservée du péché originel dès le premier instant de son existence, dans le sein de sa mère. Depuis la faute des origines, tout homme naît privé de la grâce sanctifiante que Dieu voulait pour l'humanité ; cet état de privation, transmis à tous comme un héritage, est le péché originel. Marie seule en a été gardée indemne, comblée de grâce avant même de pouvoir agir. L'ange la salue par ce nom de grâce avant tout autre. <em>« Je te salue, comblée de grâce, le Seigneur est avec toi. »</em> <span class="ref">Luc 1:28</span> Là où le français dit « comblée de grâce », le grec porte un seul mot que l'ange emploie à la place de son nom, <em>kecharitōmenē</em> (κεχαριτωμένη) : il dit une grâce déjà pleinement accomplie en elle, et qui demeure.</p>
      <p>Marie aussi a été sauvée par le Christ, et plus parfaitement que tout autre. Les autres rachetés sont relevés après être tombés ; Marie a été gardée de tomber, par les mérites de son Fils appliqués d'avance à l'instant de sa conception. Préserver quelqu'un du gouffre est une délivrance plus haute que l'en retirer une fois tombé : le salut du Christ atteint donc Marie de la manière la plus parfaite, et elle en est le fruit le plus pur. Elle-même reconnaît Dieu pour son Sauveur. <em>« Mon esprit exulte en Dieu, mon Sauveur. »</em> <span class="ref">Luc 1:47</span> L'Église a confessé dès les premiers siècles la sainteté unique de celle qu'elle nommait la toute-sainte ; en 1854 elle a proclamé l'Immaculée Conception comme un dogme de foi, et peu après, à Lourdes, la Vierge se désigna elle-même : « Je suis l'Immaculée Conception. »</p>
      <h2>Toujours Vierge</h2>
      <p>Marie est demeurée vierge toute sa vie : avant, pendant et après la naissance du Christ. L'Église confesse ce triple privilège et l'appelle « toujours Vierge ». Il dit la consécration entière de Marie à Dieu et l'origine de l'enfant qu'elle porte.</p>
      <p>Elle conçoit son Fils par la seule puissance de l'Esprit Saint, sans le concours d'aucun homme. À l'ange qui lui annonce un fils, elle répond par l'étonnement de la vierge. <em>« Comment cela se fera-t-il, puisque je ne connais point d'homme ? »</em> <span class="ref">Luc 1:34</span> Et l'ange lui révèle l'œuvre de Dieu. <em>« L'Esprit Saint viendra sur toi, et la puissance du Très-Haut te prendra sous son ombre. »</em> <span class="ref">Luc 1:35</span> Isaïe l'avait annoncé. <em>« Voici, la vierge concevra et enfantera un fils. »</em> <span class="ref">Isaïe 7:14</span></p>
      <p>Elle met au monde son Fils sans rien perdre de son intégrité. La peine d'enfanter avait été annoncée à Ève comme une suite du péché. <em>« Tu enfanteras tes fils dans la douleur. »</em> <span class="ref">Genèse 3:16</span> Préservée de tout péché dès sa conception, Marie n'en porte pas la peine, et celui qu'elle enfante est lui-même saint, conçu de l'Esprit ; cette naissance échappe au régime de la chute et devient le signe de son origine : l'enfant vient de Dieu. Ézéchiel l'avait figurée sous les traits d'une porte du sanctuaire, par laquelle seul le Seigneur passe et qui demeure fermée. <em>« Cette porte restera fermée, elle ne s'ouvrira pas ; nul n'y passera, car le Seigneur, le Dieu d'Israël, est entré par elle. »</em> <span class="ref">Ézéchiel 44:2</span></p>
      <p>Elle demeure vierge toute sa vie, sans autre enfant : sa virginité est la consécration définitive de celle qui a porté Dieu, le sanctuaire réservé à lui seul. Les Évangiles parlent pourtant des « frères de Jésus ». Dans la langue de la Bible, le mot « frère » déborde la fratrie : l'hébreu et l'araméen n'ont pas de terme distinct pour le cousin ou le neveu, et un même mot couvre toute la parenté proche. Ainsi Abraham appelle Lot son frère, alors que Lot est son neveu. <em>« Car nous sommes frères. »</em> <span class="ref">Genèse 13:8</span> Les Évangiles, écrits en grec sur ce fond sémitique, gardent cet usage : le mot grec rendu par « frère », <em>adelphos</em> (ἀδελφός), s'étend aux cousins comme aux parents éloignés. Matthieu nomme d'ailleurs parmi ces « frères » Jacques et Joseph. <em>« Ses frères ne s'appellent-ils pas Jacques, Joseph, Simon et Jude ? »</em> <span class="ref">Matthieu 13:55</span> Or ces deux-là ont pour mère une autre Marie, présente au pied de la Croix. <em>« Parmi elles, Marie de Magdala, Marie mère de Jacques et de Joseph. »</em> <span class="ref">Matthieu 27:56</span> Dans la coutume d'Israël, le soin d'une mère restée seule revenait à ses fils ; le Christ mourant remet pourtant la sienne au disciple qu'il aimait, non à un autre fils, signe qu'elle n'en a pas. Sa virginité annonce une humanité nouvelle, qui ne naît plus de la chair mais de Dieu. <em>« Ils ne sont pas nés du sang, ni de la volonté de la chair, ni de la volonté de l'homme, mais de Dieu. »</em> <span class="ref">Jean 1:13</span></p>
      <h2>La nouvelle Arche</h2>
      <p>Marie est la nouvelle Arche de l'alliance. L'arche d'autrefois était le coffre le plus saint d'Israël, recouvert d'or, où Dieu se rendait présent au milieu de son peuple. Elle gardait trois signes de l'alliance : les tables de la Loi, une part de manne et le bâton d'Aaron. <em>« Dans l'arche se trouvaient l'urne d'or contenant la manne, le bâton d'Aaron, et les tables de l'alliance. »</em> <span class="ref">Hébreux 9:4</span> Marie porte la réalité que ces trois signes annonçaient : le Verbe, Parole vivante de Dieu ; le pain de vie descendu du ciel ; le prêtre éternel qui s'offrira pour le monde. Ce que l'arche gardait en figure, Marie le donne en personne. L'arche annonçait aussi sa pureté : faite d'un bois incorruptible et revêtue d'or pur au-dedans comme au-dehors. <em>« Tu la recouvriras d'or pur, au-dedans et au-dehors. »</em> <span class="ref">Exode 25:11</span></p>
      <p>L'arche reposait au cœur de la Demeure, le sanctuaire où Dieu se rendait présent au-dessus d'elle. Quand cette Demeure fut achevée au désert, la nuée la couvrit et la gloire de Dieu la remplit. <em>« La nuée couvrit la tente de la rencontre, et la gloire du Seigneur remplit la Demeure. »</em> <span class="ref">Exode 40:34-35</span> Dans la version grecque de l'Ancien Testament, la Septante, le verbe qui dit cette nuée est <em>episkiazō</em> (ἐπισκιάζω), « couvrir de son ombre » ; c'est ce verbe que l'ange reprend à l'Annonciation quand il annonce que la puissance du Très-Haut prendra Marie sous son ombre. Ce que la nuée faisait sur la Demeure qui abritait l'arche, l'Esprit le fait sur Marie : la gloire de Dieu vient l'habiter, et elle devient elle-même la nouvelle Arche, le lieu de la présence.</p>
      <p>L'Évangile raconte la Visitation sur le modèle de l'arche montant vers Jérusalem au temps de David. Marie se lève et part en hâte vers la montagne de Judée, comme l'arche y était montée. Devant l'arche, David s'était écrié. <em>« Comment l'arche du Seigneur viendrait-elle vers moi ? »</em> <span class="ref">2 Samuel 6:9</span> Élisabeth accueille Marie par les mêmes mots. <em>« Comment m'est-il donné que la mère de mon Seigneur vienne jusqu'à moi ? »</em> <span class="ref">Luc 1:43</span> David dansait de joie devant l'arche. <em>« David dansait de toute sa force devant le Seigneur. »</em> <span class="ref">2 Samuel 6:14</span> Jean-Baptiste tressaille d'allégresse dans le sein de sa mère à l'approche de Marie. <em>« L'enfant tressaillit dans son sein. »</em> <span class="ref">Luc 1:41</span> Et Marie demeure environ trois mois auprès d'Élisabeth, comme l'arche était restée trois mois dans la maison d'Obed-Édom. <em>« Marie resta avec elle environ trois mois. »</em> <span class="ref">Luc 1:56</span></p>
      <p>Au terme de l'Écriture, l'arche reparaît dans une vision : le sanctuaire du ciel s'ouvre et l'arche de l'alliance s'y montre. <em>« Le temple de Dieu qui est dans le ciel fut ouvert, et l'arche de son alliance apparut dans son temple. »</em> <span class="ref">Apocalypse 11:19</span> Aussitôt se lève une femme enveloppée de soleil, couronnée de douze étoiles. <em>« Un grand signe parut dans le ciel : une femme enveloppée de soleil, la lune sous ses pieds, et une couronne de douze étoiles sur la tête. »</em> <span class="ref">Apocalypse 12:1</span> L'arche et la femme sont une seule réalité : Marie, qui porte le Sauveur.</p>
      <h2>Le tabernacle de Dieu</h2>
      <p>Du temps de Moïse, au désert, Dieu se rendait présent au milieu de son peuple dans une tente sacrée. Cette tente n'était qu'une figure ; ce qu'elle annonçait est venu en personne. <em>« Et le Verbe s'est fait chair, et il a habité parmi nous. »</em> <span class="ref">Jean 1:14</span> Le mot grec rendu par « il a habité », <em>eskēnōsen</em> (ἐσκήνωσεν), dérive du nom de cette tente sainte, la <em>skēnē</em> (σκηνή) : le Verbe, en s'incarnant, a planté sa tente parmi nous.</p>
      <p>Dans cette tente, puis dans le Temple qui lui succéda, la partie la plus retirée portait le nom de saint des saints. Un grand voile la séparait du reste ; elle abritait l'arche, et la présence de Dieu y reposait. Son accès était fermé à tous, sauf à un seul homme, à un seul moment. <em>« Dans la seconde partie, le grand prêtre seul entre, une fois par an. »</em> <span class="ref">Hébreux 9:7</span></p>
      <p>C'est en Marie que le Verbe a planté sa tente : son sein est le saint des saints de la nouvelle alliance, où le Seigneur lui-même a reposé, non plus au-dessus de l'arche, mais dans la chair qu'il prenait d'elle. Et de même que le grand prêtre franchissait seul le voile pour se tenir devant cette présence, le Christ, prêtre éternel, fut le seul à habiter le sanctuaire que fut le corps de sa Mère.</p>
      <h2>L'Assomption</h2>
      <p>L'Assomption est le mystère par lequel Marie, au terme de sa vie terrestre, a été élevée corps et âme dans la gloire du ciel. Le mot vient du latin <em>assumere</em>, prendre avec soi : Dieu a pris Marie auprès de lui tout entière. Le Christ est monté au ciel par sa propre puissance le jour de l'Ascension ; Marie y a été élevée par la puissance de son Fils, reçue dans la gloire par Celui qu'elle avait porté. La Tradition ancienne parle de sa dormition, ce sommeil paisible au terme de sa vie, et l'Église a laissé indéfinie la question de savoir si elle a d'abord connu la mort.</p>
      <p>La décomposition du corps dans le tombeau est une suite du péché, entrée dans la condition humaine avec la faute des origines. <em>« Tu es poussière, et tu retourneras à la poussière. »</em> <span class="ref">Genèse 3:19</span> Là où le péché demeure absent, cette corruption n'a aucune prise : le Christ, livré à la mort sans avoir connu le péché, n'a pas vu sa chair se décomposer. <em>« Sa chair n'a pas vu la corruption. »</em> <span class="ref">Actes 2:31</span> Comblée de grâce et préservée de tout péché, Marie ne portait rien qui appelât la corruption du tombeau. Cette chair avait donné sa propre substance au Christ et porté l'Auteur de la vie ; il convenait qu'elle fût élevée tout entière dans la gloire, comme le corps de son Fils.</p>
      <p>Ce que Marie vit déjà, tous les sauvés l'attendent : à la fin des temps, les corps des justes ressusciteront et seront unis à leur âme dans la gloire. Marie est la première à connaître pleinement cette victoire, par avance et tout entière, et en elle la promesse faite à l'humanité est déjà accomplie. <em>« La mort a été engloutie dans la victoire. »</em> <span class="ref">1 Corinthiens 15:54</span> L'Église a proclamé l'Assomption dogme de foi en 1950, recueillant ce que la Tradition tenait depuis les premiers siècles.</p>
      <h2>Reine du ciel</h2>
      <p>Élevée dans la gloire auprès de son Fils, Marie partage sa royauté. Cette dignité découle de sa maternité : elle est la mère du Roi dont le règne ne finit pas, comme l'ange l'avait annoncé. <em>« Le Seigneur Dieu lui donnera le trône de David son père ; il régnera pour toujours, et son règne n'aura pas de fin. »</em> <span class="ref">Luc 1:32-33</span> Dans la monarchie de David, c'est la mère du roi, et non l'épouse, qui portait le titre de reine : elle recevait un titre officiel, siégeait à la droite du roi et lui présentait les demandes du peuple. Lorsque Bethsabée vient trouver son fils Salomon, le roi se lève et la fait asseoir à sa droite. <em>« Le roi se leva à sa rencontre et se prosterna devant elle, puis on plaça un trône pour la mère du roi, et elle s'assit à sa droite. »</em> <span class="ref">1 Rois 2:19</span> Mère du Roi promis, fils de David, Marie est la reine de son Royaume.</p>
      <p>Le psaume royal l'avait chantée par avance. <em>« À ta droite se tient la reine, parée de l'or d'Ophir. »</em> <span class="ref">Psaume 45:10</span> Élevée à la droite de son Fils, couronnée de douze étoiles dans la vision du ciel, elle partage la gloire de son règne. Sa royauté tient aussi à sa part dans l'œuvre du Roi : unie à lui tout au long de sa vie, elle s'est tenue auprès de lui jusqu'à la Croix, traversée par la même douleur. <em>« Et toi-même, un glaive te transpercera l'âme. »</em> <span class="ref">Luc 2:35</span> Celle qui a partagé l'offrande partage le triomphe.</p>
      <h2>La première des croyants</h2>
      <p>Avant d'être donnée pour mère, Marie est la première des disciples. Elle a cru à la parole de Dieu et s'y est livrée sans réserve, et c'est sa foi qu'Élisabeth proclame heureuse. <em>« Bienheureuse celle qui a cru à l'accomplissement de ce qui lui a été dit de la part du Seigneur. »</em> <span class="ref">Luc 1:45</span> Cette foi a duré toute sa vie : devant les paroles et les événements dont le sens lui échappait encore, elle les recueillait et les gardait au-dedans, les laissant peu à peu livrer leur lumière. <em>« Marie retenait tous ces événements et les méditait dans son cœur. »</em> <span class="ref">Luc 2:19</span> Ainsi a-t-elle avancé dans la foi jusqu'au pied de la Croix, modèle de celui qui accueille la parole de Dieu et la garde. <em>« Sa mère gardait toutes ces choses dans son cœur. »</em> <span class="ref">Luc 2:51</span> C'est cette foi que toutes les générations reconnaissent. <em>« Désormais toutes les générations me diront bienheureuse. »</em> <span class="ref">Luc 1:48</span></p>
      <h2>Notre mère</h2>
      <p>Du haut de la Croix, le Christ a confié sa mère au disciple qu'il aimait, et en lui à tous ses disciples. <em>« Voici ta mère. Et de cette heure, le disciple la prit chez lui. »</em> <span class="ref">Jean 19:26-27</span> Marie est ainsi devenue la mère de tous les croyants et la mère de l'Église. Comme la reine mère portait au roi les demandes du peuple, elle présente au Christ les besoins des hommes et leur obtient sa grâce ; sa royauté s'exerce tout entière dans cette intercession qui ramène à lui. Aux noces de Cana, elle remarque le manque et le porte simplement devant lui. <em>« Ils n'ont pas de vin. »</em> <span class="ref">Jean 2:3</span> Puis elle écarte d'elle-même tout regard pour le diriger vers son Fils, dans la parole qui résume tout ce qu'elle enseigne. <em>« Faites tout ce qu'il vous dira. »</em> <span class="ref">Jean 2:5</span></p>

      <p>L'âge de raison, aussi appelé âge de discrétion, est le moment où l'enfant acquiert l'usage de la raison : la capacité de discerner le bien du mal et d'agir en connaissance de cause. Tant qu'il ne l'a pas atteint, il ne mesure pas la portée de ses actes. L'Écriture connaît ce seuil : elle parle des tout-petits <em>« qui ne connaissent aujourd'hui ni le bien ni le mal »</em> <span class="ref">Deutéronome 1:39</span>, et décrit l'enfant grandissant <em>« jusqu'à ce qu'il sache rejeter le mal et choisir le bien »</em> <span class="ref">Isaïe 7:15</span>.</p>
      <h2>L'éveil de la raison</h2>
      <p>Avant ce seuil, l'enfant agit par impulsion, par imitation ou par habitude, sans saisir ce qu'il fait. L'usage de la raison désigne le moment où s'éveillent en lui trois capacités liées : reconnaître qu'un acte est bon ou mauvais, comprendre qu'il en est l'auteur, et délibérer avant d'agir. C'est l'éveil de la conscience, cette voix intérieure qui juge le bien et le mal. L'enfant cesse alors d'être seulement conduit : il commence à se conduire lui-même.</p>
      <h2>Le repère de sept ans</h2>
      <p>L'Église situe ce seuil vers sept ans. C'est une présomption souple : certains enfants parviennent à l'usage de la raison un peu plus tôt, d'autres un peu plus tard. Ce repère sert de règle commune, à partir de laquelle l'enfant est tenu pour responsable de ses actes. Il marque le commencement de la vie morale : le jugement continue de mûrir longtemps après, et la pleine maturité s'acquiert seulement avec les années.</p>
      <h2>La connaissance et la liberté font l'acte</h2>
      <p>Un acte n'engage son auteur que s'il est posé en connaissance et de plein gré : il faut savoir ce que l'on fait et le vouloir pour en répondre. C'est pourquoi l'enfant qui n'a pas encore l'usage de la raison ne commet pas de péché personnel, ne pouvant ni mesurer ni choisir ce qu'il fait. La responsabilité naît avec le discernement, et elle vaut dans les deux sens : devenu capable de reconnaître le bien, l'homme répond aussi du mal qu'il commet en le sachant. <em>« Celui qui sait faire le bien et ne le fait pas commet un péché. »</em> <span class="ref">Jacques 4:17</span> La gravité d'une faute dépend toujours de la connaissance et de la liberté engagées : le seuil ouvre la capacité de pécher, sans fixer d'avance le poids de chaque acte.</p>
      <h2>Un seuil dans la vie chrétienne</h2>
      <p>À partir de l'âge de raison, l'enfant entre dans une vie morale responsable devant Dieu : désormais capable de faute, mais aussi de mérite, d'actes librement bons qui le font grandir dans la grâce. Il devient capable de recevoir le pardon dans la confession, car il peut examiner sa conscience et reconnaître ses fautes, et d'être admis à la communion, car il peut discerner dans l'hostie le corps du Christ. Ce seuil distingue aussi les effets du baptême : reçu chez le tout-petit, il efface le seul péché originel ; reçu après l'âge de raison, il efface en outre tous les péchés personnels.</p>
      <h2>Ceux qui meurent avant ce seuil</h2>
      <p>L'enfant qui meurt avant d'avoir atteint l'usage de la raison n'a pu commettre aucun péché personnel. S'il a été baptisé, son âme, lavée du péché originel et parée de la grâce, entre aussitôt dans la gloire de Dieu. Le Christ a montré sa tendresse pour ces petits et les a donnés en modèle du Royaume. <em>« Laissez venir à moi les petits enfants et ne les en empêchez pas, car le royaume des cieux est à ceux qui leur ressemblent. »</em> <span class="ref">Matthieu 19:14</span> Pour ceux qui meurent sans baptême, l'Église, sans tenir de certitude, les confie avec espérance à la miséricorde de Dieu, qui veut que tous les hommes soient sauvés.</p>

      <h2>L'enfant a besoin de la grâce</h2>
      <p>Tout homme vient au monde privé de la grâce sanctifiante, marqué par le péché originel hérité des origines. Le baptême efface ce péché et donne à l'âme la vie divine, qui fait de l'enfant un fils de Dieu. L'enfant est celui qui a le plus besoin de ce don, et l'Église le lui ouvre dès le seuil de sa vie, car la nouvelle naissance est nécessaire à tous pour entrer dans le Royaume. <em>« Nul, s'il ne naît d'eau et d'Esprit, ne peut entrer dans le royaume de Dieu. »</em> <span class="ref">Jean 3:5</span></p>

      <h2>Baptisé dans la foi de l'Église</h2>
      <p>L'enfant ne peut pas encore croire par lui-même. Aussi est-il baptisé dans la foi de l'Église, celle de ses parents, de ses parrains et de la communauté qui l'accueille et s'engage à le faire grandir. La foi se reçoit et se transmet avant de devenir une réponse personnelle. Le baptême dépose d'ailleurs en l'enfant le germe même de la foi, vertu que Dieu infuse avec la grâce, et qui s'épanouira en acte personnel quand s'éveillera sa raison. Il est porté par elle jusqu'à ce jour, comme il est porté, dès sa naissance, par l'amour des siens. Ainsi le baptême des petits enfants ouvre la foi et l'appelle : le don de Dieu précède toujours la réponse de l'homme.</p>

      <p>Les anges sont des esprits créés par Dieu, sans corps, doués d'intelligence et de volonté. Ils se tiennent devant lui dans l'adoration et portent ses messages aux hommes. Le mot le dit : « ange » vient du grec <em>angelos</em> (ἄγγελος), le messager. L'Écriture les nomme de ses premières pages à ses dernières, témoins du monde invisible que Dieu a créé en même temps que le visible.</p>
      <h2>Des esprits créés</h2>
      <p>Les anges sont des créatures : ils ont commencé d'être, comme tout ce qui n'est pas Dieu. <em>« Par lui ont été créées toutes choses, dans les cieux et sur la terre, les visibles et les invisibles. »</em> <span class="ref">Colossiens 1:16</span> Ce sont de purs esprits, sans matière ni corps, et c'est pourquoi ils ne meurent pas. Chacun est une personne : il connaît et il aime, d'une intelligence plus vive et d'une volonté plus ferme que les nôtres. Quand l'Écriture leur prête des ailes ou un visage, elle parle par images, pour rendre sensible ce qui échappe aux sens.</p>
      <h2>Une multitude ordonnée</h2>
      <p>Les anges sont innombrables. Devant le trône de Dieu se presse une foule que nul ne compte : <em>« Des milliers de milliers le servaient, des myriades se tenaient devant lui. »</em> <span class="ref">Daniel 7:10</span> Cette multitude est disposée en degrés, que la tradition nomme les chœurs des anges, depuis les Séraphins et les Chérubins qui se tiennent au plus près de Dieu jusqu'aux anges envoyés vers les hommes. L'Écriture donne le nom de trois d'entre eux : Michel, qui combat pour Dieu, Gabriel, qui annonce, et Raphaël, qui accompagne et guérit.</p>
      <h2>Devant Dieu et auprès des hommes</h2>
      <p>La première œuvre des anges est l'adoration. Tournés vers Dieu, ils chantent sa sainteté sans fin : <em>« Saint, Saint, Saint est le Seigneur de l'univers ; toute la terre est remplie de sa gloire. »</em> <span class="ref">Isaïe 6:3</span> De cette louange ils passent au service : Dieu les envoie porter sa parole et accomplir son dessein. Gabriel est envoyé à Marie pour lui annoncer le Sauveur. Et ce service s'étend jusqu'à nous : <em>« Ne sont-ils pas tous des esprits au service de Dieu, envoyés pour ceux qui doivent hériter du salut ? »</em> <span class="ref">Hébreux 1:14</span></p>
      <h2>L'ange gardien</h2>
      <p>À chacun, Dieu donne un ange pour le garder. Le Christ le dit des plus petits : <em>« Leurs anges, dans les cieux, voient sans cesse la face de mon Père. »</em> <span class="ref">Matthieu 18:10</span> Cet ange veille, écarte le mal, éclaire et soutient, et porte nos prières devant Dieu : <em>« Il donnera pour toi ordre à ses anges de te garder dans toutes tes voies. »</em> <span class="ref">Psaume 91:11</span> Présence discrète et constante, il accompagne chaque vie, de la naissance à la rencontre avec Dieu.</p>
      <h2>L'épreuve et la chute</h2>
      <p>Comme l'homme, les anges ont été créés bons et libres, et appelés à choisir Dieu. Tous ne l'ont pas choisi. L'un des plus grands se dressa contre son Créateur, refusant de servir, voulant être comme Dieu par ses propres forces, et il entraîna derrière lui une part des anges. L'Écriture le montre par le dragon dont la queue balaie le ciel : <em>« Sa queue entraînait le tiers des étoiles du ciel, et les jeta sur la terre. »</em> <span class="ref">Apocalypse 12:4</span> Ces étoiles abattues sont les anges qui tombèrent avec lui. Vient alors le combat, et la défaite du rebelle : <em>« Il y eut un combat dans le ciel : Michel et ses anges combattirent le dragon… et le grand dragon fut précipité, l'antique serpent, appelé le diable et Satan, le séducteur du monde entier. »</em> <span class="ref">Apocalypse 12:7-9</span> Ces esprits déchus sont les démons ; leur chef est Satan (שָׂטָן), dont le nom signifie l'adversaire. <em>« Je voyais Satan tomber du ciel comme l'éclair. »</em> <span class="ref">Luc 10:18</span></p>
      <h2>Un choix sans retour</h2>
      <p>La faute des anges est sans retour, et c'est leur manière même de connaître et de choisir qui le veut. Nous, les hommes, nous connaissons peu à peu : par les sens, par le raisonnement, en découvrant une chose après l'autre ; c'est pourquoi nous changeons d'avis, quand le temps nous fait voir ce que nous n'avions pas encore vu. Un pur esprit ne connaît pas de cette manière : il n'apprend pas par fragments, il saisit d'un seul regard, tout entier et d'un coup, ce qu'il connaît. Sa volonté suit cette connaissance complète : il choisit en sachant déjà tout ce que son choix engage, sans rien qui lui reste caché et puisse plus tard le faire revenir en arrière. Or revenir sur un choix suppose l'un de ces deux ressorts : voir ce qu'on n'avait pas vu, ou changer avec le temps. L'ange n'a ni l'un ni l'autre. Son premier choix est donc son choix définitif, non parce que Dieu lui interdirait de se reprendre, mais parce que plus rien ne peut l'y porter. Les anges fidèles sont ainsi fixés pour toujours dans la lumière ; les déchus, dans leur refus, et ce sont les démons. Ils gardent une puissance, mais limitée et déjà vaincue : ils tentent et accusent sans pouvoir contraindre. La Croix du Christ a brisé leur empire, et leur fin est arrêtée : <em>« Allez loin de moi, maudits, dans le feu éternel préparé pour le diable et ses anges. »</em> <span class="ref">Matthieu 25:41</span></p>

    date: "2026",
    contenu: `
      <p>Le péché est un refus libre de l'amour de Dieu. Il consiste à préférer sa propre volonté à la volonté divine et à transgresser la loi de Dieu, qui exprime cet amour : <em>« Le péché est la transgression de la loi. »</em> <span class="ref">1 Jean 3:4</span> Tout péché comporte ainsi un double mouvement : l'homme se tourne vers un bien moindre et s'éloigne de Dieu, qui est sa fin et son bien. Il se commet en pensée, en parole, par action, et par omission : <em>« Celui qui sait faire le bien et ne le fait pas commet un péché. »</em> <span class="ref">Jacques 4:17</span></p>
      <h2>Originel et personnel</h2>
      <p>Un même mot recouvre deux réalités. Le péché originel est l'état de privation dans lequel tout homme naît, hérité de la faute des origines. Le péché personnel est l'acte que chacun commet par sa propre volonté, une fois venu l'âge de raison. Tous y sont exposés : <em>« Tous ont péché et sont privés de la gloire de Dieu. »</em> <span class="ref">Romains 3:23</span></p>
      <h2>Le péché mortel</h2>
      <p>Les péchés personnels ne pèsent pas tous le même poids, et l'Écriture le marque elle-même : <em>« Il y a tel péché qui mène à la mort, et il y a tel péché qui ne mène pas à la mort. »</em> <span class="ref">1 Jean 5:16-17</span> Le plus grave, le péché mortel, rompt l'amitié avec Dieu et fait perdre la grâce sanctifiante, cette vie divine déposée dans l'âme. Trois conditions, réunies ensemble, le constituent. Il faut d'abord une matière grave, un acte qui contredit gravement la loi de Dieu, comme la transgression des grands commandements du Décalogue : le meurtre, l'adultère, le vol important, le faux témoignage, le mépris de Dieu. Il faut ensuite la pleine conscience de cette gravité, savoir que l'on fait un mal sérieux. Il faut enfin le plein consentement, le vouloir librement, sans y être contraint. Que l'une de ces conditions manque, et la faute n'atteint plus ce degré : une ignorance qu'on ne pouvait surmonter, une liberté entamée par la peur ou la passion en allègent le poids. Là où les trois se rejoignent, le péché donne la mort à l'âme, qui perd la charité et la vie de la grâce : <em>« Le salaire du péché, c'est la mort. »</em> <span class="ref">Romains 6:23</span> L'homme demeure coupé de sa fin ; et cette rupture, persévérée sans repentir, devient la séparation éternelle d'avec Dieu.</p>
      <h2>Le péché véniel</h2>
      <p>Le péché véniel blesse la charité sans la détruire : l'amitié avec Dieu demeure, affaiblie. Même le juste y tombe : <em>« Nous bronchons tous, et de bien des manières. »</em> <span class="ref">Jacques 3:2</span> Sa matière est légère, ou bien la conscience ou le consentement n'y sont que partiels. Répété et consenti, il refroidit l'amour et dispose peu à peu au péché grave ; il laisse aussi dans l'âme une dette à purifier, que le purgatoire achève d'acquitter.</p>
      <h2>Sa racine</h2>
      <p>Toute faute naît d'un même mouvement : se préférer à Dieu. C'est du cœur qu'elle monte : <em>« Du cœur viennent les mauvaises pensées, meurtres, adultères, débauches, vols, faux témoignages, blasphèmes. »</em> <span class="ref">Matthieu 15:19</span> Au plus profond se tient l'orgueil, qui place le moi au centre et d'où sortent les autres péchés. De lui naissent trois convoitises, où l'homme cherche hors de Dieu ce que Dieu seul donne : <em>« la convoitise de la chair, la convoitise des yeux et l'orgueil de la vie. »</em> <span class="ref">1 Jean 2:16</span> De ces convoitises montent les sept penchants qu'on nomme capitaux, parce qu'ils sont les têtes d'où jaillissent les autres fautes : l'orgueil, l'avarice, l'envie, la colère, la luxure, la gourmandise et la paresse, présentés un à un dans <a href="#/article/les-peches-capitaux">l'article qui leur est consacré</a>. Le péché appauvrit ainsi l'homme, en le coupant de la source même de sa vie.</p>
      <h2>Son pardon</h2>
      <p>Dieu ne cesse d'offrir son pardon à qui revient vers lui. Le Christ a porté le péché du monde pour en délivrer les hommes, et il a confié à son Église le pouvoir de remettre les péchés : <em>« Ceux à qui vous remettrez les péchés, ils leur seront remis. »</em> <span class="ref">Jean 20:23</span> Le péché mortel se relève dans le sacrement de pénitence, qui rend à l'âme la grâce perdue et la réconcilie avec Dieu. Le péché véniel s'efface par bien des chemins : la contrition du cœur, la prière, l'aumône, les sacramentaux, et surtout l'Eucharistie, qui fortifie la charité. À celui qui reconnaît sa faute, la miséricorde est toujours promise : <em>« Si nous confessons nos péchés, il est fidèle et juste pour nous les pardonner. »</em> <span class="ref">1 Jean 1:9</span></p>
      <h2>Le péché contre l'Esprit</h2>
      <p>Une seule faute échappe au pardon, et le Christ la nomme devant les pharisiens, au moment où ils attribuent au démon ce qu'il accomplit par l'Esprit de Dieu. Venant de délivrer un possédé sous leurs yeux, il s'entend accuser de chasser les démons par leur prince. <em>« C'est par Béelzébul, le prince des démons, qu'il chasse les démons. »</em> <span class="ref">Matthieu 12:24</span> Ils ne sont pas dans l'ignorance : ils ont vu les signes se multiplier et ne peuvent honnêtement nier la force de ce qu'ils voient. Leur parti est déjà pris contre lui. <em>« Les pharisiens tinrent conseil contre lui sur les moyens de le faire périr. »</em> <span class="ref">Matthieu 12:14</span> Plutôt que de céder à l'évidence, ils prêtent au démon ce que leur conscience leur montre venir de Dieu : non une erreur, mais un refus arrêté. C'est à cela que le Christ répond. <em>« Tout péché et tout blasphème seront pardonnés aux hommes, mais le blasphème contre l'Esprit ne sera pas pardonné. »</em> <span class="ref">Matthieu 12:31</span></p>
      <p>Il distingue aussitôt deux refus. <em>« Quiconque parlera contre le Fils de l'homme, il lui sera pardonné ; mais quiconque parlera contre l'Esprit Saint, il ne lui sera pardonné ni dans ce siècle ni dans le siècle à venir. »</em> <span class="ref">Matthieu 12:32</span> Ne pas reconnaître Dieu sous les traits de cet homme peut tenir à l'ignorance, et l'ignorance s'excuse ; mais appeler diabolique l'œuvre qu'on sait divine n'est plus une méprise. C'est fermer les yeux sur la lumière reconnue, et repousser sciemment celui-là même par qui le pardon serait reçu.</p>
      <p>Le péché contre l'Esprit n'est donc pas un blasphème que Dieu refuserait d'absoudre, comme s'il rencontrait là une limite à sa miséricorde ; c'est le péché qui se ferme au pardon, en repoussant la grâce par laquelle il serait remis. La tradition y reconnaît l'endurcissement sous ses formes diverses, le désespoir qui ne croit plus au pardon, la présomption qui ne le demande plus, et surtout l'impénitence finale, le refus tenu jusqu'au bout de se convertir. Tant que ce refus dure, il barre la porte du dedans, car Dieu ne sauve personne malgré lui. Qui craint d'avoir commis ce péché ne l'a pas commis, car le désir même du pardon en est le contraire.</p>

      <p>On les appelle capitaux du mot latin <em>caput</em>, la tête : ils sont les sources d'où jaillissent les autres fautes. On les nomme ainsi pour leur fécondité, car chacun engendre une suite de péchés qui lui obéissent. L'Écriture en dresse le tableau sous le nom d'œuvres de la chair : <em>« Les œuvres de la chair sont manifestes : impudicité, idolâtrie, haines, querelles, jalousies, colères, envie, et choses semblables. »</em> <span class="ref">Galates 5:19-21</span> La tradition en a reconnu sept racines, à chacune desquelles répond la vertu qui la guérit.</p>
      <h2>L'orgueil</h2>
      <p>L'orgueil est le désir désordonné de sa propre grandeur, qui place le moi là où Dieu devrait être. Il est la tête de tous : <em>« Le commencement de l'orgueil, c'est de se détourner du Seigneur. »</em> <span class="ref">Siracide 10:12</span> De lui sortent la vaine gloire, le mépris d'autrui, la révolte contre Dieu. L'humilité le guérit, qui rend à Dieu la première place et reçoit tout de lui.</p>
      <h2>L'avarice</h2>
      <p>L'avarice est l'attachement désordonné aux richesses, où le cœur traite le bien comme une fin et s'y enchaîne. <em>« La racine de tous les maux, c'est l'amour de l'argent. »</em> <span class="ref">1 Timothée 6:10</span> Elle engendre la dureté, la fraude, l'oubli des pauvres. La générosité la guérit, qui tient les biens d'une main ouverte et les ordonne au bien.</p>
      <h2>L'envie</h2>
      <p>L'envie est la tristesse devant le bien d'autrui, ressenti comme un amoindrissement de soi. C'est elle qui a livré le Christ : <em>« il savait que c'était par envie qu'ils l'avaient livré. »</em> <span class="ref">Matthieu 27:18</span> Elle engendre la médisance, la joie du malheur d'autrui, la haine. La charité fraternelle la guérit, qui se réjouit du bien du prochain comme du sien.</p>
      <h2>La colère</h2>
      <p>La colère est le désir désordonné de la vengeance, quand le ressentiment l'emporte sur la justice. <em>« Quiconque se met en colère contre son frère en répondra au jugement. »</em> <span class="ref">Matthieu 5:22</span> Elle engendre les disputes, les injures, la violence. La douceur la guérit, qui garde la maîtrise de soi et laisse à Dieu la justice.</p>
      <h2>La luxure</h2>
      <p>La luxure est le désir désordonné des plaisirs charnels, recherchés pour eux-mêmes. <em>« Fuyez l'impudicité. Votre corps est le temple du Saint-Esprit. »</em> <span class="ref">1 Corinthiens 6:18-19</span> Elle aveugle le jugement et asservit la volonté. La chasteté la guérit, qui ordonne le désir au don de soi dans l'amour.</p>
      <h2>La gourmandise</h2>
      <p>La gourmandise est l'usage désordonné du manger et du boire, recherché sans mesure. <em>« Ne sois pas parmi les buveurs de vin, parmi ceux qui se gorgent de viande. »</em> <span class="ref">Proverbes 23:20</span> Elle alourdit l'esprit et l'enchaîne au corps. La tempérance la guérit, qui reçoit les biens du corps avec mesure et action de grâce.</p>
      <h2>La paresse</h2>
      <p>La paresse, ou acédie, est la tristesse devant le bien spirituel, le dégoût de l'effort qu'il demande. Elle refroidit la prière et fait négliger les devoirs envers Dieu. <em>« Parce que tu es tiède, je te vomirai de ma bouche. »</em> <span class="ref">Apocalypse 3:16</span> La ferveur la guérit, l'amour qui se remet à l'œuvre et persévère.</p>
      <h2>Le combat</h2>
      <p>Aucun de ces penchants n'est invincible. La grâce du Christ et la pratique des vertus contraires les désarment l'un après l'autre, car le bien chasse le mal qui s'y oppose : <em>« Ne te laisse pas vaincre par le mal, mais sois vainqueur du mal par le bien. »</em> <span class="ref">Romains 12:21</span> À mesure que grandit la charité, leurs racines se dessèchent, et l'homme retrouve la liberté des enfants de Dieu.</p>

    contenu: `
      <p>Le péché originel est l'état de privation de la grâce sanctifiante dans lequel tout homme vient au monde. La grâce sanctifiante est la vie divine déposée dans l'âme, celle qui fait de l'homme un enfant de Dieu et son ami. Le nouveau-né en est privé dès le premier instant de son existence : il reçoit en héritage la conséquence de la faute commise aux origines de l'humanité.</p>
      <h2>L'état d'innocence</h2>
      <p>Au commencement, Dieu a élevé l'homme au-dessus de sa propre nature. Il l'a créé dans la droiture, ajusté à Dieu, à lui-même et au monde : c'est ce qu'on appelle la justice originelle, où le mot justice désigne cette harmonie, cet ajustement de l'homme à son Créateur. <em>« Dieu a fait l'homme droit, mais ils ont cherché bien des détours. »</em> <span class="ref">Ecclésiaste 7:29</span> Cette droiture tenait à deux dons que la nature humaine ne pouvait se donner.</p>
      <p>Le premier est la grâce sanctifiante, qui unissait l'homme à Dieu dans son amitié. C'est un don surnaturel, le mot désignant ce qui dépasse toute nature créée et relève de la vie propre de Dieu. Créé à l'image de Dieu, l'homme recevait par cette grâce d'en porter aussi la ressemblance, participant à la vie même de son Créateur. <em>« Faisons l'homme à notre image, selon notre ressemblance. »</em> <span class="ref">Genèse 1:26</span></p>
      <p>Le second est un ensemble de dons dits préternaturels, le mot signifiant au-delà de la nature : ils portaient la nature humaine au-dessus de ses forces propres, dans le corps et dans les facultés. La tradition en compte quatre. L'intégrité, la pleine soumission des passions à la raison. L'immortalité, l'exemption de la mort. L'impassibilité, l'exemption de la souffrance. Et une connaissance infuse : créés à l'âge adulte, sans enfance ni parents pour les instruire, Adam et Ève recevaient de Dieu le savoir nécessaire pour conduire leur vie et élever leur descendance. Ce dernier don seul ne se serait pas transmis, car leurs enfants, nés petits et grandissant sous leur conduite, l'auraient acquis par l'éducation ; les trois autres seraient passés à toute la descendance.</p>
      <h2>L'harmonie des passions</h2>
      <p>L'intégrité ordonnait le dedans de l'homme. Les passions sont les mouvements spontanés de l'âme devant ce qu'elle perçoit comme un bien ou un mal : le désir, la joie, la crainte, la colère. La tradition les répartit en deux registres. Les premières, dites concupiscibles, naissent devant un bien ou un mal sensible et portent vers lui ou en détournent : l'amour et la haine, le désir et l'aversion, la joie et la tristesse. Les secondes, dites irascibles, se lèvent devant un bien difficile à atteindre ou un mal difficile à éviter, et soutiennent l'effort : l'espérance et le découragement, l'audace et la crainte, la colère qui se dresse contre l'obstacle. Toutes sont des forces données à l'homme pour qu'il agisse.</p>
      <p>Dans l'état d'innocence, l'homme connaissait la faim, le désir, la crainte ; ces mouvements ne se levaient qu'au commandement de la raison et cédaient à son jugement, sans que l'esprit eût à lutter pour se faire obéir.</p>
      <p>Cet ordre descendait de Dieu. La raison gouvernait les passions parce qu'elle se tenait elle-même sous Dieu, et le corps obéissait à l'âme parce que l'âme obéissait à son Créateur. L'intégrité reposait sur cette union à Dieu, non sur une force que l'homme aurait tenue de lui-même : tant que l'âme demeurait sous Dieu, tout demeurait en ordre sous l'âme. L'Écriture en donne le signe au seuil du récit. <em>« Ils étaient tous deux nus, l'homme et sa femme, et ils n'en avaient point de honte. »</em> <span class="ref">Genèse 2:25</span> Le corps était alors transparent à l'esprit : rien en lui ne se levait que l'âme dût soumettre malgré elle.</p>
      <h2>La perte</h2>
      <p>Mis à l'épreuve de l'obéissance, Adam a préféré sa propre volonté à celle de Dieu, voulant décider seul du bien et du mal. Ce premier refus est la faute des origines. En se détournant de Dieu, il a brisé d'un seul coup les trois accords que la justice originelle tenait ensemble. L'amitié avec Dieu d'abord, perdue par celui qui se cache désormais de son ami. L'accord intérieur ensuite : la raison, en quittant Dieu, a perdu son emprise sur ce qui lui était soumis, et les passions ont échappé à son gouvernement. L'accord avec le monde enfin. <em>« Tu mangeras ton pain à la sueur de ton front, jusqu'à ce que tu retournes à la terre d'où tu as été tiré. »</em> <span class="ref">Genèse 3:19</span> La terre se fait rebelle, le travail devient peine, et la mort entre dans la condition humaine.</p>
      <h2>Un péché contracté, non commis</h2>
      <p>Cette privation reçue à la naissance porte le nom de péché, et l'Écriture parle déjà ainsi. <em>« Voici, je suis né dans la faute, et ma mère m'a conçu dans le péché. »</em> <span class="ref">Psaume 51:7</span> Le mot se dit pourtant ici par analogie. Le péché, au sens propre, est un acte mauvais que la volonté choisit librement ; le péché originel désigne un état, l'absence de la grâce sanctifiante et la séparation d'avec Dieu à la racine de l'être, alors qu'aucune faute personnelle n'a été commise. Le nouveau-né ne l'a pas commis, il le contracte : il vient au monde privé de la sainteté pour laquelle il était fait. C'est cette privation, et non un acte coupable, qui constitue proprement le péché originel, et c'est d'elle que découle tout le reste.</p>
      <h2>La transmission</h2>
      <p>Ce qu'un seul a perdu, tous l'ont perdu avec lui. Adam ne se tenait pas devant Dieu comme un individu isolé : il portait en lui la famille humaine entière, et ce qu'il avait reçu pour elle, puis perdu, il le transmet à tous, comme les membres tiennent leur vie de la tête. <em>« Par un seul homme le péché est entré dans le monde, et par le péché la mort, et la mort a passé sur tous les hommes. »</em> <span class="ref">Romains 5:12</span></p>
      <p>Cette transmission se fait par génération, non par imitation. Le péché originel ne se répand pas d'homme à homme à la manière d'un mauvais exemple que la descendance copierait : il se reçoit avec la nature elle-même, à l'instant où chacun la tient de ses parents. Tout homme reçoit d'Adam la nature humaine telle que la faute l'a laissée, privée de la grâce et inclinée au désordre. L'état le marque ainsi dès sa conception, avant tout acte et tout choix, et nul ne s'en exempte par ses propres forces.</p>
      <h2>La concupiscence</h2>
      <p>La perte de la justice originelle laisse l'homme avec une nature blessée. Ses passions n'obéissent plus spontanément à la raison : elles tirent souvent vers le mal avant même que la volonté ait choisi. Ce désordre porte le nom de concupiscence, l'inclination au mal que la faute des origines a laissée en tout homme. <em>« Je ne fais pas le bien que je veux, et je commets le mal que je ne veux pas. »</em> <span class="ref">Romains 7:19</span></p>
      <p>Cette inclination porte au mal sans l'imposer, et n'est pas elle-même un péché. Tant que la volonté n'y consent pas, l'homme ne pèche pas ; le combat qu'elle impose devient même le lieu où la liberté s'exerce et se fortifie, et Dieu lui-même y appelle l'homme. <em>« Le péché est tapi à ta porte, mais à toi de le dominer. »</em> <span class="ref">Genèse 4:7</span></p>
      <h2>Le remède</h2>
      <p>Le Christ est venu rendre ce que le premier homme avait perdu. Nouvel Adam, tête d'une humanité renouvelée, il communique la vie là où le premier avait communiqué la mort. <em>« Comme tous meurent en Adam, de même tous revivront dans le Christ. »</em> <span class="ref">1 Corinthiens 15:22</span> Ce qu'un seul avait perdu pour tous, un seul le rend à tous. <em>« Comme par la désobéissance d'un seul beaucoup ont été rendus pécheurs, par l'obéissance d'un seul beaucoup seront rendus justes. »</em> <span class="ref">Romains 5:19</span></p>
      <p>Le baptême efface le péché originel et rend à l'âme la grâce sanctifiante, l'amitié de Dieu retrouvée. Les dons préternaturels, eux, demeurent en attente : la concupiscence, la souffrance et la mort restent dans la vie du baptisé, désormais assumées dans la grâce du Christ et ordonnées à la vie éternelle. À la résurrection, la pleine harmonie sera rendue, et le corps lui-même relevé, rendu semblable au corps glorieux du Christ ressuscité. <em>« Il est semé corps animal, il ressuscite corps spirituel. »</em> <span class="ref">1 Corinthiens 15:44</span> Ce que la chute avait défait, le Christ le restaure, et le porte plus haut encore.</p>

      <p>De ce péché vient la mort, qui en est le salaire. Elle est entrée dans le monde par la faute du premier homme et atteint désormais toute sa descendance. <em>« Par un seul homme le péché est entré dans le monde, et par le péché la mort. »</em> <span class="ref">Romains 5:12</span> La mort du corps en annonce une plus grave, celle de l'âme séparée de Dieu pour toujours. <em>« Le salaire du péché, c'est la mort ; mais le don de Dieu, c'est la vie éternelle. »</em> <span class="ref">Romains 6:23</span></p>
      <p>Derrière le péché et la mort se tient un ennemi personnel. Le démon a séduit l'homme dès l'origine et l'a entraîné dans la faute ; par cette chute, l'homme est passé sous son pouvoir. Sa domination s'étend aussi loin que le péché : celui qui s'y livre appartient à celui qui l'y a conduit. <em>« Celui qui commet le péché est du diable, car le diable pèche dès le commencement. »</em> <span class="ref">1 Jean 3:8</span> L'Écriture le nomme le prince de ce monde, et tient l'homme pécheur pour son captif. De ce maître, l'homme ne se délivre pas par ses propres forces ; seul un plus fort que lui pouvait l'en arracher.</p>
      <p>De tout cela le Christ délivre l'homme. Il le réconcilie avec Dieu et lui rend la grâce que le péché lui avait ôtée ; il triomphe de la mort par sa Résurrection et lui ouvre la vie éternelle ; il brise l'empire du démon et l'arrache à celui qui le tenait captif, lui rendant la condition de fils de Dieu. <em>« Il nous a délivrés de la puissance des ténèbres et nous a transportés dans le royaume de son Fils bien-aimé. »</em> <span class="ref">Colossiens 1:13</span></p>
      <h2>Par le Christ seul</h2>
      <p>Il n'y a qu'un Sauveur, et c'est Jésus. Son nom même le dit : Jésus signifie « Dieu sauve ». Nul autre que lui ne peut rendre à l'homme ce que le péché lui a ôté. <em>« Il n'y a sous le ciel aucun autre nom donné aux hommes par lequel nous devions être sauvés. »</em> <span class="ref">Actes 4:12</span></p>
      <h2>Par la Croix et la Résurrection</h2>
      <p>Le Christ sauve en prenant sur lui le péché du monde. Par sa mort sur la Croix, il détruit le péché ; par sa Résurrection, il vainc la mort et ouvre à l'homme la vie. Là se mesure l'amour de Dieu. <em>« Dieu a tant aimé le monde qu'il a donné son Fils unique, afin que quiconque croit en lui ait la vie éternelle. »</em> <span class="ref">Jean 3:16</span></p>
      <h2>Racheté à grand prix</h2>
      <p>Sauver, dans l'Écriture, se dit d'abord racheter. Racheter, c'est payer le prix qui rend la liberté à un captif ; et l'homme était captif du péché, livré à un maître dont il ne pouvait se délier par ses seules forces. Le Christ paie ce prix en donnant sa vie. <em>« Le Fils de l'homme est venu donner sa vie en rançon pour la multitude. »</em> <span class="ref">Marc 10:45</span> Ce prix dit la valeur de ce qu'il a fallu donner pour nous arracher au mal : le sang même du Fils. <em>« Vous avez été rachetés non par des biens périssables, l'argent ou l'or, mais par le sang précieux du Christ. »</em> <span class="ref">1 Pierre 1:18-19</span> C'est ce que nomme le mot rédemption, du latin <em>redimere</em>, racheter.</p>
      <h2>Un don de la grâce</h2>
      <p>Le salut est offert gratuitement, avant tout mérite. L'initiative vient tout entière de Dieu : c'est lui qui sauve, par pure grâce, et l'homme reçoit de lui ce qu'aucune force humaine ne pouvait obtenir. <em>« C'est par la grâce que vous êtes sauvés, par le moyen de la foi ; cela ne vient pas de vous, c'est le don de Dieu. »</em> <span class="ref">Éphésiens 2:8</span></p>
      <h2>Devenir fils de Dieu</h2>
      <p>Par la grâce, Dieu fait du sauvé son enfant, l'adoptant dans son Fils unique. <em>« Dieu a envoyé son Fils, afin que nous recevions l'adoption filiale. »</em> <span class="ref">Galates 4:4-5</span> Cette adoption donne part à la vie même de Dieu, à sa nature. <em>« Il vous a donné de devenir participants de la nature divine. »</em> <span class="ref">2 Pierre 1:4</span> La tradition résume ce mystère d'un mot : Dieu s'est fait homme pour que l'homme devienne dieu, non par nature, mais par grâce, élevé jusqu'à partager ce que Dieu est. C'est l'œuvre commencée au baptême et achevée dans la gloire, lorsque l'homme verra Dieu et vivra de sa vie.</p>
      <h2>Accueilli dans une foi vivante</h2>
      <p>Ce don attend pourtant d'être reçu. L'homme accueille le salut par la foi, qui s'ouvre dans la conversion et entre dans la vie nouvelle par le baptême. <em>« Si tu confesses de ta bouche que Jésus est Seigneur et si tu crois dans ton cœur que Dieu l'a ressuscité des morts, tu seras sauvé. »</em> <span class="ref">Romains 10:9</span> Cette foi est vivante : elle se montre dans la charité et dans les œuvres qu'elle inspire ; une foi qui n'agirait pas serait morte. <em>« Ce qui vaut, c'est la foi agissant par la charité. »</em> <span class="ref">Galates 5:6</span></p>
      <h2>La coopération de l'homme</h2>
      <p>Le salut est l'œuvre de Dieu, et l'homme y travaille librement. La grâce associe l'homme à son propre salut : elle le porte, l'éveille et le fortifie, et il y répond par toute sa vie, jusqu'au bout. <em>« Travaillez à votre salut avec crainte et tremblement, car c'est Dieu qui opère en vous le vouloir et le faire. »</em> <span class="ref">Philippiens 2:12-13</span> Les deux agissent ensemble, à deux niveaux différents : Dieu agit le premier et de l'intérieur, et c'est lui qui rend l'homme capable d'agir, en sorte que sa réponse libre est tout entière un don de Dieu et tout entière la sienne.</p>
      <h2>Offert à tous</h2>
      <p>Dieu n'exclut personne de cette offre. <em>« Dieu veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. »</em> <span class="ref">1 Timothée 2:4</span> Le Christ est mort pour tous, et sa grâce rejoint, par des voies que Dieu seul connaît, ceux mêmes qui n'ont pas connu l'Évangile, pourvu qu'ils cherchent Dieu d'un cœur droit.</p>
      <h2>Déjà donné, pas encore achevé</h2>
      <p>Le salut se reçoit en trois temps. Il est acquis une fois pour toutes à la Croix, où le Christ a tout accompli. Il se reçoit maintenant, dans la grâce et les sacrements, où le sauvé vit déjà de la vie nouvelle. Et il s'achèvera au dernier jour, lorsque l'homme verra Dieu face à face. Le chrétien est donc déjà sauvé, et l'attend encore. <em>« C'est en espérance que nous sommes sauvés. »</em> <span class="ref">Romains 8:24</span></p>

      <h2>Plus qu'un souvenir</h2>
      <p>On objecte que le Christ a seulement demandé un mémorial, « en mémoire de moi », et qu'il n'y aurait là qu'un souvenir, non une présence. Mais le mémorial, dans l'Écriture, ne se borne pas à rappeler le passé : la Pâque que mangeait Israël rendait présente, à chaque génération, la délivrance d'Égypte. L'Eucharistie rend présent ce qu'elle rappelle, et Paul l'atteste en des termes qui excluent le simple symbole. <em>« Quiconque mange le pain ou boit la coupe du Seigneur indignement se rend coupable envers le corps et le sang du Seigneur. »</em> <span class="ref">1 Corinthiens 11:27</span> On ne profane pas un signe ; on profane une présence. Aussi met-il en garde celui qui s'en approcherait sans reconnaître ce corps. <em>« Celui qui mange et boit sans discerner le corps mange et boit sa propre condamnation. »</em> <span class="ref">1 Corinthiens 11:29</span> Paul va plus loin encore. <em>« La coupe que nous bénissons n'est-elle pas communion au sang du Christ ? Le pain que nous rompons n'est-il pas communion au corps du Christ ? »</em> <span class="ref">1 Corinthiens 10:16</span> Le mot grec rendu par « communion », <em>koinōnia</em> (κοινωνία), dit une participation réelle : celui qui boit prend part au sang même du Christ, non à son image.</p>

      <h2>Adorer le Christ, non le pain</h2>
      <p>On objecte enfin qu'adorer l'hostie, c'est adorer du pain, et tomber dans l'idolâtrie. Tout tient à ce que l'hostie est. Si le pain demeurait du pain, l'adorer serait en effet une idolâtrie ; mais si le Christ y est réellement présent, corps, sang, âme et divinité, l'adoration ne va pas au pain, elle va à lui. La question de l'idolâtrie se ramène donc à celle de la présence réelle, déjà tranchée par ses paroles. Devant lui présent, refuser l'adoration serait la seule faute. On n'adore pas le signe, mais celui qu'il rend présent.</p>

      <p>Le baptême d'eau ouvre la porte du salut, et l'Église le tient pour nécessaire. Pourtant, certains meurent avant de l'avoir reçu : un catéchumène emporté la veille de son baptême, un martyr tué pour le Christ, un homme qui a cherché Dieu sans jamais connaître l'Évangile. Pour eux, la tradition reconnaît deux autres voies, le baptême de désir et le baptême de sang, par lesquelles Dieu donne la grâce là où l'eau a manqué.</p>
      <h2>La nécessité du baptême</h2>
      <p>Le Seigneur lie le salut au baptême. <em>« En vérité, en vérité, je te le dis, nul, s'il ne naît de l'eau et de l'Esprit, ne peut entrer dans le royaume de Dieu. »</em> <span class="ref">Jean 3:5</span> Le baptême d'eau est la voie que le Christ a donnée pour recevoir la grâce qui sauve, et l'Église ne connaît pas d'autre moyen assuré.</p>
      <h2>Le baptême de désir</h2>
      <p>Celui qui désire le baptême et meurt avant de le recevoir obtient la grâce par ce désir même. Le désir est explicite chez le catéchumène, qui demande le baptême et se prépare à le recevoir. Il est implicite chez celui qui cherche Dieu d'un cœur sincère et accomplit sa volonté selon ce qu'il en connaît : sans nommer le Christ, il le désire déjà en désirant le bien et la vérité. L'Écriture reconnaît cette loi inscrite au fond de l'homme. <em>« Quand des païens, qui n'ont pas la loi, font naturellement ce qu'elle ordonne, ils montrent que l'œuvre de la loi est écrite dans leur cœur. »</em> <span class="ref">Romains 2:14-15</span> Dans tous les cas, c'est la charité qui donne au désir sa valeur, car l'amour de Dieu contient en germe tout ce que le baptême confère.</p>
      <h2>Le baptême de sang</h2>
      <p>Le martyre supplée pareillement à l'eau. Le Christ a lui-même appelé sa Passion un baptême, et il a annoncé que ses disciples le partageraient. <em>« Vous serez baptisés du baptême dont je suis baptisé. »</em> <span class="ref">Marc 10:39</span> Celui qui meurt pour le Christ, ou pour une vertu qui se rapporte à lui, est ainsi baptisé dans son propre sang : il reçoit la grâce par l'union à la Passion du Christ, qu'il reproduit en donnant sa vie. Les saints Innocents, ces enfants de Bethléem mis à mort à cause de lui, sont honorés comme les premiers de ces martyrs ; et l'Église a toujours vénéré comme saints ceux qui sont morts pour le Christ avant d'avoir reçu l'eau.</p>
      <h2>Le larron à la croix</h2>
      <p>L'Écriture en montre un exemple au Calvaire. Le larron crucifié près de Jésus reconnaît sa faute, confesse l'innocence du Christ et se tourne vers lui. Jésus lui répond aussitôt. <em>« Aujourd'hui, tu seras avec moi dans le paradis. »</em> <span class="ref">Luc 23:43</span> Cet homme n'a pas reçu le baptême d'eau ; sa foi et son désir, au seuil de la mort, lui ont ouvert le paradis.</p>
      <h2>Dieu reste libre au-delà de ses sacrements</h2>
      <p>Le baptême demeure nécessaire, et nul ne peut le négliger en se réservant au désir ou au sang. Mais Dieu, qui a attaché le salut au sacrement, n'est pas lui-même enchaîné à ses signes : il peut donner quand il veut la grâce qu'ils contiennent. C'est pourquoi l'Écriture affirme que Dieu <em>« veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. »</em> <span class="ref">1 Timothée 2:4</span> Le baptême de désir et le baptême de sang sont la manière dont cette volonté rejoint ceux que l'eau n'a pas atteints.</p>

      <p>Parce que les membres ne font qu'un corps, leurs biens spirituels circulent entre eux. Le bien d'un seul profite à tous : la prière, les mérites, les souffrances offertes de l'un soutiennent les autres, et l'abondance des saints supplée à la pauvreté de ceux qui peinent. Paul savait ses souffrances fécondes pour les autres. <em>« Je complète en ma chair ce qui manque aux épreuves du Christ, pour son corps qui est l'Église. »</em> <span class="ref">Colossiens 1:24</span> De cet échange se forme ce que l'Église appelle son trésor : la valeur infinie des mérites du Christ, à laquelle s'ajoutent les prières et les bonnes œuvres de la Vierge et de tous les saints. L'Église y puise pour ses membres, et chacun, par sa charité, y verse à son tour.</p>

      <p>L'expression « la foi seule » ne paraît qu'une fois dans toute l'Écriture, et elle s'y trouve niée, mot pour mot. <em>« Vous voyez que l'homme est justifié par les œuvres, et non par la foi seule. »</em> <span class="ref">Jacques 2:24</span> Le seul passage où la Bible réunit ces deux mots les sépare aussitôt : il refuse expressément que la foi seule justifie.</p>
      <h2>Une foi morte ne sauve pas</h2>
      <p>La foi qui ne produit rien est sans vie, et ce qui est mort ne sauve pas. <em>« Que sert-il à quelqu'un de dire qu'il a la foi, s'il n'a pas les œuvres ? Cette foi peut-elle le sauver ? »</em> <span class="ref">Jacques 2:14</span> Même les démons croient, et cela ne les sauve pas. <em>« Tu crois qu'il y a un seul Dieu, tu fais bien ; les démons le croient aussi, et ils tremblent. »</em> <span class="ref">Jacques 2:19</span> Croire que Dieu existe et que le Christ est Sauveur, sans que cette foi se traduise en actes, c'est la foi des démons. <em>« La foi sans les œuvres est morte. »</em> <span class="ref">Jacques 2:26</span></p>
      <h2>La foi qui agit par la charité</h2>
      <p>Ce qui sauve, c'est la foi vivifiée par l'amour. <em>« Ce qui vaut, c'est la foi agissant par la charité. »</em> <span class="ref">Galates 5:6</span> Une foi sans charité, fût-elle entière, ne vaut rien. <em>« Quand j'aurais toute la foi jusqu'à transporter des montagnes, si je n'ai pas la charité, je ne suis rien. »</em> <span class="ref">1 Corinthiens 13:2</span> La foi seule, séparée de la charité et des œuvres qu'elle inspire, est précisément celle que l'Écriture déclare incapable de sauver.</p>
      <h2>Ce que l'Écriture exclut vraiment</h2>
      <p>On objecte que l'Écriture oppose ailleurs la foi aux œuvres et justifie l'homme sans elles. <em>« L'homme est justifié par la foi, sans les œuvres de la loi. »</em> <span class="ref">Romains 3:28</span> Mais les œuvres écartées ici sont les œuvres de la loi, la circoncision et les rites de l'Ancienne Alliance, et toute prétention de mériter par soi-même la première grâce, comme un salaire dû. <em>« À celui qui travaille, le salaire est compté comme une dette, non comme une grâce. »</em> <span class="ref">Romains 4:4</span> Le salut commence par pure grâce, que nul n'achète. <em>« C'est par la grâce que vous êtes sauvés, par la foi ; cela ne vient pas de vous, c'est le don de Dieu, et non des œuvres, afin que nul ne se glorifie. »</em> <span class="ref">Éphésiens 2:8-9</span> Ce que l'Écriture exclut, c'est l'homme qui se sauverait par ses propres forces et s'en glorifierait ; ce qu'elle exige, c'est la foi qui, une fois la grâce reçue, agit par la charité. Abraham le montre, lui sur qui Paul fonde précisément la justice par la foi. <em>« Abraham crut à Dieu, et cela lui fut compté comme justice. »</em> <span class="ref">Genèse 15:6</span> L'Écriture qui prononce cette parole la rapporte elle-même à l'acte : Jacques la cite après l'offrande d'Isaac, et y voit son accomplissement. <em>« Par les œuvres la foi fut rendue parfaite, et ainsi s'accomplit l'Écriture : Abraham crut à Dieu, et cela lui fut compté comme justice. »</em> <span class="ref">Jacques 2:22-23</span> La foi comptée à Abraham n'était pas une foi sans œuvre : c'est cette foi vivante, qui obéit jusqu'à offrir son fils, que Dieu lui a comptée comme justice.</p>
      <h2>Jugés sur les œuvres</h2>
      <p>Au dernier jour, chacun sera jugé sur ce qu'il aura fait, ce qui n'aurait aucun sens si la foi seule suffisait. <em>« Le Fils de l'homme rendra à chacun selon ses œuvres. »</em> <span class="ref">Matthieu 16:27</span> Le Christ décrit ce jugement par les actes accomplis ou négligés envers les plus petits, et c'est sur eux qu'il sépare les sauvés des perdus. <em>« Ce que vous avez fait à l'un de ces plus petits de mes frères, c'est à moi que vous l'avez fait. »</em> <span class="ref">Matthieu 25:40</span> Croire ne dispense pas d'agir, et le Christ le dit lui-même. <em>« Ce n'est pas celui qui me dit : Seigneur, Seigneur, qui entrera dans le royaume des cieux, mais celui qui fait la volonté de mon Père. »</em> <span class="ref">Matthieu 7:21</span></p>
      <h2>Rendu juste, non seulement déclaré</h2>
      <p>Dieu rend l'homme juste en lui donnant sa grâce, qui le renouvelle au-dedans et répand en lui la charité. La justification ne se réduit pas à une déclaration extérieure qui laisserait l'homme tel qu'il était : Dieu ne couvre pas le péché, il le guérit. <em>« L'amour de Dieu est répandu dans nos cœurs par l'Esprit Saint qui nous a été donné. »</em> <span class="ref">Romains 5:5</span> La grâce ainsi reçue agit, aime et œuvre : la foi qui sauve porte donc toujours avec elle la charité et les œuvres qu'elle inspire.</p>

      <h2>Ce qui n'excuse pas</h2>
      <p>L'excuse a sa limite. Celui qui pouvait atteindre la vérité et s'est bouché les yeux n'est pas couvert par son ignorance, puisqu'il l'a choisie. La création elle-même rend Dieu accessible à la raison, et qui refuse cette lumière se condamne. <em>« Ce qu'on peut connaître de Dieu est manifeste pour eux ; ses perfections invisibles se voient depuis la création du monde, de sorte qu'ils sont inexcusables. »</em> <span class="ref">Romains 1:19-20</span> Et là où l'Évangile a été annoncé, l'ignorance d'autrefois ne tient plus : la vérité offerte engage celui qui l'entend. <em>« Dieu, sans tenir compte des temps d'ignorance, annonce maintenant à tous les hommes, en tous lieux, qu'ils aient à se repentir. »</em> <span class="ref">Actes 17:30</span></p>

      <h2>L'interdit de consulter les morts</h2>
      <p>On objecte l'interdit de consulter les morts. <em>« Qu'on ne trouve chez toi personne qui interroge les morts. »</em> <span class="ref">Deutéronome 18:11</span> Cet interdit vise la nécromancie, qui veut forcer les défunts par la magie pour leur arracher un savoir caché. L'invocation des saints relève d'un tout autre ordre : elle s'adresse à des vivants établis en Dieu, et leur demande humblement une prière. L'Écriture montre d'ailleurs un défunt priant pour les vivants : Jérémie, mort depuis longtemps, y apparaît comme <em>« celui qui prie beaucoup pour le peuple et pour la ville sainte. »</em> <span class="ref">2 Maccabées 15:14</span></p>

      <p>On objecte ensuite l'idolâtrie, qui rend à une créature le culte d'adoration dû à Dieu seul. Ce culte n'appartient qu'à lui. <em>« Tu adoreras le Seigneur ton Dieu, et tu ne rendras de culte qu'à lui seul. »</em> <span class="ref">Matthieu 4:10</span> Prier un saint ou un ange relève d'un autre geste : on lui demande de prier Dieu pour nous, ce qui reconnaît que Dieu seul exauce, et que le saint ou l'ange n'est qu'un intercesseur. L'Église distingue ainsi deux honneurs que l'objection confond : l'adoration, que le grec nomme <em>latreia</em> (λατρεία), réservée à Dieu seul ; et la vénération, <em>douleia</em> (δουλεία), rendue aux saints et aux anges comme amis et serviteurs de Dieu.</p>

      <p>On objecte enfin l'unique médiateur. <em>« Il y a un seul Dieu, et un seul médiateur entre Dieu et les hommes, le Christ Jésus. »</em> <span class="ref">1 Timothée 2:5</span> Pour saisir cette unicité, il faut voir comment s'exerce la médiation. Le médiateur entre Dieu et les hommes est le prêtre, établi <em>« pour présenter des offrandes et des sacrifices pour les péchés. »</em> <span class="ref">Hébreux 5:1</span> Or le Christ est l'unique et éternel grand prêtre de l'alliance nouvelle : il n'offre pas le sang des animaux, mais le sien, entrant une fois pour toutes dans le sanctuaire. <em>« Avec son propre sang, ayant obtenu une rédemption éternelle. »</em> <span class="ref">Hébreux 9:12</span> Voilà ce que nul ne partage : un seul prêtre, un seul sacrifice, une seule rédemption.</p>
