      <p>Les anges sont des esprits créés par Dieu, sans corps, doués d'intelligence et de volonté. Ils se tiennent devant lui dans l'adoration et portent ses messages aux hommes. Le mot le dit : « ange » vient du grec <em>angelos</em> (ἄγγελος), le messager. L'Écriture les nomme de ses premières pages à ses dernières, témoins du monde invisible que Dieu a créé en même temps que le visible.</p>
      <h2>Des esprits créés</h2>
      <p>Les anges sont des créatures : ils ont commencé d'être, comme tout ce qui n'est pas Dieu. <em>« Par lui ont été créées toutes choses, dans les cieux et sur la terre, les visibles et les invisibles. »</em> <span class="ref">Colossiens 1:16</span> Ce sont de purs esprits, sans matière ni corps, et c'est pourquoi ils ne meurent pas. Chacun est une personne : il connaît et il aime, d'une intelligence plus vive et d'une volonté plus ferme que les nôtres. Quand l'Écriture leur prête des ailes ou un visage, elle parle par images, pour rendre sensible ce qui échappe aux sens.</p>
      <h2>Une multitude ordonnée</h2>
      <p>Les anges sont innombrables. Devant le trône de Dieu se presse une foule que nul ne compte : <em>« Des milliers de milliers le servaient, des myriades se tenaient devant lui. »</em> <span class="ref">Daniel 7:10</span> Cette multitude est disposée en degrés, que la tradition nomme les chœurs des anges, depuis les Séraphins et les Chérubins qui se tiennent au plus près de Dieu jusqu'aux anges envoyés vers les hommes. L'Écriture donne le nom de trois d'entre eux : Michel, qui combat pour Dieu, Gabriel, qui annonce, et Raphaël, qui accompagne et guérit.</p>
      <h2>Devant Dieu et auprès des hommes</h2>
      <p>La première œuvre des anges est l'adoration. Tournés vers Dieu, ils chantent sa sainteté sans fin : <em>« Saint, Saint, Saint est le Seigneur de l'univers ; toute la terre est remplie de sa gloire. »</em> <span class="ref">Isaïe 6:3</span> De cette louange ils passent au service : Dieu les envoie porter sa parole et accomplir son dessein. Gabriel est envoyé à Marie pour lui annoncer le Sauveur. Et ce service s'étend jusqu'à nous : <em>« Ne sont-ils pas tous des esprits au service de Dieu, envoyés pour ceux qui doivent hériter du salut ? »</em> <span class="ref">Hébreux 1:14</span></p>
      <h2>L'ange gardien</h2>
      <p>À chacun, Dieu donne un ange pour le garder. Le Christ le dit des plus petits : <em>« Leurs anges, dans les cieux, voient sans cesse la face de mon Père. »</em> <span class="ref">Matthieu 18:10</span> Cet ange veille, écarte le mal, éclaire et soutient, et porte nos prières devant Dieu : <em>« Il donnera pour toi ordre à ses anges de te garder dans toutes tes voies. »</em> <span class="ref">Psaume 91:11</span> Présence discrète et constante, il accompagne chaque vie, de la naissance à la rencontre avec Dieu.</p>
      <h2>L'épreuve et la chute</h2>
      <p>Comme l'homme, les anges ont été créés bons et libres, et appelés à choisir Dieu. Tous ne l'ont pas choisi. L'un des plus grands se dressa contre son Créateur, refusant de servir, voulant s'égaler à Dieu, et il entraîna derrière lui une part des anges. L'Écriture le montre par le dragon dont la queue balaie le ciel : <em>« Sa queue entraînait le tiers des étoiles du ciel, et les jeta sur la terre. »</em> <span class="ref">Apocalypse 12:4</span> Ces étoiles abattues sont les anges qui tombèrent avec lui. Vient alors le combat, et la défaite du rebelle : <em>« Il y eut un combat dans le ciel : Michel et ses anges combattirent le dragon… et le grand dragon fut précipité, l'antique serpent, appelé le diable et Satan, le séducteur du monde entier. »</em> <span class="ref">Apocalypse 12:7-9</span> Ces esprits déchus sont les démons ; leur chef est Satan, dont le nom signifie l'accusateur. <em>« Je voyais Satan tomber du ciel comme l'éclair. »</em> <span class="ref">Luc 10:18</span></p>
      <h2>Un choix sans retour</h2>
      <p>La faute des anges est sans retour, et c'est leur manière même de connaître et de choisir qui le veut. Nous, les hommes, nous connaissons peu à peu : par les sens, par le raisonnement, en découvrant une chose après l'autre ; c'est pourquoi nous changeons d'avis, quand le temps nous fait voir ce que nous n'avions pas encore vu. Un pur esprit ne connaît pas de cette manière : il n'apprend pas par fragments, il saisit d'un seul regard, tout entier et d'un coup, ce qu'il connaît. Sa volonté suit cette connaissance complète : il choisit en sachant déjà tout ce que son choix engage, sans rien qui lui reste caché et puisse plus tard le faire revenir en arrière. Or revenir sur un choix suppose l'un de ces deux ressorts : voir ce qu'on n'avait pas vu, ou changer avec le temps. L'ange n'a ni l'un ni l'autre. Son premier choix est donc son choix définitif, non parce que Dieu lui interdirait de se reprendre, mais parce que plus rien ne peut l'y porter. Les anges fidèles sont ainsi fixés pour toujours dans la lumière ; les déchus, dans leur refus, et ce sont les démons. Ils gardent une puissance, mais limitée et déjà vaincue : ils tentent et accusent sans pouvoir contraindre. La Croix du Christ a brisé leur empire, et leur fin est arrêtée : <em>« Allez loin de moi, maudits, dans le feu éternel préparé pour le diable et ses anges. »</em> <span class="ref">Matthieu 25:41</span></p>

      <p>Le péché est un refus libre de l'amour de Dieu. Il consiste à préférer sa propre volonté à la volonté divine et à transgresser la loi de Dieu, qui exprime cet amour : <em>« Le péché est la transgression de la loi. »</em> <span class="ref">1 Jean 3:4</span> Tout péché comporte ainsi un double mouvement : l'homme se tourne vers un bien moindre et s'éloigne de Dieu, qui est sa fin et son bien. Il se commet en pensée, en parole, par action, et par omission : <em>« Celui qui sait faire le bien et ne le fait pas commet un péché. »</em> <span class="ref">Jacques 4:17</span></p>
      <h2>Originel et personnel</h2>
      <p>Un même mot recouvre deux réalités. Le péché originel est l'état de privation dans lequel tout homme naît, hérité de la faute des origines. Le péché personnel est l'acte que chacun commet par sa propre volonté, une fois venu l'âge de raison. Tous y sont exposés : <em>« Tous ont péché et sont privés de la gloire de Dieu. »</em> <span class="ref">Romains 3:23</span></p>
      <h2>Le péché mortel</h2>
      <p>Les péchés personnels ne pèsent pas tous le même poids, et l'Écriture le marque elle-même : <em>« Il y a tel péché qui mène à la mort, et il y a tel péché qui ne mène pas à la mort. »</em> <span class="ref">1 Jean 5:16-17</span> Le plus grave, le péché mortel, rompt l'amitié avec Dieu et fait perdre la grâce sanctifiante, cette vie divine déposée dans l'âme. Trois conditions, réunies ensemble, le constituent. Il faut d'abord une matière grave, un acte qui contredit gravement la loi de Dieu, comme la transgression des grands commandements du Décalogue : le meurtre, l'adultère, le vol important, le faux témoignage, le mépris de Dieu. Il faut ensuite la pleine conscience de cette gravité, savoir que l'on fait un mal sérieux. Il faut enfin le plein consentement, le vouloir librement, sans y être contraint. Que l'une de ces conditions manque, et la faute n'atteint plus ce degré : une ignorance qu'on ne pouvait surmonter, une liberté entamée par la peur ou la passion en allègent le poids. Là où les trois se rejoignent, le péché donne la mort à l'âme, qui perd la charité et la vie de la grâce : <em>« Le salaire du péché, c'est la mort. »</em> <span class="ref">Romains 6:23</span> L'homme demeure vivant, coupé de sa fin ; et cette rupture, persévérée sans repentir, devient la séparation éternelle d'avec Dieu.</p>
      <h2>Le péché véniel</h2>
      <p>Le péché véniel blesse la charité sans la détruire : l'amitié avec Dieu demeure, affaiblie. Même le juste y tombe : <em>« Nous bronchons tous, et de bien des manières. »</em> <span class="ref">Jacques 3:2</span> Sa matière est légère, ou bien la conscience ou le consentement n'y sont que partiels. Répété et consenti, il refroidit l'amour et dispose peu à peu au péché grave ; il laisse aussi dans l'âme une dette à purifier, que le purgatoire achève d'acquitter.</p>
      <h2>Sa racine</h2>
      <p>Toute faute naît d'un même mouvement : se préférer à Dieu. C'est du cœur qu'elle monte : <em>« Du cœur viennent les mauvaises pensées, meurtres, adultères, débauches, vols, faux témoignages, blasphèmes. »</em> <span class="ref">Matthieu 15:19</span> Au plus profond se tient l'orgueil, qui place le moi au centre et d'où sortent les autres péchés. De lui naissent trois convoitises, où l'homme cherche hors de Dieu ce que Dieu seul donne : <em>« la convoitise de la chair, la convoitise des yeux et l'orgueil de la vie. »</em> <span class="ref">1 Jean 2:16</span> De ces convoitises montent les sept penchants qu'on nomme capitaux, parce qu'ils sont les têtes d'où jaillissent les autres fautes : l'orgueil, l'avarice, l'envie, la colère, la luxure, la gourmandise et la paresse, présentés un à un dans <a href="#/article/les-peches-capitaux">l'article qui leur est consacré</a>. Le péché appauvrit ainsi l'homme, en le coupant de la source même de sa vie.</p>
      <h2>Son pardon</h2>
      <p>Dieu ne cesse d'offrir son pardon à qui revient vers lui. Le Christ a porté le péché du monde pour en délivrer les hommes, et il a confié à son Église le pouvoir de remettre les péchés : <em>« Ceux à qui vous remettrez les péchés, ils leur seront remis. »</em> <span class="ref">Jean 20:23</span> Le péché mortel se relève dans le sacrement de pénitence, qui rend à l'âme la grâce perdue et la réconcilie avec Dieu. Le péché véniel s'efface par bien des chemins : la contrition du cœur, la prière, l'aumône, les sacramentaux, et surtout l'Eucharistie, qui fortifie la charité. À celui qui reconnaît sa faute, la miséricorde est toujours promise : <em>« Si nous confessons nos péchés, il est fidèle et juste pour nous les pardonner. »</em> <span class="ref">1 Jean 1:9</span></p>

      <h2>L'orgueil</h2>
      <p>L'orgueil est le désir désordonné de sa propre grandeur, qui place le moi là où Dieu devrait être. Il est la tête de tous : <em>« Le commencement de l'orgueil, c'est de se détourner du Seigneur. »</em> <span class="ref">Siracide 10:12</span> De lui sortent la vaine gloire, le mépris d'autrui, la révolte contre Dieu. L'humilité le guérit, qui rend à Dieu la première place et reçoit tout de lui.</p>

      <h2>La paresse</h2>
      <p>La paresse, ou acédie, est la tristesse devant le bien spirituel, le dégoût de l'effort qu'il demande. Elle refroidit la prière et fait négliger les devoirs envers Dieu. <em>« Parce que tu es tiède, je te vomirai de ma bouche. »</em> <span class="ref">Apocalypse 3:16</span> La ferveur la guérit, l'amour qui se remet à l'œuvre et persévère.</p>

      <p>Le péché originel est l'état de privation de la grâce sanctifiante dans lequel tout homme vient au monde. La grâce sanctifiante est la vie divine déposée dans l'âme, qui fait de nous des enfants de Dieu et ses amis. Le nouveau-né en est privé dès sa naissance : il reçoit en héritage la conséquence de la faute commise aux origines de l'humanité.</p>
      <h2>La faute des origines</h2>
      <p>Au commencement, Dieu avait élevé l'homme au-dessus de sa propre nature. Il l'avait comblé de la grâce sanctifiante et de dons ajoutés à sa condition, les dons préternaturels : un corps soustrait à la mort, des passions parfaitement soumises à la raison, une harmonie sans faille avec Dieu, avec lui-même et avec toute la création. C'est ce qu'on appelle la justice originelle, l'état de sainteté dans lequel l'homme fut créé. Mis à l'épreuve de l'obéissance, Adam a préféré sa propre volonté à celle de Dieu, voulant décider seul du bien et du mal. <em>« Vous serez comme des dieux, connaissant le bien et le mal. »</em> <span class="ref">Genèse 3:5</span> En se détournant ainsi de Dieu, il a perdu ce don pour lui et pour toute sa descendance. Ce premier refus est la faute des origines.</p>
      <h2>Un héritage transmis à tous</h2>
      <p>Ce qu'un seul a perdu, tous l'ont perdu avec lui, car toute l'humanité tient de lui sa nature, comme les membres tiennent leur vie de la tête. Adam ne se tenait pas devant Dieu comme un individu isolé : il portait en lui la famille humaine entière, et ce qu'il avait reçu, puis perdu, il devait le transmettre. <em>« Par un seul homme le péché est entré dans le monde, et par le péché la mort, et la mort a passé sur tous les hommes. »</em> <span class="ref">Romains 5:12</span> Cet état atteint l'homme dès sa conception. <em>« Voici, je suis né dans la faute, et ma mère m'a conçu dans le péché. »</em> <span class="ref">Psaume 51:7</span> On l'appelle péché par analogie. Le nouveau-né vient au monde privé de la sainteté pour laquelle il était fait, séparé de Dieu à la racine de son être : cette privation reçue en héritage porte le nom de péché, parce qu'elle est l'absence de la grâce et la séparation d'avec Dieu, lors même qu'aucun acte mauvais n'a encore été posé. Elle se contracte par la naissance et se transmet par la génération.</p>
      <h2>Une nature blessée</h2>
      <p>La perte de la justice originelle laisse l'homme avec une nature affaiblie. Ses passions échappent au gouvernement de la raison : c'est la concupiscence, l'inclination au mal qui rend le bien difficile et le mal attirant, ce combat intérieur que connaît tout homme. <em>« Je ne fais pas le bien que je veux, et je fais le mal que je ne veux pas. »</em> <span class="ref">Romains 7:19</span> À cette blessure de l'âme s'ajoute celle du corps : la souffrance et la mort entrent dans la condition humaine. <em>« Tu es poussière, et tu retourneras à la poussière. »</em> <span class="ref">Genèse 3:19</span> Au cœur de tout cela demeure la privation de la grâce sanctifiante : c'est elle qui constitue proprement le péché originel, l'état dans lequel tout homme vient au monde, et c'est d'elle que découle tout le reste. Le Christ la rend à l'âme au baptême.</p>
      <h2>Le nouvel Adam</h2>
      <p>Le Christ est venu rendre ce que le premier homme avait perdu. Il est le nouvel Adam, tête d'une humanité renouvelée, qui communique la vie là où le premier avait communiqué la mort. <em>« Comme tous meurent en Adam, de même tous revivront dans le Christ. »</em> <span class="ref">1 Corinthiens 15:22</span> Ce qu'un seul avait perdu pour tous, un seul le rend à tous. <em>« Comme par la désobéissance d'un seul beaucoup ont été rendus pécheurs, par l'obéissance d'un seul beaucoup seront rendus justes. »</em> <span class="ref">Romains 5:19</span> Le baptême efface le péché originel et rend à l'âme la grâce sanctifiante. Les dons préternaturels demeurent perdus : la concupiscence, la souffrance et la mort restent dans la vie du baptisé, désormais assumées dans la grâce du Christ et ordonnées à la vie éternelle. La concupiscence demeure alors une simple faiblesse à combattre : tant que la volonté n'y consent pas, l'homme ne pèche pas, et sa résistance devient même une occasion de mérite.</p>
      <h2>Le Christ et Marie</h2>
      <p>Deux êtres n'ont jamais connu le péché originel. Le Christ, parce qu'il est le Fils de Dieu fait homme, conçu par l'Esprit Saint, est entré dans notre humanité sans en contracter la déchéance. Marie, sa mère, en fut préservée dès le premier instant de sa conception, par un privilège unique accordé en vue des mérites de son Fils : c'est l'Immaculée Conception. Le nouvel Adam et la nouvelle Ève réparent ainsi ce que le premier couple avait perdu.</p>

      <h2>Les dons préternaturels</h2>
      <p>Le second est un ensemble de dons dits préternaturels. Le mot signifie au-delà de la nature : ces dons portaient la nature humaine au-dessus de ses forces propres, dans le corps et dans les facultés. La tradition en compte quatre. L'intégrité, la pleine soumission des passions à la raison. L'immortalité, l'exemption de la mort. L'impassibilité, l'exemption de la souffrance. Et une connaissance infuse. Créés à l'âge adulte, sans enfance ni parents pour les instruire, Adam et Ève recevaient de Dieu le savoir nécessaire pour conduire leur vie et élever leur descendance. C'est le seul des quatre dons qui ne se serait pas transmis : leurs enfants, nés petits et grandissant sous leur conduite, auraient acquis ce savoir par l'éducation, à la manière de tout homme qui l'apprend des siens. Les trois autres dons seraient passés à toute la descendance.</p>
      <h2>L'intégrité</h2>
      <p>L'intégrité est l'ordre parfait du dedans de l'homme : ses passions, ces mouvements spontanés de l'âme comme le désir, la crainte, la joie ou la colère, suivaient sa raison, et sa raison demeurait tournée vers Dieu. L'homme était accordé à lui-même, sans division au-dedans.</p>
      <p>Cet ordre descendait de Dieu. La raison gouvernait les passions parce qu'elle se tenait elle-même sous Dieu ; le corps obéissait à l'âme parce que l'âme obéissait à son Créateur. L'intégrité reposait donc sur cette union à Dieu, non sur une force que l'homme aurait tenue de lui-même : tant que l'âme demeurait sous Dieu, tout demeurait en ordre sous l'âme. Lorsque la raison se détourna de Dieu, elle perdit du même coup son emprise sur ce qui lui était soumis, et le désordre gagna de proche en proche.</p>
      <p>Les passions demeuraient vives, parfaitement tenues sous la raison. L'homme connaissait la faim, le désir, la crainte ; ces mouvements ne se levaient qu'au commandement de la raison et cédaient à son jugement. Le sensible attendait l'esprit, et l'esprit n'avait pas à lutter pour se faire obéir. L'homme était en paix avec lui-même.</p>
      <p>Cet état échappe à notre expérience, car nous ne connaissons que l'homme divisé. Nous saisissons l'intégrité par ce qui nous manque : le désir qui devance la raison, le penchant mauvais qui demeure quand le bien est vu, la chair qui pèse contre l'esprit. <em>« Je vois dans mes membres une autre loi, qui lutte contre la loi de ma raison. »</em> <span class="ref">Romains 7:23</span> Ce désordre a un nom, la concupiscence : l'inclination au mal que la faute des origines a laissée en tout homme. Elle est, en chacun, la marque de l'intégrité perdue.</p>
      <p>L'Écriture en donne le signe au seuil du récit, lorsqu'elle montre l'homme et la femme nus sans en éprouver de honte. <em>« Ils étaient tous deux nus, l'homme et sa femme, et ils n'en avaient point de honte. »</em> <span class="ref">Genèse 2:25</span> Le corps était alors transparent à l'esprit : rien en lui n'échappait à la volonté, rien ne se levait que l'âme dût soumettre malgré elle. La honte qui paraît après la faute dit l'inverse : l'homme découvre dans sa chair des mouvements qui le devancent et lui échappent, et il se voile devant ce qu'il ne gouverne plus.</p>

      <p>En se détournant de Dieu, l'homme a brisé d'un seul coup les trois accords que la justice originelle tenait ensemble. L'amitié avec Dieu d'abord : l'homme se cache de celui qu'il recevait comme un ami. Puis l'accord intérieur : les passions échappent à la raison, et la honte paraît là où régnait la paix. <em>« Leurs yeux à tous deux s'ouvrirent, et ils connurent qu'ils étaient nus. »</em> <span class="ref">Genèse 3:7</span> Enfin l'accord avec le monde : la terre se fait rebelle, le travail devient peine, et le corps retourne à la poussière. <em>« Tu mangeras ton pain à la sueur de ton front, jusqu'à ce que tu retournes à la terre d'où tu as été tiré. »</em> <span class="ref">Genèse 3:19</span></p>
      <h2>Le péché originel transmis</h2>
      <p>Cet état était une faveur entièrement gratuite, que la nature ne pouvait réclamer. Adam l'a perdu pour lui et pour toute sa descendance, et tout homme vient désormais au monde privé de la grâce, dans une nature blessée, inclinée au désordre et soumise à la mort. <em>« Par un seul homme le péché est entré dans le monde, et par le péché la mort, et la mort a passé sur tous les hommes. »</em> <span class="ref">Romains 5:12</span> Cette privation est le péché originel.</p>
      <h2>Restaurée dans le Christ</h2>
      <p>Le Christ rend à l'homme l'essentiel : par le baptême, la grâce sanctifiante est rendue à l'âme et l'amitié de Dieu retrouvée. Les dons préternaturels demeurent en attente : la pleine harmonie sera rendue à la résurrection, quand le corps lui-même ressuscitera incorruptible. <em>« Nous gémissons en nous-mêmes, attendant la rédemption de notre corps. »</em> <span class="ref">Romains 8:23</span> Ce que la chute avait défait, le Christ le restaure et le porte plus haut encore. <em>« Semé corruptible, il ressuscite incorruptible. »</em> <span class="ref">1 Corinthiens 15:42</span></p>

      <p>Les passions sont les mouvements spontanés de l'âme devant ce qu'elle perçoit comme un bien ou un mal : le désir, la joie, la crainte, la colère. Elles appartiennent à la nature humaine et accompagnent toute vie sensible. En elles-mêmes, elles sont moralement neutres : leur valeur tient à la fin vers laquelle la raison et la volonté les conduisent.</p>
      <h2>Deux registres de l'âme</h2>
      <p>La tradition les répartit en deux familles, selon ce qui les éveille. Les premières, dites concupiscibles, naissent devant un bien ou un mal sensible, c'est-à-dire perçu par les sens, une nourriture, un visage, un danger, et portent vers lui ou en détournent : l'amour et la haine, le désir et l'aversion, la joie et la tristesse. Les secondes, dites irascibles, surgissent devant un bien difficile à atteindre ou un mal difficile à éviter, et soutiennent l'effort : l'espérance et le découragement, l'audace et la crainte, et la colère qui se dresse contre l'obstacle. Toutes sont des forces données à l'homme pour qu'il agisse, et qui attendent d'être dirigées.</p>
      <h2>Ordonnées par la raison</h2>
      <p>Une passion sert le bien quand la raison la gouverne : la colère devant l'injustice, le désir du bien, la crainte qui détourne du mal. Elle nuit quand elle emporte l'homme hors de la raison, vers ce qui l'éloigne de Dieu. La maturité morale les intègre : elle les ordonne, les éclaire et les met au service de l'amour du bien. Le Christ lui-même les a connues dans leur pureté : ému de compassion, pleurant son ami, indigné devant la dureté des cœurs, brûlant de zèle pour la maison de Dieu sans jamais quitter l'amour. <em>« Le zèle de ta maison me dévore. »</em> <span class="ref">Jean 2:17</span></p>
      <h2>L'harmonie originelle</h2>
      <p>Avant la chute, l'homme possédait l'intégrité : ses passions suivaient la raison sans résistance, dans une parfaite harmonie. Ce don appartenait à la justice originelle, l'état de droiture dans lequel il fut créé. Le péché l'a perdu, et le désordre est entré dans la nature humaine.</p>
      <h2>La concupiscence</h2>
      <p>Depuis le péché originel, les passions n'obéissent plus spontanément à la raison : elles tirent souvent vers le mal avant même que la volonté ait choisi. Ce désordre intérieur porte le nom de concupiscence : l'inclination au péché que la faute des origines a laissée en tout homme. <em>« La chair convoite contre l'esprit, et l'esprit contre la chair. »</em> <span class="ref">Galates 5:17</span> L'Écriture en distingue trois pentes, par lesquelles le monde sollicite le cœur : <em>« la convoitise de la chair, la convoitise des yeux et l'orgueil de la vie »</em> <span class="ref">1 Jean 2:16</span>, soit la recherche du plaisir, l'avidité de posséder, et l'orgueil qui veut s'élever.</p>

      <p>Le salut est l'œuvre par laquelle Dieu délivre l'homme du péché et de la mort, et lui donne part à sa propre vie. Toute l'histoire sainte y tend, depuis la promesse faite après la chute jusqu'à son accomplissement dans le Christ, venu pour cela. <em>« Le Fils de l'homme est venu chercher et sauver ce qui était perdu. »</em> <span class="ref">Luc 19:10</span></p>
      <h2>De quoi l'homme est sauvé</h2>
      <p>L'homme est sauvé d'abord du péché, le mal dont tous les autres découlent. Le péché est une rupture avec Dieu : il détourne l'homme de sa fin et le prive de la vie de la grâce, qu'il ne tenait que de lui. Il enchaîne aussi celui qui le commet, le rendant esclave de ce qu'il croyait choisir librement. <em>« Quiconque commet le péché est esclave du péché. »</em> <span class="ref">Jean 8:34</span> De cette servitude, nul ne se rachète par ses propres forces.</p>
      <p>De ce péché vient la mort, qui en est le salaire. Elle est entrée dans le monde par la faute du premier homme et atteint désormais toute sa descendance. <em>« Par un seul homme le péché est entré dans le monde, et par le péché la mort. »</em> <span class="ref">Romains 5:12</span> La mort du corps en annonce une plus grave, celle de l'âme séparée de Dieu pour toujours. <em>« Le salaire du péché, c'est la mort ; mais le don de Dieu, c'est la vie éternelle. »</em> <span class="ref">Romains 6:23</span></p>
      <p>Derrière le péché et la mort se tient un ennemi personnel. Le démon a séduit l'homme dès l'origine et l'a entraîné dans la faute ; par cette chute, l'homme est passé sous son pouvoir. Sa domination s'étend aussi loin que le péché : celui qui s'y livre appartient à celui qui l'y a conduit. <em>« Celui qui commet le péché est du diable, car le diable pèche dès le commencement. »</em> <span class="ref">1 Jean 3:8</span> L'Écriture le nomme le prince de ce monde, et tient l'homme pécheur pour son captif. De ce maître, l'homme ne se délivre pas par ses propres forces ; seul un plus fort que lui pouvait l'en arracher.</p>
      <p>De tout cela le Christ délivre l'homme. Il le réconcilie avec Dieu et lui rend la grâce que le péché lui avait ôtée ; il triomphe de la mort par sa Résurrection et lui ouvre la vie éternelle ; il brise l'empire du démon et l'arrache à celui qui le tenait captif, lui rendant la condition de fils de Dieu. <em>« Il nous a délivrés de la puissance des ténèbres et nous a transportés dans le royaume de son Fils bien-aimé. »</em> <span class="ref">Colossiens 1:13</span></p>
      <h2>Par le Christ seul</h2>

      <h2>Par la Croix et la Résurrection</h2>
      <p>Le Christ sauve en prenant sur lui le péché du monde. Par sa mort sur la Croix, il détruit le péché ; par sa Résurrection, il vainc la mort et ouvre à l'homme la vie. Là se mesure l'amour de Dieu. <em>« Dieu a tant aimé le monde qu'il a donné son Fils unique, afin que quiconque croit en lui ait la vie éternelle. »</em> <span class="ref">Jean 3:16</span></p>
      <h2>Racheté à grand prix</h2>
      <p>Sauver, dans l'Écriture, se dit d'abord racheter. Racheter, c'est payer le prix qui rend la liberté à un captif ; et l'homme était captif du péché, livré à un maître dont il ne pouvait se délier par ses seules forces. Le Christ paie ce prix en donnant sa vie. <em>« Le Fils de l'homme est venu donner sa vie en rançon pour la multitude. »</em> <span class="ref">Marc 10:45</span> Ce prix dit la valeur de ce qu'il a fallu donner pour nous arracher au mal : le sang même du Fils. <em>« Vous avez été rachetés non par des biens périssables, l'argent ou l'or, mais par le sang précieux du Christ. »</em> <span class="ref">1 Pierre 1:18-19</span> C'est ce que nomme le mot rédemption, du latin <em>redimere</em>, racheter.</p>
      <h2>Un don de la grâce</h2>
      <p>Le salut est offert gratuitement, avant tout mérite. L'initiative vient tout entière de Dieu : c'est lui qui sauve, par pure grâce, et l'homme reçoit de lui ce qu'aucune force humaine ne pouvait obtenir. <em>« C'est par la grâce que vous êtes sauvés, par le moyen de la foi ; cela ne vient pas de vous, c'est le don de Dieu. »</em> <span class="ref">Éphésiens 2:8</span></p>
      <h2>Devenir fils de Dieu</h2>
      <p>Par la grâce, Dieu fait du sauvé son enfant, l'adoptant dans son Fils unique. <em>« Dieu a envoyé son Fils, afin que nous recevions l'adoption filiale. »</em> <span class="ref">Galates 4:4-5</span> Cette adoption donne part à la vie même de Dieu, à sa nature. <em>« Il vous a donné de devenir participants de la nature divine. »</em> <span class="ref">2 Pierre 1:4</span> La tradition résume ce mystère d'un mot : Dieu s'est fait homme pour que l'homme devienne dieu, non par nature, mais par grâce, élevé jusqu'à partager ce que Dieu est. C'est l'œuvre commencée au baptême et achevée dans la gloire, lorsque l'homme verra Dieu et vivra de sa vie.</p>
      <h2>Accueilli dans une foi vivante</h2>
      <p>Ce don attend pourtant d'être reçu. L'homme accueille le salut par la foi, qui s'ouvre dans la conversion et entre dans la vie nouvelle par le baptême. <em>« Si tu confesses de ta bouche que Jésus est Seigneur et si tu crois dans ton cœur que Dieu l'a ressuscité des morts, tu seras sauvé. »</em> <span class="ref">Romains 10:9</span> Cette foi est vivante : elle se montre dans la charité et dans les œuvres qu'elle inspire ; une foi qui n'agirait pas serait morte. <em>« Ce qui vaut, c'est la foi agissant par la charité. »</em> <span class="ref">Galates 5:6</span></p>
      <h2>La coopération de l'homme</h2>
      <p>Le salut est l'œuvre de Dieu, et l'homme y travaille librement. La grâce associe l'homme à son propre salut : elle le porte, l'éveille et le fortifie, et il y répond par toute sa vie, jusqu'au bout. <em>« Travaillez à votre salut avec crainte et tremblement, car c'est Dieu qui opère en vous le vouloir et le faire. »</em> <span class="ref">Philippiens 2:12-13</span> Les deux agissent ensemble, à deux niveaux différents : Dieu agit le premier et de l'intérieur, et c'est lui qui rend l'homme capable d'agir, en sorte que sa réponse libre est tout entière un don de Dieu et tout entière la sienne.</p>
      <h2>Offert à tous</h2>
      <p>Dieu n'exclut personne de cette offre. <em>« Dieu veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. »</em> <span class="ref">1 Timothée 2:4</span> Le Christ est mort pour tous, et sa grâce rejoint, par des voies que Dieu seul connaît, ceux mêmes qui n'ont pas connu l'Évangile, pourvu qu'ils cherchent Dieu d'un cœur droit.</p>
      <h2>Déjà donné, pas encore achevé</h2>
      <p>Le salut se reçoit en trois temps. Il est acquis une fois pour toutes à la Croix, où le Christ a tout accompli. Il se reçoit maintenant, dans la grâce et les sacrements, où le sauvé vit déjà de la vie nouvelle. Et il s'achèvera au dernier jour, lorsque l'homme verra Dieu face à face. Le chrétien est donc déjà sauvé, et l'attend encore. <em>« C'est en espérance que nous sommes sauvés. »</em> <span class="ref">Romains 8:24</span></p>

      <h2>Les « frères de Jésus »</h2>
      <p>Les Évangiles parlent à plusieurs reprises des « frères de Jésus ». On y a vu une objection à ce dogme : si Jésus avait des frères, sa mère aurait eu d'autres enfants. L'Écriture elle-même dissipe la difficulté.</p>
      <p>Dans la langue de la Bible, le mot « frère » déborde la seule fratrie. L'hébreu, comme l'araméen que parlait Jésus, n'a pas de terme distinct pour le cousin ou le neveu : un même mot couvre toute la parenté proche. Ainsi Abraham appelle Lot son frère, alors que Lot est son neveu : <em>« Car nous sommes frères. »</em> <span class="ref">Genèse 13:8</span> Les Évangiles, écrits en grec sur ce fond sémitique, gardent cet usage : ils désignent les « frères » de Jésus par le mot <em>adelphos</em> (ἀδελφός), qui s'étend aux cousins comme aux parents plus éloignés.</p>

      <p>La virginité de Marie annonce une humanité nouvelle, qui ne naît plus de la chair mais de Dieu : <em>« Ils ne sont pas nés du sang, ni de la volonté de la chair, ni de la volonté de l'homme, mais de Dieu. »</em> <span class="ref">Jean 1:13</span> En Marie commence cette naissance d'en haut, que recevront à leur tour tous ceux qui renaissent dans le Christ.</p>

      <h2>Une mère engendre une personne</h2>
      <p>Une mère met au monde quelqu'un, une personne, et non une nature. On ne dit jamais d'une femme qu'elle est mère d'une humanité ou d'une intelligence : elle est mère de tel être précis, de celui qu'elle a porté et enfanté. Ce qu'elle transmet, c'est la nature ; celui qu'elle enfante, c'est une personne.</p>
      <h2>Et cette personne est Dieu</h2>
      <p>Or la personne que Marie a conçue est le Fils éternel de Dieu, le Verbe qui a pris chair en elle : <em>« Le Verbe s'est fait chair. »</em> <span class="ref">Jean 1:14</span> Celui qu'elle a porté en son sein est pleinement Dieu et pleinement homme, une seule personne en deux natures. Élisabeth la salue déjà comme la mère de son Seigneur : <em>« Comment m'est-il donné que la mère de mon Seigneur vienne jusqu'à moi ? »</em> <span class="ref">Luc 1:43</span></p>
      <h2>Ce qui se dit de la personne</h2>
      <p>De cette unité découle une règle de langage que l'Église nomme la communication des idiomes. Les idiomes sont les propriétés de chaque nature ; et comme le Christ est une seule personne, ce qui revient à l'une ou l'autre de ses natures s'attribue à cette unique personne, sous quelque nom qu'on la désigne. On peut donc dire que le Fils de Dieu est né, a souffert et est mort, bien que naître et mourir appartiennent à sa seule nature humaine : c'est le même qui agit et pâtit dans les deux. La règle porte sur la personne, non sur la nature prise à part : on dit que Dieu est né, parce que celui qui est né est Dieu, sans dire pour autant que la divinité serait née, car elle est sans commencement. L'Écriture parle déjà ainsi, attribuant à Dieu ce qui s'est accompli dans la chair : elle dit que les hommes ont crucifié <em>« le Seigneur de gloire »</em> <span class="ref">1 Corinthiens 2:8</span>, et que Dieu s'est acquis l'Église <em>« par son propre sang »</em> <span class="ref">Actes 20:28</span>. Par cette même règle, Marie, qui a conçu et enfanté cette personne selon sa nature humaine, est Mère de Dieu, et non la mère du seul homme Jésus.</p>
      <h2>Sans être source de la divinité</h2>
      <p>Le titre n'enferme donc aucune confusion. Marie ne donne pas à son Fils son être divin, mais sa nature humaine : c'est en elle et d'elle que Dieu s'est fait homme. Elle est Mère de Dieu parce que celui qu'elle enfante est Dieu, non parce qu'elle serait à la source de sa divinité.</p>

      <p>Le Seigneur lie le salut au baptême. <em>« En vérité, en vérité, je te le dis, nul, s'il ne naît de l'eau et de l'Esprit, ne peut entrer dans le royaume de Dieu. »</em> <span class="ref">Jean 3:5</span> Le baptême d'eau est la voie que le Christ a donnée pour recevoir la grâce qui sauve, et l'Église ne connaît pas d'autre moyen assuré.</p>
      <h2>Le baptême de désir</h2>
      <p>Celui qui désire le baptême et meurt avant de le recevoir obtient la grâce par ce désir même. Le désir est explicite chez le catéchumène, qui demande le baptême et se prépare à le recevoir. Il est implicite chez celui qui cherche Dieu d'un cœur sincère et accomplit sa volonté selon ce qu'il en connaît : sans nommer le Christ, il le désire déjà en désirant le bien et la vérité. L'Écriture reconnaît cette loi inscrite au fond de l'homme. <em>« Quand des païens, qui n'ont pas la loi, font naturellement ce qu'elle ordonne, ils montrent que l'œuvre de la loi est écrite dans leur cœur. »</em> <span class="ref">Romains 2:14-15</span> Dans tous les cas, c'est la charité qui donne au désir sa valeur, car l'amour de Dieu contient en germe tout ce que le baptême confère.</p>

      <h2>Le larron à la croix</h2>

      <h2>Dieu reste libre au-delà de ses sacrements</h2>
      <p>Le baptême demeure nécessaire, et nul ne peut le négliger en se réservant au désir ou au sang. Mais Dieu, qui a attaché le salut au sacrement, n'est pas lui-même enchaîné à ses signes : il peut donner quand il veut la grâce qu'ils contiennent. C'est pourquoi l'Écriture affirme que Dieu <em>« veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. »</em> <span class="ref">1 Timothée 2:4</span> Le baptême de désir et le baptême de sang sont la manière dont cette volonté rejoint ceux que l'eau n'a pas atteints.</p>

      <h2>La promesse faite à Pierre</h2>
      <p>Le Christ a bâti son Église sur Pierre et lui a confié la garde de la foi. Il lui dit : <em>« Tu es Pierre, et sur cette pierre je bâtirai mon Église, et les portes de l'enfer ne prévaudront pas contre elle. »</em> <span class="ref">Matthieu 16:18</span> Et la veille de sa Passion : <em>« J'ai prié pour toi, afin que ta foi ne défaille pas ; et toi, quand tu seras revenu, affermis tes frères. »</em> <span class="ref">Luc 22:32</span> Le Seigneur prie lui-même pour que la foi de Pierre tienne, et lui donne d'affermir les autres. L'infaillibilité prolonge cette prière du Christ sur le successeur de Pierre.</p>

    contenu: `
      <p>Le Credo confesse la communion des saints. Elle désigne l'union de tous les membres de l'Église dans le Christ : les fidèles qui vivent encore sur la terre, les âmes qui se purifient avant de voir Dieu, et les bienheureux qui le contemplent déjà. Cette union ne se rompt pas à la mort, et elle permet aux uns de prier pour les autres.</p>

      <p>L'Église est un corps dont le Christ est la tête, et tous les baptisés en sont les membres. L'Écriture en tire leur solidarité : <em>« Si un membre souffre, tous les membres souffrent avec lui ; si un membre est honoré, tous se réjouissent avec lui. »</em> <span class="ref">1 Corinthiens 12:26</span> Ce corps dépasse les frontières de la mort. Trois états le composent : ceux qui marchent encore vers Dieu sur la terre, ceux qui achèvent leur purification, et ceux qui le voient déjà. Tous tiennent au même Christ, et tous communient dans les mêmes biens, la grâce, la prière, la charité.</p>

      <p>Les bienheureux du ciel vivent pleinement en Dieu. Jésus l'affirme en parlant des patriarches morts depuis des siècles : <em>« Dieu n'est pas le Dieu des morts, mais des vivants. »</em> <span class="ref">Matthieu 22:32</span> Les saints le contemplent face à face, et de cette vision ils tirent une vie plus haute que la nôtre. Ils demeurent unis à nous dans le Christ, attentifs à ceux qu'ils ont précédés.</p>
      <h2>Ils prient pour nous</h2>
      <p>Cette vie des saints est tout entière tournée vers Dieu et vers l'amour. Leur charité ne s'éteint pas au seuil du ciel ; elle s'achève, et les porte à prier pour ceux qui cheminent encore. L'Apocalypse montre les élus présentant devant Dieu <em>« des coupes d'or pleines de parfums, qui sont les prières des saints. »</em> <span class="ref">Apocalypse 5:8</span> L'Ancien Testament le pressentait déjà : Jérémie, mort depuis longtemps, y apparaît comme <em>« celui qui prie beaucoup pour le peuple et pour la ville sainte. »</em> <span class="ref">2 Maccabées 15:14</span> Et le ciel se réjouit de ce qui arrive sur la terre : <em>« Il y a de la joie devant les anges de Dieu pour un seul pécheur qui se repent. »</em> <span class="ref">Luc 15:10</span> Les saints prennent part à notre marche : ils intercèdent.</p>
      <h2>Nous prions pour les défunts</h2>
      <p>La communion joue aussi dans l'autre sens. Ceux qui ont quitté ce monde sans être pleinement purifiés achèvent leur purification avant de voir Dieu, dans l'état que l'Église nomme le purgatoire ; ils ne peuvent plus mériter pour eux-mêmes, mais l'Église, unie à eux dans le Christ, les soulage par ses prières, ses aumônes et surtout par le sacrifice de la messe. L'Écriture montre déjà ce geste, lorsqu'un sacrifice est offert pour les soldats tombés au combat : <em>« C'est une pensée sainte et salutaire de prier pour les morts, afin qu'ils soient délivrés de leurs péchés. »</em> <span class="ref">2 Maccabées 12:46</span> Prier pour les défunts, c'est étendre au-delà de la mort la charité qui unit les membres d'un même corps.</p>

      <h2>L'Écriture dans l'Église</h2>
      <p>L'Écriture demeure la Parole de Dieu, souverainement vénérée, l'âme de toute prédication et de toute théologie. Elle vit dans l'Église qui l'a reçue de Dieu, l'a discernée, la garde et l'interprète. Écriture, Tradition et autorité de l'Église forment une seule Parole, transmise par des voies que Dieu a unies. La retrancher de la Tradition et de l'Église qui la portent, c'est la couper de la vie où elle a été donnée et où elle se comprend.</p>

      <p>Le salut promis va à celui qui tient bon jusqu'au bout. <em>« Celui qui persévérera jusqu'à la fin sera sauvé. »</em> <span class="ref">Matthieu 24:13</span> La promesse est suspendue à la persévérance, ce qui n'aurait pas de sens si le salut était acquis d'avance et pour toujours. La même parole revient au terme des épreuves : <em>« Sois fidèle jusqu'à la mort, et je te donnerai la couronne de vie. »</em> <span class="ref">Apocalypse 2:10</span> La couronne va à qui demeure fidèle jusqu'à la mort.</p>

      <h2>Le sarment retranché</h2>
      <p>Le Christ se présente comme la vigne et les croyants comme ses sarments, et tout sarment qui cesse de porter du fruit est ôté. <em>« Tout sarment qui ne porte pas de fruit en moi, il le retranche. »</em> <span class="ref">Jean 15:2</span> Le sarment retranché tenait à la vigne avant d'en être ôté. <em>« Si quelqu'un ne demeure pas en moi, il est jeté dehors comme le sarment, et il sèche ; puis on le ramasse, on le jette au feu, et il brûle. »</em> <span class="ref">Jean 15:6</span> L'Écriture reprend l'image avec la branche greffée sur l'olivier : tenue par la foi, elle peut être retranchée si elle ne demeure pas. <em>« Tu tiens par la foi. Ne t'enorgueillis pas, mais crains ; toi aussi, tu seras retranché. »</em> <span class="ref">Romains 11:20-22</span></p>

      <h2>Rendu juste, non seulement déclaré</h2>

      <p>L'ignorance invincible est celle qu'un homme ne peut surmonter, quelque effort sincère qu'il fasse pour atteindre la vérité. Il l'ignore sans qu'il y ait faute de sa part, parce que rien ne la lui a fait connaître et que rien en lui ne s'y est dérobé. Devant Dieu, nul n'est tenu pour coupable de ce qu'il ne pouvait savoir.</p>
      <h2>Deux ignorances</h2>
      <p>L'ignorance prend deux formes, et tout dépend de laquelle. La première se pouvait vaincre : l'homme avait de quoi connaître la vérité, et il a négligé de chercher, ou s'est détourné pour ne pas voir. On l'appelle vincible, parce qu'on pouvait en venir à bout ; elle n'excuse pas, car la faute n'est pas d'ignorer mais d'avoir voulu ignorer. La seconde ne se pouvait vaincre : aucun chemin ne menait la vérité jusqu'à cet homme, ou tous lui étaient fermés sans qu'il y fût pour rien. On l'appelle invincible, parce qu'aucun effort ne l'aurait levée ; celle-là, Dieu ne l'impute pas.</p>
      <h2>L'ignorance allège la faute</h2>
      <p>La gravité d'une faute se mesure à ce que l'homme savait en la commettant. Agir mal en connaissant le bien pèse plus lourd qu'agir mal sans le connaître, et le Christ établit lui-même cette différence. <em>« Le serviteur qui, connaissant la volonté de son maître, n'a rien préparé, sera battu d'un grand nombre de coups ; mais celui qui ne l'a pas connue sera battu de peu de coups. »</em> <span class="ref">Luc 12:47-48</span> Le châtiment suit la mesure du savoir. C'est pourquoi, du haut de la Croix, le Christ peut demander grâce pour ceux qui le mettent à mort, en invoquant précisément leur aveuglement. <em>« Père, pardonne-leur, car ils ne savent ce qu'ils font. »</em> <span class="ref">Luc 23:34</span> À l'inverse, prétendre voir quand on refuse de voir aggrave la faute. <em>« Si vous étiez aveugles, vous n'auriez pas de péché ; mais vous dites : Nous voyons ; votre péché demeure. »</em> <span class="ref">Jean 9:41</span></p>
      <h2>La loi écrite dans les cœurs</h2>
      <p>Même celui qui n'a jamais reçu la révélation porte une loi en lui. Dieu a gravé dans la conscience de tout homme le discernement du bien et du mal, et c'est sur cette loi intérieure qu'il juge ceux à qui l'Évangile n'est pas parvenu. <em>« Quand les païens, qui n'ont pas la loi, font naturellement ce que la loi commande, ils se tiennent lieu de loi à eux-mêmes ; l'œuvre de la loi est écrite dans leurs cœurs, leur conscience leur rendant témoignage. »</em> <span class="ref">Romains 2:14-15</span> Celui qui suit honnêtement cette voix, sans avoir connu davantage, est jugé sur ce qu'il a reçu, non sur ce qu'il ne pouvait connaître.</p>
      <h2>Ce qui n'excuse pas</h2>
      <p>L'excuse a sa limite. Celui qui pouvait atteindre la vérité et s'est bouché les yeux n'est pas couvert par son ignorance, puisqu'il l'a choisie. La création elle-même rend Dieu accessible à la raison, et qui refuse cette lumière se condamne. <em>« Ce qu'on peut connaître de Dieu est manifeste pour eux ; ses perfections invisibles se voient depuis la création du monde, de sorte qu'ils sont inexcusables. »</em> <span class="ref">Romains 1:19-20</span> Et là où l'Évangile a été annoncé, l'ignorance d'autrefois ne tient plus : la vérité offerte engage celui qui l'entend. <em>« Dieu, sans tenir compte des temps d'ignorance, annonce maintenant à tous les hommes, en tous lieux, qu'ils aient à se repentir. »</em> <span class="ref">Actes 17:30</span></p>
      <h2>Sauvé par le Christ, non par l'ignorance</h2>
      <p>L'ignorance invincible écarte la faute, elle ne sauve pas. Nul n'est sauvé parce qu'il ignore, mais parce que le Christ le sauve, et il n'est pas d'autre source de salut. <em>« Il n'y a sous le ciel aucun autre nom donné aux hommes par lequel nous devions être sauvés. »</em> <span class="ref">Actes 4:12</span> Ce salut, pourtant, Dieu le destine à tous les hommes, et il l'accomplit pleinement en ceux qui croient. <em>« Nous avons mis notre espérance dans le Dieu vivant, qui est le Sauveur de tous les hommes, principalement des croyants. »</em> <span class="ref">1 Timothée 4:10</span> Sauveur de tous, parce que sa grâce s'offre à tout homme et qu'il n'en rachète aucun par un autre que son Fils ; des croyants surtout, parce qu'eux la reçoivent en plénitude, dans la foi et les sacrements où elle se donne.</p>
      <p>Dieu a lié le salut à son Église ; lui-même n'y est pas enchaîné, et il peut atteindre par des voies connues de lui seul l'âme qui le cherche sans encore le connaître. Celui qui, sans faute, n'a pas reçu l'Évangile, mais qui cherche Dieu d'un cœur droit et suit la loi de sa conscience, la grâce du Christ peut le sauver : son ignorance lève l'obstacle de la faute, et c'est la grâce qui opère le salut. Porter l'Évangile au monde reste donc un devoir, et l'Église demeure nécessaire ; l'ignorance invincible n'est pas un abri que l'on choisit, mais un malheur que Dieu, dans sa miséricorde, ne retient pas contre celui qui le subit.</p>

      <h2>Des vivants, et non des morts</h2>
      <p>Les saints du ciel sont vivants. Jésus le déclare en parlant des patriarches disparus depuis des siècles : <em>« Dieu n'est pas le Dieu des morts, mais des vivants. »</em> <span class="ref">Matthieu 22:32</span> Établis en Dieu, ils sont plus vivants que nous, et le voyant face à face, ils connaissent en lui ce qui les touche, jusqu'aux prières qu'on leur adresse. C'est ce qui répond au reproche tiré de l'interdit de consulter les morts : <em>« Qu'on ne trouve chez toi personne qui interroge les morts. »</em> <span class="ref">Deutéronome 18:11</span> Cet interdit vise la nécromancie, qui veut forcer les défunts pour leur arracher un savoir caché, par la magie. L'invocation des saints relève d'un tout autre ordre : elle s'adresse à des vivants établis en Dieu, et leur demande humblement une prière. L'Écriture montre d'ailleurs un défunt intercédant pour les vivants : Jérémie, mort depuis longtemps, y apparaît comme <em>« celui qui prie beaucoup pour le peuple et pour la ville sainte. »</em> <span class="ref">2 Maccabées 15:14</span></p>

      <h2>L'unique médiateur de la rédemption</h2>
      <p>Le dernier reproche invoque l'unique médiateur : <em>« Il y a un seul Dieu, et un seul médiateur entre Dieu et les hommes, le Christ Jésus. »</em> <span class="ref">1 Timothée 2:5</span> Pour saisir cette unicité, il faut voir comment s'exerce la médiation. Le médiateur entre Dieu et les hommes est le prêtre, établi <em>« pour présenter des offrandes et des sacrifices pour les péchés. »</em> <span class="ref">Hébreux 5:1</span> Or le Christ est l'unique et éternel grand prêtre de l'alliance nouvelle : il n'offre pas le sang des animaux, mais le sien, entrant une fois pour toutes dans le sanctuaire <em>« avec son propre sang, ayant obtenu une rédemption éternelle. »</em> <span class="ref">Hébreux 9:12</span> Voilà ce que nul ne partage : un seul prêtre, un seul sacrifice, une seule rédemption. L'intercession est d'un autre ordre, car elle n'offre aucun sacrifice : elle prie. L'Écriture la commande d'ailleurs dans le même chapitre, quelques lignes avant d'affirmer l'unique médiateur : <em>« J'exhorte avant tout à faire des prières, des supplications et des intercessions pour tous les hommes. »</em> <span class="ref">1 Timothée 2:1</span> S'il ne se contredit pas, c'est que demander une prière ne touche en rien à l'unique médiation. On objecte que la parole sur l'unique médiateur interdit de prier les saints du ciel ; mais elle ne distingue ni les morts ni les vivants. Si elle excluait l'intercession des saints, elle exclurait tout autant celle des vivants que l'Écriture vient d'ordonner. Le Christ grand prêtre intercède du reste lui-même, <em>« toujours vivant pour intercéder »</em> en notre faveur <span class="ref">Hébreux 7:25</span> Demander aux saints du ciel de prier pour nous ne touche donc pas à son unique sacerdoce : ils ne sacrifient pas, ils intercèdent, et leur prière passe tout entière par lui.</p>

      <p>Une relique est ce qui demeure d'un saint, son corps ou ses ossements, ou un objet qui lui a appartenu. L'Église les vénère en mémoire du saint dont elles gardent la trace, et de Dieu qui a fait de lui sa demeure.</p>
      <h2>Dieu agit à travers la matière</h2>
      <p>Dès l'Ancien Testament, Dieu agit par la matière liée à ses serviteurs. Au contact des ossements du prophète Élisée, un mort revient à la vie. <em>« L'homme alla toucher les os d'Élisée, et il reprit vie et se leva sur ses pieds. »</em> <span class="ref">2 Rois 13:21</span> L'Incarnation porte cette logique à son sommet : Dieu lui-même prend un corps, et le contact de sa chair guérit. Une femme est rendue à la santé pour avoir seulement touché la frange de son vêtement. <em>« Si je touche seulement son vêtement, je serai guérie. »</em> <span class="ref">Matthieu 9:21</span> De cette même logique découlent les sacrements et la vénération des reliques : le visible devient le canal de l'invisible.</p>
      <h2>Le corps, temple de l'Esprit</h2>
      <p>Cette vénération tient à ce qu'est le corps d'un saint. Durant sa vie, il a été le temple de l'Esprit. <em>« Votre corps est le temple de l'Esprit Saint qui est en vous. »</em> <span class="ref">1 Corinthiens 6:19</span> Sanctifié par la grâce, uni au Christ, ce corps est promis à la résurrection. L'Église l'honore comme ce qui a porté un ami de Dieu, et attend sa gloire au dernier jour.</p>
      <h2>Les trois classes de reliques</h2>
      <p>L'Église distingue trois classes de reliques. Les reliques de première classe sont le corps du saint ou ses fragments ; lorsqu'il s'agit d'une partie notable, comme la tête ou un membre, on les dit insignes. Les reliques de deuxième classe sont les objets que le saint a portés ou utilisés de son vivant, ses vêtements ou les instruments de son martyre. Les reliques de troisième classe sont les objets, le plus souvent une étoffe, mis en contact avec une relique de première classe ; l'Antiquité chrétienne les appelait <em>brandea</em>. L'Écriture en donne déjà l'exemple : les linges qui avaient touché le corps de Paul guérissaient les malades. <em>« On appliquait sur les malades des linges qui avaient touché son corps, et les maladies les quittaient. »</em> <span class="ref">Actes 19:11-12</span></p>
      <h2>Sous l'autel</h2>
      <p>Très tôt, l'Église a célébré l'eucharistie sur les tombeaux des martyrs, puis a placé leurs reliques sous l'autel ou dans la pierre d'autel. Ce geste a un fondement : l'Apocalypse montre les martyrs au plus près du sacrifice du ciel. <em>« Je vis sous l'autel les âmes de ceux qui avaient été immolés à cause de la parole de Dieu. »</em> <span class="ref">Apocalypse 6:9</span> Le saint qui a donné sa vie pour le Christ repose ainsi auprès de l'autel où se renouvelle son sacrifice.</p>
      <h2>L'honneur remonte à Dieu</h2>
      <p>Tout l'honneur rendu à une relique s'adresse en fin de compte à Dieu. L'Église distingue deux attitudes : l'adoration, qu'on nomme latrie et qui revient à Dieu seul, et la vénération, qu'on nomme dulie et qu'elle accorde aux saints et à leurs reliques. Vénérer une relique, c'est honorer le saint dont elle garde la trace, et à travers lui célébrer Dieu qui l'a sanctifié. Toute grâce, toute guérison vient de Dieu seul, qui agit librement par la relique quand il le veut, à travers le souvenir et l'intercession du saint. L'Église honore en elle la trace d'une vie donnée à Dieu.</p>

      <h2>Les préfigurations</h2>
      <p>Avant d'être donnée à la Cène, l'Eucharistie a été préparée de loin, par des figures de l'Ancien Testament qui en portaient déjà le secret. Trois surtout l'annoncent.</p>
      <p>Melchisédech vient en premier. C'est un personnage mystérieux du livre de la Genèse : roi de Salem, l'ancienne Jérusalem, et prêtre du Dieu Très-Haut, il va à la rencontre d'Abraham qui revient de la bataille, et son offrande à Dieu est faite de pain et de vin : <em>« Melchisédech, roi de Salem, fit apporter du pain et du vin ; il était prêtre du Dieu Très-Haut. »</em> <span class="ref">Genèse 14:18</span> Ce prêtre dont la Genèse ne dit ni l'origine ni la fin, qui offre le pain et le vin et bénit Abraham, annonce le Christ, prêtre pour toujours, qui offrira à son tour le pain et le vin devenus son Corps et son Sang : <em>« Tu es prêtre pour l'éternité à la manière de Melchisédech. »</em> <span class="ref">Psaume 110:4</span></p>
      <p>La manne vient ensuite. Après leur sortie d'Égypte, les Hébreux marchent quarante ans dans le désert, sans rien pour se nourrir ; chaque matin, Dieu fait tomber du ciel un pain inconnu, la manne, qui les tient en vie tout au long du chemin : <em>« Je vais faire pleuvoir sur vous du pain venu du ciel. »</em> <span class="ref">Exode 16:4</span> Ce pain soutenait le corps le temps du désert, et ceux qui en mangeaient mouraient un jour ; il annonçait un pain plus grand, que le Christ donnerait, et qui donne la vie éternelle : <em>« Je suis le pain vivant descendu du ciel ; si quelqu'un mange de ce pain, il vivra éternellement. »</em> <span class="ref">Jean 6:51</span></p>
      <p>L'agneau pascal vient enfin. La nuit où Dieu délivra Israël de l'esclavage d'Égypte, chaque famille devait immoler un agneau, marquer sa porte de son sang pour être épargnée du fléau, puis en manger la chair : c'est la Pâque, que les Juifs célèbrent depuis lors en mémoire de leur libération. <em>« Le sang vous servira de signe : je verrai le sang, et je passerai par-dessus vous. »</em> <span class="ref">Exode 12:13</span> Cet agneau immolé, dont le sang sauve et dont on mange la chair, préfigure le Christ, l'Agneau livré pour notre salut : <em>« Christ, notre Pâque, a été immolé. »</em> <span class="ref">1 Corinthiens 5:7</span></p>
      <p>Ces trois figures attendaient leur accomplissement, et il vient à la Cène, quand le Christ prend le pain et le vin et les donne comme son Corps et son Sang.</p>
      <h2>L'institution à la Cène</h2>
      <p>La veille de sa Passion, au cours du repas pascal, Jésus prit du pain, le bénit, le rompit et le donna à ses disciples : <em>« Ceci est mon corps. »</em> Puis il leur donna la coupe : <em>« Ceci est mon sang, le sang de l'alliance, répandu pour la multitude en rémission des péchés. »</em> <span class="ref">Matthieu 26:26-28</span> Et il commanda de renouveler ce geste : <em>« Faites ceci en mémoire de moi. »</em> <span class="ref">Luc 22:19</span> Depuis, l'Église accomplit ce que le Seigneur a fait, et le pain et le vin deviennent son Corps et son Sang.</p>
      <h2>La présence réelle</h2>
      <p>Les paroles du Christ opèrent ce qu'elles disent : le pain devient son Corps, le vin devient son Sang. Lui-même l'avait annoncé : <em>« Ma chair est vraiment une nourriture, et mon sang est vraiment un breuvage. »</em> <span class="ref">Jean 6:55</span> Ce changement porte sur la substance même : ce qui était pain et vin est maintenant le Corps et le Sang du Christ, tandis que demeurent les apparences, le goût et l'aspect, que l'on nomme les espèces. L'Église appelle ce passage la transsubstantiation. Sous ces espèces, le Christ est tout entier présent, vivant et glorieux.</p>
      <h2>Le sacrifice</h2>
      <p>L'Eucharistie est un sacrifice. Elle rend présent l'unique sacrifice du Christ en croix. Il s'est offert une fois pour toutes, et la messe ne le répète pas : elle rend présent ce qu'il a accompli au Calvaire, son offrande au Père. La Croix et la messe sont un seul et même sacrifice, offert jadis dans le sang, offert maintenant sous les espèces du pain et du vin. C'est pourquoi l'Église l'appelle le saint sacrifice.</p>
      <h2>L'adoration du Saint-Sacrement</h2>
      <p>Puisque le Christ est réellement présent sous les espèces, l'Eucharistie reçoit l'adoration due à Dieu seul. C'est le Christ lui-même que l'on adore, présent tout entier sous les apparences du pain. L'Église garde l'Eucharistie dans le tabernacle, le lieu où on la conserve au cœur de l'église, l'expose à l'adoration des fidèles, et s'agenouille devant le Saint-Sacrement comme devant le Seigneur. L'adoration eucharistique est l'hommage rendu à cette présence.</p>
      <h2>La communion</h2>
      <p>Recevoir l'Eucharistie, c'est communier au Corps du Christ. Le Seigneur l'a promis : <em>« Celui qui mange ma chair et boit mon sang demeure en moi, et moi en lui. »</em> <span class="ref">Jean 6:56</span> La communion unit intimement au Christ, et par lui unit les fidèles entre eux : <em>« Puisqu'il y a un seul pain, nous qui sommes plusieurs, nous formons un seul corps. »</em> <span class="ref">1 Corinthiens 10:17</span> L'Église se construit ainsi par l'Eucharistie, qui fait d'elle le Corps du Christ.</p>

      <h2>Les fruits de la communion</h2>
      <p>Reçue dignement, l'Eucharistie porte des fruits dans l'âme. Elle nourrit la vie de la grâce et la fait grandir, comme un aliment soutient et augmente la vie du corps. Elle efface les péchés véniels et fortifie contre le péché mortel, en ranimant la charité que le péché refroidit. Elle est enfin le gage de la vie éternelle : celui qui reçoit le Christ porte en lui le germe de la résurrection. <em>« Celui qui mange ma chair et boit mon sang a la vie éternelle, et je le ressusciterai au dernier jour. »</em> <span class="ref">Jean 6:54</span> Ce pain donné sur la terre est déjà l'avant-goût du festin du ciel.</p>

      <p>La Croix et la Résurrection forment le cœur de la foi chrétienne. Par sa mort sur la Croix, le Christ rachète le péché du monde ; par sa Résurrection, il triomphe de la mort. Ces deux moments inséparables sont appelés le mystère pascal, et c'est là que s'opère notre salut.</p>
      <h2>Une offense infinie</h2>
      <p>Le péché avait séparé l'homme de Dieu, et cette rupture dépassait toute réparation humaine. La gravité d'une offense se mesure à la dignité de celui qu'elle atteint : un manque d'égard envers un semblable pèse moins lourd que le même affront fait à un souverain. Or le péché atteint Dieu lui-même, infiniment grand. Il porte donc une gravité sans mesure : une offense infinie.</p>
      <p>Réparer une telle offense demandait une satisfaction de valeur égale, donc infinie. Le mot satisfaction désigne ici la réparation offerte à Dieu pour le péché, le don qui répond à l'offense. Or aucun homme ne pouvait l'offrir : créature finie, déjà redevable à Dieu de tout ce qu'il est, l'homme n'avait rien à donner qui ne fût déjà dû. Sa dette le dépassait infiniment.</p>
      <p>La justice voulait pourtant que ce soit l'homme qui répare, puisque c'est l'homme qui avait péché. Il fallait donc un réparateur à la fois pleinement homme, pour offrir au nom de tous, et pleinement Dieu, pour que son offrande ait la valeur infinie qu'exigeait la faute. Ce réparateur, c'est le Christ, pleinement Dieu et pleinement homme. En lui seul, l'humanité pouvait enfin rendre à Dieu une réparation à la mesure de l'offense.</p>
      <h2>Le sacrifice de la Croix</h2>
      <p>Sur la Croix, le Christ prend sur lui le péché du monde. Jean-Baptiste l'avait désigné : <em>« Voici l'Agneau de Dieu, qui ôte le péché du monde. »</em> <span class="ref">Jean 1:29</span> Innocent, il porte la peine des coupables : <em>« Il a été transpercé à cause de nos péchés ; par ses meurtrissures, nous sommes guéris. »</em> <span class="ref">Isaïe 53:5</span> Son sang versé est le don total de lui-même au Père, offert par amour en réparation pour tous. Nul ne le lui arrache : il se livre librement, et c'est cette obéissance d'amour, où le Fils accomplit la volonté du Père, qui fait le prix de son offrande. <em>« Personne ne m'ôte la vie, mais je la donne de moi-même. »</em> <span class="ref">Jean 10:18</span> Là, le sacrifice qu'annonçaient tous les autels d'Israël trouve son accomplissement.</p>
      <h2>Justice et miséricorde</h2>
      <p>La Croix révèle ensemble la justice et la miséricorde de Dieu. Sa justice, car le péché y est pleinement réparé, par une offrande à la mesure de l'offense.</p>
      <p>Sa miséricorde plus encore. Sauver l'homme était pure gratuité : il s'était perdu par sa propre faute, et rien n'obligeait Dieu à le relever. La miséricorde commence dans cet amour offert à qui ne l'avait pas mérité : <em>« Dieu prouve son amour envers nous : alors que nous étions encore pécheurs, le Christ est mort pour nous. »</em> <span class="ref">Romains 5:8</span> Elle va plus loin encore. La justice voulait que le coupable paie ; le coupable ne le pouvait pas. Alors c'est l'offensé qui paie pour l'offenseur : Dieu, en droit d'exiger réparation, se fait lui-même réparateur et prend à sa charge la dette qu'il aurait pu réclamer. Pour cela il donne ce qu'il a de plus cher, son propre Fils. Le don épouse la mesure de l'offense : infini comme elle.</p>
      <p>Dieu restait pourtant libre. Par sa toute-puissance, il aurait pu remettre le péché d'un simple pardon. S'il a choisi cette voie, c'est qu'elle était la plus digne de lui, celle où sa justice est honorée, sa miséricorde manifestée, et l'homme associé à sa propre rédemption. Ainsi s'accomplit la parole du psaume : <em>« L'amour et la vérité se rencontrent, la justice et la paix s'embrassent. »</em> <span class="ref">Psaume 85:11</span> À la Croix, Dieu pardonne sans rien abaisser de sa sainteté.</p>
      <h2>La victoire de la Résurrection</h2>
      <p>Le troisième jour, le Christ est ressuscité, vivant pour toujours, vainqueur du péché et de la mort. La Résurrection est le couronnement de son sacrifice et la source de sa fécondité ; sur elle repose toute la foi : <em>« Si le Christ n'est pas ressuscité, votre foi est vaine. »</em> <span class="ref">1 Corinthiens 15:17</span></p>
      <p>Par elle, ce que la Croix a mérité devient vie donnée. Le Christ ressuscité est la cause de notre justification : <em>« Il a été livré pour nos fautes, et ressuscité pour notre justification. »</em> <span class="ref">Romains 4:25</span> Et sa victoire ne reste pas la sienne seule : il est le premier d'une multitude, et sa Résurrection est le principe de la nôtre. <em>« Christ est ressuscité des morts, prémices de ceux qui sont morts. »</em> <span class="ref">1 Corinthiens 15:20</span> En son humanité glorifiée, élevé à la droite du Père, il est établi Seigneur et communique aux siens la vie qu'il a reçue. En lui, la mort cesse d'être une fin : elle devient le passage vers la vie qui ne finit pas.</p>
      <h2>Un seul mystère pascal</h2>
      <p>La Croix et la Résurrection ne font qu'un seul acte de salut, que l'Église appelle le mystère pascal. La mort y rachète, la Résurrection y donne la vie ; l'une appelle l'autre, et le Christ passe de l'une à l'autre pour nous entraîner avec lui.</p>
      <h2>La justification</h2>
      <p>Ce que le Christ a mérité sur la Croix, il l'applique à chacun par la justification. Dieu y rend le pécheur juste : il efface le péché et infuse au cœur la grâce sanctifiante, qui fait de lui un fils adoptif. <em>« Justifiés gratuitement par sa grâce, par la rédemption qui est dans le Christ Jésus. »</em> <span class="ref">Romains 3:24</span> Cette grâce nous parvient par les sacrements : le baptême nous plonge dans la mort et la Résurrection du Christ, <em>« afin que, comme Christ est ressuscité des morts, nous menions une vie nouvelle »</em> <span class="ref">Romains 6:4</span>, et l'Eucharistie nous nourrit de son sacrifice. C'est ce mystère que célèbre chaque messe et que renouvelle chaque Pâque ; unis à lui, justifiés par son sang, nous attendons de ressusciter comme lui, au dernier jour.</p>

      <p>La mort est la séparation de l'âme et du corps, le terme de la vie terrestre. Avec elle s'achève le temps du mérite : c'est durant cette vie que l'homme choisit Dieu ou s'en détourne, et la mort scelle ce choix. <em>« Il est réservé aux hommes de mourir une seule fois, après quoi vient le jugement. »</em> <span class="ref">Hébreux 9:27</span> Au-delà, on ne se convertit plus ; on est recueilli tel qu'on est devenu.</p>

      <p>Aussitôt après la mort, chaque âme comparaît devant Dieu et reçoit sa sentence : c'est le jugement particulier. Il fixe immédiatement son sort, sans attendre la fin des temps. Au bon larron, Jésus le promet le jour même : <em>« Aujourd'hui, tu seras avec moi dans le paradis. »</em> <span class="ref">Luc 23:43</span> Trois états sont alors possibles : le paradis, le purgatoire ou l'enfer.</p>
      <h2>Le paradis</h2>
      <p>Le paradis est le bonheur parfait et sans fin : voir Dieu tel qu'il est, face à face, et vivre de sa vie même. L'Église nomme cette contemplation la vision béatifique, car elle rend bienheureux ceux qui la reçoivent. <em>« Nous lui serons semblables, parce que nous le verrons tel qu'il est. »</em> <span class="ref">1 Jean 3:2</span> Ce bonheur est donné dès le jugement particulier aux âmes pleinement purifiées, avant même que leur corps ne ressuscite.</p>

      <p>Beaucoup meurent dans l'amitié de Dieu, mais imparfaitement purifiés, encore marqués par les suites de leurs péchés. Avant d'entrer dans la pleine lumière du ciel, ils passent par une purification, le purgatoire. Ces âmes sont déjà sauvées : elles achèvent seulement de se purifier avant de voir Dieu. <em>« Il sera sauvé, mais comme à travers le feu. »</em> <span class="ref">1 Corinthiens 3:15</span> Nous pouvons hâter leur entrée au ciel par notre prière.</p>

      <p>La confession est l'un des sept sacrements de l'Église, ces signes institués par le Christ pour donner la grâce. Par elle, le baptisé reçoit de Dieu, par le ministère du prêtre, le pardon des péchés commis depuis son baptême. On l'appelle aussi pénitence, du nom du regret qui l'anime, et réconciliation, parce qu'elle rétablit l'amitié avec Dieu que le péché avait rompue.</p>
      <h2>Un pouvoir donné par le Christ</h2>
      <p>Le soir de Pâques, le Ressuscité confie à ses apôtres un pouvoir inouï : remettre les péchés en son nom. <em>« Recevez l'Esprit Saint. Ceux à qui vous remettrez les péchés, ils leur seront remis ; ceux à qui vous les retiendrez, ils leur seront retenus. »</em> <span class="ref">Jean 20:22-23</span> Le pardon vient de Dieu seul, mais Dieu a voulu le donner par des hommes. Le prêtre ne pardonne pas en son propre nom : il agit au nom du Christ, instrument par lequel passe la miséricorde. C'est ce que l'Écriture nomme le ministère de la réconciliation : <em>« Dieu nous a confié le ministère de la réconciliation. »</em> <span class="ref">2 Corinthiens 5:18</span> Se confesser à un prêtre, c'est recevoir le pardon là où le Christ a voulu le déposer.</p>
      <h2>Les actes du pénitent</h2>
      <p>Le sacrement met en jeu trois actes du pénitent. La contrition d'abord : le regret sincère de ses péchés, avec la résolution de ne plus pécher ; c'est l'acte le plus important, car sans regret il n'y a pas de pardon. La confession ensuite : l'aveu des péchés au prêtre, qui expose la blessure à la lumière pour qu'elle soit guérie. <em>« Si nous confessons nos péchés, il est fidèle et juste pour nous les pardonner. »</em> <span class="ref">1 Jean 1:9</span> La satisfaction enfin : accomplir la réparation que le prêtre demande, une prière ou une bonne œuvre, qu'on appelle la pénitence et qui redresse le désordre laissé par le péché. À ces trois actes répond l'absolution : les paroles par lesquelles le prêtre, au nom du Christ, remet les péchés.</p>
      <h2>L'absolution</h2>
      <p>Le mot vient du latin absolvere, délier : l'absolution délie le pécheur du lien que le péché avait noué en lui. Par elle, les péchés sont remis ; la parole du prêtre est l'acte même par lequel Dieu pardonne. Ce que le prêtre délie sur la terre, Dieu le tient pour délié dans le ciel : <em>« Tout ce que vous délierez sur la terre sera délié dans le ciel. »</em> <span class="ref">Matthieu 18:18</span></p>
      <p>Le prêtre pardonne à la place du Christ, comme son ambassadeur, par une puissance qu'il tient du Seigneur : <em>« C'est au nom du Christ que nous faisons fonction d'ambassadeurs. »</em> <span class="ref">2 Corinthiens 5:20</span> Prêtant sa voix au Seigneur, il déclare : « Je t'absous de tes péchés, au nom du Père, et du Fils, et du Saint-Esprit. » Celui qui pardonne, par cette bouche, c'est le Christ lui-même. Le regret de l'homme dispose le cœur à recevoir ce don : l'acte du prêtre porte la puissance du Christ, l'ouverture du cœur la laisse entrer.</p>
      <h2>Ce que la confession opère</h2>
      <p>L'absolution remet la faute et, avec elle, la peine éternelle : l'âme qui avait perdu la grâce par un péché mortel la retrouve et redevient amie de Dieu. Avec la grâce lui reviennent les mérites que le péché mortel avait éteints, et la paix d'une conscience réconciliée. Le pénitent est aussi réconcilié avec l'Église, qu'il avait blessée par son péché, car nul ne pèche seul : le mal d'un membre atteint tout le corps, et son retour réjouit toute la maison. <em>« Il y aura plus de joie dans le ciel pour un seul pécheur qui se convertit que pour quatre-vingt-dix-neuf justes qui n'ont pas besoin de conversion. »</em> <span class="ref">Luc 15:7</span></p>
      <h2>La satisfaction</h2>
      <p>Au-delà de la faute et de la peine éternelle qu'efface l'absolution, demeure souvent une peine temporelle, une dette à acquitter, et la satisfaction commence à le faire : réparer le désordre que le péché a causé, en accomplissant la peine que le prêtre indique, prière, jeûne ou bonne œuvre, qu'on appelle la pénitence donnée au confessionnal. L'Écriture le montre dans l'histoire de David : son péché confessé, le prophète Nathan lui annonce le pardon, puis une peine qui subsiste. <em>« Le Seigneur a pardonné ton péché ; tu ne mourras pas. »</em> <span class="ref">2 Samuel 12:13</span> Et pourtant l'enfant né de la faute mourra : le pardon de la faute n'a pas effacé toute conséquence.</p>
      <p>Cette réparation ne cherche pas à fléchir un Dieu exigeant, car le pardon est donné gratuitement. Elle guérit le pécheur de l'attachement que le péché a laissé en lui, et redresse le tort commis. Quand Zachée se convertit, il ne s'en tient pas au regret : il répare. <em>« Si j'ai fait tort à quelqu'un, je lui rends le quadruple. »</em> <span class="ref">Luc 19:8</span> Nos satisfactions n'ont aucune valeur par elles seules : elles la reçoivent de l'unique satisfaction du Christ, qui a réparé sur la Croix ce qu'aucun homme ne pouvait réparer. Ce qui n'a pas été réparé avant la mort le sera au purgatoire ; et l'Église, puisant au trésor des mérites du Christ, peut en remettre une part par les indulgences.</p>
      <h2>La seconde planche</h2>
      <p>Le sacrifice de la Croix a racheté une fois pour toutes les péchés de tous les hommes ; il est la source unique de tout pardon, et rien ne s'y ajoute. <em>« Par une seule offrande, il a rendu parfaits pour toujours ceux qu'il sanctifie. »</em> <span class="ref">Hébreux 10:14</span> Mais ce pardon doit atteindre chacun et être accueilli. Le baptême l'applique une première fois et fait renaître à la vie de Dieu. Quand le baptisé retombe ensuite dans le péché, il se coupe lui-même de la grâce reçue ; le Christ a voulu que ce même pardon de la Croix lui soit redonné par la confession. Elle n'ajoute rien au sacrifice du Christ : elle en fait passer la grâce jusqu'au pécheur qui s'en était écarté. La tradition l'appelle la seconde planche après le naufrage : à qui a fait naufrage, elle offre de regagner le rivage.</p>
      <h2>Le secret de la confession</h2>
      <p>Ce secret porte un nom : le sceau sacramentel. Il couvre tout ce que le pénitent confie pour recevoir le pardon, ses péchés, leurs circonstances, tout ce qui pourrait le faire reconnaître. Le confesseur ne peut ni le redire, ni l'utiliser, ni même le laisser deviner par un mot ou une attitude. Aucune raison, si grave soit-elle, ne lève cette obligation : ni l'ordre d'un juge, ni le danger d'autrui, ni le besoin de se disculper lui-même.</p>
      <p>Cette inviolabilité tient à ce qui se passe dans la confession : le pénitent ne parle pas à un homme, il parle à Dieu, dont le prêtre n'est que l'instrument. Ce qui est avoué est confié à la miséricorde divine, qui efface et oublie : <em>« C'est moi qui efface tes transgressions, et je ne me souviendrai plus de tes péchés. »</em> <span class="ref">Isaïe 43:25</span> Le prêtre, simple ministre de ce pardon, est lié au même oubli : il a entendu comme l'oreille de Dieu, et ce qu'il a reçu appartient à Dieu seul. Trahir ce secret est l'une des fautes les plus graves qu'un prêtre puisse commettre ; des confesseurs ont préféré la prison ou la mort plutôt que de livrer ce qui leur avait été confié. <em>« Le médisant révèle les secrets, mais l'homme au cœur fidèle tient la chose cachée. »</em> <span class="ref">Proverbes 11:13</span> Le pénitent peut donc tout dire sans crainte : ce qu'il dépose au confessionnal n'en sortira jamais.</p>
