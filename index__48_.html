<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumen · Théologie catholique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   LUMEN — feuille de style
   Palette « manuscrit nocturne » : encre profonde, parchemin, or ancien.
   ============================================================ */
:root{
  --encre:#000000;          /* fond global, noir total */
  --encre-2:#0b0b0b;        /* fond des surfaces légèrement levées */
  --parchemin:#ffffff;      /* texte principal, blanc franc */
  --parchemin-att:#ffffff;  /* texte secondaire, blanc lui aussi */
  --or:#efe6cf;             /* accent principal, crème clair */
  --or-pale:#f8f3e6;        /* crème éclairci, hover */
  --pourpre:#9a3b3b;        /* accent rare, rouge liturgique */
  --filet:rgba(231,224,207,.14); /* filets fins */
  --filet-fort:rgba(231,224,207,.28);
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--encre);
  color:var(--parchemin);
  font-family:'EB Garamond',Georgia,serif;
  font-size:20px;
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
::selection{background:rgba(198,164,92,.25)}

a{color:inherit;text-decoration:none}

/* ---------- bandeau d'en-tête ---------- */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--filet);
}
.barre{
  max-width:1080px;margin:0 auto;
  padding:20px 32px;
  display:grid;grid-template-columns:auto auto 1fr;align-items:center;
  gap:24px;
}
.logo{
  grid-column:1;grid-row:1;
  font-family:'Cormorant Garamond',serif;
  font-weight:500;font-size:26px;
  letter-spacing:.34em;
  text-transform:uppercase;
  color:var(--parchemin);
  padding-left:.34em;
}
.logo:hover{color:var(--or-pale)}
nav.menu{display:flex;gap:30px;grid-column:3;grid-row:1;justify-self:end}
nav.menu a{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--parchemin-att);
  padding-bottom:3px;
  border-bottom:1px solid transparent;
  transition:color .3s,border-color .3s;
}
nav.menu a:hover,nav.menu a.actif{color:var(--parchemin);border-color:var(--or)}

/* bouton menu mobile */
.burger{display:none;background:none;border:none;color:var(--parchemin);
  font-size:24px;cursor:pointer;line-height:1}

/* contexte d'article (thème · date) centré dans le bandeau */
.contexte-bar{
  grid-column:2;grid-row:1;text-align:left;min-width:0;
  overflow:hidden;text-overflow:ellipsis;
  font-family:'Cormorant Garamond',serif;
  font-size:13px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--parchemin-att);white-space:nowrap;pointer-events:auto;
}
.contexte-bar:empty{display:none}
.contexte-bar a{transition:color .3s}
.contexte-bar a:hover{color:var(--or)}

/* ---------- recherche ---------- */
.rech-loupe{display:inline-flex;align-items:center;cursor:pointer;color:var(--parchemin-att);transition:color .3s;background:none;border:none;padding:0;outline:none}
.rech-loupe:hover,.rech-loupe:focus{color:var(--or)}
.rech-loupe svg{display:block}
.rech-overlay{position:fixed;inset:0;z-index:200;background:rgba(8,8,8,.98);display:none}
.rech-overlay.ouvert{display:block}
.rech-boite{max-width:760px;margin:0 auto;padding:8vh 24px 40px;height:100%;display:flex;flex-direction:column;box-sizing:border-box}
.rech-haut{display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--filet-fort);padding-bottom:18px}
.rech-haut svg{color:var(--or);flex:none}
#rech-champ{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--parchemin);font-family:'Cormorant Garamond',serif;font-size:30px;letter-spacing:.01em}
#rech-champ::placeholder{color:var(--parchemin-att);opacity:.5}
.rech-fermer{cursor:pointer;color:var(--parchemin-att);font-size:24px;line-height:1;transition:color .3s;flex:none;outline:none}
.rech-fermer:hover,.rech-fermer:focus{color:var(--parchemin)}
.rech-res{margin-top:6px;overflow-y:auto;flex:1}
.rech-msg{padding:38px 4px;color:var(--parchemin-att);font-style:italic;font-size:18px}
.rech-item{display:block;padding:22px 4px;border-bottom:1px solid var(--filet);cursor:pointer;transition:padding-left .3s}
.rech-item:hover{padding-left:14px}
.rech-meta{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--or);margin-bottom:6px}
.rech-titre{font-family:'Cormorant Garamond',serif;font-size:24px;line-height:1.15;transition:color .3s}
.rech-item:hover .rech-titre{color:var(--or-pale)}
.rech-extrait{margin-top:7px;font-size:16px;color:var(--parchemin-att);line-height:1.55}
.rech-extrait mark{background:none;color:var(--or);font-weight:600}
@media(max-width:720px){#rech-champ{font-size:24px}.rech-boite{padding-top:6vh}}

/* ---------- conteneur de page ---------- */
main{max-width:1080px;margin:0 auto;padding:0 32px;min-height:70vh}
.vue{animation:apparait .6s ease both}
@keyframes apparait{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ---------- accueil ---------- */
.hero{
  padding:112px 0 100px;
  text-align:center;
  border-bottom:1px solid var(--filet);
}
.croix{
  position:relative;
  width:72px;height:132px;
  margin:0 auto;
}
.croix::before{
  content:"";position:absolute;
  left:50%;top:0;transform:translateX(-50%);
  width:2px;height:100%;
  background:#ffffff;
}
.croix::after{
  content:"";position:absolute;
  top:40px;left:0;
  width:100%;height:2px;
  background:#ffffff;
}

.intro{
  max-width:680px;margin:64px auto;
  text-align:center;
  font-size:20px;color:var(--parchemin-att);
}
.intro p+p{margin-top:18px}

/* titres de section internes */
.titre-section{
  display:flex;align-items:baseline;gap:18px;
  margin:72px 0 36px;
}
.titre-section .num{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;letter-spacing:.2em;color:var(--or);
  white-space:nowrap;
}
.titre-section h2{
  font-family:'Cormorant Garamond',serif;
  font-weight:400;font-size:34px;letter-spacing:.02em;
  white-space:nowrap;
}
.titre-section .trait{flex:1;height:1px;background:var(--filet)}

/* grille des domaines */
.domaines{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:1px;background:var(--filet);
  border:1px solid var(--filet);
}
.domaine{
  background:var(--encre);
  padding:34px 30px;
  cursor:pointer;
  transition:background .35s;
  display:flex;flex-direction:column;gap:12px;
}
.domaine:hover{background:var(--encre-2)}
.domaine .d-num{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.18em;color:var(--or);
}
.domaine h3{
  font-family:'Cormorant Garamond',serif;
  font-weight:500;font-size:25px;letter-spacing:.01em;
  transition:color .3s;
}
.domaine:hover h3{color:var(--or-pale)}
.domaine p{font-size:17px;color:var(--parchemin-att);line-height:1.65}
.domaine .compte{
  margin-top:auto;font-size:13px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--parchemin-att);
  font-family:'Cormorant Garamond',serif;
}

/* ---------- bibliothèque : liste d'articles ---------- */
.bandeau-page{
  padding:80px 0 40px;border-bottom:1px solid var(--filet);margin-bottom:8px;
}
.bandeau-page .sur-titre{
  font-family:'Cormorant Garamond',serif;
  text-transform:uppercase;letter-spacing:.36em;
  font-size:12px;color:var(--or);margin-bottom:22px;
}
.bandeau-page h1{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(40px,6vw,68px);letter-spacing:.02em;line-height:1.05;
}
.bandeau-page .desc{
  margin-top:20px;max-width:620px;font-size:19px;color:var(--parchemin-att);
}

/* filtres de thèmes */
.filtres{display:flex;flex-wrap:wrap;gap:10px;margin:72px 0 16px}
.filtre{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--parchemin-att);
  padding:7px 16px;border:1px solid var(--filet);
  cursor:pointer;transition:all .3s;
  background:none;
}
.filtre:hover{color:var(--parchemin);border-color:var(--filet-fort)}
.filtre.actif{color:var(--encre);background:var(--or);border-color:var(--or)}

/* liste */
.liste{margin-top:24px}
.article-lien{
  display:block;padding:30px 4px;
  border-bottom:1px solid var(--filet);
  transition:padding-left .35s;
  cursor:pointer;
}
.article-lien:hover{padding-left:18px}
.article-lien .meta{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--or);margin-bottom:8px;
}
.article-lien h3{
  font-family:'Cormorant Garamond',serif;
  font-weight:400;font-size:30px;letter-spacing:.01em;
  transition:color .3s;line-height:1.15;
}
.article-lien:hover h3{color:var(--or-pale)}
.article-lien p{margin-top:8px;font-size:18px;color:var(--parchemin-att)}
.vide{padding:60px 0;text-align:center;color:var(--parchemin-att);font-style:italic;font-size:19px}
.cat-titre{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--or);
  margin:46px 0 2px;padding-bottom:14px;
  border-bottom:1px solid var(--filet-fort);
}
.liste > .cat-titre:first-child{margin-top:8px}

/* ---------- article ---------- */
article.lecture{max-width:720px;margin:0 auto;padding:64px 0 80px}
article.lecture h1{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(38px,6vw,60px);line-height:1.08;letter-spacing:.01em;
  margin:0 0 56px;text-align:center;
}
article.lecture h1+p::first-letter{
  font-family:'Cormorant Garamond',serif;
  float:left;font-size:78px;line-height:.78;
  font-weight:500;color:var(--or);
  margin:8px 14px 0 0;
}
article.lecture p{margin-bottom:22px}
article.lecture h2{
  font-family:'Cormorant Garamond',serif;font-weight:500;
  font-size:30px;letter-spacing:.01em;
  margin:48px 0 18px;
}
article.lecture h3{
  font-family:'Cormorant Garamond',serif;font-weight:500;
  font-size:23px;margin:34px 0 14px;color:var(--parchemin)
}
/* référence biblique en ligne */
.ref{font-weight:600;font-family:'Cormorant Garamond',serif;
  letter-spacing:.04em;color:var(--or);white-space:nowrap}
/* renvois internes entre articles */
article.lecture a,.prose a{
  color:var(--or);
  border-bottom:1px solid rgba(239,230,207,.35);
  transition:color .3s,border-color .3s;
}
article.lecture a:hover,.prose a:hover{color:var(--or-pale);border-color:var(--or-pale)}
article.lecture blockquote{
  margin:30px 0;padding-left:26px;border-left:2px solid var(--filet-fort);
  font-style:italic;color:var(--parchemin-att);
}
.fin-article{
  text-align:center;margin:60px 0 0;
  font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--or);letter-spacing:.4em;
}

/* ---------- à propos ---------- */
.prose{max-width:680px;margin:0 auto;padding:8px 0 80px;font-size:21px}
.prose p{margin-bottom:22px}

/* ---------- pied de page ---------- */
footer{
  border-top:1px solid var(--filet);
  margin-top:40px;
  padding:48px 32px 56px;
  text-align:center;
}
footer .marque{
  font-family:'Cormorant Garamond',serif;
  letter-spacing:.34em;text-transform:uppercase;font-size:18px;
  padding-left:.34em;color:var(--parchemin);
}
footer .verset-pied{
  margin-top:18px;font-style:italic;color:var(--parchemin-att);font-size:17px;
}
footer .copy{margin-top:22px;font-size:13px;letter-spacing:.08em;color:var(--parchemin-att);
  font-family:'Cormorant Garamond',serif}

/* ---------- responsive ---------- */
@media(max-width:720px){
  body{font-size:17px}
  .barre{padding:16px 20px;display:flex;justify-content:space-between}
  main{padding:0 20px}
  nav.menu{
    position:fixed;inset:62px 0 auto 0;
    flex-direction:column;gap:0;
    background:var(--encre-2);
    border-bottom:1px solid var(--filet);
    transform:translateY(-130%);transition:transform .35s;
  }
  nav.menu.ouvert{transform:none}
  nav.menu a{padding:18px 20px;border-bottom:1px solid var(--filet)}
  .burger{display:block}
  .contexte-bar{display:none}
  .titre-section h2{font-size:26px;white-space:normal}
  .titre-section{flex-wrap:wrap}
}
</style>
</head>
<body>

<header>
  <div class="barre">
    <a href="#/" class="logo">Lumen</a>
    <button class="burger" id="burger" aria-label="Menu">☰</button>
    <nav class="menu" id="menu">
      <a href="#/" data-route="/">Accueil</a>
      <a href="#/bibliotheque" data-route="/bibliotheque">Bibliothèque</a>
      <a href="#/a-propos" data-route="/a-propos">À propos</a>
      <span class="rech-loupe" id="rech-ouvrir" role="button" tabindex="0" aria-label="Rechercher"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="10" r="6.5"/><line x1="15" y1="15" x2="21" y2="21" stroke-linecap="round"/></svg></span>
    </nav>
    <div class="contexte-bar" id="contexte"></div>
  </div>
</header>

<div class="rech-overlay" id="rech-overlay">
  <div class="rech-boite">
    <div class="rech-haut">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="10" r="6.5"/><line x1="15" y1="15" x2="21" y2="21" stroke-linecap="round"/></svg>
      <input type="search" id="rech-champ" placeholder="Rechercher dans Lumen…" autocomplete="off" spellcheck="false">
      <span class="rech-fermer" id="rech-fermer" role="button" tabindex="0" aria-label="Fermer">✕</span>
    </div>
    <div class="rech-res" id="rech-res"></div>
  </div>
</div>

<main id="app"></main>

<footer>
  <div class="marque">Lumen</div>
  <div class="verset-pied">« La lumière luit dans les ténèbres » (Jean 1:5)</div>
  <div class="copy" id="annee"></div>
</footer>

<script>
/* ============================================================
   LUMEN — contenu et navigation
   ------------------------------------------------------------
   POUR AJOUTER DU CONTENU, tu modifies seulement les deux
   tableaux ci-dessous : THEMES (les grands domaines) et
   ARTICLES (chaque entrée de la bibliothèque). Le reste se
   met à jour tout seul.
   ============================================================ */

/* --- LES GRANDS DOMAINES DE LA BIBLIOTHÈQUE --- */
const THEMES = [
  { id:'doctrine',    nom:'Doctrine et dogmes',              desc:"Ce que l'Église croit et enseigne : Dieu, le Christ, le salut, l'Église, les fins dernières.", categories:[
    { id:'dieu',   nom:'Dieu et la Trinité',        arts:['la-trinite','le-pere','le-fils','le-verbe','l-esprit-saint'] },
    { id:'peche',  nom:'Le péché et la chute',      arts:['le-peche','le-peche-originel','la-justice-originelle','les-passions-et-la-concupiscence','le-nouvel-adam-et-la-nouvelle-eve','l-age-de-raison'] },
    { id:'christ', nom:'Le Christ et la Rédemption', arts:['l-incarnation','la-croix-et-la-resurrection'] },
    { id:'marie',  nom:'La Vierge Marie',           arts:['l-immaculee-conception','la-virginite-perpetuelle-de-marie','reine-du-ciel'] },
    { id:'grace',  nom:'La grâce et le salut',      arts:['la-grace','la-grace-sanctifiante','la-grace-actuelle','les-vertus-theologales','la-foi','l-esperance','la-charite','la-paix-du-christ','le-salut','le-bapteme-de-desir'] },
    { id:'eglise', nom:"L'Église",                  arts:['l-eglise','l-infaillibilite-pontificale','la-communion-des-saints'] },
    { id:'fins',   nom:'Les fins dernières',        arts:['les-fins-dernieres','le-jugement-particulier','le-purgatoire','le-paradis','l-enfer','la-resurrection-de-la-chair','le-jugement-dernier'] },
  ] },
  { id:'ecriture',    nom:'Écriture et exégèse',             desc:"La lecture des Écritures dans la foi de l'Église, du sens littéral aux sens spirituels." },
  { id:'sacrements',  nom:'Liturgie et sacrements',          desc:"Les signes efficaces de la grâce et le culte par lequel l'Église rend gloire à Dieu.", categories:[
    { id:'intro',      nom:'',                                          arts:['les-sacrements'] },
    { id:'initiation', nom:"Les sacrements de l'initiation chrétienne", arts:['le-bapteme','la-confirmation','l-eucharistie'] },
    { id:'guerison',   nom:'Les sacrements de guérison',                arts:['la-confession','l-absolution','la-satisfaction','le-secret-de-la-confession','l-onction-des-malades'] },
    { id:'service',    nom:'Les sacrements au service de la communion', arts:['l-ordre','le-mariage'] },
  ] },
  { id:'saints',      nom:'Figures et saints',               desc:"Ceux qui ont vécu et pensé la foi : Pères, docteurs, mystiques, témoins." },
  { id:'histoire',    nom:"Histoire de l'Église",            desc:"Le chemin de l'Église à travers les siècles, ses conciles et ses combats." },
  { id:'philosophie', nom:'Philosophie et raison',           desc:"La raison au service de la foi : la voie naturelle vers Dieu et la vérité." },
  { id:'apologetique', nom:'Apologétique', desc:"La défense raisonnée de la foi : répondre aux objections et montrer que croire est accordé à la raison." },
];

/* --- LES ARTICLES ---
   Chaque article : un id unique (sans espace ni accent),
   un titre, le thème (l'id d'un domaine ci-dessus), un résumé,
   une date, et le contenu en HTML. Un verset se cite dans le fil
   d'une phrase, en italique entre guillemets, suivi de la référence :
   ... la nécessité du baptême : <em>« ... »</em> <span class="ref">Jean 3:5</span>
*/
const ARTICLES = [
  {
    id: "le-bapteme",
    titre: "Le Baptême",
    theme: "sacrements",
    resume: "La première porte de la vie chrétienne : la renaissance par l'eau et l'Esprit, qui efface le péché et fait entrer dans le corps du Christ.",
    date: "2026",
    contenu: `
      <p>Le baptême est le premier des <a href="#/article/les-sacrements">sacrements</a> et la porte de tous les autres. Par lui, l'homme naît à une vie nouvelle, devient enfant de Dieu, membre du Christ et de l'<a href="#/article/l-eglise">Église</a>. C'est une nouvelle naissance : par la naissance naturelle, l'homme reçoit la vie humaine ; par le baptême, il reçoit la vie divine, une participation à la vie même de Dieu, ce que l'on nomme la <a href="#/article/la-grace-sanctifiante">grâce sanctifiante</a>.</p>
      <p>Le Christ en a révélé la nécessité à Nicodème, venu l'interroger de nuit : <em>« En vérité, en vérité, je te le dis : nul, s'il ne naît d'eau et d'Esprit, ne peut entrer dans le royaume de Dieu. »</em> <span class="ref">Jean 3:5</span></p>
      <p>Avant de monter au ciel, il en a fait le commandement adressé à l'Église pour tous les temps : <em>« Allez, de toutes les nations faites des disciples, les baptisant au nom du Père et du Fils et du Saint-Esprit. »</em> <span class="ref">Matthieu 28:19</span></p>
      <h2>Ce que le baptême opère</h2>
      <p>Le baptême efface tout péché. Il remet le <a href="#/article/le-peche-originel">péché originel</a>, transmis à toute l'humanité depuis la chute, et, chez celui qui le reçoit après l'<a href="#/article/l-age-de-raison">âge de raison</a>, l'ensemble de ses péchés personnels. L'âme en sort entièrement purifiée, lavée de toute dette devant Dieu.</p>
      <p>Il donne plus encore qu'un pardon : une vie nouvelle. Le baptisé renaît comme fils dans le Fils, reçoit cette grâce sanctifiante et devient temple de l'Esprit Saint. Saint Paul décrit cette plongée comme une <a href="#/article/la-croix-et-la-resurrection">mort et une résurrection</a> avec le Christ : <em>« Par le baptême, nous avons été ensevelis avec lui dans la mort, afin que, comme le Christ est ressuscité d'entre les morts, nous menions nous aussi une vie nouvelle. »</em> <span class="ref">Romains 6:4</span></p>
      <h2>Le signe et sa nécessité</h2>
      <p>Le sacrement se réalise par un geste simple et des paroles précises : l'eau versée sur le front ou l'immersion, accompagnée de la formule « Je te baptise au nom du Père et du Fils et du Saint-Esprit ». L'eau porte le double sens du sacrement : elle lave et elle fait vivre.</p>

      <p>La grâce est la faveur gratuite par laquelle Dieu donne à l'homme part à sa propre vie et fait de lui son enfant. Tout ce que l'homme reçoit pour aller à Dieu, depuis le premier appel jusqu'à la vie éternelle, lui vient de cette libéralité. Le mot lui-même dit la gratuité, puisque « grâce » (du latin <em>gratia</em>, qui traduit le grec <em>charis</em>) désigne un don que rien n'oblige et que rien ne réclame : <em>« De sa plénitude nous avons tous reçu, et grâce sur grâce. »</em> <span class="ref">Jean 1:16</span></p>
      <h2>Un don gratuit</h2>
      <p>La grâce est donnée sans être due. Elle précède l'homme et le devance, sans répondre à aucun mérite : c'est Dieu qui aime et donne le premier. Là est sa nature même, que rien dans l'homme ne vient acquérir : <em>« Si c'est par grâce, ce n'est plus à cause des œuvres ; autrement la grâce ne serait plus la grâce. »</em> <span class="ref">Romains 11:6</span></p>

      <p>Sans la grâce, l'homme ne peut rien accomplir qui le conduise à Dieu : elle est le commencement de toute vie avec lui et le soutien de tout le chemin, car nul ne s'approche de Dieu par ses seules forces : <em>« Sans moi, vous ne pouvez rien faire. »</em> <span class="ref">Jean 15:5</span> Et cette grâce, Dieu l'offre à tout homme, car il veut le <a href="#/article/le-salut">salut</a> de tous : <em>« Dieu veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. »</em> <span class="ref">1 Timothée 2:4</span></p>

      <p>La grâce s'est manifestée pleinement dans le Christ, qui l'a méritée pour les hommes par sa <a href="#/article/la-croix-et-la-resurrection">mort et sa résurrection</a> : <em>« La grâce de Dieu s'est manifestée, source de salut pour tous les hommes. »</em> <span class="ref">Tite 2:11</span> L'<a href="#/article/l-esprit-saint">Esprit Saint</a> la répand ensuite dans les cœurs : <em>« L'amour de Dieu a été répandu dans nos cœurs par l'Esprit Saint qui nous a été donné. »</em> <span class="ref">Romains 5:5</span> On distingue ainsi la grâce incréée, qui est Dieu lui-même se donnant en son Esprit, et la grâce créée, le don qu'il dépose dans l'âme et qui la transforme.</p>
      <h2>Les formes de la grâce</h2>
      <p>Cette grâce créée se présente sous deux modes principaux. La <a href="#/article/la-grace-sanctifiante">grâce sanctifiante</a> est le don permanent qui établit l'homme dans l'état d'enfant de Dieu et demeure en lui. La <a href="#/article/la-grace-actuelle">grâce actuelle</a> est le secours passager que Dieu accorde pour accomplir un acte bon, puis renouvelle selon les besoins. À ces deux modes s'ajoutent les grâces propres à chaque sacrement, les charismes (dons accordés à l'un pour le bien de tous) et les grâces attachées à une vocation. Toutes sont la même libéralité de Dieu, reçue selon des manières diverses.</p>

      <p>Dieu est la fin que l'homme ne possède pas encore. Pour s'unir à un tel bien, il faut d'abord le connaître, puis tendre vers lui dans l'attente de l'atteindre, enfin s'y unir par amour. À ces trois mouvements répondent les trois vertus : la <a href="#/article/la-foi">foi</a> connaît Dieu, l'<a href="#/article/l-esperance">espérance</a> le désire, la <a href="#/article/la-charite">charité</a> l'aime et s'unit à lui. La foi vient la première, car on n'espère ni n'aime un bien qu'on ignore ; l'espérance s'appuie sur elle ; la charité les couronne et leur donne leur achèvement, les ordonnant toutes à Dieu. Aussi est-elle la plus grande. Et tandis que la foi et l'espérance s'accompliront au ciel, l'une dans la vision, l'autre dans la possession, la charité, elle, ne passera jamais : elle demeure pour toujours.</p>

      <p>L'espérance s'accomplit dans la possession du bien attendu. Quand l'homme verra Dieu face à face et le tiendra pour toujours, l'attente fera place à la joie, et l'espérance à la pleine possession : <em>« Or, voir ce que l'on espère n'est plus espérer. »</em> <span class="ref">Romains 8:24</span> De ces trois vertus, <a href="#/article/la-foi">la foi</a> et l'espérance passeront ainsi dans le ciel, tandis que <a href="#/article/la-charite">la charité</a> demeure à jamais.</p>

      <p>La charité est la plus grande des <a href="#/article/les-vertus-theologales">vertus théologales</a>. Par elle, l'homme aime Dieu par-dessus tout, parce qu'il est le souverain bien, et son prochain comme lui-même pour l'amour de Dieu. Elle unit l'homme à Dieu d'un seul mouvement qui embrasse aussi tout ce que Dieu aime. Le Christ en a fait le premier de tous les commandements : <em>« Tu aimeras le Seigneur ton Dieu de tout ton cœur, et ton prochain comme toi-même. »</em> <span class="ref">Matthieu 22:37-39</span></p>
      <h2>Un amour répandu dans le cœur</h2>
      <p>La charité est un don que Dieu infuse dans l'âme avec la <a href="#/article/la-grace-sanctifiante">grâce sanctifiante</a>. Elle vient de Dieu, qui aime le premier et met dans le cœur de l'homme le pouvoir de l'aimer en retour : <em>« L'amour de Dieu a été répandu dans nos cœurs par l'<a href="#/article/l-esprit-saint">Esprit Saint</a> qui nous a été donné. »</em> <span class="ref">Romains 5:5</span></p>
      <p>L'homme aime alors d'un amour qui le dépasse, participant à l'amour même dont Dieu nous aime : <em>« Nous, aimons, puisque lui nous a aimés le premier. »</em> <span class="ref">1 Jean 4:19</span></p>
      <h2>Aimer Dieu, aimer le prochain</h2>
      <p>L'amour de Dieu et l'amour du prochain forment une seule charité, car on aime le prochain pour Dieu et en Dieu. L'un est la mesure et la preuve de l'autre : <em>« Celui qui n'aime pas son frère, qu'il voit, ne peut aimer Dieu, qu'il ne voit pas. »</em> <span class="ref">1 Jean 4:20</span></p>
      <p>Le Christ a donné la mesure de cet amour en se livrant lui-même, et il en a fait le signe auquel on reconnaît les siens : <em>« Aimez-vous les uns les autres comme je vous ai aimés. À ceci, tous reconnaîtront que vous êtes mes disciples. »</em> <span class="ref">Jean 13:34-35</span></p>
      <h2>La forme de toutes les vertus</h2>
      <p>La charité donne aux autres vertus leur achèvement et les anime de l'intérieur, les ordonnant toutes à Dieu. Sans elle, les œuvres les plus grandes restent vides devant lui : <em>« Quand je distribuerais tous mes biens, s'il me manque l'amour, cela ne me sert de rien. »</em> <span class="ref">1 Corinthiens 13:3</span></p>
      <p>Elle relie ensemble toute la vie chrétienne et la mène à sa perfection : <em>« Par-dessus tout, ayez l'amour, qui est le lien de la perfection. »</em> <span class="ref">Colossiens 3:14</span></p>
      <h2>La plus grande, et qui demeure</h2>
      <p>La charité surpasse <a href="#/article/la-foi">la foi</a> et <a href="#/article/l-esperance">l'espérance</a>, parce qu'elle atteint Dieu lui-même et qu'elle demeure quand les deux autres s'achèvent. Au ciel, la foi laissera place à la vision et l'espérance à la possession ; la charité, elle, ne passera jamais : <em>« L'amour ne passe jamais. »</em> <span class="ref">1 Corinthiens 13:8</span></p>
      <p>Saint Paul la nomme la plus grande des trois et le sommet de toute la vie avec Dieu : <em>« Maintenant donc demeurent la foi, l'espérance et la charité, ces trois ; mais la plus grande des trois, c'est la charité. »</em> <span class="ref">1 Corinthiens 13:13</span></p>

      <h2>Un secours pour agir</h2>
      <p>La grâce actuelle rend possible l'acte qui conduit à Dieu, et d'abord le tout premier : le mouvement par lequel l'homme se tourne vers le Christ ne vient pas de lui seul, mais de la grâce qui le devance : <em>« Nul ne peut dire : Jésus est Seigneur, si ce n'est par l'Esprit Saint. »</em> <span class="ref">1 Corinthiens 12:3</span></p>

      <p>La grâce actuelle précède l'acte et l'accompagne. Prévenante, elle va devant l'homme pour éveiller en lui le désir du bien ; coopérante, elle le soutient pendant qu'il agit, de sorte qu'il accomplisse avec elle ce qu'elle a commencé en lui. L'homme agit alors vraiment, porté par Dieu, et son œuvre est tout ensemble don de Dieu et acte de l'homme : <em>« Par la grâce de Dieu, je suis ce que je suis, et sa grâce envers moi n'a pas été vaine. »</em> <span class="ref">1 Corinthiens 15:10</span></p>

      <h2>Demandée dans la prière</h2>
      <p>L'homme appelle ce secours dans la prière, lorsqu'il demande la force de tenir dans l'épreuve et de ne pas y succomber : <em>« Veillez et priez, pour ne pas entrer en tentation : l'esprit est ardent, mais la chair est faible. »</em> <span class="ref">Matthieu 26:41</span></p>
      <h2>Reçue dans la liberté</h2>

      <p>Le jour de la Pentecôte, l'<a href="#/article/l-esprit-saint">Esprit Saint</a> descend sur les apôtres et donne à l'Église d'entrer dans le monde. Dès ce jour, elle annonce l'Évangile et accueille ceux qui croient par le <a href="#/article/le-bapteme">baptême</a> : <em>« Le Seigneur ajoutait chaque jour à l'Église ceux qui étaient sauvés. »</em> <span class="ref">Actes 2:47</span></p>

      <p>L'Église est le Corps du Christ. Le Christ en est la tête, et les baptisés en sont les membres : reliés à lui et les uns aux autres, ils reçoivent de lui leur vie et forment ensemble un seul corps animé par un seul Esprit : <em>« Vous êtes le corps du Christ, et vous êtes ses membres, chacun pour sa part. »</em> <span class="ref">1 Corinthiens 12:27</span></p>
      <p>C'est de la tête que tout le corps tient sa croissance et son unité : <em>« Il est la tête du corps, qui est l'Église. »</em> <span class="ref">Colossiens 1:18</span> Ce Peuple rassemblé par Dieu est consacré à son service et appelé à le faire connaître : <em>« Vous êtes une race choisie, un sacerdoce royal, une nation sainte, un peuple acquis. »</em> <span class="ref">1 Pierre 2:9</span></p>

    contenu: `
      <p>La Trinité est le mystère central de la foi chrétienne : il y a un seul Dieu en trois Personnes, le Père, le Fils et l'Esprit Saint. Les trois sont un seul et même Dieu, égaux et éternels, partageant une seule vie divine. Ce mystère dépasse les forces de la raison ; on le connaît parce que Dieu l'a révélé, en se faisant connaître tel qu'il est. Saint Paul nomme les trois ensemble dans sa bénédiction : <em>« Que la grâce du Seigneur Jésus-Christ, l'amour de Dieu et la communion du Saint-Esprit soient avec vous tous. »</em> <span class="ref">2 Corinthiens 13:13</span></p>
      <h2>Un seul Dieu</h2>
      <p>Il n'y a qu'un seul Dieu, une seule nature divine, ce que Dieu est. La foi reçue d'Israël tient cette unité pour le premier de tout, et la confesse comme le fondement de tout le reste : <em>« Écoute, Israël : le Seigneur notre Dieu est l'unique Seigneur. »</em> <span class="ref">Deutéronome 6:4</span></p>
      <p>Le Père, le Fils et l'Esprit Saint sont l'unique Dieu. Chacun est Dieu tout entier, possédant la même et unique nature divine, sans la diviser ni la multiplier.</p>
      <h2>Trois Personnes</h2>
      <p>En ce Dieu unique, il y a trois Personnes, c'est-à-dire trois « quelqu'un » distincts, dont chacun est pleinement Dieu. <a href="#/article/le-pere">Le Père</a> est la source sans origine. <a href="#/article/le-fils">Le Fils</a> est engendré du Père de toute éternité : il en reçoit la vie divine comme un fils la reçoit de son père, et il est le <a href="#/article/le-verbe">Verbe</a> par qui tout a été fait : <em>« Au commencement était le Verbe, et le Verbe était auprès de Dieu, et le Verbe était Dieu. »</em> <span class="ref">Jean 1:1</span></p>
      <p><a href="#/article/l-esprit-saint">L'Esprit Saint</a> procède du Père et du Fils comme l'amour qui les unit. Les trois Personnes sont égales en dignité et coéternelles. Le Fils dit son unité avec le Père : <em>« Le Père et moi, nous sommes un. »</em> <span class="ref">Jean 10:30</span></p>
      <h2>Distinctes par leurs relations</h2>
      <p>Les trois Personnes se distinguent par leurs relations d'origine, et par elles seules. Le Père engendre, le Fils est engendré, l'Esprit procède : c'est tout ce qui les sépare, et cela suffit à les rendre réellement distinctes, tout en restant le seul Dieu. Tout ce qu'elles sont, elles le sont ensemble, hormis ce que la relation distingue. L'Écriture montre l'Esprit procédant du Père, et envoyé par le Fils : <em>« Quand viendra le Défenseur, que je vous enverrai d'auprès du Père, l'Esprit de vérité qui procède du Père. »</em> <span class="ref">Jean 15:26</span> Le Fils a part à cette origine, car l'Esprit reçoit de lui ce qui appartient au Père : <em>« Il prendra de ce qui est à moi ; tout ce que le Père possède est à moi. »</em> <span class="ref">Jean 16:14-15</span> C'est pourquoi l'Église confesse que l'Esprit procède du Père et du Fils.</p>
      <h2>Révélée par le Christ</h2>
      <p>Le Christ a révélé ce mystère caché en Dieu. En venant parmi les hommes, le Fils a fait connaître le Père et a promis l'Esprit. Au moment de son baptême dans le Jourdain, les trois se manifestent ensemble : le Fils dans l'eau, l'Esprit comme une colombe, le Père par sa voix : <em>« Il vit l'Esprit de Dieu descendre comme une colombe et venir sur lui, et des cieux une voix disait : Celui-ci est mon Fils bien-aimé. »</em> <span class="ref">Matthieu 3:16-17</span></p>
      <h2>Une communion d'amour</h2>
      <p>La vie intime de Dieu est un échange d'amour entre les trois Personnes, donné et reçu sans fin. Cet amour est ce que Dieu est : <em>« Dieu est amour. »</em> <span class="ref">1 Jean 4:8</span></p>
      <p>Par la <a href="#/article/la-grace-sanctifiante">grâce sanctifiante</a>, Dieu fait entrer l'homme dans cette vie : la Trinité vient habiter l'âme du baptisé et l'associe à sa propre communion. La fin de l'homme est de partager pour toujours cet amour : <em>« Si quelqu'un m'aime, il gardera ma parole, et mon Père l'aimera ; nous viendrons à lui et nous ferons chez lui notre demeure. »</em> <span class="ref">Jean 14:23</span></p>

      <h2>Le Créateur de toutes choses</h2>
      <p>L'unique Dieu crée le ciel et la terre, et le Credo rapporte cette œuvre au Père en premier, parce qu'il est l'origine de tout. Il appelle le monde à l'existence par sa seule parole, et le tient dans la vie à chaque instant : <em>« Au commencement, Dieu créa le ciel et la terre. »</em> <span class="ref">Genèse 1:1</span></p>
      <p>Le Père veille sur ce qu'il a fait avec une providence attentive, jusqu'au plus petit détail. Le Christ enseigne cette confiance envers lui : <em>« Pas un seul passereau ne tombe à terre sans votre Père. »</em> <span class="ref">Matthieu 10:29</span></p>

      <p>Ce Père accueille le pécheur qui revient et va au-devant de lui, comme le père de la parabole court vers son fils perdu : <em>« Comme il était encore loin, son père l'aperçut et fut saisi de compassion ; il courut se jeter à son cou et l'embrassa. »</em> <span class="ref">Luc 15:20</span></p>

      <h2>Le Verbe par qui tout a été fait</h2>

      <p>En se faisant homme, le Fils s'est abaissé jusqu'à la condition de serviteur, par amour et pour notre <a href="#/article/le-salut">salut</a> : <em>« Lui, de condition divine, s'est dépouillé lui-même, prenant la condition de serviteur. »</em> <span class="ref">Philippiens 2:6-7</span></p>

      <h2>Logos : la parole et la raison</h2>
      <p>Le prologue de l'évangile de Jean a été écrit en grec, et le mot qu'il emploie est « Logos » (λόγος). Ce mot dit à la fois la parole et la raison : il désigne le mot que l'on prononce, et aussi l'intelligence et l'ordre qui s'y expriment. Nommer le Fils « Logos », c'est le confesser tout ensemble Parole que le Père énonce et Sagesse par laquelle il pense et ordonne le monde.</p>

      <p>Quand la Bible fut traduite en latin, « Logos » devint « Verbum », qui signifie « parole » : <em>« In principio erat Verbum »</em>, au commencement était le Verbe. De ce mot latin vient le français « Verbe ». Le latin garde surtout le sens de parole ; la richesse du grec, qui unissait la parole et la raison, demeure dans la foi de l'Église : le Fils est à la fois la Parole et la Sagesse du Père.</p>

      <p>Le Père s'exprime en un seul Verbe, parfait et unique, en qui il dit tout ce qu'il est. Cette Parole demeure en Dieu de toute éternité, vivante et personnelle. Le Verbe est ainsi l'image parfaite du Père, celui en qui le Père se connaît et se donne : <em>« Il est le rayonnement de sa gloire et l'empreinte de son être. »</em> <span class="ref">Hébreux 1:3</span></p>

      <h2>Le Verbe s'est fait chair</h2>
      <p>La Parole éternelle de Dieu est entrée dans le monde <a href="#/article/l-incarnation">en se faisant homme</a>. Invisible jusque-là, elle s'est rendue visible, proche et audible en Jésus-Christ, vrai Dieu et vrai homme : <em>« Et le Verbe s'est fait chair, et il a habité parmi nous, et nous avons vu sa gloire. »</em> <span class="ref">Jean 1:14</span> En lui, la Parole de Dieu se laisse voir, toucher et écouter.</p>

      <p>Dieu a parlé peu à peu, par les patriarches et les prophètes, jusqu'à dire son dernier et plus grand mot dans le Fils. Le Verbe fait homme est la Parole définitive de Dieu : en lui, Dieu a tout dit, et tout donné : <em>« Dieu, qui avait parlé autrefois par les prophètes, nous a parlé en ces derniers jours par le Fils. »</em> <span class="ref">Hébreux 1:1-2</span></p>

      <p>Élevée à la droite de son Fils, Marie partage la gloire de son règne.</p>
      <h2>Une royauté d'intercession</h2>
      <p>La royauté de Marie est tout entière tournée vers celle de son Fils, vers qui elle conduit. Comme la reine mère portait au roi les demandes du peuple, Marie présente au Christ les besoins des hommes et leur obtient sa grâce. Aux noces de Cana, elle remarque le manque et le porte simplement devant lui : <em>« La mère de Jésus lui dit : Ils n'ont pas de vin. »</em> <span class="ref">Jean 2:3</span></p>
      <p>Puis elle écarte d'elle-même tout regard pour le diriger vers son Fils : <em>« Faites tout ce qu'il vous dira. »</em> <span class="ref">Jean 2:5</span></p>
      <p>Telle est sa manière de régner : non pour retenir à elle, mais pour mener au Christ. Reine dans le ciel, elle demeure mère du Christ et de l'<a href="#/article/l-eglise">Église</a>, et son règne s'exerce dans cette intercession qui obtient aux hommes le <a href="#/article/le-salut">salut</a> de son Fils.</p>

      <p>L'âge de raison, aussi appelé âge de discrétion, est le moment où l'enfant acquiert l'usage de la raison : la capacité de discerner le bien du mal et d'agir en connaissance de cause. Tant qu'il ne l'a pas atteint, il ne mesure pas la portée de ses actes. L'Écriture connaît ce seuil : elle parle des tout-petits <em>« qui ne connaissent aujourd'hui ni le bien ni le mal »</em> <span class="ref">Deutéronome 1:39</span>, et décrit l'enfant grandissant <em>« jusqu'à ce qu'il sache rejeter le mal et choisir le bien »</em> <span class="ref">Isaïe 7:15</span>.</p>
      <h2>Le repère de sept ans</h2>
      <p>L'Église situe ce seuil vers sept ans. C'est une présomption souple : certains enfants parviennent à l'usage de la raison un peu plus tôt, d'autres un peu plus tard. Ce repère sert de règle commune, à partir de laquelle l'enfant est tenu pour responsable de ses actes.</p>

      <p>Un acte n'engage son auteur que s'il est posé en connaissance et de plein gré : il faut savoir ce que l'on fait et le vouloir pour en répondre. C'est pourquoi l'enfant qui n'a pas encore l'usage de la raison ne commet pas de <a href="#/article/le-peche">péché personnel</a>, ne pouvant ni mesurer ni choisir vraiment ce qu'il fait. La responsabilité naît avec le discernement, et elle vaut dans les deux sens : devenu capable de reconnaître le bien, l'homme répond aussi du mal qu'il commet en le sachant : <em>« Celui qui sait faire le bien et ne le fait pas commet un péché. »</em> <span class="ref">Jacques 4:17</span></p>

      <p>À partir de l'âge de raison, l'enfant entre dans une vie morale responsable devant Dieu : désormais capable de faute, mais aussi de mérite, d'actes librement bons qui le font grandir dans la grâce. Il devient capable de recevoir le pardon dans <a href="#/article/la-confession">la confession</a> et d'être admis à la communion. Ce seuil distingue aussi les effets du <a href="#/article/le-bapteme">baptême</a> : reçu chez le tout-petit, il efface le seul <a href="#/article/le-peche-originel">péché originel</a> ; reçu après l'âge de raison, il efface en outre tous les péchés personnels.</p>

    contenu: `
      <p>Le péché est un refus libre de l'amour de Dieu. Il consiste à préférer sa propre volonté à la volonté divine et à transgresser la loi de Dieu, qui exprime cet amour : <em>« Le péché est la transgression de la loi. »</em> <span class="ref">1 Jean 3:4</span> Par lui, l'homme se détourne de Dieu, qui est sa fin et son bien.</p>
      <h2>Originel et personnel</h2>
      <p>Un même mot recouvre deux réalités. Le <a href="#/article/le-peche-originel">péché originel</a> est l'état de privation dans lequel tout homme naît, hérité de la faute des origines. Le péché personnel est l'acte que chacun commet par sa propre volonté, une fois venu l'<a href="#/article/l-age-de-raison">âge de raison</a>. Tous y sont exposés : <em>« Tous ont péché et sont privés de la gloire de Dieu. »</em> <span class="ref">Romains 3:23</span></p>
      <h2>Mortel et véniel</h2>
      <p>Les péchés personnels ne blessent pas tous de la même manière. Le péché mortel rompt l'amitié avec Dieu et fait perdre la <a href="#/article/la-grace-sanctifiante">grâce sanctifiante</a> ; le péché véniel la blesse sans la détruire. L'Écriture distingue elle-même ces deux poids : <em>« Il y a tel péché qui mène à la mort, et il y a tel péché qui ne mène pas à la mort. »</em> <span class="ref">1 Jean 5:16-17</span> Trois conditions, réunies ensemble, font le péché mortel. Il faut d'abord une matière grave, un acte qui contredit gravement la loi de Dieu, comme la transgression des grands commandements. Il faut ensuite la pleine conscience de cette gravité, savoir que l'on fait un mal sérieux. Il faut enfin le plein consentement, le vouloir librement, sans y être contraint. Que l'une de ces conditions manque, et le péché n'est plus mortel : une matière légère, une ignorance réelle, une liberté entamée par la peur ou la passion en allègent le poids. Le péché véniel est celui dont la matière est légère, ou dont la conscience ou le consentement restent partiels : il affaiblit la <a href="#/article/la-charite">charité</a> et dispose au mal, en laissant intacte l'amitié avec Dieu. La conséquence du péché grave, elle, est la mort de l'âme, qui perd la vie divine : <em>« Le salaire du péché, c'est la mort. »</em> <span class="ref">Romains 6:23</span></p>
      <h2>Sa racine</h2>
      <p>Toute faute naît d'un même mouvement : se préférer à Dieu. L'orgueil, qui place le moi au centre, est la racine d'où sortent les autres péchés. Le péché appauvrit l'homme, en le coupant de la source même de sa vie.</p>
      <h2>Son pardon</h2>
      <p>Dieu ne cesse d'offrir son pardon à qui revient vers lui. Le Christ a porté le péché du monde pour en délivrer les hommes, et il a confié à son <a href="#/article/l-eglise">Église</a> le pouvoir de remettre les péchés : <em>« Ceux à qui vous remettrez les péchés, ils leur seront remis. »</em> <span class="ref">Jean 20:23</span> Le péché mortel se pardonne dans <a href="#/article/la-confession">le sacrement de pénitence</a>, qui rend la grâce perdue ; le péché véniel s'efface aussi par la contrition, la prière et l'<a href="#/article/l-eucharistie">Eucharistie</a>. À celui qui reconnaît sa faute, la miséricorde est toujours promise : <em>« Si nous confessons nos péchés, il est fidèle et juste pour nous les pardonner. »</em> <span class="ref">1 Jean 1:9</span></p>

      <h2>La faute des origines</h2>
      <p>Au commencement, Dieu avait élevé l'homme au-dessus de sa propre nature, le comblant de la grâce sanctifiante et des dons préternaturels : c'est la <a href="#/article/la-justice-originelle">justice originelle</a>, l'état de sainteté et d'harmonie dans lequel il fut créé. En se détournant de Dieu pour suivre sa propre volonté, Adam a perdu ce don pour lui et pour toute sa descendance. Ce premier refus est la faute des origines, que rapporte le récit de la Genèse.</p>

      <p>Ce qu'un seul a perdu, tous l'ont perdu avec lui, car toute l'humanité tient de lui sa nature : <em>« Par un seul homme le péché est entré dans le monde, et par le péché la mort, et la mort a passé sur tous les hommes. »</em> <span class="ref">Romains 5:12</span> Cet état atteint l'homme dès sa conception : <em>« Voici, je suis né dans la faute, et ma mère m'a conçu dans le péché. »</em> <span class="ref">Psaume 51:7</span></p>

      <p>Les passions sont les mouvements spontanés de l'âme devant ce qu'elle perçoit comme un bien ou un mal : le désir, la joie, l'espérance, la crainte, la colère, et les autres. Elles appartiennent à la nature humaine et accompagnent toute vie sensible. En elles-mêmes, elles sont moralement neutres : leur valeur tient à la fin vers laquelle la raison et la volonté les conduisent.</p>
      <h2>Ordonnées par la raison</h2>
      <p>Une passion sert le bien quand la raison la gouverne : la colère devant l'injustice, le désir du véritable bien, la crainte qui détourne du mal. Elle nuit quand elle emporte l'homme hors de la raison, vers ce qui l'éloigne de Dieu. La maturité morale consiste à les ordonner et à les mettre au service de l'amour du bien.</p>
      <h2>L'harmonie originelle</h2>
      <p>Avant la chute, l'homme possédait l'intégrité : ses passions suivaient la raison sans résistance, dans une parfaite harmonie. Ce don appartenait à la <a href="#/article/la-justice-originelle">justice originelle</a>, l'état de droiture dans lequel il fut créé. Le péché l'a perdu, et le désordre est entré dans la nature humaine.</p>

      <h2>Un mot qui dit la parenté large</h2>
      <p>Dans la langue de la Bible, le mot « frère » déborde la seule fratrie. L'hébreu, comme l'araméen que parlait Jésus, n'a pas de terme distinct pour le cousin ou le neveu : un même mot couvre toute la parenté proche. Ainsi Abraham appelle Lot son frère, alors que Lot est son neveu : <em>« Car nous sommes frères. »</em> <span class="ref">Genèse 13:8</span> Les Évangiles, écrits en grec sur ce fond sémitique, gardent cet usage : ils désignent les « frères » de Jésus par le mot adelphos (ἀδελφός), qui s'étend aux cousins comme aux parents plus éloignés.</p>
      <h2>Les fils d'une autre Marie</h2>
      <p>L'Écriture le confirme par un recoupement. Elle nomme parmi les « frères » de Jésus Jacques et Joseph : <em>« Ses frères ne s'appellent-ils pas Jacques, Joseph, Simon et Jude ? »</em> <span class="ref">Matthieu 13:55</span> Or ces deux-là ont pour mère une autre Marie, distincte de la mère de Jésus et présente comme elle au pied de la Croix : <em>« Parmi elles, Marie de Magdala, Marie mère de Jacques et de Joseph. »</em> <span class="ref">Matthieu 27:56</span> Jacques et Joseph ne sont donc pas les fils de la Vierge, mais de cette autre Marie.</p>

      <h2>Une parenté, non une fratrie</h2>
      <p>Les « frères du Seigneur » appartiennent ainsi à sa famille élargie, ses proches parents, sans rien retirer à la virginité de sa mère. <a href="#/article/marie">Marie</a> n'a eu qu'un Fils, Jésus, et elle est demeurée toujours vierge.</p>

    date: "2026",
    contenu: `
      <p>On objecte que <a href="#/article/marie">Marie</a> ne peut être appelée Mère de Dieu. Dieu est éternel, sans commencement ni mère ; Marie, dit-on, est la mère de l'homme Jésus, non de la divinité. L'Église la confesse pourtant Mère de Dieu, et ce titre dit d'abord une vérité sur le Christ.</p>
      <h2>Une mère engendre une personne</h2>
      <p>Une mère met au monde quelqu'un, une personne, et non une nature. On ne dit jamais d'une femme qu'elle est mère d'une humanité ou d'une intelligence : elle est mère de tel être précis, de celui qu'elle a porté et enfanté. Ce qu'elle transmet, c'est la nature ; celui qu'elle enfante, c'est une personne.</p>
      <h2>Et cette personne est Dieu</h2>
      <p>Or la personne que Marie a conçue est le <a href="#/article/le-fils">Fils éternel de Dieu</a>, le <a href="#/article/le-verbe">Verbe</a> qui a pris chair en elle : <em>« Le Verbe s'est fait chair. »</em> <span class="ref">Jean 1:14</span> Celui qu'elle a porté en son sein est vrai Dieu et vrai homme, <a href="#/article/l-incarnation">une seule personne en deux natures</a>. Élisabeth la salue déjà comme la mère de son Seigneur : <em>« Comment m'est-il donné que la mère de mon Seigneur vienne jusqu'à moi ? »</em> <span class="ref">Luc 1:43</span> Et l'Apôtre rapporte cette naissance à Dieu lui-même : <em>« Dieu envoya son Fils, né d'une femme. »</em> <span class="ref">Galates 4:4</span></p>
      <h2>Ce qui se dit de la personne</h2>
      <p>De cette unité découle une règle de langage que l'Église nomme la communication des idiomes. Les idiomes sont les propriétés de chaque nature ; et comme le Christ est une seule personne, ce qui revient à l'une ou l'autre de ses natures s'attribue à cette unique personne, sous quelque nom qu'on la désigne. On peut donc dire en vérité que le Fils de Dieu est né, a souffert et est mort, bien que naître et mourir appartiennent à sa seule nature humaine : c'est le même qui agit et pâtit dans les deux. La règle porte sur la personne, non sur la nature prise à part : on dit que Dieu est né, parce que celui qui est né est Dieu, sans dire pour autant que la divinité serait née, car elle est sans commencement. L'Écriture parle déjà ainsi, attribuant à Dieu ce qui s'est accompli dans la chair : elle dit que les hommes ont crucifié <em>« le Seigneur de gloire »</em> <span class="ref">1 Corinthiens 2:8</span>, et que Dieu s'est acquis l'Église <em>« par son propre sang »</em> <span class="ref">Actes 20:28</span>. Par cette même règle, Marie, qui a conçu et enfanté cette personne selon sa nature humaine, est vraiment Mère de Dieu, et non la mère du seul homme Jésus.</p>
      <h2>Sans être source de la divinité</h2>
      <p>Le titre n'enferme donc aucune confusion. Marie ne donne pas à son Fils son être divin, mais sa nature humaine : c'est en elle et d'elle que Dieu s'est fait homme. Elle est Mère de Dieu parce que celui qu'elle enfante est Dieu, non parce qu'elle serait à la source de sa divinité.</p>
      <h2>Un titre qui défend le Christ</h2>
      <p>Refuser ce nom reviendrait à séparer en Jésus deux sujets : l'homme que Marie aurait enfanté, et le Dieu qui lui resterait étranger. C'est ce qu'enseignait Nestorius, et que le concile d'Éphèse a rejeté en 431 en proclamant Marie Theotokos, mot grec qui signifie celle qui enfante Dieu. Le titre garde l'unité du Christ : celui que Marie a mis au monde est une seule personne, et cette personne est Dieu.</p>

      <h2>La nécessité du baptême</h2>
      <p>Le Seigneur lie le salut au baptême : <em>« En vérité, en vérité, je te le dis, nul, s'il ne naît de l'eau et de l'Esprit, ne peut entrer dans le royaume de Dieu. »</em> <span class="ref">Jean 3:5</span> Le baptême d'eau est la voie que le Christ a donnée pour recevoir <a href="#/article/la-grace-sanctifiante">la grâce qui sauve</a>, et l'Église ne connaît pas d'autre moyen assuré.</p>
      <h2>Le baptême de désir</h2>
      <p>Celui qui désire le baptême et meurt avant de le recevoir obtient la grâce par ce désir même. Le désir est explicite chez le catéchumène, qui demande le baptême et se prépare à le recevoir. Il est implicite chez celui qui cherche Dieu d'un cœur sincère et accomplit sa volonté selon ce qu'il en connaît : sans nommer le Christ, il le désire déjà en désirant le bien et la vérité. Dans les deux cas, c'est <a href="#/article/la-charite">la charité</a> qui donne au désir sa valeur, car l'amour de Dieu contient en germe tout ce que le baptême confère.</p>

      <p>L'infaillibilité pontificale est le don par lequel le pape, lorsqu'il définit solennellement une doctrine de foi ou de morale à tenir par toute l'Église, est préservé de l'erreur par l'assistance de l'<a href="#/article/l-esprit-saint">Esprit Saint</a>. Ce don porte sur son enseignement solennel, et s'exerce dans des conditions précises.</p>
      <h2>La promesse faite à Pierre</h2>
      <p>Le Christ a bâti son Église sur <a href="#/article/la-primaute-de-pierre">Pierre</a> et lui a confié la garde de la <a href="#/article/la-foi">foi</a>. Il lui dit : <em>« Tu es Pierre, et sur cette pierre je bâtirai mon Église, et les portes de l'enfer ne prévaudront pas contre elle. »</em> <span class="ref">Matthieu 16:18</span> Et la veille de sa Passion : <em>« J'ai prié pour toi, afin que ta foi ne défaille pas ; et toi, quand tu seras revenu, affermis tes frères. »</em> <span class="ref">Luc 22:32</span> Le Seigneur prie lui-même pour que la foi de Pierre tienne, et lui donne d'affermir les autres. L'infaillibilité prolonge cette prière du Christ sur le successeur de Pierre.</p>
      <h2>Les conditions de l'acte infaillible</h2>
      <p>Le pape n'engage ce don qu'en réunissant quatre conditions. Il parle comme pasteur et docteur suprême de tous les chrétiens ; il use de son autorité apostolique suprême ; il définit une doctrine de foi ou de mœurs ; il la déclare à tenir par toute l'Église. On nomme un tel acte une définition <em>ex cathedra</em>, « du haut de la chaire » de Pierre. En dehors de ces conditions, dans ses homélies, ses entretiens, ses décisions de gouvernement ou ses opinions personnelles, le pape enseigne et mérite le respect, sans être couvert par ce don.</p>
      <h2>La garde du dépôt</h2>
      <p>Le don préserve de l'erreur en gardant le dépôt reçu. Le pape garde la foi transmise depuis les Apôtres et l'énonce fidèlement ; l'Esprit l'empêche d'égarer l'Église au moment où il fixe ce qu'elle doit croire. La révélation s'est achevée avec les Apôtres, et l'infaillibilité sert sa transmission fidèle, non l'ajout d'une parole nouvelle.</p>
      <h2>L'infaillibilité de l'Église</h2>
      <p>Ce don du pape découle d'une promesse faite à l'<a href="#/article/l-eglise">Église entière</a>. Le Christ l'a assurée contre l'erreur, <em>« les portes de l'enfer ne prévaudront pas contre elle »</em> <span class="ref">Matthieu 16:18</span>, et il lui a donné son Esprit : <em>« l'Esprit de vérité vous conduira dans toute la vérité. »</em> <span class="ref">Jean 16:13</span> L'Église ne peut donc défaillir dans la foi. Le pape exerce ponctuellement cette infaillibilité qui appartient au corps tout entier, pour trancher quand l'unité de la foi est en jeu et garder tous les fidèles dans une même vérité.</p>
      <h2>Le pape demeure un homme</h2>

      <p>Une relique est ce qui demeure d'un saint, son corps ou ses ossements, ou un objet qui lui a appartenu. L'Église les vénère en mémoire du saint dont elles gardent la trace, et de Dieu qui a fait de lui sa demeure.</p>
      <h2>Ce que l'Écriture montre</h2>
      <p>L'Écriture montre Dieu agissant par la matière liée à ses serviteurs. Au contact des ossements du prophète Élisée, un mort revient à la vie : <em>« L'homme alla toucher les os d'Élisée, et il reprit vie et se leva sur ses pieds. »</em> <span class="ref">2 Rois 13:21</span> De même, par les mains de Paul, <em>« on appliquait sur les malades des linges qui avaient touché son corps, et les maladies les quittaient. »</em> <span class="ref">Actes 19:11-12</span> Dieu se sert ainsi de ce qui a été uni à ses saints pour répandre sa <a href="#/article/la-grace">grâce</a>.</p>

      <p>Cette vénération tient à ce qu'est le corps d'un saint. Durant sa vie, il a été le temple de l'<a href="#/article/l-esprit-saint">Esprit</a> : <em>« Votre corps est le temple de l'Esprit Saint qui est en vous. »</em> <span class="ref">1 Corinthiens 6:19</span> Sanctifié par la grâce, uni au Christ, ce corps est promis à la résurrection. L'Église ne le traite pas comme une dépouille quelconque : elle l'honore comme ce qui a porté un ami de Dieu, et attend sa gloire au dernier jour.</p>
      <h2>Les trois classes de reliques</h2>
      <p>L'Église distingue trois classes de reliques. Les reliques de première classe sont le corps du saint ou ses fragments ; lorsqu'il s'agit d'une partie notable, comme la tête ou un membre, on les dit <em>insignes</em>. Les reliques de deuxième classe sont les objets que le saint a portés ou utilisés de son vivant, ses vêtements ou les instruments de son martyre. Les reliques de troisième classe sont les objets, le plus souvent une étoffe, mis en contact avec une relique de première classe ; l'Antiquité chrétienne les appelait <em>brandea</em>. Toutes renvoient à la même personne, le saint qu'elles rappellent.</p>

      <p>L'Eucharistie est le sacrement du Corps et du Sang du <a href="#/article/le-fils">Christ</a>, institué par Jésus à la dernière Cène. Sous les apparences du pain et du vin, le Christ s'y rend réellement présent, y offre son sacrifice, et s'y donne en nourriture. Elle est le centre de la vie de l'<a href="#/article/l-eglise">Église</a>.</p>
      <h2>Les préfigurations</h2>
      <p>L'Eucharistie a été préfigurée de loin. Melchisédech, roi et prêtre, offre à Dieu du pain et du vin : <em>« Melchisédech, roi de Salem, fit apporter du pain et du vin ; il était prêtre du Dieu Très-Haut. »</em> <span class="ref">Genèse 14:18</span> Au désert, la manne tombée du ciel pour nourrir Israël annonce le vrai pain que le Christ donnera : <em>« Je suis le pain vivant descendu du ciel. »</em> <span class="ref">Jean 6:51</span> Et l'agneau pascal, immolé pour épargner le peuple, préfigure le Christ : <em>« Christ, notre Pâque, a été immolé. »</em> <span class="ref">1 Corinthiens 5:7</span> Ces figures attendaient leur accomplissement à la Cène.</p>
      <h2>L'institution à la Cène</h2>
      <p>La veille de sa Passion, au cours du repas pascal, Jésus prit du pain, le bénit, le rompit et le donna à ses disciples : <em>« Ceci est mon corps. »</em> Puis il leur donna la coupe : <em>« Ceci est mon sang, le sang de l'alliance, répandu pour la multitude en rémission des péchés. »</em> <span class="ref">Matthieu 26:26-28</span> Et il commanda de renouveler ce geste : <em>« Faites ceci en mémoire de moi. »</em> <span class="ref">Luc 22:19</span> Depuis, l'Église accomplit ce que le Seigneur a fait, et le pain et le vin deviennent son Corps et son Sang.</p>
      <h2>La présence réelle</h2>
      <p>Les paroles du Christ opèrent ce qu'elles disent : le pain devient son Corps, le vin devient son Sang. Lui-même l'avait annoncé : <em>« Ma chair est vraiment une nourriture, et mon sang est vraiment un breuvage. »</em> <span class="ref">Jean 6:55</span> Ce changement porte sur la substance même : ce qui était pain et vin est maintenant le Corps et le Sang du Christ, tandis que demeurent les apparences, le goût et l'aspect, que l'on nomme les espèces. L'Église appelle ce passage la transsubstantiation. Sous ces espèces, le Christ est tout entier présent, vivant et glorieux.</p>
      <h2>Le sacrifice</h2>
      <p>L'Eucharistie est un sacrifice. Elle rend présent l'unique <a href="#/article/le-salut">sacrifice du Christ en croix</a>. Il s'est offert une fois pour toutes, et la messe ne le répète pas : elle rend présent ce qu'il a accompli au Calvaire, son offrande au Père. La <a href="#/article/la-croix-et-la-resurrection">Croix</a> et la messe sont un seul et même sacrifice, offert jadis dans le sang, offert maintenant sous les espèces du pain et du vin. C'est pourquoi l'Église l'appelle le saint sacrifice.</p>
      <h2>L'adoration du Saint-Sacrement</h2>
      <p>Puisque le Christ est réellement présent sous les espèces, l'Eucharistie reçoit l'adoration due à Dieu seul. C'est le Christ lui-même que l'on adore, présent tout entier sous les apparences du pain. L'Église garde l'Eucharistie dans le tabernacle, le lieu où on la conserve au cœur de l'église, l'expose à l'adoration des fidèles, et s'agenouille devant le Saint-Sacrement comme devant le Seigneur. L'adoration eucharistique est l'hommage rendu à cette présence.</p>
      <h2>La communion</h2>
      <p>Recevoir l'Eucharistie, c'est communier au Corps du Christ. Le Seigneur l'a promis : <em>« Celui qui mange ma chair et boit mon sang demeure en moi, et moi en lui. »</em> <span class="ref">Jean 6:56</span> La communion unit intimement au Christ, et par lui <a href="#/article/la-communion-des-saints">unit les fidèles entre eux</a> : <em>« Puisqu'il y a un seul pain, nous qui sommes plusieurs, nous formons un seul corps. »</em> <span class="ref">1 Corinthiens 10:17</span> L'Église se construit ainsi par l'Eucharistie, qui fait d'elle le Corps du Christ.</p>

      <p>La Croix et la Résurrection forment le cœur de la foi chrétienne. Par sa mort sur la Croix, le Christ rachète le péché du monde ; par sa Résurrection, il triomphe de la mort. Ces deux moments inséparables sont appelés le mystère pascal, et c'est là que s'opère notre <a href="#/article/le-salut">salut</a>.</p>
      <h2>Une offense infinie</h2>
      <p><a href="#/article/le-peche-originel">Le péché</a> avait séparé l'homme de Dieu, et cette rupture dépassait toute réparation humaine. La gravité d'une offense se mesure à la dignité de celui qu'elle atteint : un manque d'égard envers un semblable pèse moins lourd que le même affront fait à un souverain. Or le péché atteint Dieu lui-même, infiniment grand. Il porte donc une gravité sans mesure : une offense infinie.</p>
      <p>Réparer une telle offense demandait une satisfaction de valeur égale, donc infinie. Le mot satisfaction désigne ici la réparation offerte à Dieu pour le péché, le don qui répond à l'offense. Or aucun homme ne pouvait l'offrir : créature finie, déjà redevable à Dieu de tout ce qu'il est, l'homme n'avait rien à donner qui ne fût déjà dû. Sa dette le dépassait infiniment.</p>
      <p>La justice voulait pourtant que ce soit l'homme qui répare, puisque c'est l'homme qui avait péché. Il fallait donc un réparateur à la fois vrai homme, pour offrir au nom de tous, et vrai Dieu, pour que son offrande ait la valeur infinie qu'exigeait la faute. Ce réparateur, c'est <a href="#/article/le-fils">le Christ</a>, vrai Dieu et vrai homme. En lui seul, l'humanité pouvait enfin rendre à Dieu une réparation à la mesure de l'offense.</p>
      <h2>Le sacrifice de la Croix</h2>
      <p>Sur la Croix, le Christ prend sur lui le péché du monde. Jean-Baptiste l'avait désigné : <em>« Voici l'Agneau de Dieu, qui ôte le péché du monde. »</em> <span class="ref">Jean 1:29</span> Innocent, il porte la peine des coupables : <em>« Il a été transpercé à cause de nos péchés ; par ses meurtrissures, nous sommes guéris. »</em> <span class="ref">Isaïe 53:5</span> Son sang versé est le don total de lui-même au Père, offert par amour en réparation pour tous. Là, le sacrifice qu'annonçaient tous les autels d'Israël trouve son accomplissement.</p>
      <h2>Justice et miséricorde</h2>
      <p>La Croix révèle ensemble la justice et la miséricorde de Dieu. Sa justice, car le péché y est pleinement réparé, par une offrande à la mesure de l'offense.</p>
      <p>Sa miséricorde plus encore. Sauver l'homme était pure gratuité : il s'était perdu par sa propre faute, et rien n'obligeait Dieu à le relever. La miséricorde commence dans cet amour offert à qui ne l'avait pas mérité : <em>« Dieu prouve son amour envers nous : alors que nous étions encore pécheurs, le Christ est mort pour nous. »</em> <span class="ref">Romains 5:8</span> Elle va plus loin encore. La justice voulait que le coupable paie ; le coupable ne le pouvait pas. Alors c'est l'offensé qui paie pour l'offenseur : Dieu, en droit d'exiger réparation, se fait lui-même réparateur et prend à sa charge la dette qu'il aurait pu réclamer. Pour cela il donne ce qu'il a de plus cher, son propre Fils. Le don épouse la mesure de l'offense : infini comme elle.</p>
      <p>Dieu restait pourtant libre. Par sa toute-puissance, il aurait pu remettre le péché d'un simple pardon. S'il a choisi cette voie, c'est qu'elle était la plus digne de lui, celle où sa justice est honorée, sa miséricorde manifestée, et l'homme associé à sa propre rédemption. Ainsi s'accomplit la parole du psaume : <em>« L'amour et la vérité se rencontrent, la justice et la paix s'embrassent. »</em> <span class="ref">Psaume 85:11</span> À la Croix, Dieu pardonne sans rien abaisser de sa sainteté.</p>
      <h2>La victoire de la Résurrection</h2>
      <p>Le troisième jour, le Christ est ressuscité, vivant pour toujours, vainqueur du péché et de la mort. Sa Résurrection scelle la valeur de son sacrifice : <em>« Il a été livré pour nos fautes, et ressuscité pour notre justification. »</em> <span class="ref">Romains 4:25</span> Et il est le premier d'une multitude : <em>« Christ est ressuscité des morts, prémices de ceux qui sont morts. »</em> <span class="ref">1 Corinthiens 15:20</span> En lui, la mort cesse d'être une fin.</p>
      <h2>Un seul mystère pascal</h2>
      <p>La Croix et la Résurrection ne font qu'un seul acte de salut, que l'Église appelle le mystère pascal. La mort y rachète, la Résurrection y donne la vie ; l'une appelle l'autre, et le Christ passe de l'une à l'autre pour nous entraîner avec lui. C'est ce mystère que célèbre chaque messe et que renouvelle chaque Pâque.</p>
      <h2>La justification</h2>
      <p>Ce que le Christ a mérité sur la Croix, il l'applique à chacun par la justification. Justifier, c'est rendre juste : Dieu efface le péché et infuse au cœur la <a href="#/article/la-grace-sanctifiante">grâce sanctifiante</a>, transformant réellement le pécheur en fils adoptif. <em>« Justifiés gratuitement par sa grâce, par la rédemption qui est dans le Christ Jésus. »</em> <span class="ref">Romains 3:24</span> Cette grâce nous parvient par les sacrements : le <a href="#/article/le-bapteme">baptême</a> nous plonge dans la mort et la Résurrection du Christ, <em>« afin que, comme Christ est ressuscité des morts, nous menions une vie nouvelle »</em> <span class="ref">Romains 6:4</span>, et l'<a href="#/article/l-eucharistie">Eucharistie</a> nous nourrit de son sacrifice. Unis à lui, justifiés par son sang, nous attendons de ressusciter comme lui, au dernier jour.</p>

    resume: "Le mystère par lequel le Fils de Dieu a pris chair et s'est fait homme sans cesser d'être Dieu : vrai Dieu et vrai homme, une seule personne en deux natures unies sans confusion, pour le salut des hommes.",
    date: "2026",
    contenu: `
      <p>L'Incarnation est le mystère par lequel le Fils de Dieu a pris une nature humaine et s'est fait homme, sans cesser d'être Dieu. Le mot vient du latin incarnatio, « prise de chair » : en lui, Dieu s'est fait chair et a habité parmi nous. <em>« Le Verbe s'est fait chair, et il a habité parmi nous, et nous avons vu sa gloire. »</em> <span class="ref">Jean 1:14</span></p>
      <h2>Vrai Dieu et vrai homme</h2>
      <p>Celui qui s'est fait homme est le <a href="#/article/le-fils">Fils éternel</a>, vrai Dieu né du vrai Dieu. En prenant notre nature, il n'a rien perdu de sa divinité : la plénitude de Dieu demeure en lui, désormais dans une chair. <em>« En lui habite corporellement toute la plénitude de la divinité. »</em> <span class="ref">Colossiens 2:9</span> Il est ainsi tout ensemble vrai Dieu et vrai homme, pleinement l'un et pleinement l'autre.</p>
      <h2>Une seule personne, deux natures</h2>
      <p>En lui se rencontrent deux natures, la divine et l'humaine. La nature est ce qu'une chose est ; la personne est celui qui est, le sujet qui dit « je » et qui agit. Dans le Christ, les deux natures ne se mêlent pas et ne se changent pas l'une en l'autre : chacune garde ce qui lui est propre, la divinité sa toute-puissance, l'humanité sa faiblesse. Mais elles sont unies en un seul sujet, l'unique personne du Fils, qui les porte toutes deux. C'est lui, le <a href="#/article/le-verbe">Verbe</a>, qui est Dieu de toute éternité et qui, dans le temps, est aussi devenu homme. Cette union des deux natures dans l'unique personne du Verbe, l'Église l'appelle l'union hypostatique, du mot grec hypostase qui désigne la personne. Le concile de Chalcédoine l'a confessée en 451 : un seul et même Christ, en deux natures, sans confusion ni division.</p>
      <h2>Vrai homme, hormis le péché</h2>
      <p>La nature humaine que le Fils a prise est entière : un corps et une âme, une intelligence et une volonté d'homme. Il a grandi, connu la faim, la fatigue, la tristesse et la mort. En tout il a partagé notre condition, sauf le péché : <em>« éprouvé en tout, à notre ressemblance, hormis le péché. »</em> <span class="ref">Hébreux 4:15</span> Il a pris cette chair de la <a href="#/article/marie-mere-de-dieu">Vierge Marie</a>, conçu par l'<a href="#/article/l-esprit-saint">Esprit Saint</a> au jour de l'Annonciation : c'est là que le Fils éternel a commencé d'être homme.</p>
      <h2>Pourquoi Dieu s'est fait homme</h2>
      <p>Le Fils ne s'est pas fait homme pour lui-même, mais pour nous et pour notre <a href="#/article/le-salut">salut</a>. De condition divine, il s'est abaissé jusqu'à la nôtre, par amour : <em>« Lui, de condition divine, s'est dépouillé lui-même, prenant la condition de serviteur. »</em> <span class="ref">Philippiens 2:6-7</span> Il s'est fait ce que nous sommes pour nous donner ce qu'il est : <em>« De riche qu'il était, il s'est fait pauvre pour vous, afin que vous deveniez riches par sa pauvreté. »</em> <span class="ref">2 Corinthiens 8:9</span> En prenant notre nature, il l'a guérie de l'intérieur et l'a unie à Dieu : Dieu s'est fait homme pour que l'homme ait part à la vie de Dieu. C'est l'admirable échange, au cœur de notre rédemption, qui s'accomplira sur la <a href="#/article/la-croix-et-la-resurrection">Croix</a>.</p>

    titre: "Les fins dernières",
    theme: "doctrine",
    resume: "Les réalités ultimes qui attendent l'homme : la mort, qui scelle son choix ; le jugement particulier, qui fixe aussitôt son sort ; le paradis, le purgatoire ou l'enfer ; puis, à la fin des temps, la résurrection de la chair et le jugement dernier.",
    date: "2026",
    contenu: `
      <p>Les fins dernières sont les réalités ultimes qui attendent l'homme : ce qui advient au terme de sa vie, et ce qui adviendra au terme de l'histoire. La tradition en compte quatre, qu'elle nomme les novissima, les « choses dernières » : la mort, le jugement, le paradis et l'enfer. Les considérer, c'est regarder où mène la vie pour la vivre en vue de sa fin véritable.</p>
      <h2>La mort</h2>
      <p>La mort est la séparation de l'âme et du corps, le terme de la vie terrestre. Avec elle s'achève le temps du mérite : c'est durant cette vie que l'homme choisit Dieu ou s'en détourne, et la mort scelle ce choix. <em>« Il est réservé aux hommes de mourir une seule fois, après quoi vient le jugement. »</em> <span class="ref">Hébreux 9:27</span> Au-delà, on ne se convertit plus ; on est recueilli tel qu'on est devenu.</p>
      <h2>Le jugement particulier</h2>
      <p>Aussitôt après la mort, chaque âme comparaît devant Dieu et reçoit sa sentence : c'est le <a href="#/article/le-jugement-particulier">jugement particulier</a>. Il fixe immédiatement son sort, sans attendre la fin des temps. Au bon larron, Jésus le promet le jour même : <em>« Aujourd'hui, tu seras avec moi dans le paradis. »</em> <span class="ref">Luc 23:43</span> Trois états sont alors possibles : le paradis, le purgatoire ou l'enfer.</p>
      <h2>Le paradis</h2>
      <p>Le <a href="#/article/le-paradis">paradis</a> est le bonheur parfait et sans fin : voir Dieu tel qu'il est, face à face, et vivre de sa vie même. L'Église nomme cette contemplation la vision béatifique, car elle rend bienheureux ceux qui la reçoivent. <em>« Nous lui serons semblables, parce que nous le verrons tel qu'il est. »</em> <span class="ref">1 Jean 3:2</span> Ce bonheur est donné dès le jugement particulier aux âmes pleinement purifiées, avant même que leur corps ne ressuscite.</p>
      <h2>Le purgatoire</h2>
      <p>Beaucoup meurent dans l'<a href="#/article/la-grace-sanctifiante">amitié de Dieu</a>, mais imparfaitement purifiés, encore marqués par les suites de leurs péchés. Avant d'entrer dans la pleine lumière du ciel, ils passent par une purification, <a href="#/article/le-purgatoire">le purgatoire</a>. Ces âmes sont <a href="#/article/le-salut">déjà sauvées</a> : elles achèvent seulement de se purifier avant de voir Dieu. <em>« Il sera sauvé, mais comme à travers le feu. »</em> <span class="ref">1 Corinthiens 3:15</span> Nous pouvons hâter leur entrée au ciel par <a href="#/article/la-communion-des-saints">notre prière</a>.</p>
      <h2>L'enfer</h2>
      <p><a href="#/article/l-enfer">L'enfer</a> est la séparation éternelle d'avec Dieu, le sort de qui meurt en refusant volontairement son amour par un <a href="#/article/le-peche">péché mortel</a> non regretté. Dieu ne damne personne de force : l'enfer ratifie un refus que l'homme a voulu et maintenu jusqu'au bout. <em>« Allez loin de moi, maudits, dans le feu éternel. »</em> <span class="ref">Matthieu 25:41</span> Sa peine première est la privation de Dieu, pour qui l'âme était faite.</p>
      <h2>La résurrection de la chair et le jugement dernier</h2>
      <p>L'histoire ne s'achève pas sur des âmes séparées de leur corps. À la fin des temps, le Christ reviendra dans la gloire, les morts <a href="#/article/la-croix-et-la-resurrection">ressusciteront</a> en leur propre corps, et l'âme de chacun retrouvera la chair qu'elle animait : c'est la <a href="#/article/la-resurrection-de-la-chair">résurrection de la chair</a>. Alors aura lieu le <a href="#/article/le-jugement-dernier">jugement dernier</a>, universel et public, où la justice de Dieu sur toute l'histoire sera manifestée aux yeux de tous. <em>« Tous ceux qui sont dans les tombeaux entendront sa voix, et ils en sortiront. »</em> <span class="ref">Jean 5:28-29</span> Les corps des justes, glorifiés, partageront pour toujours le bonheur de leur âme.</p>

    date: "2026",
    contenu: `
      <p>Le purgatoire est l'état de purification que traversent, <a href="#/article/les-fins-dernieres">après la mort</a>, ceux qui meurent dans l'<a href="#/article/la-grace-sanctifiante">amitié de Dieu</a> sans être encore pleinement purifiés. Leur salut est acquis : ils entreront au ciel avec certitude. Avant de voir Dieu face à face, il leur reste à achever de se purifier de tout ce qui, en eux, n'est pas encore pleinement tourné vers lui.</p>
      <h2>La faute et la peine</h2>
      <p>D'où vient ce besoin de purification ? Tout <a href="#/article/le-peche">péché</a> blesse deux fois : il offense Dieu, et il laisse en l'homme une marque, un attachement désordonné aux choses créées. Quand le péché est pardonné, l'offense est remise, et avec elle la peine éternelle, la séparation d'avec Dieu. Demeure souvent une peine temporelle : une dette à acquitter, le temps que l'amour de Dieu achève de redresser en nous ce que le péché avait tordu. Cette dette se paie ici-bas, par <a href="#/article/la-satisfaction">la pénitence</a> et les œuvres de charité ; ce qui n'a pas été acquitté avant la mort l'est au purgatoire. <em>« Tu ne sortiras pas de là que tu n'aies payé jusqu'au dernier sou. »</em> <span class="ref">Matthieu 5:26</span></p>
      <h2>Ce que l'Écriture atteste</h2>
      <p>L'Écriture montre qu'on peut prier pour les morts et que cette prière leur profite. Au temps des Maccabées, Judas fait offrir un sacrifice pour les soldats tombés : <em>« C'est une pensée sainte et salutaire de prier pour les morts, afin qu'ils soient délivrés de leurs péchés. »</em> <span class="ref">2 Maccabées 12:46</span> Une telle prière serait vaine pour les bienheureux, qui n'en ont pas besoin, et pour les damnés, que nul ne peut secourir : elle suppose un troisième état, où l'âme se purifie. Saint Paul l'évoque comme un passage par le feu : <em>« Il subira une perte, mais lui sera sauvé, comme à travers le feu. »</em> <span class="ref">1 Corinthiens 3:15</span> Et Jésus laisse entendre que certaines fautes peuvent être remises au-delà de la mort : <em>« Il ne lui sera pardonné ni dans ce siècle ni dans le siècle à venir. »</em> <span class="ref">Matthieu 12:32</span></p>
      <h2>Une souffrance dans l'espérance</h2>
      <p>La purification du purgatoire est réelle et douloureuse : l'âme y souffre d'être encore retenue loin du Dieu qu'elle aime et désire de toute sa force. Cette souffrance est tout entière habitée par l'espérance, car ces âmes savent qu'elles sont <a href="#/article/le-salut">sauvées</a> et que leur attente a un terme. Ce feu purifie comme l'or au creuset : il consume ce qui reste d'impur pour rendre l'âme digne de la pleine lumière. L'état est transitoire ; il prendra fin, et toutes ces âmes verront Dieu.</p>
      <h2>Nous pouvons les aider</h2>
      <p>Les âmes du purgatoire ne peuvent plus mériter pour elles-mêmes, mais nous, les vivants, pouvons les soulager et hâter leur délivrance. C'est le sens des suffrages : la prière, l'aumône, la pénitence offertes à leur intention, et par-dessus tout le sacrifice de la <a href="#/article/l-eucharistie">messe</a>, où la Croix du Christ est rendue présente pour eux. En cela nous vivons la <a href="#/article/la-communion-des-saints">communion des saints</a> : l'Église de la terre vient en aide à l'Église qui se purifie, dans l'unique charité qui relie tous les membres du Christ.</p>
