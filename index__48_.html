      <p>Le canon est la liste des livres que l'Église reconnaît comme Écriture inspirée de Dieu. L'Ancien Testament catholique compte quarante-six livres, sept de plus que la Bible protestante, qui en retient trente-neuf. Ces sept livres sont les deutérocanoniques. Savoir qui a reconnu ces livres, et quand, touche la racine de la foi en l'Écriture elle-même.</p>
      <h2>Le canon et les deutérocanoniques</h2>
      <p>Le mot « canon » vient du grec <em>kanōn</em> (κανών), la règle, le roseau qui sert à mesurer ; il désigne la liste réglée des livres tenus pour inspirés. Les sept livres propres à la Bible catholique sont Tobie, Judith, la Sagesse, le Siracide (ou Ecclésiastique), Baruch, et les deux livres des Maccabées. S'y ajoutent des passages deutérocanoniques au livre de Daniel et au livre d'Esther. On les dit deutérocanoniques, du grec <em>deuteros</em> (δεύτερος), « second » : non qu'ils soient de second rang, mais parce que leur entrée au canon fut discutée à certaines époques, là où les autres, dits protocanoniques, ne le furent jamais. Ils sont pleinement inspirés. Un piège de vocabulaire se glisse ici : ce que les catholiques appellent deutérocanonique, les protestants l'appellent « apocryphe » ; et ce que les catholiques appellent apocryphe, du grec <em>apokryphos</em> (ἀπόκρυφος), « caché », les écrits non inspirés tels les faux évangiles, les protestants le nomment « pseudépigraphe ». Le même mot recouvre deux réalités selon qui le prononce.</p>
      <h2>La Septante, Bible de l'Église</h2>
      <p>Au temps du Christ, les Écritures juives circulaient sous deux formes : les textes hébreux, et leur traduction grecque, la Septante, commencée à Alexandrie trois siècles avant lui. La Septante portait les livres deutérocanoniques. L'Église des apôtres, qui parlait grec, reçut la Septante comme son Ancien Testament, et le Nouveau Testament la cite à chaque page. Les Pères s'en servirent, et les conciles des premiers siècles dressèrent la liste complète, les sept compris. Pendant plus de mille ans, la Bible de l'Église porta ces livres. Ces livres portent le Christ : le juste persécuté du livre de la Sagesse préfigure la Passion, et la Sagesse elle-même, présentée comme une personne, laisse entrevoir le Verbe ; le Siracide nourrit jusqu'aujourd'hui la prière de l'Église à Marie. Le Nouveau Testament puise à ces pages : <em>« D'autres furent torturés, refusant la délivrance, afin d'obtenir une meilleure résurrection. »</em> <span class="ref">Hébreux 11:35</span> Ces mots regardent les sept frères martyrs du second livre des Maccabées. Et la fête de la Dédicace, que le Christ lui-même célèbre dans l'Évangile, vient de l'histoire que racontent ces livres : <em>« On célébrait alors à Jérusalem la fête de la Dédicace. »</em> <span class="ref">Jean 10:22</span></p>
      <h2>Qui a retranché, et quand</h2>
      <p>Vers la fin du premier siècle, le judaïsme arrêta sa propre liste sur les seuls livres conservés en hébreu, laissant de côté les sept. Au quatrième siècle, traduisant la Bible sur l'hébreu, Jérôme nota cette différence et marqua une réserve ; mais l'Église garda les livres, suivant Augustin et les conciles, et Jérôme les traduisit lui-même. Ils demeurèrent dans la Bible chrétienne jusqu'à la Réforme. Au seizième siècle, les réformateurs retranchèrent les sept de l'Ancien Testament et les rangèrent à part, sous le nom d'« apocryphes » : Luther les jugea utiles à lire, non égaux à l'Écriture. Les enjeux de doctrine n'y étaient pas étrangers, car certains de ces livres soutiennent des vérités qu'ils rejetaient, comme la prière pour les défunts : <em>« Il fit offrir ce sacrifice pour les morts, afin qu'ils fussent délivrés de leur péché. »</em> <span class="ref">2 Maccabées 12:46</span> En réponse, le concile de Trente, en 1546, définit solennellement le canon des quarante-six livres de l'Ancien Testament et des vingt-sept du Nouveau. Plus tard, jugeant ces livres non inspirés et leur impression coûteuse, les sociétés bibliques du dix-neuvième siècle cessèrent de les imprimer, pour ne diffuser que les écrits tenus pour Écriture ; il n'en resta que trente-neuf livres.</p>
      <h2>Le ou les canons orthodoxes</h2>
      <p>Les Églises d'Orient ont gardé la Septante, et leur canon est plus large que le canon catholique. Outre les sept livres, l'Orthodoxie reçoit encore le premier livre d'Esdras (une forme grecque d'Esdras, distincte du livre canonique), la Prière de Manassé, le Psaume 151 et le troisième livre des Maccabées ; le quatrième livre des Maccabées figure souvent en appendice. Elle nomme ces livres lus les <em>anagignoskomena</em> (ἀναγινωσκόμενα), « ceux que l'on lit ». La tradition grecque et la tradition slave varient légèrement, cette dernière portant en outre un Esdras de plus, de caractère apocalyptique. L'Orient n'a jamais fixé sa liste avec la rigueur close de Trente : ses synodes ont reçu ces livres sans en arrêter le compte de façon aussi tranchée. Plus loin encore, les Églises orthodoxes orientales étendent le canon : l'Église éthiopienne possède le plus vaste de toute la chrétienté, jusqu'à recevoir Hénoch et les Jubilés, ce livre d'Hénoch que cite même la lettre de Jude. L'Église catholique ne reçoit pas ces livres surnuméraires : dans la Bible latine, le troisième et le quatrième Esdras et la Prière de Manassé furent relégués en appendice, conservés sans être tenus pour inspirés. Les listes s'emboîtent ainsi : les trente-neuf livres protestants tiennent dans les quarante-six catholiques, qui tiennent dans le canon orthodoxe, lui-même contenu dans le canon éthiopien.</p>
      <h2>Le canon vient de l'Église</h2>
      <p>Le désaccord sur le canon découvre un point que le principe « l'Écriture seule » ne peut résoudre. <em>Sola scriptura</em>, en latin « l'Écriture seule », est la règle posée par la Réforme : l'Écriture seule ferait foi. Or aucun livre de la Bible ne contient la liste des livres de la Bible ; cette liste ne se lit dans aucune page inspirée. Pour savoir quels écrits sont parole de Dieu, il faut la recevoir d'ailleurs, et cet ailleurs est l'Église, qui sous l'Esprit a discerné et proclamé le canon. Le principe qui écarte l'autorité de l'Église repose donc sur une liste que l'Écriture seule ne peut fournir. La Bible même que tenaient les réformateurs leur avait été remise par l'Église qui en avait fixé le contenu. <em>« l'Église du Dieu vivant, colonne et appui de la vérité. »</em> <span class="ref">1 Timothée 3:15</span></p>
      <h2>Pourquoi le canon catholique</h2>
      <p>Reste à savoir pourquoi ce canon, et non un autre, ni plus court ni plus long. Le critère n'est pas la langue d'un livre ni sa présence dans tel manuscrit, mais sa réception : un livre est canonique parce que l'Église l'a reçu comme inspiré et le tient pour tel sans interruption. Or les sept livres furent lus dès l'âge apostolique, dans la Septante, et les conciles des premiers siècles, à Rome, à Hippone, à Carthage, en dressèrent la liste, exactement celle de la Bible catholique, reçue ainsi sans interruption pendant quinze cents ans.</p>
      <p>Face aux protestants, l'argument est net. La même Église qui a discerné les vingt-sept livres du Nouveau Testament a discerné les sept de l'Ancien, d'un seul et même acte, dans les mêmes conciles. Or les protestants reçoivent ce Nouveau Testament en entier : ils tiennent l'Évangile selon Matthieu pour inspiré et l'évangile de Thomas pour faux, sur la seule autorité de l'Église qui en a jugé. Recevoir de cette main les vingt-sept et lui refuser les sept, c'est se fier à son discernement et le récuser du même geste ; on ne garde pas la table des matières en congédiant celui qui l'a dressée. Quant à la liste hébraïque qu'ils invoquent, elle fut arrêtée par un judaïsme postérieur au Christ et qui l'avait rejeté : l'Église ne reçoit pas de la synagogue le compte de ses Écritures.</p>
      <p>Face aux orthodoxes, la question se déplace. L'Orient n'a rien retranché ; il a gardé, au-delà des sept, d'autres écrits de la Septante : un Esdras grec, la Prière de Manassé, le Psaume 151, le troisième livre des Maccabées. Mais la présence d'un texte dans un manuscrit grec ne suffit pas à le rendre inspiré, et la Septante elle-même le marque : son Psaume 151 porte une mention grecque rendue par « hors du nombre », <em>exōthen tou arithmou</em> (ἔξωθεν τοῦ ἀριθμοῦ), hors des cent cinquante psaumes reçus. Ces écrits furent lus et estimés, sans que les conciles qui fixèrent la liste les y aient jamais inscrits. L'Église catholique a donc discerné, à l'intérieur même de la Septante, ce qui avait été reçu comme inspiré, sans tenir pour Écriture tout ce que portaient les copies grecques.</p>
      <p>Plus profondément, l'Orient n'a jamais clos son canon. Ses listes varient d'une tradition à l'autre, la grecque et la slave ne comptant pas les mêmes livres, et nul concile reçu de tout l'Orient n'a tranché la question avec la fermeté d'une définition ; ces écrits y flottent souvent à un rang second, lus à l'église sans qu'on en fasse la règle de la foi. Cette indétermination n'est pas un détail : elle montre qu'un canon ne se ferme que là où une autorité peut le fermer pour toute l'Église. L'Église catholique, par l'autorité reçue de Pierre, l'a fait : au concile de Trente, elle a fixé la liste une fois pour toutes, obligatoire pour tous. Le canon catholique est ainsi celui que la Tradition universelle a constamment reçu, ni amputé comme chez les protestants, ni laissé ouvert comme en Orient, mais arrêté définitivement par celui qui en avait le pouvoir.</p>

      <h2>Le shéol dans l'Ancien Testament</h2>
      <p>Le mot hébreu rendu par « séjour des morts » est <em>she'ol</em> (<span dir="rtl">שְׁאוֹל</span>) ; la version grecque le traduit par <em>Hadēs</em> (ᾅδης). C'est le lieu d'en bas, la fosse, les profondeurs, où l'on descend en mourant. Tous y vont, le juste comme le méchant ; on y mène une existence diminuée, dans l'ombre et le silence, séparé des vivants et coupé de la louange de Dieu. Jacob, croyant son fils mort, veut l'y rejoindre : <em>« Je descendrai vers mon fils, dans le séjour des morts, en menant deuil. »</em> <span class="ref">Genèse 37:35</span> Et le psaume gémit de cette coupure : <em>« Dans la mort, nul souvenir de toi ; au séjour des morts, qui te célèbre ? »</em> <span class="ref">Psaume 6:6</span> L'espérance d'Israël ne va pas encore jusqu'au ciel ouvert : elle attend.</p>

      <h2>Le Christ descendu aux enfers</h2>
      <p>À sa mort, le Christ descendit au séjour des morts. Le Credo le confesse : il est descendu aux enfers. Le mot « enfer » vient du latin <em>inferi</em>, « ceux d'en bas » : il nomme d'abord le lieu souterrain où descendent tous les morts, avant de désigner aussi le lieu des damnés. C'est au premier que le Christ descendit, non au second : il y vint en vainqueur, trouver les justes qui l'attendaient et leur porter la nouvelle du salut accompli : <em>« Il alla prêcher aux esprits en prison. »</em> <span class="ref">1 Pierre 3:19</span> Il ouvrit alors le ciel que le péché avait fermé, et fit passer les justes de l'attente à la gloire.</p>
      <h2>Depuis le Christ</h2>

      <p>Pendant près de trois siècles, de Néron jusqu'à l'année 313, le christianisme fut une religion interdite, et rester chrétien pouvait conduire à la mort. La persécution ne pesa pas partout ni toujours, mais elle pouvait surgir à tout moment, et elle revint par vagues de plus en plus larges. De cette épreuve l'Église sortit non pas brisée, mais grandie, portant désormais au cœur de sa mémoire ceux qui avaient préféré mourir que renier : les martyrs.</p>
      <h2>Une religion hors la loi</h2>
      <p>Rome n'était pas hostile aux religions : elle en accueillait des dizaines, pourvu qu'elles s'ajoutent au culte des dieux de la cité et de l'empereur, garant de l'ordre du monde. Cette religion publique était l'affaire de tous, et l'on jugeait qu'en négliger les rites attirait la colère des dieux sur l'Empire entier. Le judaïsme, antique et reconnu, en était dispensé par une tolérance particulière. Le christianisme, lui, n'avait pas ce privilège : religion nouvelle, sortie du judaïsme mais distincte de lui, il n'offrait l'adoration qu'au seul vrai Dieu et refusait l'encens aux idoles et à l'empereur. Ce refus, simple acte de fidélité pour les chrétiens, était pour Rome de l'athéisme et une trahison. Le Christ avait averti les siens que le monde les traiterait comme lui. <em>« S'ils m'ont persécuté, ils vous persécuteront aussi. »</em> <span class="ref">Jean 15:20</span></p>
      <h2>Les calomnies</h2>
      <p>Au mépris officiel s'ajoutait la haine populaire, nourrie de rumeurs. On accusait les chrétiens d'athéisme, parce qu'ils n'avaient ni temples ni statues. On les disait anthropophages, parce qu'ils parlaient de manger le corps et de boire le sang de leur Seigneur, sans rien savoir de l'eucharistie. On les soupçonnait d'unions incestueuses, parce qu'ils se nommaient frères et sœurs et tenaient des repas d'amour. On les tenait pour ennemis du genre humain, eux qui fuyaient les fêtes, les jeux et les honneurs publics. Et quand survenaient la peste, la famine ou la défaite, la foule criait que les dieux se vengeaient de cette impiété : « Les chrétiens aux lions ! » Porter ce nom suffisait à condamner.</p>

      <h2>Les grandes vagues</h2>
      <p>La première persécution éclata sous Néron, en 64 : après l'incendie de Rome, dont la rumeur l'accusait lui-même, l'empereur en rejeta la faute sur les chrétiens et les fit périr dans des supplices atroces, crucifiés ou brûlés comme des torches vivantes. C'est à Rome, sous Néron, que Pierre et Paul donnèrent leur vie. Les persécutions suivantes restèrent d'abord locales : sous Trajan, l'évêque Ignace d'Antioche fut conduit à Rome et livré aux bêtes ; sous Marc Aurèle, vers 177, les chrétiens de Lyon furent suppliciés, parmi eux l'esclave Blandine, tandis que le philosophe Justin était décapité à Rome et le vieil évêque Polycarpe brûlé à Smyrne ; sous Septime Sévère périrent à Carthage les jeunes femmes Perpétue et Félicité. Puis vinrent les persécutions générales, ordonnées pour tout l'Empire : sous Dèce, en 250, qui le premier voulut contraindre tous les sujets à sacrifier ; sous Valérien, qui frappa d'abord les évêques et les prêtres, faisant mourir Cyprien de Carthage et le diacre Laurent à Rome. La dernière, la plus longue et la plus dure, fut celle de Dioclétien, à partir de 303 : on rasa les églises, on brûla les Écritures, on emprisonna le clergé, et des milliers de fidèles, en Orient surtout, furent mis à mort, parmi lesquels l'Église garde les noms d'Agnès et de Sébastien. À qui tiendrait jusqu'au bout, le Christ avait promis le salut. <em>« Vous serez haïs de tous à cause de mon nom ; mais celui qui persévérera jusqu'à la fin sera sauvé. »</em> <span class="ref">Matthieu 10:22</span></p>
      <h2>Le sens du martyre</h2>
      <p>Le mot « martyr » vient du grec <em>martys</em> (μάρτυς), le témoin. Le martyr rend au Christ le témoignage le plus entier : il aime mieux perdre la vie que le renier, et donne ainsi de l'amour de Dieu une preuve que rien ne surpasse. Sa mort le configure à celle du Christ, dont il partage la croix pour partager la victoire. L'Église l'a toujours tenue pour un baptême dans le sang : celui qui meurt pour le Christ sans avoir reçu le baptême d'eau est lavé de tout péché et entre aussitôt au ciel. Les actes des martyrs, ces récits de leur procès et de leur mort, les montrent souvent paisibles, parfois joyeux devant le supplice, car cette force ne vient pas d'eux, mais de la grâce. <em>« Sois fidèle jusqu'à la mort, et je te donnerai la couronne de vie. »</em> <span class="ref">Apocalypse 2:10</span></p>
      <h2>Le culte des martyrs</h2>
      <p>Dès les origines, l'Église entoura ses martyrs d'un honneur particulier. On recueillait leurs restes comme un trésor, on notait le jour de leur mort, qu'on appelait leur naissance au ciel, et l'on se rassemblait chaque année sur leur tombe pour y célébrer l'eucharistie. De là viennent les catacombes, ces galeries souterraines où reposaient les défunts, et l'usage, demeuré jusqu'à nous, de sceller des reliques de saints dans la pierre de l'autel. Le martyr étant uni au sacrifice du Christ, on offrait le sacrifice sur son corps. <em>« Je vis sous l'autel les âmes de ceux qui avaient été immolés à cause de la parole de Dieu et du témoignage qu'ils avaient rendu. »</em> <span class="ref">Apocalypse 6:9</span></p>
      <h2>La question des lapsi</h2>
      <p>Toutes les persécutions n'ont pas fait que des martyrs. Beaucoup, par peur, sacrifièrent aux dieux ou achetèrent un faux certificat : on les appela les <em>lapsi</em>, les tombés. La paix revenue, beaucoup demandaient à rentrer dans l'Église, et l'on se divisa sur leur sort. Des rigoristes voulaient les exclure pour toujours. L'Église choisit la miséricorde : après un temps de pénitence, le pécheur repenti était réconcilié, car aucune faute ne dépasse le pardon de Dieu pour qui se convertit. Cette crise affermit la pratique de la pénitence et l'idée que l'Église, sainte, porte pourtant en son sein des pécheurs appelés à se relever.</p>
      <h2>La paix de l'Église</h2>
      <p>Au début du quatrième siècle, l'Empire renonça au combat. En 311, l'empereur Galère, mourant, accorda aux chrétiens la liberté de leur culte ; en 313, après sa victoire, Constantin la confirma et l'étendit par l'édit de Milan, qui rendit au christianisme une pleine liberté. L'âge des martyrs prenait fin. Mais le sang versé n'avait pas éteint la foi : il l'avait répandue. La foule venue voir mourir des condamnés attendait des cris et des reniements ; elle voyait des hommes et des femmes affronter le supplice avec paix, parfois en pardonnant à leurs bourreaux, et tenir jusqu'au bout pour un crucifié. Une telle constance passait les forces de l'homme. Beaucoup repartaient ébranlés par ce qu'ils avaient vu ; ils s'interrogeaient, cherchaient à connaître cette foi, s'approchaient des chrétiens pour s'en instruire, et nombre d'entre eux finissaient par demander le baptême. Selon le mot de Tertullien, le sang des martyrs est une semence de chrétiens. <em>« Si le grain de blé tombé en terre ne meurt, il reste seul ; mais s'il meurt, il porte beaucoup de fruit. »</em> <span class="ref">Jean 12:24</span> L'Église sortit de ces trois siècles affermie, et elle n'oublia jamais ceux qui l'avaient scellée de leur sang.</p>

      <p>Le bonheur du paradis est une communion. Les bienheureux vivent dans la joie de Dieu et dans la joie les uns des autres : c'est la communion des saints parvenue à son terme, la cité où Dieu habite avec les siens. <em>« Voici la demeure de Dieu avec les hommes ; il demeurera avec eux, et ils seront son peuple. »</em> <span class="ref">Apocalypse 21:3</span> Là, toute douleur est effacée : <em>« Il essuiera toute larme de leurs yeux, et la mort ne sera plus. »</em> <span class="ref">Apocalypse 21:4</span> Les âmes des justes goûtent ce bonheur aussitôt après le jugement particulier ; à la fin des temps, quand les corps ressusciteront, leur joie rejaillira sur la chair glorifiée, et l'homme tout entier, corps et âme, vivra de Dieu.</p>

      <p>Le temps de la vie est le temps du choix. Tant que l'homme vit, il peut se tourner vers Dieu ou s'en détourner, se perdre ou se reprendre. La mort scelle ce temps : l'âme se présente devant Dieu dans l'état où elle l'a quittée, et ce qu'elle a choisi devient définitif. <em>« Il est réservé aux hommes de mourir une seule fois, après quoi vient le jugement. »</em> <span class="ref">Hébreux 9:27</span> On ne meurt qu'une seule fois ; l'orientation prise au dernier instant demeure pour toujours.</p>

      <h2>L'homme tout entier</h2>
      <p>L'homme est un être de chair autant que d'esprit : son âme et son corps forment ensemble une seule personne. La mort sépare violemment ce qui était fait pour être uni, l'âme partant vers Dieu et le corps retournant à la terre. Le salut que Dieu donne atteint l'homme entier : il rendra aussi le corps à la vie.</p>
      <h2>Le Christ ressuscité, gage de notre résurrection</h2>
      <p>Le fondement de cette espérance est la résurrection du Christ. En sortant vivant du tombeau, dans son propre corps, il a ouvert le chemin : sa victoire sur la mort est la source et le modèle de la nôtre. <em>« Le Christ est ressuscité des morts, prémices de ceux qui se sont endormis. »</em> <span class="ref">1 Corinthiens 15:20</span> Le mot « prémices » désigne les premiers fruits de la récolte, ceux qui annoncent et garantissent tout le reste : la résurrection du Christ assure la nôtre.</p>

      <h2>Le retour du Christ dans la gloire</h2>
      <p>À la fin du monde, le Christ reviendra dans la gloire. Monté au ciel après sa résurrection, il viendra une seconde fois, visible de tous, pour juger les vivants et les morts. Ce retour est appelé la Parousie (παρουσία), mot grec qui signifie la venue, la présence du Seigneur. <em>« Ce Jésus qui a été enlevé au ciel reviendra de la même manière que vous l'avez vu s'en aller. »</em> <span class="ref">Actes 1:11</span></p>
      <h2>Tous comparaissent ensemble</h2>
      <p>Le jugement dernier est universel : tous les hommes de toute l'histoire, ressuscités en leur corps, paraissent ensemble devant le Christ juge. Nul n'y échappe, et chacun y est jugé tout entier, corps et âme enfin réunis. <em>« Il nous faut tous comparaître devant le tribunal du Christ. »</em> <span class="ref">2 Corinthiens 5:10</span></p>
      <h2>La manifestation de tout</h2>
      <p>Ce jour révèle ce qui était caché. Les pensées, les paroles et les actes de chacun, le bien comme le mal, et leurs conséquences à travers toute l'histoire, sont dévoilés devant tous. <em>« Il mettra en lumière ce qui est caché dans les ténèbres et manifestera les desseins des cœurs. »</em> <span class="ref">1 Corinthiens 4:5</span> Alors le Christ sépare les justes des réprouvés. <em>« Quand le Fils de l'homme viendra dans sa gloire, il séparera les hommes les uns des autres, comme le berger sépare les brebis des boucs. »</em> <span class="ref">Matthieu 25:31-32</span> Et la mesure de ce partage est l'amour, jusque dans le plus petit des frères, l'affamé, l'étranger, le malade, le prisonnier. À ceux qui les ont secourus, il dit : <em>« Ce que vous avez fait à l'un de ces plus petits de mes frères, c'est à moi que vous l'avez fait. »</em> <span class="ref">Matthieu 25:40</span> À ceux qui les ont délaissés : <em>« Ce que vous n'avez pas fait à l'un de ces plus petits, c'est à moi que vous ne l'avez pas fait. »</em> <span class="ref">Matthieu 25:45</span> Les uns entrent pour toujours au paradis, les autres en enfer.</p>
      <h2>Pourquoi un jugement dernier</h2>
      <p>Si le sort de chacun est déjà fixé à sa mort, pourquoi ce jugement universel ? Parce que la vie d'un homme ne s'achève pas avec lui : le bien et le mal qu'il a semés continuent de porter leurs fruits à travers les siècles, et la vérité entière d'une existence ne se voit qu'à la fin, lorsque toutes ses conséquences sont accomplies. Parce que l'homme est jugé en son entier, et que le corps, ressuscité, doit recevoir sa part de la sentence. Parce que le salut rassemble un seul peuple, et qu'il convient que la famille humaine tout entière paraisse ensemble. Et parce que la justice de Dieu, souvent obscurcie dans le cours de l'histoire, où le juste a semblé vaincu et le méchant prospère, sera enfin manifestée devant tous. <em>« Au jour de la révélation du juste jugement de Dieu, il rendra à chacun selon ses œuvres. »</em> <span class="ref">Romains 2:5-6</span></p>

      <p>Le mariage est l'alliance par laquelle un homme et une femme se donnent l'un à l'autre pour toute la vie, formant une communauté ordonnée à leur amour mutuel et à l'accueil des enfants. Entre deux baptisés, le Christ l'a élevé à la dignité de sacrement, signe sacré qui donne la grâce de Dieu.</p>
      <h2>Institué par Dieu dès l'origine</h2>
      <p>Dieu a inscrit le mariage dans la nature de l'homme et de la femme dès la création. En les créant l'un pour l'autre, il les unit dans une seule vie et les bénit pour la fécondité. <em>« L'homme quittera son père et sa mère, il s'attachera à sa femme, et ils deviendront une seule chair. »</em> <span class="ref">Genèse 2:24</span> Il ouvre cette union à la vie, faisant des époux les premiers transmetteurs de la sienne. <em>« Soyez féconds et multipliez-vous. »</em> <span class="ref">Genèse 1:28</span></p>
      <h2>Les fins du mariage</h2>
      <p>Le mariage sert deux fins que Dieu a jointes ensemble. La première est le bien des époux eux-mêmes : ils sont faits l'un pour l'autre, s'aident, se complètent et grandissent ensemble vers Dieu. <em>« Il n'est pas bon que l'homme soit seul ; je lui ferai une aide qui lui corresponde. »</em> <span class="ref">Genèse 2:18</span> La seconde est l'accueil et l'éducation des enfants : l'amour des époux, par sa nature même, se prolonge dans la vie qu'il transmet et qu'il élève. Ces deux fins se tiennent : l'union des époux s'ouvre à l'enfant, et l'enfant naît du don que les époux se font l'un à l'autre.</p>
      <h2>Élevé par le Christ au rang de sacrement</h2>
      <p>Le Christ a élevé le mariage à la dignité de sacrement en l'unissant à sa propre alliance avec l'Église. L'amour des époux reproduit l'amour du Christ pour elle : comme le Christ se donne pour l'Église jusqu'à la Croix, lui demeure uni sans jamais s'en séparer et la rend féconde, les époux se donnent l'un à l'autre tout entiers, demeurent unis pour la vie et ouvrent leur amour à la vie. L'union visible des deux époux donne ainsi à voir l'union invisible du Christ et de l'Église : c'est en cela qu'elle en est le signe. <em>« Ce mystère est grand : je le dis par rapport au Christ et à l'Église. »</em> <span class="ref">Éphésiens 5:32</span> Cette élévation suppose le baptême des deux époux, qui les fait membres du Christ : c'est parce qu'ils lui appartiennent que leur union peut porter le signe de son union avec l'Église. Le mariage de deux baptisés est donc toujours sacrement, qu'ils soient catholiques ou de confessions chrétiennes différentes ; et si l'un n'est pas baptisé, leur union, mariage voulu par Dieu, est élevée au rang de sacrement le jour où il reçoit le baptême.</p>
      <h2>Unité et indissolubilité</h2>
      <p>Le mariage possède deux propriétés qui lui sont essentielles : l'unité et l'indissolubilité. L'unité : un seul homme et une seule femme. L'indissolubilité : le lien dure jusqu'à la mort, car ce que Dieu unit, nul ne peut le défaire. Le Christ l'affirme en revenant au dessein du commencement. <em>« Que l'homme ne sépare pas ce que Dieu a uni. »</em> <span class="ref">Matthieu 19:6</span> À ceux qui invoquaient la permission de répudier accordée autrefois, il répond qu'elle fut une concession à la dureté des cœurs, et renvoie au plan premier de Dieu. <em>« C'est à cause de la dureté de votre cœur que Moïse vous a permis de répudier vos femmes ; mais au commencement il n'en était pas ainsi. »</em> <span class="ref">Matthieu 19:8</span></p>
      <h2>Le consentement et la grâce</h2>
      <p>Ce sont les époux eux-mêmes qui se donnent le sacrement, en échangeant leur consentement, le oui libre par lequel chacun se donne et reçoit l'autre. Le prêtre ou le diacre reçoit ce consentement au nom de l'Église et bénit l'alliance. Par ce sacrement, Dieu accorde aux époux une grâce propre : elle fortifie leur amour, les aide à se sanctifier l'un l'autre et à accueillir et élever leurs enfants dans la foi. Le foyer qu'ils forment devient ainsi une Église domestique, le premier lieu où la foi se vit et se transmet.</p>

function articlesOrdonnes(){
  let out=[];
  for(const t of THEMES){
    const at=ARTICLES.filter(a=>a.theme===t.id);
    if(t.categories){
      const vus=new Set();
      for(const c of t.categories){ for(const id of c.arts){ const a=at.find(x=>x.id===id); if(a){out.push(a);vus.add(id);} } }
      for(const a of at) if(!vus.has(a.id)) out.push(a);
    } else out.push(...at);
  }
  return out;
}
function carteArticle(a){
  return `<a class="article-lien" href="#/article/${a.id}">
      <h3>${a.titre}</h3>
      <p>${a.resume}</p>
    </a>`;
}
function corpsDomaine(t){
  const at = ARTICLES.filter(a=>a.theme===t.id);
  const vide = `<div class="vide">Ce domaine n'a pas encore d'entrée. Les contenus s'ajoutent au fil du temps.</div>`;
  if(!t.categories){
    return at.map(carteArticle).join('') || vide;
  }
  let html='';const vus=new Set();
  for(const c of t.categories){
    const arts = c.arts.map(id=>at.find(a=>a.id===id)).filter(Boolean);
    arts.forEach(a=>vus.add(a.id));
    if(!arts.length) continue;
    if(c.nom){
      html += `<div class="sous" data-cat="${c.id}">
        <div class="sous-tete">
          <span class="sous-puce" aria-hidden="true"></span>
          <span class="sous-nom">${c.nom}</span>
          <span class="sous-chevron" aria-hidden="true">›</span>
        </div>
        <div class="sous-corps">${arts.map(carteArticle).join('')}</div>
      </div>`;
    } else {
      html += arts.map(carteArticle).join('');
    }
  }
  html += at.filter(a=>!vus.has(a.id)).map(carteArticle).join('');
  return html || vide;
}
function vueBibliotheque(params){
  const sections = THEMES.map((t,i)=>{

    return `<section class="dom" data-theme="${t.id}">

        <span class="dom-num">${num}</span>
        <h2 class="dom-nom">${t.nom}</h2>

      </div>
      <div class="dom-sep"></div>

  }).join('');
  return `<div class="vue">

      <h1>Les domaines</h1>
    </section>
    <div class="domaines-liste">${sections}</div>
    <div style="height:60px"></div>
  </div>`;
}

      <h1>${a.titre}</h1>
      ${echappe(a.contenu)}
    </article>${objBloc}
  </div>`;
}

/* ---- ROUTAGE ---- */
function router(){
  const hash = location.hash.replace(/^#/,'') || '/';
  const [chemin, query] = hash.split('?');
  const params = new URLSearchParams(query||'');
  let html, route='/', ctx='';
  if(chemin==='/'||chemin===''){ html=vueAccueil(); route='/'; }
  else if(chemin==='/bibliotheque'){ html=vueBibliotheque(params); route='/bibliotheque'; ctx='La bibliothèque'; }
  else if(chemin==='/a-propos'){ html=vueAPropos(); route='/a-propos'; }
  else if(chemin.startsWith('/article/')){
    const aid=chemin.split('/article/')[1];
    html=vueArticle(aid); route='/bibliotheque';
    const a=ARTICLES.find(x=>x.id===aid);
    if(a) ctx=`<a href="#/bibliotheque?theme=${a.theme}">${themeNom(a.theme)}</a>`;
  }
  else { html=vueIntrouvable(); }
  app.innerHTML = html;
  document.getElementById('contexte').innerHTML = ctx;
  window.scrollTo(0,0);
  document.querySelectorAll('nav.menu a').forEach(a=>{
    a.classList.toggle('actif', a.dataset.route===route);
  });
  document.getElementById('menu').classList.remove('ouvert');
  brancherDomaines(params);
}

function cascadeApparition(els){
  els.forEach((el,i)=>{
    if(!el) return;
    const d=Math.min(i*40,640);
    el.style.animation='none';
    void el.offsetHeight;
    el.style.animation='apparaitDom .45s cubic-bezier(.2,.7,.3,1) '+d+'ms both';
  });
}
function cascadeFermeture(els,fin){
  els.forEach(el=>{ if(el) el.style.animation='apparaitDomFerme .25s ease forwards'; });
  setTimeout(fin,240);
}
function ouvrirDomaine(sec){
  if(!sec||sec.classList.contains('ouvert')) return;
  sec.classList.add('ouvert');
  const sep=sec.querySelector('.dom-sep'), corps=sec.querySelector('.dom-corps');
  cascadeApparition([sep].concat([].slice.call(corps.children)));
}
function fermerDomaine(sec){
  if(!sec||!sec.classList.contains('ouvert')) return;
  const sep=sec.querySelector('.dom-sep'), corps=sec.querySelector('.dom-corps');
  cascadeFermeture([sep].concat([].slice.call(corps.children)), ()=>{ sec.classList.remove('ouvert'); majToutLabel(); });
}
function basculerDomaine(sec){
  sec.classList.contains('ouvert') ? fermerDomaine(sec) : ouvrirDomaine(sec);
  majToutLabel();
}
function ouvrirSous(s){
  if(!s||s.classList.contains('ouvert')) return;
  s.classList.add('ouvert');
  const corps=s.querySelector('.sous-corps');
  cascadeApparition([].slice.call(corps.children));
}
function fermerSous(s){
  if(!s||!s.classList.contains('ouvert')) return;
  const corps=s.querySelector('.sous-corps');
  cascadeFermeture([].slice.call(corps.children), ()=>{ s.classList.remove('ouvert'); });
}
function basculerSous(s){ s.classList.contains('ouvert') ? fermerSous(s) : ouvrirSous(s); }
function basculerTout(){
  const secs=[].slice.call(document.querySelectorAll('.dom'));
  const ouverts=secs.filter(s=>s.classList.contains('ouvert'));
  if(ouverts.length){ ouverts.forEach(fermerDomaine); }
  else { secs.forEach((s,i)=> setTimeout(()=>ouvrirDomaine(s), i*110)); }
  setTimeout(majToutLabel,10);
}
function majToutLabel(){
  const b=document.getElementById('basculerTout'); if(!b) return;
  const ouvert=[].slice.call(document.querySelectorAll('.dom')).some(s=>s.classList.contains('ouvert'));
  b.classList.toggle('actif-tout',ouvert);
  const l=b.querySelector('.bt-label'); if(l) l.textContent = ouvert ? b.dataset.collapse : b.dataset.expand;
}
function brancherDomaines(params){
  const b=document.getElementById('basculerTout');
  if(b){
    b.addEventListener('click',basculerTout);
    b.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); basculerTout(); }});
  }
  document.querySelectorAll('.dom-tete').forEach(t=>{
    t.addEventListener('click',()=>basculerDomaine(t.closest('.dom')));
  });
  document.querySelectorAll('.sous-tete').forEach(st=>{
    st.addEventListener('click',()=>basculerSous(st.closest('.sous')));
  });
  const theme=params&&params.get?params.get('theme'):null;
  if(theme){
    const sec=document.querySelector('.dom[data-theme="'+theme+'"]');
    if(sec){
      ouvrirDomaine(sec);
      sec.querySelectorAll('.sous').forEach(ouvrirSous);
      majToutLabel();
      setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),120);
      return;
    }
  }
  majToutLabel();
}

document.getElementById('burger').addEventListener('click',()=>{
  document.getElementById('menu').classList.toggle('ouvert');
});
document.getElementById('annee').textContent = '© ' + new Date().getFullYear() + ' Lumen';

/* ---- recherche ---- */
(function(){
  var ouvrir=document.getElementById('rech-ouvrir'),overlay=document.getElementById('rech-overlay'),
      champ=document.getElementById('rech-champ'),res=document.getElementById('rech-res'),fermer=document.getElementById('rech-fermer');
  if(!ouvrir||!overlay) return;
  function norm(s){return s.toLowerCase().replace(/[àâä]/g,'a').replace(/[éèêë]/g,'e').replace(/[ïî]/g,'i').replace(/[ôö]/g,'o').replace(/[ùûü]/g,'u').replace(/ç/g,'c');}
  function depouiller(h){return h.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();}
  var index=ARTICLES.map(function(a){return {s:a.id,t:a.titre,th:themeNom(a.theme),r:a.resume,x:depouiller(a.contenu)};});
  index.forEach(function(a){a._n=norm(a.t+' '+a.r+' '+a.x);a._t=norm(a.t);a._r=norm(a.r);});
  function surligne(texte,termes){
    var nt=norm(texte),marks=[];
    termes.forEach(function(t){var i=0,p;while((p=nt.indexOf(t,i))>=0){marks.push([p,p+t.length]);i=p+t.length;}});
    if(!marks.length) return texte;
    marks.sort(function(a,b){return a[0]-b[0];});
    var out='',cur=0;
    marks.forEach(function(m){if(m[0]<cur)return;out+=texte.slice(cur,m[0])+'<mark>'+texte.slice(m[0],m[1])+'</mark>';cur=m[1];});
    return out+texte.slice(cur);
  }
  function extrait(a,termes){
    var src=a.r+' '+a.x,n=norm(src),pos=-1;
    termes.forEach(function(t){var p=n.indexOf(t);if(p>=0&&(pos<0||p<pos))pos=p;});
    if(pos<0)pos=0;
    var deb=Math.max(0,pos-60),fin=Math.min(src.length,pos+120);
    return (deb>0?'… ':'')+surligne(src.slice(deb,fin),termes)+(fin<src.length?' …':'');
  }
  function chercher(q){
    var termes=norm(q).split(/\s+/).filter(Boolean);
    if(!termes.length){res.innerHTML='<div class="rech-msg">Tapez un mot pour parcourir les articles.</div>';return;}
    var out=[];
    index.forEach(function(a){
      if(!termes.every(function(t){return a._n.indexOf(t)>=0;})) return;
      var sc=0;termes.forEach(function(t){if(a._t.indexOf(t)>=0)sc+=5;if(a._r.indexOf(t)>=0)sc+=2;sc+=1;});
      out.push({a:a,sc:sc});
    });
    out.sort(function(x,y){return y.sc-x.sc;});
    if(!out.length){res.innerHTML='<div class="rech-msg">Aucun résultat pour « '+q+' ».</div>';return;}
    res.innerHTML=out.slice(0,30).map(function(o){
      return '<a class="rech-item" href="#/article/'+o.a.s+'"><div class="rech-meta">'+o.a.th+'</div><div class="rech-titre">'+o.a.t+'</div><div class="rech-extrait">'+extrait(o.a,termes)+'</div></a>';
    }).join('');
  }
  function ouvre(){overlay.classList.add('ouvert');document.body.style.overflow='hidden';chercher(champ.value);setTimeout(function(){champ.focus();},40);}
  function ferme(){overlay.classList.remove('ouvert');document.body.style.overflow='';}
  ouvrir.addEventListener('click',ouvre);
  ouvrir.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();ouvre();}});
  fermer.addEventListener('click',ferme);
  fermer.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();ferme();}});
  overlay.addEventListener('click',function(e){if(e.target===overlay)ferme();});
  res.addEventListener('click',function(e){if(e.target.closest('.rech-item'))ferme();});
  champ.addEventListener('input',function(){chercher(champ.value);});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&overlay.classList.contains('ouvert'))ferme();});
})();

(function(){
  var b=document.getElementById('cloche-ouvrir'),ov=document.getElementById('nouv-overlay'),
      li=document.getElementById('nouv-liste'),fe=document.getElementById('nouv-fermer');
  if(!b||!ov) return;
  li.innerHTML=NOUVEAUTES.map(function(g){return '<div class="nouv-groupe"><div class="nouv-date">'+g.d+'</div>'+g.items.map(function(t){return '<div class="nouv-ligne">'+t+'</div>';}).join('')+'</div>';}).join('');
  var pt=b.querySelector('.cloche-point');
  var sig=NOUVEAUTES[0].d+'|'+NOUVEAUTES.reduce(function(a,g){return a+g.items.length;},0);
  function vu(){try{return localStorage.getItem('lumen_nouv_vu');}catch(e){return null;}}
  function majPoint(){if(pt)pt.style.display=(vu()===sig?'none':'block');}
  majPoint();
  function ouvre(){ov.classList.add('ouvert');document.body.style.overflow='hidden';try{localStorage.setItem('lumen_nouv_vu',sig);}catch(e){}majPoint();}
  function ferme(){ov.classList.remove('ouvert');document.body.style.overflow='';}
  b.addEventListener('click',ouvre);
  b.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();ouvre();}});
  fe.addEventListener('click',ferme);
  ov.addEventListener('click',function(e){if(e.target===ov)ferme();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&ov.classList.contains('ouvert'))ferme();});
})();

window.addEventListener('hashchange', router);
router();
</script>
