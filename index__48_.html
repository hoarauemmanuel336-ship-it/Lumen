<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumen · Théologie catholique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════
   LUMEN VERITATIS — LA NEF OBSCURE
   Refonte intégrale. La lumière dessine les lignes : filets
   dorés, veilleuse haute, poussière en suspension.
   ════════════════════════════════════════════════════════════ */
:root{
  --encre:#0a0908;
  --encre-2:#110f0c;
  --encre-3:#161310;
  --parchemin:#f2ecdd;
  --parchemin-att:#a39b87;
  --or:#e6d3a3;
  --or-pale:#f5edd6;
  --pourpre:#8e3a36;
  --filet:rgba(241,228,194,.17);
  --filet-fort:rgba(241,228,194,.42);
  --display:'Cormorant Garamond',Georgia,serif;
  --texte:'EB Garamond',Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--texte);
  font-size:19.5px;line-height:1.85;
  color:var(--parchemin);
  background:
    radial-gradient(1100px 480px at 50% -180px, rgba(242,231,205,.04), transparent 70%),
    radial-gradient(900px 600px at 50% 115%, rgba(0,0,0,.5), transparent 70%),
    var(--encre);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  min-height:100vh;
}
::selection{background:var(--or);color:var(--encre)}
img{max-width:100%;height:auto}
a{color:inherit}

/* — poussière lumineuse — */
#poussiere{position:fixed;inset:0;z-index:0;pointer-events:none}
body > *{position:relative;z-index:1}

/* ════ EN-TÊTE ════ */
header{position:sticky;top:0;z-index:80;background:rgba(10,9,8,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--filet)}
.barre{max-width:1180px;margin:0 auto;padding:0 28px;height:74px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.logo{font-family:var(--display);font-weight:500;font-size:21px;letter-spacing:.34em;text-transform:uppercase;text-decoration:none;color:var(--parchemin);padding-left:.34em;white-space:nowrap;transition:color .35s}
.logo:hover{color:var(--or-pale)}
nav.menu{display:flex;align-items:center;gap:30px}
nav.menu a{font-family:var(--display);font-size:14.5px;letter-spacing:.22em;text-transform:uppercase;text-decoration:none;color:var(--parchemin-att);padding:6px 0;border-bottom:1px solid transparent;transition:color .3s,border-color .3s;white-space:nowrap}
nav.menu a:hover{color:var(--parchemin)}
nav.menu a.actif{color:var(--parchemin);border-bottom-color:var(--or)}
.lien-langue{background:none;border:none;cursor:pointer;font-family:var(--display);font-size:13px;letter-spacing:.22em;color:var(--parchemin-att);text-transform:uppercase;padding:6px 2px;transition:color .3s}
.lien-langue:hover{color:var(--or)}
.rech-loupe{display:inline-flex;align-items:center;gap:0;cursor:pointer;color:var(--parchemin-att);padding:7px;transition:color .3s}
.rech-loupe:hover,.rech-loupe:focus-visible{color:var(--or);outline:none}
.rech-loupe .ll-mob{display:none}
.cloche{position:relative}
.cloche-point{position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:var(--or);box-shadow:0 0 8px rgba(241,228,194,.8);display:none}
.burger{display:none;background:none;border:none;color:var(--parchemin);font-size:24px;cursor:pointer;padding:6px 10px}

/* contexte (fil contextuel sous l'en-tête) */
.contexte-bar{max-width:1180px;margin:0 auto;padding:10px 28px 0;font-size:14.5px;color:var(--parchemin-att);font-style:italic;display:none}
.contexte-bar:not(:empty){display:block}
.contexte-bar a{color:var(--or);text-decoration:none}

/* ════ STRUCTURE ════ */
main{max-width:1180px;margin:0 auto;padding:0 28px 110px}
.vue{animation:venue .65s cubic-bezier(.22,.7,.3,1) both}
@keyframes venue{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ════ ACCUEIL : SEUIL ════ */
.hero{padding:62px 0 84px;text-align:center}
.croix{width:1px;height:70px;margin:0 auto 30px;background:linear-gradient(to bottom,transparent,#f2ecdd 30%,#f2ecdd 70%,transparent);position:relative}
.croix::after{content:'';position:absolute;top:21px;left:50%;transform:translateX(-50%);width:40px;height:1px;background:linear-gradient(to right,transparent,#f2ecdd 30%,#f2ecdd 70%,transparent)}
.hero h1{font-family:var(--display);font-weight:400;font-size:clamp(46px,7.4vw,86px);line-height:1.04;letter-spacing:.045em;color:var(--parchemin);text-wrap:balance}
.hero h1 em,.hero h1 i{font-style:italic;color:var(--or-pale)}
.hero p{max-width:620px;margin:30px auto 0;font-size:20.5px;line-height:1.8;color:var(--parchemin-att);font-style:italic}
.hero .ref{color:var(--or);font-style:italic}

/* titres de sections (accueil) */
.titre-section{display:flex;align-items:baseline;gap:18px;margin:86px 0 40px}
.titre-section .num{font-family:var(--display);font-size:14px;letter-spacing:.3em;color:var(--or);border:1px solid var(--filet-fort);padding:4px 11px 3px;white-space:nowrap}
.titre-section h2{font-family:var(--display);font-weight:500;font-size:clamp(26px,3.4vw,36px);letter-spacing:.06em;color:var(--parchemin)}
.titre-section .trait{flex:1;height:1px;align-self:center;background:linear-gradient(to right,rgba(241,228,194,.62),rgba(241,228,194,.26) 35%,rgba(241,228,194,.08) 70%,transparent)}

/* domaines (accueil) */
.domaines-liste,.domaines > div:not(.titre-section){display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
a.domaine{display:block;text-decoration:none;padding:30px 28px 26px;background:linear-gradient(180deg,rgba(255,255,255,.016),transparent 55%);border:1px solid var(--filet);position:relative;transition:border-color .4s,background .4s}
a.domaine::before{content:'';position:absolute;top:-1px;left:-1px;width:13px;height:13px;border-top:1px solid var(--filet-fort);border-left:1px solid var(--filet-fort);transition:border-color .4s}
a.domaine:hover{border-color:var(--filet-fort);background:linear-gradient(180deg,rgba(255,255,255,.03),transparent 60%)}
a.domaine:hover::before{border-color:var(--or)}
.d-num{display:block;font-family:var(--display);font-size:13px;letter-spacing:.3em;color:var(--or);margin-bottom:12px}
a.domaine h3{font-family:var(--display);font-weight:500;font-size:24px;letter-spacing:.04em;color:var(--parchemin);margin-bottom:8px;transition:color .35s}
a.domaine:hover h3{color:var(--or-pale)}
a.domaine p,.desc{font-size:16.5px;line-height:1.7;color:var(--parchemin-att)}
.compte{display:inline-block;margin-top:14px;font-size:13.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--parchemin-att);opacity:.75}

/* bloc Mémoriser (accueil) */
.memo-bloc{margin-top:86px;border:1px solid var(--filet);padding:42px 40px;display:flex;flex-wrap:wrap;gap:40px;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(255,255,255,.02),transparent 45%)}
.memo-bloc h2,.memo-bloc h3{font-family:var(--display);font-weight:500;font-size:30px;letter-spacing:.05em;color:var(--parchemin)}
.memo-note{font-size:16px;color:var(--parchemin-att);font-style:italic;max-width:430px;margin-top:12px;display:none}
.memo-droite{min-width:280px;flex:1;max-width:430px}
.memo-pct{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
.memo-pct #memo-pct{font-family:var(--display);font-weight:300;font-size:44px;line-height:1;color:var(--parchemin)}
.memo-pct i{font-style:italic;font-family:var(--texte);font-size:16.5px;color:var(--parchemin)}
.memo-bar{display:flex;height:4px;background:rgba(255,255,255,.06);overflow:hidden;margin-bottom:13px}
.memo-bar i{display:block;height:100%;width:0;transition:width .6s cubic-bezier(.2,.7,.3,1)}
.memo-bar .r{background:#c75d52}
.memo-bar .a{background:#cfa24f}
.memo-bar .v{background:#7ba37e}
.memo-leg{display:flex;gap:20px;flex-wrap:wrap;font-family:var(--display);font-size:13.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--parchemin-att)}
.memo-leg b{color:var(--parchemin);font-weight:600;font-variant-numeric:tabular-nums}
.memo-droite[data-state="out"] .memo-note,.memo-droite[data-state="empty"] .memo-note{display:block}
.memo-droite:not([data-state="ok"]) .memo-pct,.memo-droite:not([data-state="ok"]) .memo-bar,.memo-droite:not([data-state="ok"]) .memo-leg{display:none}
.memo-start{display:inline-block;margin-top:18px;font-family:var(--display);font-size:14.5px;letter-spacing:.24em;text-transform:uppercase;text-decoration:none;color:var(--encre);background:var(--or);padding:13px 28px 11px;transition:background .3s,transform .3s}
.memo-start:hover{background:var(--or-pale)}

/* ════ BANDEAUX DE PAGE ════ */
.bandeau-page{padding:84px 0 56px;text-align:center}
.sur-titre{font-family:var(--display);font-size:13.5px;letter-spacing:.4em;text-transform:uppercase;color:var(--or);margin-bottom:20px}
.bandeau-page h1{font-family:var(--display);font-weight:400;font-size:clamp(38px,5.4vw,62px);line-height:1.08;letter-spacing:.04em;color:var(--parchemin);text-wrap:balance}
.bandeau-page p{max-width:600px;margin:22px auto 0;font-size:18.5px;color:var(--parchemin-att);font-style:italic}
.bandeau-page::after{content:'';display:block;width:220px;height:1px;margin:46px auto 0;background:linear-gradient(to right,transparent,rgba(241,228,194,.68) 30%,rgba(241,228,194,.68) 70%,transparent)}

/* ════ BIBLIOTHÈQUE ════ */
.dom{grid-column:1/-1;margin:0 0 18px;border:1px solid var(--filet);background:linear-gradient(180deg,rgba(255,255,255,.012),transparent 45%);transition:border-color .4s}
.dom:hover{border-color:rgba(241,228,194,.22)}
.dom-tete{display:flex;align-items:center;gap:20px;padding:26px 30px;cursor:pointer;user-select:none}
.dom-num{font-family:var(--display);font-size:13px;letter-spacing:.3em;color:var(--or);border:1px solid var(--filet-fort);padding:4px 11px 3px;white-space:nowrap}
.dom-nom{min-width:0;font-family:var(--display);font-weight:500;font-size:clamp(23px,3vw,30px);letter-spacing:.05em;color:var(--parchemin);flex:1;transition:color .35s}
.dom-tete:hover .dom-nom{color:var(--or-pale)}
.dom-compte{font-size:13.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--parchemin-att);white-space:nowrap}
.dom-chevron{font-family:var(--texte);font-size:21px;color:var(--parchemin-att);transition:transform .4s cubic-bezier(.22,.7,.3,1),color .3s;line-height:1}
.dom.ouvert .dom-chevron{transform:rotate(90deg);color:var(--or)}
.dom-sep{height:1px;margin:0 30px;background:linear-gradient(to right,rgba(241,228,194,.62),rgba(241,228,194,.28) 30%,rgba(241,228,194,.09) 65%,transparent);opacity:0;transition:opacity .45s}
.dom.ouvert .dom-sep{opacity:1}
.dom-corps{display:none;padding:26px 30px 34px}
.dom.ouvert .dom-corps{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;animation:venue .5s cubic-bezier(.22,.7,.3,1) both}
.dom > p,.dom-desc{padding:0 30px 8px;color:var(--parchemin-att);font-size:16.5px}

/* sous-catégories */
.sous{grid-column:1 / -1;margin-top:14px}
.sous:first-child{margin-top:0}
.sous-tete{display:flex;align-items:center;gap:13px;padding:10px 2px;cursor:pointer;user-select:none}
.sous-puce{width:7px;height:7px;background:var(--or);transform:rotate(45deg);flex:none;opacity:.85}
.sous-nom{font-family:var(--display);font-weight:500;font-size:20px;letter-spacing:.07em;color:var(--parchemin);transition:color .3s}
.sous-tete:hover .sous-nom{color:var(--or-pale)}
.sous-chevron{font-size:17px;color:var(--parchemin-att);transition:transform .35s;line-height:1}
.sous.ouvert .sous-chevron{transform:rotate(90deg)}
.sous-corps{display:none;padding:12px 0 4px 19px;border-left:1px solid var(--filet)}
.sous.ouvert .sous-corps{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px;animation:venue .45s cubic-bezier(.22,.7,.3,1) both}

/* cartes d'articles */
a.article-lien{display:block;text-decoration:none;padding:22px 22px 20px;border:1px solid var(--filet);background:rgba(17,15,12,.45);position:relative;transition:border-color .4s,background .4s,box-shadow .4s}
a.article-lien:hover{border-color:var(--filet-fort);background:rgba(20,18,14,.7);box-shadow:0 0 34px rgba(241,228,194,.06)}
a.article-lien h3{font-family:var(--display);font-weight:500;font-size:21.5px;line-height:1.3;letter-spacing:.03em;color:var(--parchemin);margin-bottom:8px;transition:color .35s}
a.article-lien:hover h3{color:var(--or-pale)}
.resume{font-size:16px;line-height:1.7;color:var(--parchemin-att)}
.voir-plus{color:var(--or);cursor:pointer;font-style:italic;margin-left:6px;white-space:nowrap}
.voir-plus:hover{color:var(--or-pale)}
.vide{color:var(--parchemin-att);font-style:italic;padding:8px 2px}

/* apologie (encadré bibliothèque) */
.apologie-label{font-family:var(--display);font-size:13.5px;letter-spacing:.4em;text-transform:uppercase;color:var(--or);margin:64px 0 16px;text-align:center}
.apologie-lien{display:block;max-width:760px;margin:0 auto;text-decoration:none;text-align:center;padding:34px 34px 30px;border:1px solid var(--filet-fort);font-family:var(--display);font-size:24px;letter-spacing:.04em;color:var(--parchemin);background:linear-gradient(180deg,rgba(255,255,255,.022),transparent);transition:color .35s,border-color .35s,box-shadow .4s}
.apologie-lien:hover{color:var(--or-pale);border-color:var(--or);box-shadow:0 0 40px rgba(241,228,194,.08)}

/* ════ LECTURE ════ */
.lecture{max-width:34em;margin:0 auto;padding-top:70px}
.lecture h1{font-family:var(--display);font-weight:400;font-size:clamp(35px,4.8vw,52px);line-height:1.12;letter-spacing:.03em;color:var(--parchemin);margin-bottom:14px;text-wrap:balance}
.lecture h1::after{content:'';display:block;width:120px;height:1px;margin-top:30px;background:linear-gradient(to right,rgba(241,228,194,.72),rgba(241,228,194,.26) 60%,transparent)}
.lecture h2{font-family:var(--display);font-weight:500;font-size:clamp(25px,3vw,31px);line-height:1.25;letter-spacing:.04em;color:var(--parchemin);margin:58px 0 22px;text-wrap:balance}
.lecture h3{font-family:var(--display);font-weight:500;font-size:23px;letter-spacing:.04em;margin:44px 0 16px}
.lecture p{margin:0 0 24px;text-align:justify;hyphens:auto;-webkit-hyphens:auto}
.lecture > p:first-of-type::first-letter{font-family:var(--display);font-size:3.6em;line-height:.82;float:left;padding:6px 12px 0 0;color:var(--or);font-weight:400}
.lecture blockquote{margin:34px 0;padding:4px 0 4px 26px;border-left:1px solid var(--or);font-style:italic;color:var(--parchemin-att)}
.lecture blockquote p{text-align:left}
.lecture a{color:var(--or);text-decoration:none;border-bottom:1px solid var(--filet-fort);transition:color .3s,border-color .3s}
.lecture a:hover{color:var(--or-pale);border-bottom-color:var(--or)}
.ref{color:var(--or);font-style:italic}
.fin-article{margin:64px auto 0;display:flex;align-items:center;gap:22px;max-width:340px}
.fin-article::before,.fin-article::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(241,228,194,.55));}
.fin-article::after{background:linear-gradient(to left,transparent,rgba(241,228,194,.55))}
.fin-article{justify-content:center;color:var(--or);font-size:13px}
.fin-article:empty::before{content:''}
.fin-article > *{color:var(--or)}

/* ════ À PROPOS / PROSE ════ */
.apropos-corps,.prose{max-width:34em;margin:0 auto}
.prose p{margin:0 0 22px;color:var(--parchemin)}
.prose h2{font-family:var(--display);font-weight:500;font-size:28px;margin:48px 0 18px}

/* ════ RECHERCHE / NOUVEAUTÉS (voiles) ════ */
.rech-overlay{position:fixed;inset:0;z-index:120;background:rgba(8,7,6,.94);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;padding:9vh 24px 24px;overflow-y:auto}
.rech-overlay.ouvert{display:flex;animation:voile .35s ease both}
@keyframes voile{from{opacity:0}to{opacity:1}}
.rech-boite{width:100%;max-width:660px;background:var(--encre-2);border:1px solid var(--filet-fort);padding:34px 34px 28px;animation:venue .45s cubic-bezier(.22,.7,.3,1) both;position:relative}
.rech-boite::before{content:'';position:absolute;top:-1px;left:-1px;width:15px;height:15px;border-top:1px solid var(--or);border-left:1px solid var(--or)}
.rech-boite::after{content:'';position:absolute;bottom:-1px;right:-1px;width:15px;height:15px;border-bottom:1px solid var(--or);border-right:1px solid var(--or)}
.rech-haut{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.nouv-titre-panneau,.rech-titre{font-family:var(--display);font-weight:500;font-size:24px;letter-spacing:.06em;color:var(--parchemin);flex:1}
#rech-champ{flex:1;background:var(--encre);border:1px solid var(--filet);color:var(--parchemin);font-family:var(--texte);font-size:18px;padding:13px 16px;outline:none;transition:border-color .3s}
#rech-champ:focus{border-color:var(--filet-fort)}
#rech-champ::placeholder{color:var(--parchemin-att);opacity:.6}
.rech-fermer{cursor:pointer;color:var(--parchemin-att);font-size:21px;line-height:1;padding:6px 10px;transition:color .3s}
.rech-fermer:hover{color:var(--or)}
.rech-res{max-height:58vh;overflow-y:auto;scrollbar-width:thin}
.rech-item{display:block;text-decoration:none;padding:15px 16px;border:1px solid transparent;border-top-color:var(--filet);transition:border-color .3s,background .3s}
.rech-item:hover{background:rgba(241,228,194,.04);border-color:var(--filet)}
.rech-meta{font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--or);margin-bottom:5px}
.rech-titre{font-size:19px}
.rech-item .rech-titre{font-family:var(--display);font-weight:500;font-size:20px;color:var(--parchemin);margin-bottom:4px}
.rech-extrait{font-size:15.5px;color:var(--parchemin-att);line-height:1.6}
.rech-extrait mark{background:none;color:var(--or-pale);font-style:italic}
.rech-msg{color:var(--parchemin-att);font-style:italic;padding:14px 4px}
.nouv-liste{max-height:62vh;overflow-y:auto;scrollbar-width:thin}
.nouv-groupe{padding:18px 4px 6px;border-top:1px solid var(--filet)}
.nouv-groupe:first-child{border-top:none;padding-top:4px}
.nouv-date{font-family:var(--display);font-size:14px;letter-spacing:.3em;text-transform:uppercase;color:var(--or);margin-bottom:12px}
.nouv-ligne{position:relative;padding:0 0 12px 22px;color:var(--parchemin);font-size:17px;line-height:1.65}
.nouv-ligne::before{content:'';position:absolute;left:2px;top:11px;width:6px;height:6px;background:var(--or);transform:rotate(45deg);opacity:.8}

/* ════ COMPTE (voile) ════ */
.auth-overlay{position:fixed;inset:0;z-index:130;background:rgba(8,7,6,.96);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:24px}
.auth-overlay.ouvert{display:flex;animation:voile .3s ease both}
.auth-modal{width:100%;max-width:400px;background:var(--encre-2);border:1px solid var(--filet-fort);padding:40px 34px;animation:venue .4s cubic-bezier(.22,.7,.3,1) both;position:relative}
.auth-fermer{position:absolute;top:10px;right:14px;cursor:pointer;color:var(--parchemin-att);font-size:20px;padding:6px;transition:color .3s;background:none;border:none}
.auth-fermer:hover{color:var(--or)}
.auth-m-title{font-family:var(--display);font-weight:500;font-size:26px;letter-spacing:.05em;text-align:center;color:var(--parchemin);margin-bottom:24px}
.auth-m-tabs{display:flex;border-bottom:1px solid var(--filet);margin-bottom:22px}
.auth-m-tab{flex:1;background:none;border:none;border-bottom:1px solid transparent;margin-bottom:-1px;cursor:pointer;font-family:var(--display);font-size:15px;letter-spacing:.16em;text-transform:uppercase;color:var(--parchemin-att);padding:11px 4px;transition:color .3s,border-color .3s}

/* --- LES ARTICLES ---
   Chaque article : un id unique (sans espace ni accent),
   un titre, le thème (l'id d'un domaine ci-dessus), un résumé,
   une date, et le contenu en HTML. Un verset se cite dans le fil
   d'une phrase, en italique entre guillemets, suivi de la référence :
   ... la nécessité du baptême : <em>« ... »</em> <span class="ref">Jean 3:5</span>
*/
const ARTICLES = [
  {
    id: "le-doigt-de-dieu",
    titre: "Le doigt de Dieu",
    theme: "ecriture",
    resume: "Sous le piège que lui tendent les scribes et les pharisiens, Jésus se révèle. En écrivant du doigt sur le sol, il se montre l'auteur de la Loi gravée du doigt de Dieu, le Dieu de Moïse. Et tandis que ses accusateurs se retirent confondus, s'accomplit ce que Jérémie disait de ceux qui abandonnent le Seigneur, la source d'eau vive : ce Seigneur, c'est Jésus.",
    date: "2026",
    contenu: `
      <p>Au Temple, un matin, les scribes et les pharisiens amènent à Jésus une femme surprise en adultère et la placent au milieu de tous. Ils rappellent que Moïse a prescrit de lapider une telle femme, et lui demandent son avis : <em>« et toi, que dis-tu ? »</em> <span class="ref">Jean 8:5</span>. Ils tendent un piège. Sous ce piège, Jésus se révèle pour ce qu'il est : le Dieu qui donna la Loi à Moïse, et le Seigneur que nommait Jérémie.</p>

      <h2>Ils n'ont pas amené l'homme</h2>
      <p>La femme a été surprise en flagrant délit : l'homme avec qui elle a péché est donc connu, pris avec elle. Or la Loi qu'ils invoquent condamne les deux : <em>« L'homme qui commet l'adultère avec la femme de son prochain sera mis à mort, lui et la femme adultère. »</em> <span class="ref">Lévitique 20:10</span>. En n'amenant que la femme, ils transgressent eux-mêmes la Loi de Moïse. Leur zèle est un prétexte : ils ne cherchent pas la justice, mais un motif d'accuser Jésus.</p>

      <h2>Le piège</h2>
      <p>Quoi qu'il réponde, ils croient le tenir. S'il défend de lapider la femme, il se dresse contre Moïse, et un prophète qui contredit Moïse se démasque comme faux. S'il ordonne de la lapider, il appelle à une mise à mort que Rome a retirée aux Juifs, et ils le livreront comme un séditieux. Cette interdiction, ils l'avoueront eux-mêmes devant Pilate : <em>« Il ne nous est pas permis de mettre à mort qui que ce soit. »</em> <span class="ref">Jean 18:31</span>.</p>

      <h2>Le doigt de Dieu</h2>
      <p>Jésus se baisse et, du doigt, écrit sur le sol. La Loi qu'ils brandissent, Dieu l'a écrite lui-même au Sinaï : <em>« Il donna à Moïse les deux tables du témoignage, tables de pierre écrites du doigt de Dieu. »</em> <span class="ref">Exode 31:18</span>. Le doigt qui grava la Loi est celui qui écrit ici, sur la terre. Ils opposent à Jésus une Loi qu'il a lui-même donnée ; le législateur se tient devant eux, et ils ne le reconnaissent pas.</p>

      <h2>Inscrits sur la terre</h2>
      <p>Comme ils le pressent, Jésus se relève : <em>« Que celui d'entre vous qui est sans péché lui jette le premier la pierre. »</em> <span class="ref">Jean 8:7</span>. Puis il se baisse de nouveau et continue d'écrire. Les accusateurs se retirent un à un, à commencer par les plus âgés. Aucun ne peut se dire sans péché, et eux moins que tous, qui viennent d'enfreindre la Loi en n'amenant que la femme ; les plus âgés, ayant le plus de fautes derrière eux, se savent pris les premiers. Ils se détournent de Jésus et s'en vont confondus, tandis qu'il écrit sur le sol. Jérémie avait prophétisé sur eux : <em>« Espérance d'Israël, Seigneur, tous ceux qui t'abandonnent seront confondus ; ceux qui se détournent de toi seront inscrits sur la terre, car ils ont abandonné la source d'eau vive. »</em> <span class="ref">Jérémie 17:13</span>. Le Seigneur qu'ils abandonnent, la source d'eau vive, c'est Jésus. <em>« Celui qui croit en moi, des fleuves d'eau vive couleront de son sein. Il disait cela de l'Esprit que devaient recevoir ceux qui croiraient en lui. »</em> <span class="ref">Jean 7:38-39</span>.</p>
      <div class="fin-article">✦</div>
    `
  },
  {
    id: "le-bapteme-du-christ",
    titre: "Le baptême du Christ",
    theme: "ecriture",
    resume: "Le baptême de Jésus au Jourdain est sa consécration comme prêtre. Jean, prêtre selon Aaron, le lave dans l'eau, et l'Esprit descend sur lui comme l'onction promise au Messie : le dernier prêtre de l'ancienne alliance consacre le prêtre selon Melchisédech, et l'ancien sacerdoce passe le relais au nouveau.",
    date: "2026",
    contenu: `
      <p>Au commencement de sa vie publique, Jésus vient au Jourdain se faire baptiser par Jean. Le baptême que Jean donnait était un baptême de pénitence, reçu par ceux qui confessaient leurs péchés et attendaient le pardon. Jean s'y refuse d'abord : <em>« C'est moi qui ai besoin d'être baptisé par toi, et c'est toi qui viens à moi ! »</em> <span class="ref">Matthieu 3:14</span>. Jésus lève l'objection : <em>« Laisse faire pour le moment, car il convient que nous accomplissions ainsi toute justice. »</em> <span class="ref">Matthieu 3:15</span>. Cette justice à accomplir est une exigence de la Loi : la venue de Jésus dans l'eau est sa consécration comme prêtre.</p>

      <h2>Jean, prêtre selon Aaron</h2>
      <p>Sous l'ancienne alliance, le sacerdoce était réservé à une seule famille. Seuls les descendants d'Aaron, le frère de Moïse, pouvaient offrir les sacrifices et servir dans le Temple, et cette charge se transmettait de père en fils dans la tribu de Lévi. Jean appartient à ce sacerdoce par ses deux parents : <em>« Il y eut, au temps d'Hérode, roi de Judée, un prêtre nommé Zacharie, de la classe d'Abia ; sa femme était des filles d'Aaron, et son nom était Élisabeth. »</em> <span class="ref">Luc 1:5</span>.</p>

      <h2>Le prêtre selon Melchisédech</h2>
      <p>Jésus est prêtre selon un autre ordre, celui de Melchisédech. Ce personnage paraît brièvement dans la Genèse, à la rencontre d'Abraham qu'il bénit : <em>« Melchisédech, roi de Salem, apporta du pain et du vin ; il était prêtre du Dieu très-haut. »</em> <span class="ref">Genèse 14:18</span>. L'Écriture ne lui donne ni père ni généalogie : son sacerdoce ne vient pas d'une lignée et ne se transmet pas par le sang. C'est de cet ordre qu'un psaume annonce le Messie : <em>« Tu es prêtre pour toujours selon l'ordre de Melchisédech. »</em> <span class="ref">Psaume 110:4</span>. Le sacerdoce du Christ est ainsi plus ancien et plus haut que celui d'Aaron.</p>

      <h2>L'âge du prêtre</h2>
      <p>La Loi fixait l'âge auquel un homme entrait dans le service sacré : <em>« depuis l'âge de trente ans et au-dessus jusqu'à cinquante ans, tous ceux qui ont à faire le service dans la tente de réunion. »</em> <span class="ref">Nombres 4:3</span>. Jésus commence son ministère au sortir du baptême, ayant environ trente ans (Luc 3:23). L'âge où le prêtre prenait sa charge est celui où le Christ prend la sienne.</p>

      <h2>L'eau et l'huile</h2>
      <p>Pour entrer en fonction, le prêtre recevait deux gestes, l'eau puis l'huile : <em>« Tu feras approcher Aaron et ses fils à l'entrée de la tente de réunion, et tu les laveras avec de l'eau... tu prendras l'huile d'onction, tu en répandras sur sa tête, et tu l'oindras. »</em> <span class="ref">Exode 29:4-7</span>. Répandre l'huile, c'était consacrer, mettre à part pour Dieu : on oignait ainsi les rois, les prêtres et les prophètes. De là vient le nom du Christ : le mot grec rendu par « oint », <em>christos</em> (Χριστός), traduit l'hébreu « messie », <em>mashiah</em> (<span dir="rtl">מָשִׁיחַ</span>). Aaron, le premier des prêtres, fut consacré par Moïse, qui exerçait alors le sacerdoce : <em>« Moïse et Aaron étaient parmi ses prêtres. »</em> <span class="ref">Psaume 99:6</span>. Un prêtre établit le prêtre.</p>

      <h2>L'onction de l'Esprit</h2>
      <p>Au Jourdain, ces deux gestes se retrouvent sur le Christ. Jean, le prêtre lévitique, le lave dans l'eau. Et l'onction, il la reçoit non par l'huile, mais par l'Esprit de Dieu lui-même, qui descend sur lui comme une colombe. C'est l'onction qu'Isaïe avait annoncée pour le Messie : <em>« L'Esprit du Seigneur est sur moi, parce qu'il m'a oint ; il m'a envoyé porter la bonne nouvelle aux pauvres. »</em> <span class="ref">Isaïe 61:1</span>. Et Pierre le redira : <em>« Dieu a oint Jésus de Nazareth d'Esprit Saint et de puissance. »</em> <span class="ref">Actes 10:38</span>. Jean, dernier prêtre selon Aaron, consacre le prêtre selon Melchisédech.</p>

      <h2>La fin de l'ancien sacerdoce</h2>
      <p>Ce geste est aussi un adieu. En consacrant le Christ, Jean clôt le sacerdoce dont il est né : <em>« La Loi et les Prophètes vont jusqu'à Jean. »</em> <span class="ref">Luc 16:16</span>. Avec lui s'achève l'ancienne alliance. Le sacerdoce d'Aaron passait d'un homme à l'autre et mourait avec chacun ; celui du Christ ne meurt pas, car il est prêtre pour toujours. Le baptême du Jourdain est le seuil où l'ancien sacerdoce remet sa charge au nouveau, et le grand prêtre, oint de l'Esprit, commence l'œuvre du salut.</p>
      <div class="fin-article">✦</div>
    `
  },

    contenu: `
      <p>Le troisième jour, le Christ ressuscite d'entre les morts. Ce qu'il avait annoncé s'accomplit : la mort n'a pu le retenir, et son humanité entre vivante dans la gloire de Dieu. Pendant quarante jours, il se montre aux siens, mange avec eux, se laisse toucher, ouvre leur intelligence aux Écritures et les envoie au monde entier. Puis il est élevé au ciel et s'assied à la droite du Père. Sa vie terrestre s'achève ; sa présence demeure, dans l'Esprit qu'il donne et dans les sacrements de son Église, jusqu'au jour où il reviendra dans la gloire.</p>

      <h2>Le tombeau vide</h2>
      <p>Au matin du premier jour de la semaine, des femmes viennent au tombeau avec des aromates pour achever d'embaumer le corps, enseveli en hâte avant le sabbat. Elles trouvent la pierre roulée et le tombeau ouvert. Marie-Madeleine, croyant qu'on a enlevé le corps, court aussitôt avertir Pierre et Jean ; les autres femmes demeurent et entendent un ange leur annoncer : <em>« Il n'est pas ici, car il est ressuscité, comme il l'avait dit. »</em> <span class="ref">Matthieu 28:6</span>. Pierre et Jean accourent au tombeau ; Jean arrive le premier et s'arrête, laissant Pierre entrer avant lui. Ils voient les linges posés à terre et le suaire qui couvrait la tête roulé à part. Un corps volé n'aurait pas été dépouillé de ses bandelettes ni laissé en ordre : les linges affaissés, vidés de ce qu'ils enveloppaient, disent assez que nul ne l'a emporté. Jean voit, et il croit.</p>

      <h2>L'apparition à Marie-Madeleine</h2>
      <p>Pierre et Jean s'en retournent ; Marie-Madeleine, elle, demeure près du tombeau et pleure au-dehors. C'est à elle que le Ressuscité se montre le premier (Marc 16:9). Elle aperçoit Jésus sans le reconnaître et le prend pour le jardinier. Il l'appelle par son nom : <em>« Marie ! »</em>, et aussitôt elle se retourne : <em>« Rabbouni ! »</em>, mot araméen qui signifie « Maître ». Elle veut le retenir, mais il lui dit : <em>« Ne me retiens pas, car je ne suis pas encore monté vers le Père ; va dire à mes frères : je monte vers mon Père et votre Père, vers mon Dieu et votre Dieu. »</em> <span class="ref">Jean 20:17</span>. Le verbe grec rendu par « toucher » signifie aussi « s'attacher, retenir », <em>haptomai</em> (ἅπτομαι). Si le Christ monte d'abord vers le Père, c'est pour répandre ensuite sur les siens l'Esprit Saint qui repose sur lui ; il ne les laisse pas orphelins (Jean 14:18), mais leur donne par cet Esprit une présence plus intérieure que celle de ses jours terrestres. Marie ne doit donc pas retenir l'ancienne présence, qui cède à une présence nouvelle. Il dit <em>« mon Père et votre Père »</em>, non <em>« notre Père »</em> : il est Fils de Dieu par nature, et c'est en lui que les siens le deviennent par grâce.</p>

      <h2>L'apparition aux saintes femmes</h2>
      <p>Tandis qu'elles se hâtent vers les disciples, partagées entre la crainte et la grande joie, Jésus vient lui-même à leur rencontre et les salue. Elles s'approchent, saisissent ses pieds et se prosternent devant lui (Matthieu 28:9). Il calme leur crainte et les envoie dire à ses frères de gagner la Galilée, où ils le verront.</p>

      <h2>Les disciples d'Emmaüs</h2>
      <p>Le même jour, deux disciples font route vers le village d'Emmaüs, accablés par la mort de celui en qui ils espéraient. Jésus les rejoint, mais leurs yeux sont retenus de le reconnaître (Luc 24:16). C'est Dieu qui voile ainsi leur regard, à la mesure de leur incrédulité : ils avaient refusé de croire qu'il ressusciterait le troisième jour, et ni le tombeau vide ni le message des anges ne les avaient ébranlés. Il leur reproche leur lenteur à croire les prophètes et leur montre, depuis Moïse et tous les prophètes, que le Messie devait souffrir pour entrer dans sa gloire : <em>« Ne fallait-il pas que le Christ souffrît cela pour entrer dans sa gloire ? »</em> <span class="ref">Luc 24:26</span>. Parvenus au village, ils le prient de rester. À table, il reprend le geste de la dernière Cène : il prend le pain, le bénit, le rompt et le leur donne. À cet instant leurs yeux s'ouvrent, ils le reconnaissent, et il disparaît à leurs regards : il se laisse reconnaître dans la fraction du pain, puis s'efface, car c'est là qu'il se donnera désormais à recevoir. Ils se rappellent alors combien leur cœur brûlait tandis qu'il leur ouvrait les Écritures. La parole de Dieu accomplit ce qu'elle dit : au commencement, elle a tout tiré du néant, <em>« Dieu dit : que la lumière soit, et la lumière fut. »</em> <span class="ref">Genèse 1:3</span>. Dieu étant amour, cette même parole porte son amour jusqu'au cœur de l'homme et l'embrase ; ce feu manifestait la nature divine de celui qui, désormais glorifié, leur parlait.</p>

      <h2>L'apparition aux Apôtres</h2>
      <p>Le soir de ce premier jour, les disciples sont réunis, portes verrouillées par crainte. Jésus vient et se tient au milieu d'eux : <em>« La paix soit avec vous. »</em> <span class="ref">Jean 20:19</span>. Saisis de frayeur, ils croient voir un esprit ; il leur montre ses mains et son côté, et prend de la nourriture devant eux : preuve qu'il est ressuscité en son corps même. Puis il les envoie comme le Père l'a envoyé, souffle sur eux et leur donne l'Esprit : <em>« Recevez l'Esprit Saint. Ceux à qui vous remettrez les péchés, ils leur seront remis ; ceux à qui vous les retiendrez, ils leur seront retenus. »</em> <span class="ref">Jean 20:22-23</span>. Il confie ainsi aux siens le pouvoir de pardonner les péchés en son nom : l'institution du sacrement par lequel l'Église, jusqu'à la fin, relève les pécheurs.</p>

      <h2>Thomas l'incrédule</h2>
      <p>Thomas, l'un des Douze, était absent ce soir-là. Aux autres qui lui disent avoir vu le Seigneur, il refuse de croire sans avoir mis le doigt dans la marque des clous et la main dans son côté. Huit jours plus tard, les disciples sont de nouveau réunis, Thomas avec eux ; les portes closes, Jésus vient, lui offre ses plaies à toucher et l'invite à ne plus être incrédule mais croyant. Thomas tombe dans la confession la plus haute : <em>« Mon Seigneur et mon Dieu ! »</em> <span class="ref">Jean 20:28</span>. Le ressuscité garde dans son corps glorieux les marques de sa passion, signes de l'amour qui l'a livré. Au-delà des disciples réunis, Jésus regarde vers tous ceux qui croiront sur leur parole : <em>« Heureux ceux qui ont cru sans avoir vu. »</em> <span class="ref">Jean 20:29</span>.</p>

      <h2>La pêche au lac</h2>
      <p>De retour en Galilée, Pierre et quelques autres retournent à la pêche et passent la nuit sans rien prendre. Au matin, un homme se tient sur le rivage et leur dit de jeter le filet à droite de la barque ; ils le remplissent d'une multitude de poissons sans que le filet se rompe. Jean reconnaît alors le Seigneur : <em>« C'est le Seigneur ! »</em> <span class="ref">Jean 21:7</span>, et Pierre se jette à l'eau pour le rejoindre. Sur la rive, Jésus a préparé un feu de braises avec du pain et du poisson, et partage le repas avec eux. La scène rappelle leur premier appel, lorsque, sur ce même lac, une pêche surabondante les avait faits pêcheurs d'hommes ; le filet chargé qui ne se déchire pas annonce la multitude des peuples que l'Église rassemblera sans rompre son unité.</p>

      <h2>La primauté de Pierre</h2>
      <p>Le repas fini, Jésus se tourne vers Pierre. Trois fois il lui demande : <em>« Simon, fils de Jean, m'aimes-tu ? »</em>, et trois fois, à sa réponse, il confie une charge : <em>« Pais mes agneaux », « Sois le berger de mes brebis », « Pais mes brebis. »</em> <span class="ref">Jean 21:15-17</span>. S'il l'interroge trois fois, c'est en regard du triple reniement de la passion : autant de fois Pierre avait dit ne pas le connaître, autant de fois il lui fait maintenant professer son amour. Le Christ confie à Pierre la totalité de son troupeau, agneaux et brebis, et l'établit pasteur de toute l'Église. Puis Jésus lui annonce qu'il le suivra jusqu'à la mort, étendant un jour les mains pour être conduit où il ne voudrait pas, et il l'appelle : <em>« Suis-moi. »</em> <span class="ref">Jean 21:19</span>.</p>

      <h2>Le grand mandat</h2>
      <p>Sur la montagne de Galilée qu'il leur avait fixée, les onze le retrouvent, au milieu d'une grande assemblée de disciples : Paul rapporte que le Ressuscité <em>« a été vu par plus de cinq cents frères à la fois »</em> <span class="ref">1 Corinthiens 15:6</span>. En le voyant, ils se prosternent ; mais quelques-uns doutent (Matthieu 28:17). Jésus s'avance et déclare que tout pouvoir lui a été donné au ciel et sur la terre. C'est le fondement de l'envoi : parce qu'il a reçu toute autorité, il peut confier une mission sans frontières. <em>« Allez, faites des disciples de toutes les nations, baptisez-les au nom du Père et du Fils et du Saint-Esprit, et apprenez-leur à garder tout ce que je vous ai prescrit. »</em> <span class="ref">Matthieu 28:19</span>. Durant son ministère, il s'était adressé d'abord à Israël ; le Ressuscité ouvre désormais le salut à tous les peuples. Il dit « au nom », et non « aux noms » : le Père, le Fils et l'Esprit partagent un même nom, étant un seul Dieu. Sa montée vers le Père inaugure une présence nouvelle : par l'Esprit et les sacrements, le Christ accompagnera son Église dans la mission qu'il lui confie : <em>« Je suis avec vous tous les jours, jusqu'à la fin du monde. »</em> <span class="ref">Matthieu 28:20</span>.</p>

      <h2>L'Ascension du Seigneur</h2>
      <p>Quarante jours après Pâques, Jésus conduit ses disciples près de Béthanie. Il lève les mains et les bénit, et pendant qu'il les bénit, il se sépare d'eux et s'élève vers le ciel, où une nuée le dérobe à leurs regards. Il s'assied à la droite du Père : son humanité, celle qui est née de Marie et qui fut crucifiée, entre dans la gloire de Dieu. Tandis que les Apôtres fixent le ciel, deux hommes en vêtements blancs leur disent : <em>« Ce Jésus, qui a été enlevé au ciel, reviendra de la même manière que vous l'avez vu monter. »</em> <span class="ref">Actes 1:11</span>. Ils retournent à Jérusalem remplis de joie, dans l'attente de l'Esprit promis. La vie terrestre du Christ trouve ainsi son accomplissement dans le retour auprès du Père, d'où il répand son Esprit sur l'Église et d'où il reviendra, au dernier jour, dans la gloire.</p>

      <p>La dernière semaine s'ouvre par l'entrée royale à Jérusalem et s'achève au tombeau. En quelques jours s'accomplit ce vers quoi tendait toute la vie du Christ : sa Passion et sa mort pour le salut du monde. Les premiers jours se passent au Temple, en enseignements et en controverses qui durcissent l'opposition ; puis vient le Triduum, la Cène où il se donne en nourriture, l'agonie de Gethsémani, les deux procès, la Croix et le silence du tombeau. C'est l'heure pour laquelle il était venu.</p>

      <h2>L'entrée à Jérusalem</h2>
      <p>Six jours avant la Pâque, Jésus entre dans Jérusalem monté sur un ânon, comme le roi humble et pacifique qu'avait annoncé le prophète (Zacharie 9:9). La foule étend ses manteaux et des rameaux sur le chemin et l'acclame : <em>« Hosanna ! Béni soit celui qui vient au nom du Seigneur ! »</em> <span class="ref">Matthieu 21:9</span>. Le Messie reçoit l'hommage royal, non sur un char de guerre, mais sur la monture de la paix. Cette acclamation, pourtant, attend un roi terrestre et ne reconnaît pas celui qu'il est ; dans quelques jours, les mêmes voix réclameront sa mort. C'est pourquoi, à la vue de la ville, Jésus pleure sur elle : elle n'a pas su reconnaître le temps où Dieu la visitait, et il annonce sa ruine.</p>

      <h2>Le figuier et le Temple</h2>
      <p>Jésus passe ces jours à Jérusalem et se retire chaque soir à Béthanie. Un matin, en revenant vers la ville, il a faim et s'approche d'un figuier couvert de feuilles, mais sans fruit ; il le maudit, et l'arbre se dessèche. Le signe vise une religion tout en apparences, féconde en feuilles et stérile en fruits : telle se montre la cité qui le rejette. Entré au Temple, il en chasse les vendeurs et les changeurs et leur reproche d'avoir profané le lieu : <em>« Ma maison sera appelée maison de prière pour toutes les nations ; mais vous en avez fait une caverne de voleurs. »</em> <span class="ref">Marc 11:17</span>. Le Temple, fait pour la prière et la rencontre de Dieu avec tous les peuples, avait été détourné en lieu de trafic ; Jésus le rend à sa vocation, et son geste annonce le jugement sur un culte vidé de son cœur.</p>

      <h2>La parabole des vignerons</h2>
      <p>Aux chefs qui contestent son autorité, Jésus répond par une parabole. Un maître plante une vigne et la confie à des vignerons ; au temps de la récolte, il envoie ses serviteurs chercher le fruit, mais on les bat et on les tue ; il envoie enfin son fils, et les vignerons le jettent hors de la vigne et le mettent à mort pour s'emparer de l'héritage. La vigne est Israël, les serviteurs sont les prophètes, et le fils, c'est lui-même, qu'on s'apprête à tuer. Il ajoute une parole sur la pierre rejetée : <em>« La pierre qu'ont rejetée les bâtisseurs est devenue la pierre d'angle. »</em> <span class="ref">Matthieu 21:42</span>. Rejeté par les chefs, il sera le fondement de l'édifice nouveau (Psaume 118:22). Les chefs comprennent qu'il parle d'eux et cherchent à l'arrêter.</p>

      <h2>Les pièges au Temple</h2>
      <p>On tend alors des pièges pour le prendre en faute. On lui demande s'il est permis de payer l'impôt à César, l'occupant détesté : répondre oui le brouille avec le peuple, répondre non le dénonce à Rome comme rebelle. Il fait montrer la pièce de l'impôt et demande de qui sont l'effigie et l'inscription : de César. <em>« Rendez à César ce qui est à César, et à Dieu ce qui est à Dieu. »</em> <span class="ref">Marc 12:17</span>. La pièce porte l'image de César et lui revient ; mais l'homme porte l'image de Dieu (Genèse 1:27), et c'est à Dieu qu'il se doit tout entier. À qui lui demande le plus grand commandement, il répond par deux qui n'en font qu'un : aimer Dieu de tout son cœur, et son prochain comme soi-même ; toute la Loi tient à cet amour. Aux sadducéens qui nient la résurrection, il déclare que Dieu n'est pas le Dieu des morts, mais des vivants. Puis il dénonce l'hypocrisie des chefs, qui chargent les autres de fardeaux qu'ils ne portent pas, et soignent le dehors en négligeant le cœur.</p>

      <h2>L'obole de la veuve</h2>
      <p>Assis devant le trésor du Temple, Jésus regarde la foule y déposer ses offrandes. Des riches donnent beaucoup de leur superflu ; une pauvre veuve y met deux petites pièces, tout ce qu'elle possède. Il appelle ses disciples et leur déclare qu'elle a donné plus que tous les autres : <em>« Eux ont mis de leur superflu, mais elle, de son indigence, a mis tout ce qu'elle avait pour vivre. »</em> <span class="ref">Marc 12:44</span>. Devant Dieu, le don ne vaut pas par sa grandeur, mais par l'amour et le sacrifice de celui qui donne : <em>« Si tu as peu, ne crains pas de faire l'aumône selon ce peu. »</em> <span class="ref">Tobie 4:8</span>.</p>

      <h2>Le discours sur la fin</h2>
      <p>En sortant du Temple, comme ses disciples en admirent les pierres, Jésus annonce qu'il n'en restera pas pierre sur pierre. Sur le mont des Oliviers, ils l'interrogent : quand cela arrivera-t-il, et quel sera le signe de sa venue et de la fin du monde ? Sa réponse vise deux événements distincts, qu'elle entrelace : la ruine prochaine de Jérusalem, dont le Temple sera renversé du vivant de cette génération, et son retour à la fin du monde, par-delà les siècles. Il met d'abord en garde contre l'illusion : de faux messies viendront, on entendra des guerres, des famines, des tremblements de terre, et les siens seront persécutés ; tout cela n'est que le commencement des douleurs, et l'Évangile doit d'abord être annoncé à toutes les nations. À la fin seulement paraîtra le signe du Fils de l'homme : il viendra sur les nuées, avec puissance et gloire, et rassemblera ses élus des quatre vents. Nul n'en connaît le jour, ni les anges, ni le Fils, mais le Père seul : comme Dieu, le Fils le connaît, mais selon sa nature humaine il ne l'a pas reçu pour le faire connaître. Il ajoute : <em>« Le ciel et la terre passeront, mais mes paroles ne passeront pas. »</em> <span class="ref">Matthieu 24:35</span>. Aussi appelle-t-il à veiller : <em>« Veillez, car vous ne savez ni le jour ni l'heure. »</em> <span class="ref">Matthieu 25:13</span>.</p>

      <p>Il achève sur le jugement dernier : le Fils de l'homme, sur son trône de gloire, sépare les hommes comme le berger sépare les brebis des boucs. Il met à part ceux qui l'ont servi sans le savoir, dans l'affamé, l'étranger, le prisonnier : <em>« Ce que vous avez fait à l'un de ces plus petits de mes frères, c'est à moi que vous l'avez fait. »</em> <span class="ref">Matthieu 25:40</span>. Les uns entrent dans la vie éternelle, les autres dans le châtiment éternel, selon l'amour qu'ils auront porté ou refusé.</p>

      <h2>La trahison de Judas</h2>
      <p>Les chefs cherchent à le faire périr sans soulever le peuple. L'un des Douze, Judas, vient à eux et offre de le livrer ; ils conviennent d'un prix, trente pièces d'argent, accomplissant la prophétie de Zacharie (Zacharie 11:12-13). Dès lors il guette le moment favorable. Celui qui partageait sa table et son intimité prépare en secret de le vendre.</p>

      <h2>La dernière Cène</h2>
      <p>Le soir venu, Jésus mange la Pâque avec les Douze, et porte cette Pâque à son terme : l'agneau pascal immolé pour la délivrance d'Israël laisse place à l'Agneau de Dieu. Il se lève, ceint un linge et lave les pieds de ses disciples, l'office d'un esclave, puis leur en donne le sens : <em>« Si je vous ai lavé les pieds, moi le Seigneur et le Maître, vous devez vous aussi vous laver les pieds les uns aux autres. »</em> <span class="ref">Jean 13:14</span>. Il leur laisse son commandement : <em>« Aimez-vous les uns les autres comme je vous ai aimés. »</em> <span class="ref">Jean 13:34</span>. Puis, prenant le pain, il le bénit, le rompt et le donne : <em>« Ceci est mon corps, livré pour vous. »</em> <span class="ref">Luc 22:19</span> ; et de même la coupe : <em>« Ceci est mon sang, le sang de l'alliance, versé pour la multitude. »</em> <span class="ref">Marc 14:24</span>. Sous le pain et le vin, il se donne lui-même en nourriture et scelle dans son sang l'alliance nouvelle annoncée par Jérémie (Jérémie 31:31). Par les mots <em>« Faites ceci en mémoire de moi »</em> <span class="ref">Luc 22:19</span>, il confie aux siens de refaire ce qu'il vient d'accomplir, instituant le mémorial qui rend présent son unique sacrifice. Il annonce que l'un d'eux le livrera ; Judas sort dans la nuit. Et il prédit à Pierre, qui jure de ne jamais l'abandonner, qu'avant le chant du coq il l'aura renié trois fois.</p>

      <h2>Le discours d'adieu</h2>
      <p>Après le départ de Judas, Jésus parle longuement aux siens, comme un testament. Il les console de son départ : il va leur préparer une place dans la maison de son Père, et il est lui-même la route pour l'y rejoindre, <em>« Je suis le chemin, la vérité et la vie ; nul ne vient au Père que par moi. »</em> <span class="ref">Jean 14:6</span>. Il promet de ne pas les laisser orphelins : il leur enverra d'auprès du Père le Paraclet, le mot grec rendu par « défenseur » et « consolateur », <em>paraklētos</em> (παράκλητος), l'Esprit de vérité qui demeurera en eux et les conduira vers la vérité tout entière. Il se dit la vraie vigne dont ils sont les sarments : <em>« Demeurez en moi, et moi en vous ; sans moi, vous ne pouvez rien faire. »</em> <span class="ref">Jean 15:4-5</span>, et il montre jusqu'où va l'amour qu'il leur commande : <em>« Nul n'a de plus grand amour que de donner sa vie pour ses amis. »</em> <span class="ref">Jean 15:13</span>. Il les prévient enfin que le monde les haïra comme il l'a haï, mais que leur tristesse se changera en joie, et que tout ce qu'ils demanderont au Père en son nom leur sera donné.</p>

      <h2>La prière sacerdotale</h2>
      <p>Au terme de ce discours, Jésus lève les yeux au ciel et prie : c'est la prière qu'on nomme sacerdotale, car il s'y offre lui-même pour les siens, en grand prêtre. Il demande d'abord sa propre glorification, celle qu'il avait auprès du Père avant que le monde fût, afin que par lui le Père soit glorifié. Il prie pour ses disciples, que le Père les garde du mal et les sanctifie : <em>« Consacre-les dans la vérité ; ta parole est vérité. »</em> <span class="ref">Jean 17:17</span>. Il prie enfin pour tous ceux qui croiront par leur parole, demandant qu'ils soient un : <em>« Que tous soient un, comme toi, Père, tu es en moi et moi en toi, afin que le monde croie que tu m'as envoyé. »</em> <span class="ref">Jean 17:21</span>. L'unité des siens, fondée sur celle du Père et du Fils, devient le signe par lequel le monde reconnaîtra l'envoyé de Dieu.</p>

      <h2>Gethsémani</h2>
      <p>Sorti au jardin de Gethsémani, au pied du mont des Oliviers, Jésus prend avec lui Pierre, Jacques et Jean, les mêmes qui l'avaient vu transfiguré, et l'angoisse le saisit : <em>« Mon âme est triste à en mourir. »</em> <span class="ref">Marc 14:34</span>. Il s'écarte, tombe la face contre terre et prie : <em>« Père, s'il est possible, que cette coupe s'éloigne de moi ; cependant, non pas ma volonté, mais la tienne. »</em> <span class="ref">Matthieu 26:39</span>. La coupe est celle de la Passion qu'il va boire, le calice de la souffrance et de la mort. Vrai homme, il redoute la mort comme tout homme la redoute, et rien de sa divinité ne lui épargne cette épreuve. En lui se tiennent deux volontés, l'une divine, l'autre humaine ; sa volonté d'homme recule devant la mort, et librement il la remet à la volonté du Père. Dans ce <em>« non pas ma volonté, mais la tienne »</em>, l'obéissance du nouvel Adam renverse la désobéissance du premier : ce qu'Adam avait perdu dans un jardin en préférant sa volonté à celle de Dieu, le Christ le redresse dans un jardin en livrant la sienne. Un ange du ciel vient le réconforter, et sa sueur devient comme des gouttes de sang qui tombent à terre (Luc 22:43-44). Par trois fois il revient vers ses disciples et les trouve endormis : <em>« Veillez et priez, pour ne pas entrer en tentation : l'esprit est ardent, mais la chair est faible. »</em> <span class="ref">Matthieu 26:41</span>. Judas survient avec une troupe armée et le désigne d'un baiser ; Jésus lui répond : <em>« Judas, c'est par un baiser que tu livres le Fils de l'homme ? »</em> <span class="ref">Luc 22:48</span>. Pierre tire l'épée et tranche l'oreille d'un serviteur ; Jésus la guérit et lui ordonne de rengainer, car il pourrait demander au Père des légions d'anges ; il choisit d'accomplir les Écritures : <em>« Ne boirai-je pas la coupe que le Père m'a donnée ? »</em> <span class="ref">Jean 18:11</span>. Tous les disciples l'abandonnent alors et fuient.</p>

      <h2>Le procès juif</h2>
      <p>On le conduit chez le grand prêtre Caïphe, où s'assemblent les chefs. Des témoins se contredisent. Le grand prêtre le somme enfin : <em>« Es-tu le Christ, le Fils du Béni ? »</em> <span class="ref">Marc 14:61</span>. Jésus répond : <em>« Je le suis ; et vous verrez le Fils de l'homme siéger à la droite du Tout-Puissant et venir sur les nuées du ciel. »</em> <span class="ref">Marc 14:62</span>. Il reprend la figure annoncée par Daniel, le Fils de l'homme qui vient sur les nuées recevoir la domination sur toutes les nations (Daniel 7:13-14). À ses juges, Jésus annonce qu'ils le verront revenir dans cette gloire, et qu'ils comparaîtront à leur tour devant lui.</p>
      <p>Plus encore, en se disant assis à la droite du Tout-Puissant, Jésus revendique sa place dans le sanctuaire même de Dieu. Le grand prêtre qui l'interroge ne pénètre dans le lieu très saint qu'une fois l'an, et au péril de sa vie (Lévitique 16) ; or voici qu'un homme de chair se dit établi à demeure auprès de Dieu, là où nul n'a accès. Il déchire ses vêtements et crie au blasphème ; tous le jugent passible de mort. On le frappe et on le couvre de crachats. Au-dehors, Pierre, pressé de questions, jure par trois fois qu'il ne connaît pas cet homme ; le coq chante, le Seigneur se retourne et le regarde, et Pierre sort pleurer amèrement.</p>

      <h2>Le procès devant Pilate</h2>
      <p>Au matin, les chefs livrent Jésus au gouverneur romain Pilate, seul à pouvoir prononcer la mort. À la question de la royauté, Jésus répond : <em>« Mon royaume n'est pas de ce monde. »</em> <span class="ref">Jean 18:36</span>, et Pilate, troublé, demande : <em>« Qu'est-ce que la vérité ? »</em> <span class="ref">Jean 18:38</span>. Il ne trouve en lui aucun motif de condamnation. Apprenant que Jésus est galiléen, il l'envoie à Hérode, qui régnait sur la Galilée et se trouvait alors à Jérusalem. Hérode, curieux de lui voir faire quelque miracle, le presse de questions, mais Jésus ne répond rien ; dépité, il le tourne en dérision avec ses soldats, le revêt d'un habit éclatant et le renvoie à Pilate. Celui-ci tente encore de le relâcher, proposant de gracier soit Jésus, soit le brigand Barabbas ; la foule, soulevée par les chefs, réclame Barabbas. Pilate le fait alors flageller. Les soldats tressent une couronne d'épines et la lui enfoncent sur la tête : l'épine est née de la terre maudite après la faute d'Adam (Genèse 3:18), et le nouvel Adam la porte sur son front, se chargeant de la malédiction du péché. Ils le revêtent d'un manteau de pourpre, lui remettent un roseau en guise de sceptre, puis le raillent en s'inclinant : <em>« Salut, roi des Juifs ! »</em>, et le frappent. Pilate le montre à la foule, couronné d'épines : <em>« Voici l'homme. »</em> <span class="ref">Jean 19:5</span>, espérant l'apaiser ; elle hurle qu'on le crucifie et déclare : <em>« Nous n'avons de roi que César. »</em> <span class="ref">Jean 19:15</span>. Pilate se lave les mains du sang de cet innocent et le livre pour être crucifié.</p>

      <h2>La mort de Judas</h2>
      <p>Voyant Jésus condamné, Judas est pris de remords. Il rapporte les trente pièces aux chefs : <em>« J'ai péché en livrant un sang innocent. »</em> <span class="ref">Matthieu 27:4</span>. Eux le repoussent : cela le regarde, non eux. Il jette l'argent dans le Temple, se retire et se pend. De cette somme, les chefs achètent le champ d'un potier pour la sépulture des étrangers, qu'on appelle depuis le Champ du Sang.</p>

      <h2>La crucifixion</h2>
      <p>On le mène hors des murs de la ville, portant sa croix ; comme il défaille, on contraint un passant, Simon de Cyrène, à la porter derrière lui. Aux femmes qui se lamentent sur lui, il dit de pleurer plutôt sur elles-mêmes et sur leurs enfants : <em>« Si l'on traite ainsi le bois vert, qu'adviendra-t-il du bois sec ? »</em> <span class="ref">Luc 23:31</span>, annonçant le malheur qui fondra sur Jérusalem. Au lieu dit Golgotha, <em>« lieu du Crâne »</em>, on le crucifie entre deux malfaiteurs : ainsi s'accomplit ce qu'Isaïe avait dit du Serviteur, <em>« il a été compté parmi les criminels. »</em> <span class="ref">Isaïe 53:12</span>. Les soldats se partagent ses vêtements et tirent au sort sa tunique, sans le savoir fidèles au psaume du juste souffrant (Psaume 22:19). Au-dessus de sa tête, un écriteau porte le motif de sa condamnation, en hébreu, en latin et en grec, pour que tous le lisent : <em>« Jésus de Nazareth, roi des Juifs. »</em> <span class="ref">Jean 19:19</span>. Les chefs, les soldats et les passants le raillent : <em>« Il a sauvé les autres ; qu'il se sauve lui-même, s'il est le Christ, l'élu de Dieu. »</em> <span class="ref">Luc 23:35</span>. Ils disent vrai sans le comprendre : il ne descend pas de la croix précisément parce qu'il sauve les autres, et c'est en n'épargnant pas sa vie qu'il la donne. Il prie pour ses bourreaux : <em>« Père, pardonne-leur, car ils ne savent pas ce qu'ils font. »</em> <span class="ref">Luc 23:34</span>. L'un des crucifiés l'insulte ; l'autre reconnaît sa faute et l'implore, et Jésus lui promet : <em>« Aujourd'hui, tu seras avec moi dans le paradis. »</em> <span class="ref">Luc 23:43</span>. Voyant sa mère et le disciple qu'il aimait, il les donne l'un à l'autre : <em>« Femme, voici ton fils »</em>, <em>« Voici ta mère. »</em> <span class="ref">Jean 19:26-27</span>. Ce disciple tient la place de tous les croyants : en le confiant à Marie, le Christ donne sa mère pour mère à toute l'Église.</p>

      <h2>La mort du Christ</h2>
      <p>De midi à trois heures, les ténèbres couvrent toute la terre. Celui qui meurt sur la Croix est la lumière du monde (Jean 8:12), et la création s'obscurcit avec lui : signe du jugement et de l'heure où le pouvoir des ténèbres semble l'emporter, comme le prophète avait annoncé un jour où le soleil se coucherait à midi (Amos 8:9). Jésus pousse alors un grand cri, priant l'ouverture du psaume 22 : <em>« Mon Dieu, mon Dieu, pourquoi m'as-tu abandonné ? »</em> <span class="ref">Matthieu 27:46</span>. Ce psaume du juste souffrant s'achève dans la délivrance et la louange : en le faisant sien, Jésus porte jusqu'au bout la détresse des pécheurs, sans que jamais soit rompue son union au Père. Il dit : <em>« J'ai soif »</em> <span class="ref">Jean 19:28</span> ; à la soif de son corps épuisé, on répond par du vinaigre, accomplissant l'Écriture (Psaume 69:22). Il déclare alors son œuvre achevée : <em>« Tout est accompli. »</em> <span class="ref">Jean 19:30</span> ; le salut pour lequel il était venu est désormais acquis. Il remet librement sa vie au Père : <em>« Père, entre tes mains je remets mon esprit. »</em> <span class="ref">Luc 23:46</span>. À cet instant, le voile du Temple se déchire en deux du haut en bas. Ce voile fermait le lieu très saint, où se manifestait la présence de Dieu ; déchiré d'en haut, il signifie que la mort du Christ ouvre à tous l'accès de Dieu, désormais sans barrière. Le centurion qui le gardait s'écrie : <em>« Vraiment, cet homme était Fils de Dieu. »</em> <span class="ref">Marc 15:39</span>. Un soldat lui perce le côté d'un coup de lance, et il en sort aussitôt du sang et de l'eau, où l'Église reconnaît la source de ses sacrements, l'eau du baptême et le sang de l'eucharistie, jaillis de son côté ouvert.</p>

      <h2>La mise au tombeau</h2>
      <p>Le soir, un membre du conseil, Joseph d'Arimathie, demande à Pilate le corps de Jésus. Avec Nicodème, qui apporte une grande quantité de myrrhe et d'aloès, il l'enveloppe d'un linceul et le dépose dans un tombeau neuf, taillé dans le roc, où personne n'avait encore été mis. On roule une grande pierre à l'entrée. Les femmes venues de Galilée regardent où on le dépose. Le lendemain, les chefs obtiennent de Pilate que le tombeau soit scellé et gardé. Le grand repos du sabbat s'étend sur la terre, et tout se tait, dans l'attente du troisième jour.</p>

      <h2>Les traditions des anciens</h2>
      <p>Des pharisiens et des scribes venus de Jérusalem reprochent aux disciples de manger sans s'être lavé les mains, négligeant la tradition des anciens, ces règles de pureté rituelle ajoutées à la Loi au fil des générations. Jésus leur applique la parole d'Isaïe (Isaïe 29:13) : <em>« Ce peuple m'honore des lèvres, mais son cœur est loin de moi ; c'est en vain qu'ils me rendent un culte, enseignant des préceptes qui sont des commandements d'hommes. »</em> Ils tiennent à leur tradition au point d'annuler le commandement de Dieu. Il le montre par un usage qu'ils autorisent : un homme peut déclarer « corban », un mot hébreu, <em>qorbân</em> (קָרְבָּן), qui signifie « offrande consacrée à Dieu », les biens dont son père et sa mère auraient besoin, et se croire dès lors dispensé de les secourir. Leur règle humaine défait ainsi le commandement <em>« Honore ton père et ta mère »</em> <span class="ref">Exode 20:12</span>. Puis Jésus appelle la foule et lui déclare : <em>« Rien de ce qui entre dans l'homme du dehors ne peut le souiller ; mais ce qui sort de l'homme, voilà ce qui le souille. »</em> <span class="ref">Marc 7:15</span>. La nourriture passe par le ventre et s'évacue, elle ne touche pas le cœur ; du cœur, lui, sortent les pensées mauvaises, les meurtres, les vols, les convoitises, et c'est là ce qui souille l'homme. Leur tradition veillait sur une pureté de surface, quand Dieu regarde le cœur.</p>

      <p>Aussitôt après, à Césarée de Philippe, Jésus demande à ses disciples ce que les gens disent de lui, puis ce qu'eux-mêmes en pensent. Pierre répond : <em>« Tu es le Christ, le Fils du Dieu vivant. »</em> <span class="ref">Matthieu 16:16</span>. Jésus le déclare heureux, car ce n'est pas la chair qui le lui a révélé, mais le Père. Il lui donne alors un nom nouveau : <em>« Tu es Pierre, et sur cette pierre je bâtirai mon Église, et les portes de l'enfer ne prévaudront pas contre elle. »</em> <span class="ref">Matthieu 16:18</span>. Le mot araméen rendu par « roc », <em>Kepha</em>, est le même pour le nom de l'homme et pour le fondement : Pierre lui-même est le roc sur lequel l'Église est posée. Jésus lui remet les clés du Royaume et le pouvoir de lier et de délier, ce qu'il décidera sur la terre tenant jusque dans le ciel. À Pierre est confié le gouvernement du peuple de Dieu, une autorité dont les actes engagent le ciel même.</p>

      <h2>« Qu'il prenne sa croix »</h2>
      <p>Dès lors Jésus enseigne ouvertement ce qui l'attend : il doit monter à Jérusalem, beaucoup souffrir, être mis à mort et ressusciter le troisième jour. Pierre s'y refuse et veut l'en détourner ; Jésus le reprend avec force : <em>« Passe derrière moi, Satan ! Tes pensées ne sont pas celles de Dieu, mais celles des hommes. »</em> <span class="ref">Marc 8:33</span>. En l'appelant « Satan », mot hébreu qui signifie « adversaire » (שָׂטָן), Jésus ne l'identifie pas à l'ange déchu : il lui reproche de se faire, à cet instant, l'obstacle au dessein de Dieu. Le Messie attendu dans la gloire vient d'abord par la Croix. Et il fait de cette voie celle de tous les siens : <em>« Si quelqu'un veut venir à ma suite, qu'il se renie lui-même, qu'il prenne sa croix et qu'il me suive. »</em> <span class="ref">Marc 8:34</span>. Sauver sa vie, c'est la perdre ; la perdre pour lui, c'est la trouver.</p>

      <p>Six jours après, Jésus prend Pierre, Jacques et Jean et gravit une haute montagne. Là il est transfiguré devant eux : son visage resplendit comme le soleil, ses vêtements deviennent éclatants de lumière. Lui apparaissent Moïse et Élie : Moïse, par qui la Loi fut donnée, et Élie, le prophète enlevé vivant au ciel, représentent ensemble la Loi et les prophètes, toute l'ancienne alliance qui annonçait le Messie. Leur présence atteste que Jésus accomplit ce qu'ils avaient préparé ; ils s'entretiennent avec lui de son départ qui va s'accomplir à Jérusalem <span class="ref">Luc 9:31</span>. Une nuée les couvre, et du sein de la nuée une voix se fait entendre : <em>« Celui-ci est mon Fils bien-aimé, écoutez-le. »</em> <span class="ref">Marc 9:7</span>. Le Père montre aux trois disciples la gloire cachée du Fils, afin que, lorsqu'ils le verront défiguré et crucifié, le souvenir de cette gloire empêche leur foi de sombrer. Redescendus, ils trouvent un enfant qu'un esprit jette à terre et que les disciples n'ont pu délivrer. Au père qui implore, Jésus répond : <em>« Tout est possible à celui qui croit. »</em> <span class="ref">Marc 9:23</span>. L'homme s'écrie : <em>« Je crois, viens au secours de mon incrédulité. »</em> <span class="ref">Marc 9:24</span>, et Jésus chasse l'esprit.</p>
