<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumen · Théologie catholique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   LUMEN — feuille de style
   Palette « manuscrit nocturne » : encre profonde, parchemin, or ancien.
   ============================================================ */
:root{
  --encre:#000000;          /* fond global, noir total */
  --encre-2:#0b0b0b;        /* fond des surfaces légèrement levées */
  --parchemin:#ffffff;      /* texte principal, blanc franc */
  --parchemin-att:#ffffff;  /* texte secondaire, blanc lui aussi */
  --or:#efe6cf;             /* accent principal, crème clair */
  --or-pale:#f8f3e6;        /* crème éclairci, hover */
  --pourpre:#9a3b3b;        /* accent rare, rouge liturgique */
  --filet:rgba(231,224,207,.14); /* filets fins */
  --filet-fort:rgba(231,224,207,.28);
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--encre);
  color:var(--parchemin);
  font-family:'EB Garamond',Georgia,serif;
  font-size:23px;
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
::selection{background:rgba(198,164,92,.25)}

a{color:inherit;text-decoration:none}

/* ---------- bandeau d'en-tête ---------- */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--filet);
}
.barre{
  max-width:1080px;margin:0 auto;
  padding:20px 32px;
  display:grid;grid-template-columns:auto auto 1fr;align-items:center;
  gap:24px;
}
.logo{
  grid-column:1;grid-row:1;
  font-family:'Cormorant Garamond',serif;
  font-weight:500;font-size:26px;
  letter-spacing:.34em;
  text-transform:uppercase;
  color:var(--parchemin);
  padding-left:.34em;
}
.logo:hover{color:var(--or-pale)}
nav.menu{display:flex;gap:30px;grid-column:3;grid-row:1;justify-self:end}
nav.menu a{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--parchemin-att);
  padding-bottom:3px;
  border-bottom:1px solid transparent;
  transition:color .3s,border-color .3s;
}
nav.menu a:hover,nav.menu a.actif{color:var(--parchemin);border-color:var(--or)}

/* bouton menu mobile */
.burger{display:none;background:none;border:none;color:var(--parchemin);
  font-size:24px;cursor:pointer;line-height:1}

/* contexte d'article (thème · date) centré dans le bandeau */
.contexte-bar{
  grid-column:2;grid-row:1;text-align:left;min-width:0;
  overflow:hidden;text-overflow:ellipsis;
  font-family:'Cormorant Garamond',serif;
  font-size:13px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--parchemin-att);white-space:nowrap;pointer-events:auto;
}
.contexte-bar:empty{display:none}
.contexte-bar a{transition:color .3s}
.contexte-bar a:hover{color:var(--or)}

/* ---------- recherche ---------- */
.rech-loupe{display:inline-flex;align-items:center;cursor:pointer;color:var(--parchemin-att);transition:color .3s;background:none;border:none;padding:0;outline:none}
.rech-loupe:hover,.rech-loupe:focus{color:var(--or)}
.rech-loupe svg{display:block}
.rech-overlay{position:fixed;inset:0;z-index:200;background:rgba(8,8,8,.98);display:none}
.rech-overlay.ouvert{display:block}
.rech-boite{max-width:760px;margin:0 auto;padding:8vh 24px 40px;height:100%;display:flex;flex-direction:column;box-sizing:border-box}
.rech-haut{display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--filet-fort);padding-bottom:18px}
.rech-haut svg{color:var(--or);flex:none}
#rech-champ{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--parchemin);font-family:'Cormorant Garamond',serif;font-size:30px;letter-spacing:.01em}
#rech-champ::-webkit-search-cancel-button,#rech-champ::-webkit-search-decoration{-webkit-appearance:none;appearance:none;display:none}
#rech-champ::placeholder{color:var(--parchemin-att);opacity:.5}
.rech-fermer{cursor:pointer;color:var(--parchemin-att);font-size:24px;line-height:1;transition:color .3s;flex:none;outline:none}
.rech-fermer:hover,.rech-fermer:focus{color:var(--parchemin)}
.rech-res{margin-top:6px;overflow-y:auto;flex:1}
    .cloche{position:relative}
    .cloche .cloche-point{position:absolute;top:0;right:-1px;width:6px;height:6px;border-radius:50%;background:var(--or);pointer-events:none;display:none}
    .nouv-titre-panneau{flex:1;color:var(--parchemin);font-family:'Cormorant Garamond',serif;font-size:30px;letter-spacing:.01em}
    .nouv-liste{margin-top:6px;overflow-y:auto;flex:1}
    .nouv-groupe{padding:20px 0;border-bottom:1px solid var(--filet)}
    .nouv-groupe:last-child{border-bottom:none}
    .nouv-date{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-bottom:16px}
    .nouv-ligne{position:relative;padding-left:22px;color:var(--parchemin-att);font-size:18px;line-height:1.55}
    .nouv-ligne::before{content:"";position:absolute;left:0;top:.85em;width:12px;height:1px;border-radius:0;background:var(--or);opacity:.6}
    .nouv-ligne + .nouv-ligne{margin-top:16px}
    @media(max-width:720px){.nouv-titre-panneau{font-size:24px}}
.rech-msg{padding:38px 4px;color:var(--parchemin-att);font-style:italic;font-size:18px}
.rech-item{display:block;padding:22px 4px;border-bottom:1px solid var(--filet);cursor:pointer;transition:padding-left .3s}
.rech-item:hover{padding-left:14px}
.rech-meta{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--or);margin-bottom:6px}
.rech-titre{font-family:'Cormorant Garamond',serif;font-size:24px;line-height:1.15;transition:color .3s}
.rech-item:hover .rech-titre{color:var(--or-pale)}
.rech-extrait{margin-top:7px;font-size:16px;color:var(--parchemin-att);line-height:1.55}
.rech-extrait mark{background:none;color:var(--or);font-weight:600}
@media(max-width:720px){#rech-champ{font-size:24px}.rech-boite{padding-top:6vh}}

/* ---------- conteneur de page ---------- */
main{max-width:1080px;margin:0 auto;padding:0 32px;min-height:70vh}
.vue{animation:apparait .6s ease both}
@keyframes apparait{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ---------- accueil ---------- */
.hero{
  padding:112px 0 100px;
  text-align:center;
  border-bottom:1px solid var(--filet);
}
.croix{
  width:72px;height:132px;
  margin:0 auto;
  background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2072%20132'%3E%3Cpolygon%20points='34.5,40%2037.5,40%2041,2%2031,2'%20fill='%23ffffff'/%3E%3Cpolygon%20points='34.5,40%2037.5,40%2041,130%2031,130'%20fill='%23ffffff'/%3E%3Cpolygon%20points='36,38.5%2036,41.5%202,45%202,35'%20fill='%23ffffff'/%3E%3Cpolygon%20points='36,38.5%2036,41.5%2070,45%2070,35'%20fill='%23ffffff'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:center;background-size:contain;
}

.intro{
  max-width:680px;margin:64px auto;
  text-align:center;
  font-size:23px;color:var(--parchemin-att);
}
.intro p+p{margin-top:18px}

/* titres de section internes */
.titre-section{
  display:flex;align-items:baseline;gap:18px;
  margin:72px 0 36px;
}
.titre-section .num{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;letter-spacing:.2em;color:var(--or);
  white-space:nowrap;
}
.titre-section h2{
  font-family:'Cormorant Garamond',serif;
  font-weight:400;font-size:34px;letter-spacing:.02em;
  white-space:nowrap;
}
.titre-section .trait{flex:1;height:1px;background:var(--filet)}

/* grille des domaines */
.domaines{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:18px;background:transparent;
}
.domaine{
  background:transparent;
  border:1px solid var(--filet);
  padding:34px 30px;
  cursor:pointer;
  transition:background .35s,border-color .35s;
  display:flex;flex-direction:column;gap:12px;
}
.domaine:hover{background:var(--encre-2);border-color:var(--filet-fort)}
.domaine:last-child:nth-child(3n+1){grid-column:1 / -1}
.domaine:last-child:nth-child(3n+2){grid-column:2 / -1}
@media(max-width:900px){
  .domaines{grid-template-columns:repeat(2,1fr)}
  .domaine:last-child:nth-child(3n+1),.domaine:last-child:nth-child(3n+2){grid-column:auto}
  .domaine:last-child:nth-child(2n+1){grid-column:1 / -1}
}
@media(max-width:560px){
  .domaines{grid-template-columns:1fr}
  .domaine:last-child:nth-child(2n+1){grid-column:auto}
}
.domaine .d-num{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.18em;color:var(--or);
}
.domaine h3{
  font-family:'Cormorant Garamond',serif;
  font-weight:500;font-size:25px;letter-spacing:.01em;
  transition:color .3s;
}
.domaine:hover h3{color:var(--or-pale)}
.domaine p{font-size:19px;color:var(--parchemin-att);line-height:1.65}
.domaine .compte{
  margin-top:auto;font-size:13px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--parchemin-att);
  font-family:'Cormorant Garamond',serif;
}

/* ---------- bibliothèque : liste d'articles ---------- */
.bandeau-page{
  padding:80px 0 40px;border-bottom:1px solid var(--filet);margin-bottom:8px;
}
.bandeau-page .sur-titre{
  font-family:'Cormorant Garamond',serif;
  text-transform:uppercase;letter-spacing:.36em;
  font-size:12px;color:var(--or);margin-bottom:22px;
}
.bandeau-page h1{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(40px,6vw,68px);letter-spacing:.02em;line-height:1.05;
}
.bandeau-page .desc{
  margin-top:20px;max-width:620px;font-size:19px;color:var(--parchemin-att);
}

/* filtres de thèmes */
.filtres{display:flex;flex-wrap:wrap;gap:10px;margin:72px 0 16px}
.filtre{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--parchemin-att);
  padding:7px 16px;border:1px solid var(--filet);
  cursor:pointer;transition:all .3s;
  background:none;
}
.filtre:hover{color:var(--parchemin);border-color:var(--filet-fort)}
.filtre.actif{color:var(--encre);background:var(--or);border-color:var(--or)}

/* liste */
.liste{margin-top:24px}
.article-lien{
  display:block;padding:30px 4px;
  border-bottom:1px solid var(--filet);
  transition:padding-left .35s;
  cursor:pointer;
}
.article-lien:hover{padding-left:18px}
.article-lien .meta{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--or);margin-bottom:8px;
}
.article-lien h3{
  font-family:'Cormorant Garamond',serif;
  font-weight:400;font-size:30px;letter-spacing:.01em;
  transition:color .3s;line-height:1.15;
}
.article-lien:hover h3{color:var(--or-pale)}
.article-lien p{margin-top:8px;font-size:20px;color:var(--parchemin-att)}
.vide{padding:60px 0;text-align:center;color:var(--parchemin-att);font-style:italic;font-size:19px}
.cat-titre{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--or);
  margin:46px 0 2px;padding-bottom:14px;
  border-bottom:1px solid var(--filet-fort);
}
.liste > .cat-titre:first-child{margin-top:8px}

/* ---------- bibliothèque : domaines repliables ---------- */
.biblio-barre{display:flex;justify-content:flex-end;margin:30px 0 6px}
.bt{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--parchemin-att);cursor:pointer;
  display:inline-flex;align-items:center;gap:11px;
  padding:6px 2px;transition:color .3s;
  user-select:none;-webkit-tap-highlight-color:transparent;
}
.bt:hover{color:var(--or-pale)}
.bt .bt-fleche{display:inline-block;color:var(--or);transition:transform .35s ease;transform:rotate(90deg)}
.bt.actif-tout .bt-fleche{transform:rotate(-90deg)}
.domaines-liste{margin-top:30px}
.dom{border-bottom:1px solid var(--filet)}
.dom-tete{
  display:flex;align-items:baseline;gap:20px;
  padding:26px 6px;cursor:pointer;transition:background .3s;
  user-select:none;
}
.dom-tete:hover{background:var(--encre-2)}
.dom-num{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;letter-spacing:.2em;color:var(--or);
  font-variant-numeric:tabular-nums;flex:none;
}
.dom-nom{
  font-family:'Cormorant Garamond',serif;
  font-weight:400;font-size:29px;letter-spacing:.02em;line-height:1.1;
  flex:1;transition:color .3s;
}
.dom-tete:hover .dom-nom{color:var(--or-pale)}
.dom-compte{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--parchemin-att);white-space:nowrap;flex:none;
}
.dom-chevron{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;line-height:1;color:var(--parchemin-att);flex:none;
  transform:rotate(0);transition:transform .3s ease,color .25s;
}
.dom-tete:hover .dom-chevron{color:var(--or-pale)}
.dom.ouvert .dom-chevron{transform:rotate(90deg)}
.dom.ouvert .dom-tete{
  position:sticky;top:73px;z-index:40;
  background:rgba(0,0,0,.9);backdrop-filter:blur(8px);
}
.dom-sep{
  height:1px;opacity:0;
  background:linear-gradient(90deg,rgba(231,224,207,.5),rgba(231,224,207,.22),rgba(231,224,207,.06),transparent);
}
.dom-corps{display:none;padding:6px 0 22px}
.dom.ouvert .dom-corps{display:block}
.dom-corps > .article-lien:last-child{border-bottom:none}
/* sous-sections (catégories) repliables */
.sous{margin-top:6px}
.sous:first-child{margin-top:0}
.sous-tete{
  display:flex;align-items:center;gap:14px;
  cursor:pointer;user-select:none;padding:16px 6px;
  transition:background .3s;
}
.sous-tete:hover{background:var(--encre-2)}
.sous-puce{width:16px;height:1px;border-radius:0;background:var(--or);flex:none;opacity:.55}
.sous-nom{
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.26em;text-transform:uppercase;color:var(--or);
  flex:1;transition:color .3s;
}
.sous-tete:hover .sous-nom{color:var(--or-pale)}
.sous-chevron{
  font-family:'Cormorant Garamond',serif;font-size:20px;line-height:1;
  color:var(--parchemin-att);flex:none;transform:rotate(0);
  transition:transform .3s ease,color .25s;
}
.sous-tete:hover .sous-chevron{color:var(--or-pale)}
.sous.ouvert .sous-chevron{transform:rotate(90deg)}
.sous-corps{display:none;margin-left:9px;padding-left:24px;border-left:1px solid var(--filet)}
.sous.ouvert .sous-corps{display:block}
.sous-corps .article-lien:last-child{border-bottom:none}
@keyframes apparaitDom{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes apparaitDomFerme{from{opacity:1;transform:none}to{opacity:0;transform:translateY(-6px)}}

/* ---------- article ---------- */
article.lecture{max-width:720px;margin:0 auto;padding:64px 0 80px}
article.lecture h1{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(38px,6vw,60px);line-height:1.08;letter-spacing:.01em;
  margin:0 0 56px;text-align:center;
}
article.lecture h1+p::first-letter{
  font-family:'Cormorant Garamond',serif;
  float:left;font-size:78px;line-height:.78;
  font-weight:500;color:var(--or);
  margin:8px 14px 0 0;
}
article.lecture p{margin-bottom:22px}
article.lecture h2{
  font-family:'Cormorant Garamond',serif;font-weight:500;
  font-size:30px;letter-spacing:.01em;
  margin:48px 0 18px;
}
article.lecture h3{
  font-family:'Cormorant Garamond',serif;font-weight:500;
  font-size:23px;margin:34px 0 14px;color:var(--parchemin)
}
/* référence biblique en ligne */
.ref{font-weight:600;font-family:'Cormorant Garamond',serif;
  letter-spacing:.04em;color:var(--or);white-space:nowrap}
/* renvois internes entre articles */
article.lecture a,.prose a{
  color:var(--or);
  border-bottom:1px solid rgba(239,230,207,.35);
  transition:color .3s,border-color .3s;
}
article.lecture a:hover,.prose a:hover{color:var(--or-pale);border-color:var(--or-pale)}
article.lecture blockquote{
  margin:30px 0;padding-left:26px;border-left:2px solid var(--filet-fort);
  font-style:italic;color:var(--parchemin-att);
}
.fin-article{
  text-align:center;margin:60px 0 0;
  font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--or);letter-spacing:.4em;
}

/* ---------- à propos ---------- */
.prose{max-width:680px;margin:0 auto;padding:8px 0 80px;font-size:25px;text-align:center}
.prose p{margin-bottom:22px}
.apropos-vue{min-height:70vh;display:flex;flex-direction:column}
.apropos-corps{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 0}
.apropos-vue .prose{padding:0;text-align:left}

/* ---------- pied de page ---------- */
footer{
  border-top:1px solid var(--filet);
  margin-top:40px;
  padding:48px 32px 56px;
  text-align:center;
}
footer .marque{
  font-family:'Cormorant Garamond',serif;
  letter-spacing:.34em;text-transform:uppercase;font-size:18px;
  padding-left:.34em;color:var(--parchemin);
}
footer .verset-pied{
  margin-top:18px;font-style:italic;color:var(--parchemin-att);font-size:17px;
}
footer .verset-pied .ref-pied{font-style:normal}
footer .copy{margin-top:22px;font-size:13px;letter-spacing:.08em;color:var(--parchemin-att);
  font-family:'Cormorant Garamond',serif}

/* ---------- responsive ---------- */
@media(max-width:720px){
  body{font-size:20px}
  .barre{padding:16px 20px;display:flex;justify-content:space-between}
  main{padding:0 20px}
  nav.menu{
    position:fixed;inset:62px 0 auto 0;
    flex-direction:column;gap:0;
    background:var(--encre-2);
    border-bottom:1px solid var(--filet);
    transform:translateY(-130%);transition:transform .35s;
  }
  nav.menu.ouvert{transform:none}
  nav.menu a{padding:18px 20px;border-bottom:1px solid var(--filet)}
  .burger{display:block}
  .contexte-bar{display:none}
  .titre-section h2{font-size:26px;white-space:normal}
  .titre-section{flex-wrap:wrap}
  .dom-tete{gap:13px;padding:22px 2px}
  .dom-nom{font-size:23px}
  .dom-chevron{font-size:22px}
  .dom.ouvert .dom-tete{top:61px}
  .sous-tete{padding:14px 2px;gap:11px}
  .sous-corps{padding-left:18px}
}
.vue:has(.apologie) .lecture{padding-bottom:56px}
.apologie{max-width:720px;margin:0 auto;padding:40px 0 96px;border-top:1px solid rgba(255,255,255,.12)}
.apologie-label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-bottom:14px}
.apologie-lien{display:inline-block;font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--parchemin);text-decoration:none;transition:color .2s}
.apologie-lien:hover{color:var(--or)}
.vue:has(.domaines-liste) .bandeau-page{border-bottom:none}
.ll-mob{display:none}
@media(max-width:720px){
nav.menu .rech-loupe{width:auto;justify-content:flex-start;gap:14px;padding:18px 20px;border-bottom:1px solid var(--filet);font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.12em;text-transform:uppercase;color:var(--parchemin-att)}
nav.menu .rech-loupe .ll-mob{display:inline}
nav.menu .cloche .cloche-point{top:22px;left:34px;right:auto}
}
</style>
</head>
<body>

<header>
  <div class="barre">
    <a href="#/" class="logo">Lumen</a>

const ARTICLES = [
  {
    id: "les-quatre-chants-du-serviteur",
    titre: "Les quatre chants du Serviteur",
    theme: "ecriture",
    resume: "Les quatre chants du deutéro-Isaïe où paraît le Serviteur du Seigneur : l'élu porteur du droit aux nations, la lumière des nations, le disciple qui tient bon sous l'épreuve, et le Serviteur souffrant qui sauve la multitude par sa mort. L'Église y reconnaît le Christ.",
    date: "2026",
    contenu: `
      <p>À l'intérieur du deutéro-Isaïe, la deuxième partie du livre d'Isaïe, quatre passages se détachent où paraît une figure que Dieu appelle son Serviteur. Le mot hébreu rendu par « serviteur », <em>ebed</em> (<span dir="rtl">עֶבֶד</span>), désigne celui qui appartient à un maître et accomplit son œuvre. Ces quatre chants, Isaïe 42:1-4, 49:1-6, 50:4-9 et 52:13 à 53:12, forment une suite : Dieu présente d'abord son élu, puis la mission s'élargit aux nations, le Serviteur endure ensuite l'épreuve en disciple fidèle, et il livre enfin sa vie pour la multitude avant d'être relevé. Une question les traverse, à laquelle ils répondent peu à peu : qui est ce Serviteur ?</p>
      <h2>Le premier chant : l'élu qui porte le droit aux nations</h2>
      <p>Dieu ouvre la suite en présentant lui-même son Serviteur, qu'il a choisi et sur qui il a posé son Esprit. <em>« Voici mon serviteur que je soutiens, mon élu en qui mon âme se complaît. J'ai mis sur lui mon Esprit ; il présentera le droit aux nations. »</em> <span class="ref">Isaïe 42:1</span> Sa mission est d'établir le droit, l'ordre juste voulu par Dieu, et de l'étendre au-delà d'Israël jusqu'aux peuples. Il l'accomplit avec une douceur qui épargne le plus fragile. <em>« Il ne brisera pas le roseau froissé, il n'éteindra pas la mèche qui faiblit ; selon la vérité, il présentera le droit. »</em> <span class="ref">Isaïe 42:3</span> Rien ne l'arrêtera avant que son œuvre tienne sur toute la terre. <em>« Il ne faiblira pas, il ne se laissera pas abattre, jusqu'à ce qu'il établisse le droit sur la terre, et les îles attendront sa loi. »</em> <span class="ref">Isaïe 42:4</span> Au baptême de Jésus, l'Esprit descend sur lui et la voix du Père le déclare son Fils bien-aimé, celui en qui il met sa joie. Ces mots, et l'Esprit qui repose sur lui, sont ceux du premier chant : Jésus y est désigné comme le Serviteur que Dieu présente.</p>
      <h2>Le deuxième chant : la lumière des nations</h2>
      <p>Dans le deuxième chant, le Serviteur parle à son tour. Il se sait appelé avant même sa naissance, mis à part pour une mission. <em>« Le Seigneur m'a appelé dès le sein maternel, dès les entrailles de ma mère il a prononcé mon nom. »</em> <span class="ref">Isaïe 49:1</span> Dieu lui donne alors le nom de son peuple. <em>« Tu es mon serviteur, Israël, en qui je manifesterai ma gloire. »</em> <span class="ref">Isaïe 49:3</span> Son labeur semble pourtant rester sans résultat, et il s'en remet à Dieu. <em>« C'est en vain que je me suis fatigué, pour rien, pour du vent, j'ai usé ma force ; mais mon droit est auprès du Seigneur. »</em> <span class="ref">Isaïe 49:4</span> À cette lassitude, Dieu répond en élargissant la mission bien au-delà d'Israël. <em>« C'est trop peu que tu sois mon serviteur pour relever les tribus de Jacob : je fais de toi la lumière des nations, pour que mon salut atteigne jusqu'aux extrémités de la terre. »</em> <span class="ref">Isaïe 49:6</span> Présentant l'enfant Jésus au Temple, Syméon le reconnaîtra comme cette lumière des nations.</p>
      <h2>Le troisième chant : le disciple qui tient bon</h2>
      <p>Le troisième chant montre le Serviteur en disciple, attentif à Dieu jour après jour. <em>« Le Seigneur m'a donné une langue de disciple, pour que je sache soutenir par ma parole celui qui faiblit. Chaque matin il éveille mon oreille pour que j'écoute comme un disciple. »</em> <span class="ref">Isaïe 50:4</span> Cette écoute le conduit à l'épreuve, qu'il accepte sans fuir. <em>« J'ai présenté mon dos à ceux qui me frappaient, et mes joues à ceux qui m'arrachaient la barbe ; je n'ai pas dérobé mon visage aux outrages et aux crachats. »</em> <span class="ref">Isaïe 50:6</span> Il tient bon parce que Dieu lui vient en aide, et tourne vers l'épreuve un visage que rien ne fait fléchir. <em>« Le Seigneur Dieu vient à mon aide : aussi ai-je rendu mon visage dur comme pierre, sachant que je ne serai pas confondu. »</em> <span class="ref">Isaïe 50:7</span> Ce visage durci vers l'épreuve, l'évangile le retrouve en Jésus, qui prend résolument le chemin de Jérusalem où l'attendent les coups et la croix.</p>
      <h2>Le quatrième chant : le Serviteur souffrant</h2>
      <p>Le quatrième chant porte la figure à son sommet et en dévoile le sens. Dieu annonce d'abord la réussite et l'élévation de son Serviteur. <em>« Voici que mon serviteur réussira ; il sera haut placé, élevé, exalté à l'extrême. »</em> <span class="ref">Isaïe 52:13</span> Cette gloire annoncée passe par le rejet le plus total. <em>« Méprisé, abandonné des hommes, homme de douleurs, familier de la souffrance, il était comme celui devant qui on se voile la face. »</em> <span class="ref">Isaïe 53:3</span> Sa souffrance est celle des autres : il porte leur faute. <em>« Ce sont nos souffrances qu'il portait. Il a été transpercé à cause de nos péchés ; le châtiment qui nous donne la paix est sur lui, et par ses meurtrissures nous sommes guéris. »</em> <span class="ref">Isaïe 53:4-5</span> Il subit tout en silence, livré sans résistance. <em>« Maltraité, il s'humilie, il n'ouvre pas la bouche, comme l'agneau qu'on mène à l'abattoir. »</em> <span class="ref">Isaïe 53:7</span> Sa mort devient une offrande qui rachète, et Dieu le relève au-delà de la mort. <em>« Après les épreuves de son âme, il verra la lumière. Mon serviteur justifiera les multitudes, lui qui se chargera de leurs fautes. »</em> <span class="ref">Isaïe 53:11</span> Le chant dit son dernier mot sur le Serviteur. <em>« Il s'est dépouillé lui-même jusqu'à la mort et fut compté parmi les criminels, alors qu'il portait le péché des multitudes et intercédait pour les coupables. »</em> <span class="ref">Isaïe 53:12</span> L'Église lit dans ces pages la Passion du Christ, l'Agneau livré pour les pécheurs, qui sauve en prenant sur lui ce qui les condamnait. C'est ce chant que lisait l'Éthiopien à qui Philippe annonça Jésus.</p>
      <h2>Qui est le Serviteur ?</h2>
      <p>Les chants laissent paraître deux visages du Serviteur. Tantôt Dieu nomme « Israël » son serviteur, du nom même de son peuple, qu'il avait choisi pour le connaître, l'adorer et porter sa lumière aux nations. Tantôt le Serviteur se distingue du peuple : il reçoit pour mission de relever Israël lui-même, et il endure une épreuve qui lui est propre. Appelé à servir Dieu, Israël a failli à sa vocation et s'est perdu dans l'infidélité et l'exil. Un Serviteur distinct se lève alors, fidèle là où le peuple a manqué, qui accomplit pour tous ce qu'Israël devait être. D'un chant à l'autre, sa figure se précise : élu portant le droit, lumière des nations, disciple éprouvé, enfin victime qui sauve en mourant. L'Église reconnaît en lui le Christ, le vrai Israël et le Serviteur souffrant, qui sauve la multitude par son obéissance jusqu'à la mort.</p>
      <div class="fin-article">✦</div>

  {
    id: "le-trito-isaie",
    titre: "Le trito-Isaïe",
    theme: "ecriture",
    resume: "La troisième partie du livre d'Isaïe, les chapitres 56 à 66 : adressée au peuple revenu de l'exil, elle appelle à la justice et au vrai culte, ouvre le salut à toutes les nations, annonce l'envoyé oint de l'Esprit, et dévoile la gloire de Sion et la création nouvelle.",
    date: "2026",
    contenu: `
      <p>Le trito-Isaïe est la troisième partie du livre d'Isaïe, les chapitres 56 à 66. Il s'adresse au peuple revenu de l'exil : Babylone est tombée, les déportés sont rentrés à Jérusalem. La ville reste à demi relevée, pauvre et divisée, et la gloire promise par le deutéro-Isaïe tarde à paraître. À cette communauté déçue, Isaïe rappelle les conditions du salut, la justice et le vrai culte, et lève les yeux vers la gloire finale de Sion et vers une création nouvelle.</p>
      <h2>La maison de prière pour tous les peuples</h2>
      <p>Le livre s'ouvre en élargissant le salut au-delà d'Israël. L'étranger et l'eunuque, que l'ancienne loi tenait à l'écart de l'assemblée, reçoivent une place dans la maison de Dieu s'ils gardent l'alliance et le sabbat. L'eunuque est le cas extrême : sans enfants pour porter son nom après lui, il semblait voué à disparaître sans laisser de trace. À lui d'abord, Dieu promet mieux qu'une descendance. <em>« Je leur donnerai dans ma maison et dans mes murs un monument et un nom meilleurs que des fils et des filles ; je leur donnerai un nom éternel qui ne périra pas. »</em> <span class="ref">Isaïe 56:5</span> Celui qui le retient, c'est Dieu : il le compte parmi les siens et le garde devant lui pour toujours, là où la mémoire des hommes se serait éteinte. L'étranger qui s'attache au Seigneur est admis lui aussi à son culte, car le Temple est ouvert à tous. <em>« Je les amènerai à ma montagne sainte, je les réjouirai dans ma maison de prière, car ma maison sera appelée maison de prière pour tous les peuples. »</em> <span class="ref">Isaïe 56:7</span> Jésus reprendra cette parole en chassant les marchands du Temple, rendant à la maison de son Père sa vocation de prière pour toutes les nations.</p>
      <h2>Le jeûne qui plaît à Dieu</h2>
      <p>Dieu déclare où il habite. <em>« J'habite dans les hauteurs, dans la sainteté, et avec l'homme contrit et humble d'esprit, pour rendre vie à l'esprit des humbles, pour rendre vie au cœur des contrits. »</em> <span class="ref">Isaïe 57:15</span> Le peuple jeûne et se plaint que Dieu n'y prenne pas garde ; Isaïe lui découvre le jeûne qui plaît à Dieu, celui qui touche le prochain plutôt que de s'afficher. <em>« Le jeûne que je préfère, n'est-ce pas délier les chaînes injustes, partager ton pain avec celui qui a faim, recueillir chez toi le pauvre sans abri, et ne pas te dérober à celui qui est ta propre chair ? »</em> <span class="ref">Isaïe 58:6-7</span> À ce culte vécu dans la justice, Dieu attache la lumière. <em>« Alors ta lumière poindra comme l'aurore, et ta blessure se guérira vite. »</em> <span class="ref">Isaïe 58:8</span></p>
      <h2>Le péché qui sépare et le bras qui sauve</h2>
      <p>Le bras de Dieu garde toute sa force pour sauver ; le péché du peuple fait obstacle. <em>« Ce sont vos fautes qui mettent une séparation entre vous et votre Dieu ; vos péchés vous cachent sa face. »</em> <span class="ref">Isaïe 59:2</span> Isaïe dresse le tableau d'un peuple enfermé dans l'injustice, où la vérité trébuche sur la place publique. Dieu cherche un homme qui redresserait le tort et n'en trouve aucun ; aucun bras humain n'en étant capable, il opère le salut par le sien. <em>« Il a vu qu'il n'y avait personne, il s'est étonné que nul n'intervînt ; alors son propre bras lui est venu en aide, et sa justice l'a soutenu. »</em> <span class="ref">Isaïe 59:16</span> Pour ce combat, Dieu se revêt comme un guerrier. <em>« Il a revêtu la justice comme une cuirasse, et mis sur sa tête le casque du salut. »</em> <span class="ref">Isaïe 59:17</span> Cette armure de Dieu, Paul la remettra aux chrétiens pour le combat de la foi. Et c'est vers Sion que vient celui qui rachète, pour arracher les siens au péché qui les avait séparés de Dieu. <em>« Un rédempteur viendra pour Sion, pour ceux de Jacob qui reviennent de leur péché. »</em> <span class="ref">Isaïe 59:20</span></p>
      <h2>Lève-toi, resplendis : la gloire de Sion</h2>
      <p>Au centre du livre éclate la vision de Sion illuminée. La nuit couvre la terre ; sur la cité se lève la gloire de Dieu. <em>« Lève-toi, resplendis, car ta lumière arrive, et la gloire du Seigneur se lève sur toi. »</em> <span class="ref">Isaïe 60:1</span> Vers cette clarté affluent les peuples et leurs rois, et les caravanes apportent les présents des nations lointaines. <em>« Tous viendront de Saba, ils apporteront l'or et l'encens, et publieront les louanges du Seigneur. »</em> <span class="ref">Isaïe 60:6</span> L'or et l'encens portés à Sion par les nations, les mages les déposeront devant l'enfant de Bethléem, en qui se lève la vraie lumière. Au terme, Dieu lui-même tient lieu de soleil à son peuple. <em>« Le soleil ne sera plus ta lumière le jour, mais le Seigneur sera pour toi une lumière éternelle. »</em> <span class="ref">Isaïe 60:19</span></p>
      <h2>L'Esprit du Seigneur est sur moi</h2>
      <p>L'envoyé prend la parole et dit sa mission, scellée par l'onction de l'Esprit. <em>« L'Esprit du Seigneur Dieu est sur moi, car le Seigneur m'a oint ; il m'a envoyé porter la bonne nouvelle aux pauvres, panser les cœurs brisés, annoncer aux captifs la délivrance, et proclamer une année de grâce du Seigneur. »</em> <span class="ref">Isaïe 61:1-2</span> Cette année de grâce reprend le jubilé. <em>« Vous sanctifierez la cinquantième année et vous proclamerez la liberté dans le pays pour tous ses habitants ; chacun rentrera dans sa propriété, chacun retournera dans sa famille. »</em> <span class="ref">Lévitique 25:10</span> Ce que le jubilé accordait par intervalles, l'envoyé l'annonce pour tous et sans retour. Dans la synagogue de Nazareth, Jésus lit ce passage d'Isaïe, le referme et déclare qu'il s'accomplit ce jour même en lui : il est l'oint dont parle le prophète, et l'année de grâce s'ouvre avec lui.</p>
      <h2>Les épousailles de Sion</h2>
      <p>À la cité longtemps délaissée, Dieu donne des noms nouveaux qui disent l'alliance retrouvée. <em>« On ne te dira plus "Délaissée", et l'on ne dira plus de ta terre "Désolée" ; on t'appellera "Mon plaisir est en elle", et ta terre "Épousée", car le Seigneur met en toi son plaisir, et ta terre aura un époux. »</em> <span class="ref">Isaïe 62:4</span> Ces noms font de Sion une fiancée que Dieu reprend pour épouse. <em>« Comme la fiancée fait la joie de son fiancé, tu feras la joie de ton Dieu. »</em> <span class="ref">Isaïe 62:5</span> L'alliance prend ici le visage des noces, que Paul reconnaîtra dans l'union du Christ et de l'Église, et l'Apocalypse dans les noces de l'Agneau.</p>
      <h2>Le pressoir de la colère</h2>
      <p>Une vision suit, celle d'un guerrier qui revient seul du combat, les habits éclaboussés de rouge. Une sentinelle l'interroge, et lui-même répond. <em>« Qui est celui-ci qui vient d'Édom, de Bosra, en habits éclatants ? C'est moi, qui parle avec justice, puissant pour sauver. »</em> <span class="ref">Isaïe 63:1</span> C'est le Seigneur, et le rouge qui le couvre est celui des oppresseurs qu'il a écrasés comme on écrase le raisin dans la cuve ; il les a frappés seul. <em>« J'ai foulé seul au pressoir, et nul d'entre les peuples n'était avec moi. »</em> <span class="ref">Isaïe 63:3</span> Ce jugement porté sur l'injustice est en même temps le jour du salut : en abattant l'oppresseur, Dieu relève l'opprimé. <em>« Le jour de la vengeance était dans mon cœur, et l'année de mes rachetés était venue. »</em> <span class="ref">Isaïe 63:4</span></p>

      <p>À travers le jugement, Isaïe tient une espérance : le châtiment ne détruira pas tout, un reste survivra et reviendra vers Dieu. Cette promesse est inscrite jusque dans le nom du premier fils d'Isaïe, qu'il emmène au-devant d'Achaz, le nom hébreu rendu par « un reste reviendra », <em>Shear-Yashoub</em> (<span dir="rtl">שְׁאָר יָשׁוּב</span>). De la masse infidèle, Dieu garde toujours un petit nombre fidèle, par lequel il reprend son œuvre. <em>« Un reste reviendra, le reste de Jacob, vers le Dieu fort. »</em> <span class="ref">Isaïe 10:21</span> Ce reste, purifié par l'épreuve, est la semence du peuple renouvelé.</p>
      <h2>La montagne du Seigneur et les nations</h2>
      <p>Le regard d'Isaïe s'élargit au-delà d'Israël, jusqu'à toutes les nations. Il voit un jour où les peuples monteront vers Jérusalem pour y apprendre la voie de Dieu, et où les armes deviendront des outils. <em>« De leurs épées ils forgeront des socs, et de leurs lances des serpes ; une nation ne lèvera plus l'épée contre une autre. »</em> <span class="ref">Isaïe 2:4</span> Les nations elles-mêmes sont sous la main de Dieu : une longue suite d'oracles annonce le jugement de Babylone, de l'Assyrie, de l'Égypte et des royaumes voisins, car le Saint d'Israël est le maître de toute la terre. Au terme, une grande vision dépasse l'histoire : Dieu prépare pour tous les peuples un festin, essuie les larmes de tous les visages et abolit la mort elle-même. <em>« Il détruira la mort pour toujours ; le Seigneur Dieu essuiera les larmes de tous les visages. »</em> <span class="ref">Isaïe 25:8</span></p>
      <h2>La délivrance de Jérusalem</h2>
      <p>Les derniers chapitres racontent l'épreuve décisive du ministère d'Isaïe. Sennachérib, roi d'Assyrie, monte contre Juda, prend ses villes et assiège Jérusalem ; le grand échanson qu'il envoie raille devant les murs le Dieu d'Israël, niant qu'il puisse sauver la ville. Le roi Ézéchias porte la menace devant Dieu dans le Temple et s'en remet à lui par la bouche d'Isaïe, qui annonce que l'Assyrien n'entrera pas dans la ville. Cette nuit-là, le camp assyrien est frappé, et Sennachérib lève le siège et s'en retourne. <em>« L'ange du Seigneur sortit et frappa dans le camp des Assyriens cent quatre-vingt-cinq mille hommes. »</em> <span class="ref">Isaïe 37:36</span> La confiance qu'Achaz avait refusée, Ézéchias l'a donnée, et Jérusalem fut sauvée.</p>
      <p>Peu après, Ézéchias tombe malade jusqu'à la mort. Isaïe lui annonce sa fin ; le roi se tourne alors vers Dieu et le supplie en pleurant. Dieu entend sa prière, ajoute quinze années à sa vie, et lui donne pour signe l'ombre qui recule de dix degrés sur le cadran. C'est sa guérison qui amène à Jérusalem des envoyés de Babylone, venus le féliciter ; Ézéchias leur montre avec orgueil tous ses trésors. Isaïe lui en fait reproche et lui annonce le jugement : ces richesses seront un jour emportées à Babylone, et ses propres fils y seront déportés. Ainsi s'ouvre déjà, au seuil du proto-Isaïe, l'horizon de l'exil que chantera la suite du livre.</p>

      <p>Une nuit, un notable juif vient trouver le Christ en secret. Nicodème est pharisien et membre du conseil, un maître respecté de la Loi. De cet entretien sort l'un des sommets de l'Évangile : il faut naître de nouveau, d'eau et d'Esprit, pour entrer dans le royaume de Dieu ; et le Fils, élevé sur la croix, donne la vie éternelle à qui croit en lui.</p>
      <h2>Venu de nuit</h2>
      <p>Nicodème s'approche de nuit, à l'écart des regards. Sa prudence trahit l'embarras d'un homme en vue qui ne veut pas se compromettre, mais aussi un cœur déjà touché. Il ouvre avec respect : <em>« Rabbi, nous savons que tu es un docteur venu de Dieu, car personne ne peut faire les miracles que tu fais, si Dieu n'est avec lui. »</em> <span class="ref">Jean 3:2</span> La nuit qu'il choisit n'est pas qu'une discrétion : elle figure l'obscurité où il se tient encore, croyant à demi, sans avoir reçu la pleine lumière. C'est de cette ombre que tout l'entretien va le tirer.</p>

      <p>Cette naissance est l'œuvre de Dieu, libre et insaisissable : <em>« Le vent souffle où il veut, et tu en entends le bruit ; mais tu ne sais ni d'où il vient ni où il va. Il en est ainsi de quiconque est né de l'Esprit. »</em> <span class="ref">Jean 3:8</span> En grec, un seul mot, <em>pneuma</em> (πνεῦμα), dit le vent et l'Esprit : c'est lui qui revient dans « le vent souffle » et dans « né de l'Esprit ». On en perçoit les effets sans en maîtriser la source : nul ne se donne cette vie à soi-même, il la reçoit.</p>
      <p>Là se révèle le paradoxe de Nicodème. Maître de la Loi, versé dans les Écritures, il devrait reconnaître ce dont parle le Christ, car les prophètes avaient annoncé ce don de Dieu : <em>« Je vous donnerai un cœur nouveau, et je mettrai en vous un esprit nouveau. »</em> <span class="ref">Ézéchiel 36:26</span> Pourtant il ne comprend pas, et le Christ le lui montre : <em>« Tu es le docteur d'Israël, et tu ne sais pas ces choses ! »</em> <span class="ref">Jean 3:10</span> Nicodème veut comprendre comment cela se fait avant d'y croire ; or l'ordre est inverse. On n'attend pas d'avoir saisi cette naissance pour la recevoir : on l'accueille par la foi, et la lumière vient ensuite. Ce qui lui manque n'est pas le savoir, mais de croire celui qui parle : <em>« Si vous ne croyez pas quand je vous parle des choses terrestres, comment croirez-vous si je vous parle des choses célestes ? »</em> <span class="ref">Jean 3:12</span></p>

      <h2>Dieu a tant aimé le monde</h2>
      <p>De là vient le verset où tient tout l'Évangile : <em>« Dieu a tant aimé le monde qu'il a donné son Fils unique, afin que quiconque croit en lui ne périsse pas, mais ait la vie éternelle. »</em> <span class="ref">Jean 3:16</span> Le don du Fils ne vise pas à condamner, mais à sauver : <em>« Dieu n'a pas envoyé son Fils dans le monde pour juger le monde, mais pour que le monde soit sauvé par lui. »</em> <span class="ref">Jean 3:17</span> La croix, où le Fils est élevé, est le sommet de cet amour.</p>
      <p>L'entretien s'achève sur la lumière et l'ombre, là où il avait commencé. Le jugement n'est pas une sentence imposée du dehors : <em>« La lumière est venue dans le monde, et les hommes ont préféré les ténèbres à la lumière, parce que leurs œuvres étaient mauvaises. »</em> <span class="ref">Jean 3:19</span> Chacun se juge en venant à la lumière ou en la fuyant. Nicodème, lui, était venu de nuit ; il reparaîtra au grand jour, lorsqu'il viendra ensevelir le Christ en portant la myrrhe et l'aloès, <em>« lui qui d'abord était venu de nuit »</em> <span class="ref">Jean 19:39</span>. L'homme des ténèbres a marché vers la lumière.</p>

      <p>Pilate ouvre l'interrogatoire par la seule question qui l'intéresse, celle d'un pouvoir rival de Rome : <em>« Es-tu le roi des Juifs ? »</em> <span class="ref">Jean 18:33</span> Le Christ ne nie pas qu'il soit roi ; il en corrige aussitôt l'idée. Pilate cherche un agitateur prêt à soulever le peuple, et il a devant lui un roi d'une autre sorte, qu'aucune de ses catégories ne saisit.</p>
      <h2>Un royaume qui n'est pas d'ici</h2>
      <p><em>« Mon royaume n'est pas de ce monde. Si mon royaume était de ce monde, mes serviteurs auraient combattu pour que je ne sois pas livré ; mais maintenant, mon royaume n'est point d'ici. »</em> <span class="ref">Jean 18:36</span> La preuve qu'il en donne est simple : aucune armée ne s'est levée pour le défendre, aucune épée n'a empêché son arrestation. Pressé de dire s'il est roi, il confirme et révèle sur quoi repose son règne : <em>« Je suis venu dans le monde pour rendre témoignage à la vérité ; quiconque est de la vérité écoute ma voix. »</em> <span class="ref">Jean 18:37</span> Son règne ne s'exerce pas sur des terres, mais sur les cœurs qui se rangent du côté de la vérité. Pilate attendait un rival politique, et il entend parler d'un royaume et d'une vérité qui débordent tout ce qu'un gouverneur peut juger.</p>

      <p>Le trouble de Pilate ne cesse de croître. Pendant qu'il siège, sa femme lui fait porter un avertissement : <em>« Ne te mêle pas de l'affaire de ce juste, car aujourd'hui j'ai beaucoup souffert en songe à cause de lui. »</em> <span class="ref">Matthieu 27:19</span> Une païenne appelle Jésus « ce juste », et un songe la trouble assez pour qu'elle interrompe un procès. Quand Pilate entend ensuite que l'accusé s'est fait Fils de Dieu, sa crainte redouble : <em>« Quand Pilate entendit cette parole, il eut encore plus de peur. »</em> <span class="ref">Jean 19:8</span> Il revient l'interroger sur son origine, <em>« D'où es-tu ? »</em> <span class="ref">Jean 19:9</span>, en homme qui se demande s'il a devant lui plus qu'un homme. Le Christ se tait, et ce silence l'étonne. Ces signes l'avertissent tous d'une même chose : qu'il ne devrait pas condamner ce juste.</p>

      <p>Devant ce silence, Pilate s'irrite et brandit son autorité : <em>« Ne sais-tu pas que j'ai le pouvoir de te crucifier, et le pouvoir de te relâcher ? »</em> <span class="ref">Jean 19:10</span> La réponse renverse les rangs : <em>« Tu n'aurais sur moi aucun pouvoir, s'il ne t'avait été donné d'en haut ; c'est pourquoi celui qui me livre à toi est coupable d'un plus grand péché. »</em> <span class="ref">Jean 19:11</span> Le juge ne tient son pouvoir que de Dieu, et il n'en dispose pas aussi librement qu'il le croit. L'accusé, lui, reste maître de l'heure : il se livre, nul ne le lui arrache. La faute, enfin, se mesure : celui qui l'a livré pèche davantage, sans que Pilate en soit lavé pour autant.</p>

      <p>Tout poussait Pilate à relâcher cet homme : son propre jugement, l'avertissement de sa femme, sa peur. Une menace suffit pourtant à le faire céder : <em>« Si tu relâches cet homme, tu n'es pas l'ami de César. »</em> <span class="ref">Jean 19:12</span> Entre la vérité qu'il a entrevue et sa place auprès de l'empereur, il choisit l'empereur. Il se fait apporter de l'eau et s'en lave les mains, <em>« Je suis innocent de ce sang »</em> <span class="ref">Matthieu 27:24</span>, comme si l'on pouvait se laver d'une sentence qu'on prononce soi-même. Son hésitation ne l'excuse pas, elle l'accuse : il ne condamne pas par ignorance, mais contre ce que sa conscience, son épouse et sa propre crainte lui disaient. Et la foule obtient ce qu'elle réclame : <em>« Nous n'avons d'autre roi que César. »</em> <span class="ref">Jean 19:15</span></p>
      <p>À la fin, Pilate tient bon sur un seul point, et c'est sur la vérité qu'il avait fuie. Il fait écrire sur la croix le motif de la condamnation, et le fait inscrire en trois langues. <em>« Pilate avait rédigé un écriteau qu'il fit placer sur la croix ; il était écrit : Jésus de Nazareth, roi des Juifs. Beaucoup de Juifs le lurent, car c'était écrit en hébreu, en latin et en grec. »</em> <span class="ref">Jean 19:19-20</span> Le titre humilie les chefs qui lui ont forcé la main : il leur jette leur « roi » cloué à un gibet. Ils réclament qu'on l'adoucisse, qu'on écrive seulement qu'il s'est prétendu roi ; Pilate s'y refuse : <em>« Ce que j'ai écrit, je l'ai écrit. »</em> <span class="ref">Jean 19:22</span> Son insulte dit pourtant vrai : pour blesser ces chefs, il a dû proclamer roi celui qu'ils crucifiaient, énonçant dans les mêmes mots ce qu'il avait pressenti sans oser le recevoir. Et Dieu s'en sert : celui qui demandait ce qu'est la vérité proclame, aux trois langues du monde connu, que le condamné est roi.</p>

      <p>« Laisse les morts enterrer leurs morts » : par cette parole, le Christ place l'appel de Dieu avant toute autre obligation, fût-elle aussi sacrée que le devoir d'ensevelir son père. Il subordonne le devoir filial à Dieu, à qui rien ne peut être préféré.</p>
      <h2>La demande</h2>
      <p>Un homme que le Christ vient d'appeler à le suivre lui demande un délai : <em>« Seigneur, permets-moi d'aller d'abord enterrer mon père. »</em> <span class="ref">Matthieu 8:21</span> La requête paraît juste, et même pieuse : ensevelir un mort, son père surtout, était en Israël l'un des devoirs les plus graves, lié au commandement reçu de Dieu, <em>« Honore ton père et ta mère. »</em> <span class="ref">Exode 20:12</span> La réponse tranche pourtant net : <em>« Suis-moi, et laisse les morts enterrer leurs morts. »</em> <span class="ref">Matthieu 8:22</span> Le Christ n'accorde pas même ce délai.</p>
      <h2>Les morts qui enterrent les morts</h2>
      <p>La clé est dans les deux morts, qui ne sont pas de même sorte. Les premiers sont morts à Dieu, privés de la vie de la grâce ; les seconds sont morts de corps. L'Écriture connaît cette mort de l'âme : <em>« Vous étiez morts par vos fautes et vos péchés. »</em> <span class="ref">Éphésiens 2:1</span> Le Christ dit donc : que ceux qui n'ont pas encore la vie s'occupent déjà d'ensevelir les défunts ; toi, que j'appelle à la vie, suis-moi. La version de Luc le dit en clair : <em>« Laisse les morts enterrer leurs morts ; pour toi, va annoncer le royaume de Dieu. »</em> <span class="ref">Luc 9:60</span></p>
      <h2>Le mot « d'abord »</h2>
      <p>Tout tient dans le mot « d'abord ». L'homme ne refuse pas de suivre, il veut suivre ensuite, une fois ce devoir rempli. Or l'appel de Dieu ne souffre aucun « d'abord » : rien ne peut être mis avant lui, pas même une obligation sainte. Le Royaume est le bien suprême, et qui le diffère pour autre chose le place déjà au second rang. À l'attente que l'homme réclame, le Christ substitue une mission : annoncer le Royaume.</p>
      <h2>Qui peut l'exiger</h2>
      <p>Demander d'être préféré à son propre père, nul homme ne le pourrait sans orgueil. Le Christ le demande parce qu'il est Dieu, et Dieu seul a droit à un amour qui passe avant tous les autres : <em>« Celui qui aime son père ou sa mère plus que moi n'est pas digne de moi. »</em> <span class="ref">Matthieu 10:37</span> La parole n'abaisse pas l'amour dû aux parents, elle le remet à sa place : Dieu d'abord, et tout le reste à partir de lui. Ce que le commandement défend de retirer au père, le Christ peut le revendiquer pour lui-même, car il est plus que le père.</p>
      <p>À un autre qui veut d'abord aller faire ses adieux aux siens, le Christ répond de même, et il en donne l'image : <em>« Quiconque met la main à la charrue et regarde en arrière n'est pas propre au royaume de Dieu. »</em> <span class="ref">Luc 9:62</span> Le laboureur qui se retourne dévie son sillon ; de même, celui que le Christ appelle doit avancer sans revenir sur ce qu'il quitte.</p>

      <p>Le Christ part d'un rappel. Lorsqu'il avait envoyé les Apôtres annoncer le Royaume, il les avait fait partir démunis, sans argent ni provisions, et rien ne leur avait fait défaut : <em>« Quand je vous ai envoyés sans bourse, sans sac et sans sandales, avez-vous manqué de quelque chose ? De rien. »</em> <span class="ref">Luc 22:35</span> Tant qu'il était avec eux, ils vivaient sous sa garde, et le monde ne s'était pas encore dressé contre eux.</p>

      <p>Les Apôtres, eux, entendent la lettre et présentent ce qu'ils ont : <em>« Seigneur, voici deux épées. Il leur dit : Cela suffit. »</em> <span class="ref">Luc 22:38</span> Deux épées pour douze hommes ne suffisent à aucun combat ; si le Christ avait voulu les armer, deux lames seraient dérisoires. Son « cela suffit » ne compte pas des armes : il clôt l'échange, devant des disciples qui l'ont pris au pied de la lettre.</p>
      <h2>Range ton épée</h2>
      <p>La nuit même donne le sens du mot. À peine le Christ arrêté, Pierre tire l'épée et tranche l'oreille d'un serviteur du grand prêtre. Le Christ l'arrête net : <em>« Remets ton épée à sa place, car tous ceux qui prendront l'épée périront par l'épée. »</em> <span class="ref">Matthieu 26:52</span> Il guérit aussitôt l'homme blessé, défaisant le coup porté en son nom. Et il montre qu'aucune épée ne le défend : <em>« Penses-tu que je ne puisse pas prier mon Père, qui me donnerait à l'instant plus de douze légions d'anges ? »</em> <span class="ref">Matthieu 26:53</span> Celui qui dispose des armées du ciel n'a pas besoin de deux lames. S'il se laisse prendre, c'est qu'il accepte la coupe : <em>« Ne boirai-je pas la coupe que le Père m'a donnée ? »</em> <span class="ref">Jean 18:11</span></p>
      <h2>L'épée du disciple</h2>
      <p>L'épée que le Christ demande n'arme aucune violence : elle marque l'entrée dans le temps où les siens affronteront un monde hostile. Le disciple n'en tire pas le droit de frapper, mais l'appel à la vigilance et à la fermeté dans l'épreuve. L'unique épée remise au disciple, l'Écriture la nomme : <em>« Prenez l'épée de l'Esprit, qui est la parole de Dieu. »</em> <span class="ref">Éphésiens 6:17</span></p>

    id: "tendre-l-autre-joue",
    titre: "Tendre l'autre joue, le manteau et le mille",
    theme: "ecriture",
    resume: "Par cette parole du Sermon sur la montagne, le Christ appelle à renoncer à la vengeance personnelle et à vaincre le mal par le bien.",
    date: "2026",
    contenu: `
      <p>« Tendre l'autre joue » appartient au Sermon sur la montagne, où le Christ reprend la loi ancienne pour la porter à son accomplissement. Par cette parole, il appelle à renoncer à la vengeance personnelle et à vaincre le mal par le bien.</p>
      <h2>Œil pour œil</h2>
      <p>La parole part de la loi ancienne, que le Christ cite avant de la porter plus loin : <em>« Vous avez appris qu'il a été dit : Œil pour œil, dent pour dent. Et moi, je vous dis de ne pas résister au méchant ; si quelqu'un te frappe sur la joue droite, présente-lui aussi l'autre. »</em> <span class="ref">Matthieu 5:38-39</span> La règle d'origine venait de Moïse : <em>« Œil pour œil, dent pour dent. »</em> <span class="ref">Exode 21:24</span> On l'entend d'ordinaire comme une loi dure, assoiffée de représailles. Elle était une mesure de modération : dans un monde où l'on tuait pour une offense, elle interdisait que la peine dépasse le tort, un œil pour un œil et rien de plus. Le talion bridait la vengeance en la rendant proportionnée. Là où la loi limitait la riposte, le Christ demande d'y renoncer.</p>
      <h2>La joue droite</h2>
      <p>Le détail de la joue droite précise le sens. Quand deux hommes se font face, une gifle de la main droite, donnée à pleine paume, tombe sur la joue gauche de l'autre ; pour atteindre sa joue droite, il faut le frapper du revers de la main. Ce coup du revers était le geste du mépris, la main qu'un maître levait sur un serviteur : une insulte, plus qu'un coup pour blesser. La parole vise donc l'affront et l'humiliation, là où l'atteinte touche l'honneur plus que le corps.</p>
      <p>Tendre l'autre joue, c'est présenter la gauche : s'offrir à un second coup au lieu de rendre le premier. Le disciple se montre prêt à subir l'affront une fois de plus plutôt que de le retourner. Là est le but : ne pas entrer dans l'engrenage de l'offense. Celui qui rend l'insulte reçue relance la querelle et se laisse mener par celui qui l'a frappé ; celui qui tend l'autre joue interrompt cette chaîne et reste libre, maître de sa réponse au lieu d'obéir à son agresseur.</p>
      <h2>Le sens de la parole</h2>
      <p>Cette parole atteint d'abord le cœur. Elle demande au disciple de renoncer à se venger, d'accepter de souffrir un tort plutôt que de le rendre, de ne pas se faire justice à soi-même. Elle ne supprime pas pour autant la justice : l'autorité garde le devoir de punir le crime et de protéger l'innocent, et nul n'est tenu de livrer un faible aux coups d'un violent au nom de la douceur. Tendre l'autre joue engage la manière dont on répond à l'offense reçue en sa propre personne, non l'abandon de ceux qu'on a charge de défendre.</p>
      <h2>L'exemple du Christ</h2>
      <p>Le Christ lui-même montre comment l'entendre. À son procès, lorsqu'un garde le frappe au visage, il ne se tait pas et ne tend pas l'autre joue à la lettre, mais répond avec dignité : <em>« Si j'ai mal parlé, montre ce que j'ai dit de mal ; mais si j'ai bien parlé, pourquoi me frappes-tu ? »</em> <span class="ref">Jean 18:23</span> Il ne rend pas le coup, et il expose l'injustice au lieu de la venger : sa question place le garde devant son geste et le force à le justifier, ce qu'il ne peut. Mise en pleine lumière, la violence perd toute apparence de droit. L'Écriture dira de lui qu'insulté, il ne rendait pas l'insulte : <em>« Maltraité, il ne menaçait pas, mais s'en remettait à celui qui juge avec justice. »</em> <span class="ref">1 Pierre 2:23</span></p>
      <h2>Laisser à Dieu la vengeance</h2>
      <p>Renoncer à se venger ne livre pas le tort à l'oubli : le disciple le remet à Dieu, seul juge assez juste pour le redresser. <em>« Ne vous vengez pas vous-mêmes ; il est écrit : À moi la vengeance, c'est moi qui rétribuerai, dit le Seigneur. »</em> <span class="ref">Romains 12:19</span> Le disciple ne se résigne pas au mal, il le combat par les armes opposées : <em>« Ne te laisse pas vaincre par le mal, mais sois vainqueur du mal par le bien. »</em> <span class="ref">Romains 12:21</span> Le bien opposé au mal brise la chaîne que la vengeance entretiendrait.</p>
      <h2>Le manteau et le mille</h2>
      <p>La même parole s'étend aussitôt aux biens. <em>« Si quelqu'un veut te faire un procès et prendre ta tunique, laisse-lui encore ton manteau. »</em> <span class="ref">Matthieu 5:40</span> La tunique est le vêtement de dessous ; le manteau, la grande pièce de dessus, plus précieuse, que la Loi protégeait. <em>« Si tu prends en gage le manteau de ton prochain, tu le lui rendras avant le coucher du soleil ; c'est sa seule couverture. »</em> <span class="ref">Exode 22:25-26</span></p>
      <p>La parole passe ensuite à la contrainte. <em>« Si quelqu'un te force à faire un mille, fais-en deux avec lui. »</em> <span class="ref">Matthieu 5:41</span> Le verbe grec employé ici, <em>angareuō</em> (ἀγγαρεύω), désigne la réquisition de l'occupant : un soldat romain pouvait contraindre un habitant à porter sa charge sur une distance fixée, un mille (environ 1,5 km). Ce verbe reparaît à la Passion, pour Simon de Cyrène. <em>« Ils réquisitionnèrent un homme de Cyrène, nommé Simon, pour porter la croix de Jésus. »</em> <span class="ref">Matthieu 27:32</span></p>
      <p>Ces commandements demandent une bienveillance gratuite envers celui qui nous a fait du tort. Reçue là où l'on attendait la riposte, cette bonté peut toucher le cœur de l'offenseur, le porter à se remettre en question, lui laisser entrevoir Dieu, qui en est la source, et ouvre une porte à la conversion. <em>« Si ton ennemi a faim, donne-lui du pain à manger ; s'il a soif, donne-lui de l'eau à boire : tu amasseras des charbons ardents sur sa tête. »</em> <span class="ref">Proverbes 25:21-22</span></p>
      <h2>Pour être fils du Père</h2>
      <p>Le terme de ces paroles est la ressemblance avec Dieu. Quelques lignes plus loin, le Christ élargit le commandement jusqu'à l'ennemi : <em>« Aimez vos ennemis, priez pour ceux qui vous persécutent. »</em> <span class="ref">Matthieu 5:44</span> Et il en donne la raison : agir ainsi rend semblable au Père, dont la bonté ne dépend pas du mérite. <em>« Afin que vous soyez les fils de votre Père qui est dans les cieux, car il fait lever son soleil sur les méchants et sur les bons. »</em> <span class="ref">Matthieu 5:45</span> Celui qui ne rend pas le mal imite la patience de Dieu envers les pécheurs, et s'approche de la mesure qu'il leur propose : <em>« Soyez parfaits comme votre Père céleste est parfait. »</em> <span class="ref">Matthieu 5:48</span></p>

    contenu: `
      <p>Élie est le grand prophète du royaume du Nord, au temps où le roi Achab et la reine Jézabel ont entraîné Israël à servir Baal. Son nom même, en hébreu <em>Eliyahu</em> (<span dir="rtl">אֵלִיָּהוּ</span>), signifie « le Seigneur est mon Dieu », et dément à lui seul le faux dieu qu'on adore alors. Sur le mont Carmel, Élie vient de l'emporter avec éclat : il a défié seul les prophètes de Baal, et le feu du Seigneur est tombé du ciel sur son sacrifice, devant tout le peuple. <em>« Le feu du Seigneur tomba et dévora l'holocauste ; à cette vue, tout le peuple tomba la face contre terre et dit : C'est le Seigneur qui est Dieu ! »</em> <span class="ref">1 Rois 18:38-39</span> Mais Jézabel jure sa mort. Le prophète qui avait tenu tête à tout un royaume prend peur et s'enfuit au désert. C'est là, puis sur la montagne de Dieu, que se joue la scène.</p>
      <h2>Sous le genêt</h2>
      <p>Au désert, Élie s'assied sous un genêt et demande à mourir : <em>« C'en est assez ! Maintenant, Seigneur, prends ma vie, car je ne suis pas meilleur que mes pères. »</em> <span class="ref">1 Rois 19:4</span> Cet effondrement survient juste après la plus grande victoire de sa vie : il vient de voir le feu tomber du ciel, le peuple crier que le Seigneur est Dieu, les prophètes de Baal mis à mort. Un homme qui a obtenu cela ne devrait pas trembler devant la menace d'une femme. S'il s'effondre, c'est qu'une attente s'écroule : il avait cru le Carmel décisif, espéré que cette démonstration briserait la maison d'Achab et ramènerait Israël. La menace de Jézabel lui apprend que rien n'a changé, que la reine règne toujours et que la réforme est déjà morte ; en se disant pas meilleur que ses pères, il se range parmi les prophètes qui ont frappé avant lui sans rien obtenir de durable. Sa peur ne porte pas d'abord sur sa vie : c'est sa cause qu'il croit perdue. Dieu ne lui adresse pourtant aucun reproche. Il l'endort, puis envoie un ange qui le touche et lui donne à manger : <em>« Lève-toi, mange. »</em> <span class="ref">1 Rois 19:5</span> Avant de parler à son cœur, Dieu relève son corps.</p>
      <h2>Le pain du voyage</h2>
      <p>L'ange revient une seconde fois, le touche encore et lui découvre le sens de cette nourriture : <em>« Lève-toi, mange, car le chemin est trop long pour toi. »</em> <span class="ref">1 Rois 19:7</span> Élie se lève et part : <em>« Il marcha, soutenu par cette nourriture, quarante jours et quarante nuits jusqu'à l'Horeb. »</em> <span class="ref">1 Rois 19:8</span> Un pain donné par le ciel porte un homme bien au-delà de ce qu'aucune nourriture ne peut faire, et le mène jusqu'à la montagne où Dieu se laisse trouver. L'Église y reconnaît la figure de l'Eucharistie, le pain qui nourrit l'âme et lui donne de tenir tout le long du chemin vers Dieu.</p>
      <h2>La montagne</h2>
      <p>L'Horeb est la montagne de l'Alliance, celle où Dieu avait donné sa loi à Moïse. En y montant après quarante jours de marche, comme Moïse y était demeuré quarante jours, Élie remonte à la source. Il entre dans une caverne, et la parole de Dieu lui est adressée : <em>« Que fais-tu ici, Élie ? »</em> <span class="ref">1 Rois 19:9</span> La question ne cherche pas un renseignement : elle invite le prophète à dire ce qui l'habite. Élie répond par sa plainte, son zèle pour le Seigneur, sa solitude, sa vie menacée : <em>« Je suis resté, moi seul, et ils cherchent à m'ôter la vie. »</em> <span class="ref">1 Rois 19:10</span></p>
      <h2>La voix de fin silence</h2>
      <p>Dieu fait sortir Élie et lui ordonne de se tenir sur la montagne, car il va passer. Trois forces se déchaînent alors, et dans aucune Dieu ne se trouve. Un vent violent déchire les montagnes et brise les rochers : <em>« Le Seigneur n'était pas dans le vent. »</em> Puis un tremblement de terre, puis un feu, et chaque fois la même parole : <em>« Le Seigneur n'était pas dans le tremblement de terre, ni dans le feu. »</em> <span class="ref">1 Rois 19:11-12</span> Vient enfin tout autre chose : <em>« Après le feu, le murmure d'une brise légère. »</em> <span class="ref">1 Rois 19:12</span> L'hébreu dit <em>qol demamah daqqah</em> (<span dir="rtl">קוֹל דְּמָמָה דַקָּה</span>), une voix de fin silence, le son ténu d'un calme presque sans bruit. C'est là que Dieu se tient.</p>
      <p>Le vent, le séisme et le feu sont les grandes forces par lesquelles on attend Dieu, celles qui dans l'Écriture escortent ses manifestations. En les laissant passer sans s'y trouver, il détrompe le prophète sur la manière dont il se donne. Sur le Carmel, Élie l'avait vu répondre par le feu, dans l'éclat et la puissance, et c'est encore un Dieu de feu qu'il attend ; lui-même est un prophète de feu, plein d'un zèle ardent. Or celui qui s'approche se tient dans la brise ténue, dans la douceur et le silence. Sa présence la plus intime ne se trouve pas dans le fracas qui terrifie, mais dans le souffle léger que l'on ne perçoit qu'en faisant taire tout bruit. Qui cherche Dieu dans le tumulte passe à côté de lui ; c'est au-dedans, dans le silence, qu'il se laisse rejoindre. Cette douceur où Dieu se révèle annonce de loin celle du Christ : <em>« Apprenez de moi que je suis doux et humble de cœur. »</em> <span class="ref">Matthieu 11:29</span></p>
      <p>À ce souffle, Élie se voile le visage : <em>« Élie s'enveloppa le visage de son manteau. »</em> <span class="ref">1 Rois 19:13</span> Le geste reconnaît la présence de Dieu, devant qui l'homme ne peut garder les yeux ouverts.</p>
      <h2>Sept mille</h2>
      <p>La même question revient, <em>« Que fais-tu ici, Élie ? »</em>, et le prophète redit sa plainte, mot pour mot. Toute cette plainte tenait dans un mot, répété deux fois : il est resté seul. C'est sur cette conviction que reposait son désir de mourir sous le genêt : s'il est le dernier fidèle et qu'on le traque, tout est perdu et lui avec. Dieu défait cette certitude d'une phrase : <em>« Je me réserverai en Israël sept mille hommes, tous ceux dont les genoux n'ont pas fléchi devant Baal. »</em> <span class="ref">1 Rois 19:18</span> Élie se croyait seul ; ils sont sept mille. Le prophète lisait sa situation à l'envers : là où il ne voyait que défaite et abandon, Dieu gardait en secret tout un peuple resté fidèle. La cause de Dieu ne tient jamais à un seul homme, et son œuvre ne s'éteint pas quand celui qui la porte se croit fini. Relevé de sa solitude, Élie est renvoyé vers les hommes : Dieu lui confie d'oindre des rois et de se donner un successeur, Élisée, qui prophétisera après lui. <em>« Tu oindras Hazaël comme roi sur la Syrie, et Élisée comme prophète à ta place. »</em> <span class="ref">1 Rois 19:15-16</span></p>
      <p>Plus tard, sur une autre montagne, Élie se tiendra de nouveau devant Dieu : auprès de Moïse, il apparaîtra dans la gloire et s'entretiendra avec le Christ transfiguré. <em>« Et voici que Moïse et Élie leur apparurent, s'entretenant avec lui. »</em> <span class="ref">Matthieu 17:3</span> Celui qui avait cherché Dieu dans le murmure de l'Horeb le contemple alors face à face dans le Fils.</p>

      <p>Jacob revient dans son pays après vingt ans passés loin de chez lui, chez son oncle Laban. Le retour l'angoisse, car il doit y retrouver Ésaü, le frère jumeau qu'il avait autrefois dépouillé : il lui avait pris son droit d'aînesse, puis, par une tromperie, la bénédiction que leur père Isaac lui réservait. La veille de leurs retrouvailles, Jacob fait passer un torrent, le Yabboq, à ses femmes, ses enfants et ses troupeaux, puis demeure seul sur l'autre rive. C'est là, dans la nuit, qu'un homme l'attaque et lutte avec lui jusqu'à l'aube.</p>
      <h2>Le combat</h2>
      <p>Tout commence par l'identité de celui qui engage le combat. Le récit l'appelle un homme, et Jacob dira au matin avoir vu Dieu. Celui qui l'attaque est <a href="#/article/l-ange-du-seigneur">l'ange du Seigneur</a>. Osée le nomme ainsi : <em>« Il lutta avec l'ange et l'emporta. »</em> <span class="ref">Osée 12:5</span> L'ange du Seigneur lutte avec Jacob toute la nuit : <em>« Jacob étant resté seul, un homme lutta avec lui jusqu'au lever de l'aurore. »</em> <span class="ref">Genèse 32:25</span> Or il ne parvient pas à le vaincre. Que Dieu ne puisse pas l'emporter sur un homme dit assez qu'il se retient : il agit comme un père qui lutte avec son enfant et fait exprès de le laisser gagner, retenant sa force pour que Jacob tienne bon et s'engage tout entier. Puis, d'un seul geste, il lui touche la hanche et la déboîte. L'unique coup qu'il porte atteint le point d'appui du corps, là où l'homme prend sa force pour marcher et pour lutter. Jacob continue pourtant de tenir, et lorsque le jour menace de paraître, il refuse de laisser partir celui qu'il a saisi : <em>« Je ne te laisserai point aller que tu ne m'aies béni. »</em> <span class="ref">Genèse 32:27</span> Cet homme qui avait pris la bénédiction de son père par la ruse ne la dérobe plus : il la réclame en face, et s'y agrippe.</p>
      <h2>Le nom</h2>
      <p>Au cœur du combat se joue une transformation, et elle passe par le nom. Avant de bénir Jacob, l'ange du Seigneur lui demande quel est son nom, et Jacob répond : <em>« Jacob. »</em> <span class="ref">Genèse 32:28</span> Dieu connaît ce nom ; s'il le lui fait dire, c'est pour que Jacob avoue qui il est. Car ce nom le résume : Jacob, en hébreu <em>Ya'aqob</em> (<span dir="rtl">יַעֲקֹב</span>), est bâti sur le mot <em>'aqeb</em> (<span dir="rtl">עָקֵב</span>), le talon, et désigne celui qui talonne, qui supplante, qui prend la place d'un autre. À sa naissance déjà, il tenait le talon de son frère jumeau ; toute sa vie ensuite, il a vécu de ruse. En prononçant son nom, il reconnaît ce qu'il a été. C'est alors seulement que Dieu lui en donne un autre : <em>« Tu ne seras plus appelé Jacob, mais Israël, car tu as lutté avec Dieu et avec les hommes, et tu as vaincu. »</em> <span class="ref">Genèse 32:29</span> Israël, en hébreu <em>Yisra'el</em> (<span dir="rtl">יִשְׂרָאֵל</span>), signifie celui qui lutte avec Dieu, ou celui que Dieu fortifie. L'homme qui se définissait par ses combats rusés contre les hommes se définit désormais par sa lutte avec Dieu. Et ce nom n'est pas seulement le sien : en renommant Jacob, Dieu fait plus que transformer un homme, il pose le commencement d'Israël, le peuple tout entier qui portera ce nom.</p>
      <h2>La blessure</h2>
      <p>La hanche est l'appui du corps, le point où l'homme tient debout et trouve sa force. En la déboîtant, Dieu brise cet appui et, avec lui, l'orgueil et la nature charnelle de Jacob. L'ancien Jacob est ainsi humilié pour laisser place à l'homme nouveau, soumis à Dieu et appuyé sur lui seul. <em>« Vous avez dépouillé le vieil homme avec ses œuvres, et revêtu l'homme nouveau. »</em> <span class="ref">Colossiens 3:9-10</span></p>
      <h2>Face de Dieu</h2>
      <p>Quand l'aube se lève, l'adversaire demande à partir. Jacob veut savoir son nom, mais l'ange du Seigneur le bénit sans le lui dire, et s'efface. Jacob comprend alors avec qui il a lutté toute la nuit, et il donne au lieu le nom de <em>Penuel</em> (<span dir="rtl">פְּנוּאֵל</span>), qui signifie Face de Dieu : <em>« J'ai vu Dieu face à face, et ma vie a été sauvée. »</em> <span class="ref">Genèse 32:31</span> Ce dernier mot révèle l'enjeu de la scène. Dans l'Écriture, voir Dieu en face passe pour mortel, car nul ne peut soutenir sa présence. Jacob, lui, en sort vivant : ce Dieu vient pour bénir, et sa face, qui devrait foudroyer, le laisse en vie.</p>
      <p>Le lendemain, pour aller au-devant d'Ésaü qu'il redoutait, Jacob passe en tête, le premier devant les siens, lui qui s'était tenu en arrière toute la veille. <em>« Lui-même passa devant eux. »</em> <span class="ref">Genèse 33:3</span></p>

      <p>Le sacerdoce est la fonction du prêtre. Le prêtre se tient entre Dieu et les hommes : il porte à Dieu, au nom des hommes, l'offrande et la prière, et il fait passer aux hommes ce que Dieu donne, son pardon et sa bénédiction. Le mot vient du latin <em>sacerdos</em>, lié au sacré : celui qui accomplit les choses saintes.</p>
      <h2>Le prêtre, un médiateur</h2>
      <p>L'Écriture définit le prêtre d'une phrase : <em>« Tout grand prêtre, pris parmi les hommes, est établi en faveur des hommes dans leurs rapports avec Dieu, afin d'offrir des dons et des sacrifices pour les péchés. »</em> <span class="ref">Hébreux 5:1</span> Chaque mot éclaire. Le prêtre est pris parmi les hommes : il est l'un d'eux. Il est établi en leur faveur : à leur service. Son domaine est leurs rapports avec Dieu, le culte. Et sa tâche propre est d'offrir le sacrifice, l'offrande présentée à Dieu, le don d'une chose précieuse, souvent une victime, pour l'adorer et obtenir le pardon. Le prêtre est ainsi un médiateur : celui qui relie deux bords, Dieu et son peuple.</p>
      <h2>Du temple à la Croix</h2>
      <p>Dans l'Ancienne Alliance, Dieu établit des prêtres, choisis dans le peuple d'Israël, pour offrir au temple, au nom de tous, des sacrifices d'animaux sans cesse répétés. Ces offrandes préparaient et annonçaient, sans pouvoir ôter le péché : <em>« Il est impossible que le sang des taureaux et des boucs ôte les péchés. »</em> <span class="ref">Hébreux 10:4</span> Le Christ est venu accomplir le sacerdoce. Il s'est fait à la fois prêtre et victime : sur la Croix, il offre à son Père, une fois pour toutes, le seul sacrifice qui sauve, le don de sa propre vie : <em>« Nous sommes sanctifiés par l'offrande du corps de Jésus-Christ, une fois pour toutes. »</em> <span class="ref">Hébreux 10:10</span></p>
      <h2>Selon l'ordre de Melchisédech</h2>
      <p>Ce sacerdoce du Christ ne finit pas, annoncé de loin par une figure de la Genèse, Melchisédech : <em>« Melchisédech, roi de Salem, fit apporter du pain et du vin ; il était prêtre du Dieu très-haut, et il bénit Abram. »</em> <span class="ref">Genèse 14:18-19</span> Le récit ne dit rien de ses parents, de sa naissance ni de sa mort : il surgit sans origine et s'efface sans fin. Cette absence même en fait l'image du Prêtre éternel, dont le sacerdoce n'a ni commencement ni terme ; et le pain et le vin qu'il présente annoncent l'offrande de l'Eucharistie. C'est pourquoi l'Écriture salue le Christ de ce titre : <em>« Tu es prêtre pour toujours selon l'ordre de Melchisédech. »</em> <span class="ref">Hébreux 5:6</span></p>
      <h2>Le sacerdoce partagé</h2>
      <p>De cet unique sacerdoce du Christ découle tout sacerdoce chrétien. Par le baptême, tous les fidèles reçoivent un sacerdoce : ils peuvent offrir à Dieu leur vie entière, leur travail, leurs joies et leurs peines, comme une offrande spirituelle. C'est le sacerdoce commun de tous les baptisés : <em>« Vous êtes une race choisie, un sacerdoce royal. »</em> <span class="ref">1 Pierre 2:9</span> Au sein de ce peuple, le Christ en appelle certains à un sacerdoce particulier : par l'ordination, le prêtre reçoit d'agir au nom du Christ lui-même et de rendre présent, dans l'eucharistie, son unique sacrifice. C'est le sacerdoce ministériel, donné pour servir le sacerdoce commun.</p>
      <h2>Une seule réalité</h2>
      <p>Le mot « sacerdoce » recouvre ainsi une seule réalité, partagée à plusieurs degrés : le Christ, unique Prêtre qui s'est offert lui-même ; les baptisés, qui offrent leur vie ; les ordonnés, qui rendent présent son sacrifice. Tout remonte au Christ, l'unique médiateur : <em>« Il y a un seul médiateur entre Dieu et les hommes, le Christ Jésus. »</em> <span class="ref">1 Timothée 2:5</span></p>

      <p>Le sacerdoce réservé aux hommes dit ainsi le Christ-Époux qui se donne pour son Église.</p>

      <h2>Le calme et l'instruction</h2>
      <p>Timothée veille sur l'Église d'Éphèse, troublée par de faux docteurs qui répandent des doctrines fausses et égarent des fidèles mal affermis. C'est dans ce désordre qu'est écrite la lettre. Sa première parole sur les femmes est une invitation à recevoir l'instruction : <em>« Que la femme reçoive l'instruction en silence, en toute soumission. »</em> <span class="ref">1 Timothée 2:11</span> Le mot grec rendu par « silence », <em>hésychia</em> (ἡσυχία), désigne le calme, la tranquillité. Le texte demande donc une attitude d'écoute et d'ordre, et non un mutisme. Avant d'enseigner, il faut d'abord être instruit ; à Éphèse, des femmes gagnées par l'erreur voulaient enseigner sans l'être encore.</p>

      <p>Dans la première lettre aux Corinthiens, il est demandé que, dans l'assemblée en prière, la femme ait la tête voilée et l'homme la tête découverte, avec un appel à la longueur des cheveux. Ces signes appartenaient aux usages d'un temps, où ils disaient la dignité de la femme et l'ordre reçu de Dieu.</p>
      <h2>Le voile et la tête rasée</h2>
      <p>À Corinthe, le voile était le signe de la femme honorable. Une femme respectée se couvrait la tête en public ; paraître dévoilée dans l'assemblée la rangeait, aux yeux de tous, du côté des femmes de mauvaise réputation. La tête rasée, elle, était une marque d'infamie : on rasait les esclaves, et la tonte signait le déshonneur de la femme adultère.</p>
      <p>C'est sur cet usage que repose le raisonnement de la lettre. Il prend la femme au mot. Si elle fait si peu de cas de son honneur en écartant le voile, qu'elle aille jusqu'au bout et se fasse tondre, mais puisqu'elle aurait honte d'être tondue, qu'elle garde plutôt son voile : <em>« Si une femme ne se voile pas, qu'elle se tonde ; mais s'il est honteux pour une femme d'être tondue ou rasée, qu'elle se voile. »</em> <span class="ref">1 Corinthiens 11:6</span> Le voile demandé est donc un signe de dignité, celui-là même qui distinguait la femme honorable.</p>
      <p>Le texte appuie enfin ce signe sur la nature elle-même, qui sépare déjà l'homme et la femme jusque dans la chevelure : <em>« La nature ne vous enseigne-t-elle pas que c'est une honte pour l'homme de porter les cheveux longs, mais que c'est une gloire pour la femme, parce que la chevelure lui a été donnée comme voile ? »</em> <span class="ref">1 Corinthiens 11:14-15</span> Les cheveux longs sont la parure de la femme et son voile naturel ; pour l'homme, ils passaient pour un déshonneur. Puisque la nature voile déjà la femme de sa chevelure, le voile qu'elle porte dans le culte prolonge ce signe.</p>
      <h2>L'image et la gloire</h2>
      <p>L'usage reçoit un fondement plus profond, pris dans la création : <em>« Le chef de tout homme, c'est le Christ ; le chef de la femme, c'est l'homme ; et le chef du Christ, c'est Dieu. »</em> <span class="ref">1 Corinthiens 11:3</span> Le mot grec rendu ici par « chef », <em>kephalē</em> (κεφαλή), désigne la tête, et par là la source : comme la source d'un fleuve, il dit l'origine. L'homme est l'origine de la femme, parce qu'au commencement Ève fut tirée d'Adam. Cet ordre laisse intacte l'égale dignité des deux, car le texte l'applique aussi à Dieu : le chef du Christ, c'est Dieu, le Fils recevant du Père son origine éternelle tout en lui étant égal.</p>
      <p>De là vient la parole sur la gloire : <em>« L'homme ne doit pas se couvrir la tête, parce qu'il est l'image et la gloire de Dieu ; la femme est la gloire de l'homme. »</em> <span class="ref">1 Corinthiens 11:7</span> « Gloire » désigne ici ce qui manifeste et fait rayonner : l'homme, créé à l'image de Dieu, manifeste Dieu ; la femme, tirée de l'homme, manifeste l'homme. Dans l'assemblée tournée vers Dieu, l'homme prie tête nue, parce qu'il porte directement l'image de Dieu ; la femme voile la gloire humaine dont elle est le rayonnement, afin que seule paraisse, dans la prière, la gloire de Dieu. Le voile dit cet effacement de tout éclat humain devant le Créateur.</p>
      <p>Le texte équilibre aussitôt par une parole de réciprocité : <em>« Dans le Seigneur, la femme n'est pas sans l'homme, ni l'homme sans la femme ; comme la femme a été tirée de l'homme, ainsi l'homme naît par la femme, et tout vient de Dieu. »</em> <span class="ref">1 Corinthiens 11:11-12</span> L'un est l'origine de l'autre tour à tour, et tous deux sont également faits à l'image de Dieu.</p>
      <h2>Un signe d'autorité, devant les anges</h2>
      <p>Le texte nomme enfin le voile d'un mot surprenant : <em>« La femme doit avoir sur la tête une marque d'autorité, à cause des anges. »</em> <span class="ref">1 Corinthiens 11:10</span> Le mot grec rendu ici par « marque d'autorité », <em>exousia</em> (ἐξουσία), dit le pouvoir : littéralement, la femme porte une autorité sur la tête. Cette autorité est la sienne : le voile est le signe du pouvoir qui lui est reconnu de prier et de prophétiser dans l'assemblée. Le texte l'a rappelé plus haut : la femme y prie et y prophétise ; le voile marque sa dignité de participante au culte, celle qui se tient et prend la parole devant Dieu au milieu de tous.</p>
      <p>Reste le motif le plus énigmatique : à cause des anges. Les anges assistent à la prière de l'Église, où la liturgie de la terre rejoint celle du ciel. Gardiens de l'ordre que Dieu a établi dans sa création, ils sont les témoins de l'assemblée en prière, et devant eux la tenue du culte honore cet ordre : ce que les hommes font dans la prière se déroule sous le regard du ciel.</p>
      <h2>Le principe et la coutume</h2>
      <p>Ces signes éclairés, on peut distinguer ce qui demeure de ce qui passe. La forme concrète, le voile, la tête couverte ou nue, la longueur des cheveux, tenait aux usages d'un temps et d'un lieu : elle disait alors la dignité, la pudeur et l'ordre reçu de Dieu. Ces usages ont changé, et l'Église n'impose plus le voile comme une loi. Le texte lui-même n'en faisait pas une règle absolue : <em>« Si quelqu'un se plaît à contester, nous n'avons pas cette habitude, ni les Églises de Dieu. »</em> <span class="ref">1 Corinthiens 11:16</span></p>
      <p>Ce que le passage demande de garder traverse les siècles : honorer Dieu jusque dans le corps et la tenue, recevoir la différence de l'homme et de la femme comme un don du Créateur, et les tenir ensemble tournés vers le Christ, en qui <em>« il n'y a plus ni homme ni femme, car vous êtes tous un. »</em> <span class="ref">Galates 3:28</span></p>
