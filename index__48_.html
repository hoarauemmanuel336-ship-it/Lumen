      <p>Le péché est un refus libre de l'amour de Dieu. Il consiste à préférer sa propre volonté à la volonté divine et à transgresser la loi de Dieu, qui exprime cet amour : <em>« Le péché est la transgression de la loi. »</em> <span class="ref">1 Jean 3:4</span> Tout péché comporte ainsi un double mouvement : l'homme se tourne vers un bien moindre et s'éloigne de Dieu, qui est sa fin et son bien. Il se commet en pensée, en parole, par action, et par omission : <em>« Celui qui sait faire le bien et ne le fait pas commet un péché. »</em> <span class="ref">Jacques 4:17</span></p>
      <h2>Originel et personnel</h2>
      <p>Un même mot recouvre deux réalités. Le péché originel est l'état de privation dans lequel tout homme naît, hérité de la faute des origines. Le péché personnel est l'acte que chacun commet par sa propre volonté, une fois venu l'âge de raison. Tous y sont exposés : <em>« Tous ont péché et sont privés de la gloire de Dieu. »</em> <span class="ref">Romains 3:23</span></p>
      <h2>Le péché mortel</h2>
      <p>Les péchés personnels ne pèsent pas tous le même poids, et l'Écriture le marque elle-même : <em>« Il y a tel péché qui mène à la mort, et il y a tel péché qui ne mène pas à la mort. »</em> <span class="ref">1 Jean 5:16-17</span> Le plus grave, le péché mortel, rompt l'amitié avec Dieu et fait perdre la grâce sanctifiante, cette vie divine déposée dans l'âme. Trois conditions, réunies ensemble, le constituent. Il faut d'abord une matière grave, un acte qui contredit gravement la loi de Dieu, comme la transgression des grands commandements du Décalogue : le meurtre, l'adultère, le vol important, le faux témoignage, le mépris de Dieu. Il faut ensuite la pleine conscience de cette gravité, savoir que l'on fait un mal sérieux. Il faut enfin le plein consentement, le vouloir librement, sans y être contraint. Que l'une de ces conditions manque, et la faute n'atteint plus ce degré : une ignorance qu'on ne pouvait surmonter, une liberté entamée par la peur ou la passion en allègent le poids. Là où les trois se rejoignent, le péché donne la mort à l'âme, qui perd la charité et la vie de la grâce : <em>« Le salaire du péché, c'est la mort. »</em> <span class="ref">Romains 6:23</span> L'homme demeure coupé de sa fin ; et cette rupture, persévérée sans repentir, devient la séparation éternelle d'avec Dieu.</p>
      <h2>Le péché véniel</h2>
      <p>Le péché véniel blesse la charité sans la détruire : l'amitié avec Dieu demeure, affaiblie. Même le juste y tombe : <em>« Nous bronchons tous, et de bien des manières. »</em> <span class="ref">Jacques 3:2</span> Sa matière est légère, ou bien la conscience ou le consentement n'y sont que partiels. Répété et consenti, il refroidit l'amour et dispose peu à peu au péché grave ; il laisse aussi dans l'âme une dette à purifier, que le purgatoire achève d'acquitter.</p>
      <h2>Sa racine</h2>
      <p>Toute faute naît d'un même mouvement : se préférer à Dieu. C'est du cœur qu'elle monte : <em>« Du cœur viennent les mauvaises pensées, meurtres, adultères, débauches, vols, faux témoignages, blasphèmes. »</em> <span class="ref">Matthieu 15:19</span> Au plus profond se tient l'orgueil, qui place le moi au centre et d'où sortent les autres péchés. De lui naissent trois convoitises, où l'homme cherche hors de Dieu ce que Dieu seul donne : <em>« la convoitise de la chair, la convoitise des yeux et l'orgueil de la vie. »</em> <span class="ref">1 Jean 2:16</span> De ces convoitises montent les sept penchants qu'on nomme capitaux, parce qu'ils sont les têtes d'où jaillissent les autres fautes : l'orgueil, l'avarice, l'envie, la colère, la luxure, la gourmandise et la paresse, présentés un à un dans <a href="#/article/les-peches-capitaux">l'article qui leur est consacré</a>. Le péché appauvrit ainsi l'homme, en le coupant de la source même de sa vie.</p>
      <h2>Son pardon</h2>
      <p>Dieu ne cesse d'offrir son pardon à qui revient vers lui. Le Christ a porté le péché du monde pour en délivrer les hommes, et il a confié à son Église le pouvoir de remettre les péchés : <em>« Ceux à qui vous remettrez les péchés, ils leur seront remis. »</em> <span class="ref">Jean 20:23</span> Le péché mortel se relève dans le sacrement de pénitence, qui rend à l'âme la grâce perdue et la réconcilie avec Dieu. Le péché véniel s'efface par bien des chemins : la contrition du cœur, la prière, l'aumône, les sacramentaux, et surtout l'Eucharistie, qui fortifie la charité. À celui qui reconnaît sa faute, la miséricorde est toujours promise : <em>« Si nous confessons nos péchés, il est fidèle et juste pour nous les pardonner. »</em> <span class="ref">1 Jean 1:9</span></p>
      <h2>Le péché contre l'Esprit</h2>
      <p>Une seule faute échappe au pardon, et le Christ la nomme devant les pharisiens, au moment où ils attribuent au démon ce qu'il accomplit par l'Esprit de Dieu. Venant de délivrer un possédé sous leurs yeux, il s'entend accuser de chasser les démons par leur prince. <em>« C'est par Béelzébul, le prince des démons, qu'il chasse les démons. »</em> <span class="ref">Matthieu 12:24</span> Ils ne sont pas dans l'ignorance : ils ont vu les signes se multiplier et ne peuvent honnêtement nier la force de ce qu'ils voient. Leur parti est déjà pris contre lui. <em>« Les pharisiens tinrent conseil contre lui sur les moyens de le faire périr. »</em> <span class="ref">Matthieu 12:14</span> Plutôt que de céder à l'évidence, ils prêtent au démon ce que leur conscience leur montre venir de Dieu : non une erreur, mais un refus arrêté. C'est à cela que le Christ répond. <em>« Tout péché et tout blasphème seront pardonnés aux hommes, mais le blasphème contre l'Esprit ne sera pas pardonné. »</em> <span class="ref">Matthieu 12:31</span></p>
      <p>Il distingue aussitôt deux refus. <em>« Quiconque parlera contre le Fils de l'homme, il lui sera pardonné ; mais quiconque parlera contre l'Esprit Saint, il ne lui sera pardonné ni dans ce siècle ni dans le siècle à venir. »</em> <span class="ref">Matthieu 12:32</span> Ne pas reconnaître Dieu sous les traits de cet homme peut tenir à l'ignorance, et l'ignorance s'excuse ; mais appeler diabolique l'œuvre qu'on sait divine n'est plus une méprise. C'est fermer les yeux sur la lumière reconnue, et repousser sciemment celui-là même par qui le pardon serait reçu.</p>
      <p>Le péché contre l'Esprit n'est donc pas un blasphème que Dieu refuserait d'absoudre, comme s'il rencontrait là une limite à sa miséricorde ; c'est le péché qui se ferme au pardon, en repoussant la grâce par laquelle il serait remis. La tradition y reconnaît l'endurcissement sous ses formes diverses, le désespoir qui ne croit plus au pardon, la présomption qui ne le demande plus, et surtout l'impénitence finale, le refus tenu jusqu'au bout de se convertir. Tant que ce refus dure, il barre la porte du dedans, car Dieu ne sauve personne malgré lui. Qui craint d'avoir commis ce péché ne l'a pas commis, car le désir même du pardon en est le contraire.</p>

      <p>On les appelle capitaux du mot latin <em>caput</em>, la tête : ils sont les sources d'où jaillissent les autres fautes. On les nomme ainsi pour leur fécondité, car chacun engendre une suite de péchés qui lui obéissent. L'Écriture en dresse le tableau sous le nom d'œuvres de la chair : <em>« Les œuvres de la chair sont manifestes : impudicité, idolâtrie, haines, querelles, jalousies, colères, envie, et choses semblables. »</em> <span class="ref">Galates 5:19-21</span> La tradition en a reconnu sept racines, à chacune desquelles répond la vertu qui la guérit.</p>
      <h2>L'orgueil</h2>
      <p>L'orgueil est le désir désordonné de sa propre grandeur, qui place le moi là où Dieu devrait être. Il est la tête de tous : <em>« Le commencement de l'orgueil, c'est de se détourner du Seigneur. »</em> <span class="ref">Siracide 10:12</span> De lui sortent la vaine gloire, le mépris d'autrui, la révolte contre Dieu. L'humilité le guérit, qui rend à Dieu la première place et reçoit tout de lui.</p>
      <h2>L'avarice</h2>
      <p>L'avarice est l'attachement désordonné aux richesses, où le cœur traite le bien comme une fin et s'y enchaîne. <em>« La racine de tous les maux, c'est l'amour de l'argent. »</em> <span class="ref">1 Timothée 6:10</span> Elle engendre la dureté, la fraude, l'oubli des pauvres. La générosité la guérit, qui tient les biens d'une main ouverte et les ordonne au bien.</p>
      <h2>L'envie</h2>
      <p>L'envie est la tristesse devant le bien d'autrui, ressenti comme un amoindrissement de soi. C'est elle qui a livré le Christ : <em>« il savait que c'était par envie qu'ils l'avaient livré. »</em> <span class="ref">Matthieu 27:18</span> Elle engendre la médisance, la joie du malheur d'autrui, la haine. La charité fraternelle la guérit, qui se réjouit du bien du prochain comme du sien.</p>
      <h2>La colère</h2>
      <p>La colère est le désir désordonné de la vengeance, quand le ressentiment l'emporte sur la justice. <em>« Quiconque se met en colère contre son frère en répondra au jugement. »</em> <span class="ref">Matthieu 5:22</span> Elle engendre les disputes, les injures, la violence. La douceur la guérit, qui garde la maîtrise de soi et laisse à Dieu la justice.</p>
      <h2>La luxure</h2>
      <p>La luxure est le désir désordonné des plaisirs charnels, recherchés pour eux-mêmes. <em>« Fuyez l'impudicité. Votre corps est le temple du Saint-Esprit. »</em> <span class="ref">1 Corinthiens 6:18-19</span> Elle aveugle le jugement et asservit la volonté. La chasteté la guérit, qui ordonne le désir au don de soi dans l'amour.</p>
      <h2>La gourmandise</h2>
      <p>La gourmandise est l'usage désordonné du manger et du boire, recherché sans mesure. <em>« Ne sois pas parmi les buveurs de vin, parmi ceux qui se gorgent de viande. »</em> <span class="ref">Proverbes 23:20</span> Elle alourdit l'esprit et l'enchaîne au corps. La tempérance la guérit, qui reçoit les biens du corps avec mesure et action de grâce.</p>
      <h2>La paresse</h2>
      <p>La paresse, ou acédie, est la tristesse devant le bien spirituel, le dégoût de l'effort qu'il demande. Elle refroidit la prière et fait négliger les devoirs envers Dieu. <em>« Parce que tu es tiède, je te vomirai de ma bouche. »</em> <span class="ref">Apocalypse 3:16</span> La ferveur la guérit, l'amour qui se remet à l'œuvre et persévère.</p>
      <h2>Le combat</h2>
      <p>Aucun de ces penchants n'est invincible. La grâce du Christ et la pratique des vertus contraires les désarment l'un après l'autre, car le bien chasse le mal qui s'y oppose : <em>« Ne te laisse pas vaincre par le mal, mais sois vainqueur du mal par le bien. »</em> <span class="ref">Romains 12:21</span> À mesure que grandit la charité, leurs racines se dessèchent, et l'homme retrouve la liberté des enfants de Dieu.</p>

      <p>Le péché originel est l'état de privation de la grâce sanctifiante dans lequel tout homme vient au monde. La grâce sanctifiante est la vie divine déposée dans l'âme, celle qui fait de l'homme un enfant de Dieu et son ami. Le nouveau-né en est privé dès le premier instant de son existence : il reçoit en héritage la conséquence de la faute commise aux origines de l'humanité.</p>
      <h2>L'état d'innocence</h2>
      <p>Au commencement, Dieu a élevé l'homme au-dessus de sa propre nature. Il l'a créé dans la droiture, ajusté à Dieu, à lui-même et au monde : c'est ce qu'on appelle la justice originelle, où le mot justice désigne cette harmonie, cet ajustement de l'homme à son Créateur. <em>« Dieu a fait l'homme droit, mais ils ont cherché bien des détours. »</em> <span class="ref">Ecclésiaste 7:29</span> Cette droiture tenait à deux dons que la nature humaine ne pouvait se donner.</p>

      <p>Le second est un ensemble de dons dits préternaturels, le mot signifiant au-delà de la nature : ils portaient la nature humaine au-dessus de ses forces propres, dans le corps et dans les facultés. La tradition en compte quatre. L'intégrité, la pleine soumission des passions à la raison. L'immortalité, l'exemption de la mort. L'impassibilité, l'exemption de la souffrance. Et une connaissance infuse : créés à l'âge adulte, sans enfance ni parents pour les instruire, Adam et Ève recevaient de Dieu le savoir nécessaire pour conduire leur vie et élever leur descendance. Ce dernier don seul ne se serait pas transmis, car leurs enfants, nés petits et grandissant sous leur conduite, l'auraient acquis par l'éducation ; les trois autres seraient passés à toute la descendance.</p>
      <h2>L'harmonie des passions</h2>
      <p>L'intégrité ordonnait le dedans de l'homme. Les passions sont les mouvements spontanés de l'âme devant ce qu'elle perçoit comme un bien ou un mal : le désir, la joie, la crainte, la colère. La tradition les répartit en deux registres. Les premières, dites concupiscibles, naissent devant un bien ou un mal sensible et portent vers lui ou en détournent : l'amour et la haine, le désir et l'aversion, la joie et la tristesse. Les secondes, dites irascibles, se lèvent devant un bien difficile à atteindre ou un mal difficile à éviter, et soutiennent l'effort : l'espérance et le découragement, l'audace et la crainte, la colère qui se dresse contre l'obstacle. Toutes sont des forces données à l'homme pour qu'il agisse.</p>
      <p>Dans l'état d'innocence, l'homme connaissait la faim, le désir, la crainte ; ces mouvements ne se levaient qu'au commandement de la raison et cédaient à son jugement, sans que l'esprit eût à lutter pour se faire obéir.</p>
      <p>Cet ordre descendait de Dieu. La raison gouvernait les passions parce qu'elle se tenait elle-même sous Dieu, et le corps obéissait à l'âme parce que l'âme obéissait à son Créateur. L'intégrité reposait sur cette union à Dieu, non sur une force que l'homme aurait tenue de lui-même : tant que l'âme demeurait sous Dieu, tout demeurait en ordre sous l'âme. L'Écriture en donne le signe au seuil du récit. <em>« Ils étaient tous deux nus, l'homme et sa femme, et ils n'en avaient point de honte. »</em> <span class="ref">Genèse 2:25</span> Le corps était alors transparent à l'esprit : rien en lui ne se levait que l'âme dût soumettre malgré elle.</p>
      <h2>La perte</h2>
      <p>Mis à l'épreuve de l'obéissance, Adam a préféré sa propre volonté à celle de Dieu, voulant décider seul du bien et du mal. Ce premier refus est la faute des origines. En se détournant de Dieu, il a brisé d'un seul coup les trois accords que la justice originelle tenait ensemble. L'amitié avec Dieu d'abord, perdue par celui qui se cache désormais de son ami. L'accord intérieur ensuite : la raison, en quittant Dieu, a perdu son emprise sur ce qui lui était soumis, et les passions ont échappé à son gouvernement. L'accord avec le monde enfin. <em>« Tu mangeras ton pain à la sueur de ton front, jusqu'à ce que tu retournes à la terre d'où tu as été tiré. »</em> <span class="ref">Genèse 3:19</span> La terre se fait rebelle, le travail devient peine, et la mort entre dans la condition humaine.</p>
      <h2>Un péché contracté, non commis</h2>
      <p>Cette privation reçue à la naissance porte le nom de péché, et l'Écriture parle déjà ainsi. <em>« Voici, je suis né dans la faute, et ma mère m'a conçu dans le péché. »</em> <span class="ref">Psaume 51:7</span> Le mot se dit pourtant ici par analogie. Le péché, au sens propre, est un acte mauvais que la volonté choisit librement ; le péché originel désigne un état, l'absence de la grâce sanctifiante et la séparation d'avec Dieu à la racine de l'être, alors qu'aucune faute personnelle n'a été commise. Le nouveau-né ne l'a pas commis, il le contracte : il vient au monde privé de la sainteté pour laquelle il était fait. C'est cette privation, et non un acte coupable, qui constitue proprement le péché originel, et c'est d'elle que découle tout le reste.</p>
      <h2>La transmission</h2>
      <p>Ce qu'un seul a perdu, tous l'ont perdu avec lui. Adam ne se tenait pas devant Dieu comme un individu isolé : il portait en lui la famille humaine entière, et ce qu'il avait reçu pour elle, puis perdu, il le transmet à tous, comme les membres tiennent leur vie de la tête. <em>« Par un seul homme le péché est entré dans le monde, et par le péché la mort, et la mort a passé sur tous les hommes. »</em> <span class="ref">Romains 5:12</span></p>
      <p>Cette transmission se fait par génération, non par imitation. Le péché originel ne se répand pas d'homme à homme à la manière d'un mauvais exemple que la descendance copierait : il se reçoit avec la nature elle-même, à l'instant où chacun la tient de ses parents. Tout homme reçoit d'Adam la nature humaine telle que la faute l'a laissée, privée de la grâce et inclinée au désordre. L'état le marque ainsi dès sa conception, avant tout acte et tout choix, et nul ne s'en exempte par ses propres forces.</p>
      <h2>La concupiscence</h2>
      <p>La perte de la justice originelle laisse l'homme avec une nature blessée. Ses passions n'obéissent plus spontanément à la raison : elles tirent souvent vers le mal avant même que la volonté ait choisi. Ce désordre porte le nom de concupiscence, l'inclination au mal que la faute des origines a laissée en tout homme. <em>« Je ne fais pas le bien que je veux, et je commets le mal que je ne veux pas. »</em> <span class="ref">Romains 7:19</span></p>

      <h2>Le remède</h2>
      <p>Le Christ est venu rendre ce que le premier homme avait perdu. Nouvel Adam, tête d'une humanité renouvelée, il communique la vie là où le premier avait communiqué la mort. <em>« Comme tous meurent en Adam, de même tous revivront dans le Christ. »</em> <span class="ref">1 Corinthiens 15:22</span> Ce qu'un seul avait perdu pour tous, un seul le rend à tous. <em>« Comme par la désobéissance d'un seul beaucoup ont été rendus pécheurs, par l'obéissance d'un seul beaucoup seront rendus justes. »</em> <span class="ref">Romains 5:19</span></p>
      <p>Le baptême efface le péché originel et rend à l'âme la grâce sanctifiante, l'amitié de Dieu retrouvée. Les dons préternaturels, eux, demeurent en attente : la concupiscence, la souffrance et la mort restent dans la vie du baptisé, désormais assumées dans la grâce du Christ et ordonnées à la vie éternelle. À la résurrection, la pleine harmonie sera rendue, et le corps lui-même relevé, rendu semblable au corps glorieux du Christ ressuscité. <em>« Il est semé corps animal, il ressuscite corps spirituel. »</em> <span class="ref">1 Corinthiens 15:44</span> Ce que la chute avait défait, le Christ le restaure, et le porte plus haut encore.</p>

      <p>L'homme est sauvé d'abord du péché, le mal dont tous les autres découlent. Le péché est une rupture avec Dieu : il détourne l'homme de sa fin et le prive de la vie de la grâce, qu'il ne tenait que de lui. Il enchaîne aussi celui qui le commet, le rendant esclave de ce qu'il croyait choisir librement. <em>« Quiconque commet le péché est esclave du péché. »</em> <span class="ref">Jean 8:34</span> De cette servitude, nul ne se rachète par ses propres forces.</p>

      <p>Derrière le péché et la mort se tient un ennemi personnel. Le démon a séduit l'homme dès l'origine et l'a entraîné dans la faute ; par cette chute, l'homme est passé sous son pouvoir. Sa domination s'étend aussi loin que le péché : celui qui s'y livre appartient à celui qui l'y a conduit. <em>« Celui qui commet le péché est du diable, car le diable pèche dès le commencement. »</em> <span class="ref">1 Jean 3:8</span> L'Écriture le nomme le prince de ce monde, et tient l'homme pécheur pour son captif. De ce maître, l'homme ne se délivre pas par ses propres forces ; seul un plus fort que lui pouvait l'en arracher.</p>

      <p>Sauver, dans l'Écriture, se dit d'abord racheter. Racheter, c'est payer le prix qui rend la liberté à un captif ; et l'homme était captif du péché, livré à un maître dont il ne pouvait se délier par ses seules forces. Le Christ paie ce prix en donnant sa vie. <em>« Le Fils de l'homme est venu donner sa vie en rançon pour la multitude. »</em> <span class="ref">Marc 10:45</span> Ce prix dit la valeur de ce qu'il a fallu donner pour nous arracher au mal : le sang même du Fils. <em>« Vous avez été rachetés non par des biens périssables, l'argent ou l'or, mais par le sang précieux du Christ. »</em> <span class="ref">1 Pierre 1:18-19</span> C'est ce que nomme le mot rédemption, du latin <em>redimere</em>, racheter.</p>

      <p>Le salut se reçoit en trois temps. Il est acquis une fois pour toutes à la Croix, où le Christ a tout accompli. Il se reçoit maintenant, dans la grâce et les sacrements, où le sauvé vit déjà de la vie nouvelle. Et il s'achèvera au dernier jour, lorsque l'homme verra Dieu face à face. Le chrétien est donc déjà sauvé, et l'attend encore. <em>« C'est en espérance que nous sommes sauvés. »</em> <span class="ref">Romains 8:24</span></p>

      <p>Les objections contre l'Eucharistie se ramènent à deux : la présence réelle ne se lirait pas dans l'Écriture, le pain et le vin n'étant que des symboles ; ou la messe et l'adoration offenseraient l'unique sacrifice du Christ. Chacune cède dès qu'on regarde de près ce que Jésus dit et ce qu'il accomplit.</p>
      <h2>« Ceci est mon corps », au sens propre</h2>
      <p>On objecte que les paroles du Christ sont une image, comme lorsqu'il se dit la porte ou la vigne : « ceci est mon corps » signifierait « ceci représente mon corps ». Mais l'Écriture ferme cette issue. À Capharnaüm, Jésus annonce qu'il donnera sa chair à manger, et ses auditeurs entendent ses paroles au sens propre. <em>« Comment cet homme peut-il nous donner sa chair à manger ? »</em> <span class="ref">Jean 6:52</span> Loin de corriger ce qu'ils prennent au pied de la lettre, il l'affirme plus fort. <em>« Si vous ne mangez la chair du Fils de l'homme et ne buvez son sang, vous n'avez pas la vie en vous. »</em> <span class="ref">Jean 6:53</span> Le verbe qu'il emploie alors n'est plus seulement manger, mais ronger, mâcher : le mot grec <em>trōgō</em> (τρώγω) désigne l'acte concret de broyer des dents. Quand il se dit la porte ou la vigne, personne ne se scandalise, parce que l'image se comprend d'elle-même ; ici, le scandale lui coûte des disciples. <em>« Dès lors, plusieurs de ses disciples se retirèrent, et ils n'allaient plus avec lui. »</em> <span class="ref">Jean 6:66</span> Il les laisse partir, sans un mot qui ramènerait tout à une figure. Au soir de la Cène, il dit enfin comment cette chair se mange. <em>« Ceci est mon corps... Ceci est mon sang, le sang de l'alliance, répandu pour la multitude. »</em> <span class="ref">Matthieu 26:26-28</span></p>
      <h2>« La chair ne sert de rien »</h2>
      <p>On objecte que Jésus lui-même dénoue le sens charnel de ses paroles. <em>« C'est l'esprit qui vivifie, la chair ne sert de rien. »</em> <span class="ref">Jean 6:63</span> Mais cette phrase ne peut viser la chair du Christ, car il vient de dire que cette chair, donnée pour la vie du monde, procure la vie éternelle. <em>« Le pain que je donnerai, c'est ma chair, pour la vie du monde. »</em> <span class="ref">Jean 6:51</span> La chair du Christ, livrée sur la Croix, sauve le monde entier ; elle ne saurait ne servir de rien. Le mot grec rendu par « chair », <em>sarx</em> (σάρξ), désigne ici la manière charnelle de juger, celle de l'homme qui s'arrête à ce que voient ses yeux et refuse ce qui le dépasse. Jean l'emploie ailleurs au même sens, dans la bouche du Christ s'adressant aux pharisiens. <em>« Vous jugez selon la chair. »</em> <span class="ref">Jean 8:15</span> « L'esprit qui vivifie » est l'Esprit Saint, sans qui le sacrement resterait sans fruit. Loin de réduire ses paroles à une image, le Christ avertit qu'ils doivent les recevoir dans une intelligence spirituelle.</p>
      <h2>Plus qu'un souvenir</h2>
      <p>On objecte que le Christ a seulement demandé un mémorial, « en mémoire de moi », et qu'il n'y aurait là qu'un souvenir, non une présence. Mais le mémorial, dans l'Écriture, ne se borne pas à rappeler le passé : la Pâque que mangeait Israël rendait présente, à chaque génération, la délivrance d'Égypte. L'Eucharistie rend présent ce qu'elle rappelle, et Paul l'atteste en des termes qui excluent le simple symbole. <em>« Quiconque mange le pain ou boit la coupe du Seigneur indignement se rend coupable envers le corps et le sang du Seigneur. »</em> <span class="ref">1 Corinthiens 11:27</span> On ne profane pas un signe ; on profane une présence. Aussi met-il en garde celui qui s'en approcherait sans reconnaître ce corps. <em>« Celui qui mange et boit sans discerner le corps mange et boit sa propre condamnation. »</em> <span class="ref">1 Corinthiens 11:29</span> Paul va plus loin encore. <em>« La coupe que nous bénissons n'est-elle pas communion au sang du Christ ? Le pain que nous rompons n'est-il pas communion au corps du Christ ? »</em> <span class="ref">1 Corinthiens 10:16</span> Le mot grec rendu par « communion », <em>koinōnia</em> (κοινωνία), dit une participation réelle : celui qui boit prend part au sang même du Christ, non à son image.</p>
      <h2>Un seul sacrifice, rendu présent</h2>
      <p>On objecte que le Christ s'est offert une fois pour toutes, et que la messe, en prétendant l'offrir encore, ajoute à un sacrifice achevé. Mais la messe ne répète pas la Croix et n'y ajoute rien : elle rend présent l'unique sacrifice, offert une seule fois sur le Calvaire. La victime est la même, le prêtre est le même, le Christ ; seule change la manière, sanglante sur la Croix, non sanglante sur l'autel. L'Écriture annonçait cette offrande répandue parmi les nations. <em>« En tout lieu, on présente à mon nom de l'encens et une offrande pure. »</em> <span class="ref">Malachie 1:11</span> Et l'épître aux Hébreux reconnaît à l'Église un autel qui lui est propre, distinct de l'ancien culte. <em>« Nous avons un autel dont n'ont pas le droit de manger ceux qui servent le tabernacle. »</em> <span class="ref">Hébreux 13:10</span> Le tabernacle est le sanctuaire de l'Ancienne Alliance, la Tente où Israël rendait son culte. Le chrétien, lui, a son autel. Or un autel est fait pour un sacrifice : la messe est ce sacrifice unique, non un autre.</p>
      <h2>Adorer le Christ, non le pain</h2>
      <p>On objecte enfin qu'adorer l'hostie, c'est adorer du pain, et tomber dans l'idolâtrie. Tout tient à ce que l'hostie est. Si le pain demeurait du pain, l'adorer serait en effet une idolâtrie ; mais si le Christ y est réellement présent, corps, sang, âme et divinité, l'adoration ne va pas au pain, elle va à lui. La question de l'idolâtrie se ramène donc à celle de la présence réelle, déjà tranchée par ses paroles. Devant lui présent, refuser l'adoration serait la seule faute. On n'adore pas le signe, mais celui qu'il rend présent.</p>

      <h2>Mère d'une personne, non d'une nature</h2>
      <p>On objecte que Dieu, éternel et sans commencement, ne peut avoir de mère, et que Marie est seulement mère de l'homme Jésus. Mais une mère n'enfante pas une nature, elle enfante quelqu'un, une personne, et la personne que Marie a conçue et portée est le Fils éternel devenu homme. Ce qui revient à l'une de ses deux natures s'attribue à sa personne, sous quelque nom qu'on la désigne : on dit que le Fils de Dieu est né et qu'il est mort, bien que naître et mourir tiennent à sa seule chair, parce que c'est le même qui agit dans les deux natures. L'Écriture parle déjà ainsi, disant que Dieu s'est acquis l'Église <em>« par son propre sang »</em> <span class="ref">Actes 20:28</span>. Marie ne donne pas à son Fils son être divin, mais sa chair ; elle est Mère de Dieu parce que celui qu'elle enfante est Dieu. Lui refuser ce titre séparerait en Jésus deux sujets, l'homme né de Marie et un Dieu qui lui resterait étranger.</p>
      <h2>Sauvée plus parfaitement que tous</h2>
      <p>On objecte que l'Immaculée Conception ne se lit pas dans l'Écriture, et que Marie elle-même appelle Dieu son Sauveur. <em>« Mon esprit exulte en Dieu, mon Sauveur. »</em> <span class="ref">Luc 1:47</span> L'ange la nomme pourtant d'un mot qui dit la plénitude de la grâce. <em>« Je te salue, comblée de grâce. »</em> <span class="ref">Luc 1:28</span> Là où le français dit « comblée de grâce », le grec porte un seul mot, <em>kecharitōmenē</em> (κεχαριτωμένη), une grâce déjà pleinement accomplie en elle avant qu'elle ait rien fait. Marie a bien été sauvée par le Christ, et plus parfaitement que tout autre : les autres rachetés sont relevés après être tombés, elle a été gardée de tomber, par les mérites de son Fils appliqués d'avance à l'instant de sa conception. Préserver quelqu'un du gouffre est une délivrance plus haute que l'en retirer ; appeler Dieu son Sauveur, c'est reconnaître ce qu'il a fait pour elle, non avouer une faute.</p>

      <p>On objecte que les Évangiles parlent des « frères de Jésus », et qu'une mère de plusieurs enfants ne saurait être toujours vierge. Dans la langue de la Bible, le mot « frère » déborde la fratrie et couvre toute la parenté proche : le mot grec rendu par « frère », <em>adelphos</em> (ἀδελφός), s'étend aux cousins. Matthieu nomme parmi ces « frères » Jacques et Joseph. <em>« Ses frères ne s'appellent-ils pas Jacques, Joseph, Simon et Jude ? »</em> <span class="ref">Matthieu 13:55</span> Or ces deux-là ont pour mère une autre Marie, présente à la Croix. <em>« Marie, mère de Jacques et de Joseph. »</em> <span class="ref">Matthieu 27:56</span> On objecte encore que Joseph ne connut pas Marie « jusqu'à ce qu'elle eût enfanté son fils ». <em>« Il ne la connut point jusqu'à ce qu'elle eût enfanté un fils. »</em> <span class="ref">Matthieu 1:25</span> Mais « jusqu'à » fixe un terme à ce qui précède sans rien affirmer de la suite, et l'Écriture l'emploie souvent ainsi. Il est dit de Mical qu'elle n'eut pas d'enfant <em>« jusqu'au jour de sa mort »</em> <span class="ref">2 Samuel 6:23</span>, sans qu'elle en ait eu après ; et le Christ promet d'être avec ses disciples <em>« jusqu'à la fin du monde »</em> <span class="ref">Matthieu 28:20</span>, sans cesser de l'être au-delà. Le texte veut seulement dire que l'enfant n'est pas de Joseph. La Croix le confirme : ayant des frères, le Christ ne remettrait pas sa mère à un disciple étranger ; en la confiant à Jean, il montre qu'elle n'a pas d'autre fils.</p>

    resume: "Comment ceux qui meurent sans avoir reçu le baptême d'eau, le catéchumène, le martyr, l'homme qui a cherché Dieu sans connaître l'Évangile, peuvent recevoir la grâce du baptême par le désir ou par le sang.",

    contenu: `
      <p>Le baptême d'eau ouvre la porte du salut, et l'Église le tient pour nécessaire. Pourtant, certains meurent avant de l'avoir reçu : un catéchumène emporté la veille de son baptême, un martyr tué pour le Christ, un homme qui a cherché Dieu sans jamais connaître l'Évangile. Pour eux, la tradition reconnaît deux autres voies, le baptême de désir et le baptême de sang, par lesquelles Dieu donne la grâce là où l'eau a manqué.</p>
      <h2>La nécessité du baptême</h2>
      <p>Le Seigneur lie le salut au baptême. <em>« En vérité, en vérité, je te le dis, nul, s'il ne naît de l'eau et de l'Esprit, ne peut entrer dans le royaume de Dieu. »</em> <span class="ref">Jean 3:5</span> Le baptême d'eau est la voie que le Christ a donnée pour recevoir la grâce qui sauve, et l'Église ne connaît pas d'autre moyen assuré.</p>
      <h2>Le baptême de désir</h2>
      <p>Celui qui désire le baptême et meurt avant de le recevoir obtient la grâce par ce désir même. Le désir est explicite chez le catéchumène, qui demande le baptême et se prépare à le recevoir. Il est implicite chez celui qui cherche Dieu d'un cœur sincère et accomplit sa volonté selon ce qu'il en connaît : sans nommer le Christ, il le désire déjà en désirant le bien et la vérité. L'Écriture reconnaît cette loi inscrite au fond de l'homme. <em>« Quand des païens, qui n'ont pas la loi, font naturellement ce qu'elle ordonne, ils montrent que l'œuvre de la loi est écrite dans leur cœur. »</em> <span class="ref">Romains 2:14-15</span> Dans tous les cas, c'est la charité qui donne au désir sa valeur, car l'amour de Dieu contient en germe tout ce que le baptême confère.</p>
      <h2>Le baptême de sang</h2>
      <p>Le martyre supplée pareillement à l'eau. Le Christ a lui-même appelé sa Passion un baptême, et il a annoncé que ses disciples le partageraient. <em>« Vous serez baptisés du baptême dont je suis baptisé. »</em> <span class="ref">Marc 10:39</span> Celui qui meurt pour le Christ, ou pour une vertu qui se rapporte à lui, est ainsi baptisé dans son propre sang : il reçoit la grâce par l'union à la Passion du Christ, qu'il reproduit en donnant sa vie. Les saints Innocents, ces enfants de Bethléem mis à mort à cause de lui, sont honorés comme les premiers de ces martyrs ; et l'Église a toujours vénéré comme saints ceux qui sont morts pour le Christ avant d'avoir reçu l'eau.</p>
      <h2>Le larron à la croix</h2>
      <p>L'Écriture en montre un exemple au Calvaire. Le larron crucifié près de Jésus reconnaît sa faute, confesse l'innocence du Christ et se tourne vers lui. Jésus lui répond aussitôt. <em>« Aujourd'hui, tu seras avec moi dans le paradis. »</em> <span class="ref">Luc 23:43</span> Cet homme n'a pas reçu le baptême d'eau ; sa foi et son désir, au seuil de la mort, lui ont ouvert le paradis.</p>
      <h2>Dieu reste libre au-delà de ses sacrements</h2>
      <p>Le baptême demeure nécessaire, et nul ne peut le négliger en se réservant au désir ou au sang. Mais Dieu, qui a attaché le salut au sacrement, n'est pas lui-même enchaîné à ses signes : il peut donner quand il veut la grâce qu'ils contiennent. C'est pourquoi l'Écriture affirme que Dieu <em>« veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. »</em> <span class="ref">1 Timothée 2:4</span> Le baptême de désir et le baptême de sang sont la manière dont cette volonté rejoint ceux que l'eau n'a pas atteints.</p>

      <p>Le Credo confesse la communion des saints. Elle désigne l'union de tous les membres de l'Église dans le Christ : les fidèles qui vivent encore sur la terre, les âmes qui se purifient avant de voir Dieu, et les bienheureux qui le contemplent déjà. Cette union ne se rompt pas à la mort, et elle permet aux uns de prier pour les autres.</p>
      <h2>La communion aux choses saintes</h2>
      <p>La communion des saints désigne d'abord la communion aux choses saintes : les biens sacrés que tous les membres de l'Église partagent. Ils tiennent une seule foi reçue des Apôtres, reçoivent les mêmes sacrements qui donnent la grâce, et d'abord l'eucharistie, le bien commun par excellence, qui fait de tous un seul corps. <em>« Puisqu'il y a un seul pain, nous formons un seul corps, nous qui participons tous à ce pain unique. »</em> <span class="ref">1 Corinthiens 10:17</span> S'y ajoutent les dons que l'Esprit répartit pour l'utilité de tous, et la charité, par laquelle le bien de chacun devient profitable à l'ensemble. De cette communion aux biens saints naît la communion des personnes saintes.</p>
      <h2>Un seul corps dans le Christ</h2>
      <p>L'Église est un corps dont le Christ est la tête, et tous les baptisés en sont les membres. L'Écriture en tire leur solidarité. <em>« Si un membre souffre, tous les membres souffrent avec lui ; si un membre est honoré, tous se réjouissent avec lui. »</em> <span class="ref">1 Corinthiens 12:26</span> Ce corps dépasse les frontières de la mort, et trois états le composent. L'Église de la terre marche encore vers Dieu, dans la foi et le combat ; l'Église qui se purifie achève dans le purgatoire ce qui lui manque ; l'Église du ciel contemple Dieu face à face. On les a nommées l'Église militante, l'Église souffrante et l'Église glorieuse. Toutes tiennent au même Christ et ne forment qu'un seul corps, que la mort ne divise pas.</p>
      <h2>L'échange des biens spirituels</h2>
      <p>Parce que les membres ne font qu'un corps, leurs biens spirituels circulent entre eux. Le bien d'un seul profite à tous : la prière, les mérites, les souffrances offertes de l'un soutiennent les autres, et l'abondance des saints supplée à la pauvreté de ceux qui peinent. Paul savait ses souffrances fécondes pour les autres. <em>« Je complète en ma chair ce qui manque aux épreuves du Christ, pour son corps qui est l'Église. »</em> <span class="ref">Colossiens 1:24</span> De cet échange se forme ce que l'Église appelle son trésor : la valeur infinie des mérites du Christ, à laquelle s'ajoutent les prières et les bonnes œuvres de la Vierge et de tous les saints. L'Église y puise pour ses membres, et chacun, par sa charité, y verse à son tour.</p>
      <h2>Les saints vivent en Dieu</h2>
      <p>Les bienheureux du ciel vivent pleinement en Dieu. Jésus l'affirme en parlant des patriarches morts depuis des siècles. <em>« Dieu n'est pas le Dieu des morts, mais des vivants. »</em> <span class="ref">Matthieu 22:32</span> Les saints le contemplent face à face, et de cette vision ils tirent une vie plus haute que la nôtre. Ils connaissent nos prières non par un pouvoir qui leur serait propre, ni par une science illimitée qu'ils n'ont pas, mais en Dieu même : le voyant tel qu'il est, ils connaissent en lui ce qu'il leur découvre, et il leur découvre ce qui regarde leur charité. Or cette charité demeure tournée vers nous. <em>« La charité ne passe jamais. »</em> <span class="ref">1 Corinthiens 13:8</span> Unis à nous dans le même Christ, les saints continuent de nous aimer, et Dieu, qu'ils contemplent, leur découvre nos demandes.</p>
      <h2>Ils prient pour nous</h2>
      <p>Cette vie des saints est tout entière tournée vers Dieu et vers l'amour. Leur charité s'épanouit au seuil du ciel et les porte à prier pour ceux qui cheminent encore. L'Apocalypse montre les élus présentant devant Dieu <em>« des coupes d'or pleines de parfums, qui sont les prières des saints. »</em> <span class="ref">Apocalypse 5:8</span> L'Ancien Testament le pressentait déjà : Jérémie, mort depuis longtemps, apparaît comme <em>« celui qui prie beaucoup pour le peuple et pour la ville sainte. »</em> <span class="ref">2 Maccabées 15:14</span> Et le ciel se réjouit du repentir d'un seul pécheur. Les saints prennent part à notre marche : ils intercèdent.</p>
      <p>Les anges aussi prennent part à cette communion. Esprits envoyés au service de Dieu, ils veillent sur les hommes et portent leurs prières devant lui. <em>« Ne sont-ils pas tous des esprits au service de Dieu, envoyés pour exercer un ministère en faveur de ceux qui doivent hériter du salut ? »</em> <span class="ref">Hébreux 1:14</span> Se tenant sans cesse devant la face de Dieu, ils voient en lui ceux qu'ils gardent. <em>« Leurs anges, dans les cieux, voient sans cesse la face de mon Père qui est dans les cieux. »</em> <span class="ref">Matthieu 18:10</span> L'ange Raphaël présentait les prières de Tobie. <em>« C'est moi qui présentais le souvenir de vos prières devant la gloire du Seigneur. »</em> <span class="ref">Tobie 12:12</span> On peut donc leur demander de prier pour nous, comme on le demande aux saints.</p>
      <h2>Nous prions pour les défunts</h2>
      <p>La communion joue aussi dans l'autre sens. Ceux qui ont quitté ce monde sans être pleinement purifiés achèvent leur purification avant de voir Dieu, dans l'état que l'Église nomme le purgatoire. Le mérite appartient à la vie terrestre, le temps du chemin où la volonté peut encore choisir, et que la mort vient fermer. <em>« Il faut que je fasse les œuvres de celui qui m'a envoyé pendant qu'il fait jour ; la nuit vient, où personne ne peut travailler. »</em> <span class="ref">Jean 9:4</span> Ainsi ils ne peuvent plus rien mériter pour eux-mêmes. L'Église, unie à eux dans le Christ, les soulage pourtant par ses prières, ses aumônes et surtout par le sacrifice de la messe. L'Écriture montre déjà ce geste, lorsqu'un sacrifice est offert pour les soldats tombés au combat. <em>« C'est une pensée sainte et salutaire de prier pour les morts, afin qu'ils soient délivrés de leurs péchés. »</em> <span class="ref">2 Maccabées 12:46</span> Prier pour les défunts, c'est étendre au-delà de la mort la charité qui unit les membres d'un même corps.</p>

      <p>L'ignorance invincible est celle qu'un homme ne peut surmonter, quelque effort sincère qu'il fasse pour atteindre la vérité. Il l'ignore sans qu'il y ait faute de sa part, parce que rien ne la lui a fait connaître et que rien en lui ne s'y est dérobé. Devant Dieu, nul n'est tenu pour coupable de ce qu'il ne pouvait savoir.</p>
      <h2>Deux ignorances</h2>
      <p>L'ignorance prend deux formes, et tout dépend de laquelle. La première se pouvait vaincre : l'homme avait de quoi connaître la vérité, et il a négligé de chercher, ou s'est détourné pour ne pas voir. On l'appelle vincible, parce qu'on pouvait en venir à bout ; elle n'excuse pas, car la faute n'est pas d'ignorer mais d'avoir voulu ignorer. La seconde ne se pouvait vaincre : aucun chemin ne menait la vérité jusqu'à cet homme, ou tous lui étaient fermés sans qu'il y fût pour rien. On l'appelle invincible, parce qu'aucun effort ne l'aurait levée ; celle-là, Dieu ne l'impute pas.</p>
      <h2>L'ignorance allège la faute</h2>
      <p>La gravité d'une faute se mesure à ce que l'homme savait en la commettant. Agir mal en connaissant le bien pèse plus lourd qu'agir mal sans le connaître, et le Christ établit lui-même cette différence. <em>« Le serviteur qui, connaissant la volonté de son maître, n'a rien préparé, sera battu d'un grand nombre de coups ; mais celui qui ne l'a pas connue sera battu de peu de coups. »</em> <span class="ref">Luc 12:47-48</span> Le châtiment suit la mesure du savoir. C'est pourquoi, du haut de la Croix, le Christ peut demander grâce pour ceux qui le mettent à mort, en invoquant précisément leur aveuglement. <em>« Père, pardonne-leur, car ils ne savent ce qu'ils font. »</em> <span class="ref">Luc 23:34</span> À l'inverse, prétendre voir quand on refuse de voir aggrave la faute. <em>« Si vous étiez aveugles, vous n'auriez pas de péché ; mais vous dites : Nous voyons ; votre péché demeure. »</em> <span class="ref">Jean 9:41</span></p>
      <h2>La loi écrite dans les cœurs</h2>
      <p>Même celui qui n'a jamais reçu la révélation porte une loi en lui. Dieu a gravé dans la conscience de tout homme le discernement du bien et du mal, et c'est sur cette loi intérieure qu'il juge ceux à qui l'Évangile n'est pas parvenu. <em>« Quand les païens, qui n'ont pas la loi, font naturellement ce que la loi commande, ils se tiennent lieu de loi à eux-mêmes ; l'œuvre de la loi est écrite dans leurs cœurs, leur conscience leur rendant témoignage. »</em> <span class="ref">Romains 2:14-15</span> Celui qui suit honnêtement cette voix, sans avoir connu davantage, est jugé sur ce qu'il a reçu, non sur ce qu'il ne pouvait connaître.</p>
      <h2>Ce qui n'excuse pas</h2>
      <p>L'excuse a sa limite. Celui qui pouvait atteindre la vérité et s'est bouché les yeux n'est pas couvert par son ignorance, puisqu'il l'a choisie. La création elle-même rend Dieu accessible à la raison, et qui refuse cette lumière se condamne. <em>« Ce qu'on peut connaître de Dieu est manifeste pour eux ; ses perfections invisibles se voient depuis la création du monde, de sorte qu'ils sont inexcusables. »</em> <span class="ref">Romains 1:19-20</span> Et là où l'Évangile a été annoncé, l'ignorance d'autrefois ne tient plus : la vérité offerte engage celui qui l'entend. <em>« Dieu, sans tenir compte des temps d'ignorance, annonce maintenant à tous les hommes, en tous lieux, qu'ils aient à se repentir. »</em> <span class="ref">Actes 17:30</span></p>
      <h2>Sauvé par le Christ, non par l'ignorance</h2>
      <p>L'ignorance invincible écarte la faute, elle ne sauve pas. Nul n'est sauvé parce qu'il ignore, mais parce que le Christ le sauve, et il n'est pas d'autre source de salut. <em>« Il n'y a sous le ciel aucun autre nom donné aux hommes par lequel nous devions être sauvés. »</em> <span class="ref">Actes 4:12</span> Ce salut, pourtant, Dieu le destine à tous les hommes, et il l'accomplit pleinement en ceux qui croient. <em>« Nous avons mis notre espérance dans le Dieu vivant, qui est le Sauveur de tous les hommes, principalement des croyants. »</em> <span class="ref">1 Timothée 4:10</span> Sauveur de tous, parce que sa grâce s'offre à tout homme et qu'il n'en rachète aucun par un autre que son Fils ; des croyants surtout, parce qu'eux la reçoivent en plénitude, dans la foi et les sacrements où elle se donne.</p>
      <p>Dieu a lié le salut à son Église ; lui-même n'y est pas enchaîné, et il peut atteindre par des voies connues de lui seul l'âme qui le cherche sans encore le connaître. Celui qui, sans faute, n'a pas reçu l'Évangile, mais qui cherche Dieu d'un cœur droit et suit la loi de sa conscience, la grâce du Christ peut le sauver : son ignorance lève l'obstacle de la faute, et c'est la grâce qui opère le salut. Porter l'Évangile au monde reste donc un devoir, et l'Église demeure nécessaire ; l'ignorance invincible n'est pas un abri que l'on choisit, mais un malheur que Dieu, dans sa miséricorde, ne retient pas contre celui qui le subit.</p>

      <p>La Croix et la Résurrection forment le cœur de la foi chrétienne. Par sa mort sur la Croix, le Christ rachète le péché du monde ; par sa Résurrection, il triomphe de la mort. Ces deux moments inséparables sont appelés le mystère pascal, et c'est là que s'opère notre salut.</p>
      <h2>Une offense infinie</h2>
      <p>Le péché avait séparé l'homme de Dieu, et cette rupture dépassait toute réparation humaine. La gravité d'une offense se mesure à la dignité de celui qu'elle atteint : un manque d'égard envers un semblable pèse moins lourd que le même affront fait à un souverain. Or le péché atteint Dieu lui-même, infiniment grand. Il porte donc une gravité sans mesure : une offense infinie.</p>
      <p>Réparer une telle offense demandait une satisfaction de valeur égale, donc infinie. Le mot satisfaction désigne ici la réparation offerte à Dieu pour le péché, le don qui répond à l'offense. Or aucun homme ne pouvait l'offrir : créature finie, déjà redevable à Dieu de tout ce qu'il est, l'homme n'avait rien à donner qui ne fût déjà dû. Sa dette le dépassait infiniment.</p>
      <p>La justice voulait pourtant que ce soit l'homme qui répare, puisque c'est l'homme qui avait péché. Il fallait donc un réparateur à la fois pleinement homme, pour offrir au nom de tous, et pleinement Dieu, pour que son offrande ait la valeur infinie qu'exigeait la faute. Ce réparateur, c'est le Christ, pleinement Dieu et pleinement homme. En lui seul, l'humanité pouvait enfin rendre à Dieu une réparation à la mesure de l'offense.</p>
      <h2>Le sacrifice de la Croix</h2>
      <p>Sur la Croix, le Christ prend sur lui le péché du monde. Jean-Baptiste l'avait désigné : <em>« Voici l'Agneau de Dieu, qui ôte le péché du monde. »</em> <span class="ref">Jean 1:29</span> Innocent, il porte la peine des coupables : <em>« Il a été transpercé à cause de nos péchés ; par ses meurtrissures, nous sommes guéris. »</em> <span class="ref">Isaïe 53:5</span> Son sang versé est le don total de lui-même au Père, offert par amour en réparation pour tous. Nul ne le lui arrache : il se livre librement, et c'est cette obéissance d'amour, où le Fils accomplit la volonté du Père, qui fait le prix de son offrande. <em>« Personne ne m'ôte la vie, mais je la donne de moi-même. »</em> <span class="ref">Jean 10:18</span> Là, le sacrifice qu'annonçaient tous les autels d'Israël trouve son accomplissement.</p>
      <h2>Justice et miséricorde</h2>
      <p>La Croix révèle ensemble la justice et la miséricorde de Dieu. Sa justice, car le péché y est pleinement réparé, par une offrande à la mesure de l'offense.</p>
      <p>Sa miséricorde plus encore. Sauver l'homme était pure gratuité : il s'était perdu par sa propre faute, et rien n'obligeait Dieu à le relever. La miséricorde commence dans cet amour offert à qui ne l'avait pas mérité : <em>« Dieu prouve son amour envers nous : alors que nous étions encore pécheurs, le Christ est mort pour nous. »</em> <span class="ref">Romains 5:8</span> Elle va plus loin encore. La justice voulait que le coupable paie ; le coupable ne le pouvait pas. Alors c'est l'offensé qui paie pour l'offenseur : Dieu, en droit d'exiger réparation, se fait lui-même réparateur et prend à sa charge la dette qu'il aurait pu réclamer. Pour cela il donne ce qu'il a de plus cher, son propre Fils. Le don épouse la mesure de l'offense : infini comme elle.</p>
      <p>Dieu restait pourtant libre. Par sa toute-puissance, il aurait pu remettre le péché d'un simple pardon. S'il a choisi cette voie, c'est qu'elle était la plus digne de lui, celle où sa justice est honorée, sa miséricorde manifestée, et l'homme associé à sa propre rédemption. Ainsi s'accomplit la parole du psaume : <em>« L'amour et la vérité se rencontrent, la justice et la paix s'embrassent. »</em> <span class="ref">Psaume 85:11</span> À la Croix, Dieu pardonne sans rien abaisser de sa sainteté.</p>
      <h2>La victoire de la Résurrection</h2>
      <p>Le troisième jour, le Christ est ressuscité, vivant pour toujours, vainqueur du péché et de la mort. La Résurrection est le couronnement de son sacrifice et la source de sa fécondité ; sur elle repose toute la foi : <em>« Si le Christ n'est pas ressuscité, votre foi est vaine. »</em> <span class="ref">1 Corinthiens 15:17</span></p>
      <p>Par elle, ce que la Croix a mérité devient vie donnée. Le Christ ressuscité est la cause de notre justification : <em>« Il a été livré pour nos fautes, et ressuscité pour notre justification. »</em> <span class="ref">Romains 4:25</span> Et sa victoire ne reste pas la sienne seule : il est le premier d'une multitude, et sa Résurrection est le principe de la nôtre. <em>« Christ est ressuscité des morts, prémices de ceux qui sont morts. »</em> <span class="ref">1 Corinthiens 15:20</span> En son humanité glorifiée, élevé à la droite du Père, il est établi Seigneur et communique aux siens la vie qu'il a reçue. En lui, la mort cesse d'être une fin : elle devient le passage vers la vie qui ne finit pas.</p>
      <h2>Un seul mystère pascal</h2>
      <p>La Croix et la Résurrection ne font qu'un seul acte de salut, que l'Église appelle le mystère pascal. La mort y rachète, la Résurrection y donne la vie ; l'une appelle l'autre, et le Christ passe de l'une à l'autre pour nous entraîner avec lui.</p>
      <h2>La justification</h2>
      <p>Ce que le Christ a mérité sur la Croix, il l'applique à chacun par la justification. Dieu y rend le pécheur juste : il efface le péché et infuse au cœur la grâce sanctifiante, qui fait de lui un fils adoptif. <em>« Justifiés gratuitement par sa grâce, par la rédemption qui est dans le Christ Jésus. »</em> <span class="ref">Romains 3:24</span> Cette grâce nous parvient par les sacrements : le baptême nous plonge dans la mort et la Résurrection du Christ, <em>« afin que, comme Christ est ressuscité des morts, nous menions une vie nouvelle »</em> <span class="ref">Romains 6:4</span>, et l'Eucharistie nous nourrit de son sacrifice. C'est ce mystère que célèbre chaque messe et que renouvelle chaque Pâque ; unis à lui, justifiés par son sang, nous attendons de ressusciter comme lui, au dernier jour.</p>

      <p>Les fins dernières sont les réalités ultimes qui attendent l'homme : ce qui advient au terme de sa vie, et ce qui adviendra au terme de l'histoire. La tradition en compte quatre, qu'elle nomme les <em>novissima</em>, les « choses dernières » : la mort, le jugement, le paradis et l'enfer. Les considérer, c'est regarder où mène la vie pour la vivre en vue de sa fin.</p>
      <h2>La mort</h2>
      <p>La mort est la séparation de l'âme et du corps, le terme de la vie terrestre. Relevant à Troas le jeune homme tombé de la fenêtre, Paul mesure la vie à la présence de l'âme dans le corps. <em>« Ne vous troublez pas, car son âme est en lui. »</em> <span class="ref">Actes 20:10</span> Avec elle s'achève le temps du mérite : durant cette vie, l'homme se tourne vers Dieu ou s'en détourne, et la mort scelle ce choix. <em>« Il est réservé aux hommes de mourir une seule fois, après quoi vient le jugement. »</em> <span class="ref">Hébreux 9:27</span> On ne meurt qu'une seule fois ; au-delà, on ne se convertit plus, et l'âme est recueillie telle qu'elle est devenue.</p>
      <h2>Le séjour des morts</h2>
      <p>Avant le Christ, tous les défunts descendaient au séjour des morts, justes et méchants, loin de la lumière des vivants et de la vue de Dieu. Le mot hébreu rendu par « séjour des morts » est <em>she'ol</em> (<span dir="rtl">שְׁאוֹל</span>) ; la version grecque le traduit par <em>Hadēs</em> (ᾅδης) : le lieu d'en bas, la fosse, où l'on descend en mourant. On y menait une existence diminuée, dans l'ombre et le silence, séparée des vivants et coupée de la louange de Dieu. Jacob, croyant son fils mort, veut l'y rejoindre. <em>« Je descendrai vers mon fils, dans le séjour des morts, en menant deuil. »</em> <span class="ref">Genèse 37:35</span> Et le psaume gémit de cette coupure. <em>« Dans la mort, nul souvenir de toi ; au séjour des morts, qui te célèbre ? »</em> <span class="ref">Psaume 6:6</span></p>
      <p>Tous y descendaient, mais non dans le même état. Les justes y reposaient dans la consolation, attendant le Rédempteur ; les méchants y connaissaient déjà le tourment. Le Christ le montre dans la parabole du pauvre Lazare, porté au repos, et du riche sans pitié, réveillé dans les flammes, un abîme infranchissable entre les deux. <em>« Le pauvre mourut, et il fut porté par les anges dans le sein d'Abraham. »</em> <span class="ref">Luc 16:22</span> Ce lieu de repos des justes, on l'appelle le sein d'Abraham, ou les limbes des Pères, du latin <em>limbus</em>, le bord : là patientaient les saints de l'ancienne Alliance, tournés vers la promesse encore à venir.</p>
      <p>À sa mort, le Christ descendit au séjour des morts. Le Credo le confesse : il est descendu aux enfers. Le mot « enfer » vient du latin <em>infernus</em>, « ce qui est en bas » : il nomme d'abord le lieu souterrain où descendent tous les morts, avant de désigner le lieu des damnés. C'est au premier que le Christ descendit, en vainqueur, pour trouver les justes qui l'attendaient et leur porter la nouvelle du salut accompli. <em>« Il alla prêcher aux esprits en prison. »</em> <span class="ref">1 Pierre 3:19</span> Il ouvrit alors le ciel que le péché avait fermé, et fit passer les justes de l'attente à la gloire.</p>
      <p>Depuis cette descente et la Résurrection, le ciel est ouvert : les justes qui meurent dans l'amitié de Dieu entrent dans sa vue, aussitôt ou après la purification du purgatoire, et les limbes des Pères sont vides, leur attente accomplie. Demeurent l'enfer, pour qui se détourne de Dieu jusqu'au bout, et l'attente du dernier jour, où le corps ressuscité rejoindra l'âme. Alors la mort elle-même sera détruite. <em>« La mort et le séjour des morts furent jetés dans l'étang de feu. »</em> <span class="ref">Apocalypse 20:14</span></p>
      <h2>Le jugement particulier</h2>
      <p>Aussitôt après la mort, chaque âme paraît devant Dieu et reçoit son sort éternel : c'est le jugement particulier, ainsi nommé parce qu'il concerne chaque personne séparément. Celui qui juge est le Christ, à qui le Père a remis tout jugement. <em>« Le Père ne juge personne, mais il a remis tout jugement au Fils. »</em> <span class="ref">Jean 5:22</span> Devant lui, l'âme voit sa vie entière dans la pleine lumière de Dieu, sans rien qui demeure caché, et le verdict du Christ confirme ce qu'elle a fait d'elle-même. <em>« Il nous faut tous comparaître devant le tribunal du Christ, afin que chacun reçoive selon ce qu'il aura fait. »</em> <span class="ref">2 Corinthiens 5:10</span></p>
      <p>Ce qui est pesé en ce jugement est l'amour : Dieu regarde la foi rendue vivante par la charité. <em>« Ce qui compte, c'est la foi agissant par la charité. »</em> <span class="ref">Galates 5:6</span> Toute la vie est jugée à cette aune, l'amour de Dieu et du prochain attesté jusque dans les plus humbles services.</p>
      <p>Le jugement donne aussitôt à l'âme son sort, sans attendre la fin du monde, et trois états sont possibles. Celle qui meurt dans l'amitié de Dieu, pleinement purifiée, entre au paradis ; celle qui meurt dans cette amitié, imparfaitement purifiée, passe par le purgatoire ; celle qui meurt en refusant volontairement l'amour de Dieu va en enfer. Au bon larron crucifié près de lui, le Christ promet le ciel pour le jour même. <em>« Aujourd'hui, tu seras avec moi dans le paradis. »</em> <span class="ref">Luc 23:43</span> L'Église a confirmé cette rétribution immédiate au concile de Florence, en 1439.</p>
      <h2>Le paradis</h2>
      <p>Le paradis est le bonheur parfait et sans fin où les élus, pleinement unis à Dieu, partagent sa vie et sa joie. Son cœur est de voir Dieu tel qu'il est, ce que le Seigneur a promis aux cœurs purs. <em>« Heureux les cœurs purs, car ils verront Dieu. »</em> <span class="ref">Matthieu 5:8</span> Sur la terre nous connaissons Dieu dans la foi, à travers ses œuvres ; au ciel nous le verrons directement, face à face. L'Église nomme cette contemplation la vision béatifique, car elle rend bienheureux ceux qui la reçoivent. <em>« Maintenant nous voyons dans un miroir, de façon confuse ; mais alors, ce sera face à face. »</em> <span class="ref">1 Corinthiens 13:12</span></p>
      <p>Voir Dieu ainsi dépasse les forces de toute créature ; c'est Dieu lui-même qui élève l'âme par un don que la tradition appelle la lumière de gloire, et qui la rend capable de soutenir sa vue. Les bienheureux le voient tel qu'il est sans jamais l'épuiser : Dieu demeure infini, et sa contemplation reste à jamais nouvelle, sans lassitude et sans terme.</p>
      <p>L'homme est fait pour Dieu, et Dieu seul peut combler son cœur ; au paradis ce désir trouve enfin son plein rassasiement, sans mesure et sans fin. <em>« Ce que l'œil n'a pas vu, ce que l'oreille n'a pas entendu, voilà ce que Dieu a préparé pour ceux qui l'aiment. »</em> <span class="ref">1 Corinthiens 2:9</span> Ce bonheur, l'homme le reçoit avec le Christ et par lui. <em>« Père, je veux que là où je suis, ceux que tu m'as donnés soient aussi avec moi, pour qu'ils contemplent ma gloire. »</em> <span class="ref">Jean 17:24</span> C'est par son humanité, unie à Dieu, que les élus sont introduits dans la vie même de la Trinité.</p>
      <p>La mesure de la gloire diffère d'un bienheureux à l'autre : chacun voit Dieu selon la charité qu'il a portée en cette vie. <em>« Chacun recevra sa propre récompense selon son propre travail. »</em> <span class="ref">1 Corinthiens 3:8</span> L'amour offert ici-bas dilate la capacité d'accueillir Dieu : les uns sont des vases plus grands que les autres, et tous sont remplis jusqu'au bord, sans qu'aucun désir leur manque. <em>« Autre est l'éclat du soleil, autre l'éclat de la lune, et autre l'éclat des étoiles ; une étoile même diffère en éclat d'une autre étoile. »</em> <span class="ref">1 Corinthiens 15:41</span></p>
      <p>Le bonheur du paradis est une communion : les bienheureux vivent dans la joie de Dieu et les uns des autres, la communion des saints parvenue à son terme. <em>« Voici la demeure de Dieu avec les hommes ; il demeurera avec eux, et ils seront son peuple. »</em> <span class="ref">Apocalypse 21:3</span> Les âmes des justes goûtent ce bonheur aussitôt après le jugement particulier ; quand les corps ressusciteront, leur joie rejaillira sur la chair glorifiée, et l'homme tout entier vivra de Dieu.</p>
      <h2>Le purgatoire</h2>
      <p>Le purgatoire est l'état de purification que traversent, après la mort, ceux qui meurent dans l'amitié de Dieu sans être encore pleinement purifiés. Leur salut est acquis ; il leur reste à achever de se purifier de ce qui, en eux, tient encore à autre chose qu'à Dieu, car la pleine lumière du ciel n'accueille que des cœurs purs. <em>« Il n'entrera rien de souillé. »</em> <span class="ref">Apocalypse 21:27</span></p>
      <p>Tout péché a deux dimensions : il offense Dieu, et il laisse en l'homme un attachement désordonné aux choses créées. Quand le péché est pardonné, l'offense est remise, et avec elle la peine éternelle ; demeure souvent une peine temporelle, ce désordre encore à guérir. La grâce du Christ achève dans l'âme cette guérison, ouverte par sa victoire. Le pécheur y coopère ici-bas par la pénitence et les œuvres de charité ; ce qui demeure à purifier au sortir de cette vie s'achève au purgatoire.</p>
      <p>L'Écriture montre qu'on peut prier pour les morts et que cette prière leur profite. Au temps des Maccabées, on fait offrir un sacrifice pour les soldats tombés. <em>« C'est une pensée sainte et salutaire de prier pour les morts, afin qu'ils soient délivrés de leurs péchés. »</em> <span class="ref">2 Maccabées 12:46</span> Une telle prière serait vaine pour les bienheureux, qui n'en ont pas besoin, et pour les damnés, que nul ne peut secourir : elle suppose un troisième état, où l'âme se purifie. L'Écriture l'évoque comme un passage par le feu. <em>« Il subira une perte, mais lui sera sauvé, comme à travers le feu. »</em> <span class="ref">1 Corinthiens 3:15</span> Le Christ laisse entendre qu'un pardon reste possible au-delà de la mort. <em>« Il ne lui sera pardonné ni dans ce siècle ni dans le siècle à venir. »</em> <span class="ref">Matthieu 12:32</span> Si une certaine faute ne se remet ni en ce monde ni dans l'autre, c'est que d'autres peuvent l'être dans le siècle à venir. L'Église l'a confessé dès le concile de Lyon, en 1274.</p>
      <p>La purification du purgatoire est profonde et douloureuse : l'âme y souffre d'être encore retenue loin du Dieu qu'elle aime et désire de toute sa force. Cette souffrance est tout entière habitée par l'espérance, car ces âmes savent qu'elles sont sauvées et que leur attente a un terme. Ce feu purifie comme l'or au creuset : il consume ce qui reste d'impur pour rendre l'âme digne de la pleine lumière.</p>
      <p>Les âmes du purgatoire ne peuvent plus mériter pour elles-mêmes ; les vivants le peuvent pour elles et peuvent hâter leur délivrance. On nomme suffrages les secours qu'on leur porte, du latin <em>suffragium</em>, le soutien apporté en faveur de quelqu'un : la prière, l'aumône, la pénitence offertes à leur intention, et par-dessus tout le sacrifice de la messe, où la Croix du Christ est rendue présente pour eux. En cela se vit la communion des saints : l'Église de la terre vient en aide à l'Église qui se purifie, dans l'unique charité qui relie tous les membres du Christ.</p>
      <h2>L'enfer</h2>
      <p>L'enfer est l'état de séparation définitive d'avec Dieu, le sort de celui qui meurt en refusant librement son amour. C'est le Christ lui-même qui l'a révélé, et il en a parlé souvent, toujours pour en détourner les hommes. Pour le nommer, il a employé le mot géhenne, du nom d'un ravin au sud de Jérusalem, la vallée de Hinnom, lieu d'ordures et de feux jadis liés à des cultes idolâtres, devenu l'image du lieu de la perdition. <em>« Craignez plutôt celui qui peut faire périr l'âme et le corps dans la géhenne. »</em> <span class="ref">Matthieu 10:28</span></p>
      <p>La peine de l'enfer est d'abord la perte de Dieu. L'âme a été créée pour le voir face à face et vivre de sa vie ; en être séparée pour toujours est la souffrance la plus profonde, celle d'un être privé de ce qui seul pouvait le combler. La tradition l'appelle la peine du dam. <em>« Ils subiront la peine d'une perdition éternelle, loin de la face du Seigneur. »</em> <span class="ref">2 Thessaloniciens 1:9</span> À cette privation s'ajoute une autre peine, que la tradition nomme la peine du sens et que l'Écriture figure par le feu. <em>« Allez loin de moi, maudits, dans le feu éternel. »</em> <span class="ref">Matthieu 25:41</span> Ce feu dit une souffrance dont la nature dépasse le feu que nous connaissons : l'âme souffre du désordre qu'elle a voulu et de la ruine où l'a conduite son refus.</p>
      <p>L'enfer est éternel. <em>« Ceux-ci iront au châtiment éternel, et les justes à la vie éternelle. »</em> <span class="ref">Matthieu 25:46</span> Son éternité tient à ce qui se fixe à la mort : tant que dure la vie, l'homme peut se reprendre ; la mort clôt ce temps, et l'âme demeure pour toujours dans l'orientation qu'elle a prise. Séparée du corps, elle adhère à son choix de façon définitive, comme les anges se sont fixés au leur dès l'origine.</p>
      <p>Ce qui conduit à l'enfer est le péché mortel, ainsi nommé parce qu'il fait perdre la vie de la grâce dans l'âme. Trois conditions le constituent : une matière grave, la pleine conscience de ce que l'on fait, et un consentement délibéré. Par un tel acte, l'homme se détourne de Dieu comme de sa fin dernière et lui préfère autre chose. Le péché véniel affaiblit cette amitié ; le péché mortel la rompt, et tant que la conversion et le pardon ne l'ont pas relevé, il fixe l'âme dans sa rupture.</p>
      <p>La cause de l'enfer est dans le refus libre de l'homme. Dieu veut le salut de tous et ne destine personne à l'enfer. <em>« Dieu veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. »</em> <span class="ref">1 Timothée 2:4</span> L'enfer est le terme d'un refus conscient et maintenu jusqu'au bout, que Dieu respecte, car aimer suppose de pouvoir refuser. C'est pourquoi le Christ en a averti avec gravité, pour appeler à la conversion ; et l'Église, qui n'a jamais déclaré aucun homme damné, confie tous les défunts à la miséricorde de Dieu, plus grande que tout péché.</p>
      <h2>La résurrection de la chair</h2>
      <p>La résurrection de la chair est la réunion, au dernier jour, de chaque âme à son propre corps, rendu désormais immortel. L'homme est corps et âme : la mort sépare violemment ce qui était fait pour être uni, et le salut que Dieu donne atteint l'homme entier, rendant aussi le corps à la vie.</p>
      <p>Le fondement de cette espérance est la résurrection du Christ : en sortant vivant du tombeau, dans son propre corps, il a ouvert le chemin. <em>« Le Christ est ressuscité des morts, prémices de ceux qui se sont endormis. »</em> <span class="ref">1 Corinthiens 15:20</span> Le mot « prémices » désigne les premiers fruits de la récolte, qui annoncent et garantissent tout le reste : sa résurrection assure la nôtre.</p>
      <p>Le corps qui se relève est le corps même qui fut enseveli, rendu par Dieu à la vie sous une condition nouvelle. L'Écriture l'éclaire par l'image de la semence, qui meurt en terre et reparaît tout autre sans cesser d'être elle-même. <em>« Ce que tu sèmes ne prend vie qu'en mourant ; et tu ne sèmes pas le corps à venir, mais un simple grain. Dieu lui donne un corps comme il l'a voulu. »</em> <span class="ref">1 Corinthiens 15:36-38</span></p>
      <p>Pour ceux que Dieu sauve, ce corps se relève glorieux, paré de quatre qualités que l'Écriture oppose à sa condition présente. <em>« On sème dans la corruption, on ressuscite dans l'incorruptibilité ; on sème dans le déshonneur, on ressuscite dans la gloire ; on sème dans la faiblesse, on ressuscite dans la puissance ; on sème un corps animal, on ressuscite un corps spirituel. »</em> <span class="ref">1 Corinthiens 15:42-44</span> L'impassibilité le rend incapable de souffrir et de mourir ; la clarté le fait resplendir de lumière ; l'agilité le rend prompt à suivre l'âme ; la subtilité le soumet entièrement à l'esprit. Ce corps sera rendu semblable à celui du Christ ressuscité. <em>« Il transformera notre corps de misère pour le rendre semblable à son corps de gloire. »</em> <span class="ref">Philippiens 3:21</span></p>
      <p>Tous les morts ressuscitent, les justes comme les injustes ; la mort vaincue, aucun corps ne se décompose plus. La gloire reste pourtant le partage des seuls sauvés : le corps des damnés se relève immortel et imputrescible, capable de souffrir, et c'est en lui qu'ils portent leur peine. <em>« Tous ceux qui sont dans les tombeaux entendront sa voix et en sortiront : ceux qui auront fait le bien pour une résurrection de vie, ceux qui auront fait le mal pour une résurrection de jugement. »</em> <span class="ref">Jean 5:28-29</span> Cette résurrection aura lieu à la fin du monde, au retour du Christ. L'espérance en traverse déjà tout l'Ancien Testament. <em>« Je sais que mon Rédempteur est vivant, et qu'au dernier jour je me lèverai de la terre ; et de ma chair je verrai Dieu. »</em> <span class="ref">Job 19:25-26</span></p>
      <h2>Le jugement dernier</h2>
      <p>Le jugement dernier est la comparution de tous les hommes devant le Christ, à la fin du monde, après la résurrection des morts. Monté au ciel après sa résurrection, le Christ reviendra une seconde fois, visible de tous, pour juger les vivants et les morts. Ce retour est appelé la Parousie, du grec <em>parousia</em> (παρουσία), « venue » ou « présence ». <em>« Ce Jésus qui a été enlevé au ciel reviendra de la même manière que vous l'avez vu s'en aller. »</em> <span class="ref">Actes 1:11</span></p>
      <p>Le jugement dernier est universel : tous les hommes de toute l'histoire, ressuscités en leur corps, paraissent ensemble devant le Christ juge, chacun jugé tout entier, corps et âme enfin réunis.</p>
      <p>Ce jour révèle ce qui était caché : les pensées, les paroles et les actes de chacun, le bien comme le mal, et leurs conséquences à travers toute l'histoire. <em>« Il mettra en lumière ce qui est caché dans les ténèbres et manifestera les desseins des cœurs. »</em> <span class="ref">1 Corinthiens 4:5</span> Alors le Christ sépare les justes des réprouvés. <em>« Quand le Fils de l'homme viendra dans sa gloire, il séparera les hommes les uns des autres, comme le berger sépare les brebis des boucs. »</em> <span class="ref">Matthieu 25:31-32</span> La mesure du partage est l'amour, jusque dans le plus petit des frères. À ceux qui les ont secourus, il dit : <em>« Ce que vous avez fait à l'un de ces plus petits de mes frères, c'est à moi que vous l'avez fait. »</em> <span class="ref">Matthieu 25:40</span> À ceux qui les ont délaissés : <em>« Ce que vous n'avez pas fait à l'un de ces plus petits, c'est à moi que vous ne l'avez pas fait. »</em> <span class="ref">Matthieu 25:45</span></p>
      <p>Le sort de chacun est déjà fixé à sa mort, et pourtant ce jugement universel accomplit ce que le particulier laissait inachevé. Ce qu'un homme a semé lui survit : le bien et le mal qu'il a répandus portent leurs fruits à travers les siècles, et la vérité entière d'une existence ne se voit qu'à la fin, quand toutes ses conséquences sont accomplies. La justice de Dieu, souvent obscurcie dans le cours de l'histoire où le juste a semblé vaincu et le méchant prospère, éclate enfin devant tous. <em>« Au jour de la révélation du juste jugement de Dieu, il rendra à chacun selon ses œuvres. »</em> <span class="ref">Romains 2:5-6</span></p>
      <p>Le jugement dernier achève l'histoire. La création tout entière, libérée du mal, est renouvelée et associée à la gloire des sauvés. <em>« Nous attendons des cieux nouveaux et une terre nouvelle où la justice habitera. »</em> <span class="ref">2 Pierre 3:13</span> Alors le dessein de Dieu atteint son terme, et il remplit tout de sa présence. <em>« Dieu sera tout en tous. »</em> <span class="ref">1 Corinthiens 15:28</span></p>
