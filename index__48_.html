      <p>Le soir de la Cène, avant de sortir vers le mont des Oliviers, le Christ dit aux Apôtres d'acheter une épée. Cette épée annonce le temps de l'épreuve qui s'ouvre avec sa Passion ; et la nuit même, le Christ défend qu'on s'en serve.</p>
      <h2>Vous n'avez manqué de rien</h2>
      <p>Le Christ part d'un rappel. Lorsqu'il avait envoyé les Apôtres annoncer le Royaume, il les avait fait partir démunis, sans argent ni provisions, et rien ne leur avait fait défaut : <em>« Quand je vous ai envoyés sans bourse, sans sac et sans sandales, avez-vous manqué de quelque chose ? De rien. »</em> <span class="ref">Luc 22:35</span> Tant qu'il était avec eux, ils vivaient sous sa garde, et le monde ne s'était pas encore dressé contre eux.</p>
      <h2>Prenez bourse, sac et épée</h2>
      <p>Le ton change aussitôt : <em>« Mais maintenant, que celui qui a une bourse la prenne, de même un sac ; et que celui qui n'a pas d'épée vende son manteau et en achète une. »</em> <span class="ref">Luc 22:36</span> Ce « maintenant » marque une rupture. Le Christ va être arrêté, jugé, mis à mort ; le temps de la protection visible s'achève, et celui de l'hostilité commence. Bourse, sac et épée disent ce renversement : les Apôtres entrent dans un monde qui les rejettera, et ils doivent s'y préparer. L'épée est le signe de cette opposition qui vient, non l'ordre d'armer une troupe.</p>
      <h2>Compté parmi les malfaiteurs</h2>
      <p>Le Christ donne lui-même la raison de ce changement, et elle tient dans une prophétie : <em>« Il faut que s'accomplisse en moi cette parole : Il a été compté parmi les malfaiteurs. »</em> <span class="ref">Luc 22:37</span> La parole vient du chant du Serviteur souffrant : <em>« Il a été compté parmi les criminels. »</em> <span class="ref">Isaïe 53:12</span> L'heure est venue où le Christ sera condamné et mis à mort comme un criminel, et jusqu'à la croix il sera mis au rang des malfaiteurs, crucifié entre deux d'entre eux. C'est cette heure qui change tout : le Maître va être traité en hors-la-loi, et les siens passent du temps de la garde au temps de l'épreuve. L'épée appartient à ce basculement des temps.</p>
      <h2>Cela suffit</h2>
      <p>Les Apôtres, eux, entendent la lettre et présentent ce qu'ils ont : <em>« Seigneur, voici deux épées. Il leur dit : Cela suffit. »</em> <span class="ref">Luc 22:38</span> Deux épées pour douze hommes ne suffisent à aucun combat ; si le Christ avait voulu les armer, deux lames seraient dérisoires. Son « cela suffit » ne compte pas des armes : il clôt l'échange, devant des disciples qui l'ont pris au pied de la lettre.</p>
      <h2>Range ton épée</h2>
      <p>La nuit même donne le sens du mot. À peine le Christ arrêté, Pierre tire l'épée et tranche l'oreille d'un serviteur du grand prêtre. Le Christ l'arrête net : <em>« Remets ton épée à sa place, car tous ceux qui prendront l'épée périront par l'épée. »</em> <span class="ref">Matthieu 26:52</span> Il guérit aussitôt l'homme blessé, défaisant le coup porté en son nom. Et il montre qu'aucune épée ne le défend : <em>« Penses-tu que je ne puisse pas prier mon Père, qui me donnerait à l'instant plus de douze légions d'anges ? »</em> <span class="ref">Matthieu 26:53</span> Celui qui dispose des armées du ciel n'a pas besoin de deux lames. S'il se laisse prendre, c'est qu'il accepte la coupe : <em>« Ne boirai-je pas la coupe que le Père m'a donnée ? »</em> <span class="ref">Jean 18:11</span></p>
      <h2>L'épée du disciple</h2>

    contenu: `
      <p>« Tendre l'autre joue » appartient au Sermon sur la montagne, où le Christ reprend la loi ancienne pour la porter à son accomplissement. Par cette parole, il appelle à renoncer à la vengeance personnelle et à vaincre le mal par le bien.</p>
      <h2>Œil pour œil</h2>
      <p>La parole part de la loi ancienne, que le Christ cite avant de la porter plus loin : <em>« Vous avez appris qu'il a été dit : Œil pour œil, dent pour dent. Et moi, je vous dis de ne pas résister au méchant ; si quelqu'un te frappe sur la joue droite, présente-lui aussi l'autre. »</em> <span class="ref">Matthieu 5:38-39</span> La règle d'origine venait de Moïse : <em>« Œil pour œil, dent pour dent. »</em> <span class="ref">Exode 21:24</span> On l'entend d'ordinaire comme une loi dure, assoiffée de représailles. Elle était une mesure de modération : dans un monde où l'on tuait pour une offense, elle interdisait que la peine dépasse le tort, un œil pour un œil et rien de plus. Le talion bridait la vengeance en la rendant proportionnée. Là où la loi limitait la riposte, le Christ demande d'y renoncer.</p>
      <h2>La joue droite</h2>
      <p>Le détail de la joue droite précise le sens. Quand deux hommes se font face, une gifle de la main droite, donnée à pleine paume, tombe sur la joue gauche de l'autre ; pour atteindre sa joue droite, il faut le frapper du revers de la main. Ce coup du revers était le geste du mépris, la main qu'un maître levait sur un serviteur : une insulte, plus qu'un coup pour blesser. La parole vise donc l'affront et l'humiliation, là où l'atteinte touche l'honneur plus que le corps.</p>
      <p>Tendre l'autre joue, c'est présenter la gauche : s'offrir à un second coup au lieu de rendre le premier. Le disciple se montre prêt à subir l'affront une fois de plus plutôt que de le retourner. Là est le but : ne pas entrer dans l'engrenage de l'offense. Celui qui rend l'insulte reçue relance la querelle et se laisse mener par celui qui l'a frappé ; celui qui tend l'autre joue interrompt cette chaîne et reste libre, maître de sa réponse au lieu d'obéir à son agresseur.</p>
      <h2>Le sens de la parole</h2>
      <p>Cette parole atteint d'abord le cœur. Elle demande au disciple de renoncer à se venger, d'accepter de souffrir un tort plutôt que de le rendre, de ne pas se faire justice à soi-même. Elle ne supprime pas pour autant la justice : l'autorité garde le devoir de punir le crime et de protéger l'innocent, et nul n'est tenu de livrer un faible aux coups d'un violent au nom de la douceur. Tendre l'autre joue engage la manière dont on répond à l'offense reçue en sa propre personne, non l'abandon de ceux qu'on a charge de défendre.</p>
      <h2>L'exemple du Christ</h2>
      <p>Le Christ lui-même montre comment l'entendre. À son procès, lorsqu'un garde le frappe au visage, il ne se tait pas et ne tend pas l'autre joue à la lettre, mais répond avec dignité : <em>« Si j'ai mal parlé, montre ce que j'ai dit de mal ; mais si j'ai bien parlé, pourquoi me frappes-tu ? »</em> <span class="ref">Jean 18:23</span> Il ne rend pas le coup, et il expose l'injustice au lieu de la venger : sa question place le garde devant son geste et le force à le justifier, ce qu'il ne peut. Mise en pleine lumière, la violence perd toute apparence de droit. L'Écriture dira de lui qu'insulté, il ne rendait pas l'insulte : <em>« Maltraité, il ne menaçait pas, mais s'en remettait à celui qui juge avec justice. »</em> <span class="ref">1 Pierre 2:23</span></p>
      <h2>Laisser à Dieu la vengeance</h2>
      <p>Renoncer à se venger ne livre pas le tort à l'oubli : le disciple le remet à Dieu, seul juge assez juste pour le redresser. <em>« Ne vous vengez pas vous-mêmes ; il est écrit : À moi la vengeance, c'est moi qui rétribuerai, dit le Seigneur. »</em> <span class="ref">Romains 12:19</span> Le disciple ne se résigne pas au mal, il le combat par les armes opposées : <em>« Ne te laisse pas vaincre par le mal, mais sois vainqueur du mal par le bien. »</em> <span class="ref">Romains 12:21</span> Le bien opposé au mal brise la chaîne que la vengeance entretiendrait.</p>
      <h2>Le manteau et le mille</h2>
      <p>La même parole s'étend aussitôt aux biens. <em>« Si quelqu'un veut te faire un procès et prendre ta tunique, laisse-lui encore ton manteau. »</em> <span class="ref">Matthieu 5:40</span> La tunique est le vêtement de dessous ; le manteau, la grande pièce de dessus, plus précieuse, que la Loi protégeait. <em>« Si tu prends en gage le manteau de ton prochain, tu le lui rendras avant le coucher du soleil ; c'est sa seule couverture. »</em> <span class="ref">Exode 22:25-26</span></p>
      <p>La parole passe ensuite à la contrainte. <em>« Si quelqu'un te force à faire un mille, fais-en deux avec lui. »</em> <span class="ref">Matthieu 5:41</span> Le verbe grec employé ici, <em>angareuō</em> (ἀγγαρεύω), désigne la réquisition de l'occupant : un soldat romain pouvait contraindre un habitant à porter sa charge sur une distance fixée, un mille (environ 1,5 km). Ce verbe reparaît à la Passion, pour Simon de Cyrène. <em>« Ils réquisitionnèrent un homme de Cyrène, nommé Simon, pour porter la croix de Jésus. »</em> <span class="ref">Matthieu 27:32</span></p>
      <p>Ces commandements demandent une bienveillance gratuite envers celui qui nous a fait du tort. Reçue là où l'on attendait la riposte, cette bonté peut toucher le cœur de l'offenseur, le porter à se remettre en question, lui laisser entrevoir Dieu, qui en est la source, et ouvre une porte à la conversion. <em>« Si ton ennemi a faim, donne-lui du pain à manger ; s'il a soif, donne-lui de l'eau à boire : tu amasseras des charbons ardents sur sa tête. »</em> <span class="ref">Proverbes 25:21-22</span></p>
      <h2>Pour être fils du Père</h2>
      <p>Le terme de ces paroles est la ressemblance avec Dieu. Quelques lignes plus loin, le Christ élargit le commandement jusqu'à l'ennemi : <em>« Aimez vos ennemis, priez pour ceux qui vous persécutent. »</em> <span class="ref">Matthieu 5:44</span> Et il en donne la raison : agir ainsi rend semblable au Père, dont la bonté ne dépend pas du mérite. <em>« Afin que vous soyez les fils de votre Père qui est dans les cieux, car il fait lever son soleil sur les méchants et sur les bons. »</em> <span class="ref">Matthieu 5:45</span> Celui qui ne rend pas le mal imite la patience de Dieu envers les pécheurs, et s'approche de la mesure qu'il leur propose : <em>« Soyez parfaits comme votre Père céleste est parfait. »</em> <span class="ref">Matthieu 5:48</span></p>

    contenu: `
      <p>Élie est le grand prophète du royaume du Nord, au temps où le roi Achab et la reine Jézabel ont entraîné Israël à servir Baal. Son nom même, en hébreu <em>Eliyahu</em> (<span dir="rtl">אֵלִיָּהוּ</span>), signifie « le Seigneur est mon Dieu », et dément à lui seul le faux dieu qu'on adore alors. Sur le mont Carmel, Élie vient de l'emporter avec éclat : il a défié seul les prophètes de Baal, et le feu du Seigneur est tombé du ciel sur son sacrifice, devant tout le peuple. <em>« Le feu du Seigneur tomba et dévora l'holocauste ; à cette vue, tout le peuple tomba la face contre terre et dit : C'est le Seigneur qui est Dieu ! »</em> <span class="ref">1 Rois 18:38-39</span> Mais Jézabel jure sa mort. Le prophète qui avait tenu tête à tout un royaume prend peur et s'enfuit au désert. C'est là, puis sur la montagne de Dieu, que se joue la scène.</p>
      <h2>Sous le genêt</h2>
      <p>Au désert, Élie s'assied sous un genêt et demande à mourir : <em>« C'en est assez ! Maintenant, Seigneur, prends ma vie, car je ne suis pas meilleur que mes pères. »</em> <span class="ref">1 Rois 19:4</span> Cet effondrement survient juste après la plus grande victoire de sa vie : il vient de voir le feu tomber du ciel, le peuple crier que le Seigneur est Dieu, les prophètes de Baal mis à mort. Un homme qui a obtenu cela ne devrait pas trembler devant la menace d'une femme. S'il s'effondre, c'est qu'une attente s'écroule : il avait cru le Carmel décisif, espéré que cette démonstration briserait la maison d'Achab et ramènerait Israël. La menace de Jézabel lui apprend que rien n'a changé, que la reine règne toujours et que la réforme est déjà morte ; en se disant pas meilleur que ses pères, il se range parmi les prophètes qui ont frappé avant lui sans rien obtenir de durable. Sa peur ne porte pas d'abord sur sa vie : c'est sa cause qu'il croit perdue. Dieu ne lui adresse pourtant aucun reproche. Il l'endort, puis envoie un ange qui le touche et lui donne à manger : <em>« Lève-toi, mange. »</em> <span class="ref">1 Rois 19:5</span> Avant de parler à son cœur, Dieu relève son corps.</p>
      <h2>Le pain du voyage</h2>
      <p>L'ange revient une seconde fois, le touche encore et lui découvre le sens de cette nourriture : <em>« Lève-toi, mange, car le chemin est trop long pour toi. »</em> <span class="ref">1 Rois 19:7</span> Élie se lève et part : <em>« Il marcha, soutenu par cette nourriture, quarante jours et quarante nuits jusqu'à l'Horeb. »</em> <span class="ref">1 Rois 19:8</span> Un pain donné par le ciel porte un homme bien au-delà de ce qu'aucune nourriture ne peut faire, et le mène jusqu'à la montagne où Dieu se laisse trouver. L'Église y reconnaît la figure de l'Eucharistie, le pain qui nourrit l'âme et lui donne de tenir tout le long du chemin vers Dieu.</p>
      <h2>La montagne</h2>
      <p>L'Horeb est la montagne de l'Alliance, celle où Dieu avait donné sa loi à Moïse. En y montant après quarante jours de marche, comme Moïse y était demeuré quarante jours, Élie remonte à la source. Il entre dans une caverne, et la parole de Dieu lui est adressée : <em>« Que fais-tu ici, Élie ? »</em> <span class="ref">1 Rois 19:9</span> La question ne cherche pas un renseignement : elle invite le prophète à dire ce qui l'habite. Élie répond par sa plainte, son zèle pour le Seigneur, sa solitude, sa vie menacée : <em>« Je suis resté, moi seul, et ils cherchent à m'ôter la vie. »</em> <span class="ref">1 Rois 19:10</span></p>
      <h2>La voix de fin silence</h2>
      <p>Dieu fait sortir Élie et lui ordonne de se tenir sur la montagne, car il va passer. Trois forces se déchaînent alors, et dans aucune Dieu ne se trouve. Un vent violent déchire les montagnes et brise les rochers : <em>« Le Seigneur n'était pas dans le vent. »</em> Puis un tremblement de terre, puis un feu, et chaque fois la même parole : <em>« Le Seigneur n'était pas dans le tremblement de terre, ni dans le feu. »</em> <span class="ref">1 Rois 19:11-12</span> Vient enfin tout autre chose : <em>« Après le feu, le murmure d'une brise légère. »</em> <span class="ref">1 Rois 19:12</span> L'hébreu dit <em>qol demamah daqqah</em> (<span dir="rtl">קוֹל דְּמָמָה דַקָּה</span>), une voix de fin silence, le son ténu d'un calme presque sans bruit. C'est là que Dieu se tient.</p>
      <p>Le vent, le séisme et le feu sont les grandes forces par lesquelles on attend Dieu, celles qui dans l'Écriture escortent ses manifestations. En les laissant passer sans s'y trouver, il détrompe le prophète sur la manière dont il se donne. Sur le Carmel, Élie l'avait vu répondre par le feu, dans l'éclat et la puissance, et c'est encore un Dieu de feu qu'il attend ; lui-même est un prophète de feu, plein d'un zèle ardent. Or celui qui s'approche se tient dans la brise ténue, dans la douceur et le silence. Sa présence la plus intime ne se trouve pas dans le fracas qui terrifie, mais dans le souffle léger que l'on ne perçoit qu'en faisant taire tout bruit. Qui cherche Dieu dans le tumulte passe à côté de lui ; c'est au-dedans, dans le silence, qu'il se laisse rejoindre. Cette douceur où Dieu se révèle annonce de loin celle du Christ : <em>« Apprenez de moi que je suis doux et humble de cœur. »</em> <span class="ref">Matthieu 11:29</span></p>
      <p>À ce souffle, Élie se voile le visage : <em>« Élie s'enveloppa le visage de son manteau. »</em> <span class="ref">1 Rois 19:13</span> Le geste reconnaît la présence de Dieu, devant qui l'homme ne peut garder les yeux ouverts.</p>
      <h2>Sept mille</h2>
      <p>La même question revient, <em>« Que fais-tu ici, Élie ? »</em>, et le prophète redit sa plainte, mot pour mot. Toute cette plainte tenait dans un mot, répété deux fois : il est resté seul. C'est sur cette conviction que reposait son désir de mourir sous le genêt : s'il est le dernier fidèle et qu'on le traque, tout est perdu et lui avec. Dieu défait cette certitude d'une phrase : <em>« Je me réserverai en Israël sept mille hommes, tous ceux dont les genoux n'ont pas fléchi devant Baal. »</em> <span class="ref">1 Rois 19:18</span> Élie se croyait seul ; ils sont sept mille. Le prophète lisait sa situation à l'envers : là où il ne voyait que défaite et abandon, Dieu gardait en secret tout un peuple resté fidèle. La cause de Dieu ne tient jamais à un seul homme, et son œuvre ne s'éteint pas quand celui qui la porte se croit fini. Relevé de sa solitude, Élie est renvoyé vers les hommes : Dieu lui confie d'oindre des rois et de se donner un successeur, Élisée, qui prophétisera après lui. <em>« Tu oindras Hazaël comme roi sur la Syrie, et Élisée comme prophète à ta place. »</em> <span class="ref">1 Rois 19:15-16</span></p>
      <p>Plus tard, sur une autre montagne, Élie se tiendra de nouveau devant Dieu : auprès de Moïse, il apparaîtra dans la gloire et s'entretiendra avec le Christ transfiguré. <em>« Et voici que Moïse et Élie leur apparurent, s'entretenant avec lui. »</em> <span class="ref">Matthieu 17:3</span> Celui qui avait cherché Dieu dans le murmure de l'Horeb le contemple alors face à face dans le Fils.</p>

    contenu: `
      <p>Jacob revient dans son pays après vingt ans passés loin de chez lui, chez son oncle Laban. Le retour l'angoisse, car il doit y retrouver Ésaü, le frère jumeau qu'il avait autrefois dépouillé : il lui avait pris son droit d'aînesse, puis, par une tromperie, la bénédiction que leur père Isaac lui réservait. La veille de leurs retrouvailles, Jacob fait passer un torrent, le Yabboq, à ses femmes, ses enfants et ses troupeaux, puis demeure seul sur l'autre rive. C'est là, dans la nuit, qu'un homme l'attaque et lutte avec lui jusqu'à l'aube.</p>
      <h2>Le combat</h2>
      <p>Tout commence par l'identité de celui qui engage le combat. Le récit l'appelle un homme, et Jacob dira au matin avoir vu Dieu. Celui qui l'attaque est <a href="#/article/l-ange-du-seigneur">l'ange du Seigneur</a>. Osée le nomme ainsi : <em>« Il lutta avec l'ange et l'emporta. »</em> <span class="ref">Osée 12:5</span> L'ange du Seigneur lutte avec Jacob toute la nuit : <em>« Jacob étant resté seul, un homme lutta avec lui jusqu'au lever de l'aurore. »</em> <span class="ref">Genèse 32:25</span> Or il ne parvient pas à le vaincre. Que Dieu ne puisse pas l'emporter sur un homme dit assez qu'il se retient : il agit comme un père qui lutte avec son enfant et fait exprès de le laisser gagner, retenant sa force pour que Jacob tienne bon et s'engage tout entier. Puis, d'un seul geste, il lui touche la hanche et la déboîte. L'unique coup qu'il porte atteint le point d'appui du corps, là où l'homme prend sa force pour marcher et pour lutter. Jacob continue pourtant de tenir, et lorsque le jour menace de paraître, il refuse de laisser partir celui qu'il a saisi : <em>« Je ne te laisserai point aller que tu ne m'aies béni. »</em> <span class="ref">Genèse 32:27</span> Cet homme qui avait pris la bénédiction de son père par la ruse ne la dérobe plus : il la réclame en face, et s'y agrippe.</p>
      <h2>Le nom</h2>
      <p>Au cœur du combat se joue une transformation, et elle passe par le nom. Avant de bénir Jacob, l'ange du Seigneur lui demande quel est son nom, et Jacob répond : <em>« Jacob. »</em> <span class="ref">Genèse 32:28</span> Dieu connaît ce nom ; s'il le lui fait dire, c'est pour que Jacob avoue qui il est. Car ce nom le résume : Jacob, en hébreu <em>Ya'aqob</em> (<span dir="rtl">יַעֲקֹב</span>), est bâti sur le mot <em>'aqeb</em> (<span dir="rtl">עָקֵב</span>), le talon, et désigne celui qui talonne, qui supplante, qui prend la place d'un autre. À sa naissance déjà, il tenait le talon de son frère jumeau ; toute sa vie ensuite, il a vécu de ruse. En prononçant son nom, il reconnaît ce qu'il a été. C'est alors seulement que Dieu lui en donne un autre : <em>« Tu ne seras plus appelé Jacob, mais Israël, car tu as lutté avec Dieu et avec les hommes, et tu as vaincu. »</em> <span class="ref">Genèse 32:29</span> Israël, en hébreu <em>Yisra'el</em> (<span dir="rtl">יִשְׂרָאֵל</span>), signifie celui qui lutte avec Dieu, ou celui que Dieu fortifie. L'homme qui se définissait par ses combats rusés contre les hommes se définit désormais par sa lutte avec Dieu. Et ce nom n'est pas seulement le sien : en renommant Jacob, Dieu fait plus que transformer un homme, il pose le commencement d'Israël, le peuple tout entier qui portera ce nom.</p>
      <h2>La blessure</h2>
      <p>La hanche est l'appui du corps, le point où l'homme tient debout et trouve sa force. En la déboîtant, Dieu brise cet appui et, avec lui, l'orgueil et la nature charnelle de Jacob. L'ancien Jacob est ainsi humilié pour laisser place à l'homme nouveau, soumis à Dieu et appuyé sur lui seul. <em>« Vous avez dépouillé le vieil homme avec ses œuvres, et revêtu l'homme nouveau. »</em> <span class="ref">Colossiens 3:9-10</span></p>
      <h2>Face de Dieu</h2>
      <p>Quand l'aube se lève, l'adversaire demande à partir. Jacob veut savoir son nom, mais l'ange du Seigneur le bénit sans le lui dire, et s'efface. Jacob comprend alors avec qui il a lutté toute la nuit, et il donne au lieu le nom de <em>Penuel</em> (<span dir="rtl">פְּנוּאֵל</span>), qui signifie Face de Dieu : <em>« J'ai vu Dieu face à face, et ma vie a été sauvée. »</em> <span class="ref">Genèse 32:31</span> Ce dernier mot révèle l'enjeu de la scène. Dans l'Écriture, voir Dieu en face passe pour mortel, car nul ne peut soutenir sa présence. Jacob, lui, en sort vivant : ce Dieu vient pour bénir, et sa face, qui devrait foudroyer, le laisse en vie.</p>
      <p>Le lendemain, pour aller au-devant d'Ésaü qu'il redoutait, Jacob passe en tête, le premier devant les siens, lui qui s'était tenu en arrière toute la veille. <em>« Lui-même passa devant eux. »</em> <span class="ref">Genèse 33:3</span></p>

      <h2>Une seule réalité</h2>

      <p>Timothée veille sur l'Église d'Éphèse, troublée par de faux docteurs qui répandent des doctrines fausses et égarent des fidèles mal affermis. C'est dans ce désordre qu'est écrite la lettre. Sa première parole sur les femmes est une invitation à recevoir l'instruction : <em>« Que la femme reçoive l'instruction en silence, en toute soumission. »</em> <span class="ref">1 Timothée 2:11</span> Le mot grec rendu par « silence », <em>hésychia</em> (ἡσυχία), désigne le calme, la tranquillité. Le texte demande donc une attitude d'écoute et d'ordre, et non un mutisme. Avant d'enseigner, il faut d'abord être instruit ; à Éphèse, des femmes gagnées par l'erreur voulaient enseigner sans l'être encore.</p>

      <h2>Le voile et la tête rasée</h2>
      <p>À Corinthe, le voile était le signe de la femme honorable. Une femme respectée se couvrait la tête en public ; paraître dévoilée dans l'assemblée la rangeait, aux yeux de tous, du côté des femmes de mauvaise réputation. La tête rasée, elle, était une marque d'infamie : on rasait les esclaves, et la tonte signait le déshonneur de la femme adultère.</p>
      <p>C'est sur cet usage que repose le raisonnement de la lettre. Il prend la femme au mot. Si elle fait si peu de cas de son honneur en écartant le voile, qu'elle aille jusqu'au bout et se fasse tondre, mais puisqu'elle aurait honte d'être tondue, qu'elle garde plutôt son voile : <em>« Si une femme ne se voile pas, qu'elle se tonde ; mais s'il est honteux pour une femme d'être tondue ou rasée, qu'elle se voile. »</em> <span class="ref">1 Corinthiens 11:6</span> Le voile demandé est donc un signe de dignité, celui-là même qui distinguait la femme honorable.</p>
      <p>Le texte appuie enfin ce signe sur la nature elle-même, qui sépare déjà l'homme et la femme jusque dans la chevelure : <em>« La nature ne vous enseigne-t-elle pas que c'est une honte pour l'homme de porter les cheveux longs, mais que c'est une gloire pour la femme, parce que la chevelure lui a été donnée comme voile ? »</em> <span class="ref">1 Corinthiens 11:14-15</span> Les cheveux longs sont la parure de la femme et son voile naturel ; pour l'homme, ils passaient pour un déshonneur. Puisque la nature voile déjà la femme de sa chevelure, le voile qu'elle porte dans le culte prolonge ce signe.</p>

      <h2>Un signe d'autorité, devant les anges</h2>
      <p>Le texte nomme enfin le voile d'un mot surprenant : <em>« La femme doit avoir sur la tête une marque d'autorité, à cause des anges. »</em> <span class="ref">1 Corinthiens 11:10</span> Le mot grec rendu ici par « marque d'autorité », <em>exousia</em> (ἐξουσία), dit le pouvoir : littéralement, la femme porte une autorité sur la tête. Cette autorité est la sienne : le voile est le signe du pouvoir qui lui est reconnu de prier et de prophétiser dans l'assemblée. Le texte l'a rappelé plus haut : la femme y prie et y prophétise ; le voile marque sa dignité de participante au culte, celle qui se tient et prend la parole devant Dieu au milieu de tous.</p>
      <p>Reste le motif le plus énigmatique : à cause des anges. Les anges assistent à la prière de l'Église, où la liturgie de la terre rejoint celle du ciel. Gardiens de l'ordre que Dieu a établi dans sa création, ils sont les témoins de l'assemblée en prière, et devant eux la tenue du culte honore cet ordre : ce que les hommes font dans la prière se déroule sous le regard du ciel.</p>
      <h2>Le principe et la coutume</h2>
      <p>Ces signes éclairés, on peut distinguer ce qui demeure de ce qui passe. La forme concrète, le voile, la tête couverte ou nue, la longueur des cheveux, tenait aux usages d'un temps et d'un lieu : elle disait alors la dignité, la pudeur et l'ordre reçu de Dieu. Ces usages ont changé, et l'Église n'impose plus le voile comme une loi. Le texte lui-même n'en faisait pas une règle absolue : <em>« Si quelqu'un se plaît à contester, nous n'avons pas cette habitude, ni les Églises de Dieu. »</em> <span class="ref">1 Corinthiens 11:16</span></p>
      <p>Ce que le passage demande de garder traverse les siècles : honorer Dieu jusque dans le corps et la tenue, recevoir la différence de l'homme et de la femme comme un don du Créateur, et les tenir ensemble tournés vers le Christ, en qui <em>« il n'y a plus ni homme ni femme, car vous êtes tous un. »</em> <span class="ref">Galates 3:28</span></p>

    contenu: `
      <p>Le verset appartient à un poème célèbre du livre de l'Ecclésiaste, où le sage énumère les temps de l'existence : <em>« Il y a un moment pour tout, et un temps pour toute chose sous le ciel. »</em> <span class="ref">Ecclésiaste 3:1</span> Suivent quatorze paires d'opposés qui parcourent toute la vie humaine : naître et mourir, planter et arracher, pleurer et rire, se taire et parler. Au milieu d'elles vient la parole la plus rude : <em>« un temps pour tuer, et un temps pour guérir ; un temps pour démolir, et un temps pour bâtir. »</em> <span class="ref">Ecclésiaste 3:3</span></p>
      <p>Le commandement dit pourtant « Tu ne tueras point ». L'Écriture accorderait-elle alors un temps pour tuer ?</p>
      <h2>Le regard du sage</h2>
      <p>Le poème pose un regard sur le déroulement de la vie. Chaque chose y a son moment, et aucune saison ne dure toujours ; l'homme les traverse sans en fixer le cours, car ils lui sont donnés. Le sage observe ce qui se passe sous le soleil, la vie de l'homme dans les limites de ce monde, où les saisons tournent et reviennent. Il décrit ce qu'il voit. Quand il nomme un temps pour tuer, il constate ce que traverse l'histoire des hommes, sans ouvrir à personne le droit d'ôter la vie. La maîtrise de ces temps appartient à Dieu seul, qui les tient et les ordonne.</p>
      <h2>Le sens d'une parole difficile</h2>
      <p>Le commandement est souvent connu sous la forme « Tu ne tueras point ». En français, le mot « tuer » couvre tout fait d'ôter la vie. Le commandement, lui, vise une chose précise : le meurtre, ôter injustement la vie à un innocent. Le texte le dit exactement : <em>« Tu ne commettras pas de meurtre. »</em> <span class="ref">Exode 20:13</span> La gravité en est extrême, car la vie de l'homme porte en elle l'image de Dieu : <em>« Qui verse le sang de l'homme, par l'homme son sang sera versé ; car Dieu a fait l'homme à son image. »</em> <span class="ref">Genèse 9:6</span> Le sang de l'innocent crie vers Dieu, comme celui d'Abel monté de la terre : <em>« La voix du sang de ton frère crie de la terre jusqu'à moi. »</em> <span class="ref">Genèse 4:10</span></p>
      <p>Le poème, lui, emploie un mot plus large. Il embrasse les temps où la vie est ôtée sans qu'il y ait meurtre : dans la guerre qui défend un peuple, dans la protection de l'innocent menacé, dans l'exercice de la justice. Ces temps appartiennent à l'histoire d'un monde blessé par le péché, où la vie doit parfois être défendue au prix du sang. La parole du sage et le commandement s'accordent ainsi pleinement : l'un observe les saisons d'un monde déchu, l'autre garde inviolable la vie de l'innocent.</p>
      <h2>Toute chose belle en son temps</h2>
      <p>Cette parole prend place parmi les temps que Dieu ordonne. Au terme du poème, le sage en découvre la source : <em>« Il fait toute chose belle en son temps ; il a mis aussi dans leur cœur la pensée de l'éternité. »</em> <span class="ref">Ecclésiaste 3:11</span> Même les heures les plus rudes sont tenues par une main qui les rend belles à l'heure voulue, et dans le cœur de l'homme demeure le désir d'une chose qui ne passe pas.</p>
      <h2>La plénitude des temps</h2>
      <p>Ces temps trouvent leur centre dans le Christ : <em>« Lorsque vint la plénitude des temps, Dieu envoya son Fils. »</em> <span class="ref">Galates 4:4</span> En lui, le désir d'éternité reçoit sa réponse, et le temps le plus sombre du poème est traversé par Dieu lui-même. À l'heure où des hommes mettent à mort l'Innocent, sans qu'aucune parole ne l'excuse, Dieu tire de ce sang versé la guérison du monde, par la mort et la résurrection de son Fils.</p>
      <p>Le poème de l'Ecclésiaste conduit ainsi à une paix : aucune saison de la vie, même la plus rude, n'échappe à la main de Dieu. Tout a son temps, et tous les temps sont tenus par celui qui les a faits et qui, dans le Christ, les conduit vers l'éternité.</p>

      <p>Au Temple de Jérusalem, le Christ soutient une longue dispute avec des interlocuteurs qui se réclament d'Abraham comme de leur père. La discussion porte sur Abraham, sur la mort et sur l'identité du Christ, et elle s'achève par l'affirmation qu'il est avant Abraham. Suivre la dispute depuis son origine fait voir comment elle y conduit, et ce que cette parole déclare.</p>
      <h2>La dispute sur la filiation d'Abraham</h2>
      <p>Les interlocuteurs du Christ tiennent leur descendance d'Abraham pour un titre suffisant devant Dieu. Le Christ déplace la question : la vraie filiation tient aux œuvres, non au sang. <em>« Si vous étiez enfants d'Abraham, vous feriez les œuvres d'Abraham. »</em> <span class="ref">Jean 8:39</span> Et leur œuvre est l'inverse de celle d'Abraham. <em>« Mais maintenant, vous cherchez à me faire mourir, moi qui vous ai dit la vérité que j'ai entendue de Dieu : Abraham n'a point fait cela. »</em> <span class="ref">Jean 8:40</span></p>
      <p>Cette parole dit plus qu'elle ne paraît. Pour qu'Abraham n'ait pas cherché à le faire mourir, il fallait qu'Abraham l'ait eu devant lui. Et Abraham l'avait bien eu devant lui : le Seigneur lui était apparu aux chênes de Mambré, et Abraham l'avait accueilli. <em>« Abraham leva les yeux, et voici, trois hommes se tenaient près de lui ; il courut à leur rencontre depuis l'entrée de sa tente, et se prosterna jusqu'à terre. »</em> <span class="ref">Genèse 18:2</span> La tradition reconnaît dans ces trois hôtes l'apparition du Dieu unique en trois Personnes, le Père, le Fils et l'Esprit, venu visiter Abraham. Abraham a reçu et servi ce Seigneur ; eux, devant le Fils maintenant venu dans la chair, cherchent à le faire mourir. Le sang d'Abraham ne fait pas d'eux ses fils quand leur acte renie ce qu'Abraham a fait. Leur conduite dénonce une autre origine. <em>« Vous avez pour père le diable, et vous voulez accomplir les désirs de votre père. »</em> <span class="ref">Jean 8:44</span> À ceux qui se disent fils d'Abraham, le Christ va révéler qu'il est avant Abraham.</p>
      <h2>Le jour du Christ</h2>
      <p>Au cœur de l'échange, le Christ déclare : <em>« Abraham, votre père, a tressailli de joie à la pensée de voir mon jour : il l'a vu, et il s'est réjoui. »</em> <span class="ref">Jean 8:56</span> Abraham a vécu près de deux mille ans plus tôt. Le jour du Christ désigne sa venue parmi les hommes et l'œuvre de salut qu'il y accomplit, le moment où Dieu réalise dans la chair ce qu'il avait promis depuis les origines. Dire qu'Abraham l'a vu, c'est placer ce jour au centre de toute l'histoire, et affirmer qu'Abraham l'a connu d'avance, dans la lumière de la foi qui rend présent ce qui demeure à venir.</p>
      <h2>La foi qui voit de loin</h2>
      <p>Abraham a reçu de Dieu une promesse : une descendance innombrable, et par elle une bénédiction pour toutes les nations. <em>« En ta postérité seront bénies toutes les nations de la terre. »</em> <span class="ref">Genèse 22:18</span> Cette postérité par laquelle vient la bénédiction est le Christ lui-même. <em>« Les promesses ont été faites à Abraham et à sa postérité, qui est le Christ. »</em> <span class="ref">Galates 3:16</span> En croyant à la promesse, Abraham croyait à celui qui devait l'accomplir : sa foi portait déjà sur le Christ à venir. Les patriarches ont vécu et sont morts dans cette attente, voyant de loin ce qui leur était promis. <em>« C'est dans la foi qu'ils sont tous morts, sans avoir reçu l'objet des promesses, mais l'ayant vu et salué de loin. »</em> <span class="ref">Hébreux 11:13</span> La vision d'Abraham appartient à cette foi : il a salué de loin le jour du Christ.</p>
      <h2>Comment Abraham a vu ce jour</h2>
      <p>Abraham a vu ce jour dans un événement précis de sa vie. Dieu lui demande d'offrir Isaac, son fils unique, celui qu'il aime. Le père et le fils montent ensemble vers la montagne, et Isaac porte sur lui le bois du sacrifice. À l'enfant qui s'étonne de l'agneau qui manque, Abraham répond : <em>« Dieu pourvoira lui-même à l'agneau pour l'holocauste, mon fils. »</em> <span class="ref">Genèse 22:8</span> Au dernier instant, la main d'Abraham est arrêtée, et un bélier est offert à la place d'Isaac. Abraham y contemple d'avance le sacrifice du Fils unique : un père qui conduit son fils bien-aimé, un fils qui porte le bois de son offrande, une victime substituée pour que la vie soit rendue, tout y montre par avance le sacrifice du Christ, où le Fils livré par le Père porte lui-même le bois de la croix et meurt pour rendre la vie aux hommes.</p>
      <p>La joie d'Abraham est inscrite jusque dans le nom de son fils. Le nom d'Isaac, en hébreu <em>Yitsḥaq</em> (<span dir="rtl">יִצְחָק</span>), signifie « il rit » : à l'annonce de sa naissance, donné contre toute espérance, Abraham puis Sarah avaient ri, et ce rire devint le nom de l'enfant de la promesse. <em>« Dieu m'a donné sujet de rire ; quiconque l'apprendra rira avec moi. »</em> <span class="ref">Genèse 21:6</span> En Isaac, fils unique reçu et rendu, Abraham tenait déjà le gage du salut à venir, et sa joie était celle de qui voit de loin le jour du Christ.</p>
      <h2>Avant qu'Abraham fût, je suis</h2>
      <p>Ses interlocuteurs ne retiennent que l'impossible. <em>« Tu n'as pas cinquante ans, et tu as vu Abraham ! »</em> <span class="ref">Jean 8:57</span> Le Christ répond par une parole qui ne dit plus seulement qu'il a vu Abraham, mais qu'il est avant lui. <em>« En vérité, en vérité, je vous le dis, avant qu'Abraham fût, je suis. »</em> <span class="ref">Jean 8:58</span></p>
      <p>Tout tient dans le choix des mots. Abraham « fût » : il a commencé d'exister, il est venu à l'être à un moment du temps. Le Christ, lui, dit « je suis », au présent. Le mot grec rendu par « je suis », <em>egō eimi</em> (ἐγώ εἰμι), ne dit pas « j'étais avant Abraham », mais « je suis ». Abraham appartient au devenir et au temps ; le Christ se tient dans un présent qui ne commence pas. Là où l'on attendait « j'étais déjà », il dit « je suis », et cet écart même affirme l'éternité.</p>
      <p>Cette parole reprend le Nom que Dieu avait révélé à Moïse au buisson ardent. <em>« Je suis celui qui suis. »</em> <span class="ref">Exode 3:14</span> Dans la version grecque de l'Écriture que lisaient ses interlocuteurs, Dieu s'y nomme <em>egō eimi</em>, des mots mêmes que le Christ prononce pour lui-même. Il s'attribue ainsi le Nom divin et se déclare éternel, le Fils qui est de toujours auprès du Père, avant de venir dans la chair.</p>
      <p>Cette déclaration couronne tout l'échange. Deux fois déjà, le Christ avait dit « je suis » de la même manière absolue. <em>« Si vous ne croyez pas que je suis, vous mourrez dans vos péchés. »</em> <span class="ref">Jean 8:24</span> Puis : <em>« Quand vous aurez élevé le Fils de l'homme, alors vous connaîtrez que je suis. »</em> <span class="ref">Jean 8:28</span> La parole sur Abraham est le troisième de ces « je suis » et le plus haut.</p>
      <h2>La pierre levée</h2>
      <p>À ces mots, ses interlocuteurs prennent des pierres pour le lapider. <em>« Ils prirent donc des pierres pour les jeter contre lui ; mais Jésus se cacha et sortit du Temple. »</em> <span class="ref">Jean 8:59</span> Leur geste dit qu'ils ont parfaitement compris : qu'un homme se nomme du Nom de Dieu est à leurs yeux un blasphème, que la Loi punit de la lapidation. <em>« Celui qui blasphème le nom du Seigneur sera mis à mort ; toute l'assemblée le lapidera. »</em> <span class="ref">Lévitique 24:16</span> La réaction confirme le sens de la parole : le Christ ne s'est pas dit plus ancien qu'Abraham au sens d'une longue vie, il s'est dit Dieu.</p>
      <p>Le jour du Christ traverse ainsi toute l'Écriture. Avant même sa venue, il était promis, attendu et vu de loin par les justes qui vivaient de la foi en lui, et Abraham, le père des croyants, a porté cette espérance et s'est réjoui de la voir s'ouvrir. Celui qu'Abraham a vu de loin se tient maintenant au Temple et se nomme du Nom de Dieu. Pour qui croit, la venue du Christ accomplit ce que Dieu préparait depuis Abraham, et celui qui l'accomplit est Dieu lui-même, venu dans la chair.</p>

    contenu: `
      <p>Le baptême est le premier des sacrements et la porte de tous les autres. Par lui, l'homme naît à une vie nouvelle, devient enfant de Dieu, membre du Christ et de son Église. C'est une nouvelle naissance : par la naissance naturelle, l'homme reçoit la vie humaine ; par le baptême, il reçoit la vie divine, une participation à la vie même de Dieu, ce que l'on nomme la grâce sanctifiante.</p>
      <h2>Une nouvelle naissance</h2>
      <p>Le Christ en a révélé la nécessité à Nicodème, ce notable venu l'interroger de nuit, en lui annonçant qu'on ne peut voir Dieu sans renaître d'en haut. <em>« En vérité, en vérité, je te le dis : nul, s'il ne naît d'eau et d'Esprit, ne peut entrer dans le royaume de Dieu. »</em> <span class="ref">Jean 3:5</span> L'eau et l'Esprit agissent ensemble : l'eau est le signe visible, l'Esprit la force invisible qui donne la vie.</p>
      <h2>Les figures de l'Ancienne Alliance</h2>
      <p>Dieu avait préparé ce sacrement par des figures, tout au long de l'Ancienne Alliance, où l'eau tient déjà ce double pouvoir de faire périr et de sauver. Au déluge, les eaux engloutissent un monde livré au péché, et portent l'arche qui sauve les justes. <em>« Ce petit nombre fut sauvé à travers l'eau. Cette eau était la figure du baptême qui vous sauve aujourd'hui. »</em> <span class="ref">1 Pierre 3:20-21</span> À la sortie d'Égypte, le peuple traverse la mer Rouge à pied sec et passe de l'esclavage à la liberté ; les eaux qui l'ouvrent se referment sur Pharaon. <em>« Nos pères ont tous passé à travers la mer, et tous ont été baptisés en Moïse dans la nuée et dans la mer. »</em> <span class="ref">1 Corinthiens 10:1-2</span> Le passage du Jourdain, qui fait entrer Israël dans la Terre promise, annonce de même l'entrée du baptisé dans la vie.</p>
      <h2>Le baptême du Christ</h2>
      <p>Le Christ lui-même est descendu dans les eaux du Jourdain. Sans péché, il n'avait nul besoin d'être purifié ; il s'est rangé parmi les pécheurs pour prendre sur lui leur condition, et en touchant l'eau, il l'a sanctifiée pour qu'elle puisse désormais laver et faire renaître. Au moment où il remonte de l'eau, la Trinité tout entière se révèle. <em>« Dès que Jésus eut été baptisé, les cieux s'ouvrirent, et il vit l'Esprit de Dieu descendre comme une colombe ; et une voix dit : Celui-ci est mon Fils bien-aimé. »</em> <span class="ref">Matthieu 3:16-17</span> Le baptême chrétien plonge ainsi dans cette eau que le Christ a traversée le premier, et donne ce qu'annonçait le sien : l'Esprit reçu et le nom de fils de Dieu.</p>
      <h2>La purification de tout péché</h2>
      <p>Le baptême efface tout péché. Il remet le péché originel, cette privation de la grâce héritée des origines, et, chez celui qui le reçoit après l'âge de raison, tous les péchés personnels commis jusque-là. L'âme en sort entièrement purifiée, lavée de toute dette devant Dieu, et reçoit en même temps le don de l'Esprit. <em>« Repentez-vous, et que chacun de vous soit baptisé pour le pardon de ses péchés, et vous recevrez le don du Saint-Esprit. »</em> <span class="ref">Actes 2:38</span></p>
      <h2>La vie nouvelle dans le Christ</h2>
      <p>Le baptême donne plus encore qu'un pardon : une vie nouvelle. Le baptisé renaît comme fils dans le Fils, partageant la condition de fils du Christ devant le Père. Il reçoit la grâce sanctifiante, devient temple de l'Esprit Saint, et reçoit avec elle les vertus de foi, d'espérance et de charité, qui le rendent capable de croire, d'espérer et d'aimer en Dieu. Cette entrée dans la vie nouvelle est une plongée dans la mort et la résurrection du Christ. <em>« Par le baptême, nous avons été ensevelis avec lui dans la mort, afin que, comme le Christ est ressuscité d'entre les morts, nous menions nous aussi une vie nouvelle. »</em> <span class="ref">Romains 6:4</span></p>
      <h2>Incorporé au Christ et à son Église</h2>
      <p>Le même Esprit qui fait renaître le baptisé l'unit au Christ et l'agrège à son corps. Il devient membre d'un peuple, intégré à l'Église. <em>« C'est dans un seul Esprit que nous avons tous été baptisés pour former un seul corps. »</em> <span class="ref">1 Corinthiens 12:13</span> Uni au Christ prêtre, prophète et roi, il prend part à son sacerdoce, pour offrir sa vie à Dieu, à sa mission prophétique, pour témoigner de l'Évangile, et à sa royauté, pour servir. Toute distinction d'origine s'efface entre les baptisés, devenus un seul dans le Christ.</p>
      <h2>Le ministre et la matière</h2>
      <p>Le sacrement se réalise par un geste simple et des paroles précises. La matière est l'eau naturelle, versée sur le front ou reçue par immersion ; la forme est la parole prononcée en même temps : « Je te baptise au nom du Père et du Fils et du Saint-Esprit ». Cette formule vient du Seigneur lui-même, qui l'a donnée à son Église pour tous les temps. <em>« Allez, de toutes les nations faites des disciples, les baptisant au nom du Père et du Fils et du Saint-Esprit. »</em> <span class="ref">Matthieu 28:19</span> Le ministre ordinaire est l'évêque, le prêtre ou le diacre ; mais en cas de nécessité, lorsqu'une vie est en danger, tout homme peut baptiser, même non baptisé, pourvu qu'il verse l'eau en prononçant la formule et qu'il ait l'intention de faire ce que fait l'Église.</p>
      <h2>Le sceau indélébile</h2>
      <p>Le baptême imprime dans l'âme une marque qui ne s'efface pas, un sceau spirituel qui configure au Christ pour toujours. C'est pourquoi il se reçoit une seule fois et ne peut jamais être répété. Marqué de ce sceau, le baptisé revêt la vie même du Christ. <em>« Vous tous qui avez été baptisés en Christ, vous avez revêtu le Christ. »</em> <span class="ref">Galates 3:27</span></p>
      <h2>La nécessité et le baptême des enfants</h2>
      <p>L'Église tient le baptême pour nécessaire au salut, selon la parole même du Seigneur. <em>« Celui qui croira et sera baptisé sera sauvé. »</em> <span class="ref">Marc 16:16</span> Pour ceux qui meurent sans avoir pu le recevoir, le désir du baptême, ou le martyre subi pour le Christ, peut suppléer à l'eau : c'est le baptême de désir et le baptême de sang. L'Église baptise aussi les petits enfants, pour leur ouvrir cette grâce dès le seuil de leur vie, confiante que le don de Dieu précède toujours la réponse de l'homme.</p>

      <p>La grâce est donnée sans être due. Elle précède l'homme et le devance, sans répondre à aucun mérite : c'est Dieu qui aime et donne le premier. Là est sa nature même, que rien dans l'homme ne vient acquérir : <em>« Si c'est par grâce, ce n'est plus à cause des œuvres ; autrement la grâce ne serait plus la grâce. »</em> <span class="ref">Romains 11:6</span></p>
      <h2>Nécessaire, et offerte à tous</h2>
      <p>Sans la grâce, l'homme ne peut rien accomplir qui le conduise à Dieu : elle est le commencement de toute vie avec lui et le soutien de tout le chemin, car nul ne s'approche de Dieu par ses seules forces : <em>« Sans moi, vous ne pouvez rien faire. »</em> <span class="ref">Jean 15:5</span> Et cette grâce, Dieu l'offre à tout homme, car il veut le salut de tous : <em>« Dieu veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. »</em> <span class="ref">1 Timothée 2:4</span></p>
      <h2>Donnée par le Christ dans l'Esprit</h2>
      <p>La grâce s'est manifestée pleinement dans le Christ, qui l'a méritée pour les hommes par sa mort et sa résurrection : <em>« La grâce de Dieu s'est manifestée, source de salut pour tous les hommes. »</em> <span class="ref">Tite 2:11</span> L'Esprit Saint la répand ensuite dans les cœurs : <em>« L'amour de Dieu a été répandu dans nos cœurs par l'Esprit Saint qui nous a été donné. »</em> <span class="ref">Romains 5:5</span> On distingue ainsi la grâce incréée, qui est Dieu lui-même se donnant en son Esprit, et la grâce créée, le don qu'il dépose dans l'âme et qui la transforme.</p>
      <h2>Les formes de la grâce</h2>
      <p>Cette grâce créée se présente sous deux modes principaux, la grâce sanctifiante et la grâce actuelle. À ces deux modes s'ajoutent les grâces propres à chaque sacrement, les charismes (dons accordés à l'un pour le bien de tous) et les grâces attachées à une vocation. Toutes sont la même libéralité de Dieu, reçue selon des manières diverses.</p>
      <h2>La grâce sanctifiante</h2>
      <p>La grâce sanctifiante est le don permanent que Dieu infuse dans l'âme et qui y demeure. Elle transforme l'homme en profondeur et l'établit dans une condition nouvelle, celle d'enfant de Dieu, né de lui par adoption, capable de vivre de la vie même de Dieu : <em>« Il nous a accordé de devenir participants de la nature divine. »</em> <span class="ref">2 Pierre 1:4</span> Elle le relève à un ordre qui dépasse sa nature : <em>« À tous ceux qui l'ont reçu, il a donné le pouvoir de devenir enfants de Dieu. »</em> <span class="ref">Jean 1:12</span></p>
      <p>Avec elle, Dieu vient lui-même habiter l'âme : la Trinité y fait sa demeure. <em>« Si quelqu'un m'aime, il gardera ma parole, et mon Père l'aimera ; nous viendrons à lui et nous ferons chez lui notre demeure. »</em> <span class="ref">Jean 14:23</span> Avec elle sont infusées les vertus théologales, la foi, l'espérance et la charité, ainsi que les dons de l'Esprit Saint : l'âme reçoit de quoi connaître, espérer et aimer Dieu au-delà de ses seules forces.</p>
      <p>Elle est reçue pour la première fois au baptême, grandit par les sacrements, la prière et les œuvres de charité, se perd par le péché mortel, et se retrouve par le sacrement de pénitence, qui la rétablit pleinement.</p>
      <h2>La grâce actuelle</h2>
      <p>La grâce actuelle est le secours passager que Dieu accorde pour accomplir un acte bon : elle éclaire l'intelligence et fortifie la volonté, le temps d'un choix ou d'un mouvement du cœur, puis se renouvelle selon les besoins. Dieu en est la source et agit le premier : <em>« C'est Dieu qui produit en vous le vouloir et le faire, selon son dessein bienveillant. »</em> <span class="ref">Philippiens 2:13</span> Le mouvement même par lequel l'homme se tourne vers le Christ ne vient pas de lui seul, mais de la grâce qui le devance : <em>« Nul ne peut dire : Jésus est Seigneur, si ce n'est par l'Esprit Saint. »</em> <span class="ref">1 Corinthiens 12:3</span></p>
      <p>Prévenante, elle va devant l'homme pour éveiller en lui le désir du bien ; coopérante, elle le soutient pendant qu'il agit, de sorte que son œuvre soit tout ensemble don de Dieu et acte de l'homme : <em>« Par la grâce de Dieu, je suis ce que je suis, et sa grâce envers moi n'a pas été vaine. »</em> <span class="ref">1 Corinthiens 15:10</span> Dieu la renouvelle à chaque pas et mène lui-même à son terme l'œuvre commencée : <em>« Celui qui a commencé en vous une œuvre bonne en poursuivra l'achèvement jusqu'au jour du Christ Jésus. »</em> <span class="ref">Philippiens 1:6</span></p>
      <p>Ce secours respecte la liberté qu'il meut : Dieu touche l'âme sans la forcer, et l'homme peut y consentir ou s'y dérober : <em>« Aujourd'hui, si vous entendez sa voix, n'endurcissez pas vos cœurs. »</em> <span class="ref">Hébreux 3:15</span> Reçue et suivie, elle conduit le pécheur à la conversion et le dispose à recevoir ou à recouvrer la grâce sanctifiante.</p>
      <h2>De la grâce à la gloire</h2>
      <p>La grâce reçue dans le temps est le commencement de la vie que Dieu donnera dans l'éternité. Ce qu'elle inaugure ici-bas s'achève dans la vision de Dieu, où le don atteint sa plénitude : <em>« Le Seigneur donne la grâce et la gloire. »</em> <span class="ref">Psaume 84:12</span></p>

      <p>Les vertus théologales sont trois dispositions que Dieu infuse dans l'âme : la foi, l'espérance et la charité. On les dit « théologales », du grec <em>theos</em> (θεός), « Dieu », et <em>logos</em> (λόγος), « parole » : elles ont Dieu pour origine (il les donne), pour motif (il est la raison qui les fonde) et pour objet (il est ce qu'elles atteignent). Reçues avec la grâce sanctifiante, elles rendent l'homme capable de vivre en relation avec la Trinité. <em>« Maintenant donc demeurent la foi, l'espérance et la charité, ces trois ; mais la plus grande des trois, c'est la charité. »</em> <span class="ref">1 Corinthiens 13:13</span></p>
      <h2>Des vertus que Dieu infuse</h2>
      <p>Une vertu est une disposition stable à bien agir. Les vertus humaines s'acquièrent par l'exercice : à force d'actes justes ou courageux, l'homme prend en lui le pli du bien, et forme ainsi les quatre vertus cardinales : la prudence, la justice, la force et la tempérance. On les dit cardinales du latin cardo, le gond d'une porte, parce que la vie morale tout entière pivote sur elles. Les vertus théologales ne s'acquièrent pas de cette façon : elles atteignent Dieu lui-même, qui dépasse toute nature créée, et nul exercice ne saurait les produire. C'est Dieu qui les met dans l'âme, en même temps que la grâce sanctifiante : on les dit pour cela infuses. Elles relèvent d'un ordre surnaturel, c'est-à-dire de la vie propre de Dieu, à laquelle il fait participer l'homme. <em>« Il nous a accordé de devenir participants de la nature divine. »</em> <span class="ref">2 Pierre 1:4</span></p>
      <h2>Trois, pour les trois mouvements vers Dieu</h2>
      <p>Dieu est la fin que l'homme ne possède pas encore. Pour s'unir à un tel bien, il faut d'abord le connaître, puis tendre vers lui dans l'attente de l'atteindre, enfin s'y unir par amour. À ces trois mouvements répondent les trois vertus : la foi connaît Dieu, l'espérance le désire, la charité l'aime et s'unit à lui. La foi vient la première, car on n'espère ni n'aime un bien qu'on ignore ; l'espérance s'appuie sur elle ; la charité les couronne et leur donne leur achèvement, les ordonnant toutes à Dieu.</p>
      <h2>Un don reçu de Dieu</h2>
      <p>Par la foi, l'homme adhère à Dieu et tient pour vrai tout ce qu'il a révélé, parce que Dieu est la vérité même et qu'il ne peut ni se tromper ni nous tromper. Elle repose sur l'autorité de celui qui révèle et atteint ce qu'elle ne voit pas. <em>« La foi est la garantie des biens que l'on espère, la preuve des réalités qu'on ne voit pas. »</em> <span class="ref">Hébreux 11:1</span></p>
      <p>La foi est un don que Dieu infuse dans l'âme avec la grâce sanctifiante. Elle dépasse les forces de la raison laissée à elle-même, car elle atteint des vérités que l'esprit humain ne peut découvrir seul. L'initiative vient de Dieu, qui ouvre le cœur à sa parole. <em>« Nul ne peut venir à moi, si le Père qui m'a envoyé ne l'attire. »</em> <span class="ref">Jean 6:44</span> L'acte même de croire est ainsi une grâce, offerte à tous et accueillie dans la liberté. <em>« C'est par la grâce que vous êtes sauvés, au moyen de la foi ; et cela ne vient pas de vous, c'est le don de Dieu. »</em> <span class="ref">Éphésiens 2:8</span></p>
      <h2>La foi et la raison</h2>
      <p>La foi dépasse la raison sans la contredire. La raison ne peut atteindre seule les vérités révélées ; elle reconnaît pourtant les signes qui rendent l'acte de croire sensé : le Christ a confirmé sa parole par des œuvres qui la dépassent. <em>« Croyez-moi : je suis dans le Père et le Père est en moi. Sinon, croyez à cause des œuvres elles-mêmes. »</em> <span class="ref">Jean 14:11</span> L'acte de croire repose ainsi sur des motifs qui en éclairent la raison, et demeure libre.</p>
      <h2>Croire Dieu et croire en Dieu</h2>
      <p>Croire, c'est tenir pour vrai ce que Dieu dit parce que c'est lui qui le dit, et se remettre à lui tout entier. L'intelligence reconnaît la vérité révélée, et la volonté, mue par la grâce, y consent librement. Cette adhésion naît de l'écoute de la parole annoncée. <em>« La foi vient de ce qu'on entend, et ce qu'on entend vient de la parole du Christ. »</em> <span class="ref">Romains 10:17</span> Abraham en est le modèle : appelé par Dieu, il part vers un pays qu'il ne connaît pas et s'en remet à la promesse sur la seule parole de celui qui la fait. <em>« Abraham eut foi en Dieu, et cela lui fut compté comme justice. »</em> <span class="ref">Romains 4:3</span></p>
      <p>On ne croit pas seul. La foi reçue est celle de l'Église, qui la transmet et la garde à travers les siècles ; le croyant la fait sienne et la professe avec elle dans le Credo, où l'Église dit ensemble ce qu'elle tient de Dieu.</p>
      <h2>Certaine et obscure</h2>
      <p>La foi joint deux traits que l'on croirait éloignés. Elle est plus certaine que toute connaissance humaine, parce qu'elle s'appuie sur Dieu lui-même, qui ne peut tromper. Elle demeure pourtant obscure, car elle adhère à ce qu'elle ne voit pas encore : le croyant avance vers Dieu dans la confiance, sans encore le voir. <em>« Nous marchons par la foi, non par la vue. »</em> <span class="ref">2 Corinthiens 5:7</span> Cette obscurité est l'état du voyageur encore en chemin ; au terme, la foi s'achèvera dans la vision. <em>« Nous voyons à présent au moyen d'un miroir, d'une manière confuse, mais alors ce sera face à face. »</em> <span class="ref">1 Corinthiens 13:12</span></p>
      <h2>Une foi qui agit par la charité</h2>
      <p>La foi reçoit sa pleine vie de la charité, qui la met en œuvre. Unie à l'amour de Dieu, elle se traduit en actes et porte du fruit. <em>« La foi, si elle n'a pas les œuvres, est morte en elle-même. »</em> <span class="ref">Jacques 2:17</span> C'est la charité qui lui donne sa valeur devant Dieu. <em>« Ce qui compte, c'est la foi agissant par la charité. »</em> <span class="ref">Galates 5:6</span></p>
      <h2>La nécessité de la foi</h2>
      <p>La foi est nécessaire au salut. Elle est le commencement de la vie avec Dieu et le fondement de tout ce qui suit, car on s'approche de lui en croyant qu'il est et qu'il récompense ceux qui le cherchent. <em>« Sans la foi, il est impossible de plaire à Dieu. »</em> <span class="ref">Hébreux 11:6</span> Le Christ l'a jointe au baptême comme la voie du salut offerte à tous. <em>« Celui qui croira et sera baptisé sera sauvé. »</em> <span class="ref">Marc 16:16</span> Gardée et nourrie par la prière, l'écoute de la parole et les sacrements, la foi grandit tout au long de la vie.</p>
      <h2>Une attente fondée sur la promesse de Dieu</h2>
      <p>Par l'espérance, l'homme désire le Royaume des cieux et la vie éternelle comme son bonheur, et il l'attend de Dieu avec une ferme confiance. Elle a son fondement dans la victoire du Christ sur la mort, qui a ouvert le ciel à l'homme. <em>« Il nous a régénérés pour une espérance vivante par la résurrection de Jésus-Christ d'entre les morts. »</em> <span class="ref">1 Pierre 1:3</span> Ce que Dieu a promis, il l'accomplit. <em>« Restons fermes dans la confession de notre espérance, car il est fidèle, celui qui a promis. »</em> <span class="ref">Hébreux 10:23</span> Sa certitude n'est pas celle de la vision : c'est une ferme confiance, appuyée sur la fidélité de Dieu.</p>
      <h2>Une espérance des biens invisibles</h2>
      <p>L'espérance s'attache à des biens encore à venir, que l'on ne voit pas : c'est dans cette attente qu'elle déploie sa force, et le salut lui-même nous est donné sous ce mode. <em>« Car c'est en espérance que nous sommes sauvés. Or, une espérance que l'on voit n'est plus une espérance : ce que l'on voit, peut-on l'espérer encore ? »</em> <span class="ref">Romains 8:24</span> Elle soutient ainsi la marche du croyant à travers le temps, les yeux fixés sur ce qui lui est promis.</p>
      <h2>Un appui sur la grâce de Dieu</h2>
      <p>L'homme n'atteint pas la vie éternelle par ses seules forces. L'espérance place sa confiance dans le secours de l'Esprit Saint, qui soutient le désir et donne d'avancer vers le but. Elle attend tout de la bonté de Dieu : le pardon, la persévérance et le bonheur promis. <em>« Que le Dieu de l'espérance vous remplisse de toute joie et de toute paix dans la foi, afin que vous abondiez en espérance par la puissance de l'Esprit Saint. »</em> <span class="ref">Romains 15:13</span> Cette espérance s'étend aussi aux autres : le salut qu'on attend de Dieu pour soi, on l'attend aussi pour ceux qu'on aime.</p>
      <h2>Une ancre dans l'épreuve</h2>
      <p>L'espérance tient l'âme ferme au milieu des épreuves, car elle est fixée en Dieu lui-même, que rien n'ébranle. Elle est pour l'âme ce que l'ancre est pour le navire. <em>« Nous la tenons comme une ancre de l'âme, sûre et solide. »</em> <span class="ref">Hébreux 6:19</span> Dans la souffrance même, elle s'affermit. <em>« L'épreuve produit la persévérance, la persévérance une vertu éprouvée, et cette vertu l'espérance ; et l'espérance ne déçoit pas. »</em> <span class="ref">Romains 5:3-5</span></p>
      <h2>Le péché contre l'espérance</h2>
      <p>Deux égarements opposés blessent l'espérance. Le désespoir abandonne l'attente du salut, comme si Dieu pouvait manquer à sa promesse ou refuser son pardon. La présomption attend le salut sans Dieu, en comptant sur ses seules forces, ou bien l'attend de Dieu sans conversion, comme s'il pardonnait à qui ne se tourne pas vers lui. L'espérance se tient dans la juste mesure : elle attend tout de Dieu, et elle y travaille avec lui.</p>
      <h2>Un amour qui se donne</h2>
      <p>Par la charité, l'homme aime Dieu par-dessus tout, parce qu'il est le souverain bien, et son prochain comme lui-même pour l'amour de Dieu. Le Christ en a fait le premier de tous les commandements. <em>« Tu aimeras le Seigneur ton Dieu de tout ton cœur, et ton prochain comme toi-même. »</em> <span class="ref">Matthieu 22:37-39</span> Le mot grec rendu par « charité » est l'<em>agapē</em> (ἀγάπη) : l'amour qui se donne et veut le bien de l'autre pour l'autre. Il se donne le premier, gratuitement, sans rien attendre en retour. <em>« Il n'y a pas de plus grand amour que de donner sa vie pour ses amis. »</em> <span class="ref">Jean 15:13</span> C'est l'amour dont Dieu nous aime. <em>« Dieu est amour, et celui qui demeure dans l'amour demeure en Dieu. »</em> <span class="ref">1 Jean 4:16</span></p>
      <h2>Un amour répandu dans le cœur</h2>
      <p>La charité est un don de Dieu, répandu dans le cœur avec la grâce sanctifiante. Elle vient de lui, qui aime le premier et met dans l'homme le pouvoir de l'aimer en retour. <em>« L'amour de Dieu a été répandu dans nos cœurs par l'Esprit Saint qui nous a été donné. »</em> <span class="ref">Romains 5:5</span> L'homme aime alors d'un amour qui le dépasse, participant à l'amour même dont Dieu l'aime. <em>« Nous, aimons, puisque lui nous a aimés le premier. »</em> <span class="ref">1 Jean 4:19</span></p>
      <h2>Une amitié avec Dieu</h2>
      <p>Cet amour partagé fait de l'homme l'ami de Dieu. La charité est une amitié : un amour mutuel, où Dieu se donne et où l'homme répond, admis dans l'intimité de son Seigneur. Le Christ l'a dit aux siens au soir de sa vie. <em>« Je ne vous appelle plus serviteurs, je vous appelle amis, parce que je vous ai fait connaître tout ce que j'ai entendu de mon Père. »</em> <span class="ref">Jean 15:15</span></p>
      <h2>Aimer Dieu, aimer le prochain</h2>
      <p>L'amour de Dieu et l'amour du prochain forment une seule charité, car on aime le prochain pour Dieu et en Dieu. L'un est la mesure et la preuve de l'autre. <em>« Celui qui n'aime pas son frère, qu'il voit, ne peut aimer Dieu, qu'il ne voit pas. »</em> <span class="ref">1 Jean 4:20</span> Le Christ en a fait son commandement, à la mesure de son propre amour. <em>« Aimez-vous les uns les autres comme je vous ai aimés. À ceci, tous reconnaîtront que vous êtes mes disciples. »</em> <span class="ref">Jean 13:34-35</span></p>
      <h2>L'ordre et l'amour des ennemis</h2>
      <p>La charité aime tout être en Dieu, selon un ordre : Dieu d'abord, aimé par-dessus tout ; puis les autres, chacun selon les liens que Dieu a noués, sans en exclure personne. Elle atteint son point extrême dans l'amour des ennemis, où elle aime qui ne le mérite pas, comme Dieu aime le premier. <em>« Aimez vos ennemis, et priez pour ceux qui vous persécutent. »</em> <span class="ref">Matthieu 5:44</span></p>
      <h2>Le visage de la charité</h2>
      <p>La charité prend un visage concret dans la vie de chaque jour. <em>« La charité est patiente, elle est pleine de bonté ; elle ne cherche pas son intérêt, elle excuse tout, espère tout, supporte tout. »</em> <span class="ref">1 Corinthiens 13:4-7</span> Ce sont là les gestes où l'amour de Dieu passe dans la vie de l'homme.</p>
      <h2>Ce qui la blesse, et sa croissance</h2>
      <p>À la charité s'opposent la haine de Dieu ou du prochain, l'indifférence qui se ferme à l'amour reçu, et le scandale qui détourne autrui du bien. Elle grandit tout au long de la vie : chaque acte d'amour l'augmente, et le croyant en demande la croissance. <em>« Que votre amour grandisse de plus en plus en connaissance et en pleine intelligence. »</em> <span class="ref">Philippiens 1:9</span></p>
      <h2>La forme de toutes les vertus</h2>
      <p>La charité donne aux autres vertus leur achèvement et les anime de l'intérieur, les ordonnant toutes à Dieu. Sans elle, les œuvres les plus grandes restent vides devant lui ; avec elle, le moindre acte devient précieux. Elle relie ensemble toute la vie chrétienne. <em>« Par-dessus tout, ayez l'amour, qui est le lien de la perfection. »</em> <span class="ref">Colossiens 3:14</span></p>
      <h2>La plus grande, et qui demeure</h2>
      <p>La charité surpasse la foi et l'espérance, parce qu'elle atteint Dieu lui-même et qu'elle demeure quand les deux autres s'achèvent. Au ciel, la foi laissera place à la vision et l'espérance à la possession. <em>« L'amour ne passe jamais. »</em> <span class="ref">1 Corinthiens 13:8</span> Elle est la plus grande des trois et le sommet de toute la vie avec Dieu.</p>

    contenu: `
      <p>L'Église est l'assemblée de ceux que Dieu appelle et rassemble dans le Christ pour former un seul Peuple. Elle réunit les croyants dans une même foi, un même baptême et une même vie reçue de Dieu, et les unit au Christ comme à leur tête. Le Christ l'a lui-même fondée et lui a promis de tenir jusqu'à la fin : <em>« Tu es Pierre, et sur cette pierre je bâtirai mon Église, et les portes de l'enfer ne prévaudront pas contre elle. »</em> <span class="ref">Matthieu 16:18</span></p>
      <h2>Fondée par le Christ</h2>
      <p>L'Église naît du Christ. Il la rassemble durant sa vie, l'établit sur Pierre et les apôtres, et la fait reposer sur lui-même comme sur sa pierre angulaire : <em>« Vous êtes édifiés sur le fondement des apôtres, le Christ Jésus étant lui-même la pierre angulaire. »</em> <span class="ref">Éphésiens 2:20</span></p>
      <h2>Née de l'Esprit</h2>
      <p>Au jour de la Pentecôte, le Christ ressuscité et monté au ciel envoie l'Esprit qu'il avait promis. Les Apôtres sont réunis en prière avec Marie lorsque l'Esprit descend sur eux dans un grand souffle et des langues de feu : <em>« Ils furent tous remplis du Saint-Esprit, et se mirent à parler en d'autres langues. »</em> <span class="ref">Actes 2:4</span> Ceux qui se tenaient cachés sortent et annoncent le Christ avec hardiesse. À la prédication de Pierre, ce jour-là, environ trois mille hommes croient et reçoivent le baptême : <em>« Ceux qui acceptèrent sa parole furent baptisés ; ce jour-là, le nombre des disciples augmenta d'environ trois mille âmes. »</em> <span class="ref">Actes 2:41</span> Le groupe rassemblé par le Christ devient un peuple envoyé au monde.</p>
      <p>L'Église était formée par le Christ ; à la Pentecôte, elle reçoit la vie. Ce que le Christ avait préparé, l'Esprit l'anime et l'envoie. À Babel, l'orgueil des hommes avait confondu les langues et dispersé les peuples ; à la Pentecôte, l'Esprit donne à des hommes de toute nation d'entendre, chacun dans sa langue, la même Bonne Nouvelle, et rassemble en un seul corps ce que le péché avait divisé. Dès sa naissance, l'Église est catholique, ouverte à toutes les nations.</p>
      <h2>Le Corps du Christ</h2>
      <p>L'Église est le Corps du Christ. Le Christ en est la tête, et les baptisés en sont les membres : reliés à lui et les uns aux autres, ils reçoivent de lui leur vie et forment ensemble un seul corps animé par un seul Esprit : <em>« Vous êtes le corps du Christ, et vous êtes ses membres, chacun pour sa part. »</em> <span class="ref">1 Corinthiens 12:27</span></p>

      <h2>Temple de l'Esprit et Épouse du Christ</h2>
      <p>L'Écriture nomme l'Église par plusieurs images qui se complètent. Au Corps du Christ elle joint le Temple de l'Esprit et l'Épouse du Christ. Elle est le Temple où Dieu habite, bâti de pierres vivantes, les croyants que l'Esprit assemble et anime. <em>« Vous êtes le temple de Dieu, et l'Esprit de Dieu habite en vous. »</em> <span class="ref">1 Corinthiens 3:16</span> L'Esprit Saint est l'âme de ce corps : il l'unit, la sanctifie et y répand ses dons. Elle est aussi l'Épouse, que le Christ s'est unie pour toujours et qu'il aime jusqu'au don de lui-même. <em>« Je vous ai unis à un seul époux, pour vous présenter au Christ comme une vierge pure. »</em> <span class="ref">2 Corinthiens 11:2</span> Corps qu'il anime, Temple qu'il habite, Épouse qu'il aime : ces images disent une seule réalité, l'union de l'Église à son Seigneur.</p>
      <h2>Visible et spirituelle</h2>
      <p>L'Église est tout ensemble visible et spirituelle, à l'image de son Seigneur fait homme. Comme le Verbe a uni en lui la divinité et une chair, l'Église unit une réalité que l'on voit, le peuple rassemblé, ses pasteurs, ses sacrements, et une réalité intérieure, la vie de la grâce et la présence de l'Esprit qui l'anime. Les deux ne font qu'un seul mystère : la société visible est le corps où passe la vie invisible. La réduire à une organisation humaine, ce serait oublier l'Esprit qui l'habite ; la réduire à une communion intérieure, ce serait oublier le corps que le Christ a voulu visible. C'est pourquoi il l'a dotée d'une autorité et de signes sensibles, pour conduire un peuple vers un salut qui le dépasse.</p>
      <h2>La structure visible</h2>
      <p>La dimension visible de l'Église a une forme précise. Le Christ lui a donné une assise : il l'a bâtie sur les Apôtres, avec Pierre pour tête, et leur a donné d'enseigner, de sanctifier et de conduire le peuple en son nom. Les évêques leur succèdent, l'évêque de Rome succède à Pierre, et autour d'eux les prêtres et les diacres servent les fidèles : c'est la hiérarchie, par laquelle le Christ continue de conduire les siens. <em>« L'Esprit Saint vous a établis gardiens, pour paître l'Église de Dieu. »</em> <span class="ref">Actes 20:28</span> Trois liens visibles unissent ses membres en un seul corps : la profession d'une même foi, la célébration des mêmes sacrements, et la communion sous les pasteurs légitimes. <em>« Un seul Seigneur, une seule foi, un seul baptême. »</em> <span class="ref">Éphésiens 4:5</span> Par ces liens, l'Église se laisse reconnaître dans le monde comme une société une et visible.</p>
      <h2>Une, sainte, catholique et apostolique</h2>
      <p>L'Église porte quatre traits qui la font reconnaître, professés dans le Credo. Elle est une : un seul corps, dans une même foi, les mêmes sacrements et la communion sous le successeur de Pierre, selon la prière du Christ : <em>« Que tous soient un, afin que le monde croie que tu m'as envoyé. »</em> <span class="ref">Jean 17:21</span> Elle est sainte parce que le Christ l'a aimée et s'est livré pour elle ; il la sanctifie et lui donne les moyens de conduire ses membres à la sainteté : <em>« Le Christ a aimé l'Église : il s'est livré lui-même pour elle, afin de la sanctifier. »</em> <span class="ref">Éphésiens 5:25-26</span></p>
      <p>Elle est catholique, c'est-à-dire universelle : envoyée à tous les peuples et à tous les temps, elle porte le salut au monde entier : <em>« Allez, de toutes les nations faites des disciples. »</em> <span class="ref">Matthieu 28:19</span> Elle est apostolique : elle garde la foi reçue des apôtres, et les évêques, unis au Pape, leur succèdent pour la transmettre fidèlement jusqu'à la fin des temps.</p>
      <h2>Sacrement du salut</h2>
      <p>L'Église est l'instrument par lequel le Christ donne aux hommes le salut qu'il a acquis. Elle est comme une mère qui engendre à la vie divine par le baptême et la nourrit par les sacrements et la parole de Dieu. En elle, les hommes reçoivent ce que le Christ a confié à son Église pour tous.</p>
      <p>Elle est nécessaire au salut, car le Christ a voulu qu'on vienne à lui par elle, et tout salut découle de lui par son corps. Tournée vers son achèvement, elle marche vers le jour où Dieu sera tout en tous, lorsqu'elle sera pleinement unie au Christ dans la gloire : <em>« Je vis la ville sainte, la Jérusalem nouvelle, prête comme une épouse parée pour son époux. »</em> <span class="ref">Apocalypse 21:2</span></p>
      <h2>Hors de l'Église, point de salut</h2>
      <p>Cette nécessité, la tradition l'a dite d'une formule : hors de l'Église, point de salut. Elle ne signifie pas que Dieu damne ceux qui n'ont pu la connaître, mais que tout salut vient du Christ et passe par son Corps : qui est sauvé l'est par l'Église, même sans le savoir. Ceux qui, sans faute de leur part, ignorent l'Évangile et cherchent Dieu d'un cœur droit en accomplissant sa volonté selon leur conscience peuvent obtenir la vie éternelle : ils sont ordonnés à l'Église sans lui appartenir visiblement, et le salut qui les atteint demeure celui du Christ, donné par des voies que Dieu connaît. La formule pèse donc surtout sur ceux qui savent : refuser sciemment l'Église que l'on a reconnue comme fondée par le Christ, c'est refuser le Christ lui-même. Pour tous, elle demeure la voie que le Seigneur a donnée, et nul ne peut la tenir pour facultative.</p>

    date: "2026",
    contenu: `
      <p>Dieu s'est nommé lui-même, et tout ce que la foi en confesse tient dans ce nom : il est celui qui est, l'être même. De cette source unique découle tout le reste, qu'il est un, simple, éternel, sans mesure, tout-puissant, et qu'il est amour. On le connaît par là, sans jamais l'épuiser, car il demeure plus haut que tout ce qu'on en peut dire.</p>
      <h2>Celui qui est</h2>
      <p>Au buisson ardent, Moïse demande à Dieu son nom, et Dieu répond par l'être : <em>« Je suis celui qui suis. »</em> <span class="ref">Exode 3:14</span> Le mot hébreu de cette réponse, rendu par « Je suis celui qui suis », <em>ehyeh asher ehyeh</em> (אֶהְיֶה אֲשֶׁר אֶהְיֶה), donne le nom même de Dieu, celui qui est. Toutes les créatures reçoivent l'existence d'un autre : elles ont commencé, et elles pourraient ne pas être. Dieu seul est l'existence en personne. Il ne tient son être de rien ni de personne ; il est, pleinement, par lui-même. Là est la racine de tout ce qu'on peut dire de lui : il n'a pas la vie, la sagesse, la puissance comme des biens reçus, il les est. Comprendre que Dieu est l'être même, c'est tenir la clé de toutes ses perfections.</p>
      <h2>Un seul Dieu</h2>
      <p>De là vient qu'il ne peut y en avoir qu'un. Deux êtres infinis se borneraient l'un l'autre et ne seraient plus infinis ; l'être même ne se partage pas. Il n'y a donc qu'un seul Dieu, et nul autre à côté de lui. <em>« Je suis le premier et je suis le dernier, et hors moi il n'y a point de Dieu. »</em> <span class="ref">Isaïe 44:6</span></p>
      <h2>Sans parties</h2>
      <p>Parce qu'il est l'être même, Dieu n'est pas composé. Une chose composée est faite de parties qui dépendent les unes des autres, et ce qui est assemblé peut être désassemblé. Dieu n'a pas de parties : il n'est pas fait de corps et d'esprit, et ses qualités ne s'ajoutent pas à lui. En nous, on devient sage, et la sagesse vient se poser sur la personne ; en Dieu, rien ne s'ajoute, car il est ce qu'il a. Sa sagesse est sa puissance, qui est sa bonté, qui est son être : un seul et même Dieu sous des noms divers. Quand nous le disons sage, bon, juste, nous découpons en mots ce qui en lui est parfaitement un. C'est ce qu'on appelle sa simplicité : tout ce qu'il est, il l'est d'un seul tenant.</p>
      <h2>Éternel et immuable</h2>
      <p>Le même principe le veut sans changement. Changer, c'est gagner ce qu'on n'avait pas ou perdre ce qu'on avait ; Dieu, qui est tout l'être, n'a rien à acquérir ni rien à perdre. Il est immuable, c'est-à-dire qu'il ne change pas. <em>« Car moi, le Seigneur, je ne change pas. »</em> <span class="ref">Malachie 3:6</span> De là vient aussi qu'il est hors du temps. Le temps mesure le changement, l'avant et l'après ; ce qui ne change pas ne s'écoule pas en instants successifs. Dieu possède sa vie tout entière à la fois, sans passé révolu ni avenir qui manque : il est éternel. <em>« D'éternité en éternité, tu es Dieu. »</em> <span class="ref">Psaume 90:2</span></p>
      <h2>L'être sans limite</h2>
      <p>Étant l'être même, Dieu n'a pas de bornes : il possède toute la perfection de l'être sans en rien exclure. Il est infini. Rien ne le limite, donc rien ne le contient : il n'est pas enfermé dans un lieu, il est présent en toute chose, plus intime à chacune qu'elle ne l'est à elle-même, puisque c'est lui qui la fait être à chaque instant. <em>« Est-ce que je ne remplis pas le ciel et la terre ? dit le Seigneur. »</em> <span class="ref">Jérémie 23:24</span> De cette plénitude viennent sa puissance et sa science. Il est tout-puissant : il peut tout ce qui peut être par sa seule volonté. Il a tiré le monde du néant en le voulant. <em>« Reconnais que Dieu a fait de rien le ciel et la terre, et qu'il en est de même de la race des hommes. »</em> <span class="ref">2 Maccabées 7:28</span> Il est omniscient : il connaît tout sans rien apprendre du dehors, en se connaissant lui-même comme la source de tout. Le passé, l'avenir, le secret des cœurs, tout lui est présent. <em>« Tout est nu et à découvert à ses yeux. »</em> <span class="ref">Hébreux 4:13</span></p>
      <h2>Plus haut que tout ce qu'on en dit</h2>
      <p>Tout ce langage atteint Dieu sans jamais le cerner. Dieu est pur esprit, sans corps ni figure. <em>« Dieu est esprit, et ceux qui l'adorent doivent l'adorer en esprit et en vérité. »</em> <span class="ref">Jean 4:24</span> Nos mots viennent des choses créées, et Dieu les dépasse toutes ; nous le nommons d'après ses œuvres, comme on devine l'auteur à l'ouvrage, en sachant qu'il est tout cela d'une manière infiniment plus haute. <em>« Les perfections invisibles de Dieu se voient depuis la création du monde dans ses œuvres. »</em> <span class="ref">Romains 1:20</span> C'est pourquoi l'on connaît souvent mieux ce qu'il n'est pas que ce qu'il est, et toute parole sur lui reste en deçà. <em>« Prétends-tu sonder les profondeurs de Dieu, atteindre la perfection du Tout-Puissant ? »</em> <span class="ref">Job 11:7</span></p>
      <h2>Saint, bon, amour</h2>
      <p>Cette plénitude d'être est plénitude de bien. Dieu est le bien même, dont tout autre bien n'est qu'un reflet, et le saint par excellence, séparé de tout mal, devant qui les anges se voilent. <em>« Saint, saint, saint est le Seigneur ; toute la terre est pleine de sa gloire. »</em> <span class="ref">Isaïe 6:3</span> Ce bien ne se garde pas pour lui, il se donne : Dieu a créé par pure générosité et se communique sans fin. Au terme, toute cette plénitude reçoit un nom. <em>« Dieu est amour. »</em> <span class="ref">1 Jean 4:8</span> Toutes les perfections qu'on a nommées, l'unité, la simplicité, l'éternité, la puissance, trouvent là leur visage : l'être même est un amour qui se donne.</p>
      <p>Dieu a révélé que l'être qu'il est se vit comme un échange d'amour : le Père, le Fils et l'Esprit, un seul Dieu en trois Personnes. La nature de Dieu est cette plénitude inépuisable, que les bienheureux contempleront dans la vie éternelle sans jamais l'épuiser.</p>

    resume: "Le mystère central de la foi : un seul Dieu en trois Personnes, le Père, le Fils et l'Esprit Saint, égales et éternelles, dans une seule vie divine.",
