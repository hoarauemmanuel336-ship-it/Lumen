      <p>Le commandement dit pourtant « Tu ne tueras point ». L'Écriture accorderait-elle alors un temps pour tuer ?</p>
      <h2>Le regard du sage</h2>
      <p>Le poème pose un regard sur le déroulement de la vie. Chaque chose y a son moment, et aucune saison ne dure toujours ; l'homme les traverse sans en fixer le cours, car ils lui sont donnés. Le sage observe ce qui se passe sous le soleil, la vie de l'homme dans les limites de ce monde, où les saisons tournent et reviennent. Il décrit ce qu'il voit. Quand il nomme un temps pour tuer, il constate ce que traverse l'histoire des hommes, sans ouvrir à personne le droit d'ôter la vie. La maîtrise de ces temps appartient à Dieu seul, qui les tient et les ordonne.</p>
      <h2>Le sens d'une parole difficile</h2>
      <p>Le commandement est souvent connu sous la forme « Tu ne tueras point ». En français, le mot « tuer » couvre tout fait d'ôter la vie. Le commandement, lui, vise une chose précise : le meurtre, ôter injustement la vie à un innocent. Le texte le dit exactement : <em>« Tu ne commettras pas de meurtre. »</em> <span class="ref">Exode 20:13</span> La gravité en est extrême, car la vie de l'homme porte en elle l'image de Dieu : <em>« Qui verse le sang de l'homme, par l'homme son sang sera versé ; car Dieu a fait l'homme à son image. »</em> <span class="ref">Genèse 9:6</span> Le sang de l'innocent crie vers Dieu, comme celui d'Abel monté de la terre : <em>« La voix du sang de ton frère crie de la terre jusqu'à moi. »</em> <span class="ref">Genèse 4:10</span></p>
      <p>Le poème, lui, emploie un mot plus large. Il embrasse les temps où la vie est ôtée sans qu'il y ait meurtre : dans la guerre qui défend un peuple, dans la protection de l'innocent menacé, dans l'exercice de la justice. Ces temps appartiennent à l'histoire d'un monde blessé par le péché, où la vie doit parfois être défendue au prix du sang. La parole du sage et le commandement s'accordent ainsi pleinement : l'un observe les saisons d'un monde déchu, l'autre garde inviolable la vie de l'innocent.</p>
      <h2>Toute chose belle en son temps</h2>

      <h2>La dispute sur la filiation d'Abraham</h2>
      <p>Les interlocuteurs du Christ tiennent leur descendance d'Abraham pour un titre suffisant devant Dieu. Le Christ déplace la question : la vraie filiation tient aux œuvres, non au sang. <em>« Si vous étiez enfants d'Abraham, vous feriez les œuvres d'Abraham. »</em> <span class="ref">Jean 8:39</span> Et leur œuvre est l'inverse de celle d'Abraham. <em>« Mais maintenant, vous cherchez à me faire mourir, moi qui vous ai dit la vérité que j'ai entendue de Dieu : Abraham n'a point fait cela. »</em> <span class="ref">Jean 8:40</span></p>

      <h2>Le jour du Christ</h2>
      <p>Au cœur de l'échange, le Christ déclare : <em>« Abraham, votre père, a tressailli de joie à la pensée de voir mon jour : il l'a vu, et il s'est réjoui. »</em> <span class="ref">Jean 8:56</span> Abraham a vécu près de deux mille ans plus tôt. Le jour du Christ désigne sa venue parmi les hommes et l'œuvre de salut qu'il y accomplit, le moment où Dieu réalise dans la chair ce qu'il avait promis depuis les origines. Dire qu'Abraham l'a vu, c'est placer ce jour au centre de toute l'histoire, et affirmer qu'Abraham l'a connu d'avance, dans la lumière de la foi qui rend présent ce qui demeure à venir.</p>
      <h2>La foi qui voit de loin</h2>
      <p>Abraham a reçu de Dieu une promesse : une descendance innombrable, et par elle une bénédiction pour toutes les nations. <em>« En ta postérité seront bénies toutes les nations de la terre. »</em> <span class="ref">Genèse 22:18</span> Cette postérité par laquelle vient la bénédiction est le Christ lui-même. <em>« Les promesses ont été faites à Abraham et à sa postérité, qui est le Christ. »</em> <span class="ref">Galates 3:16</span> En croyant à la promesse, Abraham croyait à celui qui devait l'accomplir : sa foi portait déjà sur le Christ à venir. Les patriarches ont vécu et sont morts dans cette attente, voyant de loin ce qui leur était promis. <em>« C'est dans la foi qu'ils sont tous morts, sans avoir reçu l'objet des promesses, mais l'ayant vu et salué de loin. »</em> <span class="ref">Hébreux 11:13</span> La vision d'Abraham appartient à cette foi : il a salué de loin le jour du Christ.</p>

      <p>La joie d'Abraham est inscrite jusque dans le nom de son fils. Le nom d'Isaac, en hébreu <em>Yitsḥaq</em> (<span dir="rtl">יִצְחָק</span>), signifie « il rit » : à l'annonce de sa naissance, donné contre toute espérance, Abraham puis Sarah avaient ri, et ce rire devint le nom de l'enfant de la promesse. <em>« Dieu m'a donné sujet de rire ; quiconque l'apprendra rira avec moi. »</em> <span class="ref">Genèse 21:6</span> En Isaac, fils unique reçu et rendu, Abraham tenait déjà le gage du salut à venir, et sa joie était celle de qui voit de loin le jour du Christ.</p>
      <h2>Avant qu'Abraham fût, je suis</h2>
      <p>Ses interlocuteurs ne retiennent que l'impossible. <em>« Tu n'as pas cinquante ans, et tu as vu Abraham ! »</em> <span class="ref">Jean 8:57</span> Le Christ répond par une parole qui ne dit plus seulement qu'il a vu Abraham, mais qu'il est avant lui. <em>« En vérité, en vérité, je vous le dis, avant qu'Abraham fût, je suis. »</em> <span class="ref">Jean 8:58</span></p>
      <p>Tout tient dans le choix des mots. Abraham « fût » : il a commencé d'exister, il est venu à l'être à un moment du temps. Le Christ, lui, dit « je suis », au présent. Le mot grec rendu par « je suis », <em>egō eimi</em> (ἐγώ εἰμι), ne dit pas « j'étais avant Abraham », mais « je suis ». Abraham appartient au devenir et au temps ; le Christ se tient dans un présent qui ne commence pas. Là où l'on attendait « j'étais déjà », il dit « je suis », et cet écart même affirme l'éternité.</p>
      <p>Cette parole reprend le Nom que Dieu avait révélé à Moïse au buisson ardent. <em>« Je suis celui qui suis. »</em> <span class="ref">Exode 3:14</span> Dans la version grecque de l'Écriture que lisaient ses interlocuteurs, Dieu s'y nomme <em>egō eimi</em>, des mots mêmes que le Christ prononce pour lui-même. Il s'attribue ainsi le Nom divin et se déclare éternel, le Fils qui est de toujours auprès du Père, avant de venir dans la chair.</p>
      <p>Cette déclaration couronne tout l'échange. Deux fois déjà, le Christ avait dit « je suis » de la même manière absolue. <em>« Si vous ne croyez pas que je suis, vous mourrez dans vos péchés. »</em> <span class="ref">Jean 8:24</span> Puis : <em>« Quand vous aurez élevé le Fils de l'homme, alors vous connaîtrez que je suis. »</em> <span class="ref">Jean 8:28</span> La parole sur Abraham est le troisième de ces « je suis » et le plus haut.</p>
      <h2>La pierre levée</h2>
      <p>À ces mots, ses interlocuteurs prennent des pierres pour le lapider. <em>« Ils prirent donc des pierres pour les jeter contre lui ; mais Jésus se cacha et sortit du Temple. »</em> <span class="ref">Jean 8:59</span> Leur geste dit qu'ils ont parfaitement compris : qu'un homme se nomme du Nom de Dieu est à leurs yeux un blasphème, que la Loi punit de la lapidation. <em>« Celui qui blasphème le nom du Seigneur sera mis à mort ; toute l'assemblée le lapidera. »</em> <span class="ref">Lévitique 24:16</span> La réaction confirme le sens de la parole : le Christ ne s'est pas dit plus ancien qu'Abraham au sens d'une longue vie, il s'est dit Dieu.</p>
      <p>Le jour du Christ traverse ainsi toute l'Écriture. Avant même sa venue, il était promis, attendu et vu de loin par les justes qui vivaient de la foi en lui, et Abraham, le père des croyants, a porté cette espérance et s'est réjoui de la voir s'ouvrir. Celui qu'Abraham a vu de loin se tient maintenant au Temple et se nomme du Nom de Dieu. Pour qui croit, la venue du Christ accomplit ce que Dieu préparait depuis Abraham, et celui qui l'accomplit est Dieu lui-même, venu dans la chair.</p>

      <p>Cette grâce créée se présente sous deux modes principaux, la grâce sanctifiante et la grâce actuelle. À ces deux modes s'ajoutent les grâces propres à chaque sacrement, les charismes (dons accordés à l'un pour le bien de tous) et les grâces attachées à une vocation. Toutes sont la même libéralité de Dieu, reçue selon des manières diverses.</p>

      <p>La paix du Christ est le don qu'il fait aux siens en les réconciliant avec Dieu : la tranquillité profonde d'une âme rendue à la communion avec son Créateur. Le Christ la laisse à ses disciples le soir de la Cène, à la veille de sa Passion, comme un héritage. <em>« Je vous laisse la paix, je vous donne ma paix ; je ne vous la donne pas comme le monde la donne. »</em> <span class="ref">Jean 14:27</span></p>
      <h2>La tranquillité de l'ordre</h2>
      <p>Le monde appelle paix l'arrêt des combats et le calme des circonstances, un accord qui tient tant que rien ne le menace et cède dès que l'épreuve revient. La paix du Christ tient à autre chose, et il le dit en la donnant : « non comme le monde la donne ». Le monde apaise le dehors ; le Christ remet de l'ordre au-dedans, à la racine, dans l'accord de l'homme avec Dieu. Le mot hébreu rendu par « paix », <em>shalom</em> (<span dir="rtl">שָׁלוֹם</span>), désigne la plénitude, l'intégrité d'une vie où tout est à sa place. Elle est la tranquillité de l'ordre : l'homme accordé à Dieu, apaisé au-dedans, ses passions tenues sous la raison, et de là en paix avec ses frères. Cet ordre est l'œuvre de la justice : <em>« L'œuvre de la justice sera la paix. »</em> <span class="ref">Isaïe 32:17</span> Là où chacun tient son rang devant Dieu, la paix suit. Israël l'attendait du Messie, le Prince de la Paix : <em>« On l'appelle Merveilleux Conseiller, Dieu fort, Père éternel, Prince de la Paix. »</em> <span class="ref">Isaïe 9:5</span></p>
      <h2>Une paix née de la Croix</h2>
      <p>La justice dont naît la paix, le Christ l'a accomplie sur la Croix : il y a rétabli l'accord entre Dieu et les hommes que le péché avait rompu. <em>« Il a voulu tout réconcilier par lui, faisant la paix par le sang de sa croix. »</em> <span class="ref">Colossiens 1:20</span> Plus encore, le Christ est lui-même cette paix, comme l'Écriture l'avait annoncé : <em>« Et lui-même sera la paix. »</em> <span class="ref">Michée 5:4</span> Sa personne unit Dieu et l'homme. <em>« C'est lui qui est notre paix. »</em> <span class="ref">Éphésiens 2:14</span> Celui que la foi unit à lui entre dans cet accord retrouvé : <em>« Justifiés par la foi, nous sommes en paix avec Dieu par notre Seigneur Jésus-Christ. »</em> <span class="ref">Romains 5:1</span></p>
      <h2>Une paix qui demeure dans l'épreuve</h2>
      <p>Cette paix habite le cœur au milieu même des épreuves, car elle tient à la présence du Christ et demeure quand tout alentour se trouble. <em>« Dans le monde, vous aurez des tribulations ; mais prenez courage, j'ai vaincu le monde. »</em> <span class="ref">Jean 16:33</span> Reçue dans la prière, elle garde le cœur et dépasse tout ce que l'esprit peut saisir. <em>« La paix de Dieu, qui surpasse toute intelligence, gardera vos cœurs et vos pensées dans le Christ Jésus. »</em> <span class="ref">Philippiens 4:7</span></p>
      <h2>Le don du Ressuscité, le fruit de l'Esprit</h2>
      <p>Au matin de Pâques, le premier mot du Christ ressuscité à ses disciples est un don de paix. <em>« La paix soit avec vous. »</em> <span class="ref">Jean 20:19</span> Cette paix se répand ensuite dans l'âme comme un fruit de l'Esprit Saint. <em>« Le fruit de l'Esprit est amour, joie, paix. »</em> <span class="ref">Galates 5:22</span></p>
      <h2>Envoyés à la porter</h2>
      <p>Celui qui reçoit cette paix est envoyé à la porter aux autres, et cette mission le fait ressembler à Dieu. <em>« Heureux les artisans de paix, car ils seront appelés fils de Dieu. »</em> <span class="ref">Matthieu 5:9</span> C'est cette paix que l'Église se transmet à chaque messe, lorsque les fidèles échangent le signe de la paix avant de communier au Christ.</p>

    contenu: `
      <p>Les vertus théologales sont trois dispositions que Dieu infuse dans l'âme : la foi, l'espérance et la charité. On les dit « théologales », du grec <em>theos</em> (θεός), « Dieu », et <em>logos</em> (λόγος), « parole » : elles ont Dieu pour origine (il les donne), pour motif (il est la raison qui les fonde) et pour objet (il est ce qu'elles atteignent). Reçues avec la grâce sanctifiante, elles rendent l'homme capable de vivre en relation avec la Trinité. <em>« Maintenant donc demeurent la foi, l'espérance et la charité, ces trois ; mais la plus grande des trois, c'est la charité. »</em> <span class="ref">1 Corinthiens 13:13</span></p>
      <h2>Des vertus que Dieu infuse</h2>
      <p>Une vertu est une disposition stable à bien agir. Les vertus humaines s'acquièrent par l'exercice : à force d'actes justes ou courageux, l'homme prend en lui le pli du bien, et forme ainsi les quatre vertus cardinales : la prudence, la justice, la force et la tempérance. On les dit cardinales du latin cardo, le gond d'une porte, parce que la vie morale tout entière pivote sur elles. Les vertus théologales ne s'acquièrent pas de cette façon : elles atteignent Dieu lui-même, qui dépasse toute nature créée, et nul exercice ne saurait les produire. C'est Dieu qui les met dans l'âme, en même temps que la grâce sanctifiante : on les dit pour cela infuses. Elles relèvent d'un ordre surnaturel, c'est-à-dire de la vie propre de Dieu, à laquelle il fait participer l'homme. <em>« Il nous a accordé de devenir participants de la nature divine. »</em> <span class="ref">2 Pierre 1:4</span></p>
      <h2>Trois, pour les trois mouvements vers Dieu</h2>
      <p>Dieu est la fin que l'homme ne possède pas encore. Pour s'unir à un tel bien, il faut d'abord le connaître, puis tendre vers lui dans l'attente de l'atteindre, enfin s'y unir par amour. À ces trois mouvements répondent les trois vertus : la foi connaît Dieu, l'espérance le désire, la charité l'aime et s'unit à lui. La foi vient la première, car on n'espère ni n'aime un bien qu'on ignore ; l'espérance s'appuie sur elle ; la charité les couronne et leur donne leur achèvement, les ordonnant toutes à Dieu.</p>
      <h2>Un don reçu de Dieu</h2>
      <p>Par la foi, l'homme adhère à Dieu et tient pour vrai tout ce qu'il a révélé, parce que Dieu est la vérité même et qu'il ne peut ni se tromper ni nous tromper. Elle repose sur l'autorité de celui qui révèle et atteint ce qu'elle ne voit pas. <em>« La foi est la garantie des biens que l'on espère, la preuve des réalités qu'on ne voit pas. »</em> <span class="ref">Hébreux 11:1</span></p>
      <p>La foi est un don que Dieu infuse dans l'âme avec la grâce sanctifiante. Elle dépasse les forces de la raison laissée à elle-même, car elle atteint des vérités que l'esprit humain ne peut découvrir seul. L'initiative vient de Dieu, qui ouvre le cœur à sa parole. <em>« Nul ne peut venir à moi, si le Père qui m'a envoyé ne l'attire. »</em> <span class="ref">Jean 6:44</span> L'acte même de croire est ainsi une grâce, offerte à tous et accueillie dans la liberté. <em>« C'est par la grâce que vous êtes sauvés, au moyen de la foi ; et cela ne vient pas de vous, c'est le don de Dieu. »</em> <span class="ref">Éphésiens 2:8</span></p>
      <h2>La foi et la raison</h2>
      <p>La foi dépasse la raison sans la contredire. La raison ne peut atteindre seule les vérités révélées ; elle reconnaît pourtant les signes qui rendent l'acte de croire sensé : le Christ a confirmé sa parole par des œuvres qui la dépassent. <em>« Croyez-moi : je suis dans le Père et le Père est en moi. Sinon, croyez à cause des œuvres elles-mêmes. »</em> <span class="ref">Jean 14:11</span> L'acte de croire repose ainsi sur des motifs qui en éclairent la raison, et demeure libre.</p>
      <h2>Croire Dieu et croire en Dieu</h2>
      <p>Croire, c'est tenir pour vrai ce que Dieu dit parce que c'est lui qui le dit, et se remettre à lui tout entier. L'intelligence reconnaît la vérité révélée, et la volonté, mue par la grâce, y consent librement. Cette adhésion naît de l'écoute de la parole annoncée. <em>« La foi vient de ce qu'on entend, et ce qu'on entend vient de la parole du Christ. »</em> <span class="ref">Romains 10:17</span> Abraham en est le modèle : appelé par Dieu, il part vers un pays qu'il ne connaît pas et s'en remet à la promesse sur la seule parole de celui qui la fait. <em>« Abraham eut foi en Dieu, et cela lui fut compté comme justice. »</em> <span class="ref">Romains 4:3</span></p>
      <p>On ne croit pas seul. La foi reçue est celle de l'Église, qui la transmet et la garde à travers les siècles ; le croyant la fait sienne et la professe avec elle dans le Credo, où l'Église dit ensemble ce qu'elle tient de Dieu.</p>
      <h2>Certaine et obscure</h2>
      <p>La foi joint deux traits que l'on croirait éloignés. Elle est plus certaine que toute connaissance humaine, parce qu'elle s'appuie sur Dieu lui-même, qui ne peut tromper. Elle demeure pourtant obscure, car elle adhère à ce qu'elle ne voit pas encore : le croyant avance vers Dieu dans la confiance, sans encore le voir. <em>« Nous marchons par la foi, non par la vue. »</em> <span class="ref">2 Corinthiens 5:7</span> Cette obscurité est l'état du voyageur encore en chemin ; au terme, la foi s'achèvera dans la vision. <em>« Nous voyons à présent au moyen d'un miroir, d'une manière confuse, mais alors ce sera face à face. »</em> <span class="ref">1 Corinthiens 13:12</span></p>
      <h2>Une foi qui agit par la charité</h2>
      <p>La foi reçoit sa pleine vie de la charité, qui la met en œuvre. Unie à l'amour de Dieu, elle se traduit en actes et porte du fruit. <em>« La foi, si elle n'a pas les œuvres, est morte en elle-même. »</em> <span class="ref">Jacques 2:17</span> C'est la charité qui lui donne sa valeur devant Dieu. <em>« Ce qui compte, c'est la foi agissant par la charité. »</em> <span class="ref">Galates 5:6</span></p>
      <h2>La nécessité de la foi</h2>
      <p>La foi est nécessaire au salut. Elle est le commencement de la vie avec Dieu et le fondement de tout ce qui suit, car on s'approche de lui en croyant qu'il est et qu'il récompense ceux qui le cherchent. <em>« Sans la foi, il est impossible de plaire à Dieu. »</em> <span class="ref">Hébreux 11:6</span> Le Christ l'a jointe au baptême comme la voie du salut offerte à tous. <em>« Celui qui croira et sera baptisé sera sauvé. »</em> <span class="ref">Marc 16:16</span> Gardée et nourrie par la prière, l'écoute de la parole et les sacrements, la foi grandit tout au long de la vie.</p>
      <h2>Une attente fondée sur la promesse de Dieu</h2>
      <p>Par l'espérance, l'homme désire le Royaume des cieux et la vie éternelle comme son bonheur, et il l'attend de Dieu avec une ferme confiance. Elle a son fondement dans la victoire du Christ sur la mort, qui a ouvert le ciel à l'homme. <em>« Il nous a régénérés pour une espérance vivante par la résurrection de Jésus-Christ d'entre les morts. »</em> <span class="ref">1 Pierre 1:3</span> Ce que Dieu a promis, il l'accomplit. <em>« Restons fermes dans la confession de notre espérance, car il est fidèle, celui qui a promis. »</em> <span class="ref">Hébreux 10:23</span> Sa certitude n'est pas celle de la vision : c'est une ferme confiance, appuyée sur la fidélité de Dieu.</p>
      <h2>Une espérance des biens invisibles</h2>
      <p>L'espérance s'attache à des biens encore à venir, que l'on ne voit pas : c'est dans cette attente qu'elle déploie sa force, et le salut lui-même nous est donné sous ce mode. <em>« Car c'est en espérance que nous sommes sauvés. Or, une espérance que l'on voit n'est plus une espérance : ce que l'on voit, peut-on l'espérer encore ? »</em> <span class="ref">Romains 8:24</span> Elle soutient ainsi la marche du croyant à travers le temps, les yeux fixés sur ce qui lui est promis.</p>
      <h2>Un appui sur la grâce de Dieu</h2>
      <p>L'homme n'atteint pas la vie éternelle par ses seules forces. L'espérance place sa confiance dans le secours de l'Esprit Saint, qui soutient le désir et donne d'avancer vers le but. Elle attend tout de la bonté de Dieu : le pardon, la persévérance et le bonheur promis. <em>« Que le Dieu de l'espérance vous remplisse de toute joie et de toute paix dans la foi, afin que vous abondiez en espérance par la puissance de l'Esprit Saint. »</em> <span class="ref">Romains 15:13</span> Cette espérance s'étend aussi aux autres : on espère pour le salut de tous, portant devant Dieu l'attente de ceux qu'on aime.</p>
      <h2>Une ancre dans l'épreuve</h2>
      <p>L'espérance tient l'âme ferme au milieu des épreuves, car elle est fixée en Dieu lui-même, que rien n'ébranle. Elle est pour l'âme ce que l'ancre est pour le navire. <em>« Nous la tenons comme une ancre de l'âme, sûre et solide. »</em> <span class="ref">Hébreux 6:19</span> Dans la souffrance même, elle s'affermit. <em>« L'épreuve produit la persévérance, la persévérance une vertu éprouvée, et cette vertu l'espérance ; et l'espérance ne déçoit pas. »</em> <span class="ref">Romains 5:3-5</span></p>
      <h2>Le péché contre l'espérance</h2>
      <p>Deux égarements opposés blessent l'espérance. Le désespoir abandonne l'attente du salut, comme si Dieu pouvait manquer à sa promesse ou refuser son pardon. La présomption attend le salut sans Dieu, en comptant sur ses seules forces, ou bien l'attend de Dieu sans conversion, comme s'il pardonnait à qui ne se tourne pas vers lui. L'espérance se tient dans la juste mesure : elle attend tout de Dieu, et elle y travaille avec lui.</p>
      <h2>Un amour qui se donne</h2>
      <p>Par la charité, l'homme aime Dieu par-dessus tout, parce qu'il est le souverain bien, et son prochain comme lui-même pour l'amour de Dieu. Le Christ en a fait le premier de tous les commandements. <em>« Tu aimeras le Seigneur ton Dieu de tout ton cœur, et ton prochain comme toi-même. »</em> <span class="ref">Matthieu 22:37-39</span> Le mot grec rendu par « charité » est l'<em>agapē</em> (ἀγάπη) : l'amour qui se donne et veut le bien de l'autre pour l'autre. Il se donne le premier, gratuitement, sans rien attendre en retour. <em>« Il n'y a pas de plus grand amour que de donner sa vie pour ses amis. »</em> <span class="ref">Jean 15:13</span> C'est l'amour dont Dieu nous aime. <em>« Dieu est amour, et celui qui demeure dans l'amour demeure en Dieu. »</em> <span class="ref">1 Jean 4:16</span></p>
      <h2>Un amour répandu dans le cœur</h2>
      <p>La charité est un don de Dieu, répandu dans le cœur avec la grâce sanctifiante. Elle vient de lui, qui aime le premier et met dans l'homme le pouvoir de l'aimer en retour. <em>« L'amour de Dieu a été répandu dans nos cœurs par l'Esprit Saint qui nous a été donné. »</em> <span class="ref">Romains 5:5</span> L'homme aime alors d'un amour qui le dépasse, participant à l'amour même dont Dieu l'aime. <em>« Nous, aimons, puisque lui nous a aimés le premier. »</em> <span class="ref">1 Jean 4:19</span></p>
      <h2>Une amitié avec Dieu</h2>
      <p>Cet amour partagé fait de l'homme l'ami de Dieu. La charité est une amitié : un amour mutuel, où Dieu se donne et où l'homme répond, admis dans l'intimité de son Seigneur. Le Christ l'a dit aux siens au soir de sa vie. <em>« Je ne vous appelle plus serviteurs, je vous appelle amis, parce que je vous ai fait connaître tout ce que j'ai entendu de mon Père. »</em> <span class="ref">Jean 15:15</span></p>
      <h2>Aimer Dieu, aimer le prochain</h2>
      <p>L'amour de Dieu et l'amour du prochain forment une seule charité, car on aime le prochain pour Dieu et en Dieu. L'un est la mesure et la preuve de l'autre. <em>« Celui qui n'aime pas son frère, qu'il voit, ne peut aimer Dieu, qu'il ne voit pas. »</em> <span class="ref">1 Jean 4:20</span> Le Christ en a fait son commandement, à la mesure de son propre amour. <em>« Aimez-vous les uns les autres comme je vous ai aimés. À ceci, tous reconnaîtront que vous êtes mes disciples. »</em> <span class="ref">Jean 13:34-35</span></p>
      <h2>L'ordre et l'amour des ennemis</h2>
      <p>La charité aime tout être en Dieu, selon un ordre : Dieu d'abord, aimé par-dessus tout ; puis les autres, chacun selon les liens que Dieu a noués, sans en exclure personne. Elle atteint son point extrême dans l'amour des ennemis, où elle aime qui ne le mérite pas, comme Dieu aime le premier. <em>« Aimez vos ennemis, et priez pour ceux qui vous persécutent. »</em> <span class="ref">Matthieu 5:44</span></p>
      <h2>Le visage de la charité</h2>
      <p>La charité prend un visage concret dans la vie de chaque jour. <em>« La charité est patiente, elle est pleine de bonté ; elle ne cherche pas son intérêt, elle excuse tout, espère tout, supporte tout. »</em> <span class="ref">1 Corinthiens 13:4-7</span> Ce sont là les gestes où l'amour de Dieu passe dans la vie de l'homme.</p>
      <h2>Ce qui la blesse, et sa croissance</h2>
      <p>À la charité s'opposent la haine de Dieu ou du prochain, l'indifférence qui se ferme à l'amour reçu, et le scandale qui détourne autrui du bien. Elle grandit tout au long de la vie : chaque acte d'amour l'augmente, et le croyant en demande la croissance. <em>« Que votre amour grandisse de plus en plus en connaissance et en pleine intelligence. »</em> <span class="ref">Philippiens 1:9</span></p>
      <h2>La forme de toutes les vertus</h2>
      <p>La charité donne aux autres vertus leur achèvement et les anime de l'intérieur, les ordonnant toutes à Dieu. Sans elle, les œuvres les plus grandes restent vides devant lui ; avec elle, le moindre acte devient précieux. Elle relie ensemble toute la vie chrétienne. <em>« Par-dessus tout, ayez l'amour, qui est le lien de la perfection. »</em> <span class="ref">Colossiens 3:14</span></p>
      <h2>La plus grande, et qui demeure</h2>
      <p>La charité surpasse la foi et l'espérance, parce qu'elle atteint Dieu lui-même et qu'elle demeure quand les deux autres s'achèvent. Au ciel, la foi laissera place à la vision et l'espérance à la possession. <em>« L'amour ne passe jamais. »</em> <span class="ref">1 Corinthiens 13:8</span> Elle est la plus grande des trois et le sommet de toute la vie avec Dieu.</p>

    contenu: `
      <p>L'Église est l'assemblée de ceux que Dieu appelle et rassemble dans le Christ pour former un seul Peuple. Elle réunit les croyants dans une même foi, un même baptême et une même vie reçue de Dieu, et les unit au Christ comme à leur tête. Le Christ l'a lui-même fondée et lui a promis de tenir jusqu'à la fin : <em>« Tu es Pierre, et sur cette pierre je bâtirai mon Église, et les portes de l'enfer ne prévaudront pas contre elle. »</em> <span class="ref">Matthieu 16:18</span></p>

      <p>L'Église naît du Christ. Il la rassemble durant sa vie, l'établit sur Pierre et les apôtres, et la fait reposer sur lui-même comme sur sa pierre angulaire : <em>« Vous êtes édifiés sur le fondement des apôtres, le Christ Jésus étant lui-même la pierre angulaire. »</em> <span class="ref">Éphésiens 2:20</span></p>
      <h2>Née de l'Esprit</h2>
      <p>Au jour de la Pentecôte, le Christ ressuscité et monté au ciel envoie l'Esprit qu'il avait promis. Les Apôtres sont réunis en prière avec Marie lorsque l'Esprit descend sur eux dans un grand souffle et des langues de feu : <em>« Ils furent tous remplis du Saint-Esprit, et se mirent à parler en d'autres langues. »</em> <span class="ref">Actes 2:4</span> Ceux qui se tenaient cachés sortent et annoncent le Christ avec hardiesse. À la prédication de Pierre, ce jour-là, environ trois mille hommes croient et reçoivent le baptême : <em>« Ceux qui acceptèrent sa parole furent baptisés ; ce jour-là, le nombre des disciples augmenta d'environ trois mille âmes. »</em> <span class="ref">Actes 2:41</span> Le groupe rassemblé par le Christ devient un peuple envoyé au monde.</p>
      <p>L'Église était formée par le Christ ; à la Pentecôte, elle reçoit la vie. Ce que le Christ avait préparé, l'Esprit l'anime et l'envoie. À Babel, l'orgueil des hommes avait confondu les langues et dispersé les peuples ; à la Pentecôte, l'Esprit donne à des hommes de toute nation d'entendre, chacun dans sa langue, la même Bonne Nouvelle, et rassemble en un seul corps ce que le péché avait divisé. Dès sa naissance, l'Église est catholique, ouverte à toutes les nations.</p>
      <h2>Le Corps du Christ</h2>
      <p>L'Église est le Corps du Christ. Le Christ en est la tête, et les baptisés en sont les membres : reliés à lui et les uns aux autres, ils reçoivent de lui leur vie et forment ensemble un seul corps animé par un seul Esprit : <em>« Vous êtes le corps du Christ, et vous êtes ses membres, chacun pour sa part. »</em> <span class="ref">1 Corinthiens 12:27</span></p>
      <p>C'est de la tête que tout le corps tient sa croissance et son unité : <em>« Il est la tête du corps, qui est l'Église. »</em> <span class="ref">Colossiens 1:18</span> Ce Peuple rassemblé par Dieu est consacré à son service et appelé à le faire connaître : <em>« Vous êtes une race choisie, un sacerdoce royal, une nation sainte, un peuple acquis, pour annoncer les louanges de celui qui vous a appelés des ténèbres à son admirable lumière. Vous qui autrefois n'étiez pas un peuple, vous êtes maintenant le peuple de Dieu. »</em> <span class="ref">1 Pierre 2:9-10</span></p>
      <h2>Temple de l'Esprit et Épouse du Christ</h2>
      <p>L'Écriture nomme l'Église par plusieurs images qui se complètent. Au Corps du Christ elle joint le Temple de l'Esprit et l'Épouse du Christ. Elle est le Temple où Dieu habite, bâti de pierres vivantes, les croyants que l'Esprit assemble et anime. <em>« Vous êtes le temple de Dieu, et l'Esprit de Dieu habite en vous. »</em> <span class="ref">1 Corinthiens 3:16</span> L'Esprit Saint est l'âme de ce corps : il l'unit, la sanctifie et y répand ses dons. Elle est aussi l'Épouse, que le Christ s'est unie pour toujours et qu'il aime jusqu'au don de lui-même. <em>« Je vous ai unis à un seul époux, pour vous présenter au Christ comme une vierge pure. »</em> <span class="ref">2 Corinthiens 11:2</span> Corps qu'il anime, Temple qu'il habite, Épouse qu'il aime : ces images disent une seule réalité, l'union de l'Église à son Seigneur.</p>
      <h2>Visible et spirituelle</h2>
      <p>L'Église est tout ensemble visible et spirituelle, à l'image de son Seigneur fait homme. Comme le Verbe a uni en lui la divinité et une chair, l'Église unit une réalité que l'on voit, le peuple rassemblé, ses pasteurs, ses sacrements, et une réalité intérieure, la vie de la grâce et la présence de l'Esprit qui l'anime. Les deux ne font qu'un seul mystère : la société visible est le corps où passe la vie invisible. La réduire à une organisation humaine, ce serait oublier l'Esprit qui l'habite ; la réduire à une communion intérieure, ce serait oublier le corps que le Christ a voulu visible. C'est pourquoi il l'a dotée d'une autorité et de signes sensibles, pour conduire un peuple vers un salut qui le dépasse.</p>
      <h2>La structure visible</h2>
      <p>La dimension visible de l'Église a une forme précise. Le Christ lui a donné une assise : il l'a bâtie sur les Apôtres, avec Pierre pour tête, et leur a donné d'enseigner, de sanctifier et de conduire le peuple en son nom. Les évêques leur succèdent, l'évêque de Rome succède à Pierre, et autour d'eux les prêtres et les diacres servent les fidèles : c'est la hiérarchie, par laquelle le Christ continue de conduire les siens. <em>« L'Esprit Saint vous a établis gardiens, pour paître l'Église de Dieu. »</em> <span class="ref">Actes 20:28</span> Trois liens visibles unissent ses membres en un seul corps : la profession d'une même foi, la célébration des mêmes sacrements, et la communion sous les pasteurs légitimes. <em>« Un seul Seigneur, une seule foi, un seul baptême. »</em> <span class="ref">Éphésiens 4:5</span> Par ces liens, l'Église se laisse reconnaître dans le monde comme une société une et visible.</p>
      <h2>Une, sainte, catholique et apostolique</h2>
      <p>L'Église porte quatre traits qui la font reconnaître, professés dans le Credo. Elle est une : un seul corps, dans une même foi, les mêmes sacrements et la communion sous le successeur de Pierre, selon la prière du Christ : <em>« Que tous soient un, afin que le monde croie que tu m'as envoyé. »</em> <span class="ref">Jean 17:21</span> Elle est sainte parce que le Christ l'a aimée et s'est livré pour elle ; il la sanctifie et lui donne les moyens de conduire ses membres à la sainteté : <em>« Le Christ a aimé l'Église : il s'est livré lui-même pour elle, afin de la sanctifier. »</em> <span class="ref">Éphésiens 5:25-26</span></p>
      <p>Elle est catholique, c'est-à-dire universelle : envoyée à tous les peuples et à tous les temps, elle porte le salut au monde entier : <em>« Allez, de toutes les nations faites des disciples. »</em> <span class="ref">Matthieu 28:19</span> Elle est apostolique : elle garde la foi reçue des apôtres, et les évêques, unis au Pape, leur succèdent pour la transmettre fidèlement jusqu'à la fin des temps.</p>
      <h2>Sacrement du salut</h2>
      <p>L'Église est l'instrument par lequel le Christ donne aux hommes le salut qu'il a acquis. Elle est comme une mère qui engendre à la vie divine par le baptême et la nourrit par les sacrements et la parole de Dieu. En elle, les hommes reçoivent ce que le Christ a confié à son Église pour tous.</p>
      <p>Elle est nécessaire au salut, car le Christ a voulu qu'on vienne à lui par elle, et tout salut découle de lui par son corps. Tournée vers son achèvement, elle marche vers le jour où Dieu sera tout en tous, lorsqu'elle sera pleinement unie au Christ dans la gloire : <em>« Je vis la ville sainte, la Jérusalem nouvelle, prête comme une épouse parée pour son époux. »</em> <span class="ref">Apocalypse 21:2</span></p>
      <h2>Hors de l'Église, point de salut</h2>
      <p>Cette nécessité, la tradition l'a dite d'une formule : hors de l'Église, point de salut. Elle ne signifie pas que Dieu damne ceux qui n'ont pu la connaître, mais que tout salut vient du Christ et passe par son Corps : qui est sauvé l'est par l'Église, même sans le savoir. Ceux qui, sans faute de leur part, ignorent l'Évangile et cherchent Dieu d'un cœur droit en accomplissant sa volonté selon leur conscience peuvent obtenir la vie éternelle : ils sont ordonnés à l'Église sans lui appartenir visiblement, et le salut qui les atteint demeure celui du Christ, donné par des voies que Dieu connaît. La formule pèse donc surtout sur ceux qui savent : refuser sciemment l'Église que l'on a reconnue comme fondée par le Christ, c'est refuser le Christ lui-même. Pour tous, elle demeure la voie que le Seigneur a donnée, et nul ne peut la tenir pour facultative.</p>

      <p>Dire la nature de Dieu, c'est dire ce que Dieu est. Dieu s'est nommé lui-même, et tout ce que la foi en confesse tient dans ce nom : il est celui qui est, l'être même. De cette source unique découle tout le reste, qu'il est un, simple, éternel, sans mesure, tout-puissant, et que sa vie est amour. On le connaît par là, sans jamais l'épuiser, car il demeure plus haut que tout ce qu'on en peut dire.</p>
      <h2>Celui qui est</h2>
      <p>Au buisson ardent, Moïse demande à Dieu son nom, et Dieu répond par l'être : <em>« Je suis celui qui suis. »</em> <span class="ref">Exode 3:14</span> Le mot hébreu de cette réponse, rendu par « Je suis celui qui suis », <em>ehyeh asher ehyeh</em> (אֶהְיֶה אֲשֶׁר אֶהְיֶה), donne le nom même de Dieu, celui qui est. Toutes les créatures reçoivent l'existence d'un autre : elles ont commencé, et elles pourraient ne pas être. Dieu seul est l'existence en personne. Il ne tient son être de rien ni de personne ; il est, pleinement, par lui-même. Là est la racine de tout ce qu'on peut dire de lui : il n'a pas la vie, la sagesse, la puissance comme des biens reçus, il les est. Comprendre que Dieu est l'être même, c'est tenir la clé de toutes ses perfections.</p>
      <h2>Un seul Dieu</h2>
      <p>De là vient qu'il ne peut y en avoir qu'un. Deux êtres infinis se borneraient l'un l'autre et ne seraient plus infinis ; l'être même ne se partage pas. Il n'y a donc qu'un seul Dieu, et nul autre à côté de lui. <em>« Je suis le premier et je suis le dernier, et hors moi il n'y a point de Dieu. »</em> <span class="ref">Isaïe 44:6</span></p>
      <h2>Sans parties</h2>
      <p>Parce qu'il est l'être même, Dieu n'est pas composé. Une chose composée est faite de parties qui dépendent les unes des autres, et ce qui est assemblé peut être désassemblé. Dieu n'a pas de parties : il n'est pas fait de corps et d'esprit, et ses qualités ne s'ajoutent pas à lui. En nous, on devient sage, et la sagesse vient se poser sur la personne ; en Dieu, rien ne s'ajoute, car il est ce qu'il a. Sa sagesse est sa puissance, qui est sa bonté, qui est son être : un seul et même Dieu sous des noms divers. Quand nous le disons sage, bon, juste, nous découpons en mots ce qui en lui est parfaitement un. C'est ce qu'on appelle sa simplicité : tout ce qu'il est, il l'est d'un seul tenant.</p>
      <h2>Éternel et immuable</h2>
      <p>Le même principe le veut sans changement. Changer, c'est gagner ce qu'on n'avait pas ou perdre ce qu'on avait ; Dieu, qui est tout l'être, n'a rien à acquérir ni rien à perdre. Il est immuable, c'est-à-dire qu'il ne change pas. <em>« Car moi, le Seigneur, je ne change pas. »</em> <span class="ref">Malachie 3:6</span> De là vient aussi qu'il est hors du temps. Le temps mesure le changement, l'avant et l'après ; ce qui ne change pas ne s'écoule pas en instants successifs. Dieu possède sa vie tout entière à la fois, sans passé révolu ni avenir qui manque : il est éternel. <em>« D'éternité en éternité, tu es Dieu. »</em> <span class="ref">Psaume 90:2</span></p>
      <h2>L'être sans limite</h2>
      <p>Étant l'être même, Dieu n'a pas de bornes : il possède toute la perfection de l'être sans en rien exclure. Il est infini. Rien ne le limite, donc rien ne le contient : il n'est pas enfermé dans un lieu, il est présent en toute chose, plus intime à chacune qu'elle ne l'est à elle-même, puisque c'est lui qui la fait être à chaque instant. <em>« Est-ce que je ne remplis pas le ciel et la terre ? dit le Seigneur. »</em> <span class="ref">Jérémie 23:24</span> De cette plénitude viennent sa puissance et sa science. Il est tout-puissant : il peut tout ce qui peut être par sa seule volonté. Il a tiré le monde du néant en le voulant. <em>« Reconnais que Dieu a fait de rien le ciel et la terre, et qu'il en est de même de la race des hommes. »</em> <span class="ref">2 Maccabées 7:28</span> Il est omniscient : il connaît tout sans rien apprendre du dehors, en se connaissant lui-même comme la source de tout. Le passé, l'avenir, le secret des cœurs, tout lui est présent. <em>« Tout est nu et à découvert à ses yeux. »</em> <span class="ref">Hébreux 4:13</span></p>
      <h2>Plus haut que tout ce qu'on en dit</h2>
      <p>Tout ce langage atteint Dieu sans jamais le cerner. Dieu est pur esprit, sans corps ni figure. <em>« Dieu est esprit, et ceux qui l'adorent doivent l'adorer en esprit et en vérité. »</em> <span class="ref">Jean 4:24</span> Nos mots viennent des choses créées, et Dieu les dépasse toutes ; nous le nommons d'après ses œuvres, comme on devine l'auteur à l'ouvrage, en sachant qu'il est tout cela d'une manière infiniment plus haute. <em>« Les perfections invisibles de Dieu se voient depuis la création du monde dans ses œuvres. »</em> <span class="ref">Romains 1:20</span> C'est pourquoi l'on connaît souvent mieux ce qu'il n'est pas que ce qu'il est, et toute parole sur lui reste en deçà. <em>« Prétends-tu sonder les profondeurs de Dieu, atteindre la perfection du Tout-Puissant ? »</em> <span class="ref">Job 11:7</span></p>
      <h2>Saint, bon, amour</h2>
      <p>Cette plénitude d'être est plénitude de bien. Dieu est le bien même, dont tout autre bien n'est qu'un reflet, et le saint par excellence, séparé de tout mal, devant qui les anges se voilent. <em>« Saint, saint, saint est le Seigneur ; toute la terre est pleine de sa gloire. »</em> <span class="ref">Isaïe 6:3</span> Ce bien ne se garde pas pour lui, il se donne : Dieu a créé par pure générosité et se communique sans fin. Au terme, toute cette plénitude reçoit un nom. <em>« Dieu est amour. »</em> <span class="ref">1 Jean 4:8</span> Toutes les perfections qu'on a nommées, l'unité, la simplicité, l'éternité, la puissance, trouvent là leur visage : l'être même est un amour qui se donne.</p>
      <p>Dieu a révélé que l'être qu'il est se vit comme un échange d'amour : le Père, le Fils et l'Esprit, un seul Dieu en trois Personnes. La nature de Dieu est cette plénitude inépuisable, que les bienheureux contempleront dans la vie éternelle sans jamais l'épuiser.</p>

      <p>La Trinité est le mystère central de la foi chrétienne : il y a un seul Dieu en trois Personnes, le Père, le Fils et l'Esprit Saint. Les trois sont un seul et même Dieu, égaux et éternels, partageant une seule vie divine. Ce mystère dépasse les forces de la raison ; on le connaît parce que Dieu l'a révélé, en se faisant connaître tel qu'il est. L'Écriture les nomme ensemble dans une même bénédiction : <em>« Que la grâce du Seigneur Jésus-Christ, l'amour de Dieu et la communion du Saint-Esprit soient avec vous tous. »</em> <span class="ref">2 Corinthiens 13:13</span></p>
      <h2>Un seul Dieu</h2>
      <p>Il n'y a qu'un seul Dieu, une seule nature divine, ce que Dieu est. La foi reçue d'Israël tient cette unité pour le premier de tout, et la confesse comme le fondement de tout le reste : <em>« Écoute, Israël : le Seigneur notre Dieu est l'unique Seigneur. »</em> <span class="ref">Deutéronome 6:4</span></p>
      <p>Le Père, le Fils et l'Esprit Saint sont l'unique Dieu. Chacun est Dieu tout entier, possédant la même et unique nature divine, sans la diviser ni la multiplier.</p>
      <h2>Trois Personnes</h2>
      <p>En ce Dieu unique, il y a trois Personnes, c'est-à-dire trois « quelqu'un » distincts, dont chacun est pleinement Dieu. Le Père est la source sans origine ; le Fils est engendré de lui de toute éternité ; l'Esprit procède du Père et du Fils. Les trois Personnes sont égales en dignité et coéternelles. <em>« Le Père et moi, nous sommes un. »</em> <span class="ref">Jean 10:30</span></p>
      <h2>Connaître et aimer en Dieu</h2>
      <p>Notre esprit agit par deux puissances : l'intelligence, qui connaît, et la volonté, qui aime. C'est par elles que l'homme est dit fait à l'image de Dieu : il porte en lui le pouvoir de connaître et d'aimer, comme Dieu connaît et aime. <em>« Faisons l'homme à notre image, selon notre ressemblance. »</em> <span class="ref">Genèse 1:26</span></p>
      <p>Cette ressemblance a pourtant sa mesure, car Dieu est infiniment simple. En nous, l'intelligence et la volonté sont deux puissances distinctes de l'âme, et leurs actes, le concept que l'on forme, l'amour que l'on ressent, demeurent de simples états passagers. En Dieu, son acte de connaître et son acte d'aimer sont son essence même, le seul et même Dieu.</p>
      <p>En lui, ces deux actes portent un fruit éternel. En se connaissant parfaitement, le Père exprime tout ce qu'il est dans un Verbe, sa Parole vivante. <em>« Au commencement était le Verbe, et le Verbe était auprès de Dieu, et le Verbe était Dieu. »</em> <span class="ref">Jean 1:1</span> Ce Verbe reçoit l'essence divine tout entière et subsiste comme une Personne, le Fils. De même, l'amour dont le Père et le Fils s'aiment reçoit l'essence entière et subsiste comme une Personne, l'Esprit. Le Fils est ainsi engendré par mode de connaissance, et l'Esprit procède par mode d'amour.</p>
      <h2>Distinctes par leurs relations</h2>
      <p>Les trois Personnes se distinguent par leurs relations d'origine, et par elles seules. Le Père engendre, le Fils est engendré, l'Esprit procède : c'est tout ce qui les sépare, et cela suffit à les rendre réellement distinctes, tout en restant le seul Dieu. Tout ce qu'elles sont, elles le sont ensemble, hormis ce que la relation distingue. L'Esprit procède du Père, que le Fils envoie d'auprès de lui : <em>« Quand viendra le Défenseur, que je vous enverrai d'auprès du Père, l'Esprit de vérité qui procède du Père. »</em> <span class="ref">Jean 15:26</span> Cet Esprit est aussi l'Esprit du Fils, qui le donne comme étant sien : <em>« Dieu a envoyé dans nos cœurs l'Esprit de son Fils. »</em> <span class="ref">Galates 4:6</span> Le Fils a part à cette origine, car il reçoit du Père tout ce que le Père possède, jusqu'à faire procéder l'Esprit avec lui : <em>« Il prendra de ce qui est à moi ; tout ce que le Père possède est à moi. »</em> <span class="ref">Jean 16:14-15</span> L'Esprit procède donc du Père et du Fils comme d'un seul principe, le Père demeurant la source sans origine, qui donne au Fils de le faire procéder avec lui. C'est pourquoi l'Église confesse que l'Esprit procède du Père et du Fils.</p>
      <h2>Révélée par le Christ</h2>
      <p>Le Christ a révélé ce mystère caché en Dieu. En venant parmi les hommes, le Fils a fait connaître le Père et a promis l'Esprit. Au moment de son baptême dans le Jourdain, les trois se manifestent ensemble : le Fils dans l'eau, l'Esprit comme une colombe, le Père par sa voix : <em>« Il vit l'Esprit de Dieu descendre comme une colombe et venir sur lui, et des cieux une voix disait : Celui-ci est mon Fils bien-aimé. »</em> <span class="ref">Matthieu 3:16-17</span></p>
      <h2>Le Père</h2>
      <p>Première Personne, le Père est l'origine sans origine, d'où viennent le Fils et l'Esprit. La création est l'œuvre des trois Personnes ensemble ; le Credo l'attribue d'abord au Père parce qu'il en est la source. L'unique Dieu appelle le monde à l'existence par sa seule parole et le tient dans la vie à chaque instant, jusqu'au plus petit détail. <em>« Au commencement, Dieu créa le ciel et la terre. »</em> <span class="ref">Genèse 1:1</span></p>
      <p>Si Dieu se nomme Père, c'est d'abord parce qu'il engendre éternellement son Fils : la paternité est en lui avant d'être en aucune créature, et toute paternité humaine en descend comme un reflet. <em>« Je fléchis les genoux devant le Père, de qui toute paternité, au ciel et sur la terre, tire son nom. »</em> <span class="ref">Éphésiens 3:14-15</span> Ce nom dit l'origine et l'amour, par-delà la distinction des sexes : sa tendresse pour l'homme surpasse même celle d'une mère. <em>« Une femme oublie-t-elle son nourrisson ? Quand même elle l'oublierait, moi je ne t'oublierai pas. »</em> <span class="ref">Isaïe 49:15</span></p>
      <p>Père de son Fils unique de toute éternité, il devient le Père des hommes en les adoptant. Par la grâce du baptême, l'Esprit du Fils est donné au croyant, qui s'adresse alors à Dieu comme à son Père. <em>« Vous avez reçu un Esprit d'adoption filiale, par lequel nous crions : Abba, Père ! »</em> <span class="ref">Romains 8:15</span></p>
      <h2>Le Fils</h2>
      <p>Deuxième Personne, le Fils est le Verbe de Dieu, engendré du Père de toute éternité, de même nature que lui : Dieu né de Dieu. « Verbe » signifie « Parole ». Comme une parole exprime tout entière la pensée de celui qui la dit, le Fils exprime tout entier ce que le Père est : le Père s'énonce en un seul Verbe, parfait et unique, en qui il dit tout ce qu'il est. Image parfaite du Père, il est celui en qui le Père se connaît et se donne. <em>« Il est le rayonnement de sa gloire et l'empreinte de son être. »</em> <span class="ref">Hébreux 1:3</span></p>
      <p>Le prologue de l'évangile de Jean fut écrit en grec, et le mot qu'il emploie est <em>Logos</em> (λόγος), qui dit à la fois la parole et la raison : le mot que l'on prononce, et l'intelligence et l'ordre qui s'y expriment. Nommer le Fils « Logos », c'est le confesser tout ensemble Parole que le Père énonce et Sagesse par laquelle il pense et ordonne le monde. La pensée grecque appelait déjà « logos » la raison qui traverse l'univers ; Jean reprend ce mot et révèle que ce Logos est une Personne, Dieu lui-même. Traduit en latin, « Logos » devint « Verbum », d'où vient le français « Verbe ».</p>
      <p>Le Père crée toutes choses par le Fils, son Verbe : Dieu dit, et cela est ; cette parole créatrice est le Verbe lui-même, par qui le Père appelle toutes choses à l'existence et les tient dans l'être. <em>« Tout a été fait par lui, et rien de ce qui existe n'a été fait sans lui. »</em> <span class="ref">Jean 1:3</span></p>
      <p>Pour sauver les hommes, le Fils a pris notre nature : conçu de l'Esprit Saint et né de la Vierge Marie, il est devenu homme sans cesser d'être Dieu, par amour et pour notre salut. <em>« Et le Verbe s'est fait chair, et il a habité parmi nous, et nous avons vu sa gloire. »</em> <span class="ref">Jean 1:14</span></p>
      <h2>L'Esprit Saint</h2>
      <p>Troisième Personne, l'Esprit Saint procède du Père et du Fils par mode d'amour : il est l'Amour dont ils s'aiment et le Don où ils se donnent tout entiers, Seigneur agissant au cœur des hommes. <em>« Le Seigneur, c'est l'Esprit ; et là où est l'Esprit du Seigneur, là est la liberté. »</em> <span class="ref">2 Corinthiens 3:17</span></p>
      <p>L'Esprit échappe au regard, et l'Écriture le donne à connaître par des images. Le mot qui le nomme, <em>ruah</em> (<span dir="rtl">רוּחַ</span>) en hébreu, <em>pneuma</em> (πνεῦμα) en grec, signifie à la fois le souffle, le vent et l'esprit. Le vent en est l'image la plus parlante : <em>« Le vent souffle où il veut, et tu en entends le bruit ; mais tu ne sais ni d'où il vient ni où il va. Il en est ainsi de quiconque est né de l'Esprit. »</em> <span class="ref">Jean 3:8</span> La colombe, descendue sur le Christ à son baptême, le manifeste comme le Messie, celui sur qui repose l'Esprit. Déjà, après le déluge, une colombe était revenue vers Noé, signe que le jugement était passé et la terre rendue à la vie : <em>« Une feuille d'olivier arrachée était dans son bec ; Noé connut ainsi que les eaux avaient diminué sur la terre. »</em> <span class="ref">Genèse 8:11</span> Le même signe, sur le Jourdain, annonce la paix de la nouvelle création.</p>
      <p>Le feu dit la puissance transformante de l'Esprit : il purifie, comme la flamme épure le métal, et embrase le cœur de la charité de Dieu ; au matin de la Pentecôte, il se posa sur les disciples en langues de flamme. Jean-Baptiste l'avait annoncé : <em>« Lui vous baptisera dans l'Esprit Saint et le feu. »</em> <span class="ref">Matthieu 3:11</span> L'onction le montre consacrant et fortifiant celui qu'il saisit : l'huile pénètre ce qu'elle touche et l'imprègne en profondeur, et de même l'Esprit gagne l'âme tout entière. Il est l'onction même dont le Christ tire son nom, le mot grec rendu par « Oint », <em>Christos</em> (χριστός) : <em>« Dieu a oint de l'Esprit Saint et de force Jésus de Nazareth. »</em> <span class="ref">Actes 10:38</span> Le chrétien en reçoit le sceau au baptême et à la confirmation.</p>
      <p>Il est le Seigneur qui donne la vie : présent dès l'origine sur la création, il porte en l'homme la vie nouvelle de Dieu, et il a fait parler les prophètes et inspiré les Écritures. Avant sa Passion, le Christ l'a promis sous le nom de Paraclet, le mot grec <em>paraklētos</em> (παράκλητος) désignant celui qu'on appelle à ses côtés pour défendre et consoler ; le jour de la Pentecôte, il descend sur les disciples et fait naître l'Église. <em>« Ils furent tous remplis de l'Esprit Saint. »</em> <span class="ref">Actes 2:4</span> Depuis, il demeure dans l'Église et la conduit vers la vérité tout entière.</p>
      <p>L'Esprit habite l'âme du baptisé par la grâce sanctifiante : il y répand l'amour de Dieu et soutient la prière. <em>« L'amour de Dieu a été répandu dans nos cœurs par l'Esprit Saint qui nous a été donné. »</em> <span class="ref">Romains 5:5</span> Il comble le croyant de ses dons. La prophétie d'Isaïe les énumère : <em>« Sur lui reposera l'Esprit du Seigneur : esprit de sagesse et d'intelligence, esprit de conseil et de force, esprit de connaissance et de crainte du Seigneur. »</em> <span class="ref">Isaïe 11:2-3</span> La tradition en compte sept, ajoutant la piété. Là où il règne, ces dons mûrissent en fruits, marques visibles d'une vie qu'il conduit. <em>« Le fruit de l'Esprit, c'est charité, joie, paix, patience, bonté, bienveillance, fidélité, douceur, maîtrise de soi. »</em> <span class="ref">Galates 5:22-23</span></p>
      <h2>Une communion d'amour</h2>
      <p>La vie intime de Dieu est un échange d'amour entre les trois Personnes, donné et reçu sans fin. Cet amour est ce que Dieu est : <em>« Dieu est amour. »</em> <span class="ref">1 Jean 4:8</span></p>
      <p>Par la grâce sanctifiante, Dieu fait entrer l'homme dans cette vie : la Trinité vient habiter l'âme du baptisé et l'associe à sa propre communion. La fin de l'homme est de partager pour toujours cet amour : <em>« Si quelqu'un m'aime, il gardera ma parole, et mon Père l'aimera ; nous viendrons à lui et nous ferons chez lui notre demeure. »</em> <span class="ref">Jean 14:23</span></p>

    contenu: `
      <p>Marie est la Vierge que Dieu a choisie pour mère de son Fils fait homme. Tout ce que la foi reconnaît en elle découle de cette maternité : Dieu l'a préparée à la porter en la comblant de sa grâce dès le premier instant de sa vie, et au jour de l'Annonciation elle a donné un consentement libre et entier par lequel le Sauveur est entré dans le monde. <em>« Lorsque les temps furent accomplis, Dieu envoya son Fils, né d'une femme. »</em> <span class="ref">Galates 4:4</span></p>
      <h2>Mère de Dieu</h2>
      <p>Marie est Mère de Dieu, car celui qu'elle a conçu et enfanté est Dieu, le Fils éternel devenu homme. Une mère met au monde une personne, et la personne qu'elle a portée en son sein est Dieu lui-même. L'Église la confesse donc <em>Theotokos</em> (Θεοτόκος), « celle qui enfante Dieu », titre que le concile d'Éphèse a défini en 431 contre ceux qui ne voulaient voir en elle que la mère d'un homme. L'enfant qu'elle met au monde est Dieu présent parmi les hommes. <em>« On l'appellera Emmanuel, ce qui se traduit : Dieu avec nous. »</em> <span class="ref">Matthieu 1:23</span> De cette maternité divine viennent tous ses autres privilèges : ils conviennent à celle dont le sein a été le premier sanctuaire du Verbe.</p>
      <h2>La nouvelle Ève</h2>
      <p>Dès la chute, Dieu avait annoncé une femme dont la descendance briserait le pouvoir du mal. <em>« Je mettrai une inimitié entre toi et la femme, entre ta descendance et la sienne : elle t'écrasera la tête. »</em> <span class="ref">Genèse 3:15</span> Cette inimitié est entière : elle ne laisse aucun instant où la femme aurait appartenu au mal. Marie est cette femme, et l'Église la reconnaît comme la nouvelle Ève. La première Ève, vierge et sans péché, a écouté le serpent et entraîné la chute ; Marie, vierge et comblée de grâce, écoute la parole de Dieu et accueille en elle le Sauveur du monde. <em>« Je suis la servante du Seigneur ; qu'il m'advienne selon ta parole. »</em> <span class="ref">Luc 1:38</span> Ce que la désobéissance de l'une avait noué, l'obéissance de l'autre le dénoue : par son consentement, Marie coopère à l'œuvre du salut que son Fils accomplit.</p>
      <h2>L'Immaculée Conception</h2>
      <p>L'Immaculée Conception est le privilège par lequel Marie a été préservée du péché originel dès le premier instant de son existence, dans le sein de sa mère. Depuis la faute des origines, tout homme naît privé de la grâce sanctifiante que Dieu voulait pour l'humanité ; cet état de privation, transmis à tous comme un héritage, est le péché originel. Marie seule en a été gardée indemne, comblée de grâce avant même de pouvoir agir. L'ange la salue par ce nom de grâce avant tout autre. <em>« Je te salue, comblée de grâce, le Seigneur est avec toi. »</em> <span class="ref">Luc 1:28</span> Là où le français dit « comblée de grâce », le grec porte un seul mot que l'ange emploie à la place de son nom, <em>kecharitōmenē</em> (κεχαριτωμένη) : il dit une grâce déjà pleinement accomplie en elle, et qui demeure.</p>
      <p>Marie aussi a été sauvée par le Christ, et plus parfaitement que tout autre. Les autres rachetés sont relevés après être tombés ; Marie a été gardée de tomber, par les mérites de son Fils appliqués d'avance à l'instant de sa conception. Préserver quelqu'un du gouffre est une délivrance plus haute que l'en retirer une fois tombé : le salut du Christ atteint donc Marie de la manière la plus parfaite, et elle en est le fruit le plus pur. Elle-même reconnaît Dieu pour son Sauveur. <em>« Mon esprit exulte en Dieu, mon Sauveur. »</em> <span class="ref">Luc 1:47</span> L'Église a confessé dès les premiers siècles la sainteté unique de celle qu'elle nommait la toute-sainte ; en 1854 elle a proclamé l'Immaculée Conception comme un dogme de foi, et peu après, à Lourdes, la Vierge se désigna elle-même : « Je suis l'Immaculée Conception. »</p>
      <h2>Toujours Vierge</h2>
      <p>Marie est demeurée vierge toute sa vie : avant, pendant et après la naissance du Christ. L'Église confesse ce triple privilège et l'appelle « toujours Vierge ». Il dit la consécration entière de Marie à Dieu et l'origine de l'enfant qu'elle porte.</p>
      <p>Elle conçoit son Fils par la seule puissance de l'Esprit Saint, sans le concours d'aucun homme. À l'ange qui lui annonce un fils, elle répond par l'étonnement de la vierge. <em>« Comment cela se fera-t-il, puisque je ne connais point d'homme ? »</em> <span class="ref">Luc 1:34</span> Et l'ange lui révèle l'œuvre de Dieu. <em>« L'Esprit Saint viendra sur toi, et la puissance du Très-Haut te prendra sous son ombre. »</em> <span class="ref">Luc 1:35</span> Isaïe l'avait annoncé. <em>« Voici, la vierge concevra et enfantera un fils. »</em> <span class="ref">Isaïe 7:14</span></p>
      <p>Elle met au monde son Fils sans rien perdre de son intégrité. La peine d'enfanter avait été annoncée à Ève comme une suite du péché. <em>« Tu enfanteras tes fils dans la douleur. »</em> <span class="ref">Genèse 3:16</span> Préservée de tout péché dès sa conception, Marie n'en porte pas la peine, et celui qu'elle enfante est lui-même saint, conçu de l'Esprit ; cette naissance échappe au régime de la chute et devient le signe de son origine : l'enfant vient de Dieu. Ézéchiel l'avait figurée sous les traits d'une porte du sanctuaire, par laquelle seul le Seigneur passe et qui demeure fermée. <em>« Cette porte restera fermée, elle ne s'ouvrira pas ; nul n'y passera, car le Seigneur, le Dieu d'Israël, est entré par elle. »</em> <span class="ref">Ézéchiel 44:2</span></p>
      <p>Elle demeure vierge toute sa vie, sans autre enfant : sa virginité est la consécration définitive de celle qui a porté Dieu, le sanctuaire réservé à lui seul. Les Évangiles parlent pourtant des « frères de Jésus ». Dans la langue de la Bible, le mot « frère » déborde la fratrie : l'hébreu et l'araméen n'ont pas de terme distinct pour le cousin ou le neveu, et un même mot couvre toute la parenté proche. Ainsi Abraham appelle Lot son frère, alors que Lot est son neveu. <em>« Car nous sommes frères. »</em> <span class="ref">Genèse 13:8</span> Les Évangiles, écrits en grec sur ce fond sémitique, gardent cet usage : le mot grec rendu par « frère », <em>adelphos</em> (ἀδελφός), s'étend aux cousins comme aux parents éloignés. Matthieu nomme d'ailleurs parmi ces « frères » Jacques et Joseph. <em>« Ses frères ne s'appellent-ils pas Jacques, Joseph, Simon et Jude ? »</em> <span class="ref">Matthieu 13:55</span> Or ces deux-là ont pour mère une autre Marie, présente au pied de la Croix. <em>« Parmi elles, Marie de Magdala, Marie mère de Jacques et de Joseph. »</em> <span class="ref">Matthieu 27:56</span> Dans la coutume d'Israël, le soin d'une mère restée seule revenait à ses fils ; le Christ mourant remet pourtant la sienne au disciple qu'il aimait, non à un autre fils, signe qu'elle n'en a pas. Sa virginité annonce une humanité nouvelle, qui ne naît plus de la chair mais de Dieu. <em>« Ils ne sont pas nés du sang, ni de la volonté de la chair, ni de la volonté de l'homme, mais de Dieu. »</em> <span class="ref">Jean 1:13</span></p>
      <h2>La nouvelle Arche</h2>
      <p>Marie est la nouvelle Arche de l'alliance. L'arche d'autrefois était le coffre le plus saint d'Israël, recouvert d'or, où Dieu se rendait présent au milieu de son peuple. Elle gardait trois signes de l'alliance : les tables de la Loi, une part de manne et le bâton d'Aaron. <em>« Dans l'arche se trouvaient l'urne d'or contenant la manne, le bâton d'Aaron, et les tables de l'alliance. »</em> <span class="ref">Hébreux 9:4</span> Marie porte la réalité que ces trois signes annonçaient : le Verbe, Parole vivante de Dieu ; le pain de vie descendu du ciel ; le prêtre éternel qui s'offrira pour le monde. Ce que l'arche gardait en figure, Marie le donne en personne. L'arche annonçait aussi sa pureté : faite d'un bois incorruptible et revêtue d'or pur au-dedans comme au-dehors. <em>« Tu la recouvriras d'or pur, au-dedans et au-dehors. »</em> <span class="ref">Exode 25:11</span></p>
      <p>L'arche reposait au cœur de la Demeure, le sanctuaire où Dieu se rendait présent au-dessus d'elle. Quand cette Demeure fut achevée au désert, la nuée la couvrit et la gloire de Dieu la remplit. <em>« La nuée couvrit la tente de la rencontre, et la gloire du Seigneur remplit la Demeure. »</em> <span class="ref">Exode 40:34-35</span> Dans la version grecque de l'Ancien Testament, la Septante, le verbe qui dit cette nuée est <em>episkiazō</em> (ἐπισκιάζω), « couvrir de son ombre » ; c'est ce verbe que l'ange reprend à l'Annonciation quand il annonce que la puissance du Très-Haut prendra Marie sous son ombre. Ce que la nuée faisait sur la Demeure qui abritait l'arche, l'Esprit le fait sur Marie : la gloire de Dieu vient l'habiter, et elle devient elle-même la nouvelle Arche, le lieu de la présence.</p>
      <p>L'Évangile raconte la Visitation sur le modèle de l'arche montant vers Jérusalem au temps de David. Marie se lève et part en hâte vers la montagne de Judée, comme l'arche y était montée. Devant l'arche, David s'était écrié. <em>« Comment l'arche du Seigneur viendrait-elle vers moi ? »</em> <span class="ref">2 Samuel 6:9</span> Élisabeth accueille Marie par les mêmes mots. <em>« Comment m'est-il donné que la mère de mon Seigneur vienne jusqu'à moi ? »</em> <span class="ref">Luc 1:43</span> David dansait de joie devant l'arche. <em>« David dansait de toute sa force devant le Seigneur. »</em> <span class="ref">2 Samuel 6:14</span> Jean-Baptiste tressaille d'allégresse dans le sein de sa mère à l'approche de Marie. <em>« L'enfant tressaillit dans son sein. »</em> <span class="ref">Luc 1:41</span> Et Marie demeure environ trois mois auprès d'Élisabeth, comme l'arche était restée trois mois dans la maison d'Obed-Édom. <em>« Marie resta avec elle environ trois mois. »</em> <span class="ref">Luc 1:56</span></p>
      <p>Au terme de l'Écriture, l'arche reparaît dans une vision : le sanctuaire du ciel s'ouvre et l'arche de l'alliance s'y montre. <em>« Le temple de Dieu qui est dans le ciel fut ouvert, et l'arche de son alliance apparut dans son temple. »</em> <span class="ref">Apocalypse 11:19</span> Aussitôt se lève une femme enveloppée de soleil, couronnée de douze étoiles. <em>« Un grand signe parut dans le ciel : une femme enveloppée de soleil, la lune sous ses pieds, et une couronne de douze étoiles sur la tête. »</em> <span class="ref">Apocalypse 12:1</span> L'arche et la femme sont une seule réalité : Marie, qui porte le Sauveur.</p>
      <h2>Le tabernacle de Dieu</h2>
      <p>Du temps de Moïse, au désert, Dieu se rendait présent au milieu de son peuple dans une tente sacrée. Cette tente n'était qu'une figure ; ce qu'elle annonçait est venu en personne. <em>« Et le Verbe s'est fait chair, et il a habité parmi nous. »</em> <span class="ref">Jean 1:14</span> Le mot grec rendu par « il a habité », <em>eskēnōsen</em> (ἐσκήνωσεν), dérive du nom de cette tente sainte, la <em>skēnē</em> (σκηνή) : la présence que la tente abritait repose maintenant dans la chair de son Fils. <em>« En lui habite corporellement toute la plénitude de la divinité. »</em> <span class="ref">Colossiens 2:9</span></p>
      <p>Dans cette tente, puis dans le Temple qui lui succéda, la partie la plus retirée portait le nom de saint des saints. Un grand voile la séparait du reste ; elle abritait l'arche, et la présence de Dieu y reposait. Son accès était fermé à tous, sauf à un seul homme, à un seul moment. <em>« Dans la seconde partie, le grand prêtre seul entre, une fois par an. »</em> <span class="ref">Hébreux 9:7</span></p>
      <p>Voilà ce que Marie est devenue. Le sein qui a porté le Verbe est le lieu où Dieu est venu demeurer dans la plénitude de sa divinité : le saint des saints de la nouvelle alliance, où le Seigneur lui-même a reposé, non plus au-dessus de l'arche, mais dans la chair qu'il prenait d'elle. Et de même que le grand prêtre franchissait seul le voile pour se tenir devant cette présence, le Christ, prêtre éternel, fut le seul à habiter le sanctuaire que fut le corps de sa Mère.</p>
      <h2>L'Assomption</h2>
      <p>L'Assomption est le mystère par lequel Marie, au terme de sa vie terrestre, a été élevée corps et âme dans la gloire du ciel. Le mot vient du latin <em>assumere</em>, prendre avec soi : Dieu a pris Marie auprès de lui tout entière. Le Christ est monté au ciel par sa propre puissance le jour de l'Ascension ; Marie y a été élevée par la puissance de son Fils, reçue dans la gloire par Celui qu'elle avait porté. La Tradition ancienne parle de sa dormition, ce sommeil paisible au terme de sa vie, et l'Église a laissé indéfinie la question de savoir si elle a d'abord connu la mort.</p>
      <p>La décomposition du corps dans le tombeau est une suite du péché, entrée dans la condition humaine avec la faute des origines. <em>« Tu es poussière, et tu retourneras à la poussière. »</em> <span class="ref">Genèse 3:19</span> Là où le péché demeure absent, cette corruption n'a aucune prise : le Christ, livré à la mort sans avoir connu le péché, n'a pas vu sa chair se décomposer. <em>« Sa chair n'a pas vu la corruption. »</em> <span class="ref">Actes 2:31</span> Comblée de grâce et préservée de tout péché, Marie ne portait rien qui appelât la corruption du tombeau. Cette chair avait donné sa propre substance au Christ et porté l'Auteur de la vie ; il convenait qu'elle fût élevée tout entière dans la gloire, comme le corps de son Fils.</p>
      <p>Ce que Marie vit déjà, tous les sauvés l'attendent : à la fin des temps, les corps des justes ressusciteront et seront unis à leur âme dans la gloire. Marie est la première à connaître pleinement cette victoire, par avance et tout entière, et en elle la promesse faite à l'humanité est déjà accomplie. <em>« La mort a été engloutie dans la victoire. »</em> <span class="ref">1 Corinthiens 15:54</span> L'Église a proclamé l'Assomption dogme de foi en 1950, recueillant ce que la Tradition tenait depuis les premiers siècles.</p>
      <h2>Reine du ciel</h2>
      <p>Élevée dans la gloire auprès de son Fils, Marie partage sa royauté. Cette dignité découle de sa maternité : elle est la mère du Roi dont le règne ne finit pas, comme l'ange l'avait annoncé. <em>« Le Seigneur Dieu lui donnera le trône de David son père ; il régnera pour toujours, et son règne n'aura pas de fin. »</em> <span class="ref">Luc 1:32-33</span> Dans la monarchie de David, c'est la mère du roi, et non l'épouse, qui portait le titre de reine : elle recevait un titre officiel, siégeait à la droite du roi et lui présentait les demandes du peuple. Lorsque Bethsabée vient trouver son fils Salomon, le roi se lève et la fait asseoir à sa droite. <em>« Le roi se leva à sa rencontre et se prosterna devant elle, puis on plaça un trône pour la mère du roi, et elle s'assit à sa droite. »</em> <span class="ref">1 Rois 2:19</span> Mère du Roi promis, fils de David, Marie est la reine de son Royaume.</p>
      <p>Le psaume royal l'avait chantée par avance. <em>« À ta droite se tient la reine, parée de l'or d'Ophir. »</em> <span class="ref">Psaume 45:10</span> Élevée à la droite de son Fils, couronnée de douze étoiles dans la vision du ciel, elle partage la gloire de son règne. Sa royauté tient aussi à sa part dans l'œuvre du Roi : unie à lui tout au long de sa vie, elle s'est tenue auprès de lui jusqu'à la Croix, traversée par la même douleur. <em>« Et toi-même, un glaive te transpercera l'âme. »</em> <span class="ref">Luc 2:35</span> Celle qui a partagé l'offrande partage le triomphe.</p>
      <h2>La première des croyants</h2>
      <p>Avant d'être donnée pour mère, Marie est la première des disciples. Elle a cru à la parole de Dieu et s'y est livrée sans réserve, et c'est sa foi qu'Élisabeth proclame heureuse. <em>« Bienheureuse celle qui a cru à l'accomplissement de ce qui lui a été dit de la part du Seigneur. »</em> <span class="ref">Luc 1:45</span> Cette foi a duré toute sa vie : devant les paroles et les événements dont le sens lui échappait encore, elle les recueillait et les gardait au-dedans, les laissant peu à peu livrer leur lumière. <em>« Marie retenait tous ces événements et les méditait dans son cœur. »</em> <span class="ref">Luc 2:19</span> Ainsi a-t-elle avancé dans la foi jusqu'au pied de la Croix, modèle de celui qui accueille la parole de Dieu et la garde. <em>« Sa mère gardait toutes ces choses dans son cœur. »</em> <span class="ref">Luc 2:51</span> C'est cette foi que toutes les générations reconnaissent. <em>« Désormais toutes les générations me diront bienheureuse. »</em> <span class="ref">Luc 1:48</span></p>
      <h2>Notre mère</h2>
      <p>Du haut de la Croix, le Christ a confié sa mère au disciple qu'il aimait, et en lui à tous ses disciples. <em>« Voici ta mère. Et de cette heure, le disciple la prit chez lui. »</em> <span class="ref">Jean 19:26-27</span> Marie est ainsi devenue la mère de tous les croyants et la mère de l'Église. Comme la reine mère portait au roi les demandes du peuple, elle présente au Christ les besoins des hommes et leur obtient sa grâce ; sa royauté s'exerce tout entière dans cette intercession qui ramène à lui. Aux noces de Cana, elle remarque le manque et le porte simplement devant lui. <em>« Ils n'ont pas de vin. »</em> <span class="ref">Jean 2:3</span> Puis elle écarte d'elle-même tout regard pour le diriger vers son Fils, dans la parole qui résume tout ce qu'elle enseigne. <em>« Faites tout ce qu'il vous dira. »</em> <span class="ref">Jean 2:5</span></p>

    contenu: `
      <p>L'âge de raison, aussi appelé âge de discrétion, est le moment où l'enfant acquiert l'usage de la raison : la capacité de discerner le bien du mal et d'agir en connaissance de cause. Tant qu'il ne l'a pas atteint, il ne mesure pas la portée de ses actes. L'Écriture connaît ce seuil : elle parle des tout-petits <em>« qui ne connaissent aujourd'hui ni le bien ni le mal »</em> <span class="ref">Deutéronome 1:39</span>, et décrit l'enfant grandissant <em>« jusqu'à ce qu'il sache rejeter le mal et choisir le bien »</em> <span class="ref">Isaïe 7:15</span>.</p>
      <h2>L'éveil de la raison</h2>
      <p>Avant ce seuil, l'enfant agit par impulsion, par imitation ou par habitude, sans saisir ce qu'il fait. L'usage de la raison désigne le moment où s'éveillent en lui trois capacités liées : reconnaître qu'un acte est bon ou mauvais, comprendre qu'il en est l'auteur, et délibérer avant d'agir. C'est l'éveil de la conscience, cette voix intérieure qui juge le bien et le mal. L'enfant cesse alors d'être seulement conduit : il commence à se conduire lui-même.</p>
      <h2>Le repère de sept ans</h2>
      <p>L'Église situe ce seuil vers sept ans. C'est une présomption souple : certains enfants parviennent à l'usage de la raison un peu plus tôt, d'autres un peu plus tard. Ce repère sert de règle commune, à partir de laquelle l'enfant est tenu pour responsable de ses actes. Il marque le commencement de la vie morale : le jugement continue de mûrir longtemps après, et la pleine maturité s'acquiert seulement avec les années.</p>
      <h2>La connaissance et la liberté font l'acte</h2>
      <p>Un acte n'engage son auteur que s'il est posé en connaissance et de plein gré : il faut savoir ce que l'on fait et le vouloir pour en répondre. C'est pourquoi l'enfant qui n'a pas encore l'usage de la raison ne commet pas de péché personnel, ne pouvant ni mesurer ni choisir ce qu'il fait. La responsabilité naît avec le discernement, et elle vaut dans les deux sens : devenu capable de reconnaître le bien, l'homme répond aussi du mal qu'il commet en le sachant. <em>« Celui qui sait faire le bien et ne le fait pas commet un péché. »</em> <span class="ref">Jacques 4:17</span> La gravité d'une faute dépend toujours de la connaissance et de la liberté engagées : le seuil ouvre la capacité de pécher, sans fixer d'avance le poids de chaque acte.</p>
      <h2>Un seuil dans la vie chrétienne</h2>
      <p>À partir de l'âge de raison, l'enfant entre dans une vie morale responsable devant Dieu : désormais capable de faute, mais aussi de mérite, d'actes librement bons qui le font grandir dans la grâce. Il devient capable de recevoir le pardon dans la confession, car il peut examiner sa conscience et reconnaître ses fautes, et d'être admis à la communion, car il peut discerner dans l'hostie le corps du Christ. Ce seuil distingue aussi les effets du baptême : reçu chez le tout-petit, il efface le seul péché originel ; reçu après l'âge de raison, il efface en outre tous les péchés personnels.</p>
      <h2>Ceux qui meurent avant ce seuil</h2>
      <p>L'enfant qui meurt avant d'avoir atteint l'usage de la raison n'a pu commettre aucun péché personnel. S'il a été baptisé, son âme, lavée du péché originel et parée de la grâce, entre aussitôt dans la gloire de Dieu. Le Christ a montré sa tendresse pour ces petits et les a donnés en modèle du Royaume. <em>« Laissez venir à moi les petits enfants et ne les en empêchez pas, car le royaume des cieux est à ceux qui leur ressemblent. »</em> <span class="ref">Matthieu 19:14</span> Pour ceux qui meurent sans baptême, l'Église, sans tenir de certitude, les confie avec espérance à la miséricorde de Dieu, qui veut que tous les hommes soient sauvés.</p>

      <p>Les anges sont des esprits créés par Dieu, sans corps, doués d'intelligence et de volonté. Ils se tiennent devant lui dans l'adoration et portent ses messages aux hommes. Le mot le dit : « ange » vient du grec <em>angelos</em> (ἄγγελος), le messager. L'Écriture les nomme de ses premières pages à ses dernières, témoins du monde invisible que Dieu a créé en même temps que le visible.</p>
      <h2>Des esprits créés</h2>
      <p>Les anges sont des créatures : ils ont commencé d'être, comme tout ce qui n'est pas Dieu. <em>« Par lui ont été créées toutes choses, dans les cieux et sur la terre, les visibles et les invisibles. »</em> <span class="ref">Colossiens 1:16</span> Ce sont de purs esprits, sans matière ni corps, et c'est pourquoi ils ne meurent pas. Chacun est une personne : il connaît et il aime, d'une intelligence plus vive et d'une volonté plus ferme que les nôtres. Quand l'Écriture leur prête des ailes ou un visage, elle parle par images, pour rendre sensible ce qui échappe aux sens.</p>
      <h2>Une multitude ordonnée</h2>
      <p>Les anges sont innombrables. Devant le trône de Dieu se presse une foule que nul ne compte : <em>« Des milliers de milliers le servaient, des myriades se tenaient devant lui. »</em> <span class="ref">Daniel 7:10</span> Cette multitude est disposée en degrés, que la tradition nomme les chœurs des anges, depuis les Séraphins et les Chérubins qui se tiennent au plus près de Dieu jusqu'aux anges envoyés vers les hommes. L'Écriture donne le nom de trois d'entre eux : Michel, qui combat pour Dieu, Gabriel, qui annonce, et Raphaël, qui accompagne et guérit.</p>
      <h2>Devant Dieu et auprès des hommes</h2>
      <p>La première œuvre des anges est l'adoration. Tournés vers Dieu, ils chantent sa sainteté sans fin : <em>« Saint, Saint, Saint est le Seigneur de l'univers ; toute la terre est remplie de sa gloire. »</em> <span class="ref">Isaïe 6:3</span> De cette louange ils passent au service : Dieu les envoie porter sa parole et accomplir son dessein. Gabriel est envoyé à Marie pour lui annoncer le Sauveur. Et ce service s'étend jusqu'à nous : <em>« Ne sont-ils pas tous des esprits au service de Dieu, envoyés pour ceux qui doivent hériter du salut ? »</em> <span class="ref">Hébreux 1:14</span></p>
      <h2>L'ange gardien</h2>
      <p>À chacun, Dieu donne un ange pour le garder. Le Christ le dit des plus petits : <em>« Leurs anges, dans les cieux, voient sans cesse la face de mon Père. »</em> <span class="ref">Matthieu 18:10</span> Cet ange veille, écarte le mal, éclaire et soutient, et porte nos prières devant Dieu : <em>« Il donnera pour toi ordre à ses anges de te garder dans toutes tes voies. »</em> <span class="ref">Psaume 91:11</span> Présence discrète et constante, il accompagne chaque vie, de la naissance à la rencontre avec Dieu.</p>
      <h2>L'épreuve et la chute</h2>
      <p>Comme l'homme, les anges ont été créés bons et libres, et appelés à choisir Dieu. Tous ne l'ont pas choisi. L'un des plus grands se dressa contre son Créateur, refusant de servir, voulant être comme Dieu par ses propres forces, et il entraîna derrière lui une part des anges. L'Écriture le montre par le dragon dont la queue balaie le ciel : <em>« Sa queue entraînait le tiers des étoiles du ciel, et les jeta sur la terre. »</em> <span class="ref">Apocalypse 12:4</span> Ces étoiles abattues sont les anges qui tombèrent avec lui. Vient alors le combat, et la défaite du rebelle : <em>« Il y eut un combat dans le ciel : Michel et ses anges combattirent le dragon… et le grand dragon fut précipité, l'antique serpent, appelé le diable et Satan, le séducteur du monde entier. »</em> <span class="ref">Apocalypse 12:7-9</span> Ces esprits déchus sont les démons ; leur chef est Satan (שָׂטָן), dont le nom signifie l'adversaire. <em>« Je voyais Satan tomber du ciel comme l'éclair. »</em> <span class="ref">Luc 10:18</span></p>
      <h2>Un choix sans retour</h2>
      <p>La faute des anges est sans retour, et c'est leur manière même de connaître et de choisir qui le veut. Nous, les hommes, nous connaissons peu à peu : par les sens, par le raisonnement, en découvrant une chose après l'autre ; c'est pourquoi nous changeons d'avis, quand le temps nous fait voir ce que nous n'avions pas encore vu. Un pur esprit ne connaît pas de cette manière : il n'apprend pas par fragments, il saisit d'un seul regard, tout entier et d'un coup, ce qu'il connaît. Sa volonté suit cette connaissance complète : il choisit en sachant déjà tout ce que son choix engage, sans rien qui lui reste caché et puisse plus tard le faire revenir en arrière. Or revenir sur un choix suppose l'un de ces deux ressorts : voir ce qu'on n'avait pas vu, ou changer avec le temps. L'ange n'a ni l'un ni l'autre. Son premier choix est donc son choix définitif, non parce que Dieu lui interdirait de se reprendre, mais parce que plus rien ne peut l'y porter. Les anges fidèles sont ainsi fixés pour toujours dans la lumière ; les déchus, dans leur refus, et ce sont les démons. Ils gardent une puissance, mais limitée et déjà vaincue : ils tentent et accusent sans pouvoir contraindre. La Croix du Christ a brisé leur empire, et leur fin est arrêtée : <em>« Allez loin de moi, maudits, dans le feu éternel préparé pour le diable et ses anges. »</em> <span class="ref">Matthieu 25:41</span></p>
