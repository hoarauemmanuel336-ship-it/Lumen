<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mémoriser · Lumen Veritatis</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root{
  --encre:#000;--encre-2:#0b0b0b;--encre-3:#161616;
  --or:#efe6cf;--or-pale:#f8f3e6;
  --parchemin:#fff;--pa:rgba(255,255,255,.62);
  --pourpre:#9a3b3b;--filet:rgba(231,224,207,.14);--filet-f:rgba(231,224,207,.28);
  --juste:#3a6b4a;--faux:#7a2c2c;--r:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{background:var(--encre);color:var(--parchemin);font-family:'EB Garamond',Georgia,serif;font-size:18px;line-height:1.65;min-height:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit;font-size:17px;background:var(--encre-3);border:1px solid var(--filet-f);border-radius:var(--r);color:var(--parchemin);padding:10px 14px;width:100%;outline:none;transition:border-color .2s}
input:focus{border-color:var(--or)}
input::placeholder{color:var(--pa)}

/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.auth-card{width:100%;max-width:420px;padding:44px 38px;background:var(--encre-2);border:1px solid var(--filet);border-radius:12px}
.auth-logo{font-family:'Cormorant Garamond',serif;font-size:21px;letter-spacing:.38em;text-transform:uppercase;text-align:center;margin-bottom:4px}
.auth-sub{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--pa);text-align:center;margin-bottom:32px}
.auth-tabs{display:flex;border-bottom:1px solid var(--filet-f);margin-bottom:24px}
.auth-tab{flex:1;padding:10px;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--pa);border-bottom:2px solid transparent;transition:color .2s,border-color .2s;text-align:center}
.auth-tab.on{color:var(--or);border-bottom-color:var(--or)}
.auth-lbl{display:block;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--pa);margin-bottom:6px}
.auth-field{margin-bottom:14px}
.auth-primary{width:100%;padding:12px;background:var(--or);color:var(--encre);border-radius:var(--r);font-size:14px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;transition:background .2s;margin-top:6px}
.auth-primary:hover{background:var(--or-pale)}
.auth-divider{text-align:center;color:var(--pa);font-size:12px;margin:18px 0;position:relative}
.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--filet-f)}
.auth-divider::before{left:0}.auth-divider::after{right:0}
.auth-google{width:100%;padding:10px;border:1px solid var(--filet-f);border-radius:var(--r);font-size:14px;display:flex;align-items:center;justify-content:center;gap:9px;transition:border-color .2s,background .2s}
.auth-google:hover{border-color:var(--or);background:rgba(239,230,207,.04)}
.auth-link{display:block;text-align:center;color:var(--pa);font-size:13px;margin-top:16px;cursor:pointer;transition:color .2s}
.auth-link:hover{color:var(--or)}
.auth-msg{padding:9px 13px;border-radius:var(--r);font-size:14px;margin-bottom:14px;display:none}
.auth-err{background:rgba(154,59,59,.18);border:1px solid var(--pourpre);color:#eba0a0}
.auth-ok{background:rgba(58,107,74,.18);border:1px solid var(--juste);color:#a0d4b2}

/* APP */
#app-screen{display:none;min-height:100vh;flex-direction:column}
#app-screen.on{display:flex}
.app-hdr{position:sticky;top:0;z-index:50;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--filet);padding:14px 24px;display:flex;align-items:center;gap:14px}
.hdr-logo{font-family:'Cormorant Garamond',serif;font-size:19px;letter-spacing:.32em;text-transform:uppercase;flex-shrink:0}
.hdr-logo:hover{color:var(--or)}
.hdr-title{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--pa);flex:1}
.hdr-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.lang-btn{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--pa);border:1px solid var(--filet-f);border-radius:3px;padding:3px 9px;transition:all .2s}
.lang-btn:hover{border-color:var(--or);color:var(--or)}
.user-mail{font-size:12px;color:var(--pa);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--pa);transition:color .2s}
.logout-btn:hover{color:var(--pourpre)}

.app-main{max-width:760px;width:100%;margin:0 auto;padding:32px 20px 56px}
.sec-lbl{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--pa);margin-bottom:14px}

/* CATEGORIES */
.cat-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:26px}
.cat-chip{padding:6px 15px;border:1px solid var(--filet-f);border-radius:18px;font-size:14px;color:var(--pa);transition:all .2s;cursor:pointer}
.cat-chip:hover{border-color:var(--or);color:var(--or)}
.cat-chip.on{background:rgba(239,230,207,.1);border-color:var(--or);color:var(--or)}
.cat-chip.custom{border-style:dashed}

/* MODE */
.mode-row{display:flex;gap:7px;margin-bottom:24px;flex-wrap:wrap}
.mode-btn{flex:1;min-width:130px;padding:9px 14px;border:1px solid var(--filet-f);border-radius:var(--r);font-size:13px;letter-spacing:.06em;color:var(--pa);text-align:center;transition:all .2s}
.mode-btn:hover{border-color:var(--or);color:var(--or)}
.mode-btn.on{background:rgba(239,230,207,.1);border-color:var(--or);color:var(--or)}

/* START */
.start-btn{display:block;width:100%;padding:15px;background:var(--or);color:var(--encre);border-radius:var(--r);font-size:15px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;transition:background .2s;text-align:center;margin-bottom:32px}
.start-btn:hover{background:var(--or-pale)}
.start-btn:disabled{opacity:.38;cursor:default}

/* GAME */
#game-area{display:none}
.pips-row{display:flex;align-items:center;gap:11px;margin-bottom:22px}
.pips{display:flex;gap:5px}
.pip{width:26px;height:3px;border-radius:2px;background:var(--filet-f);transition:background .3s}
.pip.ok{background:var(--juste)}.pip.bad{background:var(--pourpre)}.pip.cur{background:var(--or)}
.pip-lbl{font-size:12px;color:var(--pa);margin-left:auto}
.q-type{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--pa);margin-bottom:10px}
.prompt{background:var(--encre-2);border:1px solid var(--filet-f);border-radius:9px;padding:26px 28px;margin-bottom:20px;font-size:19px;line-height:1.6;font-style:italic}
.prompt.ref{font-style:normal;font-family:'Cormorant Garamond',serif;font-size:21px;letter-spacing:.04em;color:var(--or)}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.choice{padding:13px 16px;background:var(--encre-2);border:1px solid var(--filet-f);border-radius:var(--r);font-size:15px;color:var(--pa);text-align:left;line-height:1.4;transition:all .2s}
.choice:hover:not(:disabled){border-color:var(--or);color:var(--parchemin);background:rgba(239,230,207,.05)}
.choice.ok{background:rgba(58,107,74,.2);border-color:var(--juste);color:#b4dfc4}
.choice.bad{background:rgba(122,44,44,.2);border-color:var(--faux);color:#e8a0a0}
.choice.show{border-color:var(--juste);color:#b4dfc4;background:rgba(58,107,74,.08)}
.choice:disabled{cursor:default}

/* SUMMARY */
.summary{display:none;text-align:center;padding:36px 16px}
.summary.on{display:block}
.sum-score{font-family:'Cormorant Garamond',serif;font-size:60px;line-height:1;color:var(--or);margin-bottom:6px}
.sum-lbl{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--pa);margin-bottom:28px}
.sum-list{text-align:left;border-top:1px solid var(--filet);margin-bottom:28px}
.sum-row{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-bottom:1px solid var(--filet);font-size:15px}
.sum-icon{flex-shrink:0;margin-top:2px}
.sum-v{color:var(--parchemin)}
.sum-r{font-size:13px;color:var(--pa);font-family:'Cormorant Garamond',serif}
.cont-btn{display:inline-block;padding:12px 36px;background:var(--or);color:var(--encre);border-radius:var(--r);font-size:14px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;transition:background .2s}
.cont-btn:hover{background:var(--or-pale)}

/* STATS */
.stats-sec{margin-top:40px;padding-top:32px;border-top:1px solid var(--filet)}
.stats-grid{display:grid;gap:14px}
.stat-row{display:flex;flex-direction:column;gap:5px}
.stat-hdr{display:flex;justify-content:space-between;font-size:13px;color:var(--pa)}
.bar-track{height:3px;background:var(--filet-f);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:var(--or);border-radius:2px;transition:width .6s}
.bar-fill.full{background:var(--juste)}

/* CUSTOM */
.custom-sec{margin-top:40px;padding-top:32px;border-top:1px solid var(--filet)}
.sec-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.add-btn{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--or);border:1px solid var(--filet-f);border-radius:3px;padding:4px 12px;transition:all .2s}
.add-btn:hover{border-color:var(--or);background:rgba(239,230,207,.06)}
.ccat-list{display:grid;gap:14px}
.ccat-card{background:var(--encre-2);border:1px solid var(--filet);border-radius:var(--r);padding:18px}
.ccat-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ccat-name{font-family:'Cormorant Garamond',serif;font-size:17px}
.ccat-acts{display:flex;gap:10px}
.act{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--pa);transition:color .2s}
.act:hover{color:var(--or)}.act.del:hover{color:var(--pourpre)}
.cv-list{display:grid;gap:6px;margin-bottom:10px}
.cv-row{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--pa);padding:7px 10px;background:rgba(255,255,255,.03);border-radius:4px}
.cv-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cv-ref{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--or);flex-shrink:0}
.del-v{color:var(--filet-f);font-size:15px;line-height:1;flex-shrink:0;transition:color .2s}
.del-v:hover{color:var(--pourpre)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay.on{display:flex}
.modal{background:var(--encre-2);border:1px solid var(--filet-f);border-radius:10px;padding:32px;width:100%;max-width:480px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;margin-bottom:20px}
.m-field{margin-bottom:13px}
.m-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.m-cancel{padding:9px 18px;border:1px solid var(--filet-f);border-radius:var(--r);font-size:13px;color:var(--pa);transition:all .2s}
.m-cancel:hover{border-color:var(--or);color:var(--or)}
.m-save{padding:9px 22px;background:var(--or);color:var(--encre);border-radius:var(--r);font-size:13px;font-weight:600;transition:background .2s}
.m-save:hover{background:var(--or-pale)}

@media(max-width:580px){
  .auth-card{padding:28px 20px}
  .choices{grid-template-columns:1fr}
  .mode-row{flex-direction:column}
  .mode-btn{min-width:unset}
  .app-hdr{padding:10px 14px;flex-wrap:wrap}
  .user-mail{display:none}
  .app-main{padding:22px 14px 44px}
}
</style>
</head>
<body>

<!-- ══ AUTH ═════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">LUMEN</div>
    <div class="auth-sub" id="auth-sub">Mémoriser · Memorise</div>
    <div class="auth-tabs" id="auth-tabs">
      <button class="auth-tab on" id="tab-si">Connexion</button>
      <button class="auth-tab" id="tab-su">Inscription</button>
    </div>
    <div id="auth-err" class="auth-msg auth-err"></div>
    <div id="auth-ok"  class="auth-msg auth-ok"></div>
    <div id="form-email">
      <div class="auth-field"><label class="auth-lbl" id="lbl-email">Adresse e-mail</label><input type="email" id="inp-email" autocomplete="email"></div>
      <div class="auth-field" id="field-pw"><label class="auth-lbl" id="lbl-pw">Mot de passe</label><input type="password" id="inp-pw" autocomplete="current-password"></div>
      <div class="auth-field" id="field-cf" style="display:none"><label class="auth-lbl" id="lbl-cf">Confirmer</label><input type="password" id="inp-cf" autocomplete="new-password"></div>
      <button class="auth-primary" id="btn-submit">Se connecter</button>
    </div>
    <div class="auth-divider" id="auth-div"><span>ou</span></div>
    <button class="auth-google" id="btn-google">
      <svg width="17" height="17" viewBox="0 0 18 18"><path fill="#EA4335" d="M9 3.48c1.69 0 2.83.73 3.48 1.34l2.54-2.54C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l2.91 2.26C4.6 5.05 6.62 3.48 9 3.48z"/><path fill="#FBBC05" d="M17.64 9.2c0-.74-.06-1.28-.19-1.84H9v3.34h4.96c-.1.83-.64 2.08-1.84 2.92l2.84 2.2c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M3.88 10.78A5.54 5.54 0 0 1 3.58 9c0-.62.11-1.22.29-1.78L.96 4.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l2.92-2.26z"/><path fill="#4A90D9" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.84-2.2c-.76.53-1.78.9-3.12.9-2.38 0-4.4-1.57-5.12-3.74L.96 13.04C2.44 15.98 5.48 18 9 18z"/></svg>
      <span id="lbl-google">Continuer avec Google</span>
    </button>
    <button class="auth-link" id="auth-link">Mot de passe oublié ?</button>
  </div>
</div>

<!-- ══ APP ══════════════════════════════════════════ -->
<div id="app-screen">
  <header class="app-hdr">
    <a href="/" class="hdr-logo">LUMEN</a>
    <span class="hdr-title" id="hdr-title">Mémoriser</span>
    <div class="hdr-right">
      <button class="lang-btn" id="lang-btn">EN</button>
      <span class="user-mail" id="user-mail"></span>
      <button class="logout-btn" id="logout-btn">Déconnexion</button>
    </div>
  </header>

  <main class="app-main">
    <div class="sec-lbl" id="lbl-cats">Catégories</div>
    <div class="cat-chips" id="cat-chips"></div>

    <div class="mode-row" id="mode-row">
      <button class="mode-btn on" data-m="0" id="mode-0">Mixte (défaut)</button>
      <button class="mode-btn" data-m="1" id="mode-1">Verset → Référence</button>
      <button class="mode-btn" data-m="2" id="mode-2">Référence → Verset</button>
    </div>

    <button class="start-btn" id="start-btn">Commencer</button>

    <div id="game-area">
      <div class="pips-row"><div class="pips" id="pips"></div><span class="pip-lbl" id="pip-lbl">1 / 6</span></div>
      <div id="q-wrap">
        <div class="q-type" id="q-type"></div>
        <div class="prompt" id="prompt"></div>
        <div class="choices" id="choices"></div>
      </div>
      <div class="summary" id="summary">
        <div class="sum-score" id="sum-score"></div>
        <div class="sum-lbl" id="sum-lbl"></div>
        <div class="sum-list" id="sum-list"></div>
        <button class="cont-btn" id="cont-btn">Continuer</button>
      </div>
    </div>

    <div class="stats-sec" id="stats-sec">
      <div class="sec-lbl" id="lbl-prog">Progression</div>
      <div class="stats-grid" id="stats-grid"></div>
    </div>

    <div class="custom-sec">
      <div class="sec-row">
        <div class="sec-lbl" id="lbl-custom" style="margin-bottom:0">Mes catégories</div>
        <button class="add-btn" id="add-cat-btn">+ Nouvelle</button>
      </div>
      <div class="ccat-list" id="ccat-list"></div>
    </div>
  </main>
</div>

<!-- modals -->
<div class="overlay" id="modal-cat">
  <div class="modal">
    <div class="modal-title" id="mcat-title">Nouvelle catégorie</div>
    <div class="m-field"><label class="auth-lbl" id="lbl-cfr">Nom (français)</label><input type="text" id="inp-cfr"></div>
    <div class="m-field"><label class="auth-lbl" id="lbl-cen">Name (English)</label><input type="text" id="inp-cen"></div>
    <div class="m-btns"><button class="m-cancel" id="mcat-cancel">Annuler</button><button class="m-save" id="mcat-save">Enregistrer</button></div>
  </div>
</div>
<div class="overlay" id="modal-verse">
  <div class="modal">
    <div class="modal-title" id="mv-title">Ajouter un verset</div>
    <div class="m-field"><label class="auth-lbl">Texte (français)</label><input type="text" id="vfr"></div>
    <div class="m-field"><label class="auth-lbl">Référence (ex : Jean 3:16)</label><input type="text" id="rfr"></div>
    <div class="m-field"><label class="auth-lbl">Text (English)</label><input type="text" id="ven"></div>
    <div class="m-field"><label class="auth-lbl">Reference (e.g. John 3:16)</label><input type="text" id="ren"></div>
    <div class="m-btns"><button class="m-cancel" id="mv-cancel">Annuler</button><button class="m-save" id="mv-save">Enregistrer</button></div>
  </div>
</div>

function udoc(p){return db.doc(`users/${S.uid}/${p}`)}
function ucol(p){return db.collection(`users/${S.uid}/${p}`)}

async function loadUser(){
  try{
    const [meta,prog,prefs,snap]=await Promise.all([
      udoc('meta/app').get(),
      udoc('meta/progress').get(),
      udoc('meta/prefs').get(),
      ucol('categories').get()
    ]);
    S.roundN  = meta.exists  ? (meta.data().roundN||0)  : 0;
    S.progress= prog.exists  ? (prog.data().items||{})  : {};
    S.customCats=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(prefs.exists){
      S.selCats=prefs.data().selCats||[];
      S.mode   =prefs.data().mode||0;
    } else {

  }catch(e){console.error(e)}
}

    udoc('meta/app').set({roundN:S.roundN},{merge:true})
  ]);
}

// LEITNER ALGORITHM
// ══════════════════════════════════════════════════════
const IVLS=[1,2,4,8,16,32];

function isDue(id){
  const p=S.progress[id];
  if(!p) return true;
  if(p.box===0) return true;
  return p.dueRound<=S.roundN;
}

function selectItems(n=6){
  const all=allItems();
  const due=shuffle(all.filter(i=>isDue(i.id)));
  const notDue=shuffle(all.filter(i=>!isDue(i.id)));
  due.sort((a,b)=>{
    const ba=(S.progress[a.id]||{box:-1}).box;
    const bb=(S.progress[b.id]||{box:-1}).box;
    return ba-bb;
  });
  const sel=[...due.slice(0,n)];
  if(sel.length<n) sel.push(...notDue.slice(0,n-sel.length));
  return shuffle(sel.slice(0,n));
}

function updateItem(id,correct){
  const p=S.progress[id]||{box:0,dueRound:0};
  p.box=correct?Math.min(5,p.box+1):Math.max(0,p.box-1);
  p.dueRound=S.roundN+IVLS[p.box];
  S.progress[id]=p;
}

function getChoices(item,qMode,roundItems){
  const l=S.lang;
  const correct=qMode==='vr'?item[l].ref:item[l].text;
  let pool=roundItems.filter(i=>i.id!==item.id);
  let distractors=shuffle(pool.map(i=>qMode==='vr'?i[l].ref:i[l].text)).slice(0,3);
  if(distractors.length<3){
    const extra=shuffle(allItems().filter(i=>i.id!==item.id)
      .map(i=>qMode==='vr'?i[l].ref:i[l].text)
      .filter(x=>!distractors.includes(x)));
    distractors=[...distractors,...extra].slice(0,3);
  }
  return shuffle([correct,...distractors]);
}

// ══════════════════════════════════════════════════════
// GAME ENGINE
// ══════════════════════════════════════════════════════
function startRound(){
  const items=selectItems(6);
  if(items.length<2){alert(t('not_enough'));return;}
  S.round=items.map(item=>{
    const qMode=S.mode===0?(Math.random()<.5?'vr':'rv'):S.mode===1?'vr':'rv';
    return{item,qMode,answered:false,correct:null,choices:getChoices(item,qMode,items)};
  });
  S.rIdx=0; S.rRes=[];
  $('start-btn').style.display='none';
  $('game-area').style.display='block';
  $('summary').classList.remove('on');
  $('q-wrap').style.display='';
  renderPips(); renderQuestion();
}

function renderPips(){
  const c=$('pips'); c.innerHTML='';
  S.round.forEach((q,i)=>{
    const p=document.createElement('div');
    p.className='pip'+(q.answered?(q.correct?' ok':' bad'):(i===S.rIdx?' cur':''));
    c.appendChild(p);
  });
  $('pip-lbl').textContent=`${S.rIdx+1} / ${S.round.length}`;
}

function renderQuestion(){
  const q=S.round[S.rIdx];
  $('q-type').textContent=q.qMode==='vr'?t('find_ref'):t('find_verse');
  const pr=$('prompt');
  pr.textContent=q.qMode==='vr'?q.item[S.lang].text:q.item[S.lang].ref;
  pr.className='prompt'+(q.qMode==='rv'?' ref':'');
  const grid=$('choices'); grid.innerHTML='';
  q.choices.forEach(ch=>{
    const b=document.createElement('button');
    b.className='choice'; b.textContent=ch;
    b.addEventListener('click',()=>pick(ch,q));
    grid.appendChild(b);
  });
}

function pick(ch,q){
  const correct=q.qMode==='vr'?q.item[S.lang].ref:q.item[S.lang].text;
  const ok=ch===correct;
  q.answered=true; q.correct=ok;
  S.rRes.push({item:q.item,correct:ok});
  updateItem(q.item.id,ok);
  $('choices').querySelectorAll('.choice').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct) b.classList.add(ok?'ok':'show');
    else if(b.textContent===ch&&!ok) b.classList.add('bad');
  });
  renderPips();
  setTimeout(()=>{
    S.rIdx++;
    if(S.rIdx>=S.round.length) endRound();
    else renderQuestion();
  },ok?700:1300);
}

async function endRound(){
  S.roundN++;
  await saveProgress();
  renderStats();
  $('q-wrap').style.display='none';
  const sc=S.rRes.filter(r=>r.correct).length;
  $('sum-score').textContent=`${sc}/${S.round.length}`;
  $('sum-lbl').textContent=t('round_done');
  const list=$('sum-list'); list.innerHTML='';
  S.rRes.forEach(r=>{
    const d=document.createElement('div');
    d.className='sum-row';
    d.innerHTML=`<span class="sum-icon">${r.correct?'✓':'✗'}</span><div><div class="sum-v">${trunc(r.item[S.lang].text,90)}</div><div class="sum-r">${r.item[S.lang].ref}</div></div>`;
    list.appendChild(d);
  });
  $('cont-btn').textContent=t('cont');
  $('summary').classList.add('on');
}

}

function renderModes(){

}

function updateStart(){
  const ok=allItems().length>=2&&S.selCats.length>0;
  $('start-btn').disabled=!ok;
}

function renderStats(){
  const g=$('stats-grid'); g.innerHTML='';
  [...PRE,...S.customCats].filter(c=>S.selCats.includes(c.id)).forEach(cat=>{
    if(!cat.verses.length) return;
    const mastered=cat.verses.filter(v=>(S.progress[v.id]||{box:0}).box>=4).length;
    const pct=Math.round(mastered/cat.verses.length*100);
    const r=document.createElement('div');
    r.className='stat-row';
    r.innerHTML=`<div class="stat-hdr"><span>${cat.name[S.lang]||cat.name.fr}</span><span>${mastered}/${cat.verses.length} ${t('mastered')}</span></div><div class="bar-track"><div class="bar-fill${pct>=80?' full':''}" style="width:${pct}%"></div></div>`;

async function createCat(){
  const fr=$('inp-cfr').value.trim(), en=$('inp-cen').value.trim();
  if(!fr) return;
  const cat={id:'c'+Date.now(),name:{fr,en:en||fr},verses:[]};
  S.customCats.push(cat);
  await saveCat(cat);
  closeModal('modal-cat'); $('inp-cfr').value=''; $('inp-cen').value='';
  renderChips(); renderCustom();
}

async function deleteCat(id){
  if(!confirm(S.lang==='fr'?'Supprimer cette catégorie ?':'Delete this category?'))return;
  S.customCats=S.customCats.filter(c=>c.id!==id);
  S.selCats=S.selCats.filter(x=>x!==id);
  await delCat(id);
  renderChips(); renderCustom(); updateStart();
}

function openAddVerse(catId){
  S.pendingCat=catId;
  ['vfr','rfr','ven','ren'].forEach(id=>$(id).value='');
  openModal('modal-verse');
}

async function saveVerse(){
  const tfr=$('vfr').value.trim(), rfr=$('rfr').value.trim();
  const ten=$('ven').value.trim(), ren=$('ren').value.trim();
  if(!tfr||!rfr) return;
  const cat=S.customCats.find(c=>c.id===S.pendingCat);
  if(!cat) return;
  cat.verses.push({id:'v'+Date.now(),fr:{text:tfr,ref:rfr},en:{text:ten||tfr,ref:ren||rfr}});
  await saveCat(cat);
  closeModal('modal-verse'); renderCustom(); updateStart();
}

async function deleteVerse(catId,vId){
  const cat=S.customCats.find(c=>c.id===catId); if(!cat)return;
  cat.verses=cat.verses.filter(v=>v.id!==vId);
  await saveCat(cat);
  delete S.progress[vId];
  renderCustom(); updateStart();
}

  $('tab-su').onclick=()=>setMode('su');
  $('auth-link').onclick=()=>setMode(authMode==='forgot'?'si':'forgot');

  $('btn-submit').onclick=async()=>{
    const em=$('inp-email').value.trim(), pw=$('inp-pw').value, cf=$('inp-cf').value;
    clearAuthMsg();
    try{
      if(authMode==='forgot'){await auth.sendPasswordResetEmail(em);showAuthMsg(t('reset_ok'),false);}
      else if(authMode==='su'){
        if(pw!==cf){showAuthMsg(S.lang==='fr'?'Les mots de passe ne correspondent pas.':'Passwords do not match.',true);return;}
        await auth.createUserWithEmailAndPassword(em,pw);
      } else {
        await auth.signInWithEmailAndPassword(em,pw);
      }
    }catch(e){showAuthMsg(e.message,true);}
  };

  ['inp-email','inp-pw','inp-cf'].forEach(id=>{
    $(id).addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-submit').click()});
  });

  $('btn-google').onclick=async()=>{
    try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}
    catch(e){showAuthMsg(e.message,true);}
  };

  $('logout-btn').onclick=()=>auth.signOut();

  $('lang-btn').onclick=()=>{
    S.lang=S.lang==='fr'?'en':'fr';
    localStorage.setItem('lm_lang',S.lang);
    renderAll();
    if($('game-area').style.display!=='none'&&S.rIdx<S.round.length&&!$('summary').classList.contains('on')) renderQuestion();
  };

  $('mode-row').onclick=e=>{
    const b=e.target.closest('.mode-btn'); if(!b)return;
    S.mode=+b.dataset.m; renderModes(); savePrefs();
  };

  $('start-btn').onclick=()=>startRound();

  $('cont-btn').onclick=()=>{
    $('summary').classList.remove('on');
    $('q-wrap').style.display='';
    startRound();
  };

  $('ccat-list').onclick=async e=>{
    const av=e.target.closest('.add-v');
    const dc=e.target.closest('[data-dc]');
    const dv=e.target.closest('.del-v');
    if(av) openAddVerse(av.dataset.c);
    else if(dc) await deleteCat(dc.dataset.dc);
    else if(dv) await deleteVerse(dv.dataset.c,dv.dataset.v);
  };

  $('add-cat-btn').onclick=()=>{$('mcat-title').textContent=t('mcat');openModal('modal-cat')};
  $('mcat-cancel').onclick=()=>closeModal('modal-cat');
  $('mcat-save').onclick=createCat;
  $('mv-cancel').onclick=()=>closeModal('modal-verse');
  $('mv-save').onclick=saveVerse;
  ['modal-cat','modal-verse'].forEach(id=>{$(id).onclick=e=>{if(e.target===$(id))closeModal(id)}});
});

// ══════════════════════════════════════════════════════
// AUTH STATE
// ══════════════════════════════════════════════════════
auth.onAuthStateChanged(async user=>{
  if(user){
    S.uid=user.uid;
    $('user-mail').textContent=user.email||user.displayName||'';
    $('auth-screen').style.display='none';
    $('app-screen').classList.add('on');
    await loadUser();
    renderAll();
  } else {
    S.uid=null;
    $('auth-screen').style.display='flex';
    $('app-screen').classList.remove('on');
    $('game-area').style.display='none';
    $('start-btn').style.display='';
    applyLang(); setMode('si');
  }
});
</script>
</body>
</html>
