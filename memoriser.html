  {id:'confession', name:{fr:'La confession', en:'Confession'}, verses:[
    {id:'jn-20-23', fr:{text:'Ceux \u00e0 qui vous remettrez les p\u00e9ch\u00e9s, ils leur seront remis\u00a0; ceux \u00e0 qui vous les retiendrez, ils leur seront retenus.', ref:'Jean 20:23'}, en:{text:'If you forgive the sins of any, they are forgiven; if you retain the sins of any, they are retained.', ref:'John 20:23'}},
    {id:'mt-18-18', fr:{text:'Tout ce que vous lierez sur la terre sera li\u00e9 dans le ciel, et tout ce que vous d\u00e9lierez sur la terre sera d\u00e9li\u00e9 dans le ciel.', ref:'Matthieu 18:18'}, en:{text:'Whatever you bind on earth shall be bound in heaven, and whatever you loose on earth shall be loosed in heaven.', ref:'Matthew 18:18'}},
    {id:'jc-5-16', fr:{text:'Confessez donc vos p\u00e9ch\u00e9s les uns aux autres, et priez les uns pour les autres, afin que vous soyez gu\u00e9ris.', ref:'Jacques 5:16'}, en:{text:'Therefore confess your sins to one another and pray for one another, that you may be healed.', ref:'James 5:16'}},
    {id:'1jn-1-9', fr:{text:'Si nous confessons nos p\u00e9ch\u00e9s, il est fid\u00e8le et juste pour nous les pardonner, et pour nous purifier de toute iniquit\u00e9.', ref:'1 Jean 1:9'}, en:{text:'If we confess our sins, he is faithful and just to forgive us our sins and to cleanse us from all unrighteousness.', ref:'1 John 1:9'}},
    {id:'2co-5-18', fr:{text:'Dieu nous a r\u00e9concili\u00e9s avec lui par le Christ, et nous a confi\u00e9 le minist\u00e8re de la r\u00e9conciliation.', ref:'2 Corinthiens 5:18'}, en:{text:'God reconciled us to himself through Christ and gave us the ministry of reconciliation.', ref:'2 Corinthians 5:18'}},
    {id:'lc-15-7', fr:{text:'Il y aura plus de joie dans le ciel pour un seul p\u00e9cheur qui se repent, que pour quatre-vingt-dix-neuf justes qui n\u2019ont pas besoin de repentir.', ref:'Luc 15:7'}, en:{text:'There will be more joy in heaven over one sinner who repents than over ninety-nine righteous who need no repentance.', ref:'Luke 15:7'}},
    {id:'ps-32-5', fr:{text:'Je t\u2019ai avou\u00e9 mon p\u00e9ch\u00e9, je n\u2019ai pas cach\u00e9 ma faute\u00a0; et toi, tu as \u00f4t\u00e9 la faute de mon p\u00e9ch\u00e9.', ref:'Psaume 32:5'}, en:{text:'I acknowledged my sin to you, and I did not cover my iniquity; and you forgave the guilt of my sin.', ref:'Psalm 32:5'}},
    {id:'ps-19-13', fr:{text:'Qui discerne ses \u00e9garements ? Purifie-moi de ceux qui me sont cach\u00e9s.', ref:'Psaume 19:13'}, en:{text:'Who discerns his errors? Cleanse me from those that are hidden from me.', ref:'Psalm 19:13'}},
    {id:'lc-7-47', fr:{text:'Ses p\u00e9ch\u00e9s, qui sont nombreux, lui sont pardonn\u00e9s, car elle a beaucoup aim\u00e9.', ref:'Luc 7:47'}, en:{text:'Her sins, which are many, are forgiven, for she has loved much.', ref:'Luke 7:47'}},
    {id:'2co-5-20', fr:{text:'C\u2019est au nom du Christ que nous faisons fonction d\u2019ambassadeurs.', ref:'2 Corinthiens 5:20'}, en:{text:'It is in the name of Christ that we are ambassadors.', ref:'2 Corinthians 5:20'}},
    {id:'2s-12-13', fr:{text:'Le Seigneur a pardonn\u00e9 ton p\u00e9ch\u00e9 ; tu ne mourras pas.', ref:'2 Samuel 12:13'}, en:{text:'The Lord has forgiven your sin; you shall not die.', ref:'2 Samuel 12:13'}},
    {id:'lc-19-8', fr:{text:'Si j\u2019ai fait tort \u00e0 quelqu\u2019un, je lui rends le quadruple.', ref:'Luc 19:8'}, en:{text:'If I have wronged anyone, I restore it fourfold.', ref:'Luke 19:8'}},
    {id:'is-43-25', fr:{text:'C\u2019est moi qui efface tes transgressions, et je ne me souviendrai plus de tes p\u00e9ch\u00e9s.', ref:'Isa\u00efe 43:25'}, en:{text:'It is I who blot out your transgressions, and I will remember your sins no more.', ref:'Isaiah 43:25'}},
    {id:'pr-11-13', fr:{text:'Le m\u00e9disant r\u00e9v\u00e8le les secrets, mais l\u2019homme au c\u0153ur fid\u00e8le tient la chose cach\u00e9e.', ref:'Proverbes 11:13'}, en:{text:'The slanderer reveals secrets, but the faithful of heart keeps the matter hidden.', ref:'Proverbs 11:13'}}
  ]},
  {id:'eucharistie', name:{fr:'L\u2019Eucharistie', en:'The Eucharist'}, verses:[
    {id:'jn-6-51', fr:{text:'Je suis le pain vivant descendu du ciel. Le pain que je donnerai, c\u2019est ma chair, pour la vie du monde.', ref:'Jean 6:51'}, en:{text:'I am the living bread that came down from heaven. The bread that I will give is my flesh, for the life of the world.', ref:'John 6:51'}},
    {id:'jn-6-54', fr:{text:'Celui qui mange ma chair et boit mon sang a la vie \u00e9ternelle, et je le ressusciterai au dernier jour.', ref:'Jean 6:54'}, en:{text:'He who eats my flesh and drinks my blood has eternal life, and I will raise him up at the last day.', ref:'John 6:54'}},
    {id:'jn-6-55', fr:{text:'Ma chair est vraiment une nourriture, et mon sang vraiment une boisson.', ref:'Jean 6:55'}, en:{text:'My flesh is true food, and my blood is true drink.', ref:'John 6:55'}},
    {id:'mt-26-26', fr:{text:'Prenez, mangez : ceci est mon corps.', ref:'Matthieu 26:26'}, en:{text:'Take, eat; this is my body.', ref:'Matthew 26:26'}},
    {id:'mt-26-28', fr:{text:'Ceci est mon sang, le sang de l\u2019alliance, r\u00e9pandu pour la multitude en r\u00e9mission des p\u00e9ch\u00e9s.', ref:'Matthieu 26:28'}, en:{text:'This is my blood of the covenant, poured out for many for the forgiveness of sins.', ref:'Matthew 26:28'}},
    {id:'1co-11-26', fr:{text:'Chaque fois que vous mangez ce pain et que vous buvez cette coupe, vous annoncez la mort du Seigneur, jusqu\u2019\u00e0 ce qu\u2019il vienne.', ref:'1 Corinthiens 11:26'}, en:{text:'As often as you eat this bread and drink this cup, you proclaim the Lord\u2019s death until he comes.', ref:'1 Corinthians 11:26'}},
    {id:'1co-11-27', fr:{text:'Quiconque mange ce pain ou boit la coupe du Seigneur indignement sera coupable envers le corps et le sang du Seigneur.', ref:'1 Corinthiens 11:27'}, en:{text:'Whoever eats this bread or drinks the cup of the Lord unworthily will be guilty of the body and blood of the Lord.', ref:'1 Corinthians 11:27'}},
    {id:'1co-10-16', fr:{text:'La coupe de b\u00e9n\u00e9diction que nous b\u00e9nissons n\u2019est-elle pas communion au sang du Christ ? Le pain que nous rompons n\u2019est-il pas communion au corps du Christ ?', ref:'1 Corinthiens 10:16'}, en:{text:'The cup of blessing which we bless, is it not a communion in the blood of Christ? The bread which we break, is it not a communion in the body of Christ?', ref:'1 Corinthians 10:16'}},
    {id:'jn-1-29', fr:{text:'Voici l\u2019Agneau de Dieu qui enl\u00e8ve le p\u00e9ch\u00e9 du monde.', ref:'Jean 1:29'}, en:{text:'Behold the Lamb of God who takes away the sin of the world.', ref:'John 1:29'}},
    {id:'gn-14-18', fr:{text:'Melchis\u00e9dech, roi de Salem, fit apporter du pain et du vin ; il \u00e9tait pr\u00eatre du Dieu Tr\u00e8s-Haut.', ref:'Gen\u00e8se 14:18'}, en:{text:'Melchizedek, king of Salem, brought out bread and wine; he was priest of God Most High.', ref:'Genesis 14:18'}},
    {id:'ps-110-4', fr:{text:'Tu es pr\u00eatre pour l\u2019\u00e9ternit\u00e9 \u00e0 la mani\u00e8re de Melchis\u00e9dech.', ref:'Psaume 110:4'}, en:{text:'You are a priest for ever in the manner of Melchizedek.', ref:'Psalm 110:4'}},
    {id:'exo-16-4', fr:{text:'Je vais faire pleuvoir sur vous du pain venu du ciel.', ref:'Exode 16:4'}, en:{text:'I will rain down upon you bread from heaven.', ref:'Exodus 16:4'}},
    {id:'exo-12-13', fr:{text:'Le sang vous servira de signe : je verrai le sang, et je passerai par-dessus vous.', ref:'Exode 12:13'}, en:{text:'The blood will be a sign for you: I will see the blood, and I will pass over you.', ref:'Exodus 12:13'}},
    {id:'1co-5-7', fr:{text:'Christ, notre P\u00e2que, a \u00e9t\u00e9 immol\u00e9.', ref:'1 Corinthiens 5:7'}, en:{text:'Christ, our Passover, has been sacrificed.', ref:'1 Corinthians 5:7'}},
    {id:'lv-17-11', fr:{text:'La vie de la chair est dans le sang... c\u2019est le sang qui expie pour une vie.', ref:'L\u00e9vitique 17:11'}, en:{text:'The life of the flesh is in the blood... it is the blood that makes atonement for a life.', ref:'Leviticus 17:11'}},
    {id:'exo-24-8', fr:{text:'Voici le sang de l\u2019alliance que le Seigneur a conclue avec vous.', ref:'Exode 24:8'}, en:{text:'This is the blood of the covenant that the Lord has made with you.', ref:'Exodus 24:8'}},
    {id:'jn-6-56', fr:{text:'Celui qui mange ma chair et boit mon sang demeure en moi, et moi en lui.', ref:'Jean 6:56'}, en:{text:'Whoever eats my flesh and drinks my blood abides in me, and I in him.', ref:'John 6:56'}},
    {id:'1co-10-17', fr:{text:'Puisqu\u2019il y a un seul pain, nous qui sommes plusieurs, nous formons un seul corps.', ref:'1 Corinthiens 10:17'}, en:{text:'Since there is one bread, we who are many form one body.', ref:'1 Corinthians 10:17'}},
    {id:'1co-11-28', fr:{text:'Que chacun s\u2019\u00e9prouve soi-m\u00eame, et qu\u2019ainsi il mange de ce pain et boive de cette coupe.', ref:'1 Corinthiens 11:28'}, en:{text:'Let each examine himself, and so eat of this bread and drink of this cup.', ref:'1 Corinthians 11:28'}},
    {id:'jn-6-53', fr:{text:'Si vous ne mangez la chair du Fils de l\u2019homme et ne buvez son sang, vous n\u2019avez pas la vie en vous.', ref:'Jean 6:53'}, en:{text:'Unless you eat the flesh of the Son of Man and drink his blood, you have no life in you.', ref:'John 6:53'}},
    {id:'1co-11-29', fr:{text:'Celui qui mange et boit sans discerner le corps mange et boit sa propre condamnation.', ref:'1 Corinthiens 11:29'}, en:{text:'He who eats and drinks without discerning the body eats and drinks his own condemnation.', ref:'1 Corinthians 11:29'}},
    {id:'mal-1-11', fr:{text:'En tout lieu, on pr\u00e9sente \u00e0 mon nom de l\u2019encens et une offrande pure.', ref:'Malachie 1:11'}, en:{text:'In every place incense and a pure offering are presented to my name.', ref:'Malachi 1:11'}},
    {id:'he-13-10', fr:{text:'Nous avons un autel dont n\u2019ont pas le droit de manger ceux qui servent le tabernacle.', ref:'H\u00e9breux 13:10'}, en:{text:'We have an altar from which those who serve the tabernacle have no right to eat.', ref:'Hebrews 13:10'}}
  ]},
  {id:'sacrements', name:{fr:'Les sacrements', en:'The Sacraments'}, verses:[
    {id:'gn-2-24', fr:{text:'L\u2019homme quittera son p\u00e8re et sa m\u00e8re, s\u2019attachera \u00e0 sa femme, et ils ne feront plus qu\u2019une seule chair.', ref:'Gen\u00e8se 2:24'}, en:{text:'A man shall leave his father and mother and hold fast to his wife, and the two shall become one flesh.', ref:'Genesis 2:24'}},
    {id:'mt-19-6', fr:{text:'Que l\u2019homme ne s\u00e9pare pas ce que Dieu a uni.', ref:'Matthieu 19:6'}, en:{text:'What God has joined together, let no man separate.', ref:'Matthew 19:6'}},
    {id:'ep-5-32', fr:{text:'Ce myst\u00e8re est grand\u00a0; je le dis par rapport au Christ et \u00e0 l\u2019\u00c9glise.', ref:'\u00c9ph\u00e9siens 5:32'}, en:{text:'This mystery is profound, and I am saying that it refers to Christ and the Church.', ref:'Ephesians 5:32'}},
    {id:'ac-8-17', fr:{text:'Alors les Ap\u00f4tres leur impos\u00e8rent les mains, et ils re\u00e7urent l\u2019Esprit Saint.', ref:'Actes 8:17'}, en:{text:'Then the apostles laid their hands on them, and they received the Holy Spirit.', ref:'Acts 8:17'}},
    {id:'jc-5-14', fr:{text:'Quelqu\u2019un parmi vous est-il malade\u00a0? Qu\u2019il appelle les pr\u00eatres de l\u2019\u00c9glise, et qu\u2019ils prient sur lui en l\u2019oignant d\u2019huile au nom du Seigneur.', ref:'Jacques 5:14'}, en:{text:'Is anyone among you sick? Let him call the elders of the Church, and let them pray over him, anointing him with oil in the name of the Lord.', ref:'James 5:14'}},
    {id:'mc-6-13', fr:{text:'Ils oignaient d\u2019huile beaucoup de malades, et ils les gu\u00e9rissaient.', ref:'Marc 6:13'}, en:{text:'They anointed with oil many who were sick, and healed them.', ref:'Mark 6:13'}},
    {id:'lc-22-19', fr:{text:'Faites ceci en m\u00e9moire de moi.', ref:'Luc 22:19'}, en:{text:'Do this in remembrance of me.', ref:'Luke 22:19'}},
    {id:'2tm-1-6', fr:{text:'Ravive le don de Dieu qui est en toi par l\u2019imposition de mes mains.', ref:'2 Timoth\u00e9e 1:6'}, en:{text:'Fan into flame the gift of God that is in you through the laying on of my hands.', ref:'2 Timothy 1:6'}},
    {id:'he-5-1', fr:{text:'Tout grand pr\u00eatre, pris parmi les hommes, est \u00e9tabli pour les hommes dans leurs relations avec Dieu.', ref:'H\u00e9breux 5:1'}, en:{text:'Every high priest is chosen from among men and appointed to act for men in their relations with God.', ref:'Hebrews 5:1'}},
    {id:'jn-19-34', fr:{text:'Un des soldats lui transper\u00e7a le c\u00f4t\u00e9, et aussit\u00f4t il en sortit du sang et de l\u2019eau.', ref:'Jean 19:34'}, en:{text:'One of the soldiers pierced his side, and at once there flowed blood and water.', ref:'John 19:34'}},
    {id:'1co-3-7', fr:{text:'Ni celui qui plante ni celui qui arrose n\u2019est quelque chose, mais Dieu seul, qui fait cro\u00eetre.', ref:'1 Corinthiens 3:7'}, en:{text:'Neither he who plants nor he who waters is anything, but only God, who gives the growth.', ref:'1 Corinthians 3:7'}},
    {id:'2co-1-22', fr:{text:'Il nous a marqu\u00e9s de son sceau et a mis dans nos c\u0153urs les arrhes de l\u2019Esprit.', ref:'2 Corinthiens 1:22'}, en:{text:'He has marked us with his seal and put in our hearts the pledge of the Spirit.', ref:'2 Corinthians 1:22'}},
    {id:'mt-9-6', fr:{text:'Afin que vous sachiez que le Fils de l\u2019homme a sur la terre le pouvoir de remettre les p\u00e9ch\u00e9s : L\u00e8ve-toi, prends ton lit et va dans ta maison.', ref:'Matthieu 9:6'}, en:{text:'That you may know that the Son of Man has authority on earth to forgive sins: Rise, take up your bed, and go home.', ref:'Matthew 9:6'}},
    {id:'1tm-4-5', fr:{text:'Tout est sanctifi\u00e9 par la parole de Dieu et la pri\u00e8re.', ref:'1 Timoth\u00e9e 4:5'}, en:{text:'Everything is sanctified by the word of God and prayer.', ref:'1 Timothy 4:5'}},
    {id:'gn-1-28', fr:{text:'Soyez f\u00e9conds et multipliez-vous.', ref:'Gen\u00e8se 1:28'}, en:{text:'Be fruitful and multiply.', ref:'Genesis 1:28'}},
    {id:'gn-2-18', fr:{text:'Il n\u2019est pas bon que l\u2019homme soit seul ; je lui ferai une aide qui lui corresponde.', ref:'Gen\u00e8se 2:18'}, en:{text:'It is not good that man should be alone; I will make him a help that corresponds to him.', ref:'Genesis 2:18'}},
    {id:'mt-19-8', fr:{text:'C\u2019est \u00e0 cause de la duret\u00e9 de votre c\u0153ur que Mo\u00efse vous a permis de r\u00e9pudier vos femmes ; mais au commencement il n\u2019en \u00e9tait pas ainsi.', ref:'Matthieu 19:8'}, en:{text:'It is because of the hardness of your heart that Moses permitted you to divorce your wives; but in the beginning it was not so.', ref:'Matthew 19:8'}},
    {id:'is-11-2', fr:{text:'Sur lui reposera l\u2019Esprit du Seigneur, esprit de sagesse et d\u2019intelligence, esprit de conseil et de force, esprit de science et de crainte du Seigneur.', ref:'Isa\u00efe 11:2'}, en:{text:'Upon him will rest the Spirit of the Lord, a spirit of wisdom and understanding, a spirit of counsel and might, a spirit of knowledge and of fear of the Lord.', ref:'Isaiah 11:2'}},
    {id:'rom-8-15', fr:{text:'Vous avez re\u00e7u un Esprit d\u2019adoption filiale, par lequel nous crions : Abba, P\u00e8re !', ref:'Romains 8:15'}, en:{text:'You received a Spirit of adoption, by which we cry: Abba, Father!', ref:'Romans 8:15'}},
    {id:'ac-1-8', fr:{text:'Vous recevrez une force, celle de l\u2019Esprit Saint qui descendra sur vous, et vous serez mes t\u00e9moins.', ref:'Actes 1:8'}, en:{text:'You will receive a force, that of the Holy Spirit who will come upon you, and you will be my witnesses.', ref:'Acts 1:8'}},
    {id:'lc-10-34', fr:{text:'Il banda ses plaies, en y versant de l\u2019huile et du vin.', ref:'Luc 10:34'}, en:{text:'He bound up his wounds, pouring on oil and wine.', ref:'Luke 10:34'}},
    {id:'mt-8-17', fr:{text:'Il a pris nos infirmit\u00e9s et s\u2019est charg\u00e9 de nos maladies.', ref:'Matthieu 8:17'}, en:{text:'He took our infirmities and bore our diseases.', ref:'Matthew 8:17'}},
    {id:'rom-8-17', fr:{text:'Si nous souffrons avec lui, c\u2019est pour \u00eatre glorifi\u00e9s avec lui.', ref:'Romains 8:17'}, en:{text:'If we suffer with him, it is to be glorified with him.', ref:'Romans 8:17'}},
    {id:'jn-20-21', fr:{text:'Comme le P\u00e8re m\u2019a envoy\u00e9, moi aussi je vous envoie.', ref:'Jean 20:21'}, en:{text:'As the Father has sent me, I also send you.', ref:'John 20:21'}},
    {id:'2tm-2-2', fr:{text:'Ce que tu as entendu de moi, confie-le \u00e0 des hommes fid\u00e8les, capables \u00e0 leur tour d\u2019en instruire d\u2019autres.', ref:'2 Timoth\u00e9e 2:2'}, en:{text:'What you have heard from me, entrust to faithful men, able in turn to teach others.', ref:'2 Timothy 2:2'}},
    {id:'tt-1-5', fr:{text:'\u00c9tablis des anciens dans chaque ville, comme je te l\u2019ai prescrit.', ref:'Tite 1:5'}, en:{text:'Appoint elders in every town, as I directed you.', ref:'Titus 1:5'}},
    {id:'ac-14-23', fr:{text:'Ils firent nommer des anciens dans chaque \u00c9glise.', ref:'Actes 14:23'}, en:{text:'They appointed elders in every Church.', ref:'Acts 14:23'}},
    {id:'ac-6-6', fr:{text:'Ils les pr\u00e9sent\u00e8rent aux ap\u00f4tres, qui pri\u00e8rent et leur impos\u00e8rent les mains.', ref:'Actes 6:6'}, en:{text:'They presented them to the apostles, who prayed and laid their hands on them.', ref:'Acts 6:6'}},
    {id:'2co-2-10', fr:{text:'Ce que j\u2019ai pardonn\u00e9, je l\u2019ai fait \u00e0 cause de vous, en la personne du Christ.', ref:'2 Corinthiens 2:10'}, en:{text:'What I have forgiven, I have done it for your sake, in the person of Christ.', ref:'2 Corinthians 2:10'}},
    {id:'mt-19-12', fr:{text:'Il y a des eunuques qui se sont rendus tels eux-m\u00eames \u00e0 cause du royaume des cieux ; comprenne qui peut comprendre.', ref:'Matthieu 19:12'}, en:{text:'There are eunuchs who have made themselves so for the sake of the kingdom of heaven; let the one who can accept this accept it.', ref:'Matthew 19:12'}}
  ]},
  {id:'communion-saints', name:{fr:'La communion des saints', en:'The Communion of Saints'}, verses:[
    {id:'he-12-1', fr:{text:'Nous sommes environn\u00e9s d\u2019une si grande nu\u00e9e de t\u00e9moins.', ref:'H\u00e9breux 12:1'}, en:{text:'We are surrounded by so great a cloud of witnesses.', ref:'Hebrews 12:1'}},
    {id:'he-12-23', fr:{text:'Vous vous \u00eates approch\u00e9s de l\u2019assembl\u00e9e des premiers-n\u00e9s, et des esprits des justes parvenus \u00e0 la perfection.', ref:'H\u00e9breux 12:23'}, en:{text:'You have come to the assembly of the firstborn and to the spirits of the righteous made perfect.', ref:'Hebrews 12:23'}},
    {id:'ap-5-8', fr:{text:'Ils tenaient des coupes d\u2019or pleines de parfums, qui sont les pri\u00e8res des saints.', ref:'Apocalypse 5:8'}, en:{text:'They held golden bowls full of incense, which are the prayers of the saints.', ref:'Revelation 5:8'}},
    {id:'ap-8-3-4', fr:{text:'La fum\u00e9e des parfums monta, avec les pri\u00e8res des saints, de la main de l\u2019ange devant Dieu.', ref:'Apocalypse 8:3-4'}, en:{text:'The smoke of the incense, with the prayers of the saints, rose before God from the angel\u2019s hand.', ref:'Revelation 8:3-4'}},
    {id:'1co-12-26', fr:{text:'Si un membre souffre, tous les membres souffrent avec lui\u00a0; si un membre est honor\u00e9, tous se r\u00e9jouissent avec lui.', ref:'1 Corinthiens 12:26'}, en:{text:'If one member suffers, all suffer together; if one member is honored, all rejoice together.', ref:'1 Corinthians 12:26'}},
    {id:'rm-12-5', fr:{text:'Nous formons un seul corps dans le Christ, et nous sommes tous membres les uns des autres.', ref:'Romains 12:5'}, en:{text:'We who are many form one body in Christ, and individually members one of another.', ref:'Romans 12:5'}},
    {id:'mt-22-32', fr:{text:'Dieu n\u2019est pas le Dieu des morts, mais des vivants.', ref:'Matthieu 22:32'}, en:{text:'He is not the God of the dead, but of the living.', ref:'Matthew 22:32'}},
    {id:'2m-12-46', fr:{text:'C\u2019est une pens\u00e9e sainte et salutaire de prier pour les morts, afin qu\u2019ils soient d\u00e9livr\u00e9s de leurs p\u00e9ch\u00e9s.', ref:'2 Maccab\u00e9es 12:46'}, en:{text:'It is a holy and wholesome thought to pray for the dead, that they may be freed from their sin.', ref:'2 Maccabees 12:46'}},
    {id:'col-1-24', fr:{text:'Je compl\u00e8te en ma chair ce qui manque aux \u00e9preuves du Christ, pour son corps qui est l\u2019\u00c9glise.', ref:'Colossiens 1:24'}, en:{text:'I complete in my flesh what is lacking in the trials of Christ, for his body which is the Church.', ref:'Colossians 1:24'}},

// ════════ ÉTAT ════════
const S={
  lang:localStorage.getItem('lm_lang')||'fr',
  uid:null, mode:0,
  selCats:[], progress:{}, step:0, customCats:[], baseEdits:{}, trash:[], trashOpen:false, showAllCats:false,
  open:{},          // catId -> bool (déplié)
  cur:null, lastId:null, answered:0, correct:0,
  pendingCat:null, editCat:null, editVerse:null
};

// ════════ OUTILS ════════
const $=id=>document.getElementById(id);
const t=k=>(T[S.lang]||T.fr)[k]||k;
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]]}return a};
const trunc=(s,n)=>s.length>n?s.slice(0,n)+'…':s;
function effectiveCats(){
  const trashIds=new Set((S.trash||[]).map(t=>t.vId));
  const base=PRE.map(c=>{
    const ov=S.baseEdits[c.id];
    if(!ov) return {id:c.id,name:c.name,verses:c.verses,base:true};
    // catégorie de base éditée : on conserve l'édition de l'utilisateur, mais on y ajoute
    // les versets du modèle apparus depuis (absents de l'édition ET non mis à la corbeille)
    const have=new Set(ov.verses.map(v=>v.id));
    const extra=c.verses.filter(v=>!have.has(v.id)&&!trashIds.has(v.id));
    return {id:c.id,name:ov.name,verses:ov.verses.concat(extra),base:true};
  });
  return [...base,...S.customCats.map(c=>({...c,base:false}))];
}
const allCats=effectiveCats;
function allItems(){const out=[];effectiveCats().filter(c=>S.soloCat?c.id===S.soloCat:S.selCats.includes(c.id)).forEach(c=>c.verses.forEach(v=>out.push({...v,catId:c.id})));return out;}
// clone profond de la version effective d'une catégorie de base, pour la rendre éditable
function baseClone(catId){const e=effectiveCats().find(c=>c.id===catId);return{name:JSON.parse(JSON.stringify(e.name)),verses:JSON.parse(JSON.stringify(e.verses))};}
function editBase(catId,fn){const c=S.baseEdits[catId]||baseClone(catId);fn(c);S.baseEdits[catId]=c;saveBaseEdits();}
function isBase(catId){return PRE.some(c=>c.id===catId);}

// ════════ ALGORITHME (Leitner, infini) ════════
const IVLS=[0,4,8,16,32,64];       // pas avant nouvelle échéance, par niveau
const boxOf=id=>(S.progress[id]||{box:0}).box;
const dueOf=id=>(S.progress[id]||{due:0}).due||0;
function isDue(id){const p=S.progress[id];if(!p)return true;if(p.box===0)return true;return p.due<=S.step;}
function levelOf(id){const b=boxOf(id);return b<=1?'r':b<=3?'a':'v';}     // rouge / ambre / vert
function setLevel(id,lvl){const b=lvl==='r'?0:lvl==='a'?2:5;S.progress[id]={box:b,due:S.step+IVLS[b]};}
function answer(id,ok){
  const p=S.progress[id]||{box:0,due:0};
  if(ok){ p.box=Math.min(5,p.box+1); p.due=S.step+IVLS[p.box]; }
  else  { p.box=Math.max(0,p.box-2); p.due=S.step+2; }   // erreur : on redescend de 2 et on revoit vite
  S.progress[id]=p; S.step++;
}
function nextItem(){
  const items=allItems(); if(!items.length)return null;
  let pool=items.filter(i=>i.id!==S.lastId); if(!pool.length)pool=items;
  const due=pool.filter(i=>isDue(i.id));
  const cand=due.length?due:pool;
  cand.sort((a,b)=>{const ba=boxOf(a.id),bb=boxOf(b.id);if(ba!==bb)return ba-bb;return dueOf(a.id)-dueOf(b.id);});
  const low=boxOf(cand[0].id);
  const top=cand.filter(i=>boxOf(i.id)===low);
  return top[0|Math.random()*top.length];
}
function getOptions(item){
  const others=shuffle(allItems().filter(i=>i.id!==item.id)).slice(0,3);
  return shuffle([item,...others]);
}


// ════════ UI : NOUVEAUTÉS / NOTIFICATIONS ════════
function newsGroups(){return NEWS[S.lang]||NEWS.fr;}
function newsSignature(){const gs=newsGroups();return S.lang+'|'+(gs[0]?gs[0].d:'')+'|'+gs.reduce((n,g)=>n+(g.items?g.items.length:0),0);}
function newsSeen(){try{return localStorage.getItem('lumen_nouv_vu');}catch(e){return null;}}
function updateNewsDot(){const b=$('cloche-ouvrir'); if(!b)return; const pt=b.querySelector('.cloche-point'); if(pt)pt.style.display=(newsSeen()===newsSignature()?'none':'block');}
function renderNews(){
  const tl=T[S.lang], li=$('nouv-liste');
  if($('nouv-title'))$('nouv-title').textContent=tl.news;
  if($('nouv-link-label'))$('nouv-link-label').textContent=tl.news;
  if($('cloche-ouvrir'))$('cloche-ouvrir').setAttribute('aria-label',tl.news);
  if($('nouv-fermer'))$('nouv-fermer').setAttribute('aria-label',tl.close);
  if(li){li.innerHTML=newsGroups().map(g=>'<div class="nouv-groupe"><div class="nouv-date">'+g.d+'</div>'+(g.items||[]).map(x=>'<div class="nouv-ligne">'+x+'</div>').join('')+'</div>').join('');}
  updateNewsDot();
}
function initNews(){
  const b=$('cloche-ouvrir'),ov=$('nouv-overlay'),fe=$('nouv-fermer');
  if(!b||!ov||b.dataset.ready==='1')return;
  b.dataset.ready='1';
  function openNews(){renderNews();ov.classList.add('ouvert');document.body.style.overflow='hidden';try{localStorage.setItem('lumen_nouv_vu',newsSignature());}catch(e){}updateNewsDot();}
  function closeNews(){ov.classList.remove('ouvert');document.body.style.overflow='';}
  b.addEventListener('click',openNews);
  b.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openNews();}});
  if(fe){fe.addEventListener('click',closeNews);fe.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();closeNews();}});}
  ov.addEventListener('click',e=>{if(e.target===ov)closeNews();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape'&&ov.classList.contains('ouvert'))closeNews();});
  renderNews();
}

// ════════ FIRESTORE ════════
const udoc=p=>db.doc('users/'+S.uid+'/'+p);
const ucol=p=>db.collection('users/'+S.uid+'/'+p);
async function loadUser(){
  try{
    const [prog,prefs,snap,base,trash]=await Promise.all([udoc('meta/progress').get(),udoc('meta/prefs').get(),ucol('categories').get(),udoc('meta/baseEdits').get(),udoc('meta/trash').get()]);
    if(prog.exists){S.progress=prog.data().items||{};S.step=prog.data().step||0;}else{S.progress={};S.step=0;}
    S.customCats=snap.docs.map(d=>({id:d.id,...d.data()}));
    S.baseEdits=base.exists?(base.data().cats||{}):{};
    S.trash=trash.exists?(trash.data().items||[]):[];
    if(prefs.exists){S.selCats=prefs.data().selCats||[];S.mode=prefs.data().mode||0;}
    else{S.selCats=PRE.map(c=>c.id);}
  }catch(e){console.error(e);}
}
function saveProgress(){udoc('meta/progress').set({items:S.progress,step:S.step});}
function savePrefs(){udoc('meta/prefs').set({selCats:S.selCats,mode:S.mode});}
function saveCat(c){return ucol('categories').doc(c.id).set({name:c.name,verses:c.verses});}
function saveBaseEdits(){udoc('meta/baseEdits').set({cats:S.baseEdits});}
function saveTrash(){udoc('meta/trash').set({items:S.trash});}

// ════════ UI : CATÉGORIES & MÉMOIRE ════════
function renderCats(){
  const host=$('cat-list'); host.innerHTML='';
  const CATLIM=6;
  const _allc=allCats();
  (S.showAllCats?_allc:_allc.slice(0,CATLIM)).forEach(cat=>{
    const custom=!!S.customCats.find(c=>c.id===cat.id);
    const sel=S.selCats.includes(cat.id);
    const open=!!S.open[cat.id];
    // distribution
    let r=0,a=0,v=0;
    cat.verses.forEach(vv=>{const l=levelOf(vv.id);if(l==='r')r++;else if(l==='a')a++;else v++;});
    const tot=cat.verses.length||1;
    const dist='<i class="r" style="width:'+(r/tot*100)+'%"></i><i class="a" style="width:'+(a/tot*100)+'%"></i><i class="v" style="width:'+(v/tot*100)+'%"></i>'+(cat.verses.length?'':'<i class="e" style="width:100%"></i>');
    let boxsum=0; cat.verses.forEach(vv=>boxsum+=boxOf(vv.id));
    const pct=cat.verses.length?Math.round(boxsum/(5*cat.verses.length)*100):0;
    const pctTxt=S.lang==='fr'?pct+'\u00a0%':pct+'%';
    const div=document.createElement('div');
    div.className='cat'+(sel?' sel':'')+(open?' open':'');
    div.dataset.id=cat.id;
    let body='<div class="cat-body">';
    cat.verses.forEach(vv=>{
      const l=levelOf(vv.id);
      body+='<div class="vrow"><span class="vline" data-editv="'+vv.id+'"><span class="vref">'+vv[S.lang].ref+'</span><span class="vtext">'+trunc(vv[S.lang].text,58)+'</span></span><span class="lvl">'
        +'<span class="dot r'+(l==='r'?' act':'')+'" data-set="r" data-v="'+vv.id+'"></span>'
        +'<span class="dot a'+(l==='a'?' act':'')+'" data-set="a" data-v="'+vv.id+'"></span>'
        +'<span class="dot v'+(l==='v'?' act':'')+'" data-set="v" data-v="'+vv.id+'"></span></span>'
        +'<span class="del-v" data-delv="'+vv.id+'">×</span></div>';
    });

function showView(v){
  $('setup').style.display=v==='setup'?'block':'none';
  $('study').style.display=v==='study'?'block':'none';
  $('summary').style.display=v==='summary'?'block':'none';

function startSession(){
  if(!S.soloCat && !S.selCats.length){alert(t('empty_sel'));return;}
  if(allItems().length<2){alert(t('not_enough'));return;}
  S.answered=0; S.correct=0; S.lastId=null;
  showView('study'); nextQuestion();
}
function nextQuestion(){
  const item=nextItem(); if(!item){endSession();return;}
  S.lastId=item.id;
  const qMode=S.mode===0?(Math.random()<.5?'vr':'rv'):S.mode===1?'vr':'rv';
  S.cur={item,qMode,options:getOptions(item),done:false};
  renderQuestion();
}
function renderQuestion(){
  const q=S.cur,l=S.lang;
  $('study-stat').innerHTML='<b>'+S.answered+'</b> '+t('answered')+' · <b>'+S.correct+'</b> '+t('correct');
  $('q-label').textContent=q.qMode==='vr'?t('find_ref'):t('find_verse');
  const pr=$('q-prompt');
  pr.textContent=q.qMode==='vr'?q.item[l].text:q.item[l].ref;
  pr.className='q-prompt'+(q.qMode==='rv'?' ref':'');
  // relancer l\u2019animation d\u2019entrée
  const qb=$('qbox'); qb.style.animation='none'; void qb.offsetHeight; qb.style.animation='rise .5s cubic-bezier(.2,.7,.3,1) both';
  const opts=$('opts'); opts.className='opts'+(q.qMode==='vr'?' two':''); opts.innerHTML='';
  q.options.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='opt'+(q.qMode==='rv'?' refopt':'');
    b.style.animationDelay=(60+i*55)+'ms';
    b.dataset.oid=opt.id;
    b.innerHTML='<span class="num">'+(i+1)+'</span>'+(q.qMode==='vr'?opt[l].ref:opt[l].text);
    b.addEventListener('click',()=>pick(opt,b));
    opts.appendChild(b);
  });
}
function pick(opt,btn){
  if(S.cur.done)return; S.cur.done=true;
  const q=S.cur, ok=opt.id===q.item.id;
  S.answered++; if(ok)S.correct++;
  answer(q.item.id,ok); saveProgress();
  $('opts').querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.dataset.oid===q.item.id)b.classList.add(ok?'ok':'reveal');
    else if(b.dataset.oid===opt.id&&!ok)b.classList.add('bad');
  });
  $('study-stat').innerHTML='<b>'+S.answered+'</b> '+t('answered')+' · <b>'+S.correct+'</b> '+t('correct');
  setTimeout(nextQuestion, ok?750:4000);
}
function endSession(){
  showView('summary');
  $('sum-num').textContent=S.answered?Math.round(S.correct/S.answered*100)+'%':'—';
  $('sum-sub').textContent=t('done');
  let vCount=0; allItems().forEach(i=>{if(levelOf(i.id)==='v')vCount++;});
  $('sum-detail').textContent=S.correct+' / '+S.answered+' '+t('correct')+'  ·  '+vCount+' '+t('acquired');
  S.soloCat=null;
  renderCats();
}

function openModal(id){$(id).classList.add('on')}
function closeModal(id){$(id).classList.remove('on')}
function openNewCat(){S.editCat=null;$('mcat-title').textContent=t('mcat');$('i-cfr').value='';$('i-cen').value='';openModal('m-cat');}
function openRenameCat(id){const c=effectiveCats().find(x=>x.id===id);if(!c)return;S.editCat=id;$('mcat-title').textContent=t('mcat_edit');$('i-cfr').value=c.name.fr;$('i-cen').value=c.name.en;openModal('m-cat');}
async function saveCatModal(){
  const fr=$('i-cfr').value.trim(),en=$('i-cen').value.trim(); if(!fr)return;
  if(S.editCat){
    if(isBase(S.editCat)) editBase(S.editCat,c=>{c.name={fr,en:en||fr};});

  } else {
    const c={id:'c'+Date.now(),name:{fr,en:en||fr},verses:[]};S.customCats.push(c);S.selCats.push(c.id);await saveCat(c);savePrefs();
  }

}
async function delCatById(id){
  if(!confirm(t('del_cat_q')))return;

  await ucol('categories').doc(id).delete(); savePrefs(); renderCats();
}
function openAddVerse(catId){S.pendingCat=catId;S.editVerse=null;$('mv-title').textContent=t('mv');['i-vfr','i-rfr','i-ven','i-ren'].forEach(x=>$(x).value='');$('mv-reset').style.display='none';openModal('m-verse');}
function openEditVerse(catId,vId){
  const c=effectiveCats().find(x=>x.id===catId); if(!c)return;
  const v=c.verses.find(x=>x.id===vId); if(!v)return;

  $('i-vfr').value=v.fr.text; $('i-rfr').value=v.fr.ref; $('i-ven').value=v.en.text; $('i-ren').value=v.en.ref;
  $('mv-reset').style.display=verseOrigin(vId)==='base'?'':'none'; $('mv-reset').textContent=t('reset_verse');

}
async function saveVerseModal(){
  const tfr=$('i-vfr').value.trim(),rfr=$('i-rfr').value.trim(),ten=$('i-ven').value.trim(),ren=$('i-ren').value.trim();
  if(!tfr||!rfr)return;
  const catId=S.pendingCat, base=isBase(catId);
  if(S.editVerse){
    const apply=c=>{const v=c.verses.find(x=>x.id===S.editVerse);if(v){v.fr={text:tfr,ref:rfr};v.en={text:ten||tfr,ref:ren||rfr};}};
    if(base) editBase(catId,apply); else{const c=S.customCats.find(x=>x.id===catId);apply(c);await saveCat(c);}
  } else {
    const nv={id:'v'+Date.now(),fr:{text:tfr,ref:rfr},en:{text:ten||tfr,ref:ren||rfr}};
    if(base) editBase(catId,c=>c.verses.push(nv)); else{const c=S.customCats.find(x=>x.id===catId);c.verses.push(nv);await saveCat(c);}
  }
  closeModal('m-verse'); renderCats();
}
const clone=o=>JSON.parse(JSON.stringify(o));
function verseOrigin(vId){return PRE.some(c=>c.verses.some(v=>v.id===vId))?'base':'perso';}
function resetVerseOrig(){
  const catId=S.pendingCat, vId=S.editVerse; if(!catId||!vId)return;
  let orig=null; PRE.forEach(c=>{const v=c.verses.find(x=>x.id===vId); if(v)orig=v;});
  if(!orig){closeModal('m-verse');return;}
  if(isBase(catId)) editBase(catId,c=>{const v=c.verses.find(x=>x.id===vId); if(v){v.fr=JSON.parse(JSON.stringify(orig.fr)); v.en=JSON.parse(JSON.stringify(orig.en));}});
  closeModal('m-verse'); renderCats();
}
// suppression d'un verset = envoi en corbeille (récupérable)
async function trashVerse(catId,vId){
  const c=effectiveCats().find(x=>x.id===catId); if(!c)return;
  const v=c.verses.find(x=>x.id===vId); if(!v)return;
  const rec={vId, catId, catName:clone(c.name), verse:clone(v), origin:verseOrigin(vId), prog:S.progress[vId]?clone(S.progress[vId]):null, ts:Date.now()};
  if(isBase(catId)) editBase(catId,cc=>{cc.verses=cc.verses.filter(x=>x.id!==vId);});
  else{const cu=S.customCats.find(x=>x.id===catId);if(!cu)return;cu.verses=cu.verses.filter(x=>x.id!==vId);await saveCat(cu);}
  delete S.progress[vId]; saveProgress();
  S.trash.push(rec); saveTrash(); renderCats();
}
async function restoreTrash(vId){
  const idx=S.trash.findIndex(x=>x.vId===vId); if(idx<0)return;
  const rec=S.trash[idx];
  if(!effectiveCats().some(c=>c.id===rec.catId)){alert(t('trash_cat_gone'));return;}
  if(isBase(rec.catId)){ editBase(rec.catId,cc=>{if(!cc.verses.some(x=>x.id===rec.vId))cc.verses.push(rec.verse);}); }
  else{const cu=S.customCats.find(x=>x.id===rec.catId);if(cu&&!cu.verses.some(x=>x.id===rec.vId)){cu.verses.push(rec.verse);await saveCat(cu);}}
  if(rec.prog){S.progress[rec.vId]=rec.prog; saveProgress();}
  S.trash.splice(idx,1); saveTrash(); renderCats();
}
function deleteTrashPerm(vId){
  S.trash=S.trash.filter(x=>x.vId!==vId); delete S.progress[vId];
  saveProgress(); saveTrash(); renderTrash();
}
function emptyTrash(){
  if(!S.trash.length)return; if(!confirm(t('trash_empty_q')))return;
  S.trash.forEach(x=>{delete S.progress[x.vId];});
  S.trash=[]; saveProgress(); saveTrash(); renderTrash();
}
// restaurer UNE catégorie de base à son état d'origine
function restoreCatBase(catId){
  if(!isBase(catId))return; if(!confirm(t('cat_restore_q')))return;
  delete S.baseEdits[catId]; saveBaseEdits();
  S.trash=S.trash.filter(x=>!(x.origin==='base'&&x.catId===catId)); saveTrash();
  renderCats();
}
// restaurer TOUTES les catégories de base
function restoreBase(){
  if(!confirm(t('restore_q')))return;
  S.baseEdits={}; udoc('meta/baseEdits').set({cats:{}});
  S.trash=S.trash.filter(x=>x.origin!=='base'); saveTrash();
  renderCats();
}
// ════════ UI : CORBEILLE ════════
function trashSection(title,items){
  let h='<div class="trash-sub"><div class="trash-sub-head">'+title+' <span class="trash-count">'+items.length+'</span></div>';
  if(!items.length){ h+='<div class="trash-none">'+t('trash_section_empty')+'</div>'; }
  else items.forEach(it=>{
    h+='<div class="trash-item"><span class="trash-vmeta"><span class="trash-vref">'+it.verse[S.lang].ref
      +'</span><span class="trash-vcat">'+(it.catName?it.catName[S.lang]:'')+'</span></span>'
      +'<span class="trash-acts"><span class="trash-act" data-trestore="'+it.vId+'">'+t('trash_restore')
      +'</span><span class="trash-act del" data-tdel="'+it.vId+'">'+t('trash_delperm')+'</span></span></div>';
  });
  return h+'</div>';
}
function renderTrash(){
  const host=$('trash-block'); if(!host)return;
  if(!S.trash.length){host.style.display='none';host.innerHTML='';return;}
  host.style.display='';
  const base=S.trash.filter(x=>x.origin==='base'), perso=S.trash.filter(x=>x.origin!=='base');
  let h='<div class="trash-head'+(S.trashOpen?' open':'')+'" id="trash-toggle"><span class="lbl">'+t('trash')+' ('+S.trash.length+')</span><span class="cat-chev">\u203A</span></div>';
  if(S.trashOpen){
    h+='<div class="trash-body">'+trashSection(t('trash_original'),base)+trashSection(t('trash_perso'),perso)
      +'<button class="reset-link" id="trash-empty" style="margin:20px 0 0">'+t('trash_empty_btn')+'</button></div>';
  }
  host.innerHTML=h;
}

// ════════ AUTH UI ════════
let authMode='si';
function setAuth(m){
  authMode=m; clrMsg();
  $('tab-si').classList.toggle('on',m==='si'); $('tab-su').classList.toggle('on',m==='su');
  $('auth-tabs').style.display=m==='forgot'?'none':'flex';
  $('row-pw').style.display=m==='forgot'?'none':'block';
  $('row-cf').style.display=m==='su'?'block':'none';
  $('auth-or').style.display=m==='forgot'?'none':'flex';
  $('b-google').style.display=m==='forgot'?'none':'flex';
  applyLang();
}
function showMsg(txt,kind){const m=$('auth-msg');m.textContent=txt;m.className='auth-msg '+kind;}
function clrMsg(){const m=$('auth-msg');m.className='auth-msg';m.textContent='';}

// ════════ ÉVÉNEMENTS ════════
document.addEventListener('DOMContentLoaded',()=>{
  $('tab-si').onclick=()=>setAuth('si');
  $('tab-su').onclick=()=>setAuth('su');
  $('b-forgot').onclick=()=>setAuth(authMode==='forgot'?'si':'forgot');
  $('b-submit').onclick=async()=>{
    const em=$('i-email').value.trim(),pw=$('i-pw').value,cf=$('i-cf').value; clrMsg();
    try{
      if(authMode==='forgot'){await auth.sendPasswordResetEmail(em);showMsg(t('reset_sent'),'ok');}
      else if(authMode==='su'){if(pw!==cf){showMsg(t('pw_mismatch'),'err');return;}await auth.createUserWithEmailAndPassword(em,pw);}
      else{await auth.signInWithEmailAndPassword(em,pw);}
    }catch(e){showMsg(e.message,'err');}
  };
  ['i-email','i-pw','i-cf'].forEach(id=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter')$('b-submit').click();}));
  $('b-google').onclick=async()=>{try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}catch(e){showMsg(e.message,'err');}};
  $('logout-btn').onclick=()=>auth.signOut();
  $('nav-burger').onclick=()=>document.getElementById('site-nav').classList.toggle('open');
  initNews();
  $('lang-btn').onclick=()=>{S.lang=S.lang==='fr'?'en':'fr';localStorage.setItem('lm_lang',S.lang);applyLang();renderCats();if($('study').style.display==='block'&&S.cur&&!S.cur.done)renderQuestion();};
  $('modes').onclick=e=>{const b=e.target.closest('.mode');if(!b)return;S.mode=+b.dataset.m;document.querySelectorAll('.mode').forEach(x=>x.classList.toggle('on',x===b));savePrefs();};
  $('start-btn').onclick=()=>{S.soloCat=null;startSession();};
  $('finish-btn').onclick=endSession;
  $('sum-back').onclick=()=>showView('setup');
  $('reset-btn').onclick=()=>{if(confirm(t('reset_q'))){S.progress={};S.step=0;saveProgress();renderCats();}};
  $('restore-btn').onclick=restoreBase;
  $('add-cat').onclick=openNewCat;
  $('sel-all').onclick=toggleSelectAll;
  $('cat-more').onclick=()=>{S.showAllCats=!S.showAllCats;renderCats();};
  $('foot-copy').textContent='© '+new Date().getFullYear()+' Lumen';
  $('trash-block').addEventListener('click',e=>{
    if(e.target.closest('#trash-toggle')){S.trashOpen=!S.trashOpen;renderTrash();return;}
    const rst=e.target.closest('[data-trestore]'); if(rst){restoreTrash(rst.dataset.trestore);return;}
    const tdl=e.target.closest('[data-tdel]'); if(tdl){deleteTrashPerm(tdl.dataset.tdel);return;}
    if(e.target.closest('#trash-empty')){emptyTrash();return;}
  });
  // marquage global : toutes les catégories sélectionnées
  document.querySelector('.markglobal').addEventListener('click',e=>{
    const d=e.target.closest('[data-gall]'), rb=e.target.closest('#bulk-restore');
    const sel=effectiveCats().filter(c=>S.selCats.includes(c.id));
    if(d){
      if(!sel.length)return;
      if(!confirm(t('bulk_mark_q').replace('%n%',sel.length)))return;
      sel.forEach(c=>c.verses.forEach(v=>setLevel(v.id,d.dataset.gall)));
      saveProgress(); renderCats(); return;
    }
    if(rb){
      const baseSel=sel.filter(c=>isBase(c.id));
      if(!baseSel.length)return;
      if(!confirm(t('bulk_restore_q').replace('%n%',baseSel.length)))return;
      baseSel.forEach(c=>{delete S.baseEdits[c.id];}); saveBaseEdits();
      S.trash=S.trash.filter(x=>!(x.origin==='base'&&baseSel.some(c=>c.id===x.catId))); saveTrash();
      renderCats(); return;
    }
  });
  // clavier 1-4 pendant l'étude
  document.addEventListener('keydown',e=>{
    if($('study').style.display!=='block'||!S.cur||S.cur.done)return;
    const n=parseInt(e.key); if(n>=1&&n<=S.cur.options.length){const btns=$('opts').querySelectorAll('.opt');if(btns[n-1])btns[n-1].click();}
  });
  // délégation catégories
  $('cat-list').addEventListener('click',async e=>{
    const catEl=e.target.closest('.cat'); if(!catEl)return; const id=catEl.dataset.id;
    const setDot=e.target.closest('[data-set]');
    const allDot=e.target.closest('[data-all]');
    const editv=e.target.closest('[data-editv]');
    const delv=e.target.closest('[data-delv]');
    const addv=e.target.closest('[data-addv]');
    const editc=e.target.closest('[data-editc]');
    const delc=e.target.closest('[data-delc]');
    const restorec=e.target.closest('[data-restorec]');
    const act=e.target.closest('[data-act]');
    if(setDot){setLevel(setDot.dataset.v,setDot.dataset.set);saveProgress();renderCats();return;}
    if(allDot){const c=effectiveCats().find(x=>x.id===id);c.verses.forEach(v=>setLevel(v.id,allDot.dataset.all));saveProgress();renderCats();return;}
    if(delv){await trashVerse(id,delv.dataset.delv);return;}
    if(editv){openEditVerse(id,editv.dataset.editv);return;}
    if(addv){openAddVerse(id);return;}
    if(editc){openRenameCat(id);return;}
    if(delc){await delCatById(id);return;}
    if(restorec){restoreCatBase(id);return;}
    if(act&&act.dataset.act==='solo'){S.soloCat=id;startSession();return;}
    if(act&&act.dataset.act==='sel'){S.selCats.includes(id)?S.selCats=S.selCats.filter(x=>x!==id):S.selCats.push(id);savePrefs();renderCats();return;}
    if(act){S.open[id]=!S.open[id];catEl.classList.toggle('open');return;}
  });
  $('mcat-cancel').onclick=()=>closeModal('m-cat'); $('mcat-ok').onclick=saveCatModal;
  $('mv-cancel').onclick=()=>closeModal('m-verse'); $('mv-ok').onclick=saveVerseModal; $('mv-reset').onclick=resetVerseOrig;
  ['m-cat','m-verse'].forEach(id=>$(id).addEventListener('click',e=>{if(e.target===$(id))closeModal(id);}));
});

    showView('setup');
  }else{
    S.uid=null; $('app').classList.remove('on'); $('auth-screen').style.display='flex';
    applyLang(); setAuth('si');
  }
});
</script>
