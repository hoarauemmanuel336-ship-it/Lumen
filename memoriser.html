<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mémoriser · Lumen Veritatis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root{
  --encre:#000;--encre-2:#0a0a0a;--encre-3:#131313;
  --or:#efe6cf;--or-pale:#f8f3e6;
  --parchemin:#fff;--pa:rgba(255,255,255,.58);--pa2:rgba(255,255,255,.36);
  --filet:rgba(231,224,207,.12);--filet-f:rgba(231,224,207,.26);
  --parchemin-att:#ffffff;--filet-fort:rgba(231,224,207,.28);
  --rouge:#c75d52;--ambre:#cfa24f;--vert:#7ba37e;--pourpre:#9a3b3b;
  --serif:'EB Garamond',Georgia,serif;--display:'Cormorant Garamond',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{background:var(--encre);color:var(--parchemin);font-family:var(--serif);font-size:20px;line-height:1.6;min-height:100%;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:rgba(239,230,207,.22)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* champ : style filet bas, pas de boîte */
.field{width:100%;background:transparent;border:none;border-bottom:1px solid var(--filet-f);color:var(--parchemin);font-family:var(--serif);font-size:17px;padding:10px 2px;outline:none;transition:border-color .3s}
.field:focus{border-bottom-color:var(--or)}
.field::placeholder{color:var(--pa2)}
textarea.field{resize:vertical;min-height:92px;line-height:1.45;display:block}

/* ═══ AUTH ═══ */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.auth-panel{width:100%;max-width:392px;border:1px solid var(--filet);padding:52px 44px;animation:fade .6s ease both}
.auth-cross{width:48px;height:88px;margin:0 auto 22px;background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2072%20132'%3E%3Cpolygon%20points='34.5,40%2037.5,40%2041,2%2031,2'%20fill='%23ffffff'/%3E%3Cpolygon%20points='34.5,40%2037.5,40%2041,130%2031,130'%20fill='%23ffffff'/%3E%3Cpolygon%20points='36,38.5%2036,41.5%202,45%202,35'%20fill='%23ffffff'/%3E%3Cpolygon%20points='36,38.5%2036,41.5%2070,45%2070,35'%20fill='%23ffffff'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:center;background-size:contain}
.auth-logo{font-family:var(--display);font-size:23px;font-weight:500;letter-spacing:.42em;text-transform:uppercase;text-align:center;padding-left:.42em;margin-bottom:34px}
.auth-tabs{display:flex;margin-bottom:26px}
.auth-tab{flex:1;padding:8px 0;font-family:var(--display);font-size:15px;letter-spacing:.1em;text-transform:uppercase;color:var(--pa2);border-bottom:1px solid var(--filet);transition:color .3s,border-color .3s}
.auth-tab.on{color:var(--or);border-bottom-color:var(--or)}
.auth-fieldrow{margin-bottom:20px}
.auth-primary{display:block;width:100%;text-align:center;padding:13px;margin-top:10px;background:var(--or);color:var(--encre);font-family:var(--display);font-size:15px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;transition:background .3s}
.auth-primary:hover{background:var(--or-pale)}
.auth-or{display:flex;align-items:center;gap:14px;color:var(--pa2);font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin:22px 0}
.auth-or::before,.auth-or::after{content:'';flex:1;height:1px;background:var(--filet)}
.auth-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px;border:1px solid var(--filet-f);font-family:var(--serif);font-size:15px;color:var(--parchemin);transition:border-color .3s,background .3s}
.auth-google:hover{border-color:var(--or);background:rgba(239,230,207,.04)}
.auth-link{display:block;width:100%;text-align:center;color:var(--pa);font-size:14px;margin-top:22px;transition:color .3s}
.auth-link:hover{color:var(--or)}
.auth-msg{font-size:14px;line-height:1.5;padding:9px 13px;margin-bottom:18px;display:none}
.auth-msg.err{display:block;background:rgba(154,59,59,.16);border:1px solid var(--pourpre);color:#eba5a5}
.auth-msg.ok{display:block;background:rgba(123,163,126,.14);border:1px solid var(--vert);color:#a9cdab}

/* ═══ APP ═══ */
#app{display:none;min-height:100vh;flex-direction:column}
#app.on{display:flex}
.hdr{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;padding:18px 30px;background:rgba(0,0,0,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--filet)}
.hdr-logo{font-family:var(--display);font-size:20px;font-weight:500;letter-spacing:.34em;text-transform:uppercase;padding-left:.34em;transition:color .3s}
.nav-burger{display:none;background:none;border:none;color:var(--pa);font-size:22px;line-height:1;cursor:pointer;padding:2px 6px;transition:color .3s}
.nav-burger:hover{color:var(--or)}
.hdr-logo:hover{color:var(--or)}
.hdr-sep{color:var(--pa2)}
.hdr-title{font-family:var(--display);font-size:14px;letter-spacing:.2em;text-transform:uppercase;color:var(--pa);flex:1}
.hdr-right{display:flex;align-items:center;gap:16px}
.hdr-act{font-family:var(--display);font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--pa);transition:color .3s}
.hdr-act:hover{color:var(--or)}
#logout-btn:hover{color:var(--pourpre)}
.hdr-mail{font-size:13px;color:var(--pa2);max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wrap{flex:1;width:100%;max-width:680px;margin:0 auto;padding:46px 26px 80px}

.lbl{font-family:var(--display);font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--pa)}
.block{margin-bottom:42px}
.block-head{margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--filet)}

/* catégories + mémoire */
.cat{border-bottom:1px solid var(--filet)}
.cat-row{display:flex;align-items:center;gap:14px;padding:15px 2px;cursor:pointer}
.cat-check{flex-shrink:0;width:16px;height:16px;border:1px solid var(--filet-f);position:relative;transition:border-color .3s}
.cat-check::after{content:'';position:absolute;inset:3px;background:var(--or);opacity:0;transition:opacity .2s}
.cat.sel .cat-check{border-color:var(--or)}
.cat.sel .cat-check::after{opacity:1}
.cat-name{flex:1;font-family:var(--display);font-size:20px;color:var(--parchemin);transition:color .3s}
.cat-row:hover .cat-name{color:var(--or-pale)}
.cat-dist{display:flex;width:64px;height:3px;flex-shrink:0;overflow:hidden}
.cat-dist i{display:block;height:100%}
.cat-dist .r{background:var(--rouge)}.cat-dist .a{background:var(--ambre)}.cat-dist .v{background:var(--vert)}
.cat-dist .e{background:var(--filet)}
.cat-chev{flex-shrink:0;font-family:var(--display);font-size:20px;color:var(--pa2);transition:transform .3s,color .3s;line-height:1}
.cat.open .cat-chev{transform:rotate(90deg);color:var(--or)}
.cat-body{display:none;padding:4px 0 20px 30px}
.cat.open .cat-body{display:block;animation:fade .35s ease both}
.markall{display:flex;align-items:center;gap:12px;padding:8px 0 14px;font-size:13px;color:var(--pa2);letter-spacing:.04em}
.markall-dots{display:flex;gap:8px}
.markall-dots .dot,.markglobal .dot{opacity:.8}
.markall-dots .dot:hover,.markglobal .dot:hover{opacity:1;box-shadow:0 0 0 1px var(--encre),0 0 0 2px currentColor}
.markall-dots .dot.r,.markglobal .dot.r{color:var(--rouge)}
.markall-dots .dot.a,.markglobal .dot.a{color:var(--ambre)}
.markall-dots .dot.v,.markglobal .dot.v{color:var(--vert)}
.vrow{display:flex;align-items:center;gap:14px;padding:11px 0;border-top:1px solid var(--filet)}
.vline{display:flex;align-items:center;gap:14px;flex:1;min-width:0;cursor:pointer}
.vline:hover .vref{color:var(--or-pale)}
.vline:hover .vtext{color:var(--pa)}
.vref{flex-shrink:0;font-family:var(--display);font-size:15px;color:var(--or);width:124px}
.vtext{flex:1;font-size:15px;color:var(--pa);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .25s}
.markglobal{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 2px 16px;margin-bottom:4px;border-bottom:1px solid var(--filet);font-size:13px;letter-spacing:.04em;color:var(--pa2)}
.lvl{display:flex;gap:8px;flex-shrink:0}
.dot{width:13px;height:13px;border-radius:50%;cursor:pointer;opacity:.26;transition:opacity .25s,box-shadow .25s;position:relative}
.dot.r{background:var(--rouge)}.dot.a{background:var(--ambre)}.dot.v{background:var(--vert)}
.dot:hover{opacity:.6}
.dot.act{opacity:1;box-shadow:0 0 0 1px var(--encre),0 0 0 2px currentColor}
.dot.r.act{color:var(--rouge)}.dot.a.act{color:var(--ambre)}.dot.v.act{color:var(--vert)}
.cat-custom-acts{display:flex;gap:18px;padding:14px 0 4px;border-top:1px solid var(--filet);margin-top:6px}
.mini-act{font-family:var(--display);font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--pa);transition:color .3s}
.mini-act:hover{color:var(--or)}
.mini-act.del:hover{color:var(--pourpre)}
.del-v{flex-shrink:0;color:var(--pa2);font-size:16px;line-height:1;transition:color .3s}
.del-v:hover{color:var(--pourpre)}

.ghost-btn{margin-top:18px;font-family:var(--display);font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--pa);border:1px solid var(--filet-f);padding:9px 18px;transition:all .3s}
.ghost-btn:hover{border-color:var(--or);color:var(--or)}

.modes{display:flex;flex-direction:column;gap:0}
.mode{text-align:left;padding:15px 2px;border-bottom:1px solid var(--filet);font-family:var(--display);font-size:18px;letter-spacing:.04em;color:var(--pa);display:flex;align-items:center;gap:14px;transition:color .3s}
.mode::before{content:'';width:9px;height:9px;border:1px solid var(--filet-f);border-radius:50%;flex-shrink:0;transition:all .3s}
.mode:hover{color:var(--or-pale)}
.mode.on{color:var(--or)}
.mode.on::before{border-color:var(--or);background:var(--or);box-shadow:inset 0 0 0 2px var(--encre)}

.start{display:block;width:100%;text-align:center;padding:17px;margin-top:10px;background:var(--or);color:var(--encre);font-family:var(--display);font-size:16px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;transition:background .3s}
.start:hover{background:var(--or-pale)}
.start:disabled{opacity:.35;cursor:default}
.reset-link{display:block;margin:36px auto 0;font-size:13px;letter-spacing:.06em;color:var(--pa2);transition:color .3s}
.reset-link:hover{color:var(--pourpre)}

/* ═══ STUDY ═══ */
#study{display:none}
.study-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:48px;padding-bottom:14px;border-bottom:1px solid var(--filet)}
.study-stat{font-size:14px;letter-spacing:.04em;color:var(--pa)}
.study-stat b{color:var(--or);font-weight:500}
.finish{font-family:var(--display);font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:var(--pa);border:1px solid var(--filet-f);padding:8px 18px;transition:all .3s}
.finish:hover{border-color:var(--or);color:var(--or)}
.qbox{text-align:center;margin-bottom:42px;animation:rise .5s cubic-bezier(.2,.7,.3,1) both}
.q-label{font-family:var(--display);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--pa2);margin-bottom:24px}
.rule{width:38px;height:1px;background:var(--or);opacity:.5;margin:24px auto}
.q-prompt{font-family:var(--serif);font-size:27px;line-height:1.62;color:var(--parchemin);max-width:30em;margin:0 auto}
.q-prompt.ref{font-family:var(--display);font-style:normal;font-size:38px;letter-spacing:.03em;color:var(--or)}
.opts{display:grid;gap:11px}
.opts.two{grid-template-columns:1fr 1fr}
.opt{text-align:left;padding:16px 20px;border:1px solid var(--filet);background:var(--encre-2);font-family:var(--serif);font-size:17px;line-height:1.5;color:rgba(255,255,255,.9);transition:border-color .25s,color .25s,background .25s;animation:rise .45s cubic-bezier(.2,.7,.3,1) both}
.opt .num{font-family:var(--display);font-size:13px;color:var(--pa2);margin-right:10px}
.opt.refopt{font-family:var(--display);font-size:19px;letter-spacing:.03em}
.opt:hover:not(:disabled){border-color:var(--or);color:var(--parchemin);background:rgba(239,230,207,.04)}
.opt.ok{border-color:var(--vert);color:#bcdcbe;background:rgba(123,163,126,.1)}
.opt.ok .num{color:var(--vert)}
.opt.bad{border-color:var(--pourpre);color:#e0a8a8;background:rgba(154,59,59,.12)}
.opt.reveal{border-color:var(--vert);color:#bcdcbe}
.opt:disabled{cursor:default}

/* ═══ SUMMARY ═══ */
#summary{display:none;text-align:center;padding-top:48px;animation:fade .5s ease both}
.sum-num{font-family:var(--display);font-size:72px;line-height:1;color:var(--or)}
.sum-sub{font-size:15px;letter-spacing:.04em;color:var(--pa);margin:14px 0 8px}
.sum-detail{font-size:14px;color:var(--pa2);margin-bottom:40px}
#sum-back{max-width:260px;margin:0 auto}

/* ═══ MODAL ═══ */
.overlay{position:fixed;inset:0;z-index:120;background:rgba(4,4,4,.9);display:none;align-items:center;justify-content:center;padding:24px}
.overlay.on{display:flex}
.modal{width:100%;max-width:460px;background:var(--encre-2);border:1px solid var(--filet-f);padding:38px 34px;animation:rise .35s ease both}
.modal-title{font-family:var(--display);font-size:23px;margin-bottom:26px}
.modal .auth-fieldrow{margin-bottom:18px}
.modal-flbl{display:block;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--pa2);margin-bottom:5px}
.modal-btns{display:flex;justify-content:flex-end;gap:14px;margin-top:28px}
.m-cancel{font-family:var(--display);font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--pa);padding:9px 16px;transition:color .3s}
.m-cancel:hover{color:var(--or)}
.m-ok{font-family:var(--display);font-size:14px;letter-spacing:.1em;text-transform:uppercase;background:var(--or);color:var(--encre);padding:10px 22px;transition:background .3s}
.m-ok:hover{background:var(--or-pale)}

@media(max-width:600px){
  .auth-panel{padding:40px 26px}
  .hdr{padding:14px 16px;gap:9px}
  .hdr-mail{display:none}
  .wrap{padding:32px 16px 60px}
  .opts.two{grid-template-columns:1fr}
  .q-prompt{font-size:23px}
  .q-prompt.ref{font-size:30px}
  .vref{width:96px;font-size:14px}
  .vtext{display:none}
}
/* corbeille */
.trash-head{display:flex;align-items:center;gap:12px;padding:6px 2px;cursor:pointer;border-bottom:1px solid var(--filet)}
.trash-head .lbl{flex:1}
.trash-head .cat-chev{transition:transform .3s,color .3s}
.trash-head.open .cat-chev{transform:rotate(90deg);color:var(--or)}
.trash-body{animation:fade .35s ease both;padding-top:6px}
.trash-sub{margin-top:16px}
.trash-sub-head{font-family:var(--display);font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--pa);margin-bottom:4px}
.trash-count{color:var(--pa2)}
.trash-none{font-size:14px;color:var(--pa2);padding:6px 0 2px}
.trash-item{display:flex;align-items:center;gap:14px;padding:11px 0;border-top:1px solid var(--filet)}
.trash-vmeta{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.trash-vref{font-family:var(--display);font-size:15px;color:var(--or)}
.trash-vcat{font-size:12px;color:var(--pa2);letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trash-acts{display:flex;gap:16px;flex-shrink:0}
.trash-act{font-family:var(--display);font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--pa);transition:color .3s}
.trash-act:hover{color:var(--or)}
.trash-act.del:hover{color:var(--pourpre)}
.cat-pct{flex-shrink:0;font-family:var(--display);font-size:13px;color:var(--pa2);min-width:42px;text-align:right;letter-spacing:.02em}
.cat-row:hover .cat-pct{color:var(--pa)}
.cat-go{flex-shrink:0;cursor:pointer;color:var(--pa2);font-size:13px;line-height:1;padding:0 4px;transition:color .3s}
.cat-go:hover{color:var(--or)}
#sel-all{cursor:pointer}
.mini-act{cursor:pointer}
@media(max-width:600px){.cat-pct{min-width:38px;font-size:12px}}
.site-nav{display:flex;align-items:center;gap:24px;flex:1;flex-wrap:wrap}
.site-nav a{font-family:var(--display);font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--pa);transition:color .3s}
.site-nav a:hover{color:var(--or-pale)}
.site-nav a.actif{color:var(--or)}
.site-foot{border-top:1px solid var(--filet);margin-top:40px;padding:48px 32px 56px;text-align:center}
.site-foot .marque{font-family:var(--display);letter-spacing:.34em;text-transform:uppercase;font-size:18px;padding-left:.34em;color:var(--parchemin)}
.site-foot .verset-pied{margin:18px auto 0;font-style:italic;color:var(--pa);font-size:17px;max-width:620px;line-height:1.6}
.site-foot .verset-pied .ref-pied{font-style:normal;display:block;margin-top:10px;font-family:var(--display);font-size:13px;letter-spacing:.1em;color:var(--or)}
.site-foot .copy{margin-top:22px;font-size:13px;letter-spacing:.08em;color:var(--pa2);font-family:var(--display)}
@media(max-width:600px){.hdr{flex-wrap:wrap}.nav-burger{display:block}.site-nav{display:none;order:10;width:100%;flex-direction:column;align-items:flex-start;gap:10px;padding-top:4px}.site-nav.open{display:flex}.site-nav a{font-size:14px;letter-spacing:.1em}.hdr-right{margin-left:auto}}
.cat-mark{display:none;align-items:center;gap:8px;flex-shrink:0}
.cat.open .cat-mark{display:flex}
.cat-mark .dot{opacity:.8}
.cat-mark .dot:hover{opacity:1;box-shadow:0 0 0 1px var(--encre),0 0 0 2px currentColor}
.cat-mark .dot.r{color:var(--rouge)}.cat-mark .dot.a{color:var(--ambre)}.cat-mark .dot.v{color:var(--vert)}
.mg-acts{display:flex;align-items:center;gap:16px}
.m-reset{margin-right:auto;font-family:var(--display);font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--pa);transition:color .3s}
.m-reset:hover{color:var(--or)}
.bh-cats{border-bottom:none;padding-bottom:0;margin-bottom:10px}
.markglobal{padding-bottom:14px;margin-bottom:0}
.reset-row{display:flex;justify-content:center;align-items:center;gap:16px;flex-wrap:wrap;margin-top:36px}
.reset-row .reset-link{margin:0}
.reset-sep{color:var(--pa2)}


/* ═══ EN-TÊTE ALIGNÉ SUR L'ACCUEIL ═══ */
#app > header{
  position:sticky;top:0;z-index:50;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--filet);
}
.barre{
  max-width:1080px;margin:0 auto;
  padding:20px 32px;
  display:grid;grid-template-columns:auto 1fr;align-items:center;
  gap:24px;
}
.logo{
  grid-column:1;grid-row:1;
  font-family:var(--display);
  font-weight:500;font-size:26px;
  letter-spacing:.34em;
  text-transform:uppercase;
  color:var(--parchemin);
  padding-left:.34em;
}
.logo:hover{color:var(--or-pale)}
nav.menu{display:flex;gap:30px;grid-column:2;grid-row:1;justify-self:end;align-items:center}
nav.menu a,nav.menu .menu-act{
  font-family:var(--display);
  font-size:16px;letter-spacing:.12em;
  text-transform:uppercase;
  white-space:nowrap;
  color:var(--parchemin-att);
  padding-bottom:3px;
  border-bottom:1px solid transparent;
  transition:color .3s,border-color .3s;
}
nav.menu a:hover,nav.menu a.actif,nav.menu .menu-act:hover{color:var(--parchemin);border-color:var(--or)}

.ll-mob{display:none}

.rech-boite{max-width:760px;margin:0 auto;padding:8vh 24px 40px;height:100%;display:flex;flex-direction:column;box-sizing:border-box}

.nouv-titre-panneau{flex:1;color:var(--parchemin);font-family:var(--display);font-size:30px;letter-spacing:.01em}
.nouv-liste{margin-top:6px;overflow-y:auto;flex:1}
.nouv-groupe{padding:20px 0;border-bottom:1px solid var(--filet)}
.nouv-groupe:last-child{border-bottom:none}
.nouv-date{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-bottom:16px}

@media(max-width:720px){

const PRE=[
  {id:'nature-dieu', name:{fr:'La nature de Dieu', en:'The Nature of God'}, verses:[
    {id:'exo-3-14', fr:{text:'Je suis celui qui suis.', ref:'Exode 3:14'}, en:{text:'I am who I am.', ref:'Exodus 3:14'}},
    {id:'dt-6-4', fr:{text:'\u00c9coute, Isra\u00ebl : le Seigneur notre Dieu est l\u2019unique Seigneur.', ref:'Deut\u00e9ronome 6:4'}, en:{text:'Hear, O Israel: the Lord our God, the Lord is one.', ref:'Deuteronomy 6:4'}},
    {id:'jn-4-24', fr:{text:'Dieu est esprit, et ceux qui l\u2019adorent doivent l\u2019adorer en esprit et en v\u00e9rit\u00e9.', ref:'Jean 4:24'}, en:{text:'God is spirit, and those who worship him must worship in spirit and truth.', ref:'John 4:24'}},
    {id:'mal-3-6', fr:{text:'Moi, le Seigneur, je ne change pas.', ref:'Malachie 3:6'}, en:{text:'I the Lord do not change.', ref:'Malachi 3:6'}},
    {id:'ps-90-2', fr:{text:'Avant que les montagnes soient n\u00e9es, que tu aies enfant\u00e9 la terre et le monde, de l\u2019\u00e9ternit\u00e9 \u00e0 l\u2019\u00e9ternit\u00e9 tu es Dieu.', ref:'Psaume 90:2'}, en:{text:'Before the mountains were born, before you had brought forth the earth and the world, from everlasting to everlasting you are God.', ref:'Psalm 90:2'}},
    {id:'apo-1-8', fr:{text:'Je suis l\u2019alpha et l\u2019om\u00e9ga, dit le Seigneur Dieu, celui qui est, qui \u00e9tait et qui vient, le Tout-Puissant.', ref:'Apocalypse 1:8'}, en:{text:'I am the Alpha and the Omega, says the Lord God, who is and who was and who is to come, the Almighty.', ref:'Revelation 1:8'}},
    {id:'lc-1-37', fr:{text:'Rien n\u2019est impossible \u00e0 Dieu.', ref:'Luc 1:37'}, en:{text:'Nothing is impossible with God.', ref:'Luke 1:37'}},
    {id:'jer-23-24', fr:{text:'Est-ce que je ne remplis pas le ciel et la terre ? dit le Seigneur.', ref:'J\u00e9r\u00e9mie 23:24'}, en:{text:'Do I not fill heaven and earth? says the Lord.', ref:'Jeremiah 23:24'}},
    {id:'is-6-3', fr:{text:'Saint, saint, saint est le Seigneur de l\u2019univers ; toute la terre est remplie de sa gloire.', ref:'Isa\u00efe 6:3'}, en:{text:'Holy, holy, holy is the Lord of hosts; the whole earth is full of his glory.', ref:'Isaiah 6:3'}},
    {id:'1jn-4-8', fr:{text:'Celui qui n\u2019aime pas n\u2019a pas connu Dieu, car Dieu est amour.', ref:'1 Jean 4:8'}, en:{text:'He who does not love does not know God, for God is love.', ref:'1 John 4:8'}},
    {id:'rom-11-33', fr:{text:'\u00d4 profondeur des richesses, de la sagesse et de la science de Dieu ! Que ses jugements sont insondables et ses voies imp\u00e9n\u00e9trables !', ref:'Romains 11:33'}, en:{text:'O the depth of the riches and wisdom and knowledge of God! How unsearchable are his judgments and how inscrutable his ways!', ref:'Romans 11:33'}},
    {id:'is-44-6', fr:{text:'Je suis le premier et je suis le dernier, et hors moi il n\u2019y a point de Dieu.', ref:'Isa\u00efe 44:6'}, en:{text:'I am the first and I am the last, and besides me there is no God.', ref:'Isaiah 44:6'}},
    {id:'2m-7-28', fr:{text:'Reconnais que Dieu a fait de rien le ciel et la terre, et qu\u2019il en est de m\u00eame de la race des hommes.', ref:'2 Maccab\u00e9es 7:28'}, en:{text:'Recognise that God made heaven and earth out of nothing, and that the race of men is the same.', ref:'2 Maccabees 7:28'}},
    {id:'he-4-13', fr:{text:'Tout est nu et \u00e0 d\u00e9couvert \u00e0 ses yeux.', ref:'H\u00e9breux 4:13'}, en:{text:'All things are naked and laid bare to his eyes.', ref:'Hebrews 4:13'}},
    {id:'rom-1-20', fr:{text:'Les perfections invisibles de Dieu se voient depuis la cr\u00e9ation du monde dans ses \u0153uvres.', ref:'Romains 1:20'}, en:{text:'The invisible perfections of God are seen since the creation of the world in his works.', ref:'Romans 1:20'}},
    {id:'jb-11-7', fr:{text:'Pr\u00e9tends-tu sonder les profondeurs de Dieu, atteindre la perfection du Tout-Puissant ?', ref:'Job 11:7'}, en:{text:'Can you fathom the depths of God, attain the perfection of the Almighty?', ref:'Job 11:7'}},
    {id:'exo-34-6', fr:{text:'Le Seigneur, le Seigneur, Dieu de tendresse et de piti\u00e9, lent \u00e0 la col\u00e8re, riche en gr\u00e2ce et en fid\u00e9lit\u00e9.', ref:'Exode 34:6'}, en:{text:'The Lord, the Lord, a God merciful and gracious, slow to anger, abounding in grace and faithfulness.', ref:'Exodus 34:6'}},
    {id:'mc-10-18', fr:{text:'Nul n\u2019est bon que Dieu seul.', ref:'Marc 10:18'}, en:{text:'No one is good but God alone.', ref:'Mark 10:18'}},
    {id:'dt-32-4', fr:{text:'Ses \u0153uvres sont parfaites, toutes ses voies sont justice ; Dieu fid\u00e8le et sans iniquit\u00e9, il est juste et droit.', ref:'Deutéronome 32:4'}, en:{text:'His works are perfect, all his ways are justice; a God faithful and without iniquity, just and upright is he.', ref:'Deuteronomy 32:4'}},
    {id:'1jn-1-5', fr:{text:'Dieu est lumi\u00e8re, et il n\u2019y a en lui aucune t\u00e9n\u00e8bre.', ref:'1 Jean 1:5'}, en:{text:'God is light, and in him there is no darkness at all.', ref:'1 John 1:5'}},
    {id:'nb-23-19', fr:{text:'Dieu n\u2019est pas un homme pour mentir, ni un fils d\u2019homme pour se repentir.', ref:'Nombres 23:19'}, en:{text:'God is not a man, that he should lie, nor a son of man, that he should repent.', ref:'Numbers 23:19'}},
    {id:'1tm-1-17', fr:{text:'Au roi des si\u00e8cles, immortel, invisible, seul Dieu, honneur et gloire.', ref:'1 Timothée 1:17'}, en:{text:'To the King of ages, immortal, invisible, the only God, be honour and glory.', ref:'1 Timothy 1:17'}},
    {id:'ps-115-3', fr:{text:'Notre Dieu est au ciel ; tout ce qu\u2019il veut, il le fait.', ref:'Psaume 115:3'}, en:{text:'Our God is in heaven; he does whatever he pleases.', ref:'Psalm 115:3'}},
    {id:'is-40-28', fr:{text:'Le Seigneur est le Dieu d\u2019\u00e9ternit\u00e9 ; il ne se fatigue ni ne se lasse, et son intelligence est insondable.', ref:'Isaïe 40:28'}, en:{text:'The Lord is the everlasting God; he does not faint or grow weary, and his understanding is unsearchable.', ref:'Isaiah 40:28'}},
    {id:'jc-1-17', fr:{text:'Tout don parfait vient du P\u00e8re des lumi\u00e8res, chez qui il n\u2019y a ni changement ni ombre de variation.', ref:'Jacques 1:17'}, en:{text:'Every perfect gift comes from the Father of lights, with whom there is no change nor shadow of variation.', ref:'James 1:17'}},
    {id:'jer-17-10', fr:{text:'Moi, le Seigneur, je sonde les c\u0153urs et j\u2019\u00e9prouve les reins.', ref:'Jérémie 17:10'}, en:{text:'I the Lord search the heart and test the mind.', ref:'Jeremiah 17:10'}},
    {id:'jer-10-10', fr:{text:'Le Seigneur est le Dieu v\u00e9ritable, il est le Dieu vivant et le roi \u00e9ternel.', ref:'Jérémie 10:10'}, en:{text:'The Lord is the true God; he is the living God and the everlasting King.', ref:'Jeremiah 10:10'}},
    {id:'ps-139-7', fr:{text:'O\u00f9 aller loin de ton esprit ? o\u00f9 fuir loin de ta face ?', ref:'Psaume 139:7'}, en:{text:'Where can I go from your Spirit? where can I flee from your presence?', ref:'Psalm 139:7'}},
    {id:'ps-139-4', fr:{text:'La parole n\u2019est pas encore sur ma langue, que d\u00e9j\u00e0, Seigneur, tu la connais tout enti\u00e8re.', ref:'Psaume 139:4'}, en:{text:'Before a word is on my tongue, you, Lord, know it completely.', ref:'Psalm 139:4'}},
    {id:'is-55-8', fr:{text:'Vos pens\u00e9es ne sont pas mes pens\u00e9es, et vos voies ne sont pas mes voies, dit le Seigneur.', ref:'Isaïe 55:8'}, en:{text:'Your thoughts are not my thoughts, neither are your ways my ways, says the Lord.', ref:'Isaiah 55:8'}}
  ]},
  {id:'trinite', name:{fr:'La Trinit\u00e9', en:'The Trinity'}, verses:[
    {id:'mt-28-19', fr:{text:'Allez, faites de toutes les nations des disciples, les baptisant au nom du P\u00e8re, et du Fils, et du Saint-Esprit.', ref:'Matthieu 28:19'}, en:{text:'Go, make disciples of all nations, baptising them in the name of the Father, and of the Son, and of the Holy Spirit.', ref:'Matthew 28:19'}},
    {id:'jn-1-1', fr:{text:'Au commencement \u00e9tait le Verbe, et le Verbe \u00e9tait aupr\u00e8s de Dieu, et le Verbe \u00e9tait Dieu.', ref:'Jean 1:1'}, en:{text:'In the beginning was the Word, and the Word was with God, and the Word was God.', ref:'John 1:1'}},
    {id:'jn-10-30', fr:{text:'Moi et le P\u00e8re, nous sommes un.', ref:'Jean 10:30'}, en:{text:'I and the Father are one.', ref:'John 10:30'}},
    {id:'jn-14-9', fr:{text:'Qui m\u2019a vu a vu le P\u00e8re.', ref:'Jean 14:9'}, en:{text:'Whoever has seen me has seen the Father.', ref:'John 14:9'}},
    {id:'jn-14-26', fr:{text:'Le D\u00e9fenseur, l\u2019Esprit Saint que le P\u00e8re enverra en mon nom, vous enseignera tout.', ref:'Jean 14:26'}, en:{text:'The Helper, the Holy Spirit whom the Father will send in my name, will teach you all things.', ref:'John 14:26'}},
    {id:'jn-15-26', fr:{text:'Quand viendra le D\u00e9fenseur, l\u2019Esprit de v\u00e9rit\u00e9 qui proc\u00e8de du P\u00e8re, il rendra t\u00e9moignage de moi.', ref:'Jean 15:26'}, en:{text:'When the Helper comes, the Spirit of truth who proceeds from the Father, he will bear witness to me.', ref:'John 15:26'}},
    {id:'2co-13-13', fr:{text:'La gr\u00e2ce du Seigneur J\u00e9sus-Christ, l\u2019amour de Dieu et la communion du Saint-Esprit soient avec vous tous.', ref:'2 Corinthiens 13:13'}, en:{text:'The grace of the Lord Jesus Christ, the love of God, and the communion of the Holy Spirit be with you all.', ref:'2 Corinthians 13:13'}},
    {id:'gn-1-26', fr:{text:'Faisons l\u2019homme \u00e0 notre image, selon notre ressemblance.', ref:'Gen\u00e8se 1:26'}, en:{text:'Let us make man in our image, after our likeness.', ref:'Genesis 1:26'}},
    {id:'ga-4-6', fr:{text:'Dieu a envoy\u00e9 dans nos c\u0153urs l\u2019Esprit de son Fils.', ref:'Galates 4:6'}, en:{text:'God has sent into our hearts the Spirit of his Son.', ref:'Galatians 4:6'}},
    {id:'jn-16-14-15', fr:{text:'Il prendra de ce qui est \u00e0 moi ; tout ce que le P\u00e8re poss\u00e8de est \u00e0 moi.', ref:'Jean 16:14-15'}, en:{text:'He will take what is mine; all that the Father has is mine.', ref:'John 16:14-15'}},
    {id:'ep-3-14-15', fr:{text:'Je fl\u00e9chis les genoux devant le P\u00e8re, de qui toute paternit\u00e9, au ciel et sur la terre, tire son nom.', ref:'\u00c9ph\u00e9siens 3:14-15'}, en:{text:'I bow my knees before the Father, from whom all fatherhood in heaven and on earth takes its name.', ref:'Ephesians 3:14-15'}},
    {id:'he-1-3', fr:{text:'Il est le rayonnement de sa gloire et l\u2019empreinte de son \u00eatre.', ref:'H\u00e9breux 1:3'}, en:{text:'He is the radiance of his glory and the imprint of his being.', ref:'Hebrews 1:3'}},
    {id:'jn-1-3', fr:{text:'Tout a \u00e9t\u00e9 fait par lui, et rien de ce qui existe n\u2019a \u00e9t\u00e9 fait sans lui.', ref:'Jean 1:3'}, en:{text:'All things were made through him, and nothing that exists was made without him.', ref:'John 1:3'}},
    {id:'2co-3-17', fr:{text:'Le Seigneur, c\u2019est l\u2019Esprit ; et l\u00e0 o\u00f9 est l\u2019Esprit du Seigneur, l\u00e0 est la libert\u00e9.', ref:'2 Corinthiens 3:17'}, en:{text:'The Lord is the Spirit; and where the Spirit of the Lord is, there is freedom.', ref:'2 Corinthians 3:17'}}
  ]},
  {id:'anges', name:{fr:'Les anges', en:'The Angels'}, verses:[
    {id:'he-1-14', fr:{text:'Ne sont-ils pas tous des esprits au service de Dieu, envoy\u00e9s pour ceux qui doivent h\u00e9riter du salut\u00a0?', ref:'H\u00e9breux 1:14'}, en:{text:'Are they not all ministering spirits sent to serve those who will inherit salvation?', ref:'Hebrews 1:14'}},
    {id:'ps-91-11', fr:{text:'Il donnera pour toi des ordres \u00e0 ses anges, pour te garder dans toutes tes voies.', ref:'Psaume 91:11'}, en:{text:'He will command his angels concerning you, to guard you in all your ways.', ref:'Psalm 91:11'}},
    {id:'mt-18-10', fr:{text:'Gardez-vous de m\u00e9priser un seul de ces petits, car leurs anges dans les cieux voient sans cesse la face de mon P\u00e8re.', ref:'Matthieu 18:10'}, en:{text:'See that you do not despise one of these little ones, for their angels in heaven always see the face of my Father.', ref:'Matthew 18:10'}},
    {id:'col-1-16', fr:{text:'En lui ont \u00e9t\u00e9 cr\u00e9\u00e9es toutes choses, dans les cieux et sur la terre, les Tr\u00f4nes, les Dominations, les Principaut\u00e9s, les Puissances.', ref:'Colossiens 1:16'}, en:{text:'In him all things were created, in heaven and on earth, thrones and dominions, rulers and powers.', ref:'Colossians 1:16'}},
    {id:'ap-12-7', fr:{text:'Il y eut une guerre dans le ciel\u00a0: Michel et ses anges combattirent contre le dragon.', ref:'Apocalypse 12:7'}, en:{text:'There was war in heaven: Michael and his angels fought against the dragon.', ref:'Revelation 12:7'}},
    {id:'tb-12-15', fr:{text:'Je suis Rapha\u00ebl, l\u2019un des sept anges qui se tiennent devant la gloire du Seigneur.', ref:'Tobie 12:15'}, en:{text:'I am Raphael, one of the seven angels who stand before the glory of the Lord.', ref:'Tobit 12:15'}},
    {id:'he-13-2', fr:{text:'N\u2019oubliez pas l\u2019hospitalit\u00e9\u00a0; car en l\u2019exer\u00e7ant, quelques-uns ont log\u00e9 des anges sans le savoir.', ref:'H\u00e9breux 13:2'}, en:{text:'Do not neglect hospitality, for by it some have entertained angels without knowing it.', ref:'Hebrews 13:2'}},
    {id:'dn-7-10', fr:{text:'Mille milliers le servaient, et dix mille myriades se tenaient devant lui.', ref:'Daniel 7:10'}, en:{text:'A thousand thousands served him, and ten thousand times ten thousand stood before him.', ref:'Daniel 7:10'}},
    {id:'apo-12-4', fr:{text:'Sa queue entra\u00eenait le tiers des \u00e9toiles du ciel, et les jeta sur la terre.', ref:'Apocalypse 12:4'}, en:{text:'His tail swept down a third of the stars of heaven, and cast them to the earth.', ref:'Revelation 12:4'}},
    {id:'lc-10-18', fr:{text:'Je voyais Satan tomber du ciel comme l\u2019\u00e9clair.', ref:'Luc 10:18'}, en:{text:'I saw Satan fall from heaven like lightning.', ref:'Luke 10:18'}},
    {id:'mt-25-41', fr:{text:'Allez loin de moi, maudits, dans le feu \u00e9ternel pr\u00e9par\u00e9 pour le diable et ses anges.', ref:'Matthieu 25:41'}, en:{text:'Depart from me, you cursed, into the eternal fire prepared for the devil and his angels.', ref:'Matthew 25:41'}}
  ]},
  {id:'peche', name:{fr:'Le p\u00e9ch\u00e9', en:'Sin'}, verses:[
    {id:'rm-3-23', fr:{text:'Tous ont p\u00e9ch\u00e9 et sont priv\u00e9s de la gloire de Dieu.', ref:'Romains 3:23'}, en:{text:'All have sinned and fall short of the glory of God.', ref:'Romans 3:23'}},
    {id:'rm-5-12', fr:{text:'Par un seul homme le p\u00e9ch\u00e9 est entr\u00e9 dans le monde, et par le p\u00e9ch\u00e9 la mort.', ref:'Romains 5:12'}, en:{text:'Through one man sin entered the world, and death through sin.', ref:'Romans 5:12'}},
    {id:'1jn-1-8', fr:{text:'Si nous disons que nous n\u2019avons pas de p\u00e9ch\u00e9, nous nous trompons nous-m\u00eames, et la v\u00e9rit\u00e9 n\u2019est pas en nous.', ref:'1 Jean 1:8'}, en:{text:'If we say we have no sin, we deceive ourselves, and the truth is not in us.', ref:'1 John 1:8'}},
    {id:'jc-1-15', fr:{text:'La convoitise, ayant con\u00e7u, enfante le p\u00e9ch\u00e9\u00a0; et le p\u00e9ch\u00e9, parvenu \u00e0 son terme, engendre la mort.', ref:'Jacques 1:15'}, en:{text:'Desire, when it has conceived, gives birth to sin; and sin, when fully grown, brings forth death.', ref:'James 1:15'}},
    {id:'rm-7-19', fr:{text:'Je ne fais pas le bien que je veux, mais je fais le mal que je ne veux pas.', ref:'Romains 7:19'}, en:{text:'I do not do the good I want, but the evil I do not want is what I do.', ref:'Romans 7:19'}},
    {id:'ps-51-7', fr:{text:'Voici, je suis n\u00e9 dans la faute, et ma m\u00e8re m\u2019a con\u00e7u dans le p\u00e9ch\u00e9.', ref:'Psaume 51:7'}, en:{text:'Behold, I was brought forth in iniquity, and in sin did my mother conceive me.', ref:'Psalm 51:5'}},
    {id:'rm-5-19', fr:{text:'Comme par la d\u00e9sob\u00e9issance d\u2019un seul beaucoup ont \u00e9t\u00e9 rendus p\u00e9cheurs, par l\u2019ob\u00e9issance d\u2019un seul beaucoup seront rendus justes.', ref:'Romains 5:19'}, en:{text:'As by one man\u2019s disobedience many were made sinners, so by one man\u2019s obedience many will be made righteous.', ref:'Romans 5:19'}},
    {id:'ga-5-17', fr:{text:'La chair a des d\u00e9sirs contraires \u00e0 ceux de l\u2019Esprit, et l\u2019Esprit en a de contraires \u00e0 ceux de la chair.', ref:'Galates 5:17'}, en:{text:'The flesh desires what is against the Spirit, and the Spirit what is against the flesh.', ref:'Galatians 5:17'}},
    {id:'1jn-3-4', fr:{text:'Le p\u00e9ch\u00e9 est la transgression de la loi.', ref:'1 Jean 3:4'}, en:{text:'Sin is the transgression of the law.', ref:'1 John 3:4'}},
    {id:'jc-4-17', fr:{text:'Celui qui sait faire le bien et ne le fait pas commet un p\u00e9ch\u00e9.', ref:'Jacques 4:17'}, en:{text:'Whoever knows the right thing to do and fails to do it, for him it is sin.', ref:'James 4:17'}},
    {id:'1jn-5-16-17', fr:{text:'Il y a tel p\u00e9ch\u00e9 qui m\u00e8ne \u00e0 la mort, et il y a tel p\u00e9ch\u00e9 qui ne m\u00e8ne pas \u00e0 la mort.', ref:'1 Jean 5:16-17'}, en:{text:'There is sin that leads to death, and there is sin that does not lead to death.', ref:'1 John 5:16-17'}},
    {id:'jc-3-2', fr:{text:'Nous bronchons tous, et de bien des mani\u00e8res.', ref:'Jacques 3:2'}, en:{text:'We all stumble in many ways.', ref:'James 3:2'}},
    {id:'mt-15-19', fr:{text:'Du c\u0153ur viennent les mauvaises pens\u00e9es, meurtres, adult\u00e8res, d\u00e9bauches, vols, faux t\u00e9moignages, blasph\u00e8mes.', ref:'Matthieu 15:19'}, en:{text:'Out of the heart come evil thoughts, murder, adultery, sexual immorality, theft, false witness, slander.', ref:'Matthew 15:19'}},
    {id:'1jn-2-16', fr:{text:'la convoitise de la chair, la convoitise des yeux et l\u2019orgueil de la vie.', ref:'1 Jean 2:16'}, en:{text:'the desire of the flesh, the desire of the eyes, and the pride of life.', ref:'1 John 2:16'}},
    {id:'mt-12-31', fr:{text:'Tout p\u00e9ch\u00e9 et tout blasph\u00e8me seront pardonn\u00e9s aux hommes, mais le blasph\u00e8me contre l\u2019Esprit ne sera pas pardonn\u00e9.', ref:'Matthieu 12:31'}, en:{text:'Every sin and blasphemy will be forgiven men, but the blasphemy against the Spirit will not be forgiven.', ref:'Matthew 12:31'}},
    {id:'ec-7-29', fr:{text:'Dieu a fait l\u2019homme droit, mais ils ont cherch\u00e9 bien des d\u00e9tours.', ref:'Eccl\u00e9siaste 7:29'}, en:{text:'God made man upright, but they have sought out many devices.', ref:'Ecclesiastes 7:29'}},
    {id:'gn-2-25', fr:{text:'Ils \u00e9taient tous deux nus, l\u2019homme et sa femme, et ils n\u2019en avaient point de honte.', ref:'Gen\u00e8se 2:25'}, en:{text:'They were both naked, the man and his wife, and were not ashamed.', ref:'Genesis 2:25'}},
    {id:'gn-3-19', fr:{text:'Tu mangeras ton pain \u00e0 la sueur de ton front, jusqu\u2019\u00e0 ce que tu retournes \u00e0 la terre d\u2019o\u00f9 tu as \u00e9t\u00e9 tir\u00e9.', ref:'Gen\u00e8se 3:19'}, en:{text:'You will eat your bread by the sweat of your brow, until you return to the ground from which you were taken.', ref:'Genesis 3:19'}},
    {id:'gn-4-7', fr:{text:'Le p\u00e9ch\u00e9 est tapi \u00e0 ta porte, mais \u00e0 toi de le dominer.', ref:'Gen\u00e8se 4:7'}, en:{text:'Sin is crouching at your door, but you must master it.', ref:'Genesis 4:7'}},
    {id:'1co-15-22', fr:{text:'Comme tous meurent en Adam, de m\u00eame tous revivront dans le Christ.', ref:'1 Corinthiens 15:22'}, en:{text:'As all die in Adam, so all will be made alive in Christ.', ref:'1 Corinthians 15:22'}}
  ]},
  {id:'incarnation', name:{fr:'L\u2019Incarnation', en:'The Incarnation'}, verses:[
    {id:'jn-1-14', fr:{text:'Et le Verbe s\u2019est fait chair, et il a habit\u00e9 parmi nous, et nous avons vu sa gloire.', ref:'Jean 1:14'}, en:{text:'And the Word became flesh and dwelt among us, and we have seen his glory.', ref:'John 1:14'}},
    {id:'lc-1-35', fr:{text:'L\u2019Esprit Saint viendra sur toi, et la puissance du Tr\u00e8s-Haut te prendra sous son ombre ; c\u2019est pourquoi celui qui va na\u00eetre sera saint, et il sera appel\u00e9 Fils de Dieu.', ref:'Luc 1:35'}, en:{text:'The Holy Spirit will come upon you, and the power of the Most High will overshadow you; therefore the child to be born will be holy, and will be called the Son of God.', ref:'Luke 1:35'}},
    {id:'mt-1-23', fr:{text:'Voici, la vierge concevra et enfantera un fils, et on l\u2019appellera Emmanuel, ce qui se traduit : Dieu avec nous.', ref:'Matthieu 1:23'}, en:{text:'Behold, the virgin shall conceive and bear a son, and they shall call his name Emmanuel, which means: God with us.', ref:'Matthew 1:23'}},
    {id:'ph-2-7', fr:{text:'Il s\u2019est d\u00e9pouill\u00e9 lui-m\u00eame, prenant la condition de serviteur, devenant semblable aux hommes.', ref:'Philippiens 2:7'}, en:{text:'He emptied himself, taking the form of a servant, being born in the likeness of men.', ref:'Philippians 2:7'}},
    {id:'ga-4-4', fr:{text:'Quand est venue la pl\u00e9nitude des temps, Dieu a envoy\u00e9 son Fils, n\u00e9 d\u2019une femme, n\u00e9 sous la loi.', ref:'Galates 4:4'}, en:{text:'When the fullness of time had come, God sent forth his Son, born of a woman, born under the law.', ref:'Galatians 4:4'}},
    {id:'col-2-9', fr:{text:'En lui habite corporellement toute la pl\u00e9nitude de la divinit\u00e9.', ref:'Colossiens 2:9'}, en:{text:'In him the whole fullness of deity dwells bodily.', ref:'Colossians 2:9'}},
    {id:'jn-1-18', fr:{text:'Personne n\u2019a jamais vu Dieu ; le Fils unique, qui est dans le sein du P\u00e8re, l\u2019a fait conna\u00eetre.', ref:'Jean 1:18'}, en:{text:'No one has ever seen God; the only Son, who is in the bosom of the Father, has made him known.', ref:'John 1:18'}},
    {id:'he-4-15', fr:{text:'\u00e9prouv\u00e9 en tout, \u00e0 notre ressemblance, hormis le p\u00e9ch\u00e9.', ref:'H\u00e9breux 4:15'}, en:{text:'tried in all things, in our likeness, save sin.', ref:'Hebrews 4:15'}},
    {id:'lc-22-42', fr:{text:'Non ma volont\u00e9, mais la tienne.', ref:'Luc 22:42'}, en:{text:'Not my will, but yours.', ref:'Luke 22:42'}},
    {id:'he-2-17', fr:{text:'Il devait devenir en tout semblable \u00e0 ses fr\u00e8res, pour \u00eatre un grand pr\u00eatre mis\u00e9ricordieux et expier les p\u00e9ch\u00e9s du peuple.', ref:'H\u00e9breux 2:17'}, en:{text:'He had to become in every way like his brothers, to be a merciful high priest and to expiate the sins of the people.', ref:'Hebrews 2:17'}}
  ]},
  {id:'croix-resurrection', name:{fr:'La Croix et la R\u00e9surrection', en:'The Cross and the Resurrection'}, verses:[
    {id:'jn-19-30', fr:{text:'Tout est accompli.', ref:'Jean 19:30'}, en:{text:'It is finished.', ref:'John 19:30'}},
    {id:'lc-23-34', fr:{text:'P\u00e8re, pardonne-leur, car ils ne savent pas ce qu\u2019ils font.', ref:'Luc 23:34'}, en:{text:'Father, forgive them, for they know not what they do.', ref:'Luke 23:34'}},
    {id:'jn-12-32', fr:{text:'Et moi, quand j\u2019aurai \u00e9t\u00e9 \u00e9lev\u00e9 de terre, j\u2019attirerai \u00e0 moi tous les hommes.', ref:'Jean 12:32'}, en:{text:'And I, when I am lifted up from the earth, will draw all men to myself.', ref:'John 12:32'}},
    {id:'1co-15-3', fr:{text:'Le Christ est mort pour nos p\u00e9ch\u00e9s, selon les \u00c9critures.', ref:'1 Corinthiens 15:3'}, en:{text:'Christ died for our sins, according to the Scriptures.', ref:'1 Corinthians 15:3'}},
    {id:'1co-15-4', fr:{text:'Il a \u00e9t\u00e9 enseveli, et il est ressuscit\u00e9 le troisi\u00e8me jour, selon les \u00c9critures.', ref:'1 Corinthiens 15:4'}, en:{text:'He was buried, and he rose on the third day, according to the Scriptures.', ref:'1 Corinthians 15:4'}},
    {id:'mt-28-6', fr:{text:'Il n\u2019est pas ici, car il est ressuscit\u00e9, comme il l\u2019avait dit.', ref:'Matthieu 28:6'}, en:{text:'He is not here, for he has risen, as he said.', ref:'Matthew 28:6'}},
    {id:'rom-6-9', fr:{text:'Ressuscit\u00e9 des morts, le Christ ne meurt plus ; la mort n\u2019a plus de pouvoir sur lui.', ref:'Romains 6:9'}, en:{text:'Raised from the dead, Christ dies no more; death no longer has power over him.', ref:'Romans 6:9'}},
    {id:'1co-15-55', fr:{text:'\u00d4 mort, o\u00f9 est ta victoire ? \u00d4 mort, o\u00f9 est ton aiguillon ?', ref:'1 Corinthiens 15:55'}, en:{text:'O death, where is your victory? O death, where is your sting?', ref:'1 Corinthians 15:55'}},
    {id:'jn-10-18', fr:{text:'Personne ne m\u2019\u00f4te la vie, mais je la donne de moi-m\u00eame.', ref:'Jean 10:18'}, en:{text:'No one takes my life from me, but I give it of myself.', ref:'John 10:18'}},
    {id:'ps-85-11', fr:{text:'L\u2019amour et la v\u00e9rit\u00e9 se rencontrent, la justice et la paix s\u2019embrassent.', ref:'Psaume 85:11'}, en:{text:'Love and faithfulness meet together; justice and peace embrace.', ref:'Psalm 85:11'}},
    {id:'1co-15-17', fr:{text:'Si le Christ n\u2019est pas ressuscit\u00e9, votre foi est vaine.', ref:'1 Corinthiens 15:17'}, en:{text:'If Christ has not been raised, your faith is vain.', ref:'1 Corinthians 15:17'}},
    {id:'rom-4-25', fr:{text:'Il a \u00e9t\u00e9 livr\u00e9 pour nos fautes, et ressuscit\u00e9 pour notre justification.', ref:'Romains 4:25'}, en:{text:'He was handed over for our trespasses and raised for our justification.', ref:'Romans 4:25'}},
    {id:'1co-15-20', fr:{text:'Christ est ressuscit\u00e9 des morts, pr\u00e9mices de ceux qui sont morts.', ref:'1 Corinthiens 15:20'}, en:{text:'Christ has been raised from the dead, the firstfruits of those who have died.', ref:'1 Corinthians 15:20'}}
  ]},
  {id:'marie', name:{fr:'Marie', en:'Mary'}, verses:[
    {id:'lc-1-28', fr:{text:'R\u00e9jouis-toi, pleine de gr\u00e2ce, le Seigneur est avec toi.', ref:'Luc 1:28'}, en:{text:'Hail, full of grace, the Lord is with you.', ref:'Luke 1:28'}},
    {id:'gn-3-15', fr:{text:'Je mettrai une inimiti\u00e9 entre toi et la femme, entre ta descendance et la sienne : elle t\u2019\u00e9crasera la t\u00eate.', ref:'Gen\u00e8se 3:15'}, en:{text:'I will put enmity between you and the woman, between your offspring and hers: she will crush your head.', ref:'Genesis 3:15'}},
    {id:'lc-1-38', fr:{text:'Je suis la servante du Seigneur ; qu\u2019il m\u2019advienne selon ta parole.', ref:'Luc 1:38'}, en:{text:'I am the servant of the Lord; let it be done to me according to your word.', ref:'Luke 1:38'}},
    {id:'lc-1-42', fr:{text:'Tu es b\u00e9nie entre les femmes, et le fruit de tes entrailles est b\u00e9ni.', ref:'Luc 1:42'}, en:{text:'Blessed are you among women, and blessed is the fruit of your womb.', ref:'Luke 1:42'}},
    {id:'lc-1-43', fr:{text:'Comment m\u2019est-il donn\u00e9 que la m\u00e8re de mon Seigneur vienne jusqu\u2019\u00e0 moi ?', ref:'Luc 1:43'}, en:{text:'Why is this granted to me that the mother of my Lord should come to me?', ref:'Luke 1:43'}},
    {id:'lc-1-48', fr:{text:'D\u00e9sormais tous les \u00e2ges me diront bienheureuse.', ref:'Luc 1:48'}, en:{text:'From now on all generations will call me blessed.', ref:'Luke 1:48'}},
    {id:'lc-1-49', fr:{text:'Le Puissant a fait pour moi des merveilles ; saint est son nom.', ref:'Luc 1:49'}, en:{text:'He who is mighty has done great things for me, and holy is his name.', ref:'Luke 1:49'}},
    {id:'jn-2-5', fr:{text:'Faites tout ce qu\u2019il vous dira.', ref:'Jean 2:5'}, en:{text:'Do whatever he tells you.', ref:'John 2:5'}},
    {id:'jn-19-27', fr:{text:'Voici ta m\u00e8re. Et \u00e0 partir de cette heure-l\u00e0, le disciple la prit chez lui.', ref:'Jean 19:27'}, en:{text:'Behold your mother. From that hour the disciple took her into his own home.', ref:'John 19:27'}},
    {id:'lc-1-47', fr:{text:'Mon esprit exulte en Dieu, mon Sauveur.', ref:'Luc 1:47'}, en:{text:'My spirit rejoices in God my Saviour.', ref:'Luke 1:47'}},
    {id:'lc-1-34', fr:{text:'Comment cela se fera-t-il, puisque je ne connais point d\u2019homme ?', ref:'Luc 1:34'}, en:{text:'How shall this be, since I know not man?', ref:'Luke 1:34'}},
    {id:'is-7-14', fr:{text:'Voici, la vierge concevra et enfantera un fils.', ref:'Isa\u00efe 7:14'}, en:{text:'Behold, the virgin shall conceive and bear a son.', ref:'Isaiah 7:14'}},
    {id:'ez-44-2', fr:{text:'Cette porte restera ferm\u00e9e, elle ne s\u2019ouvrira pas ; nul n\u2019y passera, car le Seigneur, le Dieu d\u2019Isra\u00ebl, est entr\u00e9 par elle.', ref:'\u00c9z\u00e9chiel 44:2'}, en:{text:'This gate shall remain shut; it shall not be opened, and no one shall pass through it, for the Lord, the God of Israel, has entered by it.', ref:'Ezekiel 44:2'}},
    {id:'apo-12-1', fr:{text:'Un grand signe parut dans le ciel : une femme envelopp\u00e9e de soleil, la lune sous ses pieds, et une couronne de douze \u00e9toiles sur la t\u00eate.', ref:'Apocalypse 12:1'}, en:{text:'A great sign appeared in heaven: a woman clothed with the sun, the moon under her feet, and a crown of twelve stars on her head.', ref:'Revelation 12:1'}},
    {id:'lc-2-35', fr:{text:'Et toi-m\u00eame, un glaive te transpercera l\u2019\u00e2me.', ref:'Luc 2:35'}, en:{text:'And a sword will pierce your own soul.', ref:'Luke 2:35'}},
    {id:'lc-1-45', fr:{text:'Bienheureuse celle qui a cru \u00e0 l\u2019accomplissement de ce qui lui a \u00e9t\u00e9 dit de la part du Seigneur.', ref:'Luc 1:45'}, en:{text:'Blessed is she who believed that what was spoken to her by the Lord would be fulfilled.', ref:'Luke 1:45'}},
    {id:'lc-2-19', fr:{text:'Marie retenait tous ces \u00e9v\u00e9nements et les m\u00e9ditait dans son c\u0153ur.', ref:'Luc 2:19'}, en:{text:'Mary kept all these events and pondered them in her heart.', ref:'Luke 2:19'}},
    {id:'jn-2-3', fr:{text:'Ils n\u2019ont pas de vin.', ref:'Jean 2:3'}, en:{text:'They have no wine.', ref:'John 2:3'}},
    {id:'mt-1-25', fr:{text:'Il ne la connut point jusqu\u2019\u00e0 ce qu\u2019elle e\u00fbt enfant\u00e9 un fils.', ref:'Matthieu 1:25'}, en:{text:'He knew her not until she had borne a son.', ref:'Matthew 1:25'}}
  ]},
  {id:'grace', name:{fr:'La gr\u00e2ce', en:'Grace'}, verses:[
    {id:'2co-12-9', fr:{text:'Ma gr\u00e2ce te suffit, car ma puissance s\u2019accomplit dans la faiblesse.', ref:'2 Corinthiens 12:9'}, en:{text:'My grace is sufficient for you, for my power is made perfect in weakness.', ref:'2 Corinthians 12:9'}},
    {id:'jn-1-16', fr:{text:'De sa pl\u00e9nitude nous avons tous re\u00e7u, et gr\u00e2ce sur gr\u00e2ce.', ref:'Jean 1:16'}, en:{text:'From his fullness we have all received, grace upon grace.', ref:'John 1:16'}},
    {id:'rm-5-20', fr:{text:'L\u00e0 o\u00f9 le p\u00e9ch\u00e9 a abond\u00e9, la gr\u00e2ce a surabond\u00e9.', ref:'Romains 5:20'}, en:{text:'Where sin increased, grace abounded all the more.', ref:'Romans 5:20'}},
    {id:'tt-2-11', fr:{text:'La gr\u00e2ce de Dieu, source de salut pour tous les hommes, s\u2019est manifest\u00e9e.', ref:'Tite 2:11'}, en:{text:'The grace of God has appeared, bringing salvation to all men.', ref:'Titus 2:11'}},
    {id:'1co-15-10', fr:{text:'Par la gr\u00e2ce de Dieu, je suis ce que je suis.', ref:'1 Corinthiens 15:10'}, en:{text:'By the grace of God I am what I am.', ref:'1 Corinthians 15:10'}},
    {id:'rm-3-24', fr:{text:'Ils sont gratuitement justifi\u00e9s par sa gr\u00e2ce, par la r\u00e9demption qui est dans le Christ J\u00e9sus.', ref:'Romains 3:24'}, en:{text:'They are justified freely by his grace through the redemption that is in Christ Jesus.', ref:'Romans 3:24'}},
    {id:'ac-15-11', fr:{text:'C\u2019est par la gr\u00e2ce du Seigneur J\u00e9sus que nous croyons \u00eatre sauv\u00e9s.', ref:'Actes 15:11'}, en:{text:'We believe that we are saved through the grace of the Lord Jesus.', ref:'Acts 15:11'}},
    {id:'rm-11-6', fr:{text:'Si c\u2019est par gr\u00e2ce, ce n\u2019est plus par les \u0153uvres\u00a0; autrement la gr\u00e2ce ne serait plus une gr\u00e2ce.', ref:'Romains 11:6'}, en:{text:'If it is by grace, it is no longer by works; otherwise grace would no longer be grace.', ref:'Romans 11:6'}},
    {id:'jn-15-5', fr:{text:'Sans moi, vous ne pouvez rien faire.', ref:'Jean 15:5'}, en:{text:'Without me you can do nothing.', ref:'John 15:5'}},
    {id:'2pi-1-4', fr:{text:'Il nous a accord\u00e9 de devenir participants de la nature divine.', ref:'2 Pierre 1:4'}, en:{text:'He has granted us to become partakers of the divine nature.', ref:'2 Peter 1:4'}},
    {id:'jn-1-12', fr:{text:'\u00c0 tous ceux qui l\u2019ont re\u00e7u, il a donn\u00e9 le pouvoir de devenir enfants de Dieu.', ref:'Jean 1:12'}, en:{text:'To all who received him, he gave power to become children of God.', ref:'John 1:12'}},
    {id:'jn-14-23', fr:{text:'Si quelqu\u2019un m\u2019aime, il gardera ma parole, et mon P\u00e8re l\u2019aimera ; nous viendrons \u00e0 lui et nous ferons chez lui notre demeure.', ref:'Jean 14:23'}, en:{text:'If anyone loves me, he will keep my word, and my Father will love him, and we will come to him and make our home with him.', ref:'John 14:23'}},
    {id:'1co-12-3', fr:{text:'Nul ne peut dire : J\u00e9sus est Seigneur, si ce n\u2019est par l\u2019Esprit Saint.', ref:'1 Corinthiens 12:3'}, en:{text:'No one can say \u2018Jesus is Lord\u2019 except by the Holy Spirit.', ref:'1 Corinthians 12:3'}},
    {id:'ph-1-6', fr:{text:'Celui qui a commenc\u00e9 en vous une \u0153uvre bonne en poursuivra l\u2019ach\u00e8vement jusqu\u2019au jour du Christ J\u00e9sus.', ref:'Philippiens 1:6'}, en:{text:'He who began a good work in you will bring it to completion at the day of Christ Jesus.', ref:'Philippians 1:6'}},
    {id:'he-3-15', fr:{text:'Aujourd\u2019hui, si vous entendez sa voix, n\u2019endurcissez pas vos c\u0153urs.', ref:'H\u00e9breux 3:15'}, en:{text:'Today, if you hear his voice, do not harden your hearts.', ref:'Hebrews 3:15'}},
    {id:'ps-84-12', fr:{text:'Le Seigneur donne la gr\u00e2ce et la gloire.', ref:'Psaume 84:12'}, en:{text:'The Lord bestows grace and glory.', ref:'Psalm 84:12'}}
  ]},
  {id:'predestination', name:{fr:'La pr\u00e9destination', en:'Predestination'}, verses:[
    {id:'rm-8-29-30', fr:{text:'Ceux qu\u2019il a connus d\u2019avance, il les a aussi pr\u00e9destin\u00e9s \u00e0 \u00eatre conformes \u00e0 l\u2019image de son Fils\u00a0; et ceux qu\u2019il a pr\u00e9destin\u00e9s, il les a aussi appel\u00e9s, justifi\u00e9s et glorifi\u00e9s.', ref:'Romains 8:29-30'}, en:{text:'Those whom he foreknew he also predestined to be conformed to the image of his Son; and those he predestined he also called, justified, and glorified.', ref:'Romans 8:29-30'}},
    {id:'ep-1-4-5', fr:{text:'Il nous a choisis en lui avant la fondation du monde, nous ayant pr\u00e9destin\u00e9s \u00e0 \u00eatre ses fils adoptifs par J\u00e9sus-Christ.', ref:'\u00c9ph\u00e9siens 1:4-5'}, en:{text:'He chose us in him before the foundation of the world, having predestined us for adoption as sons through Jesus Christ.', ref:'Ephesians 1:4-5'}},
    {id:'jn-6-44', fr:{text:'Nul ne peut venir \u00e0 moi si le P\u00e8re qui m\u2019a envoy\u00e9 ne l\u2019attire.', ref:'Jean 6:44'}, en:{text:'No one can come to me unless the Father who sent me draws him.', ref:'John 6:44'}},
    {id:'rm-9-16', fr:{text:'Cela ne d\u00e9pend ni de celui qui veut, ni de celui qui court, mais de Dieu qui fait mis\u00e9ricorde.', ref:'Romains 9:16'}, en:{text:'It depends not on human will or effort, but on God who has mercy.', ref:'Romans 9:16'}},
    {id:'1tm-2-4', fr:{text:'Dieu veut que tous les hommes soient sauv\u00e9s et parviennent \u00e0 la connaissance de la v\u00e9rit\u00e9.', ref:'1 Timoth\u00e9e 2:4'}, en:{text:'God desires all men to be saved and to come to the knowledge of the truth.', ref:'1 Timothy 2:4'}},
    {id:'ph-2-13', fr:{text:'C\u2019est Dieu qui produit en vous le vouloir et le faire, selon son dessein bienveillant.', ref:'Philippiens 2:13'}, en:{text:'It is God who works in you, both to will and to act, according to his good purpose.', ref:'Philippians 2:13'}},
    {id:'1jn-3-2', fr:{text:'nous le verrons tel qu\u2019il est', ref:'1 Jean 3:2'}, en:{text:'we shall see him as he is', ref:'1 John 3:2'}},
    {id:'2tm-1-9', fr:{text:'Il nous a sauv\u00e9s et appel\u00e9s par un saint appel, non \u00e0 cause de nos \u0153uvres, mais en vertu de son propre dessein et de sa gr\u00e2ce.', ref:'2 Timoth\u00e9e 1:9'}, en:{text:'He saved us and called us with a holy calling, not because of our works, but in virtue of his own purpose and grace.', ref:'2 Timothy 1:9'}},
    {id:'rom-9-21', fr:{text:'Le potier n\u2019est-il pas ma\u00eetre de son argile ?', ref:'Romains 9:21'}, en:{text:'Is the potter not master of his clay?', ref:'Romans 9:21'}},
    {id:'ez-33-11', fr:{text:'Je ne prends pas plaisir \u00e0 la mort du m\u00e9chant, mais \u00e0 ce qu\u2019il se d\u00e9tourne de sa voie et qu\u2019il vive.', ref:'\u00c9z\u00e9chiel 33:11'}, en:{text:'I take no pleasure in the death of the wicked, but that he turn from his way and live.', ref:'Ezekiel 33:11'}},
    {id:'jc-1-13', fr:{text:'Que nul, dans l\u2019\u00e9preuve, ne dise : C\u2019est Dieu qui me tente ; car Dieu ne tente personne.', ref:'Jacques 1:13'}, en:{text:'Let no one, when tempted, say: It is God who tempts me; for God tempts no one.', ref:'James 1:13'}},
    {id:'2pi-1-10', fr:{text:'Efforcez-vous d\u2019affermir votre vocation et votre \u00e9lection.', ref:'2 Pierre 1:10'}, en:{text:'Strive to make your calling and election sure.', ref:'2 Peter 1:10'}},
    {id:'1co-1-8', fr:{text:'Il vous affermira jusqu\u2019\u00e0 la fin, pour que vous soyez irr\u00e9prochables au jour de notre Seigneur J\u00e9sus-Christ.', ref:'1 Corinthiens 1:8'}, en:{text:'He will sustain you to the end, so that you may be blameless on the day of our Lord Jesus Christ.', ref:'1 Corinthians 1:8'}},
    {id:'jn-15-16', fr:{text:'Ce n\u2019est pas vous qui m\u2019avez choisi, mais moi qui vous ai choisis.', ref:'Jean 15:16'}, en:{text:'It is not you who chose me, but I who chose you.', ref:'John 15:16'}}
  ]},
  {id:'salut', name:{fr:'Le salut', en:'Salvation'}, verses:[
    {id:'jn-3-16', fr:{text:'Car Dieu a tant aim\u00e9 le monde qu\u2019il a donn\u00e9 son Fils unique, afin que quiconque croit en lui ne p\u00e9risse point, mais qu\u2019il ait la vie \u00e9ternelle.', ref:'Jean 3:16'}, en:{text:'For God so loved the world that he gave his only Son, that whoever believes in him should not perish but have eternal life.', ref:'John 3:16'}},
    {id:'rom-5-8', fr:{text:'Dieu prouve son amour envers nous en ce que, alors que nous \u00e9tions encore des p\u00e9cheurs, le Christ est mort pour nous.', ref:'Romains 5:8'}, en:{text:'God proves his love for us in that while we were still sinners, Christ died for us.', ref:'Romans 5:8'}},
    {id:'eph-2-8', fr:{text:'C\u2019est par la gr\u00e2ce que vous \u00eates sauv\u00e9s, au moyen de la foi ; et cela ne vient pas de vous, c\u2019est le don de Dieu.', ref:'\u00c9ph\u00e9siens 2:8'}, en:{text:'By grace you have been saved through faith; and this is not your own doing, it is the gift of God.', ref:'Ephesians 2:8'}},
    {id:'rom-10-9', fr:{text:'Si tu confesses de ta bouche que J\u00e9sus est Seigneur et si tu crois dans ton c\u0153ur que Dieu l\u2019a ressuscit\u00e9 des morts, tu seras sauv\u00e9.', ref:'Romains 10:9'}, en:{text:'If you confess with your mouth that Jesus is Lord and believe in your heart that God raised him from the dead, you will be saved.', ref:'Romans 10:9'}},
    {id:'heb-9-12', fr:{text:'Le Christ est entr\u00e9 une fois pour toutes dans le sanctuaire avec son propre sang, nous ayant obtenu une d\u00e9livrance \u00e9ternelle.', ref:'H\u00e9breux 9:12'}, en:{text:'Christ entered once for all into the holy places with his own blood, having secured an eternal redemption.', ref:'Hebrews 9:12'}},
    {id:'is-53-5', fr:{text:'Il a \u00e9t\u00e9 transperc\u00e9 \u00e0 cause de nos p\u00e9ch\u00e9s, broy\u00e9 \u00e0 cause de nos fautes ; le ch\u00e2timent qui nous donne la paix est sur lui, et par ses meurtrissures nous sommes gu\u00e9ris.', ref:'Isa\u00efe 53:5'}, en:{text:'He was pierced because of our sins, crushed because of our faults; the chastisement that brings us peace is upon him, and by his wounds we are healed.', ref:'Isaiah 53:5'}},
    {id:'1pi-1-19', fr:{text:'Vous avez \u00e9t\u00e9 rachet\u00e9s par le sang pr\u00e9cieux du Christ, comme d\u2019un agneau sans d\u00e9faut et sans tache.', ref:'1 Pierre 1:19'}, en:{text:'You were ransomed with the precious blood of Christ, like that of a lamb without blemish or spot.', ref:'1 Peter 1:19'}},
    {id:'rom-6-23', fr:{text:'Le salaire du p\u00e9ch\u00e9, c\u2019est la mort ; mais le don gratuit de Dieu, c\u2019est la vie \u00e9ternelle en J\u00e9sus-Christ notre Seigneur.', ref:'Romains 6:23'}, en:{text:'The wages of sin is death, but the free gift of God is eternal life in Christ Jesus our Lord.', ref:'Romans 6:23'}},
    {id:'ac-4-12', fr:{text:'Il n\u2019y a de salut en aucun autre ; aucun autre nom sous le ciel n\u2019est donn\u00e9 aux hommes, par lequel nous devions \u00eatre sauv\u00e9s.', ref:'Actes 4:12'}, en:{text:'There is salvation in no one else; there is no other name under heaven given among men by which we must be saved.', ref:'Acts 4:12'}},
    {id:'lc-19-10', fr:{text:'Le Fils de l\u2019homme est venu chercher et sauver ce qui \u00e9tait perdu.', ref:'Luc 19:10'}, en:{text:'The Son of Man came to seek and to save what was lost.', ref:'Luke 19:10'}},
    {id:'jn-8-34', fr:{text:'Quiconque commet le p\u00e9ch\u00e9 est esclave du p\u00e9ch\u00e9.', ref:'Jean 8:34'}, en:{text:'Whoever commits sin is a slave of sin.', ref:'John 8:34'}},
    {id:'1jn-3-8', fr:{text:'Celui qui commet le p\u00e9ch\u00e9 est du diable, car le diable p\u00e8che d\u00e8s le commencement.', ref:'1 Jean 3:8'}, en:{text:'He who commits sin is of the devil, for the devil sins from the beginning.', ref:'1 John 3:8'}},
    {id:'col-1-13', fr:{text:'Il nous a d\u00e9livr\u00e9s de la puissance des t\u00e9n\u00e8bres et nous a transport\u00e9s dans le royaume de son Fils bien-aim\u00e9.', ref:'Colossiens 1:13'}, en:{text:'He has delivered us from the power of darkness and brought us into the kingdom of his beloved Son.', ref:'Colossians 1:13'}},
    {id:'mc-10-45', fr:{text:'Le Fils de l\u2019homme est venu donner sa vie en ran\u00e7on pour la multitude.', ref:'Marc 10:45'}, en:{text:'The Son of Man came to give his life as a ransom for the multitude.', ref:'Mark 10:45'}},
    {id:'ga-5-6', fr:{text:'Ce qui vaut, c\u2019est la foi agissant par la charit\u00e9.', ref:'Galates 5:6'}, en:{text:'What counts is faith working through charity.', ref:'Galatians 5:6'}}
  ]},
  {id:'foi', name:{fr:'Foi et esp\u00e9rance', en:'Faith and Hope'}, verses:[
    {id:'heb-11-1', fr:{text:'La foi est la garantie des biens qu\u2019on esp\u00e8re, la preuve des r\u00e9alit\u00e9s qu\u2019on ne voit pas.', ref:'H\u00e9breux 11:1'}, en:{text:'Faith is the assurance of things hoped for, the conviction of things not seen.', ref:'Hebrews 11:1'}},
    {id:'rom-10-17', fr:{text:'La foi vient de ce qu\u2019on entend, et ce qu\u2019on entend vient de la parole du Christ.', ref:'Romains 10:17'}, en:{text:'Faith comes from hearing, and hearing through the word of Christ.', ref:'Romans 10:17'}},
    {id:'rom-8-28', fr:{text:'Nous savons que toutes choses concourent au bien de ceux qui aiment Dieu.', ref:'Romains 8:28'}, en:{text:'We know that all things work together for good for those who love God.', ref:'Romans 8:28'}},
    {id:'jc-2-26', fr:{text:'Comme le corps sans souffle est mort, de m\u00eame la foi sans les \u0153uvres est morte.', ref:'Jacques 2:26'}, en:{text:'As the body apart from the spirit is dead, so also faith apart from works is dead.', ref:'James 2:26'}},
    {id:'jn-11-25', fr:{text:'Je suis la r\u00e9surrection et la vie. Celui qui croit en moi, m\u00eame s\u2019il meurt, vivra.', ref:'Jean 11:25'}, en:{text:'I am the resurrection and the life. Whoever believes in me, though he die, yet shall he live.', ref:'John 11:25'}},
    {id:'jn-20-29', fr:{text:'Heureux ceux qui n\u2019ont pas vu et qui ont cru.', ref:'Jean 20:29'}, en:{text:'Blessed are those who have not seen and yet have believed.', ref:'John 20:29'}},
    {id:'rom-5-5', fr:{text:'L\u2019esp\u00e9rance ne d\u00e9\u00e7oit pas, car l\u2019amour de Dieu a \u00e9t\u00e9 r\u00e9pandu dans nos c\u0153urs par l\u2019Esprit Saint qui nous a \u00e9t\u00e9 donn\u00e9.', ref:'Romains 5:5'}, en:{text:'Hope does not disappoint, because God\u2019s love has been poured into our hearts through the Holy Spirit who has been given to us.', ref:'Romans 5:5'}},
    {id:'rom-15-13', fr:{text:'Que le Dieu de l\u2019esp\u00e9rance vous remplisse de toute joie et paix dans la foi.', ref:'Romains 15:13'}, en:{text:'May the God of hope fill you with all joy and peace in believing.', ref:'Romans 15:13'}},
    {id:'heb-6-19', fr:{text:'Cette esp\u00e9rance, nous la tenons comme une ancre de l\u2019\u00e2me, s\u00fbre et solide.', ref:'H\u00e9breux 6:19'}, en:{text:'We have this hope as an anchor of the soul, sure and steadfast.', ref:'Hebrews 6:19'}},
    {id:'jn-14-11', fr:{text:'Croyez-moi : je suis dans le P\u00e8re et le P\u00e8re est en moi. Sinon, croyez \u00e0 cause des \u0153uvres elles-m\u00eames.', ref:'Jean 14:11'}, en:{text:'Believe me: I am in the Father and the Father is in me. Or else, believe because of the works themselves.', ref:'John 14:11'}},
    {id:'rom-4-3', fr:{text:'Abraham eut foi en Dieu, et cela lui fut compt\u00e9 comme justice.', ref:'Romains 4:3'}, en:{text:'Abraham believed God, and it was counted to him as righteousness.', ref:'Romans 4:3'}},
    {id:'2co-5-7', fr:{text:'Nous marchons par la foi, non par la vue.', ref:'2 Corinthiens 5:7'}, en:{text:'We walk by faith, not by sight.', ref:'2 Corinthians 5:7'}},
    {id:'he-11-6', fr:{text:'Sans la foi, il est impossible de plaire \u00e0 Dieu.', ref:'H\u00e9breux 11:6'}, en:{text:'Without faith it is impossible to please God.', ref:'Hebrews 11:6'}},
    {id:'1pi-1-3', fr:{text:'Il nous a r\u00e9g\u00e9n\u00e9r\u00e9s pour une esp\u00e9rance vivante par la r\u00e9surrection de J\u00e9sus-Christ d\u2019entre les morts.', ref:'1 Pierre 1:3'}, en:{text:'He has regenerated us unto a living hope by the resurrection of Jesus Christ from the dead.', ref:'1 Peter 1:3'}},
    {id:'he-10-23', fr:{text:'Restons fermes dans la confession de notre esp\u00e9rance, car il est fid\u00e8le, celui qui a promis.', ref:'H\u00e9breux 10:23'}, en:{text:'Let us hold fast the confession of our hope, for he who promised is faithful.', ref:'Hebrews 10:23'}},
    {id:'rom-8-24', fr:{text:'Car c\u2019est en esp\u00e9rance que nous sommes sauv\u00e9s. Or, une esp\u00e9rance que l\u2019on voit n\u2019est plus une esp\u00e9rance : ce que l\u2019on voit, peut-on l\u2019esp\u00e9rer encore ?', ref:'Romains 8:24'}, en:{text:'For in this hope we were saved. Now hope that is seen is no longer hope: for who hopes for what he sees?', ref:'Romans 8:24'}}
  ]},
  {id:'charite', name:{fr:'La charit\u00e9', en:'Charity'}, verses:[
    {id:'jn-13-34', fr:{text:'Je vous donne un commandement nouveau : aimez-vous les uns les autres ; comme je vous ai aim\u00e9s, aimez-vous les uns les autres.', ref:'Jean 13:34'}, en:{text:'A new commandment I give you: love one another; as I have loved you, love one another.', ref:'John 13:34'}},
    {id:'mt-22-37', fr:{text:'Tu aimeras le Seigneur ton Dieu de tout ton c\u0153ur, de toute ton \u00e2me et de tout ton esprit.', ref:'Matthieu 22:37'}, en:{text:'You shall love the Lord your God with all your heart, with all your soul, and with all your mind.', ref:'Matthew 22:37'}},
    {id:'mt-22-39', fr:{text:'Tu aimeras ton prochain comme toi-m\u00eame.', ref:'Matthieu 22:39'}, en:{text:'You shall love your neighbour as yourself.', ref:'Matthew 22:39'}},
    {id:'jn-15-13', fr:{text:'Il n\u2019y a pas de plus grand amour que de donner sa vie pour ses amis.', ref:'Jean 15:13'}, en:{text:'There is no greater love than to lay down one\u2019s life for one\u2019s friends.', ref:'John 15:13'}},
    {id:'1co-13-2', fr:{text:'Quand j\u2019aurais toute la foi jusqu\u2019\u00e0 transporter les montagnes, si je n\u2019ai pas la charit\u00e9, je ne suis rien.', ref:'1 Corinthiens 13:2'}, en:{text:'If I have all faith, so as to remove mountains, but have not charity, I am nothing.', ref:'1 Corinthians 13:2'}},
    {id:'1co-13-4', fr:{text:'La charit\u00e9 est patiente, elle est pleine de bont\u00e9 ; la charit\u00e9 n\u2019est pas envieuse.', ref:'1 Corinthiens 13:4'}, en:{text:'Charity is patient, charity is kind; charity is not envious.', ref:'1 Corinthians 13:4'}},
    {id:'1co-13-13', fr:{text:'Maintenant demeurent la foi, l\u2019esp\u00e9rance et la charit\u00e9 ; mais la plus grande des trois, c\u2019est la charit\u00e9.', ref:'1 Corinthiens 13:13'}, en:{text:'Now faith, hope, and charity abide, these three; but the greatest of these is charity.', ref:'1 Corinthians 13:13'}},
    {id:'1jn-4-16', fr:{text:'Dieu est amour, et celui qui demeure dans l\u2019amour demeure en Dieu, et Dieu demeure en lui.', ref:'1 Jean 4:16'}, en:{text:'God is love, and whoever abides in love abides in God, and God in him.', ref:'1 John 4:16'}},
    {id:'1jn-4-19', fr:{text:'Nous, aimons, puisque lui nous a aim\u00e9s le premier.', ref:'1 Jean 4:19'}, en:{text:'Let us love, because he first loved us.', ref:'1 John 4:19'}},
    {id:'jn-15-15', fr:{text:'Je ne vous appelle plus serviteurs, je vous appelle amis, parce que je vous ai fait conna\u00eetre tout ce que j\u2019ai entendu de mon P\u00e8re.', ref:'Jean 15:15'}, en:{text:'I no longer call you servants, I call you friends, because I have made known to you all that I have heard from my Father.', ref:'John 15:15'}},
    {id:'1jn-4-20', fr:{text:'Celui qui n\u2019aime pas son fr\u00e8re, qu\u2019il voit, ne peut aimer Dieu, qu\u2019il ne voit pas.', ref:'1 Jean 4:20'}, en:{text:'Whoever does not love his brother, whom he sees, cannot love God, whom he does not see.', ref:'1 John 4:20'}},
    {id:'mt-5-44', fr:{text:'Aimez vos ennemis, et priez pour ceux qui vous pers\u00e9cutent.', ref:'Matthieu 5:44'}, en:{text:'Love your enemies, and pray for those who persecute you.', ref:'Matthew 5:44'}},
    {id:'ph-1-9', fr:{text:'Que votre amour grandisse de plus en plus en connaissance et en pleine intelligence.', ref:'Philippiens 1:9'}, en:{text:'May your love grow ever richer in knowledge and full insight.', ref:'Philippians 1:9'}},
    {id:'col-3-14', fr:{text:'Par-dessus tout, ayez l\u2019amour, qui est le lien de la perfection.', ref:'Colossiens 3:14'}, en:{text:'Above all, put on love, which is the bond of perfection.', ref:'Colossians 3:14'}},
    {id:'1co-13-8', fr:{text:'L\u2019amour ne passe jamais.', ref:'1 Corinthiens 13:8'}, en:{text:'Love never ends.', ref:'1 Corinthians 13:8'}}
  ]},
  {id:'eglise', name:{fr:'L\u2019\u00c9glise', en:'The Church'}, verses:[
    {id:'mt-16-18', fr:{text:'Tu es Pierre, et sur cette pierre je b\u00e2tirai mon \u00c9glise, et les portes de l\u2019enfer ne pr\u00e9vaudront pas contre elle.', ref:'Matthieu 16:18'}, en:{text:'You are Peter, and on this rock I will build my Church, and the gates of hell shall not prevail against it.', ref:'Matthew 16:18'}},
    {id:'mt-16-19', fr:{text:'Je te donnerai les cl\u00e9s du royaume des cieux : ce que tu lieras sur la terre sera li\u00e9 dans les cieux.', ref:'Matthieu 16:19'}, en:{text:'I will give you the keys of the kingdom of heaven: whatever you bind on earth shall be bound in heaven.', ref:'Matthew 16:19'}},
    {id:'1co-12-27', fr:{text:'Vous \u00eates le corps du Christ, et membres chacun pour sa part.', ref:'1 Corinthiens 12:27'}, en:{text:'You are the body of Christ, and individually members of it.', ref:'1 Corinthians 12:27'}},
    {id:'eph-2-20', fr:{text:'Vous avez \u00e9t\u00e9 construits sur le fondement des ap\u00f4tres, le Christ J\u00e9sus lui-m\u00eame \u00e9tant la pierre d\u2019angle.', ref:'\u00c9ph\u00e9siens 2:20'}, en:{text:'You are built upon the foundation of the apostles, Christ Jesus himself being the cornerstone.', ref:'Ephesians 2:20'}},
    {id:'jn-17-21', fr:{text:'Que tous soient un, comme toi, P\u00e8re, tu es en moi et moi en toi, afin que le monde croie que tu m\u2019as envoy\u00e9.', ref:'Jean 17:21'}, en:{text:'That they may all be one, as you, Father, are in me and I in you, so that the world may believe that you have sent me.', ref:'John 17:21'}},
    {id:'1tm-3-15', fr:{text:'L\u2019\u00c9glise du Dieu vivant, colonne et appui de la v\u00e9rit\u00e9.', ref:'1 Timoth\u00e9e 3:15'}, en:{text:'The Church of the living God, the pillar and support of the truth.', ref:'1 Timothy 3:15'}},
    {id:'mt-28-20', fr:{text:'Et voici, je suis avec vous tous les jours, jusqu\u2019\u00e0 la fin du monde.', ref:'Matthieu 28:20'}, en:{text:'And behold, I am with you always, to the end of the world.', ref:'Matthew 28:20'}},
    {id:'ac-2-42', fr:{text:'Ils \u00e9taient assidus \u00e0 l\u2019enseignement des ap\u00f4tres, \u00e0 la communion fraternelle, \u00e0 la fraction du pain et aux pri\u00e8res.', ref:'Actes 2:42'}, en:{text:'They devoted themselves to the apostles\u2019 teaching, to fellowship, to the breaking of bread, and to the prayers.', ref:'Acts 2:42'}},
    {id:'ac-2-4', fr:{text:'Ils furent tous remplis du Saint-Esprit, et se mirent \u00e0 parler en d\u2019autres langues.', ref:'Actes 2:4'}, en:{text:'They were all filled with the Holy Spirit, and began to speak in other tongues.', ref:'Acts 2:4'}},
    {id:'ac-2-41', fr:{text:'Ceux qui accept\u00e8rent sa parole furent baptis\u00e9s ; ce jour-l\u00e0, le nombre des disciples augmenta d\u2019environ trois mille \u00e2mes.', ref:'Actes 2:41'}, en:{text:'Those who accepted his word were baptised; that day, the number of disciples grew by about three thousand souls.', ref:'Acts 2:41'}},
    {id:'col-1-18', fr:{text:'Il est la t\u00eate du corps, qui est l\u2019\u00c9glise.', ref:'Colossiens 1:18'}, en:{text:'He is the head of the body, the Church.', ref:'Colossians 1:18'}},
    {id:'1pi-2-9-10', fr:{text:'Vous \u00eates une race choisie, un sacerdoce royal, une nation sainte, un peuple acquis, pour annoncer les louanges de celui qui vous a appel\u00e9s des t\u00e9n\u00e8bres \u00e0 son admirable lumi\u00e8re. Vous qui autrefois n\u2019\u00e9tiez pas un peuple, vous \u00eates maintenant le peuple de Dieu.', ref:'1 Pierre 2:9-10'}, en:{text:'You are a chosen race, a royal priesthood, a holy nation, a people for his own possession, to proclaim the praises of him who called you out of darkness into his marvellous light. You who once were not a people, you are now the people of God.', ref:'1 Peter 2:9-10'}},
    {id:'1co-3-16', fr:{text:'Vous \u00eates le temple de Dieu, et l\u2019Esprit de Dieu habite en vous.', ref:'1 Corinthiens 3:16'}, en:{text:'You are God\u2019s temple, and God\u2019s Spirit dwells in you.', ref:'1 Corinthians 3:16'}},
    {id:'2co-11-2', fr:{text:'Je vous ai unis \u00e0 un seul \u00e9poux, pour vous pr\u00e9senter au Christ comme une vierge pure.', ref:'2 Corinthiens 11:2'}, en:{text:'I betrothed you to one husband, to present you to Christ as a pure virgin.', ref:'2 Corinthians 11:2'}},
    {id:'ac-20-28', fr:{text:'L\u2019Esprit Saint vous a \u00e9tablis gardiens, pour pa\u00eetre l\u2019\u00c9glise de Dieu.', ref:'Actes 20:28'}, en:{text:'The Holy Spirit has made you overseers, to shepherd the Church of God.', ref:'Acts 20:28'}},
    {id:'ep-4-5', fr:{text:'Un seul Seigneur, une seule foi, un seul bapt\u00eame.', ref:'\u00c9ph\u00e9siens 4:5'}, en:{text:'One Lord, one faith, one baptism.', ref:'Ephesians 4:5'}},
    {id:'ep-5-25-26', fr:{text:'Le Christ a aim\u00e9 l\u2019\u00c9glise : il s\u2019est livr\u00e9 lui-m\u00eame pour elle, afin de la sanctifier.', ref:'\u00c9ph\u00e9siens 5:25-26'}, en:{text:'Christ loved the Church: he gave himself up for her, in order to sanctify her.', ref:'Ephesians 5:25-26'}},
    {id:'apo-21-2', fr:{text:'Je vis la ville sainte, la J\u00e9rusalem nouvelle, pr\u00eate comme une \u00e9pouse par\u00e9e pour son \u00e9poux.', ref:'Apocalypse 21:2'}, en:{text:'I saw the holy city, the new Jerusalem, prepared as a bride adorned for her husband.', ref:'Revelation 21:2'}}
  ]},
  {id:'bapteme', name:{fr:'Le bapt\u00eame', en:'Baptism'}, verses:[
    {id:'jn-3-5', fr:{text:'Si quelqu\u2019un ne na\u00eet d\u2019eau et d\u2019Esprit, il ne peut entrer dans le royaume de Dieu.', ref:'Jean 3:5'}, en:{text:'Unless one is born of water and the Spirit, he cannot enter the kingdom of God.', ref:'John 3:5'}},
    {id:'rom-6-4', fr:{text:'Nous avons \u00e9t\u00e9 ensevelis avec lui par le bapt\u00eame dans la mort, afin que, comme le Christ est ressuscit\u00e9, nous menions une vie nouvelle.', ref:'Romains 6:4'}, en:{text:'We were buried with him by baptism into death, so that as Christ was raised, we too might walk in newness of life.', ref:'Romans 6:4'}},
    {id:'ac-2-38', fr:{text:'Convertissez-vous, et que chacun de vous soit baptis\u00e9 au nom de J\u00e9sus-Christ pour le pardon de ses p\u00e9ch\u00e9s ; et vous recevrez le don de l\u2019Esprit Saint.', ref:'Actes 2:38'}, en:{text:'Repent, and be baptised every one of you in the name of Jesus Christ for the forgiveness of your sins, and you will receive the gift of the Holy Spirit.', ref:'Acts 2:38'}},
    {id:'ga-3-27', fr:{text:'Vous tous qui avez \u00e9t\u00e9 baptis\u00e9s dans le Christ, vous avez rev\u00eatu le Christ.', ref:'Galates 3:27'}, en:{text:'As many of you as were baptised into Christ have put on Christ.', ref:'Galatians 3:27'}},
    {id:'tit-3-5', fr:{text:'Il nous a sauv\u00e9s par le bain de la nouvelle naissance et le renouvellement de l\u2019Esprit Saint.', ref:'Tite 3:5'}, en:{text:'He saved us by the washing of regeneration and renewal of the Holy Spirit.', ref:'Titus 3:5'}},
    {id:'1pi-3-21', fr:{text:'Cette eau, c\u2019est le bapt\u00eame qui vous sauve maintenant, non comme un nettoyage du corps, mais comme l\u2019engagement envers Dieu d\u2019une conscience droite.', ref:'1 Pierre 3:21'}, en:{text:'Baptism now saves you, not as a removal of dirt from the body, but as an appeal to God for a good conscience.', ref:'1 Peter 3:21'}},
    {id:'mc-16-16', fr:{text:'Celui qui croira et sera baptis\u00e9 sera sauv\u00e9, mais celui qui ne croira pas sera condamn\u00e9.', ref:'Marc 16:16'}, en:{text:'Whoever believes and is baptised will be saved, but whoever does not believe will be condemned.', ref:'Mark 16:16'}},
    {id:'1pi-3-20-21', fr:{text:'Ce petit nombre fut sauv\u00e9 \u00e0 travers l\u2019eau. Cette eau \u00e9tait la figure du bapt\u00eame qui vous sauve aujourd\u2019hui.', ref:'1 Pierre 3:20-21'}, en:{text:'This small number was saved through water. This water was the figure of the baptism which now saves you.', ref:'1 Peter 3:20-21'}},
    {id:'1co-10-1-2', fr:{text:'Nos p\u00e8res ont tous pass\u00e9 \u00e0 travers la mer, et tous ont \u00e9t\u00e9 baptis\u00e9s en Mo\u00efse dans la nu\u00e9e et dans la mer.', ref:'1 Corinthiens 10:1-2'}, en:{text:'Our fathers all passed through the sea, and all were baptised into Moses in the cloud and in the sea.', ref:'1 Corinthians 10:1-2'}},
    {id:'mt-3-16-17', fr:{text:'D\u00e8s que J\u00e9sus eut \u00e9t\u00e9 baptis\u00e9, les cieux s\u2019ouvrirent, et il vit l\u2019Esprit de Dieu descendre comme une colombe ; et une voix dit : Celui-ci est mon Fils bien-aim\u00e9.', ref:'Matthieu 3:16-17'}, en:{text:'As soon as Jesus had been baptised, the heavens opened, and he saw the Spirit of God descending like a dove; and a voice said: This is my beloved Son.', ref:'Matthew 3:16-17'}},
    {id:'1co-12-13', fr:{text:'C\u2019est dans un seul Esprit que nous avons tous \u00e9t\u00e9 baptis\u00e9s pour former un seul corps.', ref:'1 Corinthiens 12:13'}, en:{text:'In one Spirit we were all baptised to form one single body.', ref:'1 Corinthians 12:13'}}
  ]},
